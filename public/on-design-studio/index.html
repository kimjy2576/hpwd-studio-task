<!-- Global error catcher (нқ°нҷ”л©ҙ лҢҖмӢ  л©”мӢңм§Җ н‘ңмӢң) -->
<script>
  function showError(msg) {
    const el = document.getElementById('load-error');
    const status = document.getElementById('load-status');
    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
    }
    if (status) status.style.color = '#dc2626';
    console.error('[Studio]', msg);
  }
  window.addEventListener('error', e => {
    showError('JS Error: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Promise rejection: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

const { useState, useEffect, useMemo, useRef } = React;

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Backend URL (HPWD StudioмҷҖ кіөмң ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const DEFAULT_BACKENDS = {
  cloud: 'https://hpwd-studio-task-production.up.railway.app',
  local: 'http://localhost:8010',
};

function resolveBackendUrl() {
  try {
    const param = new URLSearchParams(window.location.search).get('backend');
    if (param) return param;
  } catch (e) {}
  try {
    const stored = localStorage.getItem('hpwd_backend_url');
    if (stored) return stored;
  } catch (e) {}
  // кё°ліё: нҳ„мһ¬ нҺҳмқҙм§ҖмҷҖ к°ҷмқҖ origin (л°ұм—”л“ңк°Җ н”„лЎ нҠёлҸ„ м„ңл№ҷ вҶ’ same-origin).
  // лЎңм»¬(localhost:PORT)В·мӮ¬лӮҙм„ңлІ„(host:PORT) м–ҙл””м„ң м—ҙл“  мһҗлҸҷмңјлЎң л§һм¶Ө.
  // file://лЎң м§Ғм ‘ м—ҙл©ҙ лЎңм»¬ л°ұм—”л“ңлЎң. cloudлҠ” нҶ кёҖ/?backend=лЎңл§Ң.
  if (window.location.protocol === 'file:' || !window.location.host) {
    return DEFAULT_BACKENDS.local;
  }
  return window.location.origin;
}

let CURRENT_BACKEND = resolveBackendUrl();
function setBackend(u) { CURRENT_BACKEND = u; try { localStorage.setItem('hpwd_backend_url', u); } catch (e) {} }
function resetBackend() { try { localStorage.removeItem('hpwd_backend_url'); } catch (e) {} CURRENT_BACKEND = resolveBackendUrl(); }

async function api(path, options = {}) {
  const res = await fetch(CURRENT_BACKEND + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.json();
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Circuit н—¬нҚј (нҡҢлЎң мҲҳ = circuit_modeлЎң мқјмӣҗнҷ”) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
// bends вҶ’ нҡҢлЎң лҰ¬мҠӨнҠё (custom лӘЁл“ң). л°ұм—”л“ң _parse_custom_circuitsмҷҖ м§қ.
function traceBends(bends, inlets, outlets, Nr, Nt) {
  if (!bends || ((!bends.front || !bends.front.length) && (!bends.back || !bends.back.length))) return [];
  const fm = {}, bm = {};
  (bends.front || []).forEach(([r1, c1, r2, c2]) => { fm[`${r1},${c1}`] = [r2, c2]; fm[`${r2},${c2}`] = [r1, c1]; });
  (bends.back || []).forEach(([r1, c1, r2, c2]) => { bm[`${r1},${c1}`] = [r2, c2]; bm[`${r2},${c2}`] = [r1, c1]; });
  const visited = new Set(), circuits = [];
  for (let c = 0; c < Nt; c++) for (let r = 0; r < Nr; r++) {
    const k = `${r},${c}`;
    if (visited.has(k)) continue;
    const hasF = fm.hasOwnProperty(k), hasB = bm.hasOwnProperty(k);
    if (hasF && hasB) continue;
    if (!hasF && !hasB) { circuits.push([[r, c]]); visited.add(k); continue; }
    const path = []; let cur = [r, c];
    let lookFace = hasB ? 'back' : 'front';
    path.push([...cur]); visited.add(`${cur[0]},${cur[1]}`);
    while (true) {
      const map = lookFace === 'front' ? fm : bm;
      const ck = `${cur[0]},${cur[1]}`;
      if (!map.hasOwnProperty(ck)) break;
      const next = map[ck]; const nk = `${next[0]},${next[1]}`;
      if (visited.has(nk)) break;
      path.push([...next]); visited.add(nk);
      cur = next; lookFace = lookFace === 'front' ? 'back' : 'front';
    }
    circuits.push(path);
  }
  const isMatch = (a, b) => a && b && a[0] === b[0] && a[1] === b[1];
  const inSet = (arr, t) => arr.some(a => isMatch(a, t));
  circuits.forEach(circ => {
    if (circ.length < 2) return;
    const first = circ[0], last = circ[circ.length - 1];
    if (inSet(inlets, last)) circ.reverse();
    else if (inSet(outlets, first)) circ.reverse();
    else if (!inSet(inlets, first) && !inSet(outlets, last)) { if (first[0] < last[0]) circ.reverse(); }
  });
  return circuits;
}

// circuit_mode вҶ’ лі‘л ¬ нҡҢлЎң мҲҳ. л°ұм—”л“ң(solver.py / Semi _ncirc_from_mode)мҷҖ лҸҷмқј.
//   Ncolumns = transverse tube мҲҳ (per-row м»¬лҹј мҲҳ)
function deriveNcirc(mode, Ncolumns, Nrows, bends, inlets, outlets) {
  const perRow = Math.max(1, Math.round(Ncolumns));
  if (mode === 'single') return 1;
  if (mode === 'custom') {
    const c = traceBends(bends, inlets || [], outlets || [], Nrows, perRow);
    return Math.max(1, c.length);
  }
  if (mode.startsWith('serpentine')) {
    const grp = parseInt(mode.split('_')[1]) || 2;
    return Math.max(1, Math.floor(perRow / grp));
  }
  return perRow; // row_parallel
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ App Switcher (4к°ң м•ұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const apps = [
    { id: 'studio',             label: 'HPWD Studio',         desc: 'мӢңл®¬ мә”лІ„мҠӨ',            href: '/' },
    { id: 'cycle-runner',     label: 'Cycle Runner',     desc: 'мӮ¬мқҙнҒҙ мЎ°н•©В·мӢӨн–ү', href: '/cycle-runner/' },
    { id: 'component-studio',   label: 'Component Studio',    desc: 'м»ҙнҸ¬л„ҢнҠё мһ‘м„ұ',          href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio',  desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',    desc: 'On-design лӘЁлҚё м„Өкі„',    href: '/on-design-studio/' },
    { id: 'model-docs',         label: 'Model Docs',          desc: 'мҲҳн•ҷм Ғ лӘЁлҚёл§Ғ л¬ём„ң',     href: '/model-docs/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors">
        <div className="w-2 h-2 rounded-sm bg-blue-600 shrink-0"></div>
        <span className="font-bold text-slate-900 tracking-wide text-sm">{active.label}</span>
        <span className="text-slate-400 text-[10px]">в–ҫ</span>
      </button>
      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-60 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-blue-50 cursor-default' : 'hover:bg-slate-50'
                }`}>
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-blue-700' : 'text-slate-300'}`}>
                  {isActive ? 'в—Ҹ' : 'в—Ӣ'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-blue-900' : 'text-slate-800'}`}>{a.label}</div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ BackendStatus в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function BackendStatus() {
  const [url, setUrl] = useState(CURRENT_BACKEND);
  const [open, setOpen] = useState(false);
  const [editUrl, setEditUrl] = useState(url);
  const [status, setStatus] = useState('checking');
  const [errMsg, setErrMsg] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    setStatus('checking');
    fetch(url + '/health', { method: 'GET' })
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(body => {
        if (body && body.status === 'ok') setStatus('ok');
        else { setStatus('partial'); setErrMsg('unexpected response'); }
      })
      .catch(e => { setStatus('fail'); setErrMsg(String(e)); });
  }, [url]);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const dotColor = status === 'ok' ? 'bg-green-500' : status === 'fail' ? 'bg-red-500' : 'bg-amber-400';
  const text = status === 'ok' ? 'OK' : status === 'fail' ? 'OFF' : '...';

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-slate-100 text-[11px] font-mono">
        <div className={`w-2 h-2 rounded-full ${dotColor}`}></div>
        <span className="text-slate-600">backend</span>
        <span className={`font-bold ${status === 'ok' ? 'text-green-700' : status === 'fail' ? 'text-red-700' : 'text-amber-700'}`}>{text}</span>
        <span className="text-slate-400">в–ҫ</span>
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-96 p-3">
          <div className="text-[11px] font-semibold text-slate-700 mb-1">Backend URL</div>
          <input type="text" value={editUrl} onChange={(e) => setEditUrl(e.target.value)}
            className="w-full border border-slate-300 px-2 py-1 rounded text-[11px] font-mono mb-2" />
          <div className="flex gap-1.5 mb-2">
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.local)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">localhost</button>
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.cloud)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">cloud</button>
            <div className="flex-1"></div>
            <button onClick={() => { resetBackend(); setUrl(CURRENT_BACKEND); setEditUrl(CURRENT_BACKEND); setOpen(false); }}
              className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded">мҙҲкё°нҷ”</button>
          </div>
          {status === 'fail' && (
            <div className="text-[10px] text-red-700 bg-red-50 border border-red-200 rounded p-1.5 mb-2 font-mono break-all">вң— {errMsg}</div>
          )}
          <button onClick={() => { setBackend(editUrl); setUrl(editUrl); setOpen(false); }}
            className="w-full px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-[12px] font-semibold">м Ғмҡ© + м ҖмһҘ</button>
        </div>
      )}
    </div>
  );
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Slider м»ҙнҸ¬л„ҢнҠё (fan-sim нҢЁн„ҙ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function Slider({ label, sublabel, value, min, max, step, onChange, color = 'blue', unit = '', decimals = 2 }) {
  const pct = ((value - min) / (max - min)) * 100;
  const colorMap = {
    blue:   { fill: '#2563EB', text: 'text-blue-700',   bg: 'bg-blue-600' },
    green:  { fill: '#059669', text: 'text-green-700',  bg: 'bg-green-600' },
    amber:  { fill: '#D97706', text: 'text-amber-700',  bg: 'bg-amber-600' },
    purple: { fill: '#7C3AED', text: 'text-purple-700', bg: 'bg-purple-600' },
    cyan:   { fill: '#0891B2', text: 'text-cyan-700',   bg: 'bg-cyan-600' },
    slate:  { fill: '#475569', text: 'text-slate-700',  bg: 'bg-slate-600' },
  };
  const c = colorMap[color] || colorMap.blue;
  
  // Local input state вҖ” мӮ¬мҡ©мһҗк°Җ нғҖмқҙн•‘ мӨ‘мқј л•Ң raw string ліҙмЎҙ (controlled м¶©лҸҢ нҡҢн”ј)
  // nullмқҙл©ҙ props valueлҘј к·ёлҢҖлЎң н‘ңмӢң, stringмқҙл©ҙ мӮ¬мҡ©мһҗк°Җ нҺём§‘ мӨ‘
  const [editing, setEditing] = useState(null);
  
  // props valueк°Җ мҷёл¶Җм—җм„ң л°”лҖҢл©ҙ (slider drag, applyParams л“ұ) editing н•ҙм ң
  useEffect(() => {
    setEditing(null);
  }, [value]);
  
  // н‘ңмӢңмҡ© к°’ вҖ” нҺём§‘ мӨ‘мқҙл©ҙ raw string, м•„лӢҲл©ҙ formatted
  const displayValue = editing !== null ? editing : Number(value).toFixed(decimals);
  
  // Commit (blur лҳҗлҠ” Enter) вҖ” л№Ҳ л¬ёмһҗм—ҙ мІҳлҰ¬, NaN мІҳлҰ¬, clamp
  const commit = () => {
    if (editing === null) return;
    const trimmed = editing.trim();
    if (trimmed === '' || trimmed === '-' || trimmed === '.') {
      // л№Ҳ мһ…л Ҙ вҶ’ мӣҗлһҳ value мң м§Җ (stateлҠ” к·ёлҢҖлЎң, editingл§Ң н•ҙм ң)
      setEditing(null);
      return;
    }
    const parsed = parseFloat(trimmed);
    if (isNaN(parsed)) {
      setEditing(null);
      return;
    }
    // Clamp to [min, max]
    const clamped = Math.max(min, Math.min(max, parsed));
    onChange(clamped);
    // useEffectк°Җ editingмқ„ nullлЎң reset
  };
  
  return (
    <div className="mb-3">
      <div className="flex items-center justify-between mb-1">
        <div className="flex items-baseline gap-1">
          <span className="text-[12px] font-semibold text-slate-700">{label}</span>
          {sublabel && <span className="text-[10px] text-slate-400 font-mono">{sublabel}</span>}
        </div>
        <input type="text" inputMode="decimal"
          value={displayValue}
          onChange={(e) => setEditing(e.target.value)}
          onFocus={(e) => { setEditing(Number(value).toFixed(decimals)); e.target.select(); }}
          onBlur={commit}
          onKeyDown={(e) => {
            if (e.key === 'Enter') { e.target.blur(); }
            if (e.key === 'Escape') { setEditing(null); e.target.blur(); }
          }}
          className={`w-20 text-right text-[12px] font-mono font-semibold ${c.text} bg-transparent border border-transparent outline-none px-1 py-0.5 rounded hover:bg-slate-50 focus:bg-white focus:border-slate-300`} />
      </div>
      <div className="relative">
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="w-full h-1.5 rounded-full appearance-none cursor-pointer slider-thumb"
          style={{ background: `linear-gradient(to right, ${c.fill} ${pct}%, #E2E8F0 ${pct}%)` }} />
      </div>
    </div>
  );
}

// в”Җв”Җ нҢ¬ лҸ„л©ҙ (мӣҗмӢ¬нҢ¬ м •л©ҙ лӢЁл©ҙ) в”Җв”Җ
function FanSchematic({ p }) {
  const cx = 160, cy = 160, scale = 0.6;
  const rD1 = (p.D1 / 2) * scale, rD2 = (p.D2 / 2) * scale;
  const blades = [];
  for (let i = 0; i < p.Z; i++) {
    const ang = (i / p.Z) * 2 * Math.PI;
    const x1 = cx + rD1 * Math.cos(ang), y1 = cy + rD1 * Math.sin(ang);
    const angOut = ang + (p.beta2 - 90) * Math.PI / 180 * 0.3;
    const x2 = cx + rD2 * Math.cos(angOut), y2 = cy + rD2 * Math.sin(angOut);
    blades.push(<path key={i} d={`M ${x1.toFixed(1)} ${y1.toFixed(1)} Q ${((x1 + x2) / 2 + (y2 - y1) * 0.2).toFixed(1)} ${((y1 + y2) / 2 - (x2 - x1) * 0.2).toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)}`} stroke="#0891b2" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.85" />);
  }
  return (
    <svg viewBox="0 0 320 320" className="w-full h-full">
      <circle cx={cx} cy={cy} r={rD2 + 18 + p.cutoffGap * scale} fill="#ecfeff" stroke="#a5f3fc" strokeWidth="1.5" strokeDasharray="4 3" />
      <circle cx={cx} cy={cy} r={rD2} fill="none" stroke="#06b6d4" strokeWidth="1.5" opacity="0.5" />
      <circle cx={cx} cy={cy} r={rD1} fill="#cffafe" stroke="#0891b2" strokeWidth="1.5" />
      {blades}
      <circle cx={cx} cy={cy} r="6" fill="#0e7490" />
      <line x1={cx} y1={cy} x2={cx + rD2} y2={cy} stroke="#64748b" strokeWidth="0.8" strokeDasharray="2 2" />
      <text x={cx + rD2 / 2} y={cy - 4} fontSize="9" fill="#0891b2" fontFamily="monospace" textAnchor="middle">D2={p.D2}</text>
      <text x={cx} y={cy - rD1 - 4} fontSize="9" fill="#0e7490" fontFamily="monospace" textAnchor="middle">D1={p.D1}</text>
      <text x="10" y="16" fontSize="10" fill="#475569" fontFamily="monospace">Z={p.Z} В· ОІ2={p.beta2}В°</text>
    </svg>
  );
}

}

// в”Җв”Җ н•„н„° лҸ„л©ҙ в”Җв”Җ
function FilterSchematic({ p }) {
  const cx = 160, cy = 155;
  const isRect = p.shape === 'rectangular';
  // м№ҳмҲҳ вҶ’ нҷ”л©ҙ мҠӨмјҖмқј (кёҙ мӘҪмқ„ ~190pxм—җ л§һм¶Ө)
  const longMm = isRect ? Math.max(p.W, p.H) : Math.max(p.D_major, p.D_minor);
  const scale = 190 / Math.max(longMm, 1);
  // л©”мү¬ кІ©мһҗ л°ҖлҸ„ (MPI л°ҳмҳҒ вҖ” лҢҖлһө мӢңк°Ғнҷ”)
  const meshN = Math.max(4, Math.min(14, Math.round(p.MPI / 2)));

  let frame, clipId = 'filterClip';
  let wPx, hPx;
  if (isRect) {
    wPx = p.W * scale; hPx = p.H * scale;
    frame = <rect x={cx - wPx/2} y={cy - hPx/2} width={wPx} height={hPx} fill="#fffbeb" stroke="#d97706" strokeWidth="2" rx="4" />;
  } else {
    wPx = p.D_major * scale; hPx = p.D_minor * scale;
    frame = <ellipse cx={cx} cy={cy} rx={wPx/2} ry={hPx/2} fill="#fffbeb" stroke="#d97706" strokeWidth="2" />;
  }

  // л©”мү¬ кІ©мһҗ (н”„л Ҳмһ„ м•Ҳм—җ clip)
  const gridLines = [];
  const step = Math.max(wPx, hPx) / meshN;
  for (let i = 1; i < meshN; i++) {
    const x = cx - wPx/2 + i * (wPx/meshN);
    gridLines.push(<line key={`v${i}`} x1={x} y1={cy-hPx/2} x2={x} y2={cy+hPx/2} stroke="#f59e0b" strokeWidth="0.7" opacity="0.5" />);
  }
  for (let j = 1; j < meshN; j++) {
    const y = cy - hPx/2 + j * (hPx/meshN);
    gridLines.push(<line key={`h${j}`} x1={cx-wPx/2} y1={y} x2={cx+wPx/2} y2={y} stroke="#f59e0b" strokeWidth="0.7" opacity="0.5" />);
  }

  const dimLabel = isRect ? `${p.W}Г—${p.H} mm` : (p.D_major === p.D_minor ? `вҢҖ${p.D_major} mm` : `${p.D_major}Г—${p.D_minor} mm (нғҖмӣҗ)`);

  return (
    <svg viewBox="0 0 320 320" className="w-full h-full">
      <defs>
        <clipPath id={clipId}>
          {isRect
            ? <rect x={cx - wPx/2} y={cy - hPx/2} width={wPx} height={hPx} rx="4" />
            : <ellipse cx={cx} cy={cy} rx={wPx/2} ry={hPx/2} />}
        </clipPath>
        <marker id="odfArrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#0891b2" /></marker>
      </defs>
      {frame}
      <g clipPath={`url(#${clipId})`}>{gridLines}</g>
      {/* кіөкё° кҙҖнҶө нҷ”мӮҙн‘ң */}
      {[-1, 0, 1].map(i => (
        <g key={i}>
          <line x1={cx - wPx/2 - 42} y1={cy + i * 42} x2={cx - wPx/2 - 8} y2={cy + i * 42} stroke="#0891b2" strokeWidth="2" markerEnd="url(#odfArrow2)" />
          <line x1={cx + wPx/2 + 8} y1={cy + i * 42} x2={cx + wPx/2 + 42} y2={cy + i * 42} stroke="#0891b2" strokeWidth="1.5" strokeDasharray="3 2" markerEnd="url(#odfArrow2)" opacity="0.5" />
        </g>
      ))}
      <text x={cx} y={cy - hPx/2 - 8} fontSize="9" fill="#d97706" fontFamily="monospace" textAnchor="middle">{dimLabel} В· MPI {p.MPI}</text>
      <text x="10" y="16" fontSize="10" fill="#475569" fontFamily="monospace">{isRect ? 'м§ҒмӮ¬к°Ғнҳ•' : (p.D_major===p.D_minor ? 'мӣҗнҳ•' : 'нғҖмӣҗ')} В· м„ кІҪ {p.d_w}mm</text>
      <text x="10" y="310" fontSize="9" fill="#94a3b8" fontFamily="monospace">н•„н„° л©ҙ (кіөкё° кҙҖнҶө В· Ergun м••л Ҙк°•н•ҳ)</text>
    </svg>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   Fin-tube HX Component View вҖ” Sidebar + Model design
   mode='evap' (Evaporator) / mode='cond' (Condenser)
   - м°Ёмқҙм җ: нғҖмқҙнӢҖ, м»¬лҹ¬ н…Ңл§Ҳ, refrigerant correlation hint
   - кіөнҶө: geometry, tube/fin material, circuit/layout, лӘЁл“  viewer
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function FinTubeHXView({ mode = 'evap', onBack }) {
  // в”Җв”Җ Mode-dependent theme в”Җв”Җ
  const theme = mode === 'cond'
    ? {
        title: 'Condenser',
        subtitle: 'Fin-tube В· On-design',
        backendMode: 'cond',                    // payload mode
        accent: 'amber',                        // primary accent color
        tabActive: 'bg-amber-600 text-white',   // view tab active
        applyBtn: 'bg-amber-50 text-amber-700 border-amber-300',
        applyBtnHover: 'bg-slate-50 hover:bg-amber-50 text-slate-700 border-slate-200',
        applyAction: 'bg-amber-50 hover:bg-amber-100 text-amber-700 border-amber-200',
        sliderColor: 'amber',                   // sidebar Slider 'color' prop
        infoBg: 'bg-amber-50 border-amber-200 text-amber-800',
        ringActive: 'bg-amber-50 border-amber-400 text-amber-700',
        // мқ‘м¶• мғҒкҙҖмӢқ hint (м •ліҙмҡ©, backendк°Җ мӮ¬мҡ©)
        refSideHint: 'Shah (2009) condensation, R290',
        refRangeHint: 'мқ‘м¶•: кі м••мёЎ (Pcond ~ 1.4-1.8 MPa for R290)',
      }
    : {
        title: 'Evaporator',
        subtitle: 'Fin-tube В· On-design',
        backendMode: 'evap',
        accent: 'cyan',
        tabActive: 'bg-cyan-600 text-white',
        applyBtn: 'bg-cyan-50 text-cyan-700 border-cyan-300',
        applyBtnHover: 'bg-slate-50 hover:bg-cyan-50 text-slate-700 border-slate-200',
        applyAction: 'bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border-cyan-200',
        sliderColor: 'cyan',
        infoBg: 'bg-cyan-50 border-cyan-200 text-cyan-800',
        ringActive: 'bg-cyan-50 border-cyan-400 text-cyan-700',
        refSideHint: 'Kandlikar/Wattelet evaporation, R290',
        refRangeHint: 'мҰқл°ң: м Җм••мёЎ (Pevap ~ 0.3-0.5 MPa for R290)',
      };
  // в”Җв”Җв”Җ State (geometry + material + circuit) в”Җв”Җв”Җ
  const [tubeMaterial, setTubeMaterial] = useState('Cu');
  const [finMaterial, setFinMaterial] = useState('Al');
  
  // в”Җв”Җ л°ұм—”л“ң default л°ҳмҳҒ (modelDescription кё°мӨҖ, mm лӢЁмң„ ліҖнҷҳ) в”Җв”Җ
  //   мҰқл°ңкё°(EvapMBe.mo): N_rows=4, FPI=20 В· мқ‘м¶•кё°(CondMBe.mo): N_rows=6, FPI=22
  //   кіөнҶө нҳ•мғҒ: D_o=5, D_i=4.6, P_t=14.14, P_l=10, t_fin=0.11, L_tube(W)=240 (mm)
  const _isCond = mode === 'cond';
  // Tube (л°ұм—”л“ң m вҶ’ UI mm)
  const [D_o, setDo] = useState(5.0);     // mm (л°ұм—”л“ң 0.005)
  const [D_i, setDi] = useState(4.6);     // mm (л°ұм—”л“ң 0.0046)
  const [L_tube, setLtube] = useState(240); // mm (л°ұм—”л“ң W=0.24)
  
  // Fin
  const [FPI, setFPI] = useState(_isCond ? 22 : 20);   // мқ‘м¶•кё° 22 / мҰқл°ңкё° 20
  const [t_fin, setTfin] = useState(0.11); // mm (л°ұм—”л“ң 0.00011)
  const [fin_type, setFinType] = useState('plain');  // plain/wavy/louver/slit
  const [edge_type, setEdgeType] = useState('rounded');  // sharp/rounded/chamfered
  // Wavy params (fin_type='wavy' мқј л•Ңл§Ң)
  const [wavy_amplitude, setWavyAmp] = useState(1.0);   // mm
  const [wavy_wavelength, setWavyWL] = useState(10.0);  // mm
  // Louver params (fin_type='louver' мқј л•Ңл§Ң)
  const [louver_pitch, setLouverP] = useState(1.7);     // mm
  const [louver_angle, setLouverA] = useState(27.0);    // deg
  
  // Circuit / layout
  // м§„мҳҒлӢҳ м •лҰ¬:
  //   вҖў N_rows ("н–ү")    = кіөкё° нқҗлҰ„ л°©н–Ҙ к№Ҡмқҙ (longitudinal, P_l pitch)
  //   вҖў N_columns ("м—ҙ") = кіөкё° нқҗлҰ„ мҲҳм§Ғ л°©н–Ҙ (transverse, P_t pitch)
  //   вҖў N_tubes = N_rows Г— N_columns (derived, мһҗлҸҷ кі„мӮ°)
  const [N_rows, setNrows] = useState(_isCond ? 6 : 4);   // мқ‘м¶•кё° 6 / мҰқл°ңкё° 4
  const [N_columns, setNcolumns] = useState(4);           // N_tubes_per_row=4
  const N_tubes = N_rows * N_columns;  // derived
  const setNtubes = (n) => {
    // legacy compat вҖ” N_tubes м§Ғм ‘ set нҳём¶ң мӢң N_columnsлЎң ліҖнҷҳ
    const cols = N_rows > 0 ? Math.max(1, Math.round(n / N_rows)) : n;
    setNcolumns(cols);
  };
  const [P_t, setPt] = useState(14.14);  // mm (л°ұм—”л“ң 0.01414)
  const [P_l, setPl] = useState(10.0);   // mm (л°ұм—”л“ң 0.01)
  // Circuit mode (preset 4к°ң + custom)
  const [circuit_mode, setCircuitMode] = useState('single');  // row_parallel/serpentine_2/serpentine_4/single/custom
  
  // HX-Simмқҳ bend мӢңмҠӨн…ң (front/back face Г— мқём ‘ нҠңлёҢ нҺҳм–ҙ)
  // bends.front: [[r1,c1,r2,c2], ...] (front faceмқҳ bend нҺҳм–ҙ)
  // bends.back: [[r1,c1,r2,c2], ...] (back face)
  // inlets/outlets: [[r,c], ...] (мӮ¬мҡ©мһҗ м§Җм • IN/OUT мң„м№ҳ)
  const [bends, setBends] = useState({ front: [], back: [] });
  const [inlets, setInlets] = useState([]);
  const [outlets, setOutlets] = useState([]);

  // нҡҢлЎң мҲҳлҠ” circuit_modeлЎң мқјмӣҗнҷ” (лі„лҸ„ N_circuits мһ…л Ҙ м ңкұ°).
  //   л°ұм—”л“ң On(solver.py)В·Semi(_ncirc_from_mode)мҷҖ лҸҷмқј к·ңм№ҷмңјлЎң derive.
  const N_circuits = useMemo(
    () => deriveNcirc(circuit_mode, N_columns, N_rows, bends, inlets, outlets),
    [circuit_mode, N_columns, N_rows, bends, inlets, outlets]
  );

  // View toggle (2D plan view)
  const [view, setView] = useState('3D');
  
  // Save panel
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});  // {1: {...}, 2: {...}, ...}
  const fileInputRef = useRef(null);

  // Apply panel вҖ” лӢӨлҘё StudioлЎң лҸҷкё°нҷ”
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  // в”Җв”Җв”Җ Save/Load helpers в”Җв”Җв”Җ
  const STORAGE_KEY = mode === 'cond' ? 'on_design_condenser_slots' : 'on_design_evaporator_slots';

  // localStorageм—җм„ң slots лЎңл“ң (н•ңлІҲл§Ң)
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'evaporator',
    tubeMaterial, finMaterial,
    D_o, D_i, L_tube,
    FPI, t_fin,
    fin_type, edge_type,
    wavy_amplitude, wavy_wavelength,
    louver_pitch, louver_angle,
    N_tubes, N_rows, P_t, P_l, N_circuits,
    circuit_mode,
    bends, inlets, outlets,
  });

  const applyParams = (p) => {
    if (!p) return;
    if (p.tubeMaterial !== undefined) setTubeMaterial(p.tubeMaterial);
    if (p.finMaterial !== undefined) setFinMaterial(p.finMaterial);
    if (p.D_o !== undefined) setDo(p.D_o);
    if (p.D_i !== undefined) setDi(p.D_i);
    if (p.L_tube !== undefined) setLtube(p.L_tube);
    if (p.FPI !== undefined) setFPI(p.FPI);
    if (p.t_fin !== undefined) setTfin(p.t_fin);
    if (p.fin_type !== undefined) setFinType(p.fin_type);
    if (p.edge_type !== undefined) setEdgeType(p.edge_type);
    if (p.wavy_amplitude !== undefined) setWavyAmp(p.wavy_amplitude);
    if (p.wavy_wavelength !== undefined) setWavyWL(p.wavy_wavelength);
    if (p.louver_pitch !== undefined) setLouverP(p.louver_pitch);
    if (p.louver_angle !== undefined) setLouverA(p.louver_angle);
    if (p.N_tubes !== undefined) setNtubes(p.N_tubes);
    if (p.N_rows !== undefined) setNrows(p.N_rows);
    if (p.P_t !== undefined) setPt(p.P_t);
    if (p.P_l !== undefined) setPl(p.P_l);
    if (p.circuit_mode !== undefined) setCircuitMode(p.circuit_mode);
    if (p.bends !== undefined) setBends(p.bends);
    if (p.inlets !== undefined) setInlets(p.inlets);
    if (p.outlets !== undefined) setOutlets(p.outlets);
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = {
      ...params,
      _name: name || `Slot ${slot}`,
      _timestamp: new Date().toISOString(),
    };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  const loadSlot = (slot) => {
    const entry = saves[slot];
    if (!entry) return;
    applyParams(entry);
  };

  const deleteSlot = (slot) => {
    const newSaves = { ...saves };
    delete newSaves[slot];
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  // в”Җв”Җв”Җ Apply helpers вҖ” On-Design params вҶ’ backend (typeNo 122) в”Җв”Җв”Җ
  // лӢЁмҲң sidebar paramsлҘј backendмқҳ 35к°ң parameter мӨ‘ н•өмӢ¬м—җ л§Өн•‘.
  // м§„мҳҒлӢҳ audit нӣ„мҶҚ: Result м—Ҷмқҙ "м„Өкі„ лҸҷкё°нҷ”"л§Ң (RunмқҖ лӢӨлҘё Studioм—җм„ң).
  const buildBackendParams = () => {
    const N_tubes_per_row = N_rows > 0 ? Math.round(N_tubes / N_rows) : N_tubes;
    
    // bends мӢңмҠӨн…ң вҶ’ custom_circuits JSON (м¶”м¶ңн•ң traceBends мһ¬мӮ¬мҡ©)
    let custom_circuits_json = '';
    if (circuit_mode === 'custom' &&
        ((bends.front && bends.front.length > 0) || (bends.back && bends.back.length > 0))) {
      const circuits = traceBends(bends, inlets, outlets, N_rows, N_tubes_per_row);
      custom_circuits_json = JSON.stringify(circuits);
    }
    
    return {
      // Material
      fluid: 'R290',
      mode: theme.backendMode,
      // Geometry
      W: L_tube * 1e-3,
      H: P_t * N_tubes_per_row * 1e-3,
      D: P_l * N_rows * 1e-3,
      // Tube
      D_o: D_o * 1e-3,
      D_i: D_i * 1e-3,
      P_t: P_t * 1e-3,
      P_l: P_l * 1e-3,
      N_rows: N_rows,
      N_tubes_per_row: N_tubes_per_row,
      layout: 'staggered',
      // Fin (мӮ¬мҡ©мһҗ м„ нғқ мӮ¬мҡ©)
      FPI: FPI,
      t_fin: t_fin * 1e-3,
      fin_type: fin_type,
      k_fin: finMaterial === 'Cu' ? 390 : 200,
      edge_type: edge_type,
      wavy_amplitude: wavy_amplitude * 1e-3,
      wavy_wavelength: wavy_wavelength * 1e-3,
      louver_pitch: louver_pitch * 1e-3,
      louver_angle: louver_angle,
      // Circuit (мӮ¬мҡ©мһҗ м„ нғқ мӮ¬мҡ©)
      circuit_mode: circuit_mode,
      custom_circuits: custom_circuits_json,
      // Numerical
      N_seg: 10,
      N_seg_auto: 'off',
      // Correlations
      evap_corr: 'chen1966',
      cond_corr: 'shah1979',
      dp_corr: 'friedel1979',
      air_j_corr: 'auto',
      // Tuning
      wet_dp_max: 1.20,
      K_bend: 0.75,
      // Fitting
      cf_j: 1.0, cf_f: 1.0, cf_hi: 1.0, cf_dp_ref: 1.0,
    };
  };

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const componentName = mode === 'cond' ? 'condenser_on_design' : 'evaporator_on_design';
    const targetTypeNo = mode === 'cond' ? 222 : 122;
    const payload = {
      component: componentName,
      typeNo: targetTypeNo,
      params: beParams,
      sourceParams: currentParams(),  // мӣҗліё sidebar paramsлҸ„ к°ҷмқҙ
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg(`вң“ HPWD StudioлЎң м Ғмҡ©лҗЁ. HPWD Studio canvasм—җм„ң typeNo ${targetTypeNo} м»ҙнҸ¬л„ҢнҠёлҘј м¶”к°Җн•ҳл©ҙ мһҗлҸҷ м Ғмҡ©лҗ©лӢҲлӢӨ.`);
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('вң— м Ғмҡ© мӢӨнҢЁ: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const componentName = mode === 'cond' ? 'condenser_on_design' : 'evaporator_on_design';
    const targetTypeNo = mode === 'cond' ? 222 : 122;
    const payload = {
      component: componentName,
      typeNo: targetTypeNo,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('вң“ Calibration StudioлЎң м Ғмҡ©лҗЁ. Calibration Studioм—җм„ң fittingмқ„ мӢңмһ‘н•  мҲҳ мһҲмҠөлӢҲлӢӨ.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('вң— м Ғмҡ© мӢӨнҢЁ: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = {
      ...currentParams(),
      _exported_at: new Date().toISOString(),
      _version: '1.0',
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `evaporator_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'evaporator') {
          alert(`лӢӨлҘё м»ҙнҸ¬л„ҢнҠёмқҳ JSON: ${data.component}`);
          return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON нҢҢмӢұ мӢӨнҢЁ: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';  // к°ҷмқҖ нҢҢмқј лӢӨмӢң import к°ҖлҠҘн•ҳкІҢ
  };

  // кІҖмҰқ л©”мӢңм§Җ
  const validation = useMemo(() => {
    const errs = [];
    if (D_i >= D_o) errs.push({ level: 'error', msg: 'D_iлҠ” D_oліҙлӢӨ мһ‘м•„м•ј н•©лӢҲлӢӨ' });
    if (D_o > P_t) errs.push({ level: 'error', msg: 'D_oк°Җ P_tліҙлӢӨ нҒј вҖ” нҠңлёҢ м¶©лҸҢ' });
    if (FPI < 4 || FPI > 30) errs.push({ level: 'warn', msg: `FPI=${FPI} лІ”мң„ нҷ•мқё (мқјл°ҳ 4~25)` });
    if (N_tubes % N_rows !== 0) errs.push({ level: 'warn', msg: `N_tubes(${N_tubes})к°Җ N_rows(${N_rows})лЎң лӮҳлҲ м§Җм§Җ м•ҠмқҢ` });
    return errs;
  }, [D_o, D_i, P_t, FPI, N_tubes, N_rows]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 min-h-[48px] flex items-center gap-4 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          вҶҗ System
        </button>
        <span className="text-slate-300">|</span>
        <span className={`text-base ${theme.accent === 'cyan' ? 'text-cyan-600' : 'text-amber-600'}`}>в—Ҷ</span>
        <span className="font-bold text-slate-900 text-[15px]">{theme.title}</span>
        <span className="text-[11px] font-mono text-slate-400">{theme.subtitle}</span>

        <div className="flex-1"></div>

        {/* Apply button вҶ’ лӢӨлҘё StudioлЎң лҸҷкё°нҷ” */}
        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? `border ${theme.applyBtn}` : `border ${theme.applyBtnHover}`
          }`}
          title="лӢӨлҘё StudioлЎң м Ғмҡ©">вҶ— Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">рҹ’ҫ</button>
      </div>

      {/* Apply panel (collapsible) вҖ” Apply to HPWD Studio / Calibration Studio */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Apply Design
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                нҳ„мһ¬ м„Өкі„лҘј лӢӨлҘё StudioлЎң лҸҷкё°нҷ” (RunмқҖ н•ҙлӢ№ Studioм—җм„ң)
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className={`flex-1 px-3 py-2 ${theme.applyAction} border rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors`}>
                <span>вҶ—</span> HPWD Studio (typeNo {mode === 'cond' ? '222' : '122'})
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>вҶ—</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">
                {applyMsg}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel (collapsible) */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Save / Load
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                JSON: нҢҢмқјлЎң лӮҙліҙлӮҙкё°/л¶Ҳлҹ¬мҳӨкё° В· Slot: лёҢлқјмҡ°м Җ лӮҙ м ҖмһҘ
              </div>
            </div>

            {/* JSON export/import */}
            <div className="flex gap-2 mb-3">
              <button onClick={exportJSON}
                className="flex-1 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>рҹ“Ҙ</span> JSON лӮҙліҙлӮҙкё°
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="flex-1 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>рҹ“Ө</span> JSON л¶Ҳлҹ¬мҳӨкё°
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
            </div>

            {/* Save slots */}
            <div className="text-[10px] text-slate-500 font-mono uppercase mb-1.5">
              Save Slots (лёҢлқјмҡ°м Җ localStorage)
            </div>
            <div className="space-y-1">
              {[1, 2, 3, 4, 5].map(slot => {
                const s = saves[slot];
                const isEmpty = !s;
                return (
                  <div key={slot} className="flex items-center gap-2">
                    <span className="w-5 text-center text-[11px] font-mono font-bold text-slate-400">{slot}.</span>
                    <div className={`flex-1 px-2.5 py-1 rounded border text-[11px] font-mono truncate ${
                      isEmpty
                        ? 'bg-slate-50 border-slate-200 text-slate-400'
                        : 'bg-blue-50 border-blue-200 text-slate-800'
                    }`}>
                      {isEmpty ? (
                        <span>вҖ” л№„м–ҙ мһҲмқҢ вҖ”</span>
                      ) : (
                        <span>
                          <b className="text-blue-900">{s._name || `Slot ${slot}`}</b>
                          <span className="text-slate-400 ml-2">
                            D_o={s.D_o}/N_t={s.N_tubes}/circ={s.N_circuits}
                          </span>
                          <span className="text-slate-400 ml-2 text-[10px]">
                            {s._timestamp?.slice(5, 16)?.replace('T', ' ')}
                          </span>
                        </span>
                      )}
                    </div>
                    <button onClick={() => {
                      const name = prompt(`Slot ${slot} мқҙлҰ„ (кё°ліё: мһҗлҸҷ)`, s?._name || '');
                      if (name !== null) saveSlot(slot, name);
                    }}
                      className="px-2.5 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded text-[11px] font-semibold transition-colors">
                      м ҖмһҘ
                    </button>
                    <button onClick={() => loadSlot(slot)} disabled={isEmpty}
                      className={`px-2.5 py-1 rounded text-[11px] font-semibold transition-colors border ${
                        isEmpty
                          ? 'bg-slate-50 border-slate-200 text-slate-300 cursor-not-allowed'
                          : 'bg-green-50 hover:bg-green-100 text-green-700 border-green-200'
                      }`}>
                      лЎңл“ң
                    </button>
                    {!isEmpty && (
                      <button onClick={() => {
                        if (confirm(`Slot ${slot} мӮӯм ң?`)) deleteSlot(slot);
                      }}
                        className="px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded text-[11px] font-semibold transition-colors">
                        вң•
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        {/* Sidebar вҖ” CompressorView/EEVViewмҷҖ лҸҷмқј кө¬мЎ° (мғҒлӢЁ н—ӨлҚ” л°•мҠӨ м ңкұ°) */}
        <div className="w-72 bg-white border-r border-slate-200 overflow-y-auto p-4 shrink-0">
          {/* Material */}
            <SidebarSection title="MATERIAL">
              <div className="mb-2">
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Tube</div>
                <ButtonGroup options={['Cu', 'Al', 'SS']} value={tubeMaterial} onChange={setTubeMaterial} />
              </div>
              <div>
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Fin</div>
                <ButtonGroup options={['Al', 'Cu']} value={finMaterial} onChange={setFinMaterial} />
              </div>
            </SidebarSection>

            {/* Tube */}
            <SidebarSection title="TUBE">
              <Slider label="D_o" sublabel="[mm]" value={D_o} min={3} max={20} step={0.1} decimals={1} onChange={setDo} color="cyan" />
              <Slider label="D_i" sublabel="[mm]" value={D_i} min={2} max={18} step={0.1} decimals={1} onChange={setDi} color="cyan" />
              <Slider label="L_tube" sublabel="[mm]" value={L_tube} min={100} max={2000} step={10} onChange={setLtube} color="cyan" decimals={0} />
            </SidebarSection>

            {/* Fin */}
            <SidebarSection title="FIN">
              <Slider label="FPI" sublabel="[fins/in]" value={FPI} min={4} max={25} step={1} onChange={setFPI} color="green" decimals={0} />
              <Slider label="t_fin" sublabel="[mm]" value={t_fin} min={0.05} max={0.5} step={0.01} decimals={2} onChange={setTfin} color="green" />
              
              {/* Fin type dropdown */}
              <div className="mt-2">
                <div className="text-[11px] text-slate-500 mb-1">Fin type</div>
                <div className="flex gap-1 flex-wrap">
                  {['plain', 'wavy', 'louver', 'slit'].map(opt => (
                    <button key={opt} onClick={() => setFinType(opt)}
                      className={`px-2 py-1 text-[11px] font-semibold rounded border transition-colors ${
                        fin_type === opt
                          ? 'bg-green-50 border-green-400 text-green-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
              
              {/* Edge type вҖ” Kc/Ke ліҙм • */}
              <div className="mt-2">
                <div className="text-[11px] text-slate-500 mb-1">Edge type <span className="text-[10px] text-slate-400">(кіөкё°мёЎ dP)</span></div>
                <div className="flex gap-1 flex-wrap">
                  {['sharp', 'rounded', 'chamfered'].map(opt => (
                    <button key={opt} onClick={() => setEdgeType(opt)}
                      className={`px-2 py-1 text-[11px] font-semibold rounded border transition-colors ${
                        edge_type === opt
                          ? 'bg-amber-50 border-amber-400 text-amber-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
              
              {/* fin_typeлі„ м¶”к°Җ нҢҢлқјлҜён„° */}
              {fin_type === 'wavy' && (
                <div className="mt-2 pt-2 border-t border-slate-100">
                  <div className="text-[10px] font-mono text-slate-400 uppercase mb-1">Wavy params</div>
                  <Slider label="м§„нҸӯ" sublabel="[mm]" value={wavy_amplitude} min={0.3} max={3.0} step={0.1} decimals={1} onChange={setWavyAmp} color="green" />
                  <Slider label="нҢҢмһҘ" sublabel="[mm]" value={wavy_wavelength} min={5} max={20} step={0.5} decimals={1} onChange={setWavyWL} color="green" />
                </div>
              )}
              {fin_type === 'louver' && (
                <div className="mt-2 pt-2 border-t border-slate-100">
                  <div className="text-[10px] font-mono text-slate-400 uppercase mb-1">Louver params</div>
                  <Slider label="Lp (pitch)" sublabel="[mm]" value={louver_pitch} min={0.8} max={4.0} step={0.1} decimals={1} onChange={setLouverP} color="green" />
                  <Slider label="Оё (angle)" sublabel="[deg]" value={louver_angle} min={15} max={45} step={1} decimals={0} onChange={setLouverA} color="green" />
                </div>
              )}
            </SidebarSection>

            {/* Circuit / Layout */}
            <SidebarSection title="CIRCUIT / LAYOUT">
              <Slider label="N_rows" sublabel="н–ү (кіөкё° нқҗлҰ„ л°©н–Ҙ)" value={N_rows} min={1} max={8} step={1} onChange={setNrows} color="purple" decimals={0} />
              <Slider label="N_columns" sublabel="м—ҙ (кіөкё° нқҗлҰ„ мҲҳм§Ғ л°©н–Ҙ)" value={N_columns} min={2} max={40} step={1} onChange={setNcolumns} color="purple" decimals={0} />
              <div className="mt-1 mb-2 px-2 py-1.5 bg-purple-50 border border-purple-200 rounded text-[11px] font-mono text-purple-800">
                N_tubes = N_rows Г— N_columns = <b>{N_tubes}</b> tubes
              </div>
              <Slider label="P_t" sublabel="[mm] м—ҙк°„ кұ°лҰ¬ (transverse)" value={P_t} min={10} max={50} step={0.5} decimals={1} onChange={setPt} color="amber" />
              <Slider label="P_l" sublabel="[mm] н–үк°„ кұ°лҰ¬ (longitudinal)" value={P_l} min={10} max={50} step={0.5} decimals={1} onChange={setPl} color="amber" />
              
              {/* Circuit mode preset (4к°ң) + custom */}
              <div className="mt-3 pt-2 border-t border-slate-100">
                <div className="text-[11px] text-slate-500 mb-1">Circuit mode</div>
                <div className="grid grid-cols-2 gap-1 mb-2">
                  {[
                    { id: 'row_parallel', label: 'Row parallel' },
                    { id: 'serpentine_2', label: 'Serpentine Г—2' },
                    { id: 'serpentine_4', label: 'Serpentine Г—4' },
                    { id: 'single', label: 'Single' },
                    { id: 'custom', label: 'Custom' },
                  ].map(opt => (
                    <button key={opt.id} onClick={() => setCircuitMode(opt.id)}
                      className={`px-2 py-1.5 text-[11px] font-semibold rounded border transition-colors ${
                        circuit_mode === opt.id
                          ? 'bg-purple-50 border-purple-400 text-purple-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
              
              <div className="mt-2 flex items-center justify-between px-1 py-2 rounded-lg bg-purple-50 border border-purple-100">
                <span className="text-[11px] text-slate-500 font-mono">нҡҢлЎң мҲҳ (circuit_mode кё°мӨҖ)</span>
                <span className="text-[13px] font-bold text-purple-600 font-mono">{N_circuits} нҡҢлЎң</span>
              </div>
              
              <div className="mt-1 text-[10px] text-slate-400 font-mono">
                {circuit_mode === 'row_parallel' && 'к°Ғ rowмқҳ лӘЁл“  нҠңлёҢк°Җ лі‘л ¬'}
                {circuit_mode === 'serpentine_2' && '2нҡҢ turn нӣ„ лӢӨмқҢ нҡҢлЎң'}
                {circuit_mode === 'serpentine_4' && '4нҡҢ turn нӣ„ лӢӨмқҢ нҡҢлЎң'}
                {circuit_mode === 'single' && 'лӘЁл“  нҠңлёҢ м§Ғл ¬ 1нҡҢлЎң'}
                {circuit_mode === 'custom' && 'Custom вҖ” мӢңк°Ғ нҺём§‘кё° (Main view м°ёкі )'}
              </div>
            </SidebarSection>

              </div>
            </div>

            {/* Status banner */}
            <div className="mb-4 bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-[12px] text-green-900">
              вң“ <b>On-design лӘЁл“ң</b> вҖ” мӮ¬мқҙл“ңл°”м—җм„ң ліҖмҲҳлҘј ліҖкІҪн•ҳл©ҙ Model design м—җ <b>мӢӨмӢңк°„ л°ҳмҳҒ</b>лҗ©лӢҲлӢӨ.
            </div>

            {/* View toggle (3D / Front / Top / Circuit) */}
            <div className="mb-3 flex gap-1.5">
              {['3D', 'Front', 'Top', 'Circuit'].map(v => (
                <button key={v} onClick={() => setView(v)}
                  className={`px-4 py-1.5 text-[12px] font-semibold rounded-lg transition-colors ${
                    view === v
                      ? 'bg-blue-600 text-white shadow-sm'
                      : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
                  }`}>
                  {v} view
                </button>
              ))}
            </div>

            {/* Viewer */}
            <div className="bg-white border border-slate-200 rounded-lg p-4">
              <div className="text-[12px] text-slate-500 mb-2 flex items-center justify-between">
                <span><b>{view} view</b> вҖ” {
                  view === 'Circuit' ? `Circuit mode: ${circuit_mode}` :
                  view === '3D' ? 'Three.js вҖ” drag to rotate, scroll to zoom' :
                  view === 'Front' ? 'Tube cross-section (rows Г— tubes/row)' :
                  'Tube length + fin stack'
                }</span>
                <span className="font-mono text-[10px] text-slate-400">
                  {N_tubes} tubes / {N_rows} rows / {N_circuits} circuits
                </span>
              </div>
              <div className="bg-slate-50 border border-slate-200 rounded">
                {view === 'Circuit' ? (
                  <CircuitDesigner
                    N_rows={N_rows}
                    N_tubes_per_row={N_rows > 0 ? Math.round(N_tubes / N_rows) : N_tubes}
                    layout="staggered"
                    flow="counter"
                    bends={bends}
                    setBends={(b) => { setBends(b); setCircuitMode('custom'); }}
                    inlets={inlets}
                    setInlets={(i) => { setInlets(i); setCircuitMode('custom'); }}
                    outlets={outlets}
                    setOutlets={(o) => { setOutlets(o); setCircuitMode('custom'); }}
                  />
                ) : view === '3D' ? (
                  <CoilView3D
                    D_o={D_o} D_i={D_i} L_tube={L_tube}
                    FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows}
                    P_t={P_t} P_l={P_l}
                    tubeMaterial={tubeMaterial}
                    finMaterial={finMaterial}
                    bends={bends}
                    inlets={inlets}
                    outlets={outlets}
                    circuit_mode={circuit_mode}
                  />
                ) : (
                  <CoilViewer
                  view={view}
                  D_o={D_o}
                  D_i={D_i}
                  L_tube={L_tube}
                  FPI={FPI}
                  t_fin={t_fin}
                  N_tubes={N_tubes}
                  N_rows={N_rows}
                  P_t={P_t}
                  P_l={P_l}
                  N_circuits={N_circuits}
                  tubeMaterial={tubeMaterial}
                  finMaterial={finMaterial}
                />
                )}
              </div>
            </div>

            {/* Derived properties */}
            <DerivedStats
              D_o={D_o}
              D_i={D_i}
              L_tube={L_tube}
              FPI={FPI}
              t_fin={t_fin}
              N_tubes={N_tubes}
              N_rows={N_rows}
              P_t={P_t}
              P_l={P_l}
              N_circuits={N_circuits}
            />
          </div>
        </div>
      </div>

      {/* Status bar */}
      <div className="bg-white border-t border-slate-200 px-4 py-1.5 flex items-center gap-4 text-[11px] text-slate-500 font-mono shrink-0">
        <span className="flex items-center gap-1">
          <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
          ready
        </span>
        <span>Mode: <b className="text-slate-700">on_design</b></span>
        <span>Tube: <b className="text-slate-700">{tubeMaterial}</b></span>
        <span>Fin: <b className="text-slate-700">{finMaterial}</b></span>
        <span className="text-slate-400">|</span>
        <span><b className="text-slate-700">{N_tubes}</b> tubes / <b className="text-slate-700">{N_rows}</b> rows / <b className="text-slate-700">{N_circuits}</b> circuits</span>
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Sidebar section helper в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   Circuit Designer вҖ” HX-Sim repoмқҳ Circuit Design мӢңмҠӨн…ң к·ёлҢҖлЎң к°Җм ёмҳҙ
   - bends: { front: [[r1,c1,r2,c2], ...], back: [...] }  вҶҗ мқём ‘ нҠңлёҢ нҺҳм–ҙ
   - inlets: [[r,c], ...] / outlets: [[r,c], ...]  вҶҗ мӮ¬мҡ©мһҗ м§Җм • IN/OUT
   - traceBends м•Ңкі лҰ¬мҰҳмңјлЎң нҡҢлЎң мһҗлҸҷ м¶”м Ғ (frontвҶ”back көҗм°Ё)
   - мғүмғҒмқҖ light themeлЎң ліҖнҷҳ (HX-SimмқҖ darkмҳҖмқҢ)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function CircuitDesigner({ N_rows, N_tubes_per_row, layout='staggered', flow='counter',
                           bends, setBends,
                           inlets, setInlets,
                           outlets, setOutlets }) {
  // Light theme мғүмғҒ (HX-Simмқҳ C к°қмІҙлҘј lightлЎң ліҖнҷҳ)
  const C = {
    bg: '#ffffff', surface: '#f8fafc', card: '#ffffff', border: '#e2e8f0',
    accent: '#2563eb', accent2: '#7c3aed', accent3: '#db2777',
    warn: '#d97706', success: '#059669', err: '#dc2626',
    text: '#1e293b', dim: '#94a3b8',
  };
  const circColors = ['#0d9488','#dc2626','#2563eb','#10b981','#d97706','#db2777','#3b82f6','#7c3aed'];
  
  // Local UI state (HX-Simкіј лҸҷмқј)
  const [bendFace, setBendFace] = useState('front');     // 'front' | 'back'
  const [bendFirst, setBendFirst] = useState(null);      // {r,c} or null
  const [circEditMode, setCircEditMode] = useState('bend'); // 'bend' | 'inlet' | 'outlet'
  
  const Nr = Math.max(1, N_rows);
  const Nt = Math.max(1, N_tubes_per_row);
  const isStag = layout === 'staggered';
  const counter = flow === 'counter';
  
  // в”Җв”Җ Generate default single-serpentine bends (row-by-row) в”Җв”Җ
  const genDefaultBends = (nr, nt, cnt) => {
    const front = [], back = [];
    let atFront = true;
    const startRow = cnt ? nr - 1 : 0;
    const rowStep = cnt ? -1 : 1;
    for (let ri = 0; ri < nr; ri++) {
      const row = startRow + ri * rowStep;
      const goRight = (ri % 2 === 0);
      if (goRight) {
        for (let c = 0; c < nt - 1; c++) {
          if (atFront) front.push([row, c, row, c+1]);
          else back.push([row, c, row, c+1]);
          atFront = !atFront;
        }
      } else {
        for (let c = nt - 1; c > 0; c--) {
          if (atFront) front.push([row, c, row, c-1]);
          else back.push([row, c, row, c-1]);
          atFront = !atFront;
        }
      }
      if (ri < nr - 1) {
        const nextRow = startRow + (ri+1) * rowStep;
        const edgeCol = goRight ? nt - 1 : 0;
        if (atFront) front.push([row, edgeCol, nextRow, edgeCol]);
        else back.push([row, edgeCol, nextRow, edgeCol]);
        atFront = !atFront;
      }
    }
    return { front, back };
  };
  
  // bendsк°Җ л№„м–ҙмһҲмңјл©ҙ default мғқм„ұ (UI н‘ңмӢңмҡ©)
  const effectiveBends = (bends && (bends.front !== undefined || bends.back !== undefined))
    ? bends : genDefaultBends(Nr, Nt, counter);
  
  // в”Җв”Җ Trace circuits from front/back bends в”Җв”Җ
  const traceBends = (bnds) => {
    const fm = {}, bm = {};
    (bnds.front || []).forEach(([r1, c1, r2, c2]) => {
      fm[`${r1},${c1}`] = [r2, c2]; fm[`${r2},${c2}`] = [r1, c1];
    });
    (bnds.back || []).forEach(([r1, c1, r2, c2]) => {
      bm[`${r1},${c1}`] = [r2, c2]; bm[`${r2},${c2}`] = [r1, c1];
    });
    const visited = new Set(), circuits = [];
    for (let c = 0; c < Nt; c++) for (let r = 0; r < Nr; r++) {
      const k = `${r},${c}`;
      if (visited.has(k)) continue;
      const hasF = fm.hasOwnProperty(k), hasB = bm.hasOwnProperty(k);
      if (hasF && hasB) continue;
      if (!hasF && !hasB) {
        circuits.push([[r, c]]); visited.add(k); continue;
      }
      const path = []; let cur = [r, c];
      let lookFace = hasB ? 'back' : 'front';
      path.push([...cur]); visited.add(`${cur[0]},${cur[1]}`);
      while (true) {
        const map = lookFace === 'front' ? fm : bm;
        const ck = `${cur[0]},${cur[1]}`;
        if (!map.hasOwnProperty(ck)) break;
        const next = map[ck];
        const nk = `${next[0]},${next[1]}`;
        if (visited.has(nk)) break;
        path.push([...next]); visited.add(nk);
        cur = next; lookFace = lookFace === 'front' ? 'back' : 'front';
      }
      circuits.push(path);
    }
    return circuits;
  };
  
  const circuits = traceBends(effectiveBends);
  const isMatch = (a, b) => a && b && a[0] === b[0] && a[1] === b[1];
  const inSet = (arr, t) => arr.some(a => isMatch(a, t));
  
  // Orient circuits using inlets/outlets
  circuits.forEach(circ => {
    if (circ.length < 2) return;
    const first = circ[0], last = circ[circ.length - 1];
    if (inSet(inlets, last)) circ.reverse();
    else if (inSet(outlets, first)) circ.reverse();
    else if (!inSet(inlets, first) && !inSet(outlets, last)) {
      if (first[0] < last[0]) circ.reverse();
    }
  });
  const nc = circuits.length;
  
  // Endpoint face
  const getEndpointFace = (tube) => {
    if (!tube) return null;
    const k = `${tube[0]},${tube[1]}`;
    const hasFront = (effectiveBends.front || []).some(([r1, c1, r2, c2]) =>
      `${r1},${c1}` === k || `${r2},${c2}` === k);
    const hasBack = (effectiveBends.back || []).some(([r1, c1, r2, c2]) =>
      `${r1},${c1}` === k || `${r2},${c2}` === k);
    if (hasFront && !hasBack) return 'back';
    if (hasBack && !hasFront) return 'front';
    return 'front';
  };
  
  const userInSet = new Set(inlets.map(t => t[0] + ',' + t[1]));
  const userOutSet = new Set(outlets.map(t => t[0] + ',' + t[1]));
  const inletFaces = {}, outletFaces = {};
  userInSet.forEach(k => { const [r, c] = k.split(',').map(Number); inletFaces[k] = getEndpointFace([r, c]); });
  userOutSet.forEach(k => { const [r, c] = k.split(',').map(Number); outletFaces[k] = getEndpointFace([r, c]); });
  
  // Cell map
  const cellMap = Array.from({ length: Nr }, () => Array.from({ length: Nt }, () => null));
  circuits.forEach((circ, ci) => {
    circ.forEach(([r, c], idx) => {
      if (r >= 0 && r < Nr && c >= 0 && c < Nt) cellMap[r][c] = { circ: ci, order: idx };
    });
  });
  let unassigned = 0;
  for (let r = 0; r < Nr; r++) for (let c = 0; c < Nt; c++) if (!cellMap[r][c]) unassigned++;
  
  // в”Җв”Җ Click handler в”Җв”Җ
  const onFaceTubeClick = (r, c) => {
    if (circEditMode === 'inlet' || circEditMode === 'outlet') {
      const isInlet = circEditMode === 'inlet';
      const arr = [...(isInlet ? inlets : outlets)];
      const opp = [...(isInlet ? outlets : inlets)];
      const idx = arr.findIndex(a => a[0] === r && a[1] === c);
      if (idx >= 0) {
        arr.splice(idx, 1);
      } else {
        arr.push([r, c]);
        const oi = opp.findIndex(a => a[0] === r && a[1] === c);
        if (oi >= 0) opp.splice(oi, 1);
      }
      if (isInlet) { setInlets(arr); setOutlets(opp); }
      else { setOutlets(arr); setInlets(opp); }
      return;
    }
    if (!bendFirst) { setBendFirst({ r, c }); return; }
    const dr = Math.abs(r - bendFirst.r), dc = Math.abs(c - bendFirst.c);
    if (dr + dc === 0) { setBendFirst(null); return; }
    if (dr > 1 || dc > 1) { setBendFirst(null); return; }
    const face = bendFace;
    const arr = [...(effectiveBends[face] || [])];
    const dup = arr.findIndex(([a, b, e, f]) =>
      (a === bendFirst.r && b === bendFirst.c && e === r && f === c) ||
      (a === r && b === c && e === bendFirst.r && f === bendFirst.c));
    if (dup >= 0) {
      arr.splice(dup, 1);
    } else {
      const k1 = `${bendFirst.r},${bendFirst.c}`, k2 = `${r},${c}`;
      const used1 = arr.some(([a, b, e, f]) => `${a},${b}` === k1 || `${e},${f}` === k1);
      const used2 = arr.some(([a, b, e, f]) => `${a},${b}` === k2 || `${e},${f}` === k2);
      if (used1 || used2) { setBendFirst(null); return; }
      arr.push([bendFirst.r, bendFirst.c, r, c]);
    }
    setBends({ ...effectiveBends, [face]: arr });
    setBendFirst(null);
  };
  
  const resetToDefault = () => {
    setBends(genDefaultBends(Nr, Nt, counter));
    setBendFirst(null);
  };
  const clearBends = () => {
    setBends({ front: [], back: [] });
    setBendFirst(null);
  };
  
  // в”Җв”Җ SVG layout в”Җв”Җ
  const cW = 32, cH = 32, oX = 28, oY = 22;
  const svgW = Nr * cW + oX + 14;
  const svgH = Nt * cH + oY + (isStag ? cH/2 : 0) + 14;
  const tubeX = (r, c) => oX + r * cW + cW/2;
  const tubeY = (r, c) => oY + c * cH + cH/2 + (isStag && r % 2 === 1 ? cH/2 : 0);
  const tubeBX = (r, c) => oX + (Nr - 1 - r) * cW + cW/2;
  const tubeBY = (r, c) => oY + c * cH + cH/2 + (isStag && r % 2 === 1 ? cH/2 : 0);
  
  const renderFace = (face) => {
    const isFront = face === 'front';
    const tx = isFront ? tubeX : tubeBX;
    const ty = isFront ? tubeY : tubeBY;
    const faceBends = effectiveBends[face] || [];
    
    return (
      <svg width={svgW} height={svgH} style={{ display: 'block', cursor: 'crosshair' }}>
        <defs>
          <marker id={`arrF${face}`} markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0, 6 2.5, 0 5" fill={C.accent} />
          </marker>
        </defs>
        {/* Air arrow (bottom) */}
        <line x1={oX - 2} y1={svgH - 4} x2={svgW - 12} y2={svgH - 4}
              stroke={C.accent} strokeWidth={1.5} markerEnd={`url(#arrF${face})`} />
        <text x={svgW/2} y={svgH + 6} textAnchor="middle"
              style={{ fontSize: 8, fill: C.accent, fontWeight: 700 }}>AIR вҶ’</text>
        
        {/* Row labels */}
        {Array.from({ length: Nr }, (_, r) => (
          <text key={`rl${r}`} x={tx(r, 0)} y={oY - 5} textAnchor="middle"
                style={{ fontSize: 9, fill: C.dim }}>R{r}</text>
        ))}
        {/* Col labels */}
        {Array.from({ length: Nt }, (_, c) => (
          <text key={`cl${c}`} x={6} y={ty(0, c) + 3}
                style={{ fontSize: 9, fill: C.dim }}>C{c}</text>
        ))}
        
        {/* Bend arcs */}
        {faceBends.map(([r1, c1, r2, c2], bi) => {
          const x1 = tx(r1, c1), y1 = ty(r1, c1);
          const x2 = tx(r2, c2), y2 = ty(r2, c2);
          const info = (cellMap[r1] || [])[c1];
          const clr = info ? circColors[info.circ % circColors.length] : C.accent;
          const mx = (x1 + x2)/2, my = (y1 + y2)/2;
          const dx = x2 - x1, dy = y2 - y1;
          const side = isFront ? -1 : 1;
          const cx2 = mx + dy * 0.4 * side, cy2 = my - dx * 0.4 * side;
          return (
            <path key={`b${bi}`} d={`M${x1},${y1} Q${cx2},${cy2} ${x2},${y2}`}
                  fill="none" stroke={clr} strokeWidth={2.2} opacity={0.85} />
          );
        })}
        
        {/* Tubes */}
        {Array.from({ length: Nr }, (_, r) =>
          Array.from({ length: Nt }, (_, c) => {
            const x = tx(r, c), y = ty(r, c);
            const info = cellMap[r][c];
            const clr = info ? circColors[info.circ % circColors.length] : C.surface;
            const isFirst = bendFirst && bendFirst.r === r && bendFirst.c === c;
            const tk = r + ',' + c;
            const isInlet = userInSet.has(tk) && (inletFaces[tk] === face ||
              !((effectiveBends.front || []).length) && !((effectiveBends.back || []).length));
            const isOutlet = userOutSet.has(tk) && (outletFaces[tk] === face ||
              !((effectiveBends.front || []).length) && !((effectiveBends.back || []).length));
            const picking = circEditMode === 'inlet' || circEditMode === 'outlet';
            const pickClr = circEditMode === 'inlet' ? C.err : C.success;
            return (
              <g key={`t${r}-${c}`} onClick={() => onFaceTubeClick(r, c)}
                 style={{ cursor: picking ? 'crosshair' : 'pointer' }}>
                {picking && (
                  <circle cx={x} cy={y} r={14}
                    fill="none" stroke={pickClr} strokeWidth={1} strokeDasharray="2,2" opacity={0.45} />
                )}
                <circle cx={x} cy={y} r={11}
                  fill={isFirst ? '#fff' : isInlet ? C.err : isOutlet ? C.success : info ? clr : C.surface}
                  stroke={isFirst ? C.accent : isInlet ? C.err : isOutlet ? C.success : info ? clr : C.border}
                  strokeWidth={isFirst ? 2.5 : (isInlet || isOutlet) ? 2.5 : 1.2}
                  opacity={(isInlet || isOutlet) ? 1 : info ? 0.92 : 0.5} />
                <text x={x} y={y + 3} textAnchor="middle"
                  style={{ fontSize: isInlet || isOutlet ? 7 : 8,
                    fill: isFirst ? C.text : (isInlet || isOutlet) ? '#fff' : info ? '#fff' : C.dim,
                    fontWeight: 700, pointerEvents: 'none' }}>
                  {isInlet ? 'IN' : isOutlet ? 'OUT' : info ? info.order + 1 : ''}
                </text>
              </g>
            );
          })
        )}
      </svg>
    );
  };
  
  return (
    <div style={{ borderLeft: `2px solid ${C.accent}`, paddingLeft: 12, marginBottom: 8, marginTop: 8 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
        <span style={{ fontSize: 10, color: C.accent, fontWeight: 700, letterSpacing: 1 }}>REFRIGERANT CIRCUIT</span>
        <span style={{ fontSize: 10, color: nc > 1 ? C.warn : C.success, fontWeight: 600 }}>
          {nc}нҡҢлЎң {unassigned > 0 ? `В· вҡ  лҜёл°°м • ${unassigned}` : ''}
        </span>
      </div>
      
      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 5, marginBottom: 8, alignItems: 'center', flexWrap: 'wrap' }}>
        <button onClick={resetToDefault} style={{ padding: '4px 10px', borderRadius: 5,
          border: `1px solid ${C.accent}`, background: 'transparent', color: C.accent,
          fontSize: 10, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>вҶ© кё°ліёнҡҢлЎң</button>
        <button onClick={clearBends} style={{ padding: '4px 10px', borderRadius: 5,
          border: `1px solid ${C.dim}`, background: 'transparent', color: C.dim,
          fontSize: 10, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>рҹ—‘ м „мІҙмӮӯм ң</button>
        {bendFirst && (
          <span style={{ fontSize: 9, color: C.accent }}>В· R{bendFirst.r}C{bendFirst.c} м„ нғқлҗЁ</span>
        )}
      </div>
      
      {/* Inlet/Outlet controls */}
      <div style={{ marginBottom: 8, padding: '8px 12px', borderRadius: 6,
                    background: C.surface, border: `1px solid ${C.border}` }}>
        {/* Add IN / Add OUT buttons */}
        <div style={{ display: 'flex', gap: 5 }}>
          <button onClick={() => { setCircEditMode(circEditMode === 'inlet' ? 'bend' : 'inlet'); setBendFirst(null); }}
            style={{ padding: '5px 14px', borderRadius: 5, border: 'none', cursor: 'pointer',
                     fontSize: 10, fontWeight: 700, fontFamily: 'inherit',
                     background: circEditMode === 'inlet' ? C.err : C.err + '22',
                     color: circEditMode === 'inlet' ? '#fff' : C.err }}>
            {circEditMode === 'inlet' ? 'рҹ“Қ IN м„ нғқмӨ‘ (мҷ„лЈҢмӢң лӢӨмӢң нҒҙлҰӯ)' : 'рҹ“Қ IN м§Җм •'}
            {inlets.length > 0 ? ' (' + inlets.length + ')' : ''}
          </button>
          <button onClick={() => { setCircEditMode(circEditMode === 'outlet' ? 'bend' : 'outlet'); setBendFirst(null); }}
            style={{ padding: '5px 14px', borderRadius: 5, border: 'none', cursor: 'pointer',
                     fontSize: 10, fontWeight: 700, fontFamily: 'inherit',
                     background: circEditMode === 'outlet' ? C.success : C.success + '22',
                     color: circEditMode === 'outlet' ? '#fff' : C.success }}>
            {circEditMode === 'outlet' ? 'рҹ“Қ OUT м„ нғқмӨ‘ (мҷ„лЈҢмӢң лӢӨмӢң нҒҙлҰӯ)' : 'рҹ“Қ OUT м§Җм •'}
            {outlets.length > 0 ? ' (' + outlets.length + ')' : ''}
          </button>
        </div>
        {(circEditMode === 'inlet' || circEditMode === 'outlet') && (
          <div style={{ fontSize: 9, color: circEditMode === 'inlet' ? C.err : C.success,
                        fontWeight: 600, marginTop: 4 }}>
            нҠңлёҢ нҒҙлҰӯ = {circEditMode === 'inlet' ? 'IN' : 'OUT'} нҶ кёҖ В· мҷ„лЈҢ нӣ„ лІ„нҠј лӢӨмӢң нҒҙлҰӯн•ҳм—¬ мў…лЈҢ
          </div>
        )}
      </div>
      
      {/* Face tabs */}
      <div style={{ display: 'flex', gap: 0, marginBottom: 5 }}>
        {['front', 'back'].map(f => (
          <button key={f} onClick={() => { setBendFace(f); setBendFirst(null); }}
            style={{ flex: 1, padding: '6px 0', border: 'none', cursor: 'pointer',
                     fontSize: 11, fontWeight: 700, fontFamily: 'inherit',
                     borderBottom: bendFace === f ? `2px solid ${C.accent}` : `1px solid ${C.border}`,
                     background: bendFace === f ? C.accent + '15' : C.bg,
                     color: bendFace === f ? C.accent : C.dim,
                     borderRadius: bendFace === f ? '6px 6px 0 0' : '0' }}>
            {f === 'front' ? 'в–¶ FRONT' : 'в—Җ BACK'}
            <span style={{ fontSize: 9, marginLeft: 5, opacity: 0.65 }}>
              ({(effectiveBends[f] || []).length}л°ҙл“ң)
            </span>
          </button>
        ))}
      </div>
      
      {/* Active face view */}
      <div style={{ border: `1px solid ${C.accent}33`, borderRadius: '0 0 6px 6px',
                    padding: 6, background: C.surface, overflowX: 'auto' }}>
        {renderFace(bendFace)}
      </div>
      
      <div style={{ fontSize: 9, color: C.dim, marginTop: 4 }}>
        {(circEditMode === 'inlet' || circEditMode === 'outlet')
          ? 'рҹ“Қ нҠңлёҢ нҒҙлҰӯ = ' + (circEditMode === 'inlet' ? 'IN' : 'OUT') + ' м¶”к°Җ/м ңкұ° (нҶ кёҖ)'
          : 'л°ҙл“ң: мқём ‘ нҠңлёҢ 2к°ң нҒҙлҰӯ (мҲҳм§Ғ/мҲҳнҸү 1м№ё кұ°лҰ¬л§Ң к°ҖлҠҘ) В· IN/OUT: лІ„нҠј нҒҙлҰӯ нӣ„ нҠңлёҢ м„ нғқ'}
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   Coil 3D Viewer вҖ” Three.js (compressor-simмқҳ RollingPiston3D нҢЁн„ҙ)
   - tube bundle (staggered grid, copper color)
   - fin stack (м–ҮмқҖ м•ҢлЈЁлҜёлҠ„ plates, FPI л№„лЎҖ)
   - light theme, drag to rotate, scroll to zoom
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function CoilView3D({ D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l,
                       tubeMaterial = 'Cu', finMaterial = 'Al',
                       bends = { front: [], back: [] }, circuit_mode = 'row_parallel',
                       inlets = [], outlets = [] }) {
  const mountRef = React.useRef(null);
  const stateRef = React.useRef(null);
  
  React.useEffect(() => {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    const mount = mountRef.current;
    const w = mount.clientWidth || 600;
    const h = mount.clientHeight || 400;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f5f9);
    
    const camera = new THREE.PerspectiveCamera(50, w/h, 1, 5000);
    camera.position.set(450, 350, 550);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    mount.appendChild(renderer.domElement);
    
    // Lights
    const amb = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(300, 500, 400);
    scene.add(dir);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.35);
    dir2.position.set(-200, -100, -300);
    scene.add(dir2);
    
    // Materials
    const tubeColor = tubeMaterial === 'Cu' ? 0xb87333 : 0xc0c0c0;
    const finColor = finMaterial === 'Cu' ? 0xb87333 : 0xd4d4d8;
    
    const tubeMat = new THREE.MeshPhongMaterial({
      color: tubeColor, shininess: 80, specular: 0x444444
    });
    const finMat = new THREE.MeshPhongMaterial({
      color: finColor, shininess: 30, specular: 0x222222,
      transparent: true, opacity: 0.55, side: THREE.DoubleSide
    });
    
    // Geometry parameters (mm units, scaled in scene)
    const Nt_per_row = N_rows > 0 ? Math.round(N_tubes / N_rows) : N_tubes;
    const Lt = L_tube;
    const Do = D_o;
    const Pt = P_t;
    const Pl = P_l;
    
    // в”Җв”Җ Tube position helper (CircuitDesignerмҷҖ к°ҷмқҖ мўҢн‘ңкі„) в”Җв”Җ
    // tube center: x=0, y, z
    // Circuit viewмҷҖ мқјм№ҳ: c=0мқҙ нҷ”л©ҙ мң„мӘҪ вҶ’ Three.jsм—җм„ң y м–‘мҲҳ
    const tubePos = (r, c) => {
      const yOffset = (r % 2 === 1) ? Pt/2 : 0;
      return {
        y: (Nt_per_row-1)*Pt/2 - c * Pt - yOffset,  // л¶Җнҳё л°ҳм „
        z: r * Pl - (N_rows-1)*Pl/2,
      };
    };
    
    // Tube bundle (staggered)
    const tubeGroup = new THREE.Group();
    const tubeGeo = new THREE.CylinderGeometry(Do/2, Do/2, Lt, 16);
    for (let r = 0; r < N_rows; r++) {
      for (let c = 0; c < Nt_per_row; c++) {
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.rotation.z = Math.PI / 2;  // length along X
        const p = tubePos(r, c);
        tube.position.set(0, p.y, p.z);
        tubeGroup.add(tube);
      }
    }
    scene.add(tubeGroup);
    
    // в”Җв”Җ Return bends (U-bends) вҖ” front: +X end, back: -X end в”Җв”Җ
    // bends.front: [[r1,c1,r2,c2], ...] (мқём ‘ нҠңлёҢ нҺҳм–ҙлҘј +X мёЎм—җм„ң м—°кІ°)
    // bends.back:  [[r1,c1,r2,c2], ...]                   (-X мёЎ)
    // нҡҢлЎң мғүмғҒ вҖ” CircuitDesignerмҷҖ мқјм№ҳ
    const circColors = [0x0d9488, 0xdc2626, 0x2563eb, 0x10b981,
                        0xd97706, 0xdb2777, 0x3b82f6, 0x7c3aed];
    
    // нҡҢлЎң м¶”м Ғ (CircuitDesignerмқҳ traceBends м•Ңкі лҰ¬мҰҳ вҖ” нҡҢлЎңлі„ мғүмғҒ кІ°м •мҡ©)
    const fm = {}, bm = {};
    (bends.front || []).forEach(([r1,c1,r2,c2]) => {
      fm[`${r1},${c1}`] = [r2,c2]; fm[`${r2},${c2}`] = [r1,c1];
    });
    (bends.back || []).forEach(([r1,c1,r2,c2]) => {
      bm[`${r1},${c1}`] = [r2,c2]; bm[`${r2},${c2}`] = [r1,c1];
    });
    const visited = new Set();
    const tubeCircuit = {};  // 'r,c' вҶ’ circuit index
    let cIdx = 0;
    for (let c = 0; c < Nt_per_row; c++) for (let r = 0; r < N_rows; r++) {
      const k = `${r},${c}`;
      if (visited.has(k)) continue;
      const hasF = fm.hasOwnProperty(k), hasB = bm.hasOwnProperty(k);
      if (hasF && hasB) continue;
      if (!hasF && !hasB) {
        tubeCircuit[k] = cIdx; visited.add(k); cIdx++; continue;
      }
      let cur = [r,c]; let lookFace = hasB ? 'back' : 'front';
      while (true) {
        const ck = `${cur[0]},${cur[1]}`;
        if (visited.has(ck)) break;
        visited.add(ck); tubeCircuit[ck] = cIdx;
        const map = lookFace === 'front' ? fm : bm;
        if (!map.hasOwnProperty(ck)) break;
        const next = map[ck];
        const nk = `${next[0]},${next[1]}`;
        if (visited.has(nk)) break;
        cur = next; lookFace = lookFace === 'front' ? 'back' : 'front';
      }
      cIdx++;
    }
    
    // U-bend к·ёлҰ¬кё° вҖ” TubeGeometryлЎң л¶Җл“ңлҹ¬мҡҙ кіЎм„ 
    const bendGroup = new THREE.Group();
    
    const drawBend = (r1, c1, r2, c2, face) => {
      const p1 = tubePos(r1, c1);
      const p2 = tubePos(r2, c2);
      const sign = face === 'front' ? 1 : -1;  // +X = front, -X = back
      const xEnd = sign * (Lt/2);
      
      // нҡҢлЎң мғүмғҒ
      const cIdx2 = tubeCircuit[`${r1},${c1}`];
      const color = (cIdx2 !== undefined) ? circColors[cIdx2 % 8] : 0xb87333;
      const matBend = new THREE.MeshPhongMaterial({
        color, shininess: 80, specular: 0x444444
      });
      
      // в”Җв”Җ л°ҳмӣҗ (semicircle) bend в”Җв”Җ
      // л‘җ tube лҒқм җ A=(xEnd,p1.y,p1.z), B=(xEnd,p2.y,p2.z)
      // л‘җ лҒқм җмқ„ мһҮлҠ” м§Ғм„  = bendмқҳ м§ҒкІҪ
      // мӨ‘м җ M, л°ҳкІҪ R = |AB|/2
      // л°ҳмӣҗмқҙ +X(front) лҳҗлҠ” -X(back) л°©н–ҘмңјлЎң ліјлЎқ
      const A = new THREE.Vector3(xEnd, p1.y, p1.z);
      const B = new THREE.Vector3(xEnd, p2.y, p2.z);
      const M = new THREE.Vector3().addVectors(A, B).multiplyScalar(0.5);
      const AB = new THREE.Vector3().subVectors(B, A);
      const R = AB.length() * 0.5;
      
      if (R < 1e-3) return;  // к°ҷмқҖ мң„м№ҳл©ҙ мҠӨнӮө
      
      // л°ҳмӣҗмқҙ к·ёл Өм§ҖлҠ” нҸүл©ҙ = AB(м§ҒкІҪ) Г— Xм¶•(ліјлЎқ л°©н–Ҙ)
      // Y/Z нҸүл©ҙ м•Ҳм—җ м§ҒкІҪмқҙ мһҲкі , Xм¶•мңјлЎң ліјлЎқ вҶ’ нҸүл©ҙ normal = AB Г— X (м§Җм җвҶ’bend л°©н–Ҙ кІ°м •)
      const ABnorm = AB.clone().normalize();         // м§ҒкІҪ л°©н–Ҙ лӢЁмң„лІЎн„°
      const xAxis = new THREE.Vector3(sign, 0, 0);   // ліјлЎқ л°©н–Ҙ (+X лҳҗлҠ” -X)
      
      // CurvePathлЎң 24 segment л°ҳмӣҗ мғқм„ұ вҖ” л§Өк°ңліҖмҲҳ tвҲҲ[0,ПҖ]
      // P(t) = M + RВ·cos(t)В·ABnormВ·(-1) + RВ·sin(t)В·xAxis
      // (t=0 вҶ’ A, t=ПҖ вҶ’ B)
      class SemicircleBend extends THREE.Curve {
        constructor() { super(); }
        getPoint(t) {
          const angle = Math.PI * t;
          const pt = new THREE.Vector3();
          pt.copy(M);
          pt.addScaledVector(ABnorm, -R * Math.cos(angle));   // м§ҒкІҪ л°©н–Ҙ (AвҶ’B)
          pt.addScaledVector(xAxis, R * Math.sin(angle));     // X л°©н–ҘмңјлЎң ліјлЎқ
          return pt;
        }
      }
      const curve = new SemicircleBend();
      const tubeGeoBend = new THREE.TubeGeometry(curve, 32, Do/2, 12, false);
      const mesh = new THREE.Mesh(tubeGeoBend, matBend);
      bendGroup.add(mesh);
    };
    
    (bends.front || []).forEach(([r1,c1,r2,c2]) => drawBend(r1,c1,r2,c2,'front'));
    (bends.back || []).forEach(([r1,c1,r2,c2]) => drawBend(r1,c1,r2,c2,'back'));
    scene.add(bendGroup);
    
    // в”Җв”Җ IN / OUT markers (CircuitDesignerмқҳ inlets/outlets) в”Җв”Җ
    // к°Ғ л§Ҳм»Ө: tube лҒқм—җ мһ‘мқҖ sphere + нҷ”мӮҙн‘ң (IN: л“Өм–ҙк°ҖлҠ” л°©н–Ҙ, OUT: лӮҳк°ҖлҠ” л°©н–Ҙ)
    // л©ҙ(face) кІ°м •: к·ё tubeк°Җ front bendм—җ мҶҚн•ҳлҠ”м§Җ back bendм—җ мҶҚн•ҳлҠ”м§Җ
    //   - front bend л§Ң мһҲмңјл©ҙ вҶ’ мһҗмң  лҒқмқҖ -X (back face)
    //   - back bend л§Ң мһҲмңјл©ҙ вҶ’ мһҗмң  лҒқмқҖ +X (front face)
    //   - л‘ҳ лӢӨ мһҲмңјл©ҙ вҶ’ IN/OUT мң„м№ҳ лӘЁнҳё (мҠӨнӮө)
    //   - м—Ҷмңјл©ҙ вҶ’ м–‘мӘҪ лҒқ лӘЁл‘җ мһҗмң , мқјлӢЁ +Xм—җ н‘ңмӢң

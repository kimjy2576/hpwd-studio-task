    sucLabel.position.set(sucX + nSuc.x * arrowLen * 1.7, 0, sucZ + nSuc.z * arrowLen * 1.7);
    scene.add(sucLabel);
    const disLabel = makeLabel('DIS', '#dc2626');
    disLabel.position.set(disX + nDis.x * arrowLen * 1.7, 0, disZ + nDis.z * arrowLen * 1.7);
    scene.add(disLabel);

    // Grid helper
    const grid = new THREE.GridHelper(80, 8, 0x1e293b, 0x1e293b);
    grid.position.y = -Hc/2 - 3;
    scene.add(grid);

    sceneRef.current = { scene, camera, renderer };
    rendererRef.current = renderer;
    renderer.render(scene, camera);

    // #13: Mouse drag rotation
    let isDragging = false, prevX = 0, prevY = 0;
    // Restore camera state from persistent ref
    let camTheta = camStateRef.current.theta;
    let camPhi = camStateRef.current.phi;
    let camR = camStateRef.current.r;
    const updateCam = () => {
      camera.position.set(
        camR * Math.sin(camPhi) * Math.cos(camTheta),
        camR * Math.cos(camPhi),
        camR * Math.sin(camPhi) * Math.sin(camTheta),
      );
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    };
    updateCam();
    const el = renderer.domElement;
    el.style.cursor = 'grab';
    el.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; el.style.cursor = 'grabbing'; });
    el.addEventListener('mousemove', e => {
      if (!isDragging) return;
      camTheta += (e.clientX - prevX) * 0.01;
      camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - (e.clientY - prevY) * 0.01));
      camStateRef.current.theta = camTheta;
      camStateRef.current.phi = camPhi;
      prevX = e.clientX; prevY = e.clientY;
      updateCam();
    });
    el.addEventListener('mouseup', () => { isDragging = false; el.style.cursor = 'grab'; });
    el.addEventListener('mouseleave', () => { isDragging = false; el.style.cursor = 'grab'; });
    el.addEventListener('wheel', e => {
      camR = Math.max(50, Math.min(300, camR + e.deltaY * 0.3));
      camStateRef.current.r = camR;
      updateCam();
      e.preventDefault();
    }, { passive: false });

    // Auto-rotate animation loop (fan-sim compatible)
    const animate = () => {
      if (autoRotateRef.current) {
        camTheta += 0.006;
        camStateRef.current.theta = camTheta;
        updateCam();
      }
      frameRef.current = requestAnimationFrame(animate);
    };
    frameRef.current = requestAnimationFrame(animate);

    // ResizeObserver — auto-fit canvas to container size
    const resizeObs = new ResizeObserver(() => {
      if (!mountRef.current) return;
      const nw = mountRef.current.clientWidth;
      const nh = mountRef.current.clientHeight;
      if (nw > 0 && nh > 0) {
        renderer.setSize(nw, nh);
        camera.aspect = nw / nh;
        camera.updateProjectionMatrix();
        updateCam();
      }
    });
    resizeObs.observe(mountRef.current);

    return () => {
      if (frameRef.current) cancelAnimationFrame(frameRef.current);
      resizeObs.disconnect();
      renderer.dispose();
      if (mountRef.current) mountRef.current.innerHTML = '';
    };
  }, [R_c_mm, R_p_mm, H_mm, t_vane_mm]);

  // Update piston/vane position on theta change
  React.useEffect(() => {
    if (!sceneRef.current || !pistonRef.current || !vaneRef.current) return;
    const { scene, camera, renderer } = sceneRef.current;
    const e = R_c_mm - R_p_mm;
    const theta = theta_deg * Math.PI / 180;

    // Piston: eccentric orbit (x-z plane, y=height)
    // θ=0 → piston at vane position (-Z), vane fully pressed (ext=0)
    //   θ=0°: piston at -Z (under vane)
    //   θ=90°: piston at +X
    //   θ=180°: piston at +Z (opposite vane)
    //   θ=270°: piston at -X
    pistonRef.current.position.x = e * Math.sin(theta);
    pistonRef.current.position.z = -e * Math.cos(theta);

    // Vane: slides along z=0, slot at z=-Rc (cylinder wall on -Z side)
    // Extends inward (toward +z) by ext = e(1 - cos(θ))
    //   θ=0:   ext = 0   (piston at vane, fully retracted/pressed)
    //   θ=90°: ext = e   (piston at +X)
    //   θ=180°: ext = 2e (piston opposite vane, max extension)
    //   θ=270°: ext = e  (piston at -X)
    const vane_ext = e * (1 - Math.cos(theta));
    vaneRef.current.position.x = 0;
    vaneRef.current.position.z = -R_c_mm + vane_ext / 2;
    vaneRef.current.scale.z = Math.max(vane_ext / R_c_mm, 0.05);

    renderer.render(scene, camera);
  }, [theta_deg, R_c_mm, R_p_mm]);

  // Visibility toggles + explode effect
  React.useEffect(() => {
    if (!sceneRef.current) return;
    const { scene, camera, renderer } = sceneRef.current;
    if (cylinderRef.current) cylinderRef.current.visible = showCylinder;
    if (cylWireRef.current) cylWireRef.current.visible = showCylinder;
    if (pistonRef.current) pistonRef.current.visible = showPiston;
    if (vaneRef.current) vaneRef.current.visible = showVane;
    if (topPlateRef.current) topPlateRef.current.visible = showPlates;
    if (botPlateRef.current) botPlateRef.current.visible = showPlates;
    // Explode: parts separate along Y axis
    // Plates move furthest, piston/vane moderately
    const E = explode;  // explode magnitude
    if (topPlateRef.current) topPlateRef.current.position.y = H_mm/2 + 1 + E * 2.0;
    if (botPlateRef.current) botPlateRef.current.position.y = -H_mm/2 - 1 - E * 2.0;
    if (pistonRef.current) pistonRef.current.position.y = E * 0.8;   // piston slightly up
    if (vaneRef.current) vaneRef.current.position.y = E * 0.4;       // vane slightly up
    if (cylinderRef.current) cylinderRef.current.position.y = 0;     // cylinder stays centered
    if (cylWireRef.current) cylWireRef.current.position.y = 0;
    renderer.render(scene, camera);
  }, [showCylinder, showPiston, showVane, showPlates, explode, H_mm]);

  return (
    <div ref={mountRef} style={{ width: '100%', height: '100%', minHeight: 400, borderRadius: 12, overflow: 'hidden' }} />
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Compressor (PDSim ROM) Component View
   typeNo 103 — backend/components/compressor_pdsim_rom.py wrapping
   ═══════════════════════════════════════════════════════════════════ */
function CompressorView({ onBack }) {
  // ─── PDSim ROM Fitting params (Bell ROM) ───
  const [clearance_ratio, setClearance] = useState(0.04); // -
  const [rv_in, setRvin] = useState(2.5);               // -
  const [A_valve_in_mm2, setAvIn] = useState(8.0);      // mm²
  const [A_valve_out_mm2, setAvOut] = useState(6.0);    // mm²
  const [N_rated, setNrated] = useState(3000);          // rpm
  const [eta_motor, setEtaMotor] = useState(0.92);
  const [eta_inv, setEtaInv] = useState(0.95);
  
  // ─── Rotary geometry (compressor-sim의 RollingPiston* 함수 호환) ───
  // 진영님 지적 반영: V_disp 단일 입력 대신 R_cyl/R_pis/H/t_vane으로 직접 정의
  // V_disp는 derived: V_disp = π × (R_cyl² - R_pis²) × H_cyl  (cm³)
  const [R_cyl, setRcyl] = useState(24.0);              // mm — 실린더 내경 반경
  const [R_pis, setRpis] = useState(20.5);              // mm — 피스톤 외경 반경
  const [H_cyl, setHcyl] = useState(25.0);              // mm — 실린더 높이
  const [t_vane, setTvane] = useState(3.0);             // mm — vane 두께
  const [thetaView, setThetaView] = useState(45);       // deg — 시각화용 회전 각도

  // ─── Fitting params (Bell ROM 누설 + 마찰 + 손실) ───
  const [zeta_valve, setZetaValve] = useState(1.5);
  const [A_leak_mm2, setAleak] = useState(0.02);
  const [Cd_leak, setCdLeak] = useState(0.6);
  const [n_leak_rpm, setNleakRpm] = useState(0.5);
  const [over_comp_factor, setOverComp] = useState(0.3);
  const [n_poly_base, setNpoly] = useState(1.13);
  const [W_f_const, setWfConst] = useState(20.0);
  const [alpha_f_rpm, setAlphaFrpm] = useState(8e-6);
  const [AU_loss, setAUloss] = useState(5.0);

  // Material / type
  const [comp_type, setCompType] = useState('rotary');  // rotary 기본 — RollingPiston 도면
  const [fluid] = useState('R290');
  const [T_amb, setTamb] = useState(25.0);

  // 3D viz controls (compressor-sim과 동일)
  const [autoRotate, setAutoRotate] = useState(false);
  const [explode, setExplode] = useState(0);
  const [showCylinder, setShowCylinder] = useState(true);
  const [showPiston, setShowPiston] = useState(true);
  const [showVane, setShowVane] = useState(true);
  const [showPlates, setShowPlates] = useState(true);

  // V_disp는 derived (rotary 기하학에서 자동 계산)
  // V_disp [cm³] = π × (R_cyl² - R_pis²) × H_cyl × 10^-3 (mm³ → cm³)
  const V_disp = useMemo(() => {
    return Math.PI * (R_cyl*R_cyl - R_pis*R_pis) * H_cyl * 1e-3;
  }, [R_cyl, R_pis, H_cyl]);

  // Save panel state
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});
  const fileInputRef = useRef(null);

  // Apply panel state
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  // Visualization sub-tab: 0=3D, 1=Top view, 2=Front view (compressor-sim 스타일)
  const [vizSub, setVizSub] = useState(0);

  const STORAGE_KEY = 'on_design_compressor_slots';

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'compressor',
    // Rotary geometry (1차 입력)
    R_cyl, R_pis, H_cyl, t_vane,
    // PDSim ROM fitting params
    clearance_ratio, rv_in,
    A_valve_in_mm2, A_valve_out_mm2,
    N_rated, eta_motor, eta_inv,
    zeta_valve, A_leak_mm2, Cd_leak, n_leak_rpm,
    over_comp_factor, n_poly_base,
    W_f_const, alpha_f_rpm, AU_loss,
    comp_type, T_amb,
    // V_disp 도 함께 (derived지만 호환성 위해 저장 — load 시 재계산되므로 무시됨)
    V_disp,
  });

  const applyParams = (p) => {
    if (!p) return;
    // Rotary geometry 우선 적용
    if (p.R_cyl !== undefined) setRcyl(p.R_cyl);
    if (p.R_pis !== undefined) setRpis(p.R_pis);
    if (p.H_cyl !== undefined) setHcyl(p.H_cyl);
    if (p.t_vane !== undefined) setTvane(p.t_vane);
    // PDSim ROM
    if (p.clearance_ratio !== undefined) setClearance(p.clearance_ratio);
    if (p.rv_in !== undefined) setRvin(p.rv_in);
    if (p.A_valve_in_mm2 !== undefined) setAvIn(p.A_valve_in_mm2);
    if (p.A_valve_out_mm2 !== undefined) setAvOut(p.A_valve_out_mm2);
    if (p.N_rated !== undefined) setNrated(p.N_rated);
    if (p.eta_motor !== undefined) setEtaMotor(p.eta_motor);
    if (p.eta_inv !== undefined) setEtaInv(p.eta_inv);
    if (p.zeta_valve !== undefined) setZetaValve(p.zeta_valve);
    if (p.A_leak_mm2 !== undefined) setAleak(p.A_leak_mm2);
    if (p.Cd_leak !== undefined) setCdLeak(p.Cd_leak);
    if (p.n_leak_rpm !== undefined) setNleakRpm(p.n_leak_rpm);
    if (p.over_comp_factor !== undefined) setOverComp(p.over_comp_factor);
    if (p.n_poly_base !== undefined) setNpoly(p.n_poly_base);
    if (p.W_f_const !== undefined) setWfConst(p.W_f_const);
    if (p.alpha_f_rpm !== undefined) setAlphaFrpm(p.alpha_f_rpm);
    if (p.AU_loss !== undefined) setAUloss(p.AU_loss);
    if (p.comp_type !== undefined) setCompType(p.comp_type);
    if (p.T_amb !== undefined) setTamb(p.T_amb);
    // V_disp는 derived이므로 무시 — R_cyl/R_pis/H_cyl로 자동 계산
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = { ...params, _name: name || `Slot ${slot}`, _timestamp: new Date().toISOString() };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };
  const loadSlot = (slot) => {
    const e = saves[slot]; if (!e) return; applyParams(e);
  };
  const deleteSlot = (slot) => {
    const ns = { ...saves }; delete ns[slot]; setSaves(ns);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ns)); } catch (e) {}
  };

  // ─── backend (typeNo 103) params 매핑 ───
  // V_disp는 rotary geometry에서 derived (사용자가 직접 입력하지 않음)
  const buildBackendParams = () => ({
    fluid: fluid,
    comp_type: comp_type,
    T_amb: T_amb,
    V_disp: V_disp,  // derived from R_cyl/R_pis/H_cyl
    clearance_ratio: clearance_ratio,
    rv_in: rv_in,
    A_valve_in_mm2: A_valve_in_mm2,
    A_valve_out_mm2: A_valve_out_mm2,
    N_rated: N_rated,
    eta_motor: eta_motor,
    eta_inv: eta_inv,
    zeta_valve: zeta_valve,
    A_leak_mm2: A_leak_mm2,
    Cd_leak: Cd_leak,
    n_leak_rpm: n_leak_rpm,
    over_comp_factor: over_comp_factor,
    n_poly_base: n_poly_base,
    W_f_const: W_f_const,
    alpha_f_rpm: alpha_f_rpm,
    AU_loss: AU_loss,
  });

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_pdsim_rom',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ HPWD Studio로 적용됨. HPWD Studio canvas에서 typeNo 103 컴포넌트를 추가하면 자동 적용됩니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_pdsim_rom',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ Calibration Studio로 적용됨. Calibration Studio에서 fitting을 시작할 수 있습니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = { ...currentParams(), _exported_at: new Date().toISOString(), _version: '1.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `compressor_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'compressor') {
          alert(`다른 컴포넌트의 JSON: ${data.component}`); return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // ─── Derived stats ───
  const derived = useMemo(() => {
    const V_disp_m3 = V_disp * 1e-6;  // cm³ → m³
    // 이론 displacement rate (kg/s) — 가정 P_suc=5bar, T_suc=10°C, R290 ρ ~12 kg/m³
    const rho_suc_est = 12.0;  // 대략
    const m_dot_th = V_disp_m3 * (N_rated / 60) * rho_suc_est;
    // 체적효율 추정 — Bell ROM 단순화
    const eta_v_est = 1.0 - clearance_ratio * (Math.pow(rv_in, 1.0 / n_poly_base) - 1.0);
    return {
      V_disp_m3: (V_disp_m3 * 1e6).toFixed(2),  // cm³
      m_dot_th: m_dot_th.toFixed(4),
      eta_v_est: eta_v_est.toFixed(3),
      A_in_total: (A_valve_in_mm2 * Cd_leak).toFixed(2),  // 효과적 면적
      W_friction_at_rated: (W_f_const + alpha_f_rpm * N_rated * N_rated).toFixed(1),
    };
  }, [V_disp, clearance_ratio, rv_in, N_rated, A_valve_in_mm2, Cd_leak, n_poly_base, W_f_const, alpha_f_rpm]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          ← System
        </button>
        <span className="text-slate-300">|</span>
        <span className="text-purple-600 text-base">◆</span>
        <span className="font-bold text-slate-900 text-[15px]">Compressor</span>
        <span className="text-[11px] font-mono text-slate-400">PDSim ROM · On-design</span>

        <div className="flex-1"></div>

        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? 'bg-purple-50 text-purple-700 border border-purple-300' : 'bg-slate-50 hover:bg-purple-50 text-slate-700 border border-slate-200'
          }`}
          title="다른 Studio로 적용">↗ Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">💾</button>
      </div>

      {/* Apply panel */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Apply Design</div>
              <div className="text-[10px] text-slate-400 font-mono">현재 설계를 다른 Studio로 동기화 (Run은 해당 Studio에서)</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className="flex-1 px-3 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> HPWD Studio (typeNo 103)
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">{applyMsg}</div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Save / Load</div>
              <div className="text-[10px] text-slate-400 font-mono">JSON: 파일 · Slot: 브라우저 내</div>
            </div>
            <div className="flex gap-2 mb-3">
              <button onClick={exportJSON}
                className="flex-1 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5">
                <span>📥</span> JSON 내보내기
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="flex-1 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5">
                <span>📤</span> JSON 불러오기
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
            </div>
            <div className="grid grid-cols-5 gap-2">
              {[1, 2, 3, 4, 5].map(slot => {
                const entry = saves[slot];
                return (
                  <div key={slot} className="border border-slate-200 rounded p-2 text-[11px]">
                    <div className="font-mono font-bold text-slate-700 mb-1">Slot {slot}</div>
                    {entry ? (
                      <>
                        <div className="text-slate-600 truncate" title={entry._name}>{entry._name}</div>
                        <div className="text-slate-400 text-[10px] mb-1">{entry._timestamp?.slice(0, 10)}</div>
                        <div className="flex gap-1">
                          <button onClick={() => loadSlot(slot)}
                            className="flex-1 px-1.5 py-0.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded text-[10px]">불러오기</button>
                          <button onClick={() => { if (confirm(`Slot ${slot} 삭제?`)) deleteSlot(slot); }}
                            className="px-1.5 py-0.5 bg-red-50 hover:bg-red-100 text-red-700 rounded text-[10px]">×</button>
                        </div>
                      </>
                    ) : (
                      <button onClick={() => {
                        const name = prompt(`Slot ${slot} 이름 (Enter=Slot ${slot}):`);
                        if (name !== null) saveSlot(slot, name);
                      }}
                        className="w-full px-1.5 py-2 bg-slate-50 hover:bg-slate-100 text-slate-500 rounded text-[10px] border border-dashed border-slate-300">+ 저장</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Main: Sidebar + Visual */}
      <div className="flex-1 overflow-hidden flex">
        {/* Sidebar — params */}
        <div className="w-72 shrink-0 bg-white border-r border-slate-200 overflow-y-auto p-4">
          <SidebarSection title="Rotary Geometry">
            <Slider label="R_cyl" sublabel="mm" value={R_cyl} min={15} max={45} step={0.5} onChange={setRcyl} color="purple" decimals={1} />
            <Slider label="R_pis" sublabel="mm" value={R_pis} min={10} max={42} step={0.5} onChange={setRpis} color="purple" decimals={1} />
            <Slider label="H_cyl" sublabel="mm" value={H_cyl} min={10} max={60} step={0.5} onChange={setHcyl} color="purple" decimals={1} />
            <Slider label="t_vane" sublabel="mm" value={t_vane} min={1.5} max={8} step={0.1} onChange={setTvane} color="purple" decimals={1} />
            <Slider label="θ (시각화 각도)" sublabel="°" value={thetaView} min={0} max={359} step={1} onChange={setThetaView} color="amber" decimals={0} />
            <div className="mt-2 px-2 py-1.5 bg-purple-50 border border-purple-200 rounded text-[11px] font-mono text-purple-800">
              V_disp = π × (R_cyl² − R_pis²) × H = <b>{V_disp.toFixed(2)} cm³</b>
            </div>
            <div className="mt-1 text-[10px] text-slate-400 font-mono">
              eccentricity e = {(R_cyl - R_pis).toFixed(2)} mm
            </div>
          </SidebarSection>

          <SidebarSection title="Valves & Operating">
            <Slider label="A_valve_in" sublabel="mm²" value={A_valve_in_mm2} min={2} max={30} step={0.5} onChange={setAvIn} color="purple" decimals={1} />
            <Slider label="A_valve_out" sublabel="mm²" value={A_valve_out_mm2} min={2} max={30} step={0.5} onChange={setAvOut} color="purple" decimals={1} />
            <Slider label="Clearance ratio" sublabel="-" value={clearance_ratio} min={0.01} max={0.15} step={0.005} onChange={setClearance} color="purple" decimals={3} />
            <Slider label="rv_in (built-in vol ratio)" sublabel="-" value={rv_in} min={1.5} max={5.0} step={0.1} onChange={setRvin} color="purple" decimals={2} />
            <Slider label="N_rated" sublabel="rpm" value={N_rated} min={1500} max={7000} step={100} onChange={setNrated} color="purple" decimals={0} />
            <Slider label="η_motor" sublabel="-" value={eta_motor} min={0.7} max={0.98} step={0.01} onChange={setEtaMotor} color="purple" decimals={2} />
            <Slider label="η_inv" sublabel="-" value={eta_inv} min={0.85} max={0.99} step={0.005} onChange={setEtaInv} color="purple" decimals={2} />
          </SidebarSection>

          <SidebarSection title="Fitting (Bell ROM)">
            <Slider label="ζ_valve" sublabel="-" value={zeta_valve} min={0.5} max={3.0} step={0.1} onChange={setZetaValve} color="amber" decimals={2} />
            <Slider label="A_leak" sublabel="mm²" value={A_leak_mm2} min={0.001} max={0.5} step={0.005} onChange={setAleak} color="amber" decimals={3} />
            <Slider label="Cd_leak" sublabel="-" value={Cd_leak} min={0.3} max={0.9} step={0.02} onChange={setCdLeak} color="amber" decimals={2} />
            <Slider label="n_leak (rpm exp)" sublabel="-" value={n_leak_rpm} min={0.0} max={1.0} step={0.05} onChange={setNleakRpm} color="amber" decimals={2} />
            <Slider label="over_comp" sublabel="-" value={over_comp_factor} min={0.0} max={0.6} step={0.02} onChange={setOverComp} color="amber" decimals={2} />
            <Slider label="n_poly_base" sublabel="-" value={n_poly_base} min={1.05} max={1.30} step={0.01} onChange={setNpoly} color="amber" decimals={2} />
            <Slider label="W_f_const" sublabel="W" value={W_f_const} min={0} max={100} step={1} onChange={setWfConst} color="amber" decimals={0} />
            <Slider label="α_f_rpm" sublabel="W/rpm²" value={alpha_f_rpm * 1e6} min={0} max={50} step={0.5} onChange={(v) => setAlphaFrpm(v * 1e-6)} color="amber" decimals={1} />
            <Slider label="AU_loss" sublabel="W/K" value={AU_loss} min={0} max={30} step={0.5} onChange={setAUloss} color="amber" decimals={1} />
          </SidebarSection>

          <SidebarSection title="Material & Operating">
            <div className="text-[11px] text-slate-500 mb-1">Type</div>
            <ButtonGroup options={['rotary', 'reciprocating', 'scroll']} value={comp_type} onChange={setCompType} />
            <Slider label="T_amb" sublabel="°C" value={T_amb} min={-10} max={50} step={1} onChange={setTamb} color="slate" decimals={0} />
            <div className="mt-2 text-[10px] text-slate-400 font-mono">Fluid: {fluid} (HPWD Studio에서 변경)</div>
          </SidebarSection>
        </div>

        {/* Main: View sub-tabs + Visualization + Stats + Status bar */}
        <div className="flex-1 flex flex-col overflow-hidden">
          {/* Top hint */}
          <div className="bg-emerald-50 border-b border-emerald-200 px-6 py-2 text-[12px] text-emerald-800 shrink-0">
            ✓ <b>On-design (PDSim ROM)</b> — sidebar 변경 시 도식 + Derived 실시간 반영
          </div>

          {/* View sub-tabs */}
          <div className="bg-white border-b border-slate-200 px-6 py-3 shrink-0">
            <div className="flex gap-2">
              {['3D model', 'Top view', 'Front view'].map((label, idx) => (
                <button key={idx}
                  onClick={() => setVizSub(idx)}
                  className={`px-4 py-1.5 text-[13px] rounded transition-colors ${
                    vizSub === idx
                      ? 'bg-purple-600 text-white font-semibold'
                      : 'bg-slate-100 hover:bg-slate-200 text-slate-700'
                  }`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Main scroll area */}
          <div className="flex-1 overflow-y-auto p-6 bg-slate-50">
            <div className="max-w-3xl mx-auto">
              {/* Visualization based on vizSub — compressor-sim의 RollingPiston* 사용 */}
              <div className="bg-white border border-slate-200 rounded-lg p-4 mb-4">
                <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-2 flex items-center justify-between">
                  <span>
                    {vizSub === 0 && '3D model — Three.js (drag to rotate, scroll to zoom)'}
                    {vizSub === 1 && 'Top view — Rolling piston cross-section (θ animation)'}
                    {vizSub === 2 && 'Front view — Cylinder side cross-section'}
                  </span>
                  {/* 3D mode controls */}
                  {vizSub === 0 && (
                    <div className="flex gap-2 items-center">
                      <button onClick={() => setAutoRotate(a => !a)}
                        className={`text-[10px] px-2 py-1 rounded border ${
                          autoRotate ? 'bg-purple-50 border-purple-400 text-purple-700' : 'bg-white border-slate-300 text-slate-600'
                        }`}>
                        {autoRotate ? '⏸ Pause' : '▶ Auto-rotate'}
                      </button>
                      <label className="flex items-center gap-1 text-[10px] text-slate-600">
                        Explode
                        <input type="range" min="0" max="20" step="1" value={explode} onChange={(e) => setExplode(+e.target.value)}
                          className="w-16" />
                      </label>
                    </div>
                  )}
                </div>
                
                <div style={{ height: 380, width: '100%' }}>
                  {vizSub === 0 && (
                    <RollingPiston3D
                      R_c_mm={R_cyl} R_p_mm={R_pis} H_mm={H_cyl} t_vane_mm={t_vane}
                      theta_deg={thetaView}
                      autoRotate={autoRotate} explode={explode}
                      showCylinder={showCylinder} showPiston={showPiston}
                      showVane={showVane} showPlates={showPlates}
                    />
                  )}
                  {vizSub === 1 && (
                    <RollingPistonView
                      R_c_mm={R_cyl} R_p_mm={R_pis} H_mm={H_cyl} t_vane_mm={t_vane}
                      theta_deg={thetaView}
                    />
                  )}
                  {vizSub === 2 && (
                    /* Front view (단순 SVG — cylinder 측면 단면) */
                    <svg viewBox="0 0 480 380" className="w-full h-full" preserveAspectRatio="xMidYMid meet">
                      <defs>
                        <linearGradient id="front-cyl-grad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0" stopColor="#c4b5fd" />
                          <stop offset="1" stopColor="#7c3aed" />
                        </linearGradient>
                        <pattern id="hatch-clear" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
                          <line x1="0" y1="0" x2="0" y2="6" stroke="#94a3b8" strokeWidth="0.5" />
                        </pattern>
                      </defs>
                      
                      {/* 스케일: cylinder 외경(2*R_cyl)이 280px 차지 */}
                      {(() => {
                        const Rc = R_cyl;
                        const Rp = R_pis;
                        const H = H_cyl;
                        const tv = t_vane;
                        const scale = 280 / (2 * Rc);  // mm → px
                        const cx = 240;  // SVG center x
                        const cy = 200;  // SVG center y
                        const W_cyl = 2 * Rc * scale;  // cylinder width in px
                        const H_cyl_px = H * scale;   // cylinder height in px
                        const tv_px = tv * scale;     // vane thickness
                        
                        return (
                          <>
                            {/* Cylinder body — 단면 (rectangle) */}
                            <rect x={cx - W_cyl/2} y={cy - H_cyl_px/2}
                                  width={W_cyl} height={H_cyl_px}
                                  fill="url(#front-cyl-grad)" stroke="#5b21b6" strokeWidth="2" rx="2" />
                            
                            {/* Top plate */}
                            <rect x={cx - W_cyl/2 - 5} y={cy - H_cyl_px/2 - 8}
                                  width={W_cyl + 10} height="8"
                                  fill="#a78bfa" stroke="#5b21b6" strokeWidth="1" />
                            {/* Bottom plate */}
                            <rect x={cx - W_cyl/2 - 5} y={cy + H_cyl_px/2}
                                  width={W_cyl + 10} height="8"
                                  fill="#a78bfa" stroke="#5b21b6" strokeWidth="1" />
                            
                            {/* Vane (수직 — 중심에서 위로) */}
                            <rect x={cx - tv_px/2} y={cy - H_cyl_px/2 + 2}
                                  width={tv_px} height={H_cyl_px - 4}
                                  fill="#7c3aed" fillOpacity="0.3" stroke="#7c3aed" strokeWidth="1.2" />
                            
                            {/* Suction port (top-left) */}
                            {(() => {
                              const sucW = 20 + Math.sqrt(A_valve_in_mm2) * 3;
                              return (
                                <>
                                  <rect x={cx - W_cyl/2 + 15} y={cy - H_cyl_px/2 - 22}
                                        width={sucW} height="14" fill="#3b82f6" opacity="0.85"
                                        stroke="#1e40af" strokeWidth="1" rx="2" />
                                  <text x={cx - W_cyl/2 + 15 + sucW/2} y={cy - H_cyl_px/2 - 26}
                                        textAnchor="middle" fontSize="11" fontFamily="monospace"
                                        fill="#1e40af" fontWeight="bold">SUC</text>
                                  <text x={cx - W_cyl/2 + 15 + sucW/2} y={cy - H_cyl_px/2 - 12}
                                        textAnchor="middle" fontSize="9" fontFamily="monospace"
                                        fill="white">{A_valve_in_mm2.toFixed(1)}mm²</text>
                                </>
                              );
                            })()}
                            
                            {/* Discharge port (top-right) */}
                            {(() => {
                              const disW = 20 + Math.sqrt(A_valve_out_mm2) * 3;
                              return (
                                <>
                                  <rect x={cx + W_cyl/2 - 15 - disW} y={cy - H_cyl_px/2 - 22}
                                        width={disW} height="14" fill="#dc2626" opacity="0.85"
                                        stroke="#7f1d1d" strokeWidth="1" rx="2" />
                                  <text x={cx + W_cyl/2 - 15 - disW/2} y={cy - H_cyl_px/2 - 26}
                                        textAnchor="middle" fontSize="11" fontFamily="monospace"
                                        fill="#7f1d1d" fontWeight="bold">DIS</text>
                                  <text x={cx + W_cyl/2 - 15 - disW/2} y={cy - H_cyl_px/2 - 12}
                                        textAnchor="middle" fontSize="9" fontFamily="monospace"
                                        fill="white">{A_valve_out_mm2.toFixed(1)}mm²</text>
                                </>
                              );
                            })()}
                            
                            {/* Clearance band (top thin) */}
                            <rect x={cx - W_cyl/2 + 2} y={cy - H_cyl_px/2 + 2}
                                  width={W_cyl - 4}
                                  height={Math.max(4, clearance_ratio * H_cyl_px)}
                                  fill="url(#hatch-clear)" stroke="#475569" strokeWidth="0.5" />
                            
                            {/* Center labels */}
                            <text x={cx} y={cy - 5} textAnchor="middle" fontSize="13" fill="white"
                                  fontFamily="monospace" fontWeight="bold">
                              V_disp = {V_disp.toFixed(1)} cm³
                            </text>
                            <text x={cx} y={cy + 12} textAnchor="middle" fontSize="11" fill="white"
                                  fontFamily="monospace">
                              N = {N_rated} rpm
                            </text>
                            <text x={cx} y={cy + 28} textAnchor="middle" fontSize="10" fill="#e0e7ff"
                                  fontFamily="monospace">
                              clearance = {(clearance_ratio*100).toFixed(1)}%
                            </text>
                            
                            {/* Dimensions */}
                            <text x={cx} y={cy - H_cyl_px/2 - 50} textAnchor="middle" fontSize="11"
                                  fill="#64748b" fontFamily="monospace">
                              ← D = 2·R_cyl = {(2*R_cyl).toFixed(1)} mm →
                            </text>
                            <text x={cx + W_cyl/2 + 30} y={cy} textAnchor="middle" fontSize="11"
                                  fill="#64748b" fontFamily="monospace"
                                  transform={`rotate(90, ${cx + W_cyl/2 + 30}, ${cy})`}>
                              ← H = {H} mm →
                            </text>
                            
                            {/* Bottom — leakage path */}
                            <text x={cx} y={cy + H_cyl_px/2 + 40} textAnchor="middle" fontSize="10"
                                  fill="#92400e" fontFamily="monospace">
                              ⤥ Leakage: A = {A_leak_mm2.toFixed(3)} mm² · Cd = {Cd_leak.toFixed(2)} · W_f({N_rated}) ≈ {derived.W_friction_at_rated} W
                            </text>
                          </>
                        );
                      })()}
                    </svg>
                  )}
                </div>
              </div>

              {/* Derived stats */}
              <div className="bg-white border border-slate-200 rounded-lg p-4">
                <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-3">
                  Derived (P_suc=5 bar, T_suc=10°C, R290 추정)
                </div>
                <div className="grid grid-cols-3 gap-3 text-[12px]">
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">m_dot 이론</div>
                    <div className="font-mono font-bold text-slate-900">{derived.m_dot_th} <span className="text-slate-400 font-normal">kg/s</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">η_v 추정</div>
                    <div className="font-mono font-bold text-slate-900">{derived.eta_v_est}</div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">W_friction</div>
                    <div className="font-mono font-bold text-slate-900">{derived.W_friction_at_rated} <span className="text-slate-400 font-normal">W</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">A_v_in 효과</div>
                    <div className="font-mono font-bold text-slate-900">{derived.A_in_total} <span className="text-slate-400 font-normal">mm²</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">η_motor × η_inv</div>
                    <div className="font-mono font-bold text-slate-900">{(eta_motor * eta_inv).toFixed(3)}</div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">V_disp</div>
                    <div className="font-mono font-bold text-slate-900">{derived.V_disp_m3} <span className="text-slate-400 font-normal">cm³</span></div>
                  </div>
                </div>
              </div>

              <div className="mt-4 text-[11px] text-slate-500 leading-relaxed">
                <div className="font-bold mb-1 text-slate-700">PDSim ROM (Bell):</div>
                <div>· 체적효율 η_v: clearance + rv_in 기반 polytropic 압축</div>
                <div>· 누설: A_leak × Cd_leak × √(P_dis - P_suc), N에 따른 누설 보정</div>
                <div>· 마찰: W_f = W_f_const + α × N²</div>
                <div>· over_comp_factor: 토출 valve 늦은 열림 보정</div>
                <div>· AU_loss: 외부 열손실 (T_dis 추정에 영향)</div>
              </div>
            </div>
          </div>

          {/* Status bar (compressor-sim 스타일) */}
          <div className="bg-white border-t border-slate-200 px-6 py-2 flex items-center gap-4 text-[11px] font-mono text-slate-500 shrink-0">
            <span className="flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
              All inputs valid
            </span>
            <span className="text-slate-300">·</span>
            <span>{fluid}</span>
            <span className="text-slate-300">·</span>
            <span>{N_rated} RPM</span>
            <span className="text-slate-300">·</span>
            <span className="text-purple-600 font-semibold">On-design (PDSim ROM)</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Top App
   ═══════════════════════════════════════════════════════════════════ */
function App() {
  const [selected, setSelected] = useState(null);

  // System view
  if (!selected) {
    return (
      <div className="min-h-screen bg-slate-50">
        {/* Header */}
        <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3">
          <AppSwitcher current="on-design-studio" />
          <div className="text-[11px] text-slate-500">On-design 모델 설계</div>
          <div className="flex-1"></div>
          <BackendStatus />
        </div>
        <SystemView onSelect={setSelected} />
      </div>
    );
  }

  // Component view
  if (selected === 'evaporator') {
    return <EvaporatorView onBack={() => setSelected(null)} />;
  }
  if (selected === 'compressor') {
    return <CompressorView onBack={() => setSelected(null)} />;
  }

  return (
    <div className="p-8 text-center">
      <div className="text-slate-500">아직 지원되지 않는 부품: {selected}</div>
      <button onClick={() => setSelected(null)} className="mt-4 text-blue-600 hover:underline">
        ← 부품 목록으로
      </button>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));

</script>

<script>
  function setStatus(msg, isError) {
    const el = document.getElementById('load-status');
    if (el) {
      el.textContent = msg;
      if (isError) el.style.color = '#dc2626';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setStatus('1/3 — 라이브러리 확인 중...');
    const checks = [];
    if (typeof React === 'undefined') checks.push('React');
    if (typeof ReactDOM === 'undefined') checks.push('ReactDOM');
    if (typeof Babel === 'undefined') checks.push('Babel');
    if (checks.length > 0) {
      showError('CDN 로드 실패: ' + checks.join(', ') + '\n\n인터넷 연결 또는 회사 네트워크 확인 — CDN(unpkg.com) 차단 가능성');
      return;
    }

    setStatus('2/3 — Babel JSX 컴파일 중...');
    const jsxText = document.getElementById('app-jsx').textContent;
    let compiled;
    try {
      const result = Babel.transform(jsxText, {
        presets: ['env', 'react'],
        filename: 'app.jsx',
      });
      compiled = result.code;
      console.log('[Studio] Compiled', compiled.length, 'chars');
    } catch (e) {
      showError('Babel 컴파일 에러:\n' + e.message);
      return;
    }

    setStatus('3/3 — React 마운트 중...');
    try {
      new Function(compiled)();
      console.log('[Studio] Mounted');
    } catch (e) {
      showError('실행 에러:\n' + (e.stack || e.message));
    }
  });
</script>
</body>
</html>

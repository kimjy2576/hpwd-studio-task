                                      {(topGap/s).toFixed(2)}mm
                                    </text>
                                  )}
                                  {botGap > 8 && (
                                    <text x={cx} y={cy + Rcpx - botGap/2 + 3} textAnchor="middle"
                                          fill="#dc2626" fontSize="8" fontFamily="monospace" opacity="0.7">
                                      {(botGap/s).toFixed(2)}mm
                                    </text>
                                  )}
                                </>);
                              })()}
                              
                              {/* SUC port — top plate 위쪽 (세로축 상단 부근) */}
                              <ellipse cx={cx - Hpx/2 - 9} cy={cy - Dpx/4} rx={4} ry={dSuc/2}
                                       fill="#3b82f6"
                                       opacity={0.4 + 0.6 * phaseIntensity.suc}
                                       stroke="#1e40af" strokeWidth="1" />
                              <line x1={cx - Hpx/2 - 13} y1={cy - Dpx/4} x2={cx - Hpx/2 + 4} y2={cy - Dpx/4}
                                    stroke="#3b82f6"
                                    strokeWidth={1.5 + 1.5 * phaseIntensity.suc}
                                    opacity={0.3 + 0.7 * phaseIntensity.suc} />
                              <text x={cx - Hpx/2 - 42} y={cy - Dpx/4 + 4} textAnchor="middle"
                                    fill="#1e40af" fontSize="11" fontWeight="700"
                                    opacity={0.45 + 0.55 * phaseIntensity.suc}>SUC</text>
                              <text x={cx - Hpx/2 - 42} y={cy - Dpx/4 - 8} textAnchor="middle"
                                    fill="#1e40af" fontSize="9" fontFamily="monospace"
                                    opacity={0.45 + 0.55 * phaseIntensity.suc}>
                                A={A_valve_in_mm2.toFixed(1)}mm²
                              </text>
                              {/* SUC arrow inflow (외부 → port) */}
                              <line x1={cx - Hpx/2 - 26} y1={cy - Dpx/4} x2={cx - Hpx/2 - 14} y2={cy - Dpx/4}
                                    stroke="#3b82f6"
                                    strokeWidth={1.5 + 2.5 * phaseIntensity.suc}
                                    opacity={0.25 + 0.75 * phaseIntensity.suc}
                                    markerEnd="url(#sucArr)" />
                              <defs>
                                <marker id="sucArr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                  <polygon points="0 0, 6 3, 0 6" fill="#3b82f6" />
                                </marker>
                              </defs>
                              
                              {/* DIS port — top plate 아래쪽 */}
                              <ellipse cx={cx - Hpx/2 - 9} cy={cy + Dpx/4} rx={4} ry={dDis/2}
                                       fill="#dc2626"
                                       opacity={0.4 + 0.6 * phaseIntensity.dis}
                                       stroke="#7f1d1d" strokeWidth="1" />
                              <line x1={cx - Hpx/2 - 13} y1={cy + Dpx/4} x2={cx - Hpx/2 + 4} y2={cy + Dpx/4}
                                    stroke="#dc2626"
                                    strokeWidth={1.5 + 1.5 * phaseIntensity.dis}
                                    opacity={0.3 + 0.7 * phaseIntensity.dis} />
                              <text x={cx - Hpx/2 - 42} y={cy + Dpx/4 - 4} textAnchor="middle"
                                    fill="#7f1d1d" fontSize="11" fontWeight="700"
                                    opacity={0.45 + 0.55 * phaseIntensity.dis}>DIS</text>
                              <text x={cx - Hpx/2 - 42} y={cy + Dpx/4 + 12} textAnchor="middle"
                                    fill="#7f1d1d" fontSize="9" fontFamily="monospace"
                                    opacity={0.45 + 0.55 * phaseIntensity.dis}>
                                A={A_valve_out_mm2.toFixed(1)}mm²
                              </text>
                              {/* DIS arrow outflow (port → 외부) */}
                              <line x1={cx - Hpx/2 - 14} y1={cy + Dpx/4} x2={cx - Hpx/2 - 26} y2={cy + Dpx/4}
                                    stroke="#dc2626"
                                    strokeWidth={1.5 + 2.5 * phaseIntensity.dis}
                                    opacity={0.25 + 0.75 * phaseIntensity.dis}
                                    markerEnd="url(#disArr)" />
                              <defs>
                                <marker id="disArr" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
                                  <polygon points="6 0, 0 3, 6 6" fill="#dc2626" />
                                </marker>
                              </defs>
                              
                              {/* H dimension (top) */}
                              <line x1={cx - Hpx/2} y1={cy - Dpx/2 - 28} x2={cx + Hpx/2} y2={cy - Dpx/2 - 28}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx - Hpx/2} y1={cy - Dpx/2 - 32} x2={cx - Hpx/2} y2={cy - Dpx/2 - 24}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2} y1={cy - Dpx/2 - 32} x2={cx + Hpx/2} y2={cy - Dpx/2 - 24}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <text x={cx} y={cy - Dpx/2 - 36} textAnchor="middle"
                                    fill="var(--tx2)" fontSize="11">H = {H_cyl}mm</text>
                              
                              {/* D dimension (right) */}
                              <line x1={cx + Hpx/2 + 30} y1={cy - Dpx/2} x2={cx + Hpx/2 + 30} y2={cy + Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2 + 26} y1={cy - Dpx/2} x2={cx + Hpx/2 + 34} y2={cy - Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2 + 26} y1={cy + Dpx/2} x2={cx + Hpx/2 + 34} y2={cy + Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <text x={cx + Hpx/2 + 36} y={cy + 4}
                                    fill="var(--tx2)" fontSize="11">⌀{(2 * R_cyl).toFixed(1)}mm</text>
                              
                              {/* Clearance label (left edge of piston) */}
                              <line x1={piston_x} y1={piston_y - 2} x2={piston_x} y2={piston_y + piston_h + 2}
                                    stroke="#d97706" strokeWidth="1.5" />
                              <text x={piston_x - 4} y={piston_y - 4} textAnchor="end"
                                    fill="#d97706" fontSize="9" fontWeight="500">
                                clearance {(clearance_ratio*100).toFixed(1)}%
                              </text>
                            </>);
                          })()}
                        </svg>
                      </div>
                      <div style={{ padding: '8px 4px 0', fontSize: 11, color: 'var(--tx3)',
                                    fontFamily: 'JetBrains Mono, monospace', textAlign: 'center' }}>
                        θ = {Math.round(thetaView)}° · piston Δy = {((R_cyl - R_pis) * Math.sin(thetaView * Math.PI / 180)).toFixed(2)}mm · cylinder length-axis · {comp_type}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* ── Shared θ control panel (모든 view에서 회전 재현) ── */}
              <div className="bg-white border border-slate-200 rounded-lg p-4 mb-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider">
                    Cylinder rotation (θ)
                  </div>
                  <div className="flex gap-2 items-center">
                    <button onClick={() => setThetaAnimate(a => !a)}
                      className={`text-[11px] px-3 py-1 rounded border font-semibold transition-colors ${
                        thetaAnimate
                          ? 'bg-purple-600 border-purple-600 text-white'
                          : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'
                      }`}>
                      {thetaAnimate ? '⏸ Pause' : '▶ Animate'}
                    </button>
                    <label className="flex items-center gap-1 text-[10px] text-slate-500 font-mono">
                      Speed
                      <input type="range" min="10" max="360" step="10"
                        value={thetaSpeed}
                        onChange={(e) => setThetaSpeed(+e.target.value)}
                        className="w-20" />
                      <span className="w-12 text-right">{thetaSpeed}°/s</span>
                    </label>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <input type="range" min="0" max="360" step="1"
                    value={thetaView}
                    onChange={(e) => setThetaView(+e.target.value)}
                    className="flex-1 cursor-pointer" />
                  <span className="font-mono text-[13px] font-semibold text-purple-700 w-16 text-right">
                    θ = {Math.round(thetaView)}°
                  </span>
                </div>
                <div className="mt-1.5 text-[10px] text-slate-400 font-mono">
                  슬라이더 또는 ▶ Animate 버튼으로 cylinder 회전 시각화 — 모든 view에 실시간 반영
                </div>
                
                {/* Phase indicator (SUC / DIS) */}
                <div className="mt-3 pt-3 border-t border-slate-100">
                  <div className="text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1.5">
                    Phase intensity
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    {/* SUC (green) */}
                    <div className="flex items-center gap-2">
                      <span className="text-[11px] font-mono font-bold w-8"
                            style={{ color: '#059669', opacity: 0.4 + 0.6 * phaseIntensity.suc }}>
                        SUC
                      </span>
                      <div className="flex-1 h-2 bg-slate-100 rounded overflow-hidden">
                        <div className="h-full transition-all duration-100"
                             style={{
                               width: `${phaseIntensity.suc * 100}%`,
                               background: '#059669',
                             }} />
                      </div>
                      <span className="text-[10px] font-mono text-slate-500 w-10 text-right">
                        {(phaseIntensity.suc * 100).toFixed(0)}%
                      </span>
                    </div>
                    {/* DIS (red) */}
                    <div className="flex items-center gap-2">
                      <span className="text-[11px] font-mono font-bold w-8"
                            style={{ color: '#dc2626', opacity: 0.4 + 0.6 * phaseIntensity.dis }}>
                        DIS
                      </span>
                      <div className="flex-1 h-2 bg-slate-100 rounded overflow-hidden">
                        <div className="h-full transition-all duration-100"
                             style={{
                               width: `${phaseIntensity.dis * 100}%`,
                               background: '#dc2626',
                             }} />
                      </div>
                      <span className="text-[10px] font-mono text-slate-500 w-10 text-right">
                        {(phaseIntensity.dis * 100).toFixed(0)}%
                      </span>
                    </div>
                  </div>
                  <div className="mt-1 text-[9px] text-slate-400 font-mono">
                    SUC peak θ=270° (chamber growing) · DIS peak θ=90° (compression → discharge)
                  </div>
                </div>
              </div>

              {/* Derived stats */}
              <div className="bg-white border border-slate-200 rounded-lg p-4">
                <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-3">
                  Derived (P_suc=5 bar, T_suc=10°C, R290 추정)
                </div>
                <div className="grid grid-cols-3 gap-3 text-[12px]">
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">m_dot 이론</div>
                    <div className="font-mono font-bold text-slate-900">{derived.m_dot_th} <span className="text-slate-400 font-normal">kg/s</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">η_v 추정</div>
                    <div className="font-mono font-bold text-slate-900">{derived.eta_v_est}</div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">W_friction</div>
                    <div className="font-mono font-bold text-slate-900">{derived.W_friction_at_rated} <span className="text-slate-400 font-normal">W</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">A_v_in 효과</div>
                    <div className="font-mono font-bold text-slate-900">{derived.A_in_total} <span className="text-slate-400 font-normal">mm²</span></div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">η_motor × η_inv</div>
                    <div className="font-mono font-bold text-slate-900">{(eta_motor * eta_inv).toFixed(3)}</div>
                  </div>
                  <div className="border border-slate-200 rounded p-2">
                    <div className="text-slate-500 text-[10px] uppercase">V_disp</div>
                    <div className="font-mono font-bold text-slate-900">{derived.V_disp_m3} <span className="text-slate-400 font-normal">cm³</span></div>
                  </div>
                </div>
              </div>

              <div className="mt-4 text-[11px] text-slate-500 leading-relaxed">
                <div className="font-bold mb-1 text-slate-700">Chamber 1-Cycle (Bell 개념):</div>
                <div>· 체적효율 η_v: clearance + rv_in 기반 polytropic 압축</div>
                <div>· 누설: A_leak × Cd_leak × √(P_dis - P_suc), N에 따른 누설 보정</div>
                <div>· 마찰: W_f = W_f_const + α × N²</div>
                <div>· over_comp_factor: 토출 valve 늦은 열림 보정</div>
                <div>· AU_loss: 외부 열손실 (T_dis 추정에 영향)</div>
              </div>
            </div>
          </div>

          {/* Status bar (compressor-sim 스타일) */}
          <div className="bg-white border-t border-slate-200 px-6 py-2 flex items-center gap-4 text-[11px] font-mono text-slate-500 shrink-0">
            <span className="flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
              All inputs valid
            </span>
            <span className="text-slate-300">·</span>
            <span>{fluid}</span>
            <span className="text-slate-300">·</span>
            <span>{N_rated} RPM</span>
            <span className="text-slate-300">·</span>
            <span className="text-purple-600 font-semibold">On-design (Chamber 1-Cycle)</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   EEV (Electronic Expansion Valve) View
   ═══════════════════════════════════════════════════════════════════
   - 단순 isenthalpic + Cd × A 모델 시각화
   - Sidebar: parameters (mode, A_max, Cd, opening_min)
   - Main: schematic (orifice + needle + opening 표시) + m_dot vs opening curve
   ═══════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════
   EEV (Electronic Expansion Valve) View
   ═══════════════════════════════════════════════════════════════════
   다른 View들 (FinTubeHXView, CompressorView)과 완전 동일한 UI 구조:
   - flex flex-col h-screen outer + Header bar (back / title / Apply / 💾)
   - Apply panel (collapsible) — HPWD Studio / Calibration Studio
   - Save panel (collapsible) — JSON export/import + 5 slot
   - Main: 좌측 sidebar (group 별 params) + 우측 canvas (view tabs)
   - Fidelity는 L1/L2 toggle (다른 view의 fidelity 토글 패턴)
   ═══════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════
   EEV View — On-design only (L3)
   ═══════════════════════════════════════════════════════════════════
   진영님 정리:
     ✓ On-design Studio = L3 only (L1/L2 toggle 제거)
     ✓ EEV도 실제 부품 도면 (단면/조립)
     ✓ FinTubeHXView / CompressorView와 동일한 UI 패턴
   
   View tabs: Section / Front / Top (실제 도면, FinTubeHX 패턴)
   Sidebar: L3 geometry params (needle profile, angle, D_seat, stroke_max...)
   ═══════════════════════════════════════════════════════════════════ */
function EEVView({ onBack }) {
  // ── Theme (다른 view들과 동일 구조, L3 only이므로 fidelity 분기 없음) ──
  const theme = {
    title: 'EEV',
    subtitle: 'Needle cone · On-design',
    accent: 'green',
    accentText: 'text-green-600',
    tabActive: 'bg-green-600 text-white',
    applyBtn: 'bg-green-50 text-green-700 border-green-300',
    applyBtnHover: 'bg-slate-50 hover:bg-green-50 text-slate-700 border-slate-200',
    applyAction: 'bg-green-50 hover:bg-green-100 text-green-700 border-green-200',
    ringActive: 'bg-green-50 border-green-400 text-green-700',
    infoBg: 'bg-green-50 border-green-200 text-green-800',
    typeNo: 132,
    componentName: 'eev_on_design',
  };
  
  // ─── State (L3 geometry) ───
  // Material
  const [fluid, setFluid] = useState('R290');
  const [needle_material, setNeedleMaterial] = useState('SUS304');
  
  // Operating
  const [mode, setMode] = useState('control');
  const [use_choke, setUseChoke] = useState('on');
  const [use_Re_correction, setUseReCorr] = useState('on');
  
  // Geometry (L3 핵심)
  const [needle_profile, setNeedleProfile] = useState('cone');
  const [needle_angle, setNeedleAngle] = useState(30.0);  // deg (반각)
  const [D_seat_mm, setDseat] = useState(1.0);             // mm (백엔드 0.001m)
  const [stroke_max_mm, setStrokeMax] = useState(1.0);     // mm
  // D_orifice_max는 D_seat과 동일 (needle이 hole에서 빠져나오면 유효 통로 = seat hole)
  const [L_inlet_mm, setLin] = useState(30.0);             // mm (시각화)
  const [L_outlet_mm, setLout] = useState(30.0);           // mm
  const [opening_min, setOpeningMin] = useState(0.0);      // % (default 0 — 사용자가 원하면 올릴 수 있게)
  
  // Choke + Fitting
  const [choke_ratio, setChokeRatio] = useState(0.5);
  const [Cd_base, setCdBase] = useState(0.70);             // (백엔드 default)
  const [Re_transition, setReTrans] = useState(1000.0);
  const [cf_A, setCfA] = useState(1.0);
  
  // Operating conditions
  const [P_in_bar, setPin] = useState(17.0);
  const [P_out_bar, setPout] = useState(5.84);
  const [h_in_kjkg, setHin] = useState(280.0);
  const [opening_pct, setOpening] = useState(50.0);
  const [m_dot_meas_gs, setMdotMeas] = useState(15.0);
  
  // View tabs (실제 부품 도면 — 다른 view들과 동일 명명: 3D / Front / Side / Top)
  const [view, setView] = useState('3D');
  
  // Apply / Save panels
  const [applyOpen, setApplyOpen] = useState(false);
  const [saveOpen, setSaveOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');
  
  // ─── 5-slot save system ───
  const STORAGE_KEY = '_eev_slots';
  const [saves, setSaves] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { return {}; }
  });
  const fileInputRef = useRef(null);
  
  const currentParams = () => ({
    _component: 'eev',
    fluid, needle_material,
    mode, use_choke, use_Re_correction,
    needle_profile, needle_angle, D_seat_mm, stroke_max_mm,
    L_inlet_mm, L_outlet_mm, opening_min,
    choke_ratio, Cd_base, Re_transition, cf_A,
    P_in_bar, P_out_bar, h_in_kjkg, opening_pct, m_dot_meas_gs,
  });
  
  const applyParams = (data) => {
    if (data.fluid) setFluid(data.fluid);
    if (data.needle_material) setNeedleMaterial(data.needle_material);
    if (data.mode) setMode(data.mode);
    if (data.use_choke) setUseChoke(data.use_choke);
    if (data.use_Re_correction) setUseReCorr(data.use_Re_correction);
    if (data.needle_profile) setNeedleProfile(data.needle_profile);
    if (data.needle_angle !== undefined) setNeedleAngle(data.needle_angle);
    if (data.D_seat_mm !== undefined) setDseat(data.D_seat_mm);
    if (data.stroke_max_mm !== undefined) setStrokeMax(data.stroke_max_mm);
    if (data.L_inlet_mm !== undefined) setLin(data.L_inlet_mm);
    if (data.L_outlet_mm !== undefined) setLout(data.L_outlet_mm);
    if (data.opening_min !== undefined) setOpeningMin(data.opening_min);
    if (data.choke_ratio !== undefined) setChokeRatio(data.choke_ratio);
    if (data.Cd_base !== undefined) setCdBase(data.Cd_base);
    if (data.Re_transition !== undefined) setReTrans(data.Re_transition);
    if (data.cf_A !== undefined) setCfA(data.cf_A);
    if (data.P_in_bar !== undefined) setPin(data.P_in_bar);
    if (data.P_out_bar !== undefined) setPout(data.P_out_bar);
    if (data.h_in_kjkg !== undefined) setHin(data.h_in_kjkg);
    if (data.opening_pct !== undefined) setOpening(data.opening_pct);
    if (data.m_dot_meas_gs !== undefined) setMdotMeas(data.m_dot_meas_gs);
  };
  
  const saveSlot = (slot) => {
    const name = prompt(`Slot ${slot} 이름 (선택):`, `EEV ${needle_profile} D${D_seat_mm}/s${stroke_max_mm}`) || '';
    const data = { ...currentParams(), _name: name, _saved_at: new Date().toISOString() };
    const updated = { ...saves, [slot]: data };
    setSaves(updated);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); }
    catch (e) { alert('저장 실패: ' + e.message); }
  };
  const loadSlot = (slot) => {
    const data = saves[slot];
    if (!data) { alert(`Slot ${slot} 비어 있음`); return; }
    applyParams(data);
  };
  const deleteSlot = (slot) => {
    if (!saves[slot]) return;
    if (!confirm(`Slot ${slot} 삭제?`)) return;
    const updated = { ...saves };
    delete updated[slot];
    setSaves(updated);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); }
    catch (e) {}
  };
  const exportJSON = () => {
    const data = currentParams();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `eev-L3-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data._component && data._component !== 'eev') {
          alert(`다른 컴포넌트의 JSON: ${data._component}`);
          return;
        }
        applyParams(data);
      } catch (err) { alert('JSON 파싱 실패: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  
  // ── 계산 (L3 needle cone 모델) ──
  const D_seat_m = D_seat_mm * 1e-3;
  const stroke_max_m = stroke_max_mm * 1e-3;
  // A_max는 D_seat (full-open 시 needle이 hole에서 빠져나오면 유효 통로 = seat hole)
  
  const dP_actual_bar = Math.max(0.001, P_in_bar - P_out_bar);
  const dP_actual_Pa = dP_actual_bar * 1e5;
  const rho_in_approx = fluid === 'R290' ? 480 : 1100;
  const mu_in_approx = 1.5e-4;  // R290 liquid typical
  
  // A_throat from needle profile
  const compute_A = (op_frac) => {
    const op = Math.max(0, Math.min(1, op_frac));
    const stroke = stroke_max_m * op;
    const alpha_half_rad = needle_angle * Math.PI / 180;
    let A;
    if (needle_profile === 'cone') {
      A = Math.PI * D_seat_m * stroke * Math.sin(alpha_half_rad);
    } else if (needle_profile === 'parabolic') {
      A = Math.PI * D_seat_m * stroke * Math.sqrt(op) * Math.sin(alpha_half_rad);
    } else {
      A = Math.PI * D_seat_m * stroke;
    }
    // A_max = π × (D_seat/2)² — full-open 시 needle이 빠져나오면 hole 원판 면적
    const A_max = Math.PI * (D_seat_m / 2) ** 2;
    return { A: Math.min(A, A_max) * cf_A, A_unclamped: A, stroke };
  };
  
  // Choke
  const dP_effective = () => {
    if (use_choke !== 'on') return { dP_eff_Pa: dP_actual_Pa, is_choked: false };
    if (P_out_bar / P_in_bar < choke_ratio) {
      const dP_choke_Pa = P_in_bar * 1e5 * (1 - choke_ratio);
      return { dP_eff_Pa: dP_choke_Pa, is_choked: true };
    }
    return { dP_eff_Pa: dP_actual_Pa, is_choked: false };
  };
  
  // Cd with Re correction
  const compute_Cd = (Re) => {
    if (use_Re_correction !== 'on' || Re <= 0) return Cd_base;
    const f = Re / (Re + Re_transition);
    return Cd_base * (0.5 + 0.5 * f);
  };
  
  // 동작점 계산
  const opening_eff = Math.max(opening_min, Math.min(100, opening_pct));
  const { A: A_throat_m2, A_unclamped: A_unc_m2, stroke: stroke_m } = compute_A(opening_eff / 100);
  const { dP_eff_Pa, is_choked } = dP_effective();
  const dP_eff_bar = dP_eff_Pa / 1e5;
  // First-pass Cd (no Re) → m_dot 추정
  const m_dot_first = Cd_base * A_throat_m2 * Math.sqrt(2 * rho_in_approx * dP_eff_Pa);
  const D_h = A_throat_m2 > 0 ? Math.sqrt(4 * A_throat_m2 / Math.PI) : 0;
  const Re_throat = (mu_in_approx * A_throat_m2) > 0 ? m_dot_first * D_h / (mu_in_approx * A_throat_m2) : 0;
  const Cd_eff = compute_Cd(Re_throat);
  const m_dot_calc_gs = Cd_eff * A_throat_m2 * Math.sqrt(2 * rho_in_approx * dP_eff_Pa) * 1000;
  
  // Measure 역산 (bisection)
  let opening_calc_from_meas = 0;
  if (m_dot_meas_gs > 0 && rho_in_approx > 0) {
    let lo = opening_min, hi = 100;
    for (let i = 0; i < 40; i++) {
      const mid = (lo + hi) / 2;
      const { A: A_t } = compute_A(mid / 100);
      const m_first = Cd_base * A_t * Math.sqrt(2 * rho_in_approx * dP_eff_Pa);
      const Dh_t = A_t > 0 ? Math.sqrt(4 * A_t / Math.PI) : 0;
      const Re_t = (mu_in_approx * A_t) > 0 ? m_first * Dh_t / (mu_in_approx * A_t) : 0;
      const Cd_t = compute_Cd(Re_t);
      const m_t = Cd_t * A_t * Math.sqrt(2 * rho_in_approx * dP_eff_Pa) * 1000;
      if (m_t < m_dot_meas_gs) lo = mid; else hi = mid;
      if (Math.abs(hi - lo) < 0.001) break;
    }
    opening_calc_from_meas = (lo + hi) / 2;
  }
  
  const display_m_dot_gs = mode === 'control' ? m_dot_calc_gs : m_dot_meas_gs;
  const display_opening = mode === 'control' ? opening_eff : opening_calc_from_meas;
  
  // ── Apply ──
  const buildBackendParams = () => ({
    fluid, needle_material,
    mode, use_choke, use_Re_correction,
    needle_profile, needle_angle,
    D_seat: D_seat_m, stroke_max: stroke_max_m,
    L_inlet: L_inlet_mm * 1e-3, L_outlet: L_outlet_mm * 1e-3, opening_min,
    choke_ratio, Cd_base, Re_transition, cf_A,
  });
  const applyToHPWD = () => {
    const payload = {
      component: theme.componentName, typeNo: theme.typeNo,
      params: buildBackendParams(), sourceParams: currentParams(),
      _timestamp: new Date().toISOString(), _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg(`✓ HPWD Studio로 적용됨. typeNo ${theme.typeNo} 컴포넌트 추가 시 자동 적용.`);
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) { setApplyMsg('✗ ' + e.message); }
  };
  const applyToCalibration = () => {
    const payload = {
      component: theme.componentName, typeNo: theme.typeNo,
      params: buildBackendParams(), sourceParams: currentParams(),
      _timestamp: new Date().toISOString(), _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg(`✓ Calibration Studio로 적용됨 (typeNo ${theme.typeNo}).`);
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) { setApplyMsg('✗ ' + e.message); }
  };
  
  // ─── Validation ───
  const validation = useMemo(() => {
    const errs = [];
    if (D_seat_mm <= 0 || D_seat_mm > 10) errs.push({ level: 'warn', msg: `D_seat ${D_seat_mm}mm — 보통 1~3mm (R290 EEV)` });
    if (needle_angle < 5 || needle_angle > 60) errs.push({ level: 'warn', msg: `needle_angle ${needle_angle}° — 보통 15~45°` });
    if (stroke_max_mm <= 0 || stroke_max_mm > 5) errs.push({ level: 'warn', msg: `stroke_max ${stroke_max_mm}mm — 보통 0.5~2mm` });
    if (Cd_base < 0.4 || Cd_base > 0.95) errs.push({ level: 'warn', msg: `Cd_base ${Cd_base} — 0.6~0.8 권장` });
    if (P_out_bar >= P_in_bar) errs.push({ level: 'error', msg: 'P_out ≥ P_in — 팽창 안 일어남' });
    return errs;
  }, [D_seat_mm, needle_angle, stroke_max_mm, Cd_base, P_in_bar, P_out_bar]);
  
  // ════════════════════════════════════════════════════════════════
  // SectionView — 실제 부품 단면도 (가장 중요한 view)
  // ════════════════════════════════════════════════════════════════
  const SectionView = () => {
    // 좌표: mm 단위, viewBox로 SVG 스케일
    const W = 600, H = 320;
    const padX = 40, cyEEV = H / 2;
    
    // EEV body 크기 (시각화 — 실제 부품 비율보다 보기 좋게)
    const bodyW = 200, bodyH = 240;
    const bodyX = (W - bodyW) / 2;
    const bodyY = cyEEV - bodyH / 2;
    
    // Seat geometry (단면)
    const cxBody = W / 2;
    // Seat 단면 — pipe inlet hole
    const seatTop = cyEEV + 20;  // seat 위치 (body 하부)
    const seatHole_half = D_seat_mm * 8;  // 8x zoom factor (mm → px)
    
    // Needle (cone) 위치
    // opening 0%: needle tip이 seat bottom (hole 안 가장 깊이, CLOSED)
    // opening 100%: needle tip이 seat top 위로 stroke_max만큼 (FULLY OPEN)
    const seatThickness_mm = D_seat_mm * 0.4;  // 3D view와 동일 비율
    const seatThickness_px = seatThickness_mm * 8;  // mm → px (8x zoom)
    const seatBottom = seatTop + seatThickness_px;
    const stroke_max_px = stroke_max_mm * 8;
    const totalTravel_px = seatThickness_px + stroke_max_px;
    
    const op_frac = Math.max(0, Math.min(1, opening_eff / 100));
    // SVG: Y가 아래로 증가 → seat bottom (큰 Y) 에서 위로 (작은 Y) 이동
    const needleTipY = seatBottom - op_frac * totalTravel_px;
    
    const needle_angle_rad = needle_angle * Math.PI / 180;
    const coneBase_half = seatHole_half * 1.6;  // needle base (cone)
    const coneHeight = coneBase_half / Math.tan(needle_angle_rad);
    const needleBaseY = needleTipY - coneHeight;
    
    // Stem (needle shaft)
    const stemW = seatHole_half * 0.6;
    const stemTopY = bodyY - 20;
    
    return (
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full bg-white">
        <defs>
          <linearGradient id="liquidGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stopColor="#a78bfa"/>
            <stop offset="1" stopColor="#c4b5fd"/>
          </linearGradient>
          <linearGradient id="twoPhaseGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stopColor="#fbbf24"/>
            <stop offset="1" stopColor="#fde68a"/>
          </linearGradient>
          <pattern id="hatchEEV" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#94a3b8" strokeWidth="0.5"/>
          </pattern>
        </defs>
        
        {/* Inlet pipe (subcool liquid 보라) */}
        <rect x={padX} y={cyEEV - 30} width={bodyX - padX} height="20" 
              fill="url(#liquidGrad)" stroke="#7c3aed" strokeWidth="1"/>
        <text x={padX + 5} y={cyEEV - 35} fontSize="9" fontFamily="monospace" fill="#7c3aed" fontWeight="bold">
          P_in={P_in_bar.toFixed(1)} bar
        </text>
        <text x={padX + 5} y={cyEEV - 22} fontSize="8" fontFamily="monospace" fill="#7c3aed">
          subcool liquid
        </text>
        
        {/* EEV body 외곽 (단면) */}
        <rect x={bodyX} y={bodyY} width={bodyW} height={bodyH}
              fill="url(#hatchEEV)" stroke="#475569" strokeWidth="2" rx="4"/>
        <rect x={bodyX} y={bodyY} width={bodyW} height={bodyH}
              fill="none" stroke="#1e293b" strokeWidth="2.5" rx="4"/>
        
        {/* Internal cavity */}
        <rect x={bodyX + 25} y={bodyY + 30} width={bodyW - 50} height={bodyH - 60}
              fill="#fff" stroke="#475569" strokeWidth="1.5" strokeDasharray="3 2"/>
        
        {/* Stem (needle shaft) — 위로 올라감 */}
        <rect x={cxBody - stemW/2} y={stemTopY} width={stemW} height={needleBaseY - stemTopY}
              fill="#64748b" stroke="#1e293b" strokeWidth="1.5"/>
        
        {/* Needle (cone) */}
        <polygon
          points={`${cxBody - coneBase_half},${needleBaseY} ${cxBody + coneBase_half},${needleBaseY} ${cxBody},${needleTipY}`}
          fill="#64748b" stroke="#1e293b" strokeWidth="1.5"/>
        
        {/* Seat (단면) */}
        <rect x={bodyX + 25} y={seatTop} width={bodyW - 50} height={seatThickness_px}
              fill="#94a3b8" stroke="#1e293b" strokeWidth="1.5"/>
        {/* Seat orifice (gap) */}
        <rect x={cxBody - seatHole_half} y={seatTop} width={seatHole_half * 2} height={seatThickness_px}
              fill="#fff" stroke="#dc2626" strokeWidth="1.5"/>
        
        {/* Outlet pipe (2-phase 노랑) */}
        <rect x={bodyX + 30} y={seatTop + seatThickness_px} width={bodyW - 60} height="15"
              fill="url(#twoPhaseGrad)" stroke="#d97706" strokeWidth="1"/>
        <rect x={cxBody - 10} y={seatTop + seatThickness_px + 15} width="20" height={bodyY + bodyH - (seatTop + seatThickness_px + 15)}
              fill="url(#twoPhaseGrad)" stroke="#d97706" strokeWidth="1"/>
        <rect x={cxBody - 30} y={bodyY + bodyH} width="60" height="15"
              fill="url(#twoPhaseGrad)" stroke="#d97706" strokeWidth="1"/>
        <text x={cxBody + 35} y={bodyY + bodyH + 12} fontSize="9" fontFamily="monospace" fill="#d97706" fontWeight="bold">
          P_out={P_out_bar.toFixed(2)} bar
        </text>
        
        {/* Stroke dimension line */}
        <g stroke="#0891b2" strokeWidth="1">
          <line x1={cxBody - coneBase_half - 30} y1={needleTipY} x2={cxBody - coneBase_half - 10} y2={needleTipY}/>
          <line x1={cxBody - coneBase_half - 30} y1={seatTop} x2={cxBody - coneBase_half - 10} y2={seatTop}/>
          <line x1={cxBody - coneBase_half - 20} y1={needleTipY} x2={cxBody - coneBase_half - 20} y2={seatTop}
                markerStart="url(#arrowDown)" markerEnd="url(#arrowUp)"/>
        </g>
        <text x={cxBody - coneBase_half - 60} y={(needleTipY + seatTop) / 2 + 3} fontSize="10" fontFamily="monospace" fill="#0891b2" fontWeight="bold">
          stroke
        </text>
        <text x={cxBody - coneBase_half - 60} y={(needleTipY + seatTop) / 2 + 16} fontSize="9" fontFamily="monospace" fill="#0891b2">
          {(stroke_m * 1000).toFixed(3)} mm
        </text>
        
        {/* D_seat dimension */}
        <g stroke="#dc2626" strokeWidth="1">
          <line x1={cxBody - seatHole_half} y1={seatBottom + 10} x2={cxBody + seatHole_half} y2={seatBottom + 10}/>
          <line x1={cxBody - seatHole_half} y1={seatBottom + 8} x2={cxBody - seatHole_half} y2={seatBottom + 12}/>
          <line x1={cxBody + seatHole_half} y1={seatBottom + 8} x2={cxBody + seatHole_half} y2={seatBottom + 12}/>
        </g>
        <text x={cxBody} y={seatBottom + 24} fontSize="9" fontFamily="monospace" fill="#dc2626" fontWeight="bold" textAnchor="middle">
          D_seat = {D_seat_mm} mm
        </text>
        
        {/* Needle angle dimension */}
        <g stroke="#7c3aed" strokeWidth="0.5" fill="none">
          <path d={`M ${cxBody} ${needleTipY - 20} A 20 20 0 0 0 ${cxBody + 20 * Math.sin(needle_angle_rad)} ${needleTipY - 20 + 20 * Math.cos(needle_angle_rad)}`}/>
        </g>
        <text x={cxBody + 25} y={needleTipY - 12} fontSize="9" fontFamily="monospace" fill="#7c3aed" fontWeight="bold">
          α/2 = {needle_angle.toFixed(0)}°
        </text>
        
        {/* Flow arrows */}
        <text x={padX + 50} y={cyEEV - 15} fontSize="16" fill="#7c3aed" fontWeight="bold">→</text>
        <text x={cxBody + 70} y={bodyY + bodyH + 12} fontSize="16" fill="#d97706" fontWeight="bold">→</text>
        
        {/* RESULT box */}
        <g transform={`translate(${W - 160}, 10)`}>
          <rect x="0" y="0" width="150" height="85" fill="#f8fafc" stroke="#cbd5e1" rx="4"/>
          <text x="8" y="16" fontSize="9" fontFamily="monospace" fill="#64748b" fontWeight="bold">RESULT (L3)</text>
          <text x="8" y="32" fontSize="11" fontFamily="monospace" fill="#16a34a" fontWeight="bold">
            ṁ = {display_m_dot_gs.toFixed(2)} g/s
          </text>
          <text x="8" y="46" fontSize="11" fontFamily="monospace" fill="#0891b2" fontWeight="bold">
            op = {display_opening.toFixed(1)}%
          </text>
          <text x="8" y="58" fontSize="9" fontFamily="monospace" fill="#7c3aed">
            A_throat = {(A_throat_m2*1e6).toFixed(3)} mm²
          </text>
          <text x="8" y="70" fontSize="9" fontFamily="monospace" fill="#7c3aed">
            Cd_eff = {Cd_eff.toFixed(3)}
          </text>
          <text x="8" y="82" fontSize="8" fontFamily="monospace" fill={is_choked ? '#d97706' : '#64748b'}>
            {is_choked ? `CHOKED (ΔP_eff=${dP_eff_bar.toFixed(1)})` : `ΔP=${dP_actual_bar.toFixed(2)} bar`}
          </text>
        </g>
        
        <defs>
          <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
            <path d="M 0 6 L 4 0 L 8 6 z" fill="#0891b2"/>
          </marker>
          <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
            <path d="M 0 2 L 4 8 L 8 2 z" fill="#0891b2"/>
          </marker>
        </defs>
      </svg>
    );
  };
  
  // ════════════════════════════════════════════════════════════════
  // FrontView — 정면 외관 (orifice 원형 = D_seat)
  // ════════════════════════════════════════════════════════════════
  const FrontView = () => {
    const W = 600, H = 320;
    const cx = W / 2, cy = H / 2;
    const bodyR = 80;
    const seat_r = D_seat_mm * 12;  // 12x zoom (seat = orifice 가장자리)
    
    return (
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full bg-white">
        {/* Body outline (front view = circle) */}
        <circle cx={cx} cy={cy} r={bodyR} fill="#f1f5f9" stroke="#475569" strokeWidth="2.5"/>
        
        {/* Seat ring (= orifice hole) */}
        <circle cx={cx} cy={cy} r={seat_r} fill="#fef3c7" stroke="#dc2626" strokeWidth="1.5"/>
        <text x={cx + seat_r + 4} y={cy + 4} fontSize="9" fontFamily="monospace" fill="#dc2626" fontWeight="bold">
          D_seat = orifice = {D_seat_mm}mm
        </text>
        
        {/* Needle center — 위에서 본 cone 단면 (seat top 평면에서 자른) */}
        {/* opening 0%: needle tip이 seat bottom → cone 단면이 hole 가득
            opening 100%: needle tip이 seat top 위로 stroke_max → cone이 hole 평면에 닿지 않음 */}
        {(() => {
          // needle tip 위치 (seat top 기준 상대값 in mm)
          // tip이 seat bottom일 때: -seatThickness (mm)
          // tip이 seat top일 때: 0
          // tip이 seat top 위 stroke_max일 때: +stroke_max
          const seatThickness_mm = D_seat_mm * 0.4;  // approximate (실제 EEV typical)
          const totalTravel_mm = seatThickness_mm + stroke_max_mm;
          const op_frac = Math.max(0, Math.min(1, opening_eff / 100));
          // tip이 seat top에서 얼마나 위에 있는가 (음수면 hole 안)
          const tipAboveSeatTop_mm = -seatThickness_mm + op_frac * totalTravel_mm;
          
          // cone radius at seat top plane (mm)
          // cone apex at tip, base widens upward
          // base radius = (D_seat/2) × 1.6 (Side view와 동일)
          const coneBaseR_mm = (D_seat_mm / 2) * 1.6;
          const alpha_half_rad = needle_angle * Math.PI / 180;
          const coneHeight_mm = coneBaseR_mm / Math.tan(alpha_half_rad);
          
          let cone_r_at_seat_mm;
          if (tipAboveSeatTop_mm >= 0) {
            // tip이 seat top 위 → seat top 평면이 cone 아래쪽 → 단면 없음
            cone_r_at_seat_mm = 0;
          } else {
            // tip이 seat top 아래 (hole 안 또는 그 아래)
            // d_from_tip = |tipAboveSeatTop_mm|
            const d_from_tip = -tipAboveSeatTop_mm;
            cone_r_at_seat_mm = Math.min(coneBaseR_mm, (d_from_tip / coneHeight_mm) * coneBaseR_mm);
          }
          
          // 시각화: hole (D_seat/2)을 안 넘게 cap
          const visible_r_mm = Math.min(D_seat_mm / 2, cone_r_at_seat_mm);
          const visible_r_px = visible_r_mm * 24;  // 12x zoom for radius × 2 (consistent w/ seat_r)
          
          return visible_r_px > 0.5 ? (
            <circle cx={cx} cy={cy} r={visible_r_px} fill="#64748b" stroke="#1e293b" strokeWidth="1"/>
          ) : null;
        })()}
        
        {/* Body outer label */}
        <text x={cx} y={cy - bodyR - 8} fontSize="10" fontFamily="monospace" fill="#475569" textAnchor="middle" fontWeight="bold">
          EEV Body (front)
        </text>
        <text x={cx} y={cy + bodyR + 18} fontSize="9" fontFamily="monospace" fill="#475569" textAnchor="middle">
          opening = {opening_eff.toFixed(0)}% · A_throat = {(A_throat_m2*1e6).toFixed(3)} mm²
        </text>
        
        {/* Legend */}
        <g transform="translate(20, 20)">
          <rect x="0" y="0" width="160" height="65" fill="#f8fafc" stroke="#cbd5e1" rx="4"/>
          <text x="8" y="14" fontSize="9" fontFamily="monospace" fill="#64748b" fontWeight="bold">LEGEND</text>
          <circle cx="14" cy="30" r="5" fill="#fef3c7" stroke="#dc2626"/>
          <text x="24" y="34" fontSize="9" fontFamily="monospace" fill="#475569">Orifice (= seat hole)</text>
          <circle cx="14" cy="48" r="4" fill="#64748b"/>
          <text x="24" y="52" fontSize="9" fontFamily="monospace" fill="#475569">Needle cross-section</text>
        </g>
      </svg>
    );
  };
  
  // ════════════════════════════════════════════════════════════════
  // TopView — 위에서 본 도면 (조립)
  // ════════════════════════════════════════════════════════════════
  const TopView = () => {
    const W = 600, H = 320;
    const cx = W / 2, cy = H / 2;
    
    // Top view: needle stem + valve body silhouette
    const bodyW = 160, bodyH = 80;
    const bodyX = cx - bodyW/2, bodyY = cy - bodyH/2;
    const stem_r = D_seat_mm * 5;
    
    return (
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full bg-white">
        {/* Body silhouette (top view = rect with rounded) */}
        <rect x={bodyX} y={bodyY} width={bodyW} height={bodyH}
              fill="#f1f5f9" stroke="#475569" strokeWidth="2.5" rx="8"/>
        
        {/* Stem center (needle motor stem from top) */}
        <circle cx={cx} cy={cy} r={stem_r * 1.5} fill="#94a3b8" stroke="#1e293b" strokeWidth="1.5"/>
        <text x={cx} y={cy + 3} fontSize="9" fontFamily="monospace" fill="#fff" textAnchor="middle" fontWeight="bold">
          Stem
        </text>
        
        {/* Inlet/outlet ports (perpendicular pipes from above) */}
        <rect x={bodyX - 40} y={cy - 10} width="40" height="20" fill="url(#liquidGrad)" stroke="#7c3aed" strokeWidth="1.5"/>
        <text x={bodyX - 38} y={cy - 14} fontSize="8" fontFamily="monospace" fill="#7c3aed" fontWeight="bold">IN</text>
        
        <rect x={bodyX + bodyW} y={cy - 10} width="40" height="20" fill="url(#twoPhaseGrad)" stroke="#d97706" strokeWidth="1.5"/>
        <text x={bodyX + bodyW + 30} y={cy - 14} fontSize="8" fontFamily="monospace" fill="#d97706" fontWeight="bold">OUT</text>
        
        {/* Motor housing (if any, sketched from top) */}
        <circle cx={cx} cy={cy} r={stem_r * 3} fill="none" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3 3"/>
        <text x={cx} y={cy - stem_r * 3 - 5} fontSize="8" fontFamily="monospace" fill="#94a3b8" textAnchor="middle">
          Stepper motor housing
        </text>
        
        {/* Dimensions */}
        <g stroke="#0891b2" strokeWidth="1">
          <line x1={bodyX} y1={bodyY - 15} x2={bodyX + bodyW} y2={bodyY - 15}/>
          <line x1={bodyX} y1={bodyY - 12} x2={bodyX} y2={bodyY - 18}/>
          <line x1={bodyX + bodyW} y1={bodyY - 12} x2={bodyX + bodyW} y2={bodyY - 18}/>
        </g>
        <text x={cx} y={bodyY - 22} fontSize="9" fontFamily="monospace" fill="#0891b2" textAnchor="middle" fontWeight="bold">
          Body length
        </text>
        
        <text x={cx} y={bodyY + bodyH + 20} fontSize="9" fontFamily="monospace" fill="#475569" textAnchor="middle">
          EEV — Top view (조립 도면)
        </text>
      </svg>
    );
  };
  
  // ════════════════════════════════════════════════════════════════
  // Render
  // ════════════════════════════════════════════════════════════════
  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* ─── Header ─── */}
      <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-4 shrink-0">

        </button>
        <span className="text-slate-300">|</span>
        <span className={`text-base ${theme.accentText}`}>◆</span>
        <span className="font-bold text-slate-900 text-[15px]">{theme.title}</span>
        <span className="text-[11px] font-mono text-slate-400">{theme.subtitle}</span>
        <span className="text-[10px] font-mono text-slate-400 ml-2">typeNo {theme.typeNo}</span>
        
        <div className="flex-1"></div>
        
        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? `border ${theme.applyBtn}` : `border ${theme.applyBtnHover}`

          title="다른 Studio로 적용">↗ Apply</button>
        
        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'

          title="Save / Load">💾</button>
      </div>
      
      {/* ─── Apply panel ─── */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">

            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Apply Design</div>
              <div className="text-[10px] text-slate-400 font-mono">현재 설계를 다른 Studio로 동기화 (Run은 해당 Studio에서)</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className={`flex-1 px-3 py-2 ${theme.applyAction} border rounded text-[12px] font-semibold flex items-center justify-center gap-1.5`}>
                <span>↗</span> HPWD Studio (typeNo {theme.typeNo})
              </button>
              <button onClick={() => applyToCalibration()}

      {saveOpen && (

              <button onClick={() => fileInputRef.current?.click()}

            <div className="text-[10px] text-slate-500 font-mono uppercase mb-1.5">Save Slots (브라우저 localStorage)</div>
            <div className="space-y-1">
              {[1, 2, 3, 4, 5].map(slot => {
                const s = saves[slot];

                return (
                  <div key={slot} className="flex items-center gap-2">

                    <div className={`flex-1 px-2.5 py-1 rounded border text-[11px] font-mono truncate ${

                    {!isEmpty && <>

                      <button onClick={() => deleteSlot(slot)} className="px-2 py-0.5 text-[11px] bg-red-100 hover:bg-red-200 text-red-700 rounded font-semibold">×</button>
                    </>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
      
      {/* ─── Main: sidebar + canvas ─── */}
      <div className="flex flex-1 overflow-hidden">
        {/* Sidebar — FinTubeHX/Compressor와 동일 스타일 (SidebarSection + Slider + ButtonGroup) */}
        <div className="w-72 bg-white border-r border-slate-200 overflow-y-auto p-3">
          
          <SidebarSection title="MATERIAL">
            <div className="text-[11px] text-slate-600 mb-1.5">Fluid</div>
            <ButtonGroup options={['R290', 'R134a', 'R410A', 'R32', 'R1234yf']}
              value={fluid} onChange={setFluid} />
            <div className="text-[11px] text-slate-600 mb-1.5 mt-3">Needle material</div>
            <ButtonGroup options={['SUS304', 'SUS316', 'Brass', 'Steel']}
              value={needle_material} onChange={setNeedleMaterial} />
          </SidebarSection>
          
          <SidebarSection title="OPERATING MODE">
            <ButtonGroup options={['control', 'measure']} value={mode} onChange={setMode} />
            <div className="text-[10px] text-slate-400 mt-1.5 leading-relaxed">
              {mode === 'control' 
                ? 'control: opening % → ṁ 계산' 
                : 'measure: ṁ 측정값 → opening % 역산'}
            </div>
          </SidebarSection>
          
          <SidebarSection title="OPERATING CONDITIONS">
            <Slider label="P_in"  sublabel="[bar]" value={P_in_bar}  min={5}  max={40} step={0.1} decimals={1} onChange={setPin}  color="purple" />
            <Slider label="P_out" sublabel="[bar]" value={P_out_bar} min={1}  max={20} step={0.1} decimals={1} onChange={setPout} color="amber" />
            <Slider label="h_in"  sublabel="[kJ/kg]" value={h_in_kjkg} min={200} max={350} step={1} decimals={0} onChange={setHin} color="cyan" />
            {mode === 'control' ? (
              <Slider label="opening" sublabel="[%]" value={opening_pct} min={0} max={100} step={1} decimals={0} onChange={setOpening} color="green" />
            ) : (
              <Slider label="ṁ_meas" sublabel="[g/s]" value={m_dot_meas_gs} min={0.1} max={100} step={0.1} decimals={1} onChange={setMdotMeas} color="green" />
            )}
          </SidebarSection>
          
          <SidebarSection title="GEOMETRY">
            <div className="text-[11px] text-slate-600 mb-1.5">Needle profile</div>
            <ButtonGroup options={['cone', 'parabolic', 'linear']}

              <Slider label="D_seat" sublabel="[mm] = orifice" value={D_seat_mm} min={0.5} max={5}  step={0.1} decimals={1} onChange={setDseat} color="cyan" />

        {/* Main canvas */}

              <div>• Choke: P_out/P_in &lt; ratio → ΔP_eff = P_in × (1 - ratio)</div>
              <div className="mt-1 text-slate-500">
                💡 4 views: <b>3D</b> (Three.js drag/zoom) · <b>Front</b> (정면 orifice) · <b>Side</b> (단면 needle/seat) · <b>Top</b> (조립도)
              </div>
              <div className="text-slate-500">
                L1 (130, 단순 Cd 상수) / L2 (131, Cv polynomial)는 HPWD Studio canvas + Calibration Studio에서 활용
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [selected, setSelected] = useState(() => {
    // 딥링크: URL ?part=xxx 로 특정 부품 바로 열기 (Cycle Runner에서 링크)
    try {
      const part = new URLSearchParams(window.location.search).get('part');
      const valid = ['evaporator', 'condenser', 'compressor', 'eev', 'fan', 'drum', 'filter'];
      return valid.includes(part) ? part : null;
    } catch (e) { return null; }
  });

  // System view
  if (!selected) {
    return (
      <div className="min-h-screen bg-slate-50">
        {/* Header */}
        <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-4">
          <AppSwitcher current="on-design-studio" />
          <div className="text-[11px] text-slate-500">On-design 모델 설계</div>
          <div className="flex-1"></div>
          <BackendStatus />
        </div>
        <SystemView onSelect={setSelected} />
      </div>
    );
  }

  // Component view
  if (selected === 'evaporator') {
    return <FinTubeHXView mode="evap" onBack={() => setSelected(null)} />;
  }
  if (selected === 'condenser') {
    return <FinTubeHXView mode="cond" onBack={() => setSelected(null)} />;
  }
  if (selected === 'compressor') {
    return <CompressorView onBack={() => setSelected(null)} />;
  }
  if (selected === 'eev') {
    return <EEVView onBack={() => setSelected(null)} />;
  }
  if (selected === 'fan') {
    return <FanView onBack={() => setSelected(null)} />;
  }
  if (selected === 'drum') {
    return <DrumView onBack={() => setSelected(null)} />;
  }
  if (selected === 'filter') {
    return <FilterView onBack={() => setSelected(null)} />;
  }

  return (
    <div className="p-8 text-center">
      <div className="text-slate-500">아직 지원되지 않는 부품: {selected}</div>
      <button onClick={() => setSelected(null)} className="mt-4 text-blue-600 hover:underline">
        ← 부품 목록으로
      </button>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));

</script>

<script>
  function setStatus(msg, isError) {
    const el = document.getElementById('load-status');
    if (el) {
      el.textContent = msg;
      if (isError) el.style.color = '#dc2626';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setStatus('1/3 — 라이브러리 확인 중...');
    const checks = [];
    if (typeof React === 'undefined') checks.push('React');
    if (typeof ReactDOM === 'undefined') checks.push('ReactDOM');
    if (typeof Babel === 'undefined') checks.push('Babel');
    if (checks.length > 0) {
      showError('CDN 로드 실패: ' + checks.join(', ') + '\n\n인터넷 연결 또는 회사 네트워크 확인 — CDN(unpkg.com) 차단 가능성');
      return;
    }

    setStatus('2/3 — Babel JSX 컴파일 중...');
    const jsxText = document.getElementById('app-jsx').textContent;
    let compiled;
    try {
      const result = Babel.transform(jsxText, {
        presets: [['react', { runtime: 'classic' }]],
        filename: 'app.jsx',
      });
      compiled = result.code;
      console.log('[Studio] Compiled', compiled.length, 'chars');
    } catch (e) {
      showError('Babel 컴파일 에러:\n' + e.message);
      return;
    }

    setStatus('3/3 — React 마운트 중...');
    try {
      new Function(compiled)();
      console.log('[Studio] Mounted');
    } catch (e) {
      showError('실행 에러:\n' + (e.stack || e.message));
    }
  });
</script>
<!-- ╔═ GUI 업데이트 버튼 (프레임워크 무관, /api/update 호출) ═╗ -->
<script>
(function () {
  if (window.__hpwdUpdateWidget) return; window.__hpwdUpdateWidget = true;
  var backend = function () {
    try { return localStorage.getItem('hpwd_backend_url') || 'http://localhost:8010'; }
    catch (e) { return 'http://localhost:8010'; }
  };
  // ── 버튼 ──
  var btn = document.createElement('button');
  btn.textContent = '↻ 업데이트';
  btn.title = '서버 레포를 git pull --ff-only 로 갱신';
  Object.assign(btn.style, {
    position: 'fixed', right: '16px', bottom: '16px', zIndex: 99999,
    padding: '9px 14px', borderRadius: '10px', border: '1px solid #cbd5e1',
    background: '#0f172a', color: '#fff', font: "600 12px 'JetBrains Mono',monospace",
    cursor: 'pointer', boxShadow: '0 4px 14px rgba(0,0,0,.18)', letterSpacing: '.3px'
  });
  btn.onmouseenter = function () { btn.style.background = '#1e293b'; };
  btn.onmouseleave = function () { btn.style.background = '#0f172a'; };
  // ── 토스트 ──
  var toast = document.createElement('div');
  Object.assign(toast.style, {
    position: 'fixed', right: '16px', bottom: '62px', zIndex: 99999,
    maxWidth: '360px', padding: '12px 14px', borderRadius: '10px',
    background: '#fff', color: '#1a1a2e', border: '1px solid #e2e8f0',
    font: "500 12px/1.5 'Pretendard',system-ui,sans-serif",
    boxShadow: '0 6px 20px rgba(0,0,0,.14)', display: 'none', whiteSpace: 'pre-wrap'
  });
  function show(html, color) {
    toast.style.display = 'block';
    toast.style.borderLeft = '4px solid ' + (color || '#2563EB');
    toast.innerHTML = html;
  }
  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  btn.onclick = async function () {
    btn.disabled = true; btn.style.opacity = .6;
    show('레포 업데이트 확인 중…', '#2563EB');
    try {
      var res = await fetch(backend().replace(/\/$/, '') + '/api/update', { method: 'POST' });
      var d = null; try { d = await res.json(); } catch (e2) {}
      if (!res.ok || !d || !d.status) {
        show((res.status === 404 || res.status === 405)
          ? '서버 코드가 옛 버전이라 /api/update 없음 (HTTP ' + res.status + ').<br>서버 디렉토리에서 git pull 후 재시작 필요 (≥ c1d050b).'
          : '예상치 못한 응답 (HTTP ' + res.status + ').', '#DC2626');
      } else if (d.status === 'up_to_date') {
        show('✓ 이미 최신입니다.', '#059669');
      } else if (d.status === 'updated') {
        var msg = '✓ ' + esc(d.message);
        if (d.backend_changed) msg += '<br><b style="color:#D97706">서버(.py) 변경 — python server.py 재시작 필요</b>';
        if (d.frontend_changed) msg += '<br><button id="__hpwdReload" style="margin-top:8px;padding:6px 12px;border:0;border-radius:8px;background:#2563EB;color:#fff;font:600 11px monospace;cursor:pointer">새로고침</button>';
        show(msg, '#059669');
        var rb = document.getElementById('__hpwdReload');
        if (rb) rb.onclick = function () { location.reload(true); };
      } else if (d.status === 'dirty') {
        show('⚠ 로컬에 커밋 안 된 변경이 있어 자동 업데이트 불가.<br>변경 commit/되돌린 뒤 재시도.<br><span style="font:400 10px monospace;color:#64748b">' + esc((d.changed_files||[]).slice(0,6).join(', ')) + '</span>', '#DC2626');
      } else if (d.status === 'no_git') {
        show('수동 설치본(git 아님) — 자동 업데이트 불가.', '#D97706');
      } else {
        show('업데이트 실패: ' + esc(d.message), '#DC2626');
      }
    } catch (e) {
      show('서버 연결 실패 — 백엔드 실행/주소 확인 (' + esc(backend()) + ').', '#DC2626');
    } finally {
      btn.disabled = false; btn.style.opacity = 1;
      clearTimeout(window.__hpwdToastT);
      window.__hpwdToastT = setTimeout(function () { toast.style.display = 'none'; }, 12000);
    }
  };
  function mount() { document.body.appendChild(toast); document.body.appendChild(btn); }
  if (document.body) mount(); else document.addEventListener('DOMContentLoaded', mount);
})();
</script>

</body>

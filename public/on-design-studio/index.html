<!-- Global error catcher (흰화면 대신 메시지 표시) -->
<script>
  function showError(msg) {
    const el = document.getElementById('load-error');
    const status = document.getElementById('load-status');
    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
    }
    if (status) status.style.color = '#dc2626';
    console.error('[Studio]', msg);
  }
  window.addEventListener('error', e => {
    showError('JS Error: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Promise rejection: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

const { useState, useEffect, useMemo, useRef } = React;

/* ═══════════════════════════════════════════════════════════════════
   On-Design Studio — On-design 모델 설계 전용 앱
   ─────────────────────────────────────────────────────────────────
   현재 앱은 Calibration Studio와 별도로 on-design 모델만 다룸.
   각 부품마다 sidebar (geometry/material/circuit) + main (Model design 시각화).

/* ───────── Backend URL (HPWD Studio와 공유) ───────── */
const DEFAULT_BACKENDS = {
  cloud: 'https://hpwd-studio-task-production.up.railway.app',
  local: 'http://localhost:8000',
};

function resolveBackendUrl() {
  try {
    const param = new URLSearchParams(window.location.search).get('backend');
    if (param) return param;
  } catch (e) {}
  try {
    const stored = localStorage.getItem('hpwd_backend_url');
    if (stored) return stored;
  } catch (e) {}
  const host = window.location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || host === '' || host === 'file') {
    return DEFAULT_BACKENDS.local;
  }
  return DEFAULT_BACKENDS.cloud;
}

let CURRENT_BACKEND = resolveBackendUrl();
function setBackend(u) { CURRENT_BACKEND = u; try { localStorage.setItem('hpwd_backend_url', u); } catch (e) {} }
function resetBackend() { try { localStorage.removeItem('hpwd_backend_url'); } catch (e) {} CURRENT_BACKEND = resolveBackendUrl(); }

async function api(path, options = {}) {
  const res = await fetch(CURRENT_BACKEND + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.json();
}

/* ───────── App Switcher (4개 앱) ───────── */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const apps = [
    { id: 'studio',             label: 'HPWD Studio',         desc: '시뮬 캔버스',            href: '/' },
    { id: 'component-studio',   label: 'Component Studio',    desc: '컴포넌트 작성',          href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio',  desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',    desc: 'On-design 모델 설계',    href: '/on-design-studio/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors">
        <div className="w-2 h-2 rounded-sm bg-blue-600 shrink-0"></div>
        <span className="font-bold text-slate-900 tracking-wide text-sm">{active.label}</span>
        <span className="text-slate-400 text-[10px]">▾</span>
      </button>
      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-60 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-blue-50 cursor-default' : 'hover:bg-slate-50'
                }`}>
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-blue-700' : 'text-slate-300'}`}>
                  {isActive ? '●' : '○'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-blue-900' : 'text-slate-800'}`}>{a.label}</div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ───────── BackendStatus ───────── */
function BackendStatus() {
  const [url, setUrl] = useState(CURRENT_BACKEND);
  const [open, setOpen] = useState(false);
  const [editUrl, setEditUrl] = useState(url);
  const [status, setStatus] = useState('checking');
  const [errMsg, setErrMsg] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    setStatus('checking');
    fetch(url + '/health', { method: 'GET' })
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(body => {
        if (body && body.status === 'ok') setStatus('ok');
        else { setStatus('partial'); setErrMsg('unexpected response'); }
      })
      .catch(e => { setStatus('fail'); setErrMsg(String(e)); });
  }, [url]);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const dotColor = status === 'ok' ? 'bg-green-500' : status === 'fail' ? 'bg-red-500' : 'bg-amber-400';
  const text = status === 'ok' ? 'OK' : status === 'fail' ? 'OFF' : '...';

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-slate-100 text-[11px] font-mono">
        <div className={`w-2 h-2 rounded-full ${dotColor}`}></div>
        <span className="text-slate-600">backend</span>
        <span className={`font-bold ${status === 'ok' ? 'text-green-700' : status === 'fail' ? 'text-red-700' : 'text-amber-700'}`}>{text}</span>
        <span className="text-slate-400">▾</span>
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-96 p-3">
          <div className="text-[11px] font-semibold text-slate-700 mb-1">Backend URL</div>
          <input type="text" value={editUrl} onChange={(e) => setEditUrl(e.target.value)}
            className="w-full border border-slate-300 px-2 py-1 rounded text-[11px] font-mono mb-2" />
          <div className="flex gap-1.5 mb-2">
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.local)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">localhost</button>
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.cloud)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">cloud</button>
            <div className="flex-1"></div>
            <button onClick={() => { resetBackend(); setUrl(CURRENT_BACKEND); setEditUrl(CURRENT_BACKEND); setOpen(false); }}
              className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded">초기화</button>
          </div>
          {status === 'fail' && (
            <div className="text-[10px] text-red-700 bg-red-50 border border-red-200 rounded p-1.5 mb-2 font-mono break-all">✗ {errMsg}</div>
          )}
          <button onClick={() => { setBackend(editUrl); setUrl(editUrl); setOpen(false); }}
            className="w-full px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-[12px] font-semibold">적용 + 저장</button>
        </div>
      )}
    </div>
  );
}

/* ───────── Slider 컴포넌트 (fan-sim 패턴) ───────── */
function Slider({ label, sublabel, value, min, max, step, onChange, color = 'blue', unit = '', decimals = 0 }) {
  const pct = ((value - min) / (max - min)) * 100;
  const colorMap = {
    blue:   { fill: '#2563EB', text: 'text-blue-700',   bg: 'bg-blue-600' },
    green:  { fill: '#059669', text: 'text-green-700',  bg: 'bg-green-600' },
    amber:  { fill: '#D97706', text: 'text-amber-700',  bg: 'bg-amber-600' },
    purple: { fill: '#7C3AED', text: 'text-purple-700', bg: 'bg-purple-600' },
    cyan:   { fill: '#0891B2', text: 'text-cyan-700',   bg: 'bg-cyan-600' },
    slate:  { fill: '#475569', text: 'text-slate-700',  bg: 'bg-slate-600' },
  };
  const c = colorMap[color] || colorMap.blue;
  return (
    <div className="mb-3">
      <div className="flex items-center justify-between mb-1">
        <div className="flex items-baseline gap-1">
          <span className="text-[12px] font-semibold text-slate-700">{label}</span>
          {sublabel && <span className="text-[10px] text-slate-400 font-mono">{sublabel}</span>}
        </div>
        <input type="number" value={Number(value).toFixed(decimals)}
          onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
          step={step}
          className={`w-20 text-right text-[12px] font-mono font-semibold ${c.text} bg-transparent border-0 outline-none px-1 py-0.5 rounded hover:bg-slate-50 focus:bg-slate-50`} />
      </div>
      <div className="relative">
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="w-full h-1.5 rounded-full appearance-none cursor-pointer slider-thumb"
          style={{ background: `linear-gradient(to right, ${c.fill} ${pct}%, #E2E8F0 ${pct}%)` }} />
      </div>
    </div>
  );
}

/* ───────── Mode Toggle (Off-design / Semi-empirical / On-design) ───────── */

}

/* ═══════════════════════════════════════════════════════════════════
   Evaporator Component View — Sidebar + Model design
   ═══════════════════════════════════════════════════════════════════ */
function EvaporatorView({ onBack }) {
  // ─── State (geometry + material + circuit) ───
  const [tubeMaterial, setTubeMaterial] = useState('Cu');
  const [finMaterial, setFinMaterial] = useState('Al');
  
  // Tube
  const [D_o, setDo] = useState(7.0);     // mm
  const [D_i, setDi] = useState(6.5);     // mm
  const [L_tube, setLtube] = useState(400); // mm per tube
  
  // Fin
  const [FPI, setFPI] = useState(12);
  const [t_fin, setTfin] = useState(0.12); // mm
  
  // Circuit / layout
  const [N_tubes, setNtubes] = useState(24);
  const [N_rows, setNrows] = useState(2);
  const [P_t, setPt] = useState(25.0);  // mm
  const [P_l, setPl] = useState(22.0);  // mm
  const [N_circuits, setNcircuits] = useState(2);

  // View toggle (2D plan view)
  const [view, setView] = useState('Top');
  
  // Save panel
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});  // {1: {...}, 2: {...}, ...}
  const fileInputRef = useRef(null);

  // Apply panel — 다른 Studio로 동기화
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  // ─── Save/Load helpers ───
  const STORAGE_KEY = 'on_design_evaporator_slots';

  // localStorage에서 slots 로드 (한번만)
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'evaporator',
    tubeMaterial, finMaterial,
    D_o, D_i, L_tube,
    FPI, t_fin,
    N_tubes, N_rows, P_t, P_l, N_circuits,
  });

  const applyParams = (p) => {
    if (!p) return;
    if (p.tubeMaterial !== undefined) setTubeMaterial(p.tubeMaterial);
    if (p.finMaterial !== undefined) setFinMaterial(p.finMaterial);
    if (p.D_o !== undefined) setDo(p.D_o);
    if (p.D_i !== undefined) setDi(p.D_i);
    if (p.L_tube !== undefined) setLtube(p.L_tube);
    if (p.FPI !== undefined) setFPI(p.FPI);
    if (p.t_fin !== undefined) setTfin(p.t_fin);
    if (p.N_tubes !== undefined) setNtubes(p.N_tubes);
    if (p.N_rows !== undefined) setNrows(p.N_rows);
    if (p.P_t !== undefined) setPt(p.P_t);
    if (p.P_l !== undefined) setPl(p.P_l);
    if (p.N_circuits !== undefined) setNcircuits(p.N_circuits);
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = {
      ...params,
      _name: name || `Slot ${slot}`,
      _timestamp: new Date().toISOString(),
    };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  const loadSlot = (slot) => {
    const entry = saves[slot];
    if (!entry) return;
    applyParams(entry);
  };

  const deleteSlot = (slot) => {
    const newSaves = { ...saves };
    delete newSaves[slot];
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  // ─── Apply helpers — On-Design params → backend (typeNo 122) ───
  // 단순 sidebar params를 backend의 35개 parameter 중 핵심에 매핑.
  // 진영님 audit 후속: Result 없이 "설계 동기화"만 (Run은 다른 Studio에서).
  const buildBackendParams = () => {
    // mm → m 변환 + 단위 통일 (backend evaporator_on_design.py 호환)
    // 추정값 — On-Design Studio sidebar에 없는 backend 파라미터는 default 사용.
    const N_tubes_per_row = N_rows > 0 ? Math.round(N_tubes / N_rows) : N_tubes;
    return {
      // Material
      fluid: 'R290',
      mode: 'evap',
      // Geometry — 외관 (W=L_tube, H 추정, D 추정)
      W: L_tube * 1e-3,           // m (튜브 길이)
      H: P_t * N_tubes_per_row * 1e-3,  // 추정: P_t × N_tubes_per_row
      D: P_l * N_rows * 1e-3,      // 추정: P_l × N_rows
      // Tube
      D_o: D_o * 1e-3,
      D_i: D_i * 1e-3,
      P_t: P_t * 1e-3,
      P_l: P_l * 1e-3,
      N_rows: N_rows,
      N_tubes_per_row: N_tubes_per_row,
      layout: 'staggered',
      // Fin
      FPI: FPI,
      t_fin: t_fin * 1e-3,
      fin_type: 'plain',
      k_fin: finMaterial === 'Cu' ? 390 : 200,  // Al ~200, Cu ~390
      edge_type: 'rounded',
      wavy_amplitude: 1.0e-3,
      wavy_wavelength: 10.0e-3,
      louver_pitch: 1.7e-3,
      louver_angle: 27.0,
      // Circuit
      circuit_mode: N_circuits === 1 ? 'single'
                  : N_circuits === N_tubes_per_row ? 'row_parallel'
                  : 'serpentine_2',
      custom_circuits: '',
      // Numerical
      N_seg: 10,
      N_seg_auto: 'off',
      // Correlations (default)
      evap_corr: 'chen1966',
      cond_corr: 'shah1979',
      dp_corr: 'friedel1979',
      air_j_corr: 'auto',
      // Tuning (학계 평균)
      wet_dp_max: 1.20,
      K_bend: 0.75,
      // Fitting (1.0 = no correction)
      cf_j: 1.0, cf_f: 1.0, cf_hi: 1.0, cf_dp_ref: 1.0,
    };
  };

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'evaporator_on_design',
      typeNo: 122,
      params: beParams,
      sourceParams: currentParams(),  // 원본 sidebar params도 같이
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ HPWD Studio로 적용됨. HPWD Studio canvas에서 typeNo 122 컴포넌트를 추가하면 자동 적용됩니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'evaporator_on_design',
      typeNo: 122,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ Calibration Studio로 적용됨. Calibration Studio에서 fitting을 시작할 수 있습니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = {
      ...currentParams(),
      _exported_at: new Date().toISOString(),
      _version: '1.0',
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `evaporator_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'evaporator') {
          alert(`다른 컴포넌트의 JSON: ${data.component}`);
          return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';  // 같은 파일 다시 import 가능하게
  };

  // 검증 메시지
  const validation = useMemo(() => {
    const errs = [];
    if (D_i >= D_o) errs.push({ level: 'error', msg: 'D_i는 D_o보다 작아야 합니다' });
    if (D_o > P_t) errs.push({ level: 'error', msg: 'D_o가 P_t보다 큼 — 튜브 충돌' });
    if (FPI < 4 || FPI > 30) errs.push({ level: 'warn', msg: `FPI=${FPI} 범위 확인 (일반 4~25)` });
    if (N_tubes % N_rows !== 0) errs.push({ level: 'warn', msg: `N_tubes(${N_tubes})가 N_rows(${N_rows})로 나눠지지 않음` });
    if (N_tubes % N_circuits !== 0) errs.push({ level: 'warn', msg: `N_tubes(${N_tubes})가 N_circuits(${N_circuits})로 나눠지지 않음` });
    return errs;
  }, [D_o, D_i, P_t, FPI, N_tubes, N_rows, N_circuits]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          ← System
        </button>
        <span className="text-slate-300">|</span>
        <span className="text-cyan-600 text-base">◆</span>
        <span className="font-bold text-slate-900 text-[15px]">Evaporator</span>
        <span className="text-[11px] font-mono text-slate-400">Fin-tube · On-design</span>

        <div className="flex-1"></div>

        {/* Apply button → 다른 Studio로 동기화 */}
        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? 'bg-cyan-50 text-cyan-700 border border-cyan-300' : 'bg-slate-50 hover:bg-cyan-50 text-slate-700 border border-slate-200'
          }`}
          title="다른 Studio로 적용">↗ Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">💾</button>
      </div>

      {/* Apply panel (collapsible) — Apply to HPWD Studio / Calibration Studio */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Apply Design
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                현재 설계를 다른 Studio로 동기화 (Run은 해당 Studio에서)
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className="flex-1 px-3 py-2 bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> HPWD Studio (typeNo 122)
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">
                {applyMsg}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel (collapsible) */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Save / Load
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                JSON: 파일로 내보내기/불러오기 · Slot: 브라우저 내 저장
              </div>
            </div>

            {/* JSON export/import */}
            <div className="flex gap-2 mb-3">
              <button onClick={exportJSON}
                className="flex-1 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>📥</span> JSON 내보내기
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="flex-1 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>📤</span> JSON 불러오기
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
            </div>

            {/* Save slots */}
            <div className="text-[10px] text-slate-500 font-mono uppercase mb-1.5">
              Save Slots (브라우저 localStorage)
            </div>
            <div className="space-y-1">
              {[1, 2, 3, 4, 5].map(slot => {
                const s = saves[slot];
                const isEmpty = !s;
                return (
                  <div key={slot} className="flex items-center gap-2">
                    <span className="w-5 text-center text-[11px] font-mono font-bold text-slate-400">{slot}.</span>
                    <div className={`flex-1 px-2.5 py-1 rounded border text-[11px] font-mono truncate ${
                      isEmpty
                        ? 'bg-slate-50 border-slate-200 text-slate-400'
                        : 'bg-blue-50 border-blue-200 text-slate-800'
                    }`}>
                      {isEmpty ? (
                        <span>— 비어 있음 —</span>
                      ) : (
                        <span>
                          <b className="text-blue-900">{s._name || `Slot ${slot}`}</b>
                          <span className="text-slate-400 ml-2">
                            D_o={s.D_o}/N_t={s.N_tubes}/circ={s.N_circuits}
                          </span>
                          <span className="text-slate-400 ml-2 text-[10px]">
                            {s._timestamp?.slice(5, 16)?.replace('T', ' ')}
                          </span>
                        </span>
                      )}
                    </div>
                    <button onClick={() => {
                      const name = prompt(`Slot ${slot} 이름 (기본: 자동)`, s?._name || '');
                      if (name !== null) saveSlot(slot, name);
                    }}
                      className="px-2.5 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded text-[11px] font-semibold transition-colors">
                      저장
                    </button>
                    <button onClick={() => loadSlot(slot)} disabled={isEmpty}
                      className={`px-2.5 py-1 rounded text-[11px] font-semibold transition-colors border ${
                        isEmpty
                          ? 'bg-slate-50 border-slate-200 text-slate-300 cursor-not-allowed'
                          : 'bg-green-50 hover:bg-green-100 text-green-700 border-green-200'
                      }`}>
                      로드
                    </button>
                    {!isEmpty && (
                      <button onClick={() => {
                        if (confirm(`Slot ${slot} 삭제?`)) deleteSlot(slot);
                      }}
                        className="px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded text-[11px] font-semibold transition-colors">
                        ✕
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        {/* Sidebar */}
        <div className="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
          <div className="p-4 border-b border-slate-100">
            <h3 className="text-[15px] font-bold text-slate-900">On-design (물리 모델)</h3>
            <p className="text-[11px] text-slate-500 mt-1 leading-relaxed">
              Plain fin-tube 기하 + 회로 정의. Tube layout과 fin 패턴을 직접 입력합니다.
            </p>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-3">
            {/* Material */}
            <SidebarSection title="MATERIAL">
              <div className="mb-2">
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Tube</div>
                <ButtonGroup options={['Cu', 'Al', 'SS']} value={tubeMaterial} onChange={setTubeMaterial} />
              </div>
              <div>
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Fin</div>
                <ButtonGroup options={['Al', 'Cu']} value={finMaterial} onChange={setFinMaterial} />
              </div>
            </SidebarSection>

            {/* Tube */}
            <SidebarSection title="TUBE">
              <Slider label="D_o" sublabel="[mm]" value={D_o} min={3} max={20} step={0.1} decimals={1} onChange={setDo} color="cyan" />
              <Slider label="D_i" sublabel="[mm]" value={D_i} min={2} max={18} step={0.1} decimals={1} onChange={setDi} color="cyan" />
              <Slider label="L_tube" sublabel="[mm]" value={L_tube} min={100} max={2000} step={10} onChange={setLtube} color="cyan" />
            </SidebarSection>

            {/* Fin */}
            <SidebarSection title="FIN">
              <Slider label="FPI" sublabel="[fins/in]" value={FPI} min={4} max={25} step={1} onChange={setFPI} color="green" />
              <Slider label="t_fin" sublabel="[mm]" value={t_fin} min={0.05} max={0.5} step={0.01} decimals={2} onChange={setTfin} color="green" />
            </SidebarSection>

            {/* Circuit / Layout */}
            <SidebarSection title="CIRCUIT / LAYOUT">
              <Slider label="N_tubes" sublabel="총 본수" value={N_tubes} min={2} max={100} step={1} onChange={setNtubes} color="purple" />
              <Slider label="N_rows" sublabel="공기 방향" value={N_rows} min={1} max={8} step={1} onChange={setNrows} color="purple" />
              <Slider label="P_t" sublabel="[mm] transverse" value={P_t} min={10} max={50} step={0.5} decimals={1} onChange={setPt} color="amber" />
              <Slider label="P_l" sublabel="[mm] longitudinal" value={P_l} min={10} max={50} step={0.5} decimals={1} onChange={setPl} color="amber" />
              <Slider label="N_circuits" sublabel="병렬 회로" value={N_circuits} min={1} max={20} step={1} onChange={setNcircuits} color="purple" />
            </SidebarSection>

            {/* Validation messages */}
            {validation.length > 0 && (
              <div className="mt-3 space-y-1.5">
                {validation.map((v, i) => (
                  <div key={i} className={`text-[11px] px-2 py-1 rounded border flex items-start gap-1.5 ${
                    v.level === 'error'
                      ? 'bg-red-50 border-red-200 text-red-800'
                      : 'bg-amber-50 border-amber-200 text-amber-800'
                  }`}>
                    <span className="font-bold mt-0.5">{v.level === 'error' ? '✗' : '⚠'}</span>
                    <span>{v.msg}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Main area — Model design */}
        <div className="flex-1 overflow-y-auto bg-slate-100">
          <div className="max-w-5xl mx-auto p-5">
            {/* Tab indicator (Model design 만) */}
            <div className="mb-4">
              <div className="inline-block">
                <div className="text-[15px] font-bold text-slate-900 pb-2 border-b-2 border-blue-600">
                  Model design
                </div>
              </div>
            </div>

            {/* Status banner */}
            <div className="mb-4 bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-[12px] text-green-900">
              ✓ <b>On-design 모드</b> — 사이드바에서 변수를 변경하면 Model design 에 <b>실시간 반영</b>됩니다.
            </div>

            {/* View toggle */}
            <div className="mb-3 flex gap-1.5">
              {['Top', 'Side', 'Front'].map(v => (
                <button key={v} onClick={() => setView(v)}
                  className={`px-4 py-1.5 text-[12px] font-semibold rounded-lg transition-colors ${
                    view === v
                      ? 'bg-blue-600 text-white shadow-sm'
                      : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
                  }`}>
                  {v} view
                </button>
              ))}
            </div>

            {/* 2D viewer */}
            <div className="bg-white border border-slate-200 rounded-lg p-4">
              <div className="text-[12px] text-slate-500 mb-2 flex items-center justify-between">
                <span><b>{view} view</b> — Tube layout + Fin pattern</span>
                <span className="font-mono text-[10px] text-slate-400">
                  {N_tubes} tubes / {N_rows} rows / {N_circuits} circuits
                </span>
              </div>
              <div className="bg-slate-50 border border-slate-200 rounded">
                <CoilViewer
                  view={view}
                  D_o={D_o}
                  D_i={D_i}
                  L_tube={L_tube}
                  FPI={FPI}
                  t_fin={t_fin}
                  N_tubes={N_tubes}
                  N_rows={N_rows}
                  P_t={P_t}
                  P_l={P_l}
                  N_circuits={N_circuits}
                  tubeMaterial={tubeMaterial}
                  finMaterial={finMaterial}
                />
              </div>
            </div>

            {/* Derived properties */}
            <DerivedStats
              D_o={D_o}
              D_i={D_i}
              L_tube={L_tube}
              FPI={FPI}
              t_fin={t_fin}
              N_tubes={N_tubes}
              N_rows={N_rows}
              P_t={P_t}
              P_l={P_l}
              N_circuits={N_circuits}
            />
          </div>
        </div>
      </div>

      {/* Status bar */}
      <div className="bg-white border-t border-slate-200 px-4 py-1.5 flex items-center gap-4 text-[11px] text-slate-500 font-mono shrink-0">
        <span className="flex items-center gap-1">
          <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
          ready
        </span>
        <span>Mode: <b className="text-slate-700">on_design</b></span>
        <span>Tube: <b className="text-slate-700">{tubeMaterial}</b></span>
        <span>Fin: <b className="text-slate-700">{finMaterial}</b></span>
        <span className="text-slate-400">|</span>
        <span><b className="text-slate-700">{N_tubes}</b> tubes / <b className="text-slate-700">{N_rows}</b> rows / <b className="text-slate-700">{N_circuits}</b> circuits</span>
      </div>
    </div>
  );
}

/* ───────── Sidebar section helper ───────── */
function SidebarSection({ title, children }) {
  return (
    <div className="mb-5">
      <div className="text-[10px] text-slate-500 font-mono uppercase tracking-wider mb-2 font-bold">{title}</div>
      {children}
    </div>
  );
}

/* ───────── Button group ───────── */
function ButtonGroup({ options, value, onChange }) {
  return (
    <div className="flex gap-1 flex-wrap">
      {options.map(opt => (
        <button key={opt} onClick={() => onChange(opt)}
          className={`px-2.5 py-1 text-[11px] font-semibold rounded border transition-colors ${
            value === opt
              ? 'bg-blue-50 border-blue-400 text-blue-700'
              : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
          }`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   2D Coil Viewer — SVG plan view
   ═══════════════════════════════════════════════════════════════════ */
function CoilViewer({ view, D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits,
                     tubeMaterial, finMaterial }) {
  const W = 700, H = 320;
  
  if (view === 'Top') {
    return <TopView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} P_l={P_l}
                    N_circuits={N_circuits} tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
  }
  if (view === 'Side') {
    return <SideView W={W} H={H} D_o={D_o} D_i={D_i} N_tubes={N_tubes} N_rows={N_rows}
                     P_t={P_t} P_l={P_l} tubeMaterial={tubeMaterial} />;
  }
  // Front
  return <FrontView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} N_circuits={N_circuits}
                    tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
}

/* ───── Top view — 위에서 본 그림 (튜브 길이 방향 + fin pattern) ───── */
function TopView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l,
                   N_circuits, tubeMaterial, finMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = L_tube;
  const coreH_mm = N_rows * P_l;

  // Scale to fit
  const margin = 50;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  // Fin pitch (mm)
  const P_fin_mm = 25.4 / FPI;
  const N_fins = Math.floor(L_tube / P_fin_mm);
  
  // Show every N-th fin to avoid clutter
  const finStep = Math.max(1, Math.floor(N_fins / 60));

  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';
  const finColor = { Al: '#CBD5E1', Cu: '#FCD34D' }[finMaterial] || '#CBD5E1';

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      {/* Grid background */}
      <defs>
        <pattern id="grid-top" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-top)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Fins (vertical lines along tube length, 일부만 표시) */}
      {Array.from({ length: N_fins }, (_, i) => i).filter(i => i % finStep === 0).map(i => {
        const x = x0 + (i * P_fin_mm) * scale;
        return <line key={`fin-${i}`} x1={x} y1={y0} x2={x} y2={y0 + drawH}
                     stroke={finColor} strokeWidth="0.4" opacity="0.7" />;
      })}

      {/* Tube projections (top view: 튜브가 가로 라인으로 보임) */}
      {Array.from({ length: N_rows }, (_, r) =>
        <g key={`row-${r}`}>
          <line
            x1={x0}
            y1={y0 + (r + 0.5) * (drawH / N_rows)}
            x2={x0 + drawW}
            y2={y0 + (r + 0.5) * (drawH / N_rows)}
            stroke={tubeColor}
            strokeWidth={Math.max(2, D_o * scale)}
            opacity="0.85"
          />
        </g>
      )}

      {/* Air flow arrow */}
      <g transform={`translate(${x0 - 30}, ${y0 + drawH / 2})`}>
        <line x1="0" y1="-30" x2="0" y2="30" stroke="#3B82F6" strokeWidth="1.5" markerEnd="url(#arrow-air)" />
        <text x="-5" y="0" fill="#3B82F6" fontSize="10" textAnchor="end" fontFamily="monospace">Air</text>
      </g>
      <defs>
        <marker id="arrow-air" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#3B82F6" />
        </marker>
      </defs>

      {/* Refrigerant flow indicators */}
      <g transform={`translate(${x0 + 20}, ${y0 - 25})`}>
        <text fill="#0891B2" fontSize="10" fontFamily="monospace">
          ⟶ Refrigerant ({N_circuits} circuit{N_circuits > 1 ? 's' : ''})
        </text>
      </g>

      {/* Dimensions */}
      <g transform={`translate(${x0}, ${y0 + drawH + 25})`}>
        <line x1="0" y1="0" x2={drawW} y2="0" stroke="#64748B" strokeWidth="0.5" />
        <line x1="0" y1="-3" x2="0" y2="3" stroke="#64748B" strokeWidth="0.5" />
        <line x1={drawW} y1="-3" x2={drawW} y2="3" stroke="#64748B" strokeWidth="0.5" />
        <text x={drawW / 2} y="14" fill="#64748B" fontSize="10" textAnchor="middle" fontFamily="monospace">
          L = {L_tube.toFixed(0)} mm
        </text>
      </g>
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <line x1="-3" y1="0" x2="3" y2="0" stroke="#64748B" strokeWidth="0.5" />
        <line x1="-3" y1={drawH} x2="3" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
          H = {coreH_mm.toFixed(0)} mm
        </text>
      </g>

      {/* Info text */}
      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        N_fins = {N_fins} (showing 1/{finStep})
      </text>
    </svg>
  );
}

/* ───── Side view — 옆에서 본 그림 (튜브 단면 + 회로) ───── */
function SideView({ W, H, D_o, D_i, N_tubes, N_rows, P_t, P_l, tubeMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = tubesPerRow * P_t;
  const coreH_mm = N_rows * P_l;

  const margin = 60;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  const tubeR = (D_o / 2) * scale;
  const innerR = (D_i / 2) * scale;
  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';

  // Generate tube positions (staggered)
  const tubes = [];
  let count = 0;
  for (let r = 0; r < N_rows; r++) {
    const offsetX = (r % 2) * (P_t / 2);
    const tubesThisRow = (r % 2 === 0) ? tubesPerRow : Math.max(1, tubesPerRow - 1);
    for (let i = 0; i < tubesThisRow; i++) {
      if (count >= N_tubes) break;
      const x_mm = (i + 0.5) * P_t + (r % 2 ? -P_t / 2 : 0) + offsetX;
      const y_mm = (r + 0.5) * P_l;
      tubes.push({ x: x0 + x_mm * scale, y: y0 + y_mm * scale, idx: count, row: r });
      count++;
    }
  }

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      <defs>
        <pattern id="grid-side" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-side)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Tubes (cross-section) */}
      {tubes.map((t, i) => (
        <g key={`tube-${i}`}>
          <circle cx={t.x} cy={t.y} r={tubeR} fill={tubeColor} opacity="0.3" stroke={tubeColor} strokeWidth="1" />
          <circle cx={t.x} cy={t.y} r={innerR} fill="white" stroke={tubeColor} strokeWidth="0.5" />
          {tubes.length <= 30 && (
            <text x={t.x} y={t.y + 3} fill="#475569" fontSize="8" textAnchor="middle" fontFamily="monospace">
              {t.idx + 1}
            </text>
          )}
        </g>
      ))}

      {/* Air flow arrow (left to right) */}
      <g transform={`translate(${x0 - 35}, ${y0 + drawH / 2})`}>
        <line x1="0" y1="0" x2="20" y2="0" stroke="#3B82F6" strokeWidth="1.5" markerEnd="url(#arrow-air-side)" />
        <text x="0" y="-5" fill="#3B82F6" fontSize="10" textAnchor="start" fontFamily="monospace">Air</text>
      </g>
      <defs>
        <marker id="arrow-air-side" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#3B82F6" />
        </marker>
      </defs>

      {/* Dimensions */}
      <g transform={`translate(${x0}, ${y0 + drawH + 25})`}>
        <line x1="0" y1="0" x2={drawW} y2="0" stroke="#64748B" strokeWidth="0.5" />
        <text x={drawW / 2} y="14" fill="#64748B" fontSize="10" textAnchor="middle" fontFamily="monospace">
          W = {coreW_mm.toFixed(0)} mm ({tubesPerRow} × P_t={P_t}mm)
        </text>
      </g>
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
          H = {coreH_mm.toFixed(0)} mm
        </text>
      </g>

      {/* Tube count label */}
      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        {N_tubes} tubes (staggered, {N_rows} rows)
      </text>
      <text x={W - 10} y="32" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        D_o = {D_o.toFixed(1)} / D_i = {D_i.toFixed(1)} mm
      </text>
    </svg>
  );
}

/* ───── Front view — 앞에서 본 그림 (튜브 끝면 + circuit 라우팅) ───── */
function FrontView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, N_circuits,
                    tubeMaterial, finMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = tubesPerRow * P_t;
  const coreH_mm = L_tube;

  const margin = 60;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';
  const tubeR = Math.max(2, (D_o / 2) * scale);

  // Fins (horizontal lines)
  const P_fin_mm = 25.4 / FPI;
  const N_fins = Math.floor(L_tube / P_fin_mm);
  const finStep = Math.max(1, Math.floor(N_fins / 50));
  const finColor = { Al: '#CBD5E1', Cu: '#FCD34D' }[finMaterial] || '#CBD5E1';

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      <defs>
        <pattern id="grid-front" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-front)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Fins (horizontal lines) */}
      {Array.from({ length: N_fins }, (_, i) => i).filter(i => i % finStep === 0).map(i => {
        const y = y0 + (i * P_fin_mm) * scale;
        return <line key={`fin-${i}`} x1={x0} y1={y} x2={x0 + drawW} y2={y}
                     stroke={finColor} strokeWidth="0.4" opacity="0.7" />;
      })}

      {/* Tube cross-sections (only first row visible from front) */}
      {Array.from({ length: tubesPerRow }, (_, i) => {
        const x = x0 + (i + 0.5) * P_t * scale;
        return (
          <line key={`tube-${i}`} x1={x} y1={y0} x2={x} y2={y0 + drawH}
                stroke={tubeColor} strokeWidth={tubeR * 2} opacity="0.6" />
        );
      })}

      {/* Header / circuit indication */}
      <g transform={`translate(${x0}, ${y0 - 20})`}>
        <rect x="0" y="0" width={drawW} height="8" fill="#0891B2" opacity="0.3" stroke="#0891B2" strokeWidth="0.5" />
        <text x={drawW / 2} y="-5" fill="#0891B2" fontSize="10" textAnchor="middle" fontFamily="monospace">
          Refrigerant header (in) — {N_circuits} circuit{N_circuits > 1 ? 's' : ''}
        </text>
      </g>
      <g transform={`translate(${x0}, ${y0 + drawH + 12})`}>
        <rect x="0" y="0" width={drawW} height="8" fill="#0891B2" opacity="0.3" stroke="#0891B2" strokeWidth="0.5" />
        <text x={drawW / 2} y="22" fill="#0891B2" fontSize="10" textAnchor="middle" fontFamily="monospace">
          Refrigerant header (out)
        </text>
      </g>

      {/* Dimensions */}
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace" transform={`rotate(-90 -5 ${drawH / 2 + 3})`}>
          L = {L_tube.toFixed(0)} mm
        </text>
      </g>

      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        Front view (1st row visible)
      </text>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Derived stats — 자동 계산되는 파생 properties
   ═══════════════════════════════════════════════════════════════════ */
function DerivedStats({ D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits }) {
  const stats = useMemo(() => {
    const D_o_m = D_o / 1000, D_i_m = D_i / 1000;
    const L_m = L_tube / 1000, P_t_m = P_t / 1000, P_l_m = P_l / 1000;
    const t_fin_m = t_fin / 1000;
    const P_fin_m = 0.0254 / FPI;
    
    const L_total = L_m * N_tubes; // 총 튜브 길이
    const A_i = Math.PI * D_i_m * L_total; // 내부 면적
    const A_tube_outer = Math.PI * D_o_m * L_total;
    
    const tubesPerRow = Math.ceil(N_tubes / N_rows);
    const W_face = tubesPerRow * P_t_m;
    const H_face = L_m;
    const A_o_face = W_face * H_face;
    const depth = N_rows * P_l_m;
    
    const N_fins = Math.floor(L_m / P_fin_m);
    const A_per_fin = 2 * (P_t_m * P_l_m * N_rows - Math.PI * D_o_m * D_o_m / 4 * N_tubes / tubesPerRow);
    const A_fin_total = Math.max(0, N_fins * A_per_fin);
    
    const A_o = A_tube_outer + A_fin_total;
    const V_internal = Math.PI * (D_i_m / 2) ** 2 * L_total * 1000; // L
    
    return {
      L_total: L_total.toFixed(1),
      A_i: A_i.toFixed(3),
      A_o: A_o.toFixed(3),
      A_o_face: A_o_face.toFixed(4),
      W_face: (W_face * 1000).toFixed(0),
      H_face: (H_face * 1000).toFixed(0),
      depth: (depth * 1000).toFixed(0),
      N_fins,
      A_fin_total: A_fin_total.toFixed(3),
      V_internal: V_internal.toFixed(2),
      tubes_per_circuit: (N_tubes / N_circuits).toFixed(1),
      P_fin: (P_fin_m * 1000).toFixed(2),
      A_face_ratio: (A_o / A_o_face).toFixed(0),
    };
  }, [D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits]);

  const groups = [
    {
      title: '면적 / 체적',
      items: [
        { label: 'A_o (외부 총)',     value: stats.A_o,         unit: 'm²' },
        { label: 'A_i (내부 총)',     value: stats.A_i,         unit: 'm²' },
        { label: 'A_o_face (정면)',   value: stats.A_o_face,    unit: 'm²' },
        { label: 'A_o/A_face',        value: stats.A_face_ratio, unit: '-' },
        { label: 'V_internal',         value: stats.V_internal,   unit: 'L' },
      ],
    },
    {
      title: '치수',
      items: [
        { label: 'W_face',             value: stats.W_face,       unit: 'mm' },
        { label: 'H_face',             value: stats.H_face,       unit: 'mm' },
        { label: 'Depth',              value: stats.depth,        unit: 'mm' },
        { label: 'L_total',            value: stats.L_total,      unit: 'm' },
      ],
    },
    {
      title: 'Fin / Circuit',
      items: [
        { label: 'P_fin',              value: stats.P_fin,        unit: 'mm' },
        { label: 'N_fins (per tube)',  value: stats.N_fins,       unit: '-' },
        { label: 'A_fin_total',        value: stats.A_fin_total,  unit: 'm²' },
        { label: 'Tubes/circuit',      value: stats.tubes_per_circuit, unit: '-' },
      ],
    },
  ];

  return (
    <div className="mt-4 bg-white border border-slate-200 rounded-lg p-4">
      <div className="text-[12px] font-bold text-slate-700 mb-3 uppercase tracking-wider font-mono">
        Derived Properties
      </div>
      <div className="grid grid-cols-3 gap-4">
        {groups.map((g, gi) => (
          <div key={gi}>
            <div className="text-[10px] text-slate-400 font-mono uppercase mb-1.5">{g.title}</div>
            <div className="space-y-0.5">
              {g.items.map((it, i) => (
                <div key={i} className="flex items-baseline justify-between text-[12px]">
                  <span className="text-slate-600">{it.label}</span>
                  <span className="font-mono font-semibold text-slate-900 tabular-nums">
                    {it.value}<span className="text-slate-400 font-normal ml-1">{it.unit}</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Compressor (PDSim ROM) Component View
   typeNo 103 — backend/components/compressor_pdsim_rom.py wrapping
   ═══════════════════════════════════════════════════════════════════ */
function CompressorView({ onBack }) {
  // ─── Geometry params ───
  const [V_disp, setVdisp] = useState(10.0);            // cm³
  const [clearance_ratio, setClearance] = useState(0.04); // -
  const [rv_in, setRvin] = useState(2.5);               // -
  const [A_valve_in_mm2, setAvIn] = useState(8.0);      // mm²
  const [A_valve_out_mm2, setAvOut] = useState(6.0);    // mm²
  const [N_rated, setNrated] = useState(3000);          // rpm
  const [eta_motor, setEtaMotor] = useState(0.92);
  const [eta_inv, setEtaInv] = useState(0.95);

  // ─── Fitting params (PDSim ROM 11개 — 진영님 audit 수치) ───
  const [zeta_valve, setZetaValve] = useState(1.5);
  const [A_leak_mm2, setAleak] = useState(0.02);
  const [Cd_leak, setCdLeak] = useState(0.6);
  const [n_leak_rpm, setNleakRpm] = useState(0.5);
  const [over_comp_factor, setOverComp] = useState(0.3);
  const [n_poly_base, setNpoly] = useState(1.13);
  const [W_f_const, setWfConst] = useState(20.0);
  const [alpha_f_rpm, setAlphaFrpm] = useState(8e-6);
  const [AU_loss, setAUloss] = useState(5.0);

  // Material / type
  const [comp_type, setCompType] = useState('reciprocating');  // reciprocating/rotary/scroll
  const [fluid] = useState('R290');
  const [T_amb, setTamb] = useState(25.0);

  // Save panel state
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});
  const fileInputRef = useRef(null);

  // Apply panel state
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  const STORAGE_KEY = 'on_design_compressor_slots';

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'compressor',
    V_disp, clearance_ratio, rv_in,
    A_valve_in_mm2, A_valve_out_mm2,
    N_rated, eta_motor, eta_inv,
    zeta_valve, A_leak_mm2, Cd_leak, n_leak_rpm,
    over_comp_factor, n_poly_base,
    W_f_const, alpha_f_rpm, AU_loss,
    comp_type, T_amb,
  });

  const applyParams = (p) => {
    if (!p) return;
    if (p.V_disp !== undefined) setVdisp(p.V_disp);
    if (p.clearance_ratio !== undefined) setClearance(p.clearance_ratio);
    if (p.rv_in !== undefined) setRvin(p.rv_in);
    if (p.A_valve_in_mm2 !== undefined) setAvIn(p.A_valve_in_mm2);
    if (p.A_valve_out_mm2 !== undefined) setAvOut(p.A_valve_out_mm2);
    if (p.N_rated !== undefined) setNrated(p.N_rated);
    if (p.eta_motor !== undefined) setEtaMotor(p.eta_motor);
    if (p.eta_inv !== undefined) setEtaInv(p.eta_inv);
    if (p.zeta_valve !== undefined) setZetaValve(p.zeta_valve);
    if (p.A_leak_mm2 !== undefined) setAleak(p.A_leak_mm2);
    if (p.Cd_leak !== undefined) setCdLeak(p.Cd_leak);
    if (p.n_leak_rpm !== undefined) setNleakRpm(p.n_leak_rpm);
    if (p.over_comp_factor !== undefined) setOverComp(p.over_comp_factor);
    if (p.n_poly_base !== undefined) setNpoly(p.n_poly_base);
    if (p.W_f_const !== undefined) setWfConst(p.W_f_const);
    if (p.alpha_f_rpm !== undefined) setAlphaFrpm(p.alpha_f_rpm);
    if (p.AU_loss !== undefined) setAUloss(p.AU_loss);
    if (p.comp_type !== undefined) setCompType(p.comp_type);
    if (p.T_amb !== undefined) setTamb(p.T_amb);
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = { ...params, _name: name || `Slot ${slot}`, _timestamp: new Date().toISOString() };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };
  const loadSlot = (slot) => {
    const e = saves[slot]; if (!e) return; applyParams(e);
  };
  const deleteSlot = (slot) => {
    const ns = { ...saves }; delete ns[slot]; setSaves(ns);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ns)); } catch (e) {}
  };

  // ─── backend (typeNo 103) params 매핑 ───
  const buildBackendParams = () => ({
    fluid: fluid,
    comp_type: comp_type,
    T_amb: T_amb,
    V_disp: V_disp,
    clearance_ratio: clearance_ratio,
    rv_in: rv_in,
    A_valve_in_mm2: A_valve_in_mm2,
    A_valve_out_mm2: A_valve_out_mm2,
    N_rated: N_rated,
    eta_motor: eta_motor,
    eta_inv: eta_inv,
    zeta_valve: zeta_valve,
    A_leak_mm2: A_leak_mm2,
    Cd_leak: Cd_leak,
    n_leak_rpm: n_leak_rpm,
    over_comp_factor: over_comp_factor,
    n_poly_base: n_poly_base,
    W_f_const: W_f_const,
    alpha_f_rpm: alpha_f_rpm,
    AU_loss: AU_loss,
  });

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_pdsim_rom',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ HPWD Studio로 적용됨. HPWD Studio canvas에서 typeNo 103 컴포넌트를 추가하면 자동 적용됩니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_pdsim_rom',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ Calibration Studio로 적용됨. Calibration Studio에서 fitting을 시작할 수 있습니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = { ...currentParams(), _exported_at: new Date().toISOString(), _version: '1.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `compressor_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'compressor') {
          alert(`다른 컴포넌트의 JSON: ${data.component}`); return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // ─── Derived stats ───
  const derived = useMemo(() => {
    const V_disp_m3 = V_disp * 1e-6;  // cm³ → m³
    // 이론 displacement rate (kg/s) — 가정 P_suc=5bar, T_suc=10°C, R290 ρ ~12 kg/m³
    const rho_suc_est = 12.0;  // 대략
    const m_dot_th = V_disp_m3 * (N_rated / 60) * rho_suc_est;
    // 체적효율 추정 — Bell ROM 단순화
    const eta_v_est = 1.0 - clearance_ratio * (Math.pow(rv_in, 1.0 / n_poly_base) - 1.0);
    return {
      V_disp_m3: (V_disp_m3 * 1e6).toFixed(2),  // cm³
      m_dot_th: m_dot_th.toFixed(4),
      eta_v_est: eta_v_est.toFixed(3),
      A_in_total: (A_valve_in_mm2 * Cd_leak).toFixed(2),  // 효과적 면적
      W_friction_at_rated: (W_f_const + alpha_f_rpm * N_rated * N_rated).toFixed(1),
    };
  }, [V_disp, clearance_ratio, rv_in, N_rated, A_valve_in_mm2, Cd_leak, n_poly_base, W_f_const, alpha_f_rpm]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          ← System
        </button>
        <span className="text-slate-300">|</span>
        <span className="text-purple-600 text-base">◆</span>
        <span className="font-bold text-slate-900 text-[15px]">Compressor</span>
        <span className="text-[11px] font-mono text-slate-400">PDSim ROM · On-design</span>

        <div className="flex-1"></div>

        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? 'bg-purple-50 text-purple-700 border border-purple-300' : 'bg-slate-50 hover:bg-purple-50 text-slate-700 border border-slate-200'
          }`}
          title="다른 Studio로 적용">↗ Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">💾</button>
      </div>

      {/* Apply panel */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Apply Design</div>
              <div className="text-[10px] text-slate-400 font-mono">현재 설계를 다른 Studio로 동기화 (Run은 해당 Studio에서)</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className="flex-1 px-3 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> HPWD Studio (typeNo 103)
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">{applyMsg}</div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Save / Load</div>
              <div className="text-[10px] text-slate-400 font-mono">JSON: 파일 · Slot: 브라우저 내</div>
            </div>
            <div className="flex gap-2 mb-3">
              <button onClick={exportJSON}
                className="flex-1 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5">
                <span>📥</span> JSON 내보내기
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="flex-1 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5">
                <span>📤</span> JSON 불러오기
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
            </div>
            <div className="grid grid-cols-5 gap-2">
              {[1, 2, 3, 4, 5].map(slot => {
                const entry = saves[slot];
                return (
                  <div key={slot} className="border border-slate-200 rounded p-2 text-[11px]">
                    <div className="font-mono font-bold text-slate-700 mb-1">Slot {slot}</div>
                    {entry ? (
                      <>
                        <div className="text-slate-600 truncate" title={entry._name}>{entry._name}</div>
                        <div className="text-slate-400 text-[10px] mb-1">{entry._timestamp?.slice(0, 10)}</div>
                        <div className="flex gap-1">
                          <button onClick={() => loadSlot(slot)}
                            className="flex-1 px-1.5 py-0.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded text-[10px]">불러오기</button>
                          <button onClick={() => { if (confirm(`Slot ${slot} 삭제?`)) deleteSlot(slot); }}
                            className="px-1.5 py-0.5 bg-red-50 hover:bg-red-100 text-red-700 rounded text-[10px]">×</button>
                        </div>
                      </>
                    ) : (
                      <button onClick={() => {
                        const name = prompt(`Slot ${slot} 이름 (Enter=Slot ${slot}):`);
                        if (name !== null) saveSlot(slot, name);
                      }}
                        className="w-full px-1.5 py-2 bg-slate-50 hover:bg-slate-100 text-slate-500 rounded text-[10px] border border-dashed border-slate-300">+ 저장</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Main: Sidebar + Visual */}
      <div className="flex-1 overflow-hidden flex">
        {/* Sidebar — params */}
        <div className="w-72 shrink-0 bg-white border-r border-slate-200 overflow-y-auto p-4">
          <SidebarSection title="Geometry">
            <Slider label="V_disp" sublabel="cm³" value={V_disp} min={1} max={50} step={0.5} onChange={setVdisp} color="purple" decimals={1} />
            <Slider label="Clearance ratio" sublabel="-" value={clearance_ratio} min={0.01} max={0.15} step={0.005} onChange={setClearance} color="purple" decimals={3} />
            <Slider label="rv_in (built-in vol ratio)" sublabel="-" value={rv_in} min={1.5} max={5.0} step={0.1} onChange={setRvin} color="purple" decimals={2} />
            <Slider label="A_valve_in" sublabel="mm²" value={A_valve_in_mm2} min={2} max={30} step={0.5} onChange={setAvIn} color="purple" decimals={1} />
            <Slider label="A_valve_out" sublabel="mm²" value={A_valve_out_mm2} min={2} max={30} step={0.5} onChange={setAvOut} color="purple" decimals={1} />
            <Slider label="N_rated" sublabel="rpm" value={N_rated} min={1500} max={7000} step={100} onChange={setNrated} color="purple" decimals={0} />
            <Slider label="η_motor" sublabel="-" value={eta_motor} min={0.7} max={0.98} step={0.01} onChange={setEtaMotor} color="purple" decimals={2} />
            <Slider label="η_inv" sublabel="-" value={eta_inv} min={0.85} max={0.99} step={0.005} onChange={setEtaInv} color="purple" decimals={2} />
          </SidebarSection>

          <SidebarSection title="Fitting (Bell ROM)">
            <Slider label="ζ_valve" sublabel="-" value={zeta_valve} min={0.5} max={3.0} step={0.1} onChange={setZetaValve} color="amber" decimals={2} />
            <Slider label="A_leak" sublabel="mm²" value={A_leak_mm2} min={0.001} max={0.5} step={0.005} onChange={setAleak} color="amber" decimals={3} />
            <Slider label="Cd_leak" sublabel="-" value={Cd_leak} min={0.3} max={0.9} step={0.02} onChange={setCdLeak} color="amber" decimals={2} />
            <Slider label="n_leak (rpm exp)" sublabel="-" value={n_leak_rpm} min={0.0} max={1.0} step={0.05} onChange={setNleakRpm} color="amber" decimals={2} />
            <Slider label="over_comp" sublabel="-" value={over_comp_factor} min={0.0} max={0.6} step={0.02} onChange={setOverComp} color="amber" decimals={2} />
            <Slider label="n_poly_base" sublabel="-" value={n_poly_base} min={1.05} max={1.30} step={0.01} onChange={setNpoly} color="amber" decimals={2} />
            <Slider label="W_f_const" sublabel="W" value={W_f_const} min={0} max={100} step={1} onChange={setWfConst} color="amber" decimals={0} />
            <Slider label="α_f_rpm" sublabel="W/rpm²" value={alpha_f_rpm * 1e6} min={0} max={50} step={0.5} onChange={(v) => setAlphaFrpm(v * 1e-6)} color="amber" decimals={1} />
            <Slider label="AU_loss" sublabel="W/K" value={AU_loss} min={0} max={30} step={0.5} onChange={setAUloss} color="amber" decimals={1} />
          </SidebarSection>

          <SidebarSection title="Material & Operating">
            <div className="text-[11px] text-slate-500 mb-1">Type</div>
            <ButtonGroup options={['reciprocating', 'rotary', 'scroll']} value={comp_type} onChange={setCompType} />
            <Slider label="T_amb" sublabel="°C" value={T_amb} min={-10} max={50} step={1} onChange={setTamb} color="slate" decimals={0} />
            <div className="mt-2 text-[10px] text-slate-400 font-mono">Fluid: {fluid} (HPWD Studio에서 변경)</div>
          </SidebarSection>
        </div>

        {/* Main: 도식 + Stats */}
        <div className="flex-1 overflow-y-auto p-6">
          <div className="max-w-3xl mx-auto">
            <h2 className="text-lg font-bold text-slate-900 mb-1">Compressor — PDSim ROM</h2>
            <p className="text-[12px] text-slate-500 mb-4">
              Bell ROM 기반: 체적/누설/마찰/모터-인버터 손실 모두 분리 모델링.
              실험 데이터 fitting 시 Calibration Studio 사용.
            </p>

            {/* SVG 도식 */}
            <div className="bg-white border border-slate-200 rounded-lg p-4 mb-4">
              <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-2">Schematic</div>
              <svg viewBox="0 0 480 240" className="w-full h-auto">
                <defs>
                  <linearGradient id="cyl-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stopColor="#a78bfa" />
                    <stop offset="1" stopColor="#7c3aed" />
                  </linearGradient>
                </defs>
                {/* Suction */}
                <line x1="20" y1="120" x2="80" y2="120" stroke="#3b82f6" strokeWidth="3" />
                <text x="50" y="110" textAnchor="middle" fontSize="11" fill="#3b82f6" fontFamily="monospace">P_suc</text>
                {/* Inlet valve */}
                <rect x="80" y="105" width="20" height="30" rx="2" fill="#dbeafe" stroke="#3b82f6" strokeWidth="1.5" />
                <text x="90" y="155" textAnchor="middle" fontSize="9" fill="#1e40af" fontFamily="monospace">A_v_in</text>
                {/* Cylinder */}
                <rect x="120" y="60" width="200" height="120" rx="4" fill="url(#cyl-grad)" stroke="#5b21b6" strokeWidth="2" />
                <text x="220" y="125" textAnchor="middle" fontSize="14" fill="white" fontFamily="monospace" fontWeight="bold">V_disp = {V_disp.toFixed(1)} cm³</text>
                <text x="220" y="145" textAnchor="middle" fontSize="11" fill="white" fontFamily="monospace">N = {N_rated} rpm</text>
                <text x="220" y="50" textAnchor="middle" fontSize="11" fill="#5b21b6" fontFamily="monospace">η_v ≈ {derived.eta_v_est}</text>
                {/* Outlet valve */}
                <rect x="340" y="105" width="20" height="30" rx="2" fill="#fee2e2" stroke="#dc2626" strokeWidth="1.5" />
                <text x="350" y="155" textAnchor="middle" fontSize="9" fill="#991b1b" fontFamily="monospace">A_v_out</text>
                {/* Discharge */}
                <line x1="360" y1="120" x2="460" y2="120" stroke="#dc2626" strokeWidth="3" />
                <text x="430" y="110" textAnchor="middle" fontSize="11" fill="#dc2626" fontFamily="monospace">P_dis</text>
                {/* Leakage indicator */}
                <text x="220" y="200" textAnchor="middle" fontSize="10" fill="#92400e" fontFamily="monospace">A_leak = {A_leak_mm2.toFixed(3)} mm² (Cd = {Cd_leak.toFixed(2)})</text>
                <text x="220" y="215" textAnchor="middle" fontSize="10" fill="#525252" fontFamily="monospace">W_f({N_rated}rpm) ≈ {derived.W_friction_at_rated} W</text>
              </svg>
            </div>

            {/* Derived stats */}
            <div className="bg-white border border-slate-200 rounded-lg p-4">
              <div className="text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-3">Derived (P_suc=5 bar, T_suc=10°C, R290 추정)</div>
              <div className="grid grid-cols-3 gap-3 text-[12px]">
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">m_dot 이론</div>
                  <div className="font-mono font-bold text-slate-900">{derived.m_dot_th} <span className="text-slate-400 font-normal">kg/s</span></div>
                </div>
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">η_v 추정</div>
                  <div className="font-mono font-bold text-slate-900">{derived.eta_v_est}</div>
                </div>
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">W_friction</div>
                  <div className="font-mono font-bold text-slate-900">{derived.W_friction_at_rated} <span className="text-slate-400 font-normal">W</span></div>
                </div>
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">A_v_in 효과</div>
                  <div className="font-mono font-bold text-slate-900">{derived.A_in_total} <span className="text-slate-400 font-normal">mm²</span></div>
                </div>
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">η_motor × η_inv</div>
                  <div className="font-mono font-bold text-slate-900">{(eta_motor * eta_inv).toFixed(3)}</div>
                </div>
                <div className="border border-slate-200 rounded p-2">
                  <div className="text-slate-500 text-[10px] uppercase">V_disp</div>
                  <div className="font-mono font-bold text-slate-900">{derived.V_disp_m3} <span className="text-slate-400 font-normal">cm³</span></div>
                </div>
              </div>
            </div>

            <div className="mt-4 text-[11px] text-slate-500 leading-relaxed">
              <div className="font-bold mb-1 text-slate-700">PDSim ROM (Bell):</div>
              <div>· 체적효율 η_v: clearance + rv_in 기반 polytropic 압축</div>
              <div>· 누설: A_leak × Cd_leak × √(P_dis - P_suc), N에 따른 누설 보정</div>
              <div>· 마찰: W_f = W_f_const + α × N²</div>
              <div>· over_comp_factor: 토출 valve 늦은 열림 보정</div>
              <div>· AU_loss: 외부 열손실 (T_dis 추정에 영향)</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Top App
   ═══════════════════════════════════════════════════════════════════ */
function App() {
  const [selected, setSelected] = useState(null);

  // System view
  if (!selected) {
    return (
      <div className="min-h-screen bg-slate-50">
        {/* Header */}
        <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3">
          <AppSwitcher current="on-design-studio" />
          <div className="text-[11px] text-slate-500">On-design 모델 설계</div>
          <div className="flex-1"></div>
          <BackendStatus />
        </div>
        <SystemView onSelect={setSelected} />
      </div>
    );
  }

  // Component view
  if (selected === 'evaporator') {
    return <EvaporatorView onBack={() => setSelected(null)} />;
  }
  if (selected === 'compressor') {
    return <CompressorView onBack={() => setSelected(null)} />;
  }

  return (
    <div className="p-8 text-center">
      <div className="text-slate-500">아직 지원되지 않는 부품: {selected}</div>
      <button onClick={() => setSelected(null)} className="mt-4 text-blue-600 hover:underline">
        ← 부품 목록으로
      </button>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));

</script>

<script>
  function setStatus(msg, isError) {
    const el = document.getElementById('load-status');
    if (el) {
      el.textContent = msg;
      if (isError) el.style.color = '#dc2626';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setStatus('1/3 — 라이브러리 확인 중...');
    const checks = [];
    if (typeof React === 'undefined') checks.push('React');
    if (typeof ReactDOM === 'undefined') checks.push('ReactDOM');
    if (typeof Babel === 'undefined') checks.push('Babel');
    if (checks.length > 0) {
      showError('CDN 로드 실패: ' + checks.join(', ') + '\n\n인터넷 연결 또는 회사 네트워크 확인 — CDN(unpkg.com) 차단 가능성');
      return;
    }

    setStatus('2/3 — Babel JSX 컴파일 중...');
    const jsxText = document.getElementById('app-jsx').textContent;
    let compiled;
    try {
      const result = Babel.transform(jsxText, {
        presets: ['env', 'react'],
        filename: 'app.jsx',
      });
      compiled = result.code;
      console.log('[Studio] Compiled', compiled.length, 'chars');
    } catch (e) {
      showError('Babel 컴파일 에러:\n' + e.message);
      return;
    }

    setStatus('3/3 — React 마운트 중...');
    try {
      new Function(compiled)();
      console.log('[Studio] Mounted');
    } catch (e) {
      showError('실행 에러:\n' + (e.stack || e.message));
    }
  });
</script>
</body>
</html>

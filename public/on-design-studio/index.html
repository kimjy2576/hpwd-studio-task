<!-- Global error catcher (흰화면 대신 메시지 표시) -->
<script>
  function showError(msg) {
    const el = document.getElementById('load-error');
    const status = document.getElementById('load-status');
    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
    }
    if (status) status.style.color = '#dc2626';
    console.error('[Studio]', msg);
  }
  window.addEventListener('error', e => {
    showError('JS Error: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Promise rejection: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

/* ═══════════════════════════════════════════════════════════════════
   On-Design Studio — On-design 모델 설계 전용 앱
   ─────────────────────────────────────────────────────────────────
   현재 앱은 Calibration Studio와 별도로 on-design 모델만 다룸.

/* ───────── Backend URL (HPWD Studio와 공유) ───────── */
const DEFAULT_BACKENDS = {
  cloud: 'https://hpwd-studio-task-production.up.railway.app',
  local: 'http://localhost:8000',
};

function resolveBackendUrl() {
  try {
    const param = new URLSearchParams(window.location.search).get('backend');
    if (param) return param;
  } catch (e) {}
  try {
    const stored = localStorage.getItem('hpwd_backend_url');
    if (stored) return stored;
  } catch (e) {}
  const host = window.location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || host === '' || host === 'file') {
    return DEFAULT_BACKENDS.local;
  }
  return DEFAULT_BACKENDS.cloud;
}

let CURRENT_BACKEND = resolveBackendUrl();
function setBackend(u) { CURRENT_BACKEND = u; try { localStorage.setItem('hpwd_backend_url', u); } catch (e) {} }
function resetBackend() { try { localStorage.removeItem('hpwd_backend_url'); } catch (e) {} CURRENT_BACKEND = resolveBackendUrl(); }

async function api(path, options = {}) {
  const res = await fetch(CURRENT_BACKEND + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.json();
}

/* ───────── App Switcher (4개 앱) ───────── */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const apps = [
    { id: 'studio',             label: 'HPWD Studio',         desc: '시뮬 캔버스',            href: '/' },
    { id: 'component-studio',   label: 'Component Studio',    desc: '컴포넌트 작성',          href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio',  desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',    desc: 'On-design 모델 설계',    href: '/on-design-studio/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors">
        <div className="w-2 h-2 rounded-sm bg-blue-600 shrink-0"></div>
        <span className="font-bold text-slate-900 tracking-wide text-sm">{active.label}</span>
        <span className="text-slate-400 text-[10px]">▾</span>
      </button>
      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-60 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-blue-50 cursor-default' : 'hover:bg-slate-50'
                }`}>
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-blue-700' : 'text-slate-300'}`}>
                  {isActive ? '●' : '○'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-blue-900' : 'text-slate-800'}`}>{a.label}</div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ───────── BackendStatus ───────── */
function BackendStatus() {
  const [url, setUrl] = useState(CURRENT_BACKEND);
  const [open, setOpen] = useState(false);
  const [editUrl, setEditUrl] = useState(url);
  const [status, setStatus] = useState('checking');
  const [errMsg, setErrMsg] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    setStatus('checking');
    fetch(url + '/health', { method: 'GET' })
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(body => {
        if (body && body.status === 'ok') setStatus('ok');
        else { setStatus('partial'); setErrMsg('unexpected response'); }
      })
      .catch(e => { setStatus('fail'); setErrMsg(String(e)); });
  }, [url]);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const dotColor = status === 'ok' ? 'bg-green-500' : status === 'fail' ? 'bg-red-500' : 'bg-amber-400';
  const text = status === 'ok' ? 'OK' : status === 'fail' ? 'OFF' : '...';

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-slate-100 text-[11px] font-mono">
        <div className={`w-2 h-2 rounded-full ${dotColor}`}></div>
        <span className="text-slate-600">backend</span>
        <span className={`font-bold ${status === 'ok' ? 'text-green-700' : status === 'fail' ? 'text-red-700' : 'text-amber-700'}`}>{text}</span>
        <span className="text-slate-400">▾</span>
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-96 p-3">
          <div className="text-[11px] font-semibold text-slate-700 mb-1">Backend URL</div>
          <input type="text" value={editUrl} onChange={(e) => setEditUrl(e.target.value)}
            className="w-full border border-slate-300 px-2 py-1 rounded text-[11px] font-mono mb-2" />
          <div className="flex gap-1.5 mb-2">
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.local)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">localhost</button>
            <button onClick={() => setEditUrl(DEFAULT_BACKENDS.cloud)} className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded font-mono">cloud</button>
            <div className="flex-1"></div>
            <button onClick={() => { resetBackend(); setUrl(CURRENT_BACKEND); setEditUrl(CURRENT_BACKEND); setOpen(false); }}
              className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded">초기화</button>
          </div>
          {status === 'fail' && (
            <div className="text-[10px] text-red-700 bg-red-50 border border-red-200 rounded p-1.5 mb-2 font-mono break-all">✗ {errMsg}</div>
          )}
          <button onClick={() => { setBackend(editUrl); setUrl(editUrl); setOpen(false); }}
            className="w-full px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-[12px] font-semibold">적용 + 저장</button>
        </div>
      )}
    </div>
  );
}

/* ───────── Slider 컴포넌트 (fan-sim 패턴) ───────── */
function Slider({ label, sublabel, value, min, max, step, onChange, color = 'blue', unit = '', decimals = 0 }) {
  const pct = ((value - min) / (max - min)) * 100;
  const colorMap = {
    blue:   { fill: '#2563EB', text: 'text-blue-700',   bg: 'bg-blue-600' },
    green:  { fill: '#059669', text: 'text-green-700',  bg: 'bg-green-600' },
    amber:  { fill: '#D97706', text: 'text-amber-700',  bg: 'bg-amber-600' },
    purple: { fill: '#7C3AED', text: 'text-purple-700', bg: 'bg-purple-600' },
    cyan:   { fill: '#0891B2', text: 'text-cyan-700',   bg: 'bg-cyan-600' },
    slate:  { fill: '#475569', text: 'text-slate-700',  bg: 'bg-slate-600' },
  };
  const c = colorMap[color] || colorMap.blue;
  return (
    <div className="mb-3">
      <div className="flex items-center justify-between mb-1">
        <div className="flex items-baseline gap-1">
          <span className="text-[12px] font-semibold text-slate-700">{label}</span>
          {sublabel && <span className="text-[10px] text-slate-400 font-mono">{sublabel}</span>}
        </div>
        <input type="number" value={Number(value).toFixed(decimals)}
          onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
          step={step}
          className={`w-20 text-right text-[12px] font-mono font-semibold ${c.text} bg-transparent border-0 outline-none px-1 py-0.5 rounded hover:bg-slate-50 focus:bg-slate-50`} />
      </div>
      <div className="relative">
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="w-full h-1.5 rounded-full appearance-none cursor-pointer slider-thumb"
          style={{ background: `linear-gradient(to right, ${c.fill} ${pct}%, #E2E8F0 ${pct}%)` }} />
      </div>
    </div>
  );
}

/* ───────── Mode Toggle (Off-design / Semi-empirical / On-design) ───────── */

  return (
    <div className="flex gap-1 bg-slate-100 rounded-md p-0.5">
      {options.map(opt => (
        <button key={opt} onClick={() => onChange(opt)}
          className={`px-3 py-1 text-[12px] font-semibold rounded transition-colors ${

              : 'text-slate-500 hover:text-slate-700'

          {opt}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Evaporator Component View — Sidebar + Model design
   ═══════════════════════════════════════════════════════════════════ */
function EvaporatorView({ onBack }) {
  // ─── State (geometry + material + circuit) ───
  const [tubeMaterial, setTubeMaterial] = useState('Cu');
  const [finMaterial, setFinMaterial] = useState('Al');
  
  // Tube
  const [D_o, setDo] = useState(7.0);     // mm
  const [D_i, setDi] = useState(6.5);     // mm
  const [L_tube, setLtube] = useState(400); // mm per tube
  
  // Fin
  const [FPI, setFPI] = useState(12);
  const [t_fin, setTfin] = useState(0.12); // mm
  const [fin_type, setFinType] = useState('plain');  // plain/wavy/louver/slit
  const [edge_type, setEdgeType] = useState('rounded');  // sharp/rounded/chamfered
  // Wavy params (fin_type='wavy' 일 때만)
  const [wavy_amplitude, setWavyAmp] = useState(1.0);   // mm
  const [wavy_wavelength, setWavyWL] = useState(10.0);  // mm
  // Louver params (fin_type='louver' 일 때만)
  const [louver_pitch, setLouverP] = useState(1.7);     // mm
  const [louver_angle, setLouverA] = useState(27.0);    // deg
  
  // Circuit / layout
  const [N_tubes, setNtubes] = useState(24);
  const [N_rows, setNrows] = useState(2);
  const [P_t, setPt] = useState(25.0);  // mm
  const [P_l, setPl] = useState(22.0);  // mm
  const [N_circuits, setNcircuits] = useState(2);
  // Circuit mode (preset 4개 + custom)
  const [circuit_mode, setCircuitMode] = useState('row_parallel');  // row_parallel/serpentine_2/serpentine_4/single/custom
  const [custom_circuits, setCustomCircuits] = useState([]);  // [[[r,c], ...], ...]

  // View toggle (2D plan view)
  const [view, setView] = useState('Top');
  
  // Save panel
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});  // {1: {...}, 2: {...}, ...}
  const fileInputRef = useRef(null);

  // Apply panel — 다른 Studio로 동기화
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  // ─── Save/Load helpers ───
  const STORAGE_KEY = 'on_design_evaporator_slots';

  // localStorage에서 slots 로드 (한번만)
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'evaporator',
    tubeMaterial, finMaterial,
    D_o, D_i, L_tube,
    FPI, t_fin,
    fin_type, edge_type,
    wavy_amplitude, wavy_wavelength,
    louver_pitch, louver_angle,
    N_tubes, N_rows, P_t, P_l, N_circuits,
    circuit_mode, custom_circuits,
  });

  const applyParams = (p) => {
    if (!p) return;
    if (p.tubeMaterial !== undefined) setTubeMaterial(p.tubeMaterial);
    if (p.finMaterial !== undefined) setFinMaterial(p.finMaterial);
    if (p.D_o !== undefined) setDo(p.D_o);
    if (p.D_i !== undefined) setDi(p.D_i);
    if (p.L_tube !== undefined) setLtube(p.L_tube);
    if (p.FPI !== undefined) setFPI(p.FPI);
    if (p.t_fin !== undefined) setTfin(p.t_fin);
    if (p.fin_type !== undefined) setFinType(p.fin_type);
    if (p.edge_type !== undefined) setEdgeType(p.edge_type);
    if (p.wavy_amplitude !== undefined) setWavyAmp(p.wavy_amplitude);
    if (p.wavy_wavelength !== undefined) setWavyWL(p.wavy_wavelength);
    if (p.louver_pitch !== undefined) setLouverP(p.louver_pitch);
    if (p.louver_angle !== undefined) setLouverA(p.louver_angle);
    if (p.N_tubes !== undefined) setNtubes(p.N_tubes);
    if (p.N_rows !== undefined) setNrows(p.N_rows);
    if (p.P_t !== undefined) setPt(p.P_t);
    if (p.P_l !== undefined) setPl(p.P_l);
    if (p.N_circuits !== undefined) setNcircuits(p.N_circuits);
    if (p.circuit_mode !== undefined) setCircuitMode(p.circuit_mode);
    if (p.custom_circuits !== undefined) setCustomCircuits(p.custom_circuits);
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = {
      ...params,
      _name: name || `Slot ${slot}`,
      _timestamp: new Date().toISOString(),
    };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  const loadSlot = (slot) => {
    const entry = saves[slot];
    if (!entry) return;
    applyParams(entry);
  };

  const deleteSlot = (slot) => {
    const newSaves = { ...saves };
    delete newSaves[slot];
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };

  // ─── Apply helpers — On-Design params → backend (typeNo 122) ───
  // 단순 sidebar params를 backend의 35개 parameter 중 핵심에 매핑.
  // 진영님 audit 후속: Result 없이 "설계 동기화"만 (Run은 다른 Studio에서).
  const buildBackendParams = () => {
    // mm → m 변환 + 단위 통일 (backend evaporator_on_design.py 호환)
    const N_tubes_per_row = N_rows > 0 ? Math.round(N_tubes / N_rows) : N_tubes;
    return {
      // Material
      fluid: 'R290',
      mode: 'evap',
      // Geometry — 외관 (W=L_tube, H 추정, D 추정)
      W: L_tube * 1e-3,
      H: P_t * N_tubes_per_row * 1e-3,
      D: P_l * N_rows * 1e-3,
      // Tube
      D_o: D_o * 1e-3,
      D_i: D_i * 1e-3,
      P_t: P_t * 1e-3,
      P_l: P_l * 1e-3,
      N_rows: N_rows,
      N_tubes_per_row: N_tubes_per_row,
      layout: 'staggered',
      // Fin (사용자 선택 사용)
      FPI: FPI,
      t_fin: t_fin * 1e-3,
      fin_type: fin_type,
      k_fin: finMaterial === 'Cu' ? 390 : 200,
      edge_type: edge_type,
      wavy_amplitude: wavy_amplitude * 1e-3,
      wavy_wavelength: wavy_wavelength * 1e-3,
      louver_pitch: louver_pitch * 1e-3,
      louver_angle: louver_angle,
      // Circuit (사용자 선택 사용)
      circuit_mode: circuit_mode,
      custom_circuits: circuit_mode === 'custom' && custom_circuits.length > 0
                       ? JSON.stringify(custom_circuits) : '',
      // Numerical
      N_seg: 10,
      N_seg_auto: 'off',
      // Correlations (default)
      evap_corr: 'chen1966',
      cond_corr: 'shah1979',
      dp_corr: 'friedel1979',
      air_j_corr: 'auto',
      // Tuning (학계 평균)
      wet_dp_max: 1.20,
      K_bend: 0.75,
      // Fitting (1.0 = no correction)
      cf_j: 1.0, cf_f: 1.0, cf_hi: 1.0, cf_dp_ref: 1.0,
    };
  };

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'evaporator_on_design',
      typeNo: 122,
      params: beParams,
      sourceParams: currentParams(),  // 원본 sidebar params도 같이
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ HPWD Studio로 적용됨. HPWD Studio canvas에서 typeNo 122 컴포넌트를 추가하면 자동 적용됩니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'evaporator_on_design',
      typeNo: 122,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('✓ Calibration Studio로 적용됨. Calibration Studio에서 fitting을 시작할 수 있습니다.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('✗ 적용 실패: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = {
      ...currentParams(),
      _exported_at: new Date().toISOString(),
      _version: '1.0',
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `evaporator_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'evaporator') {
          alert(`다른 컴포넌트의 JSON: ${data.component}`);
          return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';  // 같은 파일 다시 import 가능하게
  };

  // 검증 메시지
  const validation = useMemo(() => {
    const errs = [];
    if (D_i >= D_o) errs.push({ level: 'error', msg: 'D_i는 D_o보다 작아야 합니다' });
    if (D_o > P_t) errs.push({ level: 'error', msg: 'D_o가 P_t보다 큼 — 튜브 충돌' });
    if (FPI < 4 || FPI > 30) errs.push({ level: 'warn', msg: `FPI=${FPI} 범위 확인 (일반 4~25)` });
    if (N_tubes % N_rows !== 0) errs.push({ level: 'warn', msg: `N_tubes(${N_tubes})가 N_rows(${N_rows})로 나눠지지 않음` });
    if (N_tubes % N_circuits !== 0) errs.push({ level: 'warn', msg: `N_tubes(${N_tubes})가 N_circuits(${N_circuits})로 나눠지지 않음` });
    return errs;
  }, [D_o, D_i, P_t, FPI, N_tubes, N_rows, N_circuits]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          ← System
        </button>
        <span className="text-slate-300">|</span>
        <span className="text-cyan-600 text-base">◆</span>
        <span className="font-bold text-slate-900 text-[15px]">Evaporator</span>
        <span className="text-[11px] font-mono text-slate-400">Fin-tube · On-design</span>

        <div className="flex-1"></div>

        {/* Apply button → 다른 Studio로 동기화 */}
        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? 'bg-cyan-50 text-cyan-700 border border-cyan-300' : 'bg-slate-50 hover:bg-cyan-50 text-slate-700 border border-slate-200'
          }`}
          title="다른 Studio로 적용">↗ Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">💾</button>
      </div>

      {/* Apply panel (collapsible) — Apply to HPWD Studio / Calibration Studio */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Apply Design
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                현재 설계를 다른 Studio로 동기화 (Run은 해당 Studio에서)
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className="flex-1 px-3 py-2 bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> HPWD Studio (typeNo 122)
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>↗</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">
                {applyMsg}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel (collapsible) */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">
                Save / Load
              </div>
              <div className="text-[10px] text-slate-400 font-mono">
                JSON: 파일로 내보내기/불러오기 · Slot: 브라우저 내 저장
              </div>
            </div>

            {/* JSON export/import */}
            <div className="flex gap-2 mb-3">
              <button onClick={exportJSON}
                className="flex-1 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>📥</span> JSON 내보내기
              </button>
              <button onClick={() => fileInputRef.current?.click()}
                className="flex-1 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>📤</span> JSON 불러오기
              </button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
            </div>

            {/* Save slots */}
            <div className="text-[10px] text-slate-500 font-mono uppercase mb-1.5">
              Save Slots (브라우저 localStorage)
            </div>
            <div className="space-y-1">
              {[1, 2, 3, 4, 5].map(slot => {
                const s = saves[slot];
                const isEmpty = !s;
                return (
                  <div key={slot} className="flex items-center gap-2">
                    <span className="w-5 text-center text-[11px] font-mono font-bold text-slate-400">{slot}.</span>
                    <div className={`flex-1 px-2.5 py-1 rounded border text-[11px] font-mono truncate ${
                      isEmpty
                        ? 'bg-slate-50 border-slate-200 text-slate-400'
                        : 'bg-blue-50 border-blue-200 text-slate-800'
                    }`}>
                      {isEmpty ? (
                        <span>— 비어 있음 —</span>
                      ) : (
                        <span>
                          <b className="text-blue-900">{s._name || `Slot ${slot}`}</b>
                          <span className="text-slate-400 ml-2">
                            D_o={s.D_o}/N_t={s.N_tubes}/circ={s.N_circuits}
                          </span>
                          <span className="text-slate-400 ml-2 text-[10px]">
                            {s._timestamp?.slice(5, 16)?.replace('T', ' ')}
                          </span>
                        </span>
                      )}
                    </div>
                    <button onClick={() => {
                      const name = prompt(`Slot ${slot} 이름 (기본: 자동)`, s?._name || '');
                      if (name !== null) saveSlot(slot, name);
                    }}
                      className="px-2.5 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded text-[11px] font-semibold transition-colors">
                      저장
                    </button>
                    <button onClick={() => loadSlot(slot)} disabled={isEmpty}
                      className={`px-2.5 py-1 rounded text-[11px] font-semibold transition-colors border ${
                        isEmpty
                          ? 'bg-slate-50 border-slate-200 text-slate-300 cursor-not-allowed'
                          : 'bg-green-50 hover:bg-green-100 text-green-700 border-green-200'
                      }`}>
                      로드
                    </button>
                    {!isEmpty && (
                      <button onClick={() => {
                        if (confirm(`Slot ${slot} 삭제?`)) deleteSlot(slot);
                      }}
                        className="px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded text-[11px] font-semibold transition-colors">
                        ✕
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        {/* Sidebar */}
        <div className="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
          <div className="p-4 border-b border-slate-100">
            <h3 className="text-[15px] font-bold text-slate-900">On-design (물리 모델)</h3>
            <p className="text-[11px] text-slate-500 mt-1 leading-relaxed">
              Plain fin-tube 기하 + 회로 정의. Tube layout과 fin 패턴을 직접 입력합니다.
            </p>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-3">
            {/* Material */}
            <SidebarSection title="MATERIAL">
              <div className="mb-2">
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Tube</div>
                <ButtonGroup options={['Cu', 'Al', 'SS']} value={tubeMaterial} onChange={setTubeMaterial} />
              </div>
              <div>
                <div className="text-[10px] text-slate-500 font-mono uppercase mb-1">Fin</div>
                <ButtonGroup options={['Al', 'Cu']} value={finMaterial} onChange={setFinMaterial} />
              </div>
            </SidebarSection>

            {/* Tube */}
            <SidebarSection title="TUBE">
              <Slider label="D_o" sublabel="[mm]" value={D_o} min={3} max={20} step={0.1} decimals={1} onChange={setDo} color="cyan" />
              <Slider label="D_i" sublabel="[mm]" value={D_i} min={2} max={18} step={0.1} decimals={1} onChange={setDi} color="cyan" />
              <Slider label="L_tube" sublabel="[mm]" value={L_tube} min={100} max={2000} step={10} onChange={setLtube} color="cyan" />
            </SidebarSection>

            {/* Fin */}
            <SidebarSection title="FIN">
              <Slider label="FPI" sublabel="[fins/in]" value={FPI} min={4} max={25} step={1} onChange={setFPI} color="green" />
              <Slider label="t_fin" sublabel="[mm]" value={t_fin} min={0.05} max={0.5} step={0.01} decimals={2} onChange={setTfin} color="green" />
              
              {/* Fin type dropdown */}
              <div className="mt-2">
                <div className="text-[11px] text-slate-500 mb-1">Fin type</div>
                <div className="flex gap-1 flex-wrap">
                  {['plain', 'wavy', 'louver', 'slit'].map(opt => (
                    <button key={opt} onClick={() => setFinType(opt)}
                      className={`px-2 py-1 text-[11px] font-semibold rounded border transition-colors ${
                        fin_type === opt
                          ? 'bg-green-50 border-green-400 text-green-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
              
              {/* Edge type — Kc/Ke 보정 */}
              <div className="mt-2">
                <div className="text-[11px] text-slate-500 mb-1">Edge type <span className="text-[10px] text-slate-400">(공기측 dP)</span></div>
                <div className="flex gap-1 flex-wrap">
                  {['sharp', 'rounded', 'chamfered'].map(opt => (
                    <button key={opt} onClick={() => setEdgeType(opt)}
                      className={`px-2 py-1 text-[11px] font-semibold rounded border transition-colors ${
                        edge_type === opt
                          ? 'bg-amber-50 border-amber-400 text-amber-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
              
              {/* fin_type별 추가 파라미터 */}
              {fin_type === 'wavy' && (
                <div className="mt-2 pt-2 border-t border-slate-100">
                  <div className="text-[10px] font-mono text-slate-400 uppercase mb-1">Wavy params</div>
                  <Slider label="진폭" sublabel="[mm]" value={wavy_amplitude} min={0.3} max={3.0} step={0.1} decimals={1} onChange={setWavyAmp} color="green" />
                  <Slider label="파장" sublabel="[mm]" value={wavy_wavelength} min={5} max={20} step={0.5} decimals={1} onChange={setWavyWL} color="green" />
                </div>
              )}
              {fin_type === 'louver' && (
                <div className="mt-2 pt-2 border-t border-slate-100">
                  <div className="text-[10px] font-mono text-slate-400 uppercase mb-1">Louver params</div>
                  <Slider label="Lp (pitch)" sublabel="[mm]" value={louver_pitch} min={0.8} max={4.0} step={0.1} decimals={1} onChange={setLouverP} color="green" />
                  <Slider label="θ (angle)" sublabel="[deg]" value={louver_angle} min={15} max={45} step={1} decimals={0} onChange={setLouverA} color="green" />
                </div>
              )}
            </SidebarSection>

            {/* Circuit / Layout */}
            <SidebarSection title="CIRCUIT / LAYOUT">
              <Slider label="N_tubes" sublabel="총 본수" value={N_tubes} min={2} max={100} step={1} onChange={setNtubes} color="purple" />
              <Slider label="N_rows" sublabel="공기 방향" value={N_rows} min={1} max={8} step={1} onChange={setNrows} color="purple" />
              <Slider label="P_t" sublabel="[mm] transverse" value={P_t} min={10} max={50} step={0.5} decimals={1} onChange={setPt} color="amber" />
              <Slider label="P_l" sublabel="[mm] longitudinal" value={P_l} min={10} max={50} step={0.5} decimals={1} onChange={setPl} color="amber" />
              
              {/* Circuit mode preset (4개) + custom */}
              <div className="mt-3 pt-2 border-t border-slate-100">
                <div className="text-[11px] text-slate-500 mb-1">Circuit mode</div>
                <div className="grid grid-cols-2 gap-1 mb-2">
                  {[
                    { id: 'row_parallel', label: 'Row parallel' },
                    { id: 'serpentine_2', label: 'Serpentine ×2' },
                    { id: 'serpentine_4', label: 'Serpentine ×4' },
                    { id: 'single', label: 'Single' },
                    { id: 'custom', label: 'Custom' },
                  ].map(opt => (
                    <button key={opt.id} onClick={() => setCircuitMode(opt.id)}
                      className={`px-2 py-1.5 text-[11px] font-semibold rounded border transition-colors ${
                        circuit_mode === opt.id
                          ? 'bg-purple-50 border-purple-400 text-purple-700'
                          : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                      }`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
              
              <Slider label="N_circuits (참고)" sublabel="병렬 회로" value={N_circuits} min={1} max={20} step={1} onChange={setNcircuits} color="purple" />
              
              <div className="mt-1 text-[10px] text-slate-400 font-mono">
                {circuit_mode === 'row_parallel' && '각 row의 모든 튜브가 병렬'}
                {circuit_mode === 'serpentine_2' && '2회 turn 후 다음 회로'}
                {circuit_mode === 'serpentine_4' && '4회 turn 후 다음 회로'}
                {circuit_mode === 'single' && '모든 튜브 직렬 1회로'}
                {circuit_mode === 'custom' && 'Custom — 시각 편집기 (Main view 참고)'}
              </div>
            </SidebarSection>

            {/* Validation messages */}
            {validation.length > 0 && (
              <div className="mt-3 space-y-1.5">
                {validation.map((v, i) => (
                  <div key={i} className={`text-[11px] px-2 py-1 rounded border flex items-start gap-1.5 ${
                    v.level === 'error'
                      ? 'bg-red-50 border-red-200 text-red-800'
                      : 'bg-amber-50 border-amber-200 text-amber-800'
                  }`}>
                    <span className="font-bold mt-0.5">{v.level === 'error' ? '✗' : '⚠'}</span>
                    <span>{v.msg}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Main area — Model design */}
        <div className="flex-1 overflow-y-auto bg-slate-100">
          <div className="max-w-5xl mx-auto p-5">
            {/* Tab indicator (Model design 만) */}
            <div className="mb-4">
              <div className="inline-block">
                <div className="text-[15px] font-bold text-slate-900 pb-2 border-b-2 border-blue-600">
                  Model design
                </div>
              </div>
            </div>

            {/* Status banner */}

            <div className="bg-white border border-slate-200 rounded-lg p-4">
              <div className="text-[12px] text-slate-500 mb-2 flex items-center justify-between">
                <span><b>{view} view</b> — {view === 'Circuit' ? `Circuit mode: ${circuit_mode}` : 'Tube layout + Fin pattern'}</span>

            {/* Derived properties */}
            <DerivedStats

          <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
          ready

        <span>Tube: <b className="text-slate-700">{tubeMaterial}</b></span>
        <span>Fin: <b className="text-slate-700">{finMaterial}</b></span>
        <span className="text-slate-400">|</span>
        <span><b className="text-slate-700">{N_tubes}</b> tubes / <b className="text-slate-700">{N_rows}</b> rows / <b className="text-slate-700">{N_circuits}</b> circuits</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Circuit Designer — Nr × Nt 그리드 시각 편집기
   - Preset 4개 (row_parallel/serpentine_2/serpentine_4/single): 자동 계산해서 표시만
   - Custom: 클릭으로 회로 할당 (회로 색상 라벨)
   - 출력: custom_circuits = [[[r,c], ...], ...] (회로별 ordered list)
   ═══════════════════════════════════════════════════════════════════ */
function CircuitDesigner({ N_rows, N_tubes_per_row, circuit_mode,
                           custom_circuits, setCustomCircuits, setCircuitMode }) {
  const [activeCircuit, setActiveCircuit] = useState(0);
  
  const CIRCUIT_COLORS = [
    '#2563eb', '#dc2626', '#059669', '#d97706',
    '#7c3aed', '#0891b2', '#ea580c', '#65a30d',
  ];
  
  const autoCircuits = useMemo(() => {
    const Nr = Math.max(1, N_rows);
    const Nt = Math.max(1, N_tubes_per_row);
    
    if (circuit_mode === 'row_parallel') {
      const circs = [];
      for (let c = 0; c < Nt; c++) {
        const ckt = [];
        for (let r = 0; r < Nr; r++) ckt.push([r, c]);
        circs.push(ckt);
      }
      return circs;
    }
    if (circuit_mode === 'serpentine_2') {
      const circs = [];
      for (let c0 = 0; c0 < Nt; c0 += 2) {
        const ckt = [];
        for (let r = 0; r < Nr; r++) ckt.push([r, c0]);
        if (c0 + 1 < Nt) {
          for (let r = Nr - 1; r >= 0; r--) ckt.push([r, c0 + 1]);
        }
        circs.push(ckt);
      }
      return circs;
    }
    if (circuit_mode === 'serpentine_4') {
      const circs = [];
      for (let c0 = 0; c0 < Nt; c0 += 4) {
        const ckt = [];
        for (let dc = 0; dc < 4 && c0 + dc < Nt; dc++) {
          const c = c0 + dc;
          if (dc % 2 === 0) {
            for (let r = 0; r < Nr; r++) ckt.push([r, c]);
          } else {
            for (let r = Nr - 1; r >= 0; r--) ckt.push([r, c]);
          }
        }
        circs.push(ckt);
      }
      return circs;
    }
    if (circuit_mode === 'single') {
      const ckt = [];
      for (let c = 0; c < Nt; c++) {
        if (c % 2 === 0) {
          for (let r = 0; r < Nr; r++) ckt.push([r, c]);
        } else {
          for (let r = Nr - 1; r >= 0; r--) ckt.push([r, c]);
        }
      }
      return [ckt];
    }
    return custom_circuits || [];
  }, [N_rows, N_tubes_per_row, circuit_mode, custom_circuits]);
  
  const tubeToCircuit = useMemo(() => {
    const map = {};
    autoCircuits.forEach((ckt, ci) => {
      ckt.forEach(([r, c], pos) => {
        map[`${r},${c}`] = { ci, pos };
      });
    });
    return map;
  }, [autoCircuits]);
  
  const handleTubeClick = (r, c) => {
    if (circuit_mode !== 'custom') {
      setCircuitMode('custom');
    }
    
    let circs = custom_circuits.length > 0
      ? custom_circuits.map(ckt => [...ckt])
      : [[]];
    
    let removed = false;
    for (let i = 0; i < circs.length; i++) {
      const idx = circs[i].findIndex(([rr, cc]) => rr === r && cc === c);
      if (idx >= 0) {
        circs[i].splice(idx, 1);
        removed = true;
        break;
      }
    }
    
    if (!removed) {
      while (circs.length <= activeCircuit) circs.push([]);
      circs[activeCircuit].push([r, c]);
    }
    
    circs = circs.filter(c => c.length > 0);
    setCustomCircuits(circs);
  };
  
  const addCircuit = () => {
    const next = activeCircuit + 1;
    setActiveCircuit(next);
    if (circuit_mode !== 'custom') setCircuitMode('custom');
  };
  
  const clearCustom = () => {
    if (confirm('Custom circuits 초기화?')) {
      setCustomCircuits([]);
      setActiveCircuit(0);
    }
  };
  
  const cellSize = Math.min(40, Math.max(20, 360 / Math.max(N_tubes_per_row, N_rows)));
  const padX = 50, padY = 30;
  const svgW = padX * 2 + N_tubes_per_row * cellSize;
  const svgH = padY * 2 + N_rows * cellSize + 40;
  
  return (
    <div className="p-3">
      {circuit_mode === 'custom' && (
        <div className="mb-3 p-2 bg-purple-50 border border-purple-200 rounded">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[11px] font-bold text-purple-700">Active circuit:</span>
            {[...Array(Math.max(custom_circuits.length, activeCircuit + 1))].map((_, i) => (
              <button key={i} onClick={() => setActiveCircuit(i)}
                className={`px-2 py-0.5 text-[11px] font-mono font-semibold rounded border transition-colors ${
                  activeCircuit === i
                    ? 'text-white border-transparent'
                    : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                }`}
                style={activeCircuit === i ? { background: CIRCUIT_COLORS[i % 8] } : {}}>
                #{i + 1} ({custom_circuits[i]?.length || 0})
              </button>
            ))}
            <button onClick={addCircuit}
              className="px-2 py-0.5 text-[11px] bg-white border border-dashed border-slate-400 text-slate-600 rounded hover:bg-slate-100">
              + 새 회로
            </button>
            <div className="flex-1"></div>
            <button onClick={clearCustom}
              className="px-2 py-0.5 text-[11px] bg-red-50 border border-red-200 text-red-700 rounded hover:bg-red-100">
              초기화
            </button>
          </div>
          <div className="mt-1.5 text-[10px] text-purple-700 font-mono">
            튜브 클릭 → 활성 회로에 할당 (이미 할당된 튜브 클릭 시 제거)
          </div>
        </div>
      )}
      
      {circuit_mode !== 'custom' && (
        <div className="mb-3 p-2 bg-blue-50 border border-blue-200 rounded text-[11px] text-blue-800 font-mono">
          <b>Preset: {circuit_mode}</b> — 자동 생성된 {autoCircuits.length}개 회로 표시 (편집하려면 sidebar에서 'Custom' 선택)
        </div>
      )}
      
      <div className="bg-white border border-slate-200 rounded overflow-x-auto">
        <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full"
             style={{ maxHeight: '450px' }} preserveAspectRatio="xMidYMid meet">
          <text x={padX - 10} y={padY - 10} fontSize="10" fill="#64748b" fontFamily="monospace" textAnchor="end">
            Air →
          </text>
          
          {[...Array(N_rows)].map((_, r) => (
            <text key={`rl${r}`} x={padX - 8} y={padY + r * cellSize + cellSize/2 + 4}
                  fontSize="10" fill="#64748b" fontFamily="monospace" textAnchor="end">
              row {r}
            </text>
          ))}
          
          {[...Array(N_tubes_per_row)].map((_, c) => (
            <text key={`cl${c}`} x={padX + c * cellSize + cellSize/2}
                  y={padY + N_rows * cellSize + 14}
                  fontSize="9" fill="#94a3b8" fontFamily="monospace" textAnchor="middle">
              {c}
            </text>
          ))}
          
          {[...Array(N_rows)].flatMap((_, r) =>
            [...Array(N_tubes_per_row)].map((_, c) => {
              const cx = padX + c * cellSize + cellSize/2;
              const cy = padY + r * cellSize + cellSize/2;
              const radius = cellSize * 0.35;
              const info = tubeToCircuit[`${r},${c}`];
              const isAssigned = info !== undefined;
              const color = isAssigned ? CIRCUIT_COLORS[info.ci % 8] : '#e2e8f0';
              const stroke = isAssigned ? color : '#cbd5e1';
              
              return (
                <g key={`t${r}-${c}`}>
                  <rect x={padX + c * cellSize + 1} y={padY + r * cellSize + 1}
                        width={cellSize - 2} height={cellSize - 2}
                        fill="none" stroke="#f1f5f9" strokeWidth="0.5" />
                  <circle cx={cx} cy={cy} r={radius}
                          fill={color}
                          fillOpacity={isAssigned ? 0.7 : 0.3}
                          stroke={stroke} strokeWidth="1.5"
                          style={{ cursor: 'pointer' }}
                          onClick={() => handleTubeClick(r, c)} />
                  {isAssigned && (
                    <text x={cx} y={cy + 3} textAnchor="middle" fontSize="9"
                          fill="white" fontFamily="monospace" fontWeight="bold"
                          pointerEvents="none">
                      {info.pos + 1}
                    </text>
                  )}
                </g>
              );
            })
          )}
          
          {autoCircuits.map((ckt, ci) => {
            if (ckt.length < 2) return null;
            const color = CIRCUIT_COLORS[ci % 8];
            const points = ckt.map(([r, c]) => {
              const cx = padX + c * cellSize + cellSize/2;
              const cy = padY + r * cellSize + cellSize/2;
              return `${cx},${cy}`;
            }).join(' ');
            return (
              <polyline key={`conn${ci}`} points={points}
                        fill="none" stroke={color} strokeWidth="1.2"
                        strokeOpacity="0.45" strokeDasharray="3,2"
                        pointerEvents="none" />
            );
          })}
        </svg>
      </div>
      
      <div className="mt-3 grid grid-cols-2 gap-2 text-[11px]">
        <div className="bg-slate-50 border border-slate-200 rounded p-2">
          <div className="text-[10px] text-slate-500 uppercase font-mono mb-1">회로 수</div>
          <div className="font-mono font-bold text-slate-900">{autoCircuits.length}</div>
        </div>
        <div className="bg-slate-50 border border-slate-200 rounded p-2">
          <div className="text-[10px] text-slate-500 uppercase font-mono mb-1">총 할당 tube</div>
          <div className="font-mono font-bold text-slate-900">
            {autoCircuits.reduce((s, c) => s + c.length, 0)} / {N_rows * N_tubes_per_row}
          </div>
        </div>
      </div>
      
      <div className="mt-2 space-y-1 max-h-40 overflow-y-auto">
        {autoCircuits.map((ckt, ci) => (
          <div key={ci} className="flex items-center gap-2 text-[10px] font-mono">
            <span className="inline-block w-3 h-3 rounded"
                  style={{ background: CIRCUIT_COLORS[ci % 8] }}></span>
            <span className="text-slate-600">#{ci + 1}:</span>
            <span className="text-slate-500 truncate">
              {ckt.length} tubes — {ckt.slice(0, 6).map(([r, c]) => `(${r},${c})`).join(' → ')}
              {ckt.length > 6 ? ' → ...' : ''}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   2D Coil Viewer — SVG plan view
   ═══════════════════════════════════════════════════════════════════ */
function CoilViewer({ view, D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits,
                     tubeMaterial, finMaterial }) {
  const W = 700, H = 320;
  
  if (view === 'Top') {
    return <TopView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} P_l={P_l}
                    N_circuits={N_circuits} tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
  }
  if (view === 'Side') {
    return <SideView W={W} H={H} D_o={D_o} D_i={D_i} N_tubes={N_tubes} N_rows={N_rows}
                     P_t={P_t} P_l={P_l} tubeMaterial={tubeMaterial} />;
  }
  // Front
  return <FrontView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} N_circuits={N_circuits}
                    tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
}

/* ───── Top view — 위에서 본 그림 (튜브 길이 방향 + fin pattern) ───── */
function TopView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l,
                   N_circuits, tubeMaterial, finMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = L_tube;
  const coreH_mm = N_rows * P_l;

  // Scale to fit
  const margin = 50;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  // Fin pitch (mm)
  const P_fin_mm = 25.4 / FPI;
  const N_fins = Math.floor(L_tube / P_fin_mm);
  
  // Show every N-th fin to avoid clutter
  const finStep = Math.max(1, Math.floor(N_fins / 60));

  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';
  const finColor = { Al: '#CBD5E1', Cu: '#FCD34D' }[finMaterial] || '#CBD5E1';

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      {/* Grid background */}
      <defs>
        <pattern id="grid-top" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-top)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Fins (vertical lines along tube length, 일부만 표시) */}
      {Array.from({ length: N_fins }, (_, i) => i).filter(i => i % finStep === 0).map(i => {
        const x = x0 + (i * P_fin_mm) * scale;
        return <line key={`fin-${i}`} x1={x} y1={y0} x2={x} y2={y0 + drawH}
                     stroke={finColor} strokeWidth="0.4" opacity="0.7" />;
      })}

      {/* Tube projections (top view: 튜브가 가로 라인으로 보임) */}
      {Array.from({ length: N_rows }, (_, r) =>
        <g key={`row-${r}`}>
          <line
            x1={x0}
            y1={y0 + (r + 0.5) * (drawH / N_rows)}
            x2={x0 + drawW}
            y2={y0 + (r + 0.5) * (drawH / N_rows)}
            stroke={tubeColor}
            strokeWidth={Math.max(2, D_o * scale)}
            opacity="0.85"
          />
        </g>
      )}

      {/* Air flow arrow */}
      <g transform={`translate(${x0 - 30}, ${y0 + drawH / 2})`}>
        <line x1="0" y1="-30" x2="0" y2="30" stroke="#3B82F6" strokeWidth="1.5" markerEnd="url(#arrow-air)" />
        <text x="-5" y="0" fill="#3B82F6" fontSize="10" textAnchor="end" fontFamily="monospace">Air</text>
      </g>
      <defs>
        <marker id="arrow-air" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#3B82F6" />
        </marker>
      </defs>

      {/* Refrigerant flow indicators */}
      <g transform={`translate(${x0 + 20}, ${y0 - 25})`}>
        <text fill="#0891B2" fontSize="10" fontFamily="monospace">
          ⟶ Refrigerant ({N_circuits} circuit{N_circuits > 1 ? 's' : ''})
        </text>
      </g>

      {/* Dimensions */}
      <g transform={`translate(${x0}, ${y0 + drawH + 25})`}>
        <line x1="0" y1="0" x2={drawW} y2="0" stroke="#64748B" strokeWidth="0.5" />
        <line x1="0" y1="-3" x2="0" y2="3" stroke="#64748B" strokeWidth="0.5" />
        <line x1={drawW} y1="-3" x2={drawW} y2="3" stroke="#64748B" strokeWidth="0.5" />
        <text x={drawW / 2} y="14" fill="#64748B" fontSize="10" textAnchor="middle" fontFamily="monospace">
          L = {L_tube.toFixed(0)} mm
        </text>
      </g>
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <line x1="-3" y1="0" x2="3" y2="0" stroke="#64748B" strokeWidth="0.5" />
        <line x1="-3" y1={drawH} x2="3" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
          H = {coreH_mm.toFixed(0)} mm
        </text>
      </g>

      {/* Info text */}
      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        N_fins = {N_fins} (showing 1/{finStep})
      </text>
    </svg>
  );
}

/* ───── Side view — 옆에서 본 그림 (튜브 단면 + 회로) ───── */
function SideView({ W, H, D_o, D_i, N_tubes, N_rows, P_t, P_l, tubeMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = tubesPerRow * P_t;
  const coreH_mm = N_rows * P_l;

  const margin = 60;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  const tubeR = (D_o / 2) * scale;
  const innerR = (D_i / 2) * scale;
  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';

  // Generate tube positions (staggered)
  const tubes = [];
  let count = 0;
  for (let r = 0; r < N_rows; r++) {
    const offsetX = (r % 2) * (P_t / 2);
    const tubesThisRow = (r % 2 === 0) ? tubesPerRow : Math.max(1, tubesPerRow - 1);
    for (let i = 0; i < tubesThisRow; i++) {
      if (count >= N_tubes) break;
      const x_mm = (i + 0.5) * P_t + (r % 2 ? -P_t / 2 : 0) + offsetX;
      const y_mm = (r + 0.5) * P_l;
      tubes.push({ x: x0 + x_mm * scale, y: y0 + y_mm * scale, idx: count, row: r });
      count++;
    }
  }

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      <defs>
        <pattern id="grid-side" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-side)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Tubes (cross-section) */}
      {tubes.map((t, i) => (
        <g key={`tube-${i}`}>
          <circle cx={t.x} cy={t.y} r={tubeR} fill={tubeColor} opacity="0.3" stroke={tubeColor} strokeWidth="1" />
          <circle cx={t.x} cy={t.y} r={innerR} fill="white" stroke={tubeColor} strokeWidth="0.5" />
          {tubes.length <= 30 && (
            <text x={t.x} y={t.y + 3} fill="#475569" fontSize="8" textAnchor="middle" fontFamily="monospace">
              {t.idx + 1}
            </text>
          )}
        </g>
      ))}

      {/* Air flow arrow (left to right) */}
      <g transform={`translate(${x0 - 35}, ${y0 + drawH / 2})`}>
        <line x1="0" y1="0" x2="20" y2="0" stroke="#3B82F6" strokeWidth="1.5" markerEnd="url(#arrow-air-side)" />
        <text x="0" y="-5" fill="#3B82F6" fontSize="10" textAnchor="start" fontFamily="monospace">Air</text>
      </g>
      <defs>
        <marker id="arrow-air-side" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#3B82F6" />
        </marker>
      </defs>

      {/* Dimensions */}
      <g transform={`translate(${x0}, ${y0 + drawH + 25})`}>
        <line x1="0" y1="0" x2={drawW} y2="0" stroke="#64748B" strokeWidth="0.5" />
        <text x={drawW / 2} y="14" fill="#64748B" fontSize="10" textAnchor="middle" fontFamily="monospace">
          W = {coreW_mm.toFixed(0)} mm ({tubesPerRow} × P_t={P_t}mm)
        </text>
      </g>
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
          H = {coreH_mm.toFixed(0)} mm
        </text>
      </g>

      {/* Tube count label */}
      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        {N_tubes} tubes (staggered, {N_rows} rows)
      </text>
      <text x={W - 10} y="32" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        D_o = {D_o.toFixed(1)} / D_i = {D_i.toFixed(1)} mm
      </text>
    </svg>
  );
}

/* ───── Front view — 앞에서 본 그림 (튜브 끝면 + circuit 라우팅) ───── */
function FrontView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, N_circuits,
                    tubeMaterial, finMaterial }) {
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = tubesPerRow * P_t;
  const coreH_mm = L_tube;

  const margin = 60;
  const scale = Math.min((W - 2 * margin) / coreW_mm, (H - 2 * margin) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;

  const tubeColor = { Cu: '#D97706', Al: '#94A3B8', SS: '#475569' }[tubeMaterial] || '#94A3B8';
  const tubeR = Math.max(2, (D_o / 2) * scale);

  // Fins (horizontal lines)
  const P_fin_mm = 25.4 / FPI;
  const N_fins = Math.floor(L_tube / P_fin_mm);
  const finStep = Math.max(1, Math.floor(N_fins / 50));
  const finColor = { Al: '#CBD5E1', Cu: '#FCD34D' }[finMaterial] || '#CBD5E1';

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: '#FAFAFA' }}>
      <defs>
        <pattern id="grid-front" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E2E8F0" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#grid-front)" />

      {/* Coil outline */}
      <rect x={x0} y={y0} width={drawW} height={drawH} fill="white" stroke="#94A3B8" strokeWidth="1" />

      {/* Fins (horizontal lines) */}
      {Array.from({ length: N_fins }, (_, i) => i).filter(i => i % finStep === 0).map(i => {
        const y = y0 + (i * P_fin_mm) * scale;
        return <line key={`fin-${i}`} x1={x0} y1={y} x2={x0 + drawW} y2={y}
                     stroke={finColor} strokeWidth="0.4" opacity="0.7" />;
      })}

      {/* Tube cross-sections (only first row visible from front) */}
      {Array.from({ length: tubesPerRow }, (_, i) => {
        const x = x0 + (i + 0.5) * P_t * scale;
        return (
          <line key={`tube-${i}`} x1={x} y1={y0} x2={x} y2={y0 + drawH}
                stroke={tubeColor} strokeWidth={tubeR * 2} opacity="0.6" />
        );
      })}

      {/* Header / circuit indication */}
      <g transform={`translate(${x0}, ${y0 - 20})`}>
        <rect x="0" y="0" width={drawW} height="8" fill="#0891B2" opacity="0.3" stroke="#0891B2" strokeWidth="0.5" />
        <text x={drawW / 2} y="-5" fill="#0891B2" fontSize="10" textAnchor="middle" fontFamily="monospace">
          Refrigerant header (in) — {N_circuits} circuit{N_circuits > 1 ? 's' : ''}
        </text>
      </g>
      <g transform={`translate(${x0}, ${y0 + drawH + 12})`}>
        <rect x="0" y="0" width={drawW} height="8" fill="#0891B2" opacity="0.3" stroke="#0891B2" strokeWidth="0.5" />
        <text x={drawW / 2} y="22" fill="#0891B2" fontSize="10" textAnchor="middle" fontFamily="monospace">
          Refrigerant header (out)
        </text>
      </g>

      {/* Dimensions */}
      <g transform={`translate(${x0 - 15}, ${y0})`}>
        <line x1="0" y1="0" x2="0" y2={drawH} stroke="#64748B" strokeWidth="0.5" />
        <text x="-5" y={drawH / 2 + 3} fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace" transform={`rotate(-90 -5 ${drawH / 2 + 3})`}>
          L = {L_tube.toFixed(0)} mm
        </text>
      </g>

      <text x={W - 10} y="18" fill="#64748B" fontSize="10" textAnchor="end" fontFamily="monospace">
        Front view (1st row visible)
      </text>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   Derived stats — 자동 계산되는 파생 properties
   ═══════════════════════════════════════════════════════════════════ */
function DerivedStats({ D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits }) {
  const stats = useMemo(() => {
    const D_o_m = D_o / 1000, D_i_m = D_i / 1000;
    const L_m = L_tube / 1000, P_t_m = P_t / 1000, P_l_m = P_l / 1000;
    const t_fin_m = t_fin / 1000;
    const P_fin_m = 0.0254 / FPI;
    
    const L_total = L_m * N_tubes; // 총 튜브 길이
    const A_i = Math.PI * D_i_m * L_total; // 내부 면적
    const A_tube_outer = Math.PI * D_o_m * L_total;
    
    const tubesPerRow = Math.ceil(N_tubes / N_rows);
    const W_face = tubesPerRow * P_t_m;
    const H_face = L_m;
    const A_o_face = W_face * H_face;
    const depth = N_rows * P_l_m;
    
    const N_fins = Math.floor(L_m / P_fin_m);
    const A_per_fin = 2 * (P_t_m * P_l_m * N_rows - Math.PI * D_o_m * D_o_m / 4 * N_tubes / tubesPerRow);
    const A_fin_total = Math.max(0, N_fins * A_per_fin);
    
    const A_o = A_tube_outer + A_fin_total;
    const V_internal = Math.PI * (D_i_m / 2) ** 2 * L_total * 1000; // L
    
    return {
      L_total: L_total.toFixed(1),
      A_i: A_i.toFixed(3),
      A_o: A_o.toFixed(3),
      A_o_face: A_o_face.toFixed(4),
      W_face: (W_face * 1000).toFixed(0),
      H_face: (H_face * 1000).toFixed(0),
      depth: (depth * 1000).toFixed(0),
      N_fins,
      A_fin_total: A_fin_total.toFixed(3),
      V_internal: V_internal.toFixed(2),
      tubes_per_circuit: (N_tubes / N_circuits).toFixed(1),
      P_fin: (P_fin_m * 1000).toFixed(2),
      A_face_ratio: (A_o / A_o_face).toFixed(0),
    };
  }, [D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits]);

  const groups = [
    {
      title: '면적 / 체적',
      items: [
        { label: 'A_o (외부 총)',     value: stats.A_o,         unit: 'm²' },
        { label: 'A_i (내부 총)',     value: stats.A_i,         unit: 'm²' },
        { label: 'A_o_face (정면)',   value: stats.A_o_face,    unit: 'm²' },
        { label: 'A_o/A_face',        value: stats.A_face_ratio, unit: '-' },
        { label: 'V_internal',         value: stats.V_internal,   unit: 'L' },
      ],
    },
    {
      title: '치수',
      items: [
        { label: 'W_face',             value: stats.W_face,       unit: 'mm' },
        { label: 'H_face',             value: stats.H_face,       unit: 'mm' },
        { label: 'Depth',              value: stats.depth,        unit: 'mm' },
        { label: 'L_total',            value: stats.L_total,      unit: 'm' },
      ],
    },
    {
      title: 'Fin / Circuit',
      items: [
        { label: 'P_fin',              value: stats.P_fin,        unit: 'mm' },
        { label: 'N_fins (per tube)',  value: stats.N_fins,       unit: '-' },
        { label: 'A_fin_total',        value: stats.A_fin_total,  unit: 'm²' },
        { label: 'Tubes/circuit',      value: stats.tubes_per_circuit, unit: '-' },
      ],
    },
  ];

  return (
    <div className="mt-4 bg-white border border-slate-200 rounded-lg p-4">
      <div className="text-[12px] font-bold text-slate-700 mb-3 uppercase tracking-wider font-mono">
        Derived Properties
      </div>
      <div className="grid grid-cols-3 gap-4">
        {groups.map((g, gi) => (
          <div key={gi}>
            <div className="text-[10px] text-slate-400 font-mono uppercase mb-1.5">{g.title}</div>
            <div className="space-y-0.5">
              {g.items.map((it, i) => (
                <div key={i} className="flex items-baseline justify-between text-[12px]">
                  <span className="text-slate-600">{it.label}</span>
                  <span className="font-mono font-semibold text-slate-900 tabular-nums">
                    {it.value}<span className="text-slate-400 font-normal ml-1">{it.unit}</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════════════
   Rolling Piston Visualization (compressor-sim 그대로 가져옴)
   - RollingPistonView: 2D top view (SVG)
   - RollingPiston3D: 3D isometric (Three.js r128)
   ═══════════════════════════════════════════════════════════════════ */
function RollingPistonView({ R_c_mm, R_p_mm, H_mm, t_vane_mm, theta_deg }) {
  const theta = theta_deg * Math.PI / 180;
  const scale = 140 / Math.max(R_c_mm, 20); // fit R_c to ~140px radius, more padding
  const cx = 200, cy = 200; // SVG center

  const Rc = R_c_mm * scale;
  const Rp = R_p_mm * scale;
  const e = (R_c_mm - R_p_mm) * scale;
  const tv = t_vane_mm * scale;

  // Piston center (eccentric orbit)
  const px = cx + e * Math.sin(theta);
  const py = cy - e * Math.cos(theta);

  // Contact point (piston touches cylinder inner wall)
  const contact_x = cx + Rc * Math.sin(theta);
  const contact_y = cy - Rc * Math.cos(theta);

  // Vane: from cylinder center upward, sliding to follow piston
  const vane_protrusion = e * (1 + Math.cos(theta));
  const vane_len = Rc + vane_protrusion * scale / e * 2;

  // Suction port position (~210°)
  // Suction port (~105°, just CCW of vane — new chamber opening after piston passes vane)
  const suc_angle = Math.PI * 7 / 12;  // 105°
  const suc_x = cx + (Rc + 5) * Math.cos(suc_angle);
  const suc_y = cy - (Rc + 5) * Math.sin(suc_angle);

  // Discharge port (~75°, just CW of vane — compression chamber closing before piston reaches vane)
  const dis_angle = Math.PI * 5 / 12;  // 75°
  const dis_x = cx + (Rc + 5) * Math.cos(dis_angle);
  const dis_y = cy - (Rc + 5) * Math.sin(dis_angle);

  // Compression ratio for color
  const V_ratio = 1 - theta_deg / 360;
  const P_color = `hsl(${210 - V_ratio * 180}, 70%, ${55 - V_ratio * 20}%)`;

  // Compression chamber arc (from contact point, clockwise to vane)
  // Suction chamber arc (from vane, clockwise to contact point)

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, width: '100%', height: '100%', justifyContent: 'center' }}>
      <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" style={{ width: '100%', height: '100%', maxWidth: 800, maxHeight: '100%', background: 'var(--bg3)', borderRadius: 12 }}>
        <defs>
          <radialGradient id="compGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor={P_color} stopOpacity="0.25" />
            <stop offset="100%" stopColor={P_color} stopOpacity="0.06" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          {/* Refrigerant flow arrow markers */}
          <marker id="sucArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#059669" />
          </marker>
          <marker id="disArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#dc2626" />
          </marker>
        </defs>

        {/* Cylinder wall */}
        <circle cx={cx} cy={cy} r={Rc} fill="url(#compGrad)" stroke="var(--tx2)" strokeWidth="2.5" />

        {/* Compression chamber fill (crescent) */}
        <circle cx={cx} cy={cy} r={Rc-1} fill={P_color} fillOpacity="0.1" />
        <circle cx={px} cy={py} r={Rp+1} fill="var(--bg3)" />

        {/* Piston */}
        <circle cx={px} cy={py} r={Rp} fill="var(--accent)" fillOpacity="0.08" stroke="var(--accent)" strokeWidth="2" />
        <circle cx={px} cy={py} r={2.5} fill="var(--accent)" />

        {/* Piston center cross */}
        <line x1={px-6} y1={py} x2={px+6} y2={py} stroke="var(--tx3)" strokeWidth="0.8" />
        <line x1={px} y1={py-6} x2={px} y2={py+6} stroke="var(--tx3)" strokeWidth="0.8" />

        {/* Contact point */}
        <circle cx={contact_x} cy={contact_y} r="4" fill="#d97706" filter="url(#glow)" />

        {/* Vane (vertical, top of cylinder) — physics: ext = e(1 - cos(θ))
            θ=0: ext=0 (pressed), θ=180: ext=2e (max), θ=90/270: ext=e */}
        <rect
          x={cx - tv/2} y={cy - Rc - 15}
          width={tv} height={(R_c_mm - R_p_mm) * scale * (1 - Math.cos(theta)) + 15}
          fill="#7c3aed" fillOpacity="0.3" stroke="#7c3aed" strokeWidth="1.5" rx="1"
        />

        {/* Vane slot */}
        <rect x={cx - tv/2 - 2} y={cy - Rc - 18} width={tv + 4} height={8}
          fill="var(--bg)" stroke="var(--tx2)" strokeWidth="1" rx="2" />

        {/* Suction port with flow arrow (외부 → 실린더 방향) */}
        <circle cx={suc_x} cy={suc_y} r="5.5" fill="#059669" fillOpacity="0.4" stroke="#059669" strokeWidth="2" />
        <text x={suc_x - 18} y={suc_y + 18} fill="#059669" fontSize="11" fontFamily="var(--font)" fontWeight="600">SUC</text>
        {/* SUC flow arrow: outside → port (inward along radial direction) */}
        {(() => {
          const L = 24;  // arrow length
          const nx = Math.cos(suc_angle), ny = -Math.sin(suc_angle);
          const x1 = suc_x + nx * L, y1 = suc_y + ny * L;  // outer end
          const x2 = suc_x + nx * 7, y2 = suc_y + ny * 7;  // inner end (arrow tip near port)
          return <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#059669" strokeWidth="2.5" markerEnd="url(#sucArrow)" opacity="0.85" />;
        })()}

        {/* Discharge port with flow arrow (실린더 → 외부 방향) */}
        <circle cx={dis_x} cy={dis_y} r="4.5" fill="#dc2626" fillOpacity="0.4" stroke="#dc2626" strokeWidth="2" />
        <text x={dis_x + 9} y={dis_y + 4} fill="#dc2626" fontSize="11" fontFamily="var(--font)" fontWeight="600">DIS</text>
        {/* DIS flow arrow: port → outside (outward along radial) */}
        {(() => {
          const L = 24;
          const nx = Math.cos(dis_angle), ny = -Math.sin(dis_angle);
          const x1 = dis_x + nx * 7, y1 = dis_y + ny * 7;  // inner end
          const x2 = dis_x + nx * L, y2 = dis_y + ny * L;  // outer end (arrow tip outside)
          return <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#dc2626" strokeWidth="2.5" markerEnd="url(#disArrow)" opacity="0.85" />;
        })()}

        {/* Eccentricity line */}
        <line x1={cx} y1={cy} x2={px} y2={py} stroke="#d97706" strokeWidth="1.2" strokeDasharray="3,2" />

        {/* Cylinder center */}
        <circle cx={cx} cy={cy} r="2" fill="var(--tx2)" />

        {/* Radial leakage */}
        {(() => {
          const leak_angle = theta + Math.PI;
          const lx1 = px + Rp * Math.sin(leak_angle);
          const ly1 = py - Rp * Math.cos(leak_angle);
          const lx2 = cx + Rc * Math.sin(leak_angle);
          const ly2 = cy - Rc * Math.cos(leak_angle);
          const mx = (lx1+lx2)/2, my = (ly1+ly2)/2;
          return (
            <>
              <line x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke="#dc2626" strokeWidth="1.5" strokeDasharray="2,2" opacity="0.55" />
              <circle cx={mx} cy={my} r="2" fill="#dc2626" opacity="0.7" />
              <text x={mx+5} y={my-4} fill="#dc2626" fontSize="9" fontFamily="var(--font)" opacity="0.75">δ_r</text>
            </>
          );
        })()}
        {/* Vane leakage arrows */}
        <line x1={cx - tv/2 - 3} y1={cy - Rc + 10} x2={cx - tv/2 - 3} y2={cy - Rc + 25}
          stroke="#ea580c" strokeWidth="1.2" markerEnd="url(#arrowhead)" opacity="0.5" />
        <line x1={cx + tv/2 + 3} y1={cy - Rc + 10} x2={cx + tv/2 + 3} y2={cy - Rc + 25}
          stroke="#ea580c" strokeWidth="1.2" markerEnd="url(#arrowhead)" opacity="0.5" />
        <text x={cx + tv/2 + 6} y={cy - Rc + 20} fill="#ea580c" fontSize="9" fontFamily="var(--font)" opacity="0.7">δ_v</text>

        {/* Reference radius line (R_c), from center to top (12 o'clock = θ=0 reference) */}
        <line x1={cx} y1={cy} x2={cx} y2={cy - Rc} stroke="var(--tx3)" strokeWidth="0.6" strokeDasharray="2,1" />
        <text x={cx + 8} y={cy - Rc/2} fill="var(--tx2)" fontSize="10" fontFamily="var(--font)">R_c</text>

        {/* Current angle radius line (center → θ direction, makes arc meaningful) */}
        <line x1={cx} y1={cy}
              x2={cx + Rc * Math.sin(theta)}
              y2={cy - Rc * Math.cos(theta)}
              stroke="#d97706" strokeWidth="0.8" strokeDasharray="3,2" opacity="0.7" />

        {/* Arrowhead marker */}
        <defs>
          <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ea580c" opacity="0.7" />
          </marker>
        </defs>

        {/* Angle arc — from 12 o'clock (θ=0) sweeping clockwise through θ */}
        {theta_deg > 5 && (
          <path
            d={`M ${cx} ${cy - 25} A 25 25 0 ${theta_deg > 180 ? 1 : 0} 1 ${cx + 25*Math.sin(theta)} ${cy - 25*Math.cos(theta)}`}
            fill="none" stroke="#d97706" strokeWidth="1.5" strokeOpacity="0.7"
          />
        )}

        {/* Labels */}
        <text x={cx} y={cy + Rc + 28} fill="var(--tx2)" fontSize="11" fontFamily="var(--font)" textAnchor="middle" fontWeight="500">
          θ = {theta_deg.toFixed(0)}° | e = {(R_c_mm - R_p_mm).toFixed(1)}mm
        </text>
        <text x={cx} y={cy + Rc + 44} fill="var(--tx3)" fontSize="10" fontFamily="var(--font)" textAnchor="middle">
          R_c={R_c_mm}mm  R_p={R_p_mm}mm  H={H_mm}mm
        </text>
      </svg>
    </div>
  );
}

// ============================================================
// Rolling Piston 3D View (Three.js)
// ============================================================
function RollingPiston3D({ R_c_mm, R_p_mm, H_mm, t_vane_mm, theta_deg,
                          autoRotate = false, explode = 0,
                          showCylinder = true, showPiston = true, showVane = true, showPlates = true }) {
  const mountRef = React.useRef(null);
  const sceneRef = React.useRef(null);
  const rendererRef = React.useRef(null);
  const pistonRef = React.useRef(null);
  const vaneRef = React.useRef(null);
  const cylinderRef = React.useRef(null);
  const cylWireRef = React.useRef(null);
  const topPlateRef = React.useRef(null);
  const botPlateRef = React.useRef(null);
  const autoRotateRef = React.useRef(autoRotate);
  const frameRef = React.useRef(null);
  const camStateRef = React.useRef({ theta: Math.PI/4, phi: Math.PI/5, r: 130 });
  React.useEffect(() => { autoRotateRef.current = autoRotate; }, [autoRotate]);

  React.useEffect(() => {
    if (!mountRef.current || typeof THREE === 'undefined') return;

    const W = mountRef.current.clientWidth || 360;
    const H_view = mountRef.current.clientHeight || 300;

    const scene = new THREE.Scene();
    // Light-theme friendly bg (matches fan-sim var(--bg3))
    scene.background = new THREE.Color(0xf0f1f3);
    const camera = new THREE.PerspectiveCamera(40, W / H_view, 0.1, 1000);
    camera.position.set(80, 60, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H_view);
    renderer.setPixelRatio(window.devicePixelRatio);
    mountRef.current.innerHTML = '';
    mountRef.current.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x334455, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(50, 80, 60);
    scene.add(dirLight);
    const dirLight2 = new THREE.DirectionalLight(0x4488cc, 0.3);
    dirLight2.position.set(-30, -20, 40);
    scene.add(dirLight2);

    const Rc = R_c_mm, Rp = R_p_mm, Hc = H_mm;
    const e = Rc - Rp;

    // ═══ Cylinder side wall only (simple outline) ═══
    // Outer wall: open cylinder, no top/bottom caps
    const wallGeo = new THREE.CylinderGeometry(Rc, Rc, Hc, 64, 1, true);
    const wallMat = new THREE.MeshPhongMaterial({
      color: 0x475569, transparent: true, opacity: 0.2,
      side: THREE.DoubleSide, depthWrite: false
    });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    scene.add(wall);
    cylinderRef.current = wall;

    // Wall wireframe (edges only)
    const wallWireGeo = new THREE.EdgesGeometry(wallGeo);
    const wallWire = new THREE.LineSegments(wallWireGeo,
      new THREE.LineBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.6 }));
    scene.add(wallWire);
    cylWireRef.current = wallWire;

    // Plates removed entirely (user request)
    topPlateRef.current = null;
    botPlateRef.current = null;

    // Piston — initial position at θ=0 (+X side)
    const pisGeo = new THREE.CylinderGeometry(Rp, Rp, Hc - 1, 48);
    const pisMat = new THREE.MeshPhongMaterial({ color: 0x94a3b8 });
    const piston = new THREE.Mesh(pisGeo, pisMat);
    const e_init = Rc - Rp;
    const theta_init = theta_deg * Math.PI / 180;
    piston.position.x = e_init * Math.sin(theta_init);
    piston.position.z = -e_init * Math.cos(theta_init);
    scene.add(piston);
    pistonRef.current = piston;

    // Vane — slot at z=-Rc (cylinder wall), extends inward by ext = e(1 - cos(θ))
    const vaneGeo = new THREE.BoxGeometry(t_vane_mm, Hc - 1, Rc);
    const vaneMat = new THREE.MeshPhongMaterial({ color: 0x64748b });
    const vane = new THREE.Mesh(vaneGeo, vaneMat);
    const vane_ext_init = e_init * (1 - Math.cos(theta_init));
    vane.position.x = 0;
    vane.position.z = -Rc + vane_ext_init / 2;
    vane.scale.z = Math.max(vane_ext_init / Rc, 0.05);
    scene.add(vane);
    vaneRef.current = vane;

    // Suction port indicator — at ~105° (just CCW of vane, new chamber opening)
    const sucGeo = new THREE.SphereGeometry(1.5, 16, 16);
    const sucMat = new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.5 });
    const sucSphere = new THREE.Mesh(sucGeo, sucMat);
    const sucAngle = Math.PI * 7 / 12;  // 105°
    const sucX = Rc * Math.cos(sucAngle), sucZ = -Rc * Math.sin(sucAngle);
    sucSphere.position.set(sucX, 0, sucZ);
    scene.add(sucSphere);

    // Discharge port indicator — at ~75° (just CW of vane, compression chamber closing)
    const disGeo = new THREE.SphereGeometry(1.2, 16, 16);
    const disMat = new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.5 });
    const disSphere = new THREE.Mesh(disGeo, disMat);
    const disAngle = Math.PI * 5 / 12;  // 75°
    const disX = Rc * Math.cos(disAngle), disZ = -Rc * Math.sin(disAngle);
    disSphere.position.set(disX, 0, disZ);
    scene.add(disSphere);

    // ═══ Refrigerant flow arrows (SUC inward, DIS outward) ═══
    // Suction arrow: pointing FROM outside TOWARD cylinder (gas enters)
    const arrowLen = Rc * 0.4;
    const nSuc = new THREE.Vector3(Math.cos(sucAngle), 0, -Math.sin(sucAngle)); // radial outward
    const sucStart = new THREE.Vector3(sucX + nSuc.x * arrowLen, 0, sucZ + nSuc.z * arrowLen);
    const sucDir = new THREE.Vector3(-nSuc.x, 0, -nSuc.z);  // inward
    const sucArrow = new THREE.ArrowHelper(sucDir, sucStart, arrowLen, 0x10b981, arrowLen*0.3, arrowLen*0.2);
    scene.add(sucArrow);

    // Discharge arrow: pointing FROM cylinder TOWARD outside (gas exits)
    const nDis = new THREE.Vector3(Math.cos(disAngle), 0, -Math.sin(disAngle));
    const disStart = new THREE.Vector3(disX, 0, disZ);
    const disDir = new THREE.Vector3(nDis.x, 0, nDis.z);  // outward
    const disArrow = new THREE.ArrowHelper(disDir, disStart, arrowLen, 0xef4444, arrowLen*0.3, arrowLen*0.2);
    scene.add(disArrow);

    // Text labels using sprites
    const makeLabel = (text, color) => {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillRect(0, 0, 128, 64);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.strokeRect(2, 2, 124, 60);
      ctx.font = 'bold 28px "Noto Sans KR", sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 32);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(12, 6, 1);
      return sprite;
    };
    const sucLabel = makeLabel('SUC', '#059669');

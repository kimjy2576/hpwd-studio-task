    const ioMatBoxIn = new THREE.MeshPhongMaterial({ color: 0xdc2626, shininess: 60 });
    const ioMatBoxOut = new THREE.MeshPhongMaterial({ color: 0x059669, shininess: 60 });
    const markerR = Do * 0.85;
    const markerStick = Do * 1.3;  // tube лҒқм—җм„ң XлЎң м–јл§ҲлӮҳ нҠҖм–ҙлӮҳмҳӨлҠ”к°Җ
    
    const drawIOMarker = (r, c, kind) => {
      const p = tubePos(r, c);
      const k = `${r},${c}`;
      const hasF = fm.hasOwnProperty(k);
      const hasB = bm.hasOwnProperty(k);
      let xSign;
      if (hasF && !hasB) xSign = -1;       // front bend мһҲмқҢ вҶ’ мһҗмң  лҒқмқҖ back (-X)
      else if (hasB && !hasF) xSign = 1;   // back bend вҶ’ мһҗмң  лҒқмқҖ front (+X)
      else if (!hasF && !hasB) xSign = 1;  // л‘ҳ лӢӨ м—ҶмқҢ (кІ©лҰ¬ tube) вҶ’ +X
      else return;                          // л‘ҳ лӢӨ мһҲмқҢ вҖ” мһҗмң  лҒқ м—ҶмқҢ
      
      const xEnd = xSign * (Lt/2);
      const xMarker = xSign * (Lt/2 + markerStick);
      
      // Connector tube (tube лҒқ вҶ’ marker)
      const connGeo = new THREE.CylinderGeometry(Do/2, Do/2, markerStick, 12);
      const connMesh = new THREE.Mesh(connGeo,
        kind === 'in' ? ioMatBoxIn : ioMatBoxOut);
      connMesh.rotation.z = Math.PI / 2;
      connMesh.position.set((xEnd + xMarker)/2, p.y, p.z);
      scene.add(connMesh);
      
      // Sphere marker
      const sphereGeo = new THREE.SphereGeometry(markerR, 16, 12);
      const sphere = new THREE.Mesh(sphereGeo,
        kind === 'in' ? ioMatBoxIn : ioMatBoxOut);
      sphere.position.set(xMarker, p.y, p.z);
      scene.add(sphere);
      
      // Sprite text (IN / OUT) вҖ” canvas-based texture
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = kind === 'in' ? '#dc2626' : '#059669';
      ctx.fillRect(0, 0, 64, 32);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(kind === 'in' ? 'IN' : 'OUT', 32, 16);
      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, sizeAttenuation: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(0.05, 0.025, 1);
      sprite.position.set(xMarker, p.y + Do * 1.4, p.z);
      scene.add(sprite);
    };
    
    inlets.forEach(([r, c]) => drawIOMarker(r, c, 'in'));
    outlets.forEach(([r, c]) => drawIOMarker(r, c, 'out'));
    
    // нҡҢлЎң мғүмғҒмқҙ м Ғмҡ©лҗң кІҪмҡ°, tubeлҸ„ нҡҢлЎң мғүмғҒмңјлЎң лӢӨмӢң м№ н•ҳкё° (custom лӘЁл“ңл§Ң)
    if (circuit_mode === 'custom' && Object.keys(tubeCircuit).length > 0) {
      tubeGroup.children.forEach((tube, i) => {
        const r = Math.floor(i / Nt_per_row);
        const c = i % Nt_per_row;
        const ci = tubeCircuit[`${r},${c}`];
        if (ci !== undefined) {
          tube.material = new THREE.MeshPhongMaterial({
            color: circColors[ci % 8], shininess: 80, specular: 0x444444
          });
        }
      });
    }
    
    // Fin stack
    const finCount = Math.max(2, Math.round((Lt / 25.4) * FPI));
    const finStep = Lt / (finCount - 1);
    const finBundleW = Nt_per_row * Pt + Pt;
    const finBundleD = N_rows * Pl + Pl;
    const finGeo = new THREE.BoxGeometry(t_fin, finBundleW, finBundleD);
    
    const finGroup = new THREE.Group();
    const drawCount = Math.min(finCount, 50);
    const drawStep = (finCount - 1) / (drawCount - 1) * finStep;
    for (let i = 0; i < drawCount; i++) {
      const fin = new THREE.Mesh(finGeo, finMat);
      fin.position.x = -Lt/2 + i * drawStep;
      finGroup.add(fin);
    }
    scene.add(finGroup);
    
    // Tube outline edges
    const tubeEdgeMat = new THREE.LineBasicMaterial({ color: 0x6b4423, linewidth: 1, opacity: 0.5, transparent: true });
    tubeGroup.children.forEach(tube => {
      const edges = new THREE.EdgesGeometry(tubeGeo);
      const line = new THREE.LineSegments(edges, tubeEdgeMat);
      line.rotation.copy(tube.rotation);
      line.position.copy(tube.position);
      scene.add(line);
    });
    
    // в”Җв”Җ Air flow visualization в”Җв”Җ
    // кіөкё°лҠ” +Z л°©н–ҘмңјлЎң нқҗлҰ„ (R0 face вҶ’ R_last face, м№ҙл©”лқј л’ӨвҶ’м•һ)
    // Inlet face = -Z, outlet face = +Z
    // 6к°ң нҷ”мӮҙн‘ң (3 x 2 grid) + "AIR вҶ’" н…ҚмҠӨнҠё sprite
    const airColor = 0x3b82f6;  // blue
    const airDir = new THREE.Vector3(0, 0, 1);
    
    const airArrowGroup = new THREE.Group();
    const arrowLength = Math.max(finBundleD * 0.7, 50);
    const headLength = arrowLength * 0.22;
    const headWidth = arrowLength * 0.08;
    
    // 3 x 2 grid (X length л°©н–Ҙ 3к°ң, Y column л°©н–Ҙ 2к°ң)
    const nx = 3, ny = 2;
    const xRange = Lt * 0.7;
    const yRange = finBundleW * 0.55;
    for (let i = 0; i < nx; i++) {
      for (let j = 0; j < ny; j++) {
        const x = -xRange/2 + i * xRange / (nx - 1);
        const y = -yRange/2 + j * yRange / (ny - 1);
        // нҷ”мӮҙн‘ң мӢңмһ‘м җ = fin face л’ӨмӘҪ (-Z л°©н–Ҙ), лҒқм җ = fin face м§Ғм „
        const origin = new THREE.Vector3(x, y, -finBundleD/2 - arrowLength - 5);
        const arrow = new THREE.ArrowHelper(airDir, origin, arrowLength, airColor, headLength, headWidth);
        // ArrowHelper лӮҙл¶Җмқҳ line/cone materialм—җ transparent м Ғмҡ© (нҷ”мӮҙн‘ң нҶӨ л¶Җл“ңлҹҪкІҢ)
        if (arrow.line && arrow.line.material) {
          arrow.line.material.transparent = true;
          arrow.line.material.opacity = 0.85;
        }
        if (arrow.cone && arrow.cone.material) {
          arrow.cone.material.transparent = true;
          arrow.cone.material.opacity = 0.85;
        }
        airArrowGroup.add(arrow);
      }
    }
    scene.add(airArrowGroup);
    
    // "AIR вҶ’" н…ҚмҠӨнҠё sprite (canvas-based)
    const airCanvas = document.createElement('canvas');
    airCanvas.width = 192; airCanvas.height = 48;
    const airCtx = airCanvas.getContext('2d');
    // л°ҳнҲ¬лӘ… л°°кІҪ
    airCtx.fillStyle = 'rgba(59, 130, 246, 0.15)';
    airCtx.fillRect(0, 0, 192, 48);
    // н…Ңл‘җлҰ¬
    airCtx.strokeStyle = '#3b82f6';
    airCtx.lineWidth = 2;
    airCtx.strokeRect(2, 2, 188, 44);
    // н…ҚмҠӨнҠё
    airCtx.fillStyle = '#1e40af';
    airCtx.font = 'bold 26px sans-serif';
    airCtx.textAlign = 'center';
    airCtx.textBaseline = 'middle';
    airCtx.fillText('AIR вҶ’', 96, 26);
    const airTex = new THREE.CanvasTexture(airCanvas);
    const airSpriteMat = new THREE.SpriteMaterial({
      map: airTex, sizeAttenuation: false, transparent: true
    });
    const airSprite = new THREE.Sprite(airSpriteMat);
    airSprite.scale.set(0.13, 0.033, 1);
    airSprite.position.set(0, finBundleW/2 + 35, -finBundleD/2 - arrowLength * 0.55);
    scene.add(airSprite);
    
    // Floor grid
    const grid = new THREE.GridHelper(Math.max(Lt, finBundleW, finBundleD) * 1.5, 12, 0xcbd5e1, 0xe2e8f0);
    grid.position.y = -finBundleW/2 - 30;
    scene.add(grid);
    
    // в”Җв”Җ Mouse drag to rotate в”Җв”Җ
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let rotY = 0.4, rotX = 0.25;
    let zoom = 1.0;
    
    const updateCamera = () => {
      const r = 700 / zoom;
      camera.position.x = r * Math.sin(rotY) * Math.cos(rotX);
      camera.position.y = r * Math.sin(rotX);
      camera.position.z = r * Math.cos(rotY) * Math.cos(rotX);
      camera.lookAt(0, 0, 0);
    };
    updateCamera();
    
    const dom = renderer.domElement;
    dom.style.cursor = 'grab';
    dom.addEventListener('mousedown', (e) => {
      isDragging = true; prevX = e.clientX; prevY = e.clientY;
      dom.style.cursor = 'grabbing';
    });
    window.addEventListener('mouseup', () => {
      isDragging = false; dom.style.cursor = 'grab';
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      rotY -= (e.clientX - prevX) * 0.008;
      rotX = Math.max(-1.4, Math.min(1.4, rotX + (e.clientY - prevY) * 0.008));
      prevX = e.clientX; prevY = e.clientY;
      updateCamera();
    });
    dom.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom *= e.deltaY > 0 ? 0.92 : 1.08;
      zoom = Math.max(0.3, Math.min(3.0, zoom));
      updateCamera();
    }, { passive: false });
    
    // в”Җв”Җ Animation loop в”Җв”Җ
    let raf;
    const animate = () => {
      raf = requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();
    
    // в”Җв”Җ Resize в”Җв”Җ
    const onResize = () => {
      const w2 = mount.clientWidth, h2 = mount.clientHeight;
      camera.aspect = w2 / h2;
      camera.updateProjectionMatrix();
      renderer.setSize(w2, h2);
    };
    const ro = new ResizeObserver(onResize);
    ro.observe(mount);
    
    stateRef.current = { scene, camera, renderer, raf };
    
    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      if (mount && renderer.domElement.parentNode === mount) {
        mount.removeChild(renderer.domElement);
      }
      renderer.dispose();
      tubeGeo.dispose();
      finGeo.dispose();
      tubeMat.dispose();
      finMat.dispose();
    };
  }, [D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, tubeMaterial, finMaterial,
      JSON.stringify(bends), circuit_mode,
      JSON.stringify(inlets), JSON.stringify(outlets)]);
  
  return (
    <div ref={mountRef} style={{
      width: '100%', height: 400, minHeight: 400,
      borderRadius: 6, overflow: 'hidden', position: 'relative'
    }} />
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   EEV 3D Viewer вҖ” Three.js (мӢ¬н”Ң лІ„м „)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   м§„мҳҒлӢҳ мҡ”мІӯ л°ҳмҳҒ:
   - мӢ¬н”Ңн•ҳкІҢ (motor housing, coil, flange, cutaway лӢӨ м ңкұ°)
   - к°ңлҸ„ л№„мңЁ м •нҷ•н•ҳкІҢ (visual amplification м—ҶмқҢ)
   - orificeк°Җ needleлЎң мЎ°м—¬м§ҖлҠ” кІғмқҙ н•өмӢ¬мңјлЎң ліҙм—¬м•ј н•Ё
   
   н•өмӢ¬ мӢңк°Ғнҷ”:
     вҖў Seat plate (к°ҖмҡҙлҚ° holeмқҙ orifice)
     вҖў Needle (cone) вҖ” opening 0%л©ҙ orifice м•Ҳм—җ л°•нҳҖм„ң л§үмқҢ, 100%л©ҙ мң„лЎң
     вҖў Inlet pipe (мўҢмёЎ, subcool liquid)
     вҖў Outlet pipe (н•ҳлӢЁ, 2-phase)
   
   needle мң„м№ҳ (NEW):
     вҖў opening 0%: needle tipмқҙ seat н•ҳл¶Җ (hole м•ҲмңјлЎң к№Ҡмқҙ л“Өм–ҙк°җ) вҶ’ CLOSED
     вҖў opening 100%: needleмқҙ seat мң„ stroke_maxл§ҢнҒј вҶ’ OPEN
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function EEVView3D({ D_seat_mm, stroke_max_mm,
                     L_inlet_mm, L_outlet_mm, needle_angle, needle_profile,
                     opening_eff, stroke_m }) {
  const mountRef = React.useRef(null);
  
  React.useEffect(() => {
    if (!mountRef.current || typeof THREE === 'undefined') return;
    const mount = mountRef.current;
    const w = mount.clientWidth || 600;
    const h = mount.clientHeight || 400;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f5f9);
    
    const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 5000);
    camera.position.set(80, 30, 100);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    mount.appendChild(renderer.domElement);
    
    // Lights (simple)
    const amb = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(60, 100, 80);
    scene.add(dir);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.35);
    dir2.position.set(-60, 30, -40);
    scene.add(dir2);
    
    // Materials (simple Phong)
    const seatMat = new THREE.MeshPhongMaterial({
      color: 0x64748b, shininess: 60, specular: 0x666666,
    });
    const needleMat = new THREE.MeshPhongMaterial({
      color: 0x94a3b8, shininess: 100, specular: 0xaaaaaa,
    });
    const stemMat = new THREE.MeshPhongMaterial({
      color: 0x6b7280, shininess: 80, specular: 0x777777,
    });
    const inletMat = new THREE.MeshPhongMaterial({
      color: 0xa78bfa, shininess: 60, specular: 0x7c3aed,
      transparent: true, opacity: 0.85,
    });
    const outletMat = new THREE.MeshPhongMaterial({
      color: 0xfbbf24, shininess: 60, specular: 0xd97706,
      transparent: true, opacity: 0.85,
    });
    
    // в”Җв”Җв”Җ Geometry (mm units, scale up) в”Җв”Җв”Җ
    const scale = 10;  // 1mm вҶ’ 10 scene units
    const D_seat = D_seat_mm * scale;
    const stroke_max = stroke_max_mm * scale;
    
    // Needle (cone) м№ҳмҲҳ вҖ” Side viewмҷҖ лҸҷмқј л№„мңЁ
    const alpha_half_rad = needle_angle * Math.PI / 180;
    // cone base R: seat holeмқҳ 1.6л°° (Side viewмҷҖ мқјм№ҳ)
    const coneBaseR = (D_seat / 2) * 1.6;
    const coneHeight = coneBaseR / Math.tan(alpha_half_rad);
    
    // в”Җв”Җв”Җ Seat plate (orificeк°Җ к°ҖмҡҙлҚ° hole) в”Җв”Җв”Җ
    // SeatмқҖ нҸүл©ҙ plateлЎң мІҳлҰ¬ (лӢЁмҲң), holeмқҖ RingGeometry
    const seatThickness = D_seat * 0.4;
    const seatOuterR = D_seat * 2.0;
    const seatY = 0;  // мўҢн‘ң мӣҗм җ
    
    // Seat top surface (лҸ„л„ӣ вҖ” outer ring with hole)
    const seatTopGeo = new THREE.RingGeometry(D_seat / 2, seatOuterR, 48);
    const seatTop = new THREE.Mesh(seatTopGeo, seatMat);
    seatTop.rotation.x = -Math.PI / 2;
    seatTop.position.set(0, seatY + seatThickness / 2, 0);
    scene.add(seatTop);
    
    // Seat bottom surface (к°ҷмқҢ)
    const seatBotGeo = new THREE.RingGeometry(D_seat / 2, seatOuterR, 48);
    const seatBot = new THREE.Mesh(seatBotGeo, seatMat);
    seatBot.rotation.x = Math.PI / 2;
    seatBot.position.set(0, seatY - seatThickness / 2, 0);
    scene.add(seatBot);
    
    // Seat outer wall
    const seatOuterGeo = new THREE.CylinderGeometry(
      seatOuterR, seatOuterR, seatThickness, 48, 1, true
    );
    const seatOuter = new THREE.Mesh(seatOuterGeo, seatMat);
    seatOuter.position.set(0, seatY, 0);
    scene.add(seatOuter);
    
    // Seat inner wall (orifice hole м•ҲмӘҪ л©ҙ)
    const seatInnerMat = new THREE.MeshPhongMaterial({
      color: 0x334155, shininess: 80, specular: 0x444444,
      side: THREE.DoubleSide,
    });
    const seatInnerGeo = new THREE.CylinderGeometry(
      D_seat / 2, D_seat / 2, seatThickness, 32, 1, true
    );
    const seatInner = new THREE.Mesh(seatInnerGeo, seatInnerMat);
    seatInner.position.set(0, seatY, 0);
    scene.add(seatInner);
    
    // в”Җв”Җв”Җ Needle (cone) в”Җв”Җв”Җ
    // н•өмӢ¬: openingм—җ л”°лҘё мң„м№ҳ кі„мӮ°
    // 
    // opening 0%: needle tipмқҙ seat bottom (hole м•Ҳ к°ҖмһҘ к№Ҡмқҙ м§„мһ…, CLOSED)
    // opening 100%: needle tipмқҙ seat top мң„лЎң stroke_maxл§ҢнҒј (FULLY OPEN)
    // мҙқ мқҙлҸҷ кұ°лҰ¬ = seatThickness + stroke_max
    
    const stroke_now = stroke_m * 1000 * scale;     // мӢӨм ң stroke (mm вҶ’ scn)
    const stroke_max_scn = stroke_max;              // мқҙлҜё мң„м—җм„ң м •мқҳлҗЁ
    const seatTopY = seatY + seatThickness / 2;
    const seatBottomY = seatY - seatThickness / 2;
    
    // opening fraction
    const op_frac = Math.max(0, Math.min(1, opening_eff / 100));
    
    // Total travel = seatThickness (hole лӮҙл¶Җ нҶөкіј) + stroke_max (seat мң„лЎң м¶”к°Җ мқҙлҸҷ)
    const totalTravel = seatThickness + stroke_max_scn;
    // op=0 вҶ’ apex at seatBottomY, op=1 вҶ’ apex at seatTopY + stroke_max
    const apexY = seatBottomY + op_frac * totalTravel;
    
    const needleGeo = new THREE.ConeGeometry(coneBaseR, coneHeight, 32);
    const needle = new THREE.Mesh(needleGeo, needleMat);
    needle.rotation.x = Math.PI;  // apex down
    // ConeGeometry: default apex at top, base at bottom. flip нӣ„ apexк°Җ м•„лһҳлЎң.
    // mesh.position.y = center вҶ’ apexк°Җ к·ё м•„лһҳ coneHeight/2 л§ҢнҒј
    needle.position.set(0, apexY + coneHeight / 2, 0);
    scene.add(needle);
    
    // в”Җв”Җв”Җ Stem (cylinder, needle мң„) в”Җв”Җв”Җ
    const stemR = coneBaseR * 0.3;
    const needleBaseY = apexY + coneHeight;
    const stemLen = stroke_max * 2.5 + D_seat * 1.5;  // мӢңк°Ғнҷ”мҡ© м¶©л¶„нһҲ кёёкІҢ
    const stemGeo = new THREE.CylinderGeometry(stemR, stemR, stemLen, 24);
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.set(0, needleBaseY + stemLen / 2, 0);
    scene.add(stem);
    
    // в”Җв”Җв”Җ Inlet pipe (мўҢмёЎ, seat мң„ вҖ” refrigerant л“Өм–ҙмҳҙ) в”Җв”Җв”Җ
    const pipeR = D_seat * 0.5;
    const inletLen = D_seat * 4;
    const inletGeo = new THREE.CylinderGeometry(pipeR, pipeR, inletLen, 24);
    const inlet = new THREE.Mesh(inletGeo, inletMat);
    inlet.rotation.z = Math.PI / 2;
    inlet.position.set(-inletLen/2 - D_seat * 0.5, seatTopY + D_seat * 0.8, 0);
    scene.add(inlet);
    
    // Inlet cap (мҷјмӘҪ лҒқ, лӢЁл©ҙ ліҙмқҙкІҢ)
    const inletCapGeo = new THREE.CircleGeometry(pipeR, 24);
    const inletCap = new THREE.Mesh(inletCapGeo, inletMat);
    inletCap.rotation.y = -Math.PI / 2;
    inletCap.position.set(-inletLen - D_seat * 0.5 - 0.1, seatTopY + D_seat * 0.8, 0);
    scene.add(inletCap);
    
    // в”Җв”Җв”Җ Outlet pipe (н•ҳлӢЁ, seat м•„лһҳ вҖ” 2-phase лӮҳк°җ) в”Җв”Җв”Җ
    const outletLen = D_seat * 4;
    const outletGeo = new THREE.CylinderGeometry(pipeR, pipeR, outletLen, 24);
    const outlet = new THREE.Mesh(outletGeo, outletMat);
    outlet.position.set(0, seatY - seatThickness/2 - outletLen/2 - 0.5, 0);
    scene.add(outlet);
    
    // Outlet cap (лӢЁл©ҙ)
    const outletCapGeo = new THREE.CircleGeometry(pipeR, 24);
    const outletCap = new THREE.Mesh(outletCapGeo, outletMat);
    outletCap.rotation.x = -Math.PI / 2;
    outletCap.position.set(0, seatY - seatThickness/2 - outletLen - 0.6, 0);
    scene.add(outletCap);
    
    // в”Җв”Җв”Җ Floor grid в”Җв”Җв”Җ
    const grid = new THREE.GridHelper(160, 16, 0xcbd5e1, 0xe2e8f0);
    grid.position.y = seatY - seatThickness/2 - outletLen - 4;
    scene.add(grid);
    
    // в”Җв”Җв”Җ Camera orbit (manual) в”Җв”Җв”Җ
    const target = new THREE.Vector3(0, seatY + stroke_max/2, 0);  // seat мӨ‘мӢ¬ к°Җк№Ңмқҙ
    let rotX = 0.1;
    let rotY = -0.3;
    let zoom = 1.0;
    const baseDist = D_seat * 8;
    
    const updateCamera = () => {
      const dist = baseDist / zoom;
      camera.position.set(
        target.x + dist * Math.sin(rotY) * Math.cos(rotX),
        target.y + dist * Math.sin(rotX),
        target.z + dist * Math.cos(rotY) * Math.cos(rotX)
      );
      camera.lookAt(target);
    };
    updateCamera();
    
    let isDragging = false, prevX = 0, prevY = 0;
    const dom = renderer.domElement;
    dom.style.cursor = 'grab';
    const onMouseDown = (e) => {
      isDragging = true; prevX = e.clientX; prevY = e.clientY;
      dom.style.cursor = 'grabbing';
    };
    const onMouseUp = () => {
      isDragging = false; dom.style.cursor = 'grab';
    };
    const onMouseMove = (e) => {
      if (!isDragging) return;
      rotY -= (e.clientX - prevX) * 0.008;
      rotX = Math.max(-1.4, Math.min(1.4, rotX + (e.clientY - prevY) * 0.008));
      prevX = e.clientX; prevY = e.clientY;
      updateCamera();
    };
    const onWheel = (e) => {
      e.preventDefault();
      zoom *= e.deltaY > 0 ? 0.92 : 1.08;
      zoom = Math.max(0.3, Math.min(3.0, zoom));
      updateCamera();
    };
    dom.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('mousemove', onMouseMove);
    dom.addEventListener('wheel', onWheel, { passive: false });
    
    let raf;
    const animate = () => {
      raf = requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();
    
    const onResize = () => {
      const w2 = mount.clientWidth, h2 = mount.clientHeight;
      camera.aspect = w2 / h2;
      camera.updateProjectionMatrix();
      renderer.setSize(w2, h2);
    };
    const ro = new ResizeObserver(onResize);
    ro.observe(mount);
    
    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      dom.removeEventListener('mousedown', onMouseDown);
      window.removeEventListener('mouseup', onMouseUp);
      window.removeEventListener('mousemove', onMouseMove);
      dom.removeEventListener('wheel', onWheel);
      if (mount && renderer.domElement.parentNode === mount) {
        mount.removeChild(renderer.domElement);
      }
      renderer.dispose();
      seatTopGeo.dispose(); seatBotGeo.dispose(); seatOuterGeo.dispose(); seatInnerGeo.dispose();
      needleGeo.dispose(); stemGeo.dispose();
      inletGeo.dispose(); inletCapGeo.dispose();
      outletGeo.dispose(); outletCapGeo.dispose();
      seatMat.dispose(); seatInnerMat.dispose();
      needleMat.dispose(); stemMat.dispose();
      inletMat.dispose(); outletMat.dispose();
    };
  }, [D_seat_mm, stroke_max_mm,
      L_inlet_mm, L_outlet_mm, needle_angle, needle_profile,
      opening_eff, stroke_m]);
  
  return (
    <div ref={mountRef} style={{
      width: '100%', height: 400, minHeight: 400,
      borderRadius: 6, overflow: 'hidden', position: 'relative'
    }} />
  );
}



/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   2D Coil Viewer вҖ” SVG plan view
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function CoilViewer({ view, D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits,
                     tubeMaterial, finMaterial }) {
  const W = 700, H = 320;
  
  if (view === 'Top') {
    return <TopView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} P_l={P_l}
                    N_circuits={N_circuits} tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
  }
  // Front (default)
  return <FrontView W={W} H={H} D_o={D_o} L_tube={L_tube} FPI={FPI} t_fin={t_fin}
                    N_tubes={N_tubes} N_rows={N_rows} P_t={P_t} P_l={P_l} N_circuits={N_circuits}
                    tubeMaterial={tubeMaterial} finMaterial={finMaterial} />;
}

/* в”Җв”Җв”Җв”Җв”Җ Top view вҖ” мң„м—җм„ң ліё к·ёлҰј (нҠңлёҢ кёёмқҙ л°©н–Ҙ + fin pattern) в”Җв”Җв”Җв”Җв”Җ */
function TopView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l,
                   N_circuits, tubeMaterial, finMaterial }) {
  // Top view = мң„м—җм„ң ліё plan (нҠңлёҢ кёёмқҙл°©н–Ҙмқҙ horizontal, finмқҖ мҲҳм§Ғм„ )
  // compressor-sim мҠӨнғҖмқј: var(--bg3) л°°кІҪ, var(--tx2/3) лқјлІЁ, dimension lines
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = L_tube;
  const coreH_mm = N_rows * P_l;
  
  const padX = 60, padY = 50;
  const scale = Math.min((W - 2*padX) / coreW_mm, (H - 2*padY) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;
  
  const P_fin_mm = 25.4 / FPI;
  const N_fins = Math.floor(L_tube / P_fin_mm);
  const finStep = Math.max(1, Math.floor(N_fins / 50));
  
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{
      width: '100%', height: '100%', background: 'var(--bg3)',
      borderRadius: 6, display: 'block'
    }}>
      {/* Outer frame (heat exchanger envelope) */}
      <rect x={x0} y={y0} width={drawW} height={drawH}
            fill="var(--bg2)" stroke="var(--tx2)" strokeWidth="1.5" rx="2" />
      
      {/* Fins (м–ҮмқҖ мҲҳм§Ғм„ ) вҖ” top viewм—җм„ңлҠ” finмқҙ лӢЁл©ҙ мҳҶмңјлЎң ліҙмһ„ */}
      {Array.from({ length: Math.floor(N_fins / finStep) }, (_, i) => {
        const x = x0 + (i * finStep * P_fin_mm) * scale;
        return (
          <line key={`fin${i}`} x1={x} y1={y0} x2={x} y2={y0 + drawH}
                stroke="var(--tx3)" strokeWidth="0.4" opacity="0.6" />
        );
      })}
      
      {/* Tubes (к°Ғ rowл§ҲлӢӨ horizontal line) */}
      {Array.from({ length: N_rows }, (_, r) => {
        const y = y0 + (r + 0.5) * P_l * scale;
        const dot_r = Math.max(2, D_o * scale * 0.5);
        return (
          <g key={`row${r}`}>
            {/* tube line (length) */}
            <line x1={x0 + 5} y1={y} x2={x0 + drawW - 5} y2={y}
                  stroke="var(--accent)" strokeWidth={Math.max(1.5, D_o * scale * 0.6)}
                  opacity="0.85" />
            {/* row label */}
            <text x={x0 - 8} y={y + 3} textAnchor="end"
                  fill="var(--tx3)" fontSize="9" fontFamily="monospace">R{r}</text>
          </g>
        );
      })}
      
      {/* Top dimension: L_tube */}
      <line x1={x0} y1={y0 - 22} x2={x0 + drawW} y2={y0 - 22}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0} y1={y0 - 26} x2={x0} y2={y0 - 18} stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW} y1={y0 - 26} x2={x0 + drawW} y2={y0 - 18}
            stroke="var(--tx3)" strokeWidth="1" />
      <text x={x0 + drawW/2} y={y0 - 30} textAnchor="middle"
            fill="var(--tx2)" fontSize="11">L_tube = {L_tube}mm</text>
      
      {/* Right dimension: depth = N_rows Г— P_l */}
      <line x1={x0 + drawW + 22} y1={y0} x2={x0 + drawW + 22} y2={y0 + drawH}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW + 18} y1={y0} x2={x0 + drawW + 26} y2={y0}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW + 18} y1={y0 + drawH} x2={x0 + drawW + 26} y2={y0 + drawH}
            stroke="var(--tx3)" strokeWidth="1" />
      <text x={x0 + drawW + 30} y={y0 + drawH/2 + 3}
            fill="var(--tx2)" fontSize="11">D = {(N_rows*P_l).toFixed(0)}mm</text>
      
      {/* Bottom info */}
      <text x={W/2} y={y0 + drawH + 32} textAnchor="middle"
            fill="var(--tx3)" fontSize="10" fontFamily="monospace">
        FPI={FPI} В· t_fin={t_fin}mm В· {N_fins} fins В· D_o={D_o}mm
      </text>
      <text x={W/2} y={y0 + drawH + 46} textAnchor="middle"
            fill="var(--tx3)" fontSize="10" fontFamily="monospace">
        {N_rows} rows (н–ү, кіөкё°л°©н–Ҙ) Г— {tubesPerRow} cols (м—ҙ, вҠҘ) = {N_tubes} tubes
      </text>
    </svg>
  );
}

function FrontView({ W, H, D_o, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits,
                    tubeMaterial }) {
  // Front view = м•һм—җм„ң ліё лӢЁл©ҙ (tube end + fin pattern)
  // м§„мҳҒлӢҳ м •мқҳ:
  //   вҖў row    = кіөкё° нқҗлҰ„ л°©н–Ҙ (м„ёлЎңм¶•, P_l pitch)
  //   вҖў column = кіөкё° нқҗлҰ„ мҲҳм§Ғ л°©н–Ҙ (к°ҖлЎңм¶•, P_t pitch)
  // нҠңлёҢк°Җ м җ(мӣҗ)мңјлЎң ліҙмһ„, staggered кІ©мһҗ
  const tubesPerRow = Math.ceil(N_tubes / N_rows);
  const coreW_mm = tubesPerRow * P_t;   // к°ҖлЎң = м—ҙ Г— P_t (transverse)
  const coreH_mm = N_rows * P_l;        // м„ёлЎң = н–ү Г— P_l (longitudinal, кіөкё° л°©н–Ҙ)
  
  const padX = 80, padY = 60;
  const scale = Math.min((W - 2*padX) / coreW_mm, (H - 2*padY) / coreH_mm);
  const drawW = coreW_mm * scale;
  const drawH = coreH_mm * scale;
  const x0 = (W - drawW) / 2;
  const y0 = (H - drawH) / 2;
  
  const tube_r = Math.max(2, D_o * scale * 0.45);
  
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{
      width: '100%', height: '100%', background: 'var(--bg3)',
      borderRadius: 6, display: 'block'
    }}>
      {/* Outer frame */}
      <rect x={x0} y={y0} width={drawW} height={drawH}
            fill="var(--bg2)" stroke="var(--tx2)" strokeWidth="1.5" rx="2" />
      
      {/* Air arrow вҖ” row л°©н–Ҙ(м„ёлЎң), м§„мҳҒлӢҳ м •мқҳ: row = кіөкё° нқҗлҰ„ л°©н–Ҙ
         кІ©мһҗ м „мІҙ лҶ’мқҙл§ҢнҒј нҒ° нҷ”мӮҙн‘ңлЎң лӘ…нҷ•нһҲ н‘ңмӢң */}
      <defs>
        <marker id="airArr" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
          <polygon points="0 0, 10 0, 5 9" fill="#3b82f6" />
        </marker>
        <linearGradient id="airGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.0" />
          <stop offset="20%" stopColor="#3b82f6" stopOpacity="0.7" />
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.95" />
        </linearGradient>
      </defs>
      
      {/* кІ©мһҗ м „мІҙ лҶ’мқҙмқҳ нҒ° нҷ”мӮҙн‘ң (frame л°”лЎң мҷјмӘҪ) */}
      <line x1={x0 - 24} y1={y0} x2={x0 - 24} y2={y0 + drawH}
            stroke="url(#airGrad)" strokeWidth="3.5"
            markerEnd="url(#airArr)" />
      
      {/* лқјлІЁ л°•мҠӨ вҖ” нҷ”мӮҙн‘ң мң„мӘҪм—җ нҒ¬кІҢ */}
      <g transform={`translate(${x0 - 50}, ${y0 - 32})`}>
        <rect x="0" y="0" width="56" height="22" rx="4"
              fill="#3b82f6" fillOpacity="0.12"
              stroke="#3b82f6" strokeWidth="1.5" />
        <text x="28" y="14" textAnchor="middle"
              fill="#1e40af" fontSize="12" fontWeight="800"
              style={{ letterSpacing: '1px' }}>AIR вҶ“</text>
      </g>
      
      {/* н–үл°©н–Ҙ м•ҲлӮҙ вҖ” нҷ”мӮҙн‘ң мҳҶм—җ мһ‘кІҢ */}
      <text x={x0 - 24} y={y0 + drawH/2}
            fill="#1e40af" fontSize="10" fontWeight="600"
            textAnchor="end" transform={`rotate(-90, ${x0 - 30}, ${y0 + drawH/2})`}>
        кіөкё° нқҗлҰ„ (н–ү л°©н–Ҙ)
      </text>
      
      {/* Tubes вҖ” staggered grid (row=м„ёлЎң/P_l, col=к°ҖлЎң/P_t) */}
      {Array.from({ length: N_rows }, (_, r) =>
        Array.from({ length: tubesPerRow }, (_, c) => {
          const yOffset = (r % 2 === 1) ? P_t/2 : 0;
          const cx = x0 + (c + 0.5) * P_t * scale + (yOffset > 0 ? P_t/2 * scale : 0);
          const cy = y0 + (r + 0.5) * P_l * scale;  // row spacing = P_l
          if (cx > x0 + drawW - 2 || cx < x0 + 2) return null;
          return (
            <g key={`t${r}-${c}`}>
              {/* outer tube */}
              <circle cx={cx} cy={cy} r={tube_r}
                      fill="var(--accent)" fillOpacity="0.18"
                      stroke="var(--accent)" strokeWidth="1" />
              {/* inner bore */}
              <circle cx={cx} cy={cy} r={tube_r * 0.65}
                      fill="var(--bg)" stroke="var(--tx3)" strokeWidth="0.5" />
            </g>
          );
        })
      )}
      
      {/* Top dimension: total width */}
      <line x1={x0} y1={y0 - 12} x2={x0 + drawW} y2={y0 - 12}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0} y1={y0 - 16} x2={x0} y2={y0 - 8} stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW} y1={y0 - 16} x2={x0 + drawW} y2={y0 - 8}
            stroke="var(--tx3)" strokeWidth="1" />
      <text x={x0 + drawW/2} y={y0 - 18} textAnchor="middle"
            fill="var(--tx2)" fontSize="11">{(coreW_mm).toFixed(0)}mm ({tubesPerRow}Г—P_t)</text>
      
      {/* Right dimension: total height */}
      <line x1={x0 + drawW + 22} y1={y0} x2={x0 + drawW + 22} y2={y0 + drawH}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW + 18} y1={y0} x2={x0 + drawW + 26} y2={y0}
            stroke="var(--tx3)" strokeWidth="1" />
      <line x1={x0 + drawW + 18} y1={y0 + drawH} x2={x0 + drawW + 26} y2={y0 + drawH}
            stroke="var(--tx3)" strokeWidth="1" />
      <text x={x0 + drawW + 30} y={y0 + drawH/2 + 3}
            fill="var(--tx2)" fontSize="11">{(coreH_mm).toFixed(0)}mm</text>
      
      {/* Bottom info */}
      <text x={W/2} y={y0 + drawH + 28} textAnchor="middle"
            fill="var(--tx3)" fontSize="10" fontFamily="monospace">
        D_o = {D_o}mm В· P_t = {P_t}mm В· staggered В· {N_rows}н–ү Г— {tubesPerRow}м—ҙ = {N_tubes} tubes
      </text>
      <text x={W/2} y={y0 + drawH + 42} textAnchor="middle"
            fill="var(--tx3)" fontSize="10" fontFamily="monospace">
        {N_circuits} circuits ({(N_tubes/N_circuits).toFixed(1)} tubes/circuit avg)
      </text>
    </svg>
  );
}

function DerivedStats({ D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits }) {
  const stats = useMemo(() => {
    const D_o_m = D_o / 1000, D_i_m = D_i / 1000;
    const L_m = L_tube / 1000, P_t_m = P_t / 1000, P_l_m = P_l / 1000;
    const t_fin_m = t_fin / 1000;
    const P_fin_m = 0.0254 / FPI;
    
    const L_total = L_m * N_tubes; // мҙқ нҠңлёҢ кёёмқҙ
    const A_i = Math.PI * D_i_m * L_total; // лӮҙл¶Җ л©ҙм Ғ
    const A_tube_outer = Math.PI * D_o_m * L_total;
    
    const tubesPerRow = Math.ceil(N_tubes / N_rows);
    const W_face = tubesPerRow * P_t_m;
    const H_face = L_m;
    const A_o_face = W_face * H_face;
    const depth = N_rows * P_l_m;
    
    const N_fins = Math.floor(L_m / P_fin_m);
    const A_per_fin = 2 * (P_t_m * P_l_m * N_rows - Math.PI * D_o_m * D_o_m / 4 * N_tubes / tubesPerRow);
    const A_fin_total = Math.max(0, N_fins * A_per_fin);
    
    const A_o = A_tube_outer + A_fin_total;
    const V_internal = Math.PI * (D_i_m / 2) ** 2 * L_total * 1000; // L
    
    return {
      L_total: L_total.toFixed(1),
      A_i: A_i.toFixed(3),
      A_o: A_o.toFixed(3),
      A_o_face: A_o_face.toFixed(4),
      W_face: (W_face * 1000).toFixed(0),
      H_face: (H_face * 1000).toFixed(0),
      depth: (depth * 1000).toFixed(0),
      N_fins,
      A_fin_total: A_fin_total.toFixed(3),
      V_internal: V_internal.toFixed(2),
      tubes_per_circuit: (N_tubes / N_circuits).toFixed(1),
      P_fin: (P_fin_m * 1000).toFixed(2),
      A_face_ratio: (A_o / A_o_face).toFixed(0),
    };
  }, [D_o, D_i, L_tube, FPI, t_fin, N_tubes, N_rows, P_t, P_l, N_circuits]);

  const groups = [
    {
      title: 'л©ҙм Ғ / мІҙм Ғ',
      items: [
        { label: 'A_o (мҷёл¶Җ мҙқ)',     value: stats.A_o,         unit: 'mВІ' },
        { label: 'A_i (лӮҙл¶Җ мҙқ)',     value: stats.A_i,         unit: 'mВІ' },
        { label: 'A_o_face (м •л©ҙ)',   value: stats.A_o_face,    unit: 'mВІ' },
        { label: 'A_o/A_face',        value: stats.A_face_ratio, unit: '-' },
        { label: 'V_internal',         value: stats.V_internal,   unit: 'L' },
      ],
    },
    {
      title: 'м№ҳмҲҳ',
      items: [
        { label: 'W_face',             value: stats.W_face,       unit: 'mm' },
        { label: 'H_face',             value: stats.H_face,       unit: 'mm' },
        { label: 'Depth',              value: stats.depth,        unit: 'mm' },
        { label: 'L_total',            value: stats.L_total,      unit: 'm' },
      ],
    },
    {
      title: 'Fin / Circuit',
      items: [
        { label: 'P_fin',              value: stats.P_fin,        unit: 'mm' },
        { label: 'N_fins (per tube)',  value: stats.N_fins,       unit: '-' },
        { label: 'A_fin_total',        value: stats.A_fin_total,  unit: 'mВІ' },
        { label: 'Tubes/circuit',      value: stats.tubes_per_circuit, unit: '-' },
      ],
    },
  ];

  return (
    <div className="mt-4 bg-white border border-slate-200 rounded-lg p-4">
      <div className="text-[12px] font-bold text-slate-700 mb-3 uppercase tracking-wider font-mono">
        Derived Properties
      </div>
      <div className="grid grid-cols-3 gap-4">
        {groups.map((g, gi) => (
          <div key={gi}>
            <div className="text-[10px] text-slate-400 font-mono uppercase mb-1.5">{g.title}</div>
            <div className="space-y-0.5">
              {g.items.map((it, i) => (
                <div key={i} className="flex items-baseline justify-between text-[12px]">
                  <span className="text-slate-600">{it.label}</span>
                  <span className="font-mono font-semibold text-slate-900 tabular-nums">
                    {it.value}<span className="text-slate-400 font-normal ml-1">{it.unit}</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   Rolling Piston Visualization (compressor-sim к·ёлҢҖлЎң к°Җм ёмҳҙ)
   - RollingPistonView: 2D top view (SVG)
   - RollingPiston3D: 3D isometric (Three.js r128)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function RollingPistonView({ R_c_mm, R_p_mm, H_mm, t_vane_mm, theta_deg }) {
  const theta = theta_deg * Math.PI / 180;
  const scale = 140 / Math.max(R_c_mm, 20); // fit R_c to ~140px radius, more padding
  const cx = 200, cy = 200; // SVG center
  
  // Phase intensity (CompressorViewмқҳ phaseIntensityмҷҖ лҸҷмқјн•ң н•ЁмҲҳ):
  //   SUC: peak at Оё=270В° (chamber growing вҖ” portмҷҖ м—°кІ°лҗң мӢңм җ)
  //   DIS: peak at Оё=90В°  (compression chamber вҶ’ valve open)
  const sucI = Math.max(0, -Math.sin(theta));
  const disI = Math.max(0, Math.sin(theta));
  const sucOpacity = 0.25 + 0.75 * sucI;
  const disOpacity = 0.25 + 0.75 * disI;
  const sucWidth = 1.5 + 2.0 * sucI;
  const disWidth = 1.5 + 2.0 * disI;

  const Rc = R_c_mm * scale;
  const Rp = R_p_mm * scale;
  const e = (R_c_mm - R_p_mm) * scale;
  const tv = t_vane_mm * scale;

  // Piston center (eccentric orbit)
  const px = cx + e * Math.sin(theta);
  const py = cy - e * Math.cos(theta);

  // Contact point (piston touches cylinder inner wall)
  const contact_x = cx + Rc * Math.sin(theta);
  const contact_y = cy - Rc * Math.cos(theta);

  // Vane: from cylinder center upward, sliding to follow piston
  const vane_protrusion = e * (1 + Math.cos(theta));
  const vane_len = Rc + vane_protrusion * scale / e * 2;

  // Suction port position (~210В°)
  // Suction port (~105В°, just CCW of vane вҖ” new chamber opening after piston passes vane)
  const suc_angle = Math.PI * 7 / 12;  // 105В°
  const suc_x = cx + (Rc + 5) * Math.cos(suc_angle);
  const suc_y = cy - (Rc + 5) * Math.sin(suc_angle);

  // Discharge port (~75В°, just CW of vane вҖ” compression chamber closing before piston reaches vane)
  const dis_angle = Math.PI * 5 / 12;  // 75В°
  const dis_x = cx + (Rc + 5) * Math.cos(dis_angle);
  const dis_y = cy - (Rc + 5) * Math.sin(dis_angle);

  // Compression ratio for color
  const V_ratio = 1 - theta_deg / 360;
  const P_color = `hsl(${210 - V_ratio * 180}, 70%, ${55 - V_ratio * 20}%)`;

  // Compression chamber arc (from contact point, clockwise to vane)
  // Suction chamber arc (from vane, clockwise to contact point)

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, width: '100%', height: '100%', justifyContent: 'center' }}>
      <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" style={{ width: '100%', height: '100%', maxWidth: 800, maxHeight: '100%', background: 'var(--bg3)', borderRadius: 12 }}>
        <defs>
          <radialGradient id="compGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor={P_color} stopOpacity="0.25" />
            <stop offset="100%" stopColor={P_color} stopOpacity="0.06" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          {/* Refrigerant flow arrow markers */}
          <marker id="sucArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#059669" />
          </marker>
          <marker id="disArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#dc2626" />
          </marker>
        </defs>

        {/* Cylinder wall */}
        <circle cx={cx} cy={cy} r={Rc} fill="url(#compGrad)" stroke="var(--tx2)" strokeWidth="2.5" />

        {/* Compression chamber fill (crescent) */}
        <circle cx={cx} cy={cy} r={Rc-1} fill={P_color} fillOpacity="0.1" />
        <circle cx={px} cy={py} r={Rp+1} fill="var(--bg3)" />

        {/* Piston */}
        <circle cx={px} cy={py} r={Rp} fill="var(--accent)" fillOpacity="0.08" stroke="var(--accent)" strokeWidth="2" />
        <circle cx={px} cy={py} r={2.5} fill="var(--accent)" />

        {/* Piston center cross */}
        <line x1={px-6} y1={py} x2={px+6} y2={py} stroke="var(--tx3)" strokeWidth="0.8" />
        <line x1={px} y1={py-6} x2={px} y2={py+6} stroke="var(--tx3)" strokeWidth="0.8" />

        {/* Contact point */}
        <circle cx={contact_x} cy={contact_y} r="4" fill="#d97706" filter="url(#glow)" />

        {/* Vane (vertical, top of cylinder) вҖ” physics: ext = e(1 - cos(Оё))
            Оё=0: ext=0 (pressed), Оё=180: ext=2e (max), Оё=90/270: ext=e */}
        <rect
          x={cx - tv/2} y={cy - Rc - 15}
          width={tv} height={(R_c_mm - R_p_mm) * scale * (1 - Math.cos(theta)) + 15}
          fill="#7c3aed" fillOpacity="0.3" stroke="#7c3aed" strokeWidth="1.5" rx="1"
        />

        {/* Vane slot */}
        <rect x={cx - tv/2 - 2} y={cy - Rc - 18} width={tv + 4} height={8}
          fill="var(--bg)" stroke="var(--tx2)" strokeWidth="1" rx="2" />

        {/* Suction port with flow arrow (мҷёл¶Җ вҶ’ мӢӨлҰ°лҚ” л°©н–Ҙ) */}
        <circle cx={suc_x} cy={suc_y} r="5.5" fill="#059669"
                fillOpacity={0.3 + 0.5 * sucI}
                stroke="#059669" strokeWidth={1.5 + sucI * 1.0} />
        <text x={suc_x - 18} y={suc_y + 18} fill="#059669"
              fontSize="11" fontFamily="var(--font)" fontWeight="600"
              opacity={0.5 + 0.5 * sucI}>SUC</text>
        {/* SUC flow arrow: outside вҶ’ port (inward along radial direction) */}
        {(() => {
          const L = 24;  // arrow length
          const nx = Math.cos(suc_angle), ny = -Math.sin(suc_angle);
          const x1 = suc_x + nx * L, y1 = suc_y + ny * L;  // outer end
          const x2 = suc_x + nx * 7, y2 = suc_y + ny * 7;  // inner end (arrow tip near port)
          return <line x1={x1} y1={y1} x2={x2} y2={y2}
                       stroke="#059669" strokeWidth={sucWidth}
                       markerEnd="url(#sucArrow)" opacity={sucOpacity} />;
        })()}

        {/* Discharge port with flow arrow (мӢӨлҰ°лҚ” вҶ’ мҷёл¶Җ л°©н–Ҙ) */}
        <circle cx={dis_x} cy={dis_y} r="4.5" fill="#dc2626"
                fillOpacity={0.3 + 0.5 * disI}
                stroke="#dc2626" strokeWidth={1.5 + disI * 1.0} />
        <text x={dis_x + 9} y={dis_y + 4} fill="#dc2626"
              fontSize="11" fontFamily="var(--font)" fontWeight="600"
              opacity={0.5 + 0.5 * disI}>DIS</text>
        {/* DIS flow arrow: port вҶ’ outside (outward along radial) */}
        {(() => {
          const L = 24;
          const nx = Math.cos(dis_angle), ny = -Math.sin(dis_angle);
          const x1 = dis_x + nx * 7, y1 = dis_y + ny * 7;  // inner end
          const x2 = dis_x + nx * L, y2 = dis_y + ny * L;  // outer end (arrow tip outside)
          return <line x1={x1} y1={y1} x2={x2} y2={y2}
                       stroke="#dc2626" strokeWidth={disWidth}
                       markerEnd="url(#disArrow)" opacity={disOpacity} />;
        })()}

        {/* Eccentricity line */}
        <line x1={cx} y1={cy} x2={px} y2={py} stroke="#d97706" strokeWidth="1.2" strokeDasharray="3,2" />

        {/* Cylinder center */}
        <circle cx={cx} cy={cy} r="2" fill="var(--tx2)" />

        {/* Radial leakage */}
        {(() => {
          const leak_angle = theta + Math.PI;
          const lx1 = px + Rp * Math.sin(leak_angle);
          const ly1 = py - Rp * Math.cos(leak_angle);
          const lx2 = cx + Rc * Math.sin(leak_angle);
          const ly2 = cy - Rc * Math.cos(leak_angle);
          const mx = (lx1+lx2)/2, my = (ly1+ly2)/2;
          return (
            <>
              <line x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke="#dc2626" strokeWidth="1.5" strokeDasharray="2,2" opacity="0.55" />
              <circle cx={mx} cy={my} r="2" fill="#dc2626" opacity="0.7" />
              <text x={mx+5} y={my-4} fill="#dc2626" fontSize="9" fontFamily="var(--font)" opacity="0.75">Оҙ_r</text>
            </>
          );
        })()}
        {/* Vane leakage arrows */}
        <line x1={cx - tv/2 - 3} y1={cy - Rc + 10} x2={cx - tv/2 - 3} y2={cy - Rc + 25}
          stroke="#ea580c" strokeWidth="1.2" markerEnd="url(#arrowhead)" opacity="0.5" />
        <line x1={cx + tv/2 + 3} y1={cy - Rc + 10} x2={cx + tv/2 + 3} y2={cy - Rc + 25}
          stroke="#ea580c" strokeWidth="1.2" markerEnd="url(#arrowhead)" opacity="0.5" />
        <text x={cx + tv/2 + 6} y={cy - Rc + 20} fill="#ea580c" fontSize="9" fontFamily="var(--font)" opacity="0.7">Оҙ_v</text>

        {/* Reference radius line (R_c), from center to top (12 o'clock = Оё=0 reference) */}
        <line x1={cx} y1={cy} x2={cx} y2={cy - Rc} stroke="var(--tx3)" strokeWidth="0.6" strokeDasharray="2,1" />
        <text x={cx + 8} y={cy - Rc/2} fill="var(--tx2)" fontSize="10" fontFamily="var(--font)">R_c</text>

        {/* Current angle radius line (center вҶ’ Оё direction, makes arc meaningful) */}
        <line x1={cx} y1={cy}
              x2={cx + Rc * Math.sin(theta)}
              y2={cy - Rc * Math.cos(theta)}
              stroke="#d97706" strokeWidth="0.8" strokeDasharray="3,2" opacity="0.7" />

        {/* Arrowhead marker */}
        <defs>
          <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ea580c" opacity="0.7" />
          </marker>
        </defs>

        {/* Angle arc вҖ” from 12 o'clock (Оё=0) sweeping clockwise through Оё */}
        {theta_deg > 5 && (
          <path
            d={`M ${cx} ${cy - 25} A 25 25 0 ${theta_deg > 180 ? 1 : 0} 1 ${cx + 25*Math.sin(theta)} ${cy - 25*Math.cos(theta)}`}
            fill="none" stroke="#d97706" strokeWidth="1.5" strokeOpacity="0.7"
          />
        )}

        {/* Labels */}
        <text x={cx} y={cy + Rc + 28} fill="var(--tx2)" fontSize="11" fontFamily="var(--font)" textAnchor="middle" fontWeight="500">
          Оё = {theta_deg.toFixed(0)}В° | e = {(R_c_mm - R_p_mm).toFixed(1)}mm
        </text>
        <text x={cx} y={cy + Rc + 44} fill="var(--tx3)" fontSize="10" fontFamily="var(--font)" textAnchor="middle">
          R_c={R_c_mm}mm  R_p={R_p_mm}mm  H={H_mm}mm
        </text>
      </svg>
    </div>
  );
}

// ============================================================
// Rolling Piston 3D View (Three.js)
// ============================================================
function RollingPiston3D({ R_c_mm, R_p_mm, H_mm, t_vane_mm, theta_deg,
                          autoRotate = false, explode = 0,
                          showCylinder = true, showPiston = true, showVane = true, showPlates = true }) {
  const mountRef = React.useRef(null);
  const sceneRef = React.useRef(null);
  const rendererRef = React.useRef(null);
  const pistonRef = React.useRef(null);
  const vaneRef = React.useRef(null);
  const cylinderRef = React.useRef(null);
  const cylWireRef = React.useRef(null);
  const topPlateRef = React.useRef(null);
  const botPlateRef = React.useRef(null);
  const autoRotateRef = React.useRef(autoRotate);
  const frameRef = React.useRef(null);
  const camStateRef = React.useRef({ theta: Math.PI/4, phi: Math.PI/5, r: 130 });
  React.useEffect(() => { autoRotateRef.current = autoRotate; }, [autoRotate]);

  React.useEffect(() => {
    if (!mountRef.current || typeof THREE === 'undefined') return;

    const W = mountRef.current.clientWidth || 360;
    const H_view = mountRef.current.clientHeight || 300;

    const scene = new THREE.Scene();
    // Light-theme friendly bg (matches fan-sim var(--bg3))
    scene.background = new THREE.Color(0xf0f1f3);
    const camera = new THREE.PerspectiveCamera(40, W / H_view, 0.1, 1000);
    camera.position.set(80, 60, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H_view);
    renderer.setPixelRatio(window.devicePixelRatio);
    mountRef.current.innerHTML = '';
    mountRef.current.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x334455, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(50, 80, 60);
    scene.add(dirLight);
    const dirLight2 = new THREE.DirectionalLight(0x4488cc, 0.3);
    dirLight2.position.set(-30, -20, 40);
    scene.add(dirLight2);

    const Rc = R_c_mm, Rp = R_p_mm, Hc = H_mm;
    const e = Rc - Rp;

    // в•җв•җв•җ Cylinder side wall only (simple outline) в•җв•җв•җ
    // Outer wall: open cylinder, no top/bottom caps
    const wallGeo = new THREE.CylinderGeometry(Rc, Rc, Hc, 64, 1, true);
    const wallMat = new THREE.MeshPhongMaterial({
      color: 0x475569, transparent: true, opacity: 0.2,
      side: THREE.DoubleSide, depthWrite: false
    });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    scene.add(wall);
    cylinderRef.current = wall;

    // Wall wireframe (edges only)
    const wallWireGeo = new THREE.EdgesGeometry(wallGeo);
    const wallWire = new THREE.LineSegments(wallWireGeo,
      new THREE.LineBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.6 }));
    scene.add(wallWire);
    cylWireRef.current = wallWire;

    // Plates removed entirely (user request)
    topPlateRef.current = null;
    botPlateRef.current = null;

    // Piston вҖ” initial position at Оё=0 (+X side)
    const pisGeo = new THREE.CylinderGeometry(Rp, Rp, Hc - 1, 48);
    const pisMat = new THREE.MeshPhongMaterial({ color: 0x94a3b8 });
    const piston = new THREE.Mesh(pisGeo, pisMat);
    const e_init = Rc - Rp;
    const theta_init = theta_deg * Math.PI / 180;
    piston.position.x = e_init * Math.sin(theta_init);
    piston.position.z = -e_init * Math.cos(theta_init);
    scene.add(piston);
    pistonRef.current = piston;

    // Vane вҖ” slot at z=-Rc (cylinder wall), extends inward by ext = e(1 - cos(Оё))
    const vaneGeo = new THREE.BoxGeometry(t_vane_mm, Hc - 1, Rc);
    const vaneMat = new THREE.MeshPhongMaterial({ color: 0x64748b });
    const vane = new THREE.Mesh(vaneGeo, vaneMat);
    const vane_ext_init = e_init * (1 - Math.cos(theta_init));
    vane.position.x = 0;
    vane.position.z = -Rc + vane_ext_init / 2;
    vane.scale.z = Math.max(vane_ext_init / Rc, 0.05);
    scene.add(vane);
    vaneRef.current = vane;

    // Suction port indicator вҖ” at ~105В° (just CCW of vane, new chamber opening)
    const sucGeo = new THREE.SphereGeometry(1.5, 16, 16);
    const sucMat = new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.5 });
    const sucSphere = new THREE.Mesh(sucGeo, sucMat);
    const sucAngle = Math.PI * 7 / 12;  // 105В°
    const sucX = Rc * Math.cos(sucAngle), sucZ = -Rc * Math.sin(sucAngle);
    sucSphere.position.set(sucX, 0, sucZ);
    scene.add(sucSphere);

    // Discharge port indicator вҖ” at ~75В° (just CW of vane, compression chamber closing)
    const disGeo = new THREE.SphereGeometry(1.2, 16, 16);
    const disMat = new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.5 });
    const disSphere = new THREE.Mesh(disGeo, disMat);
    const disAngle = Math.PI * 5 / 12;  // 75В°
    const disX = Rc * Math.cos(disAngle), disZ = -Rc * Math.sin(disAngle);
    disSphere.position.set(disX, 0, disZ);
    scene.add(disSphere);

    // в•җв•җв•җ Refrigerant flow arrows (SUC inward, DIS outward) в•җв•җв•җ
    // Suction arrow: pointing FROM outside TOWARD cylinder (gas enters)
    const arrowLen = Rc * 0.4;
    const nSuc = new THREE.Vector3(Math.cos(sucAngle), 0, -Math.sin(sucAngle)); // radial outward
    const sucStart = new THREE.Vector3(sucX + nSuc.x * arrowLen, 0, sucZ + nSuc.z * arrowLen);
    const sucDir = new THREE.Vector3(-nSuc.x, 0, -nSuc.z);  // inward
    const sucArrow = new THREE.ArrowHelper(sucDir, sucStart, arrowLen, 0x10b981, arrowLen*0.3, arrowLen*0.2);
    scene.add(sucArrow);

    // Discharge arrow: pointing FROM cylinder TOWARD outside (gas exits)
    const nDis = new THREE.Vector3(Math.cos(disAngle), 0, -Math.sin(disAngle));
    const disStart = new THREE.Vector3(disX, 0, disZ);
    const disDir = new THREE.Vector3(nDis.x, 0, nDis.z);  // outward
    const disArrow = new THREE.ArrowHelper(disDir, disStart, arrowLen, 0xef4444, arrowLen*0.3, arrowLen*0.2);
    scene.add(disArrow);

    // Text labels using sprites
    const makeLabel = (text, color) => {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillRect(0, 0, 128, 64);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.strokeRect(2, 2, 124, 60);
      ctx.font = 'bold 28px "Noto Sans KR", sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 32);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(12, 6, 1);
      return sprite;
    };
    const sucLabel = makeLabel('SUC', '#059669');
    sucLabel.position.set(sucX + nSuc.x * arrowLen * 1.7, 0, sucZ + nSuc.z * arrowLen * 1.7);
    scene.add(sucLabel);
    const disLabel = makeLabel('DIS', '#dc2626');
    disLabel.position.set(disX + nDis.x * arrowLen * 1.7, 0, disZ + nDis.z * arrowLen * 1.7);
    scene.add(disLabel);

    // Grid helper
    const grid = new THREE.GridHelper(80, 8, 0x1e293b, 0x1e293b);
    grid.position.y = -Hc/2 - 3;
    scene.add(grid);

    sceneRef.current = { scene, camera, renderer };
    rendererRef.current = renderer;
    renderer.render(scene, camera);

    // #13: Mouse drag rotation
    let isDragging = false, prevX = 0, prevY = 0;
    // Restore camera state from persistent ref
    let camTheta = camStateRef.current.theta;
    let camPhi = camStateRef.current.phi;
    let camR = camStateRef.current.r;
    const updateCam = () => {
      camera.position.set(
        camR * Math.sin(camPhi) * Math.cos(camTheta),
        camR * Math.cos(camPhi),
        camR * Math.sin(camPhi) * Math.sin(camTheta),
      );
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    };
    updateCam();
    const el = renderer.domElement;
    el.style.cursor = 'grab';
    el.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; el.style.cursor = 'grabbing'; });
    el.addEventListener('mousemove', e => {
      if (!isDragging) return;
      camTheta += (e.clientX - prevX) * 0.01;
      camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - (e.clientY - prevY) * 0.01));
      camStateRef.current.theta = camTheta;
      camStateRef.current.phi = camPhi;
      prevX = e.clientX; prevY = e.clientY;
      updateCam();
    });
    el.addEventListener('mouseup', () => { isDragging = false; el.style.cursor = 'grab'; });
    el.addEventListener('mouseleave', () => { isDragging = false; el.style.cursor = 'grab'; });
    el.addEventListener('wheel', e => {
      camR = Math.max(50, Math.min(300, camR + e.deltaY * 0.3));
      camStateRef.current.r = camR;
      updateCam();
      e.preventDefault();
    }, { passive: false });

    // Auto-rotate animation loop (fan-sim compatible)
    const animate = () => {
      if (autoRotateRef.current) {
        camTheta += 0.006;
        camStateRef.current.theta = camTheta;
        updateCam();
      }
      frameRef.current = requestAnimationFrame(animate);
    };
    frameRef.current = requestAnimationFrame(animate);

    // ResizeObserver вҖ” auto-fit canvas to container size
    const resizeObs = new ResizeObserver(() => {
      if (!mountRef.current) return;
      const nw = mountRef.current.clientWidth;
      const nh = mountRef.current.clientHeight;
      if (nw > 0 && nh > 0) {
        renderer.setSize(nw, nh);
        camera.aspect = nw / nh;
        camera.updateProjectionMatrix();
        updateCam();
      }
    });
    resizeObs.observe(mountRef.current);

    return () => {
      if (frameRef.current) cancelAnimationFrame(frameRef.current);
      resizeObs.disconnect();
      renderer.dispose();
      if (mountRef.current) mountRef.current.innerHTML = '';
    };
  }, [R_c_mm, R_p_mm, H_mm, t_vane_mm]);

  // Update piston/vane position on theta change
  React.useEffect(() => {
    if (!sceneRef.current || !pistonRef.current || !vaneRef.current) return;
    const { scene, camera, renderer } = sceneRef.current;
    const e = R_c_mm - R_p_mm;
    const theta = theta_deg * Math.PI / 180;

    // Piston: eccentric orbit (x-z plane, y=height)
    // Оё=0 вҶ’ piston at vane position (-Z), vane fully pressed (ext=0)
    //   Оё=0В°: piston at -Z (under vane)
    //   Оё=90В°: piston at +X
    //   Оё=180В°: piston at +Z (opposite vane)
    //   Оё=270В°: piston at -X
    pistonRef.current.position.x = e * Math.sin(theta);
    pistonRef.current.position.z = -e * Math.cos(theta);

    // Vane: slides along z=0, slot at z=-Rc (cylinder wall on -Z side)
    // Extends inward (toward +z) by ext = e(1 - cos(Оё))
    //   Оё=0:   ext = 0   (piston at vane, fully retracted/pressed)
    //   Оё=90В°: ext = e   (piston at +X)
    //   Оё=180В°: ext = 2e (piston opposite vane, max extension)
    //   Оё=270В°: ext = e  (piston at -X)
    const vane_ext = e * (1 - Math.cos(theta));
    vaneRef.current.position.x = 0;
    vaneRef.current.position.z = -R_c_mm + vane_ext / 2;
    vaneRef.current.scale.z = Math.max(vane_ext / R_c_mm, 0.05);

    renderer.render(scene, camera);
  }, [theta_deg, R_c_mm, R_p_mm]);

  // Visibility toggles + explode effect
  React.useEffect(() => {
    if (!sceneRef.current) return;
    const { scene, camera, renderer } = sceneRef.current;
    if (cylinderRef.current) cylinderRef.current.visible = showCylinder;
    if (cylWireRef.current) cylWireRef.current.visible = showCylinder;
    if (pistonRef.current) pistonRef.current.visible = showPiston;
    if (vaneRef.current) vaneRef.current.visible = showVane;
    if (topPlateRef.current) topPlateRef.current.visible = showPlates;
    if (botPlateRef.current) botPlateRef.current.visible = showPlates;
    // Explode: parts separate along Y axis
    // Plates move furthest, piston/vane moderately
    const E = explode;  // explode magnitude
    if (topPlateRef.current) topPlateRef.current.position.y = H_mm/2 + 1 + E * 2.0;
    if (botPlateRef.current) botPlateRef.current.position.y = -H_mm/2 - 1 - E * 2.0;
    if (pistonRef.current) pistonRef.current.position.y = E * 0.8;   // piston slightly up
    if (vaneRef.current) vaneRef.current.position.y = E * 0.4;       // vane slightly up
    if (cylinderRef.current) cylinderRef.current.position.y = 0;     // cylinder stays centered
    if (cylWireRef.current) cylWireRef.current.position.y = 0;
    renderer.render(scene, camera);
  }, [showCylinder, showPiston, showVane, showPlates, explode, H_mm]);

  return (
    <div ref={mountRef} style={{ width: '100%', height: '100%', minHeight: 400, borderRadius: 12, overflow: 'hidden' }} />
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   Compressor (Chamber 1-Cycle) Component View
   typeNo 103 вҖ” backend/components/compressor_chamber.py wrapping
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function CompressorView({ onBack }) {
  // в”Җв”Җв”Җ Chamber 1-Cycle Fitting params в”Җв”Җв”Җ
  const [clearance_ratio, setClearance] = useState(0.03); // - (л°ұм—”л“ң default)
  const [rv_in, setRvin] = useState(2.5);               // -
  const [A_valve_in_mm2, setAvIn] = useState(8.0);      // mmВІ
  const [A_valve_out_mm2, setAvOut] = useState(6.0);    // mmВІ
  const [N_rated, setNrated] = useState(1800);          // rpm (л°ұм—”л“ң default)
  const [eta_motor, setEtaMotor] = useState(0.90);      // (л°ұм—”л“ң default)
  const [eta_inv, setEtaInv] = useState(0.95);
  
  // в”Җв”Җв”Җ Rotary geometry (compressor-simмқҳ RollingPiston* н•ЁмҲҳ нҳёнҷҳ) в”Җв”Җв”Җ
  // м§„мҳҒлӢҳ м§Җм Ғ л°ҳмҳҒ: V_disp лӢЁмқј мһ…л Ҙ лҢҖмӢ  R_cyl/R_pis/H/t_vaneмңјлЎң м§Ғм ‘ м •мқҳ
  // V_dispлҠ” derived: V_disp = ПҖ Г— (R_cylВІ - R_pisВІ) Г— H_cyl  (cmВі)
  const [R_cyl, setRcyl] = useState(24.0);              // mm вҖ” мӢӨлҰ°лҚ” лӮҙкІҪ л°ҳкІҪ
  const [R_pis, setRpis] = useState(20.5);              // mm вҖ” н”јмҠӨнҶӨ мҷёкІҪ л°ҳкІҪ
  const [H_cyl, setHcyl] = useState(25.0);              // mm вҖ” мӢӨлҰ°лҚ” лҶ’мқҙ
  const [t_vane, setTvane] = useState(3.0);             // mm вҖ” vane л‘җк»ҳ
  const [thetaView, setThetaView] = useState(45);       // deg вҖ” мӢңк°Ғнҷ”мҡ© нҡҢм „ к°ҒлҸ„
  const [thetaAnimate, setThetaAnimate] = useState(false);  // Оё мһҗлҸҷ нҡҢм „ (лӘЁл“  viewм—җ мҳҒн–Ҙ)
  const [thetaSpeed, setThetaSpeed] = useState(60);     // В°/s нҡҢм „ мҶҚлҸ„

  // в”Җв”Җв”Җ Fitting params (Bell ROM лҲ„м„Ө + л§Ҳм°° + мҶҗмӢӨ) в”Җв”Җв”Җ
  const [zeta_valve, setZetaValve] = useState(1.5);
  const [A_leak_mm2, setAleak] = useState(0.02);
  const [Cd_leak, setCdLeak] = useState(0.6);
  const [n_leak_rpm, setNleakRpm] = useState(0.5);
  const [over_comp_factor, setOverComp] = useState(0.3);
  const [n_poly_base, setNpoly] = useState(1.13);
  const [W_f_const, setWfConst] = useState(20.0);
  const [alpha_f_rpm, setAlphaFrpm] = useState(8e-6);
  const [AU_loss, setAUloss] = useState(5.0);

  // Material / type
  const [comp_type, setCompType] = useState('rotary');  // rotary кё°ліё вҖ” RollingPiston лҸ„л©ҙ
  const [fluid] = useState('R290');
  const [T_amb, setTamb] = useState(25.0);

  // 3D viz controls (compressor-simкіј лҸҷмқј)
  const [autoRotate, setAutoRotate] = useState(false);
  const [explode, setExplode] = useState(0);
  const [showCylinder, setShowCylinder] = useState(true);
  const [showPiston, setShowPiston] = useState(true);
  const [showVane, setShowVane] = useState(true);
  const [showPlates, setShowPlates] = useState(true);

  // V_dispлҠ” derived (rotary кё°н•ҳн•ҷм—җм„ң мһҗлҸҷ кі„мӮ°)
  // V_disp [cmВі] = ПҖ Г— (R_cylВІ - R_pisВІ) Г— H_cyl Г— 10^-3 (mmВі вҶ’ cmВі)
  const V_disp = useMemo(() => {
    return Math.PI * (R_cyl*R_cyl - R_pis*R_pis) * H_cyl * 1e-3;
  }, [R_cyl, R_pis, H_cyl]);
  
  // в”Җв”Җ Phase intensity (SUC/DIS) вҖ” Оём—җ л”°лҘё нқЎмһ…/нҶ м¶ң мӮ¬мқҙнҒҙ к°•лҸ„ в”Җв”Җ
  // Rolling piston rotary м••м¶•кё°мқҳ лӢЁмҲңнҷ”лҗң phase model:
  //   вҖў SUC active: Оё вҲҲ [0В°, 180В°] (new chamber growing)
  //   вҖў DIS active: Оё вҲҲ [180В°, 360В°] (compression chamber pressurized вҶ’ valve open)
  // л¶Җл“ңлҹҪкІҢ sin кіЎм„ мқҳ м–‘/мқҢ л°ҳ:
  //   вҖў SUC intensity = max(0, -sin Оё)  вҖ” peak at Оё=270В° (chamber growing мӢңм җ л§Өм№ӯ)
  //   вҖў DIS intensity = max(0, sin Оё)   вҖ” peak at Оё=90В°  (compression chamber valve open)
  const phaseIntensity = useMemo(() => {
    const rad = thetaView * Math.PI / 180;
    return {
      suc: Math.max(0, -Math.sin(rad)),
      dis: Math.max(0, Math.sin(rad)),
    };
  }, [thetaView]);

  // Save panel state
  const [saveOpen, setSaveOpen] = useState(false);
  const [saves, setSaves] = useState({});
  const fileInputRef = useRef(null);

  // Apply panel state
  const [applyOpen, setApplyOpen] = useState(false);
  const [applyMsg, setApplyMsg] = useState('');

  // Visualization sub-tab: 0=3D, 1=Top view, 2=Front view (compressor-sim мҠӨнғҖмқј)
  const [vizSub, setVizSub] = useState(0);

  const STORAGE_KEY = 'on_design_compressor_slots';
  
  // в”Җв”Җ Оё мһҗлҸҷ нҡҢм „ animation в”Җв”Җ
  // thetaSpeedлҠ” refлЎң кҙҖлҰ¬ (effect мһ¬мӢӨн–ү л°©м§Җ) вҶ’ speed slider мӣҖм§Ғм—¬лҸ„ RAFк°Җ stack м•Ҳ лҗЁ
  // animatingRefлҠ” strict modeм—җм„ңлҸ„ RAF мӨ‘ліө мӢңмһ‘ л°©м§Җ
  const thetaSpeedRef = useRef(thetaSpeed);
  useEffect(() => { thetaSpeedRef.current = thetaSpeed; }, [thetaSpeed]);
  
  const animatingRef = useRef(false);
  useEffect(() => {
    if (!thetaAnimate) {
      animatingRef.current = false;
      return;
    }
    if (animatingRef.current) return;  // already running вҖ” do not start another RAF
    animatingRef.current = true;
    
    let raf;
    let lastT = performance.now();
    const tick = (now) => {
      if (!animatingRef.current) return;  // safeguard against stale ticks
      const dt = (now - lastT) / 1000;
      lastT = now;
      setThetaView(t => (t - thetaSpeedRef.current * dt + 360) % 360);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => {
      animatingRef.current = false;
      if (raf) cancelAnimationFrame(raf);
    };
  }, [thetaAnimate]);  // thetaSpeed м ңкұ°лҗЁ вҖ” speed ліҖкІҪмқҖ refлЎң л°ҳмҳҒ

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSaves(JSON.parse(raw));
    } catch (e) {}
  }, []);

  const currentParams = () => ({
    component: 'compressor',
    // Rotary geometry (1м°Ё мһ…л Ҙ)
    R_cyl, R_pis, H_cyl, t_vane,
    // Chamber 1-Cycle fitting params
    clearance_ratio, rv_in,
    A_valve_in_mm2, A_valve_out_mm2,
    N_rated, eta_motor, eta_inv,
    zeta_valve, A_leak_mm2, Cd_leak, n_leak_rpm,
    over_comp_factor, n_poly_base,
    W_f_const, alpha_f_rpm, AU_loss,
    comp_type, T_amb,
    // V_disp лҸ„ н•Ёк»ҳ (derivedм§Җл§Ң нҳёнҷҳм„ұ мң„н•ҙ м ҖмһҘ вҖ” load мӢң мһ¬кі„мӮ°лҗҳлҜҖлЎң л¬ҙмӢңлҗЁ)
    V_disp,
  });

  const applyParams = (p) => {
    if (!p) return;
    // Rotary geometry мҡ°м„  м Ғмҡ©
    if (p.R_cyl !== undefined) setRcyl(p.R_cyl);
    if (p.R_pis !== undefined) setRpis(p.R_pis);
    if (p.H_cyl !== undefined) setHcyl(p.H_cyl);
    if (p.t_vane !== undefined) setTvane(p.t_vane);
    // Chamber 1-Cycle
    if (p.clearance_ratio !== undefined) setClearance(p.clearance_ratio);
    if (p.rv_in !== undefined) setRvin(p.rv_in);
    if (p.A_valve_in_mm2 !== undefined) setAvIn(p.A_valve_in_mm2);
    if (p.A_valve_out_mm2 !== undefined) setAvOut(p.A_valve_out_mm2);
    if (p.N_rated !== undefined) setNrated(p.N_rated);
    if (p.eta_motor !== undefined) setEtaMotor(p.eta_motor);
    if (p.eta_inv !== undefined) setEtaInv(p.eta_inv);
    if (p.zeta_valve !== undefined) setZetaValve(p.zeta_valve);
    if (p.A_leak_mm2 !== undefined) setAleak(p.A_leak_mm2);
    if (p.Cd_leak !== undefined) setCdLeak(p.Cd_leak);
    if (p.n_leak_rpm !== undefined) setNleakRpm(p.n_leak_rpm);
    if (p.over_comp_factor !== undefined) setOverComp(p.over_comp_factor);
    if (p.n_poly_base !== undefined) setNpoly(p.n_poly_base);
    if (p.W_f_const !== undefined) setWfConst(p.W_f_const);
    if (p.alpha_f_rpm !== undefined) setAlphaFrpm(p.alpha_f_rpm);
    if (p.AU_loss !== undefined) setAUloss(p.AU_loss);
    if (p.comp_type !== undefined) setCompType(p.comp_type);
    if (p.T_amb !== undefined) setTamb(p.T_amb);
    // V_dispлҠ” derivedмқҙлҜҖлЎң л¬ҙмӢң вҖ” R_cyl/R_pis/H_cylлЎң мһҗлҸҷ кі„мӮ°
  };

  const saveSlot = (slot, name) => {
    const params = currentParams();
    const entry = { ...params, _name: name || `Slot ${slot}`, _timestamp: new Date().toISOString() };
    const newSaves = { ...saves, [slot]: entry };
    setSaves(newSaves);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSaves)); } catch (e) {}
  };
  const loadSlot = (slot) => {
    const e = saves[slot]; if (!e) return; applyParams(e);
  };
  const deleteSlot = (slot) => {
    const ns = { ...saves }; delete ns[slot]; setSaves(ns);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ns)); } catch (e) {}
  };

  // в”Җв”Җв”Җ backend (typeNo 103) params л§Өн•‘ в”Җв”Җв”Җ
  // V_dispлҠ” rotary geometryм—җм„ң derived (мӮ¬мҡ©мһҗк°Җ м§Ғм ‘ мһ…л Ҙн•ҳм§Җ м•ҠмқҢ)
  const buildBackendParams = () => ({
    fluid: fluid,
    comp_type: comp_type,
    T_amb: T_amb,
    V_disp: V_disp,  // derived from R_cyl/R_pis/H_cyl
    clearance_ratio: clearance_ratio,
    rv_in: rv_in,
    A_valve_in_mm2: A_valve_in_mm2,
    A_valve_out_mm2: A_valve_out_mm2,
    N_rated: N_rated,
    eta_motor: eta_motor,
    eta_inv: eta_inv,
    zeta_valve: zeta_valve,
    A_leak_mm2: A_leak_mm2,
    Cd_leak: Cd_leak,
    n_leak_rpm: n_leak_rpm,
    over_comp_factor: over_comp_factor,
    n_poly_base: n_poly_base,
    W_f_const: W_f_const,
    alpha_f_rpm: alpha_f_rpm,
    AU_loss: AU_loss,
  });

  const applyToHPWD = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_chamber',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('hpwd_pending_design', JSON.stringify(payload));
      setApplyMsg('вң“ HPWD StudioлЎң м Ғмҡ©лҗЁ. HPWD Studio canvasм—җм„ң typeNo 103 м»ҙнҸ¬л„ҢнҠёлҘј м¶”к°Җн•ҳл©ҙ мһҗлҸҷ м Ғмҡ©лҗ©лӢҲлӢӨ.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('вң— м Ғмҡ© мӢӨнҢЁ: ' + e.message);
    }
  };

  const applyToCalibration = () => {
    const beParams = buildBackendParams();
    const payload = {
      component: 'compressor_chamber',
      typeNo: 103,
      params: beParams,
      sourceParams: currentParams(),
      _timestamp: new Date().toISOString(),
      _source: 'on-design-studio',
    };
    try {
      localStorage.setItem('calibration_pending_design', JSON.stringify(payload));
      setApplyMsg('вң“ Calibration StudioлЎң м Ғмҡ©лҗЁ. Calibration Studioм—җм„ң fittingмқ„ мӢңмһ‘н•  мҲҳ мһҲмҠөлӢҲлӢӨ.');
      setTimeout(() => setApplyMsg(''), 5000);
    } catch (e) {
      setApplyMsg('вң— м Ғмҡ© мӢӨнҢЁ: ' + e.message);
    }
  };

  const exportJSON = () => {
    const data = { ...currentParams(), _exported_at: new Date().toISOString(), _version: '1.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `compressor_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.component && data.component !== 'compressor') {
          alert(`лӢӨлҘё м»ҙнҸ¬л„ҢнҠёмқҳ JSON: ${data.component}`); return;
        }
        applyParams(data);
      } catch (err) {
        alert('JSON нҢҢмӢұ мӢӨнҢЁ: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // в”Җв”Җв”Җ Derived stats в”Җв”Җв”Җ
  const derived = useMemo(() => {
    const V_disp_m3 = V_disp * 1e-6;  // cmВі вҶ’ mВі
    // мқҙлЎ  displacement rate (kg/s) вҖ” к°Җм • P_suc=5bar, T_suc=10В°C, R290 ПҒ ~12 kg/mВі
    const rho_suc_est = 12.0;  // лҢҖлһө
    const m_dot_th = V_disp_m3 * (N_rated / 60) * rho_suc_est;
    // мІҙм ҒнҡЁмңЁ м¶”м • вҖ” Bell ROM лӢЁмҲңнҷ”
    const eta_v_est = 1.0 - clearance_ratio * (Math.pow(rv_in, 1.0 / n_poly_base) - 1.0);
    return {
      V_disp_m3: (V_disp_m3 * 1e6).toFixed(2),  // cmВі
      m_dot_th: m_dot_th.toFixed(4),
      eta_v_est: eta_v_est.toFixed(3),
      A_in_total: (A_valve_in_mm2 * Cd_leak).toFixed(2),  // нҡЁкіјм Ғ л©ҙм Ғ
      W_friction_at_rated: (W_f_const + alpha_f_rpm * N_rated * N_rated).toFixed(1),
    };
  }, [V_disp, clearance_ratio, rv_in, N_rated, A_valve_in_mm2, Cd_leak, n_poly_base, W_f_const, alpha_f_rpm]);

  return (
    <div className="flex flex-col h-screen bg-slate-50">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 px-4 min-h-[48px] flex items-center gap-4 shrink-0">
        <button onClick={onBack}
          className="flex items-center gap-1 text-[12px] text-slate-600 hover:text-slate-900 font-medium">
          вҶҗ System
        </button>
        <span className="text-slate-300">|</span>
        <span className="text-purple-600 text-base">в—Ҷ</span>
        <span className="font-bold text-slate-900 text-[15px]">Compressor</span>
        <span className="text-[11px] font-mono text-slate-400">Chamber 1-Cycle В· On-design</span>

        <div className="flex-1"></div>

        <button onClick={() => setApplyOpen(o => !o)}
          className={`text-[11px] px-2.5 py-1.5 rounded font-mono font-semibold transition-colors flex items-center gap-1 ${
            applyOpen ? 'bg-purple-50 text-purple-700 border border-purple-300' : 'bg-slate-50 hover:bg-purple-50 text-slate-700 border border-slate-200'
          }`}
          title="лӢӨлҘё StudioлЎң м Ғмҡ©">вҶ— Apply</button>

        <button onClick={() => setSaveOpen(s => !s)}
          className={`text-base px-2.5 py-1 rounded transition-colors ${
            saveOpen ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-100'
          }`}
          title="Save / Load">рҹ’ҫ</button>
      </div>

      {/* Apply panel */}
      {applyOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Apply Design</div>
              <div className="text-[10px] text-slate-400 font-mono">нҳ„мһ¬ м„Өкі„лҘј лӢӨлҘё StudioлЎң лҸҷкё°нҷ” (RunмқҖ н•ҙлӢ№ Studioм—җм„ң)</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => applyToHPWD()}
                className="flex-1 px-3 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>вҶ—</span> HPWD Studio (typeNo 103)
              </button>
              <button onClick={() => applyToCalibration()}
                className="flex-1 px-3 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded text-[12px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                <span>вҶ—</span> Calibration Studio (fitting)
              </button>
            </div>
            {applyMsg && (
              <div className="mt-2 text-[11px] text-slate-600 font-mono">{applyMsg}</div>
            )}
          </div>
        </div>
      )}

      {/* Save / Load panel */}
      {saveOpen && (
        <div className="bg-white border-b border-slate-200 px-4 py-3 shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider">Save / Load</div>
              <div className="text-[10px] text-slate-400 font-mono">JSON: нҢҢмқј В· Slot: лёҢлқјмҡ°м Җ лӮҙ</div>
            </div>

                                      {(topGap/s).toFixed(2)}mm
                                    </text>
                                  )}
                                  {botGap > 8 && (
                                    <text x={cx} y={cy + Rcpx - botGap/2 + 3} textAnchor="middle"
                                          fill="#dc2626" fontSize="8" fontFamily="monospace" opacity="0.7">
                                      {(botGap/s).toFixed(2)}mm
                                    </text>
                                  )}
                                </>);
                              })()}
                              
                              {/* SUC port вҖ” top plate мң„мӘҪ (м„ёлЎңм¶• мғҒлӢЁ л¶Җк·ј) */}

                              <line x1={cx - Hpx/2 - 13} y1={cy - Dpx/4} x2={cx - Hpx/2 + 4} y2={cy - Dpx/4}

                                    strokeWidth={1.5 + 1.5 * phaseIntensity.suc}
                                    opacity={0.3 + 0.7 * phaseIntensity.suc} />
                              <text x={cx - Hpx/2 - 42} y={cy - Dpx/4 + 4} textAnchor="middle"
                                    fill="#1e40af" fontSize="11" fontWeight="700"

                              <text x={cx - Hpx/2 - 42} y={cy - Dpx/4 - 8} textAnchor="middle"
                                    fill="#1e40af" fontSize="9" fontFamily="monospace"
                                    opacity={0.45 + 0.55 * phaseIntensity.suc}>

                              </text>
                              {/* SUC arrow inflow (мҷёл¶Җ вҶ’ port) */}
                              <line x1={cx - Hpx/2 - 26} y1={cy - Dpx/4} x2={cx - Hpx/2 - 14} y2={cy - Dpx/4}

                              </defs>
                              
                              {/* DIS port вҖ” top plate м•„лһҳмӘҪ */}

                                       opacity={0.4 + 0.6 * phaseIntensity.dis}
                                       stroke="#7f1d1d" strokeWidth="1" />
                              <line x1={cx - Hpx/2 - 13} y1={cy + Dpx/4} x2={cx - Hpx/2 + 4} y2={cy + Dpx/4}

                                    strokeWidth={1.5 + 1.5 * phaseIntensity.dis}
                                    opacity={0.3 + 0.7 * phaseIntensity.dis} />
                              <text x={cx - Hpx/2 - 42} y={cy + Dpx/4 - 4} textAnchor="middle"

                              </text>
                              {/* DIS arrow outflow (port вҶ’ мҷёл¶Җ) */}

                                    strokeWidth={1.5 + 2.5 * phaseIntensity.dis}
                                    opacity={0.25 + 0.75 * phaseIntensity.dis}
                                    markerEnd="url(#disArr)" />
                              <defs>
                                <marker id="disArr" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
                                  <polygon points="6 0, 0 3, 6 6" fill="#dc2626" />
                                </marker>
                              </defs>
                              
                              {/* H dimension (top) */}

                              <line x1={cx - Hpx/2} y1={cy - Dpx/2 - 32} x2={cx - Hpx/2} y2={cy - Dpx/2 - 24}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2} y1={cy - Dpx/2 - 32} x2={cx + Hpx/2} y2={cy - Dpx/2 - 24}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <text x={cx} y={cy - Dpx/2 - 36} textAnchor="middle"
                                    fill="var(--tx2)" fontSize="11">H = {H_cyl}mm</text>
                              
                              {/* D dimension (right) */}
                              <line x1={cx + Hpx/2 + 30} y1={cy - Dpx/2} x2={cx + Hpx/2 + 30} y2={cy + Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2 + 26} y1={cy - Dpx/2} x2={cx + Hpx/2 + 34} y2={cy - Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <line x1={cx + Hpx/2 + 26} y1={cy + Dpx/2} x2={cx + Hpx/2 + 34} y2={cy + Dpx/2}
                                    stroke="var(--tx3)" strokeWidth="1" />
                              <text x={cx + Hpx/2 + 36} y={cy + 4}
                                    fill="var(--tx2)" fontSize="11">вҢҖ{(2 * R_cyl).toFixed(1)}mm</text>
                              
                              {/* Clearance label (left edge of piston) */}
                              <line x1={piston_x} y1={piston_y - 2} x2={piston_x} y2={piston_y + piston_h + 2}
                                    stroke="#d97706" strokeWidth="1.5" />

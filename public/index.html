/* тХРтХРтХРтХРтХРтХРтХРтХР Python Backend эЖ╡эХй тХРтХРтХРтХРтХРтХРтХРтХР
 * ь╗┤эПмыДМэК╕ьЭШ modelDescriptionьЧР backend: 'python'ьЭ┤ ьЮИьЬ╝ый┤ ьЛЬыом ьЧФьзДьЭ┤
 * ьЭ┤ эЧмэН╝ые╝ эЖ╡эХ┤ ы░▒ьЧФыУЬ(FastAPI)ьЧР ыПЩъ╕░ эШ╕ь╢Ь.
 * ы░▒ьЧФыУЬ ыЛдьЪ┤ ьЛЬ ь╗┤эПмыДМэК╕ьЭШ JS compute()ыбЬ fallback.
 *
 * URL ьЮРыПЩ ъ▓░ьаХ (ьЪ░ьДаьИЬьЬД):
 *   1. URL эММыЭ╝ып╕эД░ ?backend=...      тАФ ьЭ╝эЪМьД▒ override
 *   2. localStorage 'hpwd_backend_url' тАФ ьВмьЪйьЮРъ░А эЖаъ╕А UIыбЬ ьзАьаХ
 *   3. ьЮРыПЩ тАФ localhost ьаСьЖН ьЛЬ localhost, Railway ьаСьЖН ьЛЬ ы░░эПм URL
 */
const DEFAULT_BACKENDS = {
  cloud: 'https://hpwd-studio-task-production.up.railway.app',  // Railway ы░░эПм URL
  local: 'http://localhost:8010',   // ыбЬь╗м ы░▒ьЧФыУЬ (8000ьЭА Docker/LLM ьДЬы▓ДьЩА ьЮРьг╝ ь╢йыПМ тЖТ 8010)
};

function resolveBackendUrl() {
  // 1. URL эММыЭ╝ып╕эД░
  try {
    const param = new URLSearchParams(window.location.search).get('backend');
    if (param) return param;
  } catch (e) { /* ignore */ }
  // 2. localStorage
  try {
    const stored = localStorage.getItem('hpwd_backend_url');
    if (stored) return stored;
  } catch (e) { /* ignore */ }
  // 3. ьЮРыПЩ тАФ hostname ъ╕░ы░Ш
  // ъ╕░ы│╕: эШДьЮм эОШьЭ┤ьзАьЩА ъ░ЩьЭА origin (ы░▒ьЧФыУЬъ░А эФДыбаэК╕ыПД ьДЬы╣Щ тЖТ same-origin).
  // ыбЬь╗м(localhost:PORT)┬╖ьВмыВ┤ьДЬы▓Д(host:PORT) ьЦ┤ыФФьДЬ ьЧ┤ыУа ьЮРыПЩьЬ╝ыбЬ ызЮь╢д.
  // file://ыбЬ ьзБьаС ьЧ┤ый┤ ыбЬь╗м ы░▒ьЧФыУЬыбЬ. cloudыКФ эЖаъ╕А/?backend=ыбЬызМ.
  if (window.location.protocol === 'file:' || !window.location.host) {
    return DEFAULT_BACKENDS.local;
  }
  return window.location.origin;
}

// ы░▒ьЧФыУЬ health ьГБэГЬ тАФ UI status indicatorъ░А ь░╕ьб░
// urlьЭД ъ░Аы│АьЬ╝ыбЬ ыСРъ│а, ьВмьЪйьЮРъ░А эЖаъ╕АэХШый┤ ъ░▒ьЛа
window.HPWD_BACKEND = {
  url: resolveBackendUrl(),
  connected: false,
  components: [],
  lastError: null,
  presets: DEFAULT_BACKENDS,
  engine: 'python',                                       // 'python' | 'modelica' (эЩЬьД▒)
  enginePref: (function () {                              // ьДаэШ╕ ьЧФьзД (localStorage ьЬаьзА)
    try { return localStorage.getItem('hpwd_engine_pref') === 'modelica' ? 'modelica' : 'python'; }
    catch (e) { return 'python'; }
  })(),
  modelica: { available: false, components: [], reason: null },  // /healthьЧРьДЬ ь▒ДьЫА
};

// ьВмьЪйьЮРъ░А backend URL ы│Аъ▓╜ ьЛЬ эШ╕ь╢ЬыРШыКФ setter
window.HPWD_setBackend = function(newUrl) {
  newUrl = (newUrl || '').trim();
  if (!newUrl) {
    // ы╣ДьЪ░ый┤ ьЮРыПЩ ыкиыУЬыбЬ ы│╡ъ╖А
    try { localStorage.removeItem('hpwd_backend_url'); } catch (e) {}
    window.HPWD_BACKEND.url = resolveBackendUrl();
  } else {
    // ыБЭьЭШ / ьаЬъ▒░
    newUrl = newUrl.replace(/\/+$/, '');
    try { localStorage.setItem('hpwd_backend_url', newUrl); } catch (e) {}
    window.HPWD_BACKEND.url = newUrl;
  }
  window.HPWD_BACKEND.connected = false;
  window.HPWD_BACKEND.lastError = null;
  window.dispatchEvent(new Event('hpwd-backend-status'));
  checkBackendHealth();  // ьжЙьЛЬ ыЛдьЛЬ ь▓┤эБм
};

// ьВмьЪйьЮРъ░А ъ│ДьВ░ ьЧФьзД(Python/Modelica) эЖаъ╕А ьЛЬ эШ╕ь╢ЬыРШыКФ setter
window.HPWD_setEngine = function(engine) {
  if (engine !== 'python' && engine !== 'modelica') return;
  // ьДаэШ╕ ьЧФьзД ьаАьЮе (ыжмэФДыаИьЛЬэХ┤ыПД ьЬаьзА)
  window.HPWD_BACKEND.enginePref = engine;
  try { localStorage.setItem('hpwd_engine_pref', engine); } catch (e) {}
  // эЩЬьД▒ ьЧФьзД = ьДаэШ╕ тИй ъ░АьЪйьД▒ (modelica ьДаэГЭэЦИьЦ┤ыПД omc ьЧЖьЬ╝ый┤ python)
  const avail = window.HPWD_BACKEND.modelica && window.HPWD_BACKEND.modelica.available;
  window.HPWD_BACKEND.engine = (engine === 'modelica' && avail) ? 'modelica' : 'python';
  window.dispatchEvent(new Event('hpwd-backend-status'));
};

// ы╣ДыПЩъ╕░ health check тАФ 5ь┤ИызИыЛд эП┤ызБ
async function checkBackendHealth() {
  const url = window.HPWD_BACKEND.url;
  try {
    const r = await fetch(`${url}/health`, { method: 'GET' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    window.HPWD_BACKEND.connected = true;
    window.HPWD_BACKEND.components = data.components || [];
    window.HPWD_BACKEND.modelica = data.modelica_engine || { available: false, components: [], reason: null };
    // эЩЬьД▒ ьЧФьзД = ьДаэШ╕ ьЧФьзД(ьаАьЮеыРи) тИй ъ░АьЪйьД▒ тЖТ Local ьДЬы▓Д ьЮбэЮИый┤ Modelica ьЮРыПЩ ы│╡ьЫР,
    // ыБКъ╕░ый┤ pythonьЬ╝ыбЬ ьЮРыПЩ ы│╡ъ╖А (ьДаэШ╕ыКФ ьЬаьзА)
    window.HPWD_BACKEND.engine =
      (window.HPWD_BACKEND.enginePref === 'modelica' && window.HPWD_BACKEND.modelica.available)
        ? 'modelica' : 'python';
    window.HPWD_BACKEND.lastError = null;
  } catch (e) {
    window.HPWD_BACKEND.connected = false;
    window.HPWD_BACKEND.lastError = e.message;
  }
  // ы│Аъ▓╜ ьХМыж╝ (status indicatorъ░А re-render эК╕ыжмъ▒░)
  window.dispatchEvent(new Event('hpwd-backend-status'));
}
checkBackendHealth();
setInterval(checkBackendHealth, 5000);

/* ыПЩъ╕░ эШ╕ь╢Ь тАФ XMLHttpRequestыбЬ ызд stepызИыЛд эШ╕ь╢Ь.
 * эЦеэЫД async + ь║РьЛЬыбЬ ьзДэЩФ ъ░АыКеэХШьзАызМ ъ▓АьжЭ ыЛиъ│ДыКФ ыЛиьИЬэХиьЭ┤ ьЪ░ьДа.
 * URLьЭА ызд эШ╕ь╢ЬызИыЛд window.HPWD_BACKEND.urlьЧРьДЬ ъ░Аьа╕ьШ┤ (ьВмьЪйьЮР эЖаъ╕А ьжЙьЛЬ ы░ШьШБ). */
function callBackendSync(componentName, input, params, state, dt) {
  const xhr = new XMLHttpRequest();
  const url = window.HPWD_BACKEND.url;
  const endpoint = window.HPWD_BACKEND.engine === 'modelica' ? '/compute_modelica' : '/compute';
  xhr.open('POST', `${url}${endpoint}`, false); // ыПЩъ╕░ эШ╕ь╢Ь
  xhr.setRequestHeader('Content-Type', 'application/json');
  try {
    xhr.send(JSON.stringify({ component: componentName, input, params, state, dt }));
    if (xhr.status !== 200) {
      throw new Error(`Backend returned ${xhr.status}: ${xhr.responseText}`);
    }
    const data = JSON.parse(xhr.responseText);
    if (data.error) throw new Error(data.error);
    return { outputs: data.outputs || {}, newState: data.newState || state };
  } catch (e) {
    window.HPWD_BACKEND.connected = false;
    window.HPWD_BACKEND.lastError = e.message;
    window.dispatchEvent(new Event('hpwd-backend-status'));
    throw e;
  }
}

// ь╢Ьыае/ьЮЕыае ъ░Т эСЬьЛЬьЪй ьаБьЭСэШХ эПмыздэД░ тАФ ыГЙыздьЬаыЯЙ(kg/s ~0.005)ь▓ШыЯ╝ ьЮСьЭА ъ░ТыПД ьЬаэЪиьИльЮР ьЬаьзА
// 0.00495 тЖТ "0.00495", 0.0253 тЖТ "0.0253", 453.84 тЖТ "453.84", 77.91 тЖТ "77.91", 0 тЖТ "0"
function fmtVal(v) {
  if (typeof v !== 'number') return v;
  if (!isFinite(v)) return String(v);          // NaN/Infinity
  const a = Math.abs(v);
  if (a === 0) return '0';
  if (a >= 1000) return v.toFixed(1);
  if (a >= 1) return v.toFixed(2);
  if (a >= 0.001) return v.toPrecision(3);     // 0.00495, 0.0253, 0.171
  return v.toExponential(2);                   // ьХДьг╝ ьЮСьЭА ъ░Т
}

  fan: {
    typeNo: 200, name: 'Fan', category: 'air', color: '#0891b2', icon: Wind, image: './images/fan.png',
    desc: 'ьЖбэТНъ╕░ (ьЛЬыбЬь╜Ф/ь╢ХыеШ)',
    parameters: [
      { key: 'RPM', label: 'Speed', value: 2500, unit: 'rpm' },
      { key: 'V_max', label: 'V_max', value: 0.15, unit: 'm┬│/s' },
      { key: 'eta', label: '╬╖_fan', value: 0.55, unit: '-' },
      { key: 'dP_max', label: '╬ФP_max', value: 300, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_in', label: 'T_air_in', unit: '┬░C' },
      { key: 'dP_sys', label: '╬ФP_system', unit: 'Pa' },
    ],
    outputs: [
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
      { key: 'T_out', label: 'T_air_out', unit: '┬░C' },
      { key: 'W_fan', label: 'W_fan', unit: 'W' },
    ],
    compute: (inp, par) => {
      const T_in = inp.T_in ?? 25;
      const dP_sys = inp.dP_sys ?? 150;
      const speed_frac = par.RPM / 2500;
      const V = par.V_max * speed_frac * Math.sqrt(Math.max(1 - dP_sys / (par.dP_max * speed_frac ** 2), 0.1));
      const rho_air = 1.2 * (293.15 / (T_in + 273.15));
      const m_air = rho_air * V;
      const W_fan = (V * dP_sys) / par.eta;
      return { m_air, T_out: T_in + W_fan / (m_air * 1005 + 1e-6), W_fan };
    },
  },
  drum: {
    typeNo: 201, name: 'Drum', category: 'air', color: '#0e7490', icon: Gauge, image: './images/drum.png',
    desc: 'ьД╕эГБъ▒┤ьб░ъ╕░ ыУЬыЯ╝ (ьзБым╝-ъ│╡ъ╕░ ьЧ┤/ым╝ьзИьаДыЛм)',
    parameters: [
      { key: 'm_fabric', label: 'Fabric Mass', value: 5.0, unit: 'kg' },
      { key: 'MC_init', label: 'MC_init', value: 0.8, unit: '-' },
      { key: 'Tcl0', label: 'ь┤Иъ╕░ ьЭШыеШьШиыПД', value: 305, unit: 'K' },
      { key: 'hA', label: 'hA', value: 50, unit: 'W/K' },
      { key: 'dP_drum', label: '╬ФP_drum', value: 100, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_air_in', label: 'T_air_in', unit: '┬░C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_air_out', label: 'T_air_out', unit: '┬░C' },
      { key: 'MC', label: 'MC', unit: '-' },
      { key: 'm_evap', label: 'm_evap', unit: 'g/s' },
      { key: 'dP', label: '╬ФP', unit: 'Pa' },
    ],
    stateInit: { MC: null, T_fab: 25 },
    compute: (inp, par, t, state, dt) => {
      const T_air_in = inp.T_air_in ?? 50;
      const m_air = inp.m_air ?? 0.05;
      if (state.MC === null) state.MC = par.MC_init;
      const dT = T_air_in - state.T_fab;
      const Q = par.hA * dT;
      const h_fg = 2400e3;
      const m_evap = state.MC > 0.05 ? Q / h_fg : 0;
      state.T_fab = state.T_fab + (Q - m_evap * h_fg) / (par.m_fabric * 1500) * dt;
      state.MC = Math.max(state.MC - (m_evap * dt) / par.m_fabric, 0);
      return {
        T_air_out: T_air_in - Q / (m_air * 1005 + 1e-6),
        MC: state.MC,
        m_evap: m_evap * 1000,
        dP: par.dP_drum,
      };
    },
  },
  filter: {
    typeNo: 160, name: 'Filter', category: 'air', color: '#64748b', icon: Wind, image: './images/filter.png',
    desc: 'ыж░эК╕ эХДэД░ (Darcy-Forchheimer ьХХыаеъ░ХэХШ, ьИЬьИШ ьаАэХн)',
    parameters: [

    compute: (inp, par) => {

      return { m_air, T_out: inp.T_in ?? 25, dP: par.K * u * Math.abs(u) };
    },
  },

/* ыПЩьаБ ыЛиьЬД ыздэХС (Properties эМиыДРьЭШ unit:'@otherKey' эХ┤ьДЭьЪй)
 * ь╗┤эПмыДМэК╕ы│Д kindтЖТunit ьВмьаД. refrigerant_props/air_propsьЧРьДЬ ьВмьЪй. */
const DYNAMIC_UNIT_MAP = {
  refrigerant_props: {
    T: '┬░C', P: 'bar', Q: '-', H: 'kJ/kg', S: 'kJ/kg┬╖K', D: 'kg/m┬│', U: 'kJ/kg',
  },
  air_props: {
    T: '┬░C', P: 'bar', R: '%', W: 'kg/kg', B: '┬░C', D: '┬░C', H: 'kJ/kg',
  },
};
function resolveDynamicUnit(typeKey, kindValue) {
  const m = DYNAMIC_UNIT_MAP[typeKey];
  if (!m) return '';
  return m[kindValue] || '';
}

/* ы╕ФыбЭьЭШ outputs ьдС эШДьЮм эЩЬьД▒ыРЬ ъ▓ГызМ ы░ШэЩШ.
 * params.output_select ы░░ьЧ┤ьЭ┤ ьЮИьЬ╝ый┤ ъ╖╕ эХныкйызМ, ьЧЖьЬ╝ый┤ ьаДы╢А.
 * Refrigerant Props / Air Propsъ░А ьВмьЪй. */
function getActiveOutputs(block) {
  const def = TYPES[block.type];
  if (!def || !def.outputs) return [];
  const sel = block.params && block.params.output_select;
  if (!Array.isArray(sel)) return def.outputs;
  return def.outputs.filter(o => sel.includes(o.key));
}

/* ыСР ы╕ФыбЭ ь╣┤эЕМъ│аыжмыбЬы╢АэД░ default ыЭ╝ьЭ╕ ьвЕыеШ ъ▓░ьаХ.
 * ым╝ыжм ы░░ъ┤А ь╣┤эЕМъ│аыжм(refrigerant/air/water)ыБ╝ыжмыКФ ъ╖╕ ьвЕыеШыбЬ,
 * ь╢ФьГБ ь╣┤эЕМъ│аыжм(math/control/source/output)ъ░А ыБ╝ый┤ signalыбЬ default. */
function detectLineKind(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return 'signal';
  const fromCat = TYPES[fromBlock.type]?.category;
  const toCat = TYPES[toBlock.type]?.category;
  const PHYSICAL = new Set(['refrigerant', 'air', 'water']);
  // ьЦСьк╜ ыкиыСР ъ░ЩьЭА ым╝ыжм ы░░ъ┤А тЖТ ъ╖╕ ьвЕыеШ
  if (fromCat === toCat && PHYSICAL.has(fromCat)) return fromCat;
  // эХЬьк╜ызМ ым╝ыжм ы░░ъ┤А, ыЛдые╕ьк╜ьЭ┤ source/output ъ░ЩьЭА ьдСыж╜ тЖТ ым╝ыжм ы░░ъ┤А ьвЕыеШ
  // (ыЛи, ыЛдые╕ ь╢ФьГБ ь╣┤эЕМъ│аыжм(math/control)ьЩА ьДЮьЭ┤ый┤ signal ьЪ░ьДа)
  const ABSTRACT = new Set(['math', 'control']);
  const fromAbs = ABSTRACT.has(fromCat);
  const toAbs = ABSTRACT.has(toCat);
  if (fromAbs || toAbs) return 'signal';
  if (PHYSICAL.has(fromCat)) return fromCat;
  if (PHYSICAL.has(toCat)) return toCat;
  return 'signal';
}

/* ыЭ╝ьЭ╕ ьвЕыеШьЭШ default lineParams ьГЭьД▒ */
function defaultLineParams(kind) {
  const out = {};
  (LINE_KINDS[kind]?.fields || []).forEach(f => { out[f.key] = f.value; });
  return out;
}

/* ыСР ы╕ФыбЭ ьВмьЭ┤ьЧР ьЮРыПЩьЬ╝ыбЬ эШ╕эЩШ ьЛЬъ╖╕ыДР эОШьЦ┤ые╝ ыздэХС.
 * pass 1: эВд ьЩДьаДьЭ╝ь╣Ш  ┬╖  pass 2: эВд prefix + ыЛиьЬД ьЭ╝ь╣Ш  ┬╖  pass 3: ыЛиьЬДызМ ьЭ╝ь╣Ш */
function autoMapSignals(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return [];
  const fromOuts = TYPES[fromBlock.type]?.outputs || [];
  const toIns = TYPES[toBlock.type]?.inputs || [];
  const usedTo = new Set();
  const mapped = [];
  // pass 1: exact key match
  fromOuts.forEach(out => {
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.key === out.key);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 2: prefix + unit match (T_dis тЖФ T_in)
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    const prefix = out.key.split('_')[0];
    const m = toIns.find(inp =>
      !usedTo.has(inp.key) &&
      inp.key.split('_')[0] === prefix &&
      (inp.unit || '') === (out.unit || '')
    );
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 3: unit-only fallback
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    if (!out.unit) return;
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.unit === out.unit);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  return mapped;
}

// ъ╖╕ыжмыУЬ эБмъ╕░ (px). ь║Фы▓ДьКд ы░░ъ▓╜ dot patternъ│╝ ыПЩьЭ╝.
const GRID_SIZE = 20;

/* тХРтХРтХРтХРтХРтХРтХРтХР ы╕ФыбЭ connector slot ьЛЬьКдэЕЬ тХРтХРтХРтХРтХРтХРтХРтХР
 * эХЬ ы╕ФыбЭьЧР ьвМь╕б Nъ░Ь input slot, ьЪ░ь╕б Nъ░Ь output slot.
 * ьВмьЪй ьдСьЭ╕ slotызМ visible, ы╣И slotьЭА hover ыШРыКФ ьЧ░ъ▓░ ыкиыУЬьЭ╝ ыХМ ghostыбЬ эСЬьЛЬ.
 * эХЬ ы╕ФыбЭьЭ┤ ьЧмыЯм source / sink ыкиыУИъ│╝ ьЧ░ъ▓░ыРа ьИШ ьЮИыЛд. */
const SLOTS_PER_SIDE = 4;

/* connections ьдС эХ┤ыЛ╣ (block, side)ьЧРьДЬ ъ░АьЮе ы╣аые╕ ы╣И slot index. ыЛд ь░иый┤ ызИьзАызЙ. */
function findFreeSlot(cs, blockId, side) {
  const used = new Set();
  cs.forEach(c => {
    if (c.from?.blockId === blockId && c.from.side === side && c.from.slot !== undefined) used.add(c.from.slot);
    if (c.to?.blockId === blockId && c.to.side === side && c.to.slot !== undefined) used.add(c.to.slot);
  });
  for (let i = 0; i < SLOTS_PER_SIDE; i++) {
    if (!used.has(i)) return i;
  }
  return SLOTS_PER_SIDE - 1;
}

/* ьКмыбп stub ыБЭ ьвМэСЬ (slotьЧРьДЬ STUBызМэБ╝ ый┤ ы░Фъ╣е ы░йэЦе) */
function stubEnd(point, side, stub) {
  switch (side) {
    case 'right':  return { x: point.x + stub, y: point.y };
    case 'left':   return { x: point.x - stub, y: point.y };
    case 'top':    return { x: point.x, y: point.y - stub };
    case 'bottom': return { x: point.x, y: point.y + stub };
    default:       return { x: point.x + stub, y: point.y };
  }
}

/* ьзБъ░Б segment (ьИШэПЙ ыШРыКФ ьИШьзБ)ьЩА axis-aligned rect ъ╡Рь░и ьЧмы╢А. margin: rect ьг╝ы│А padding. */
function segmentHitsRect(a, b, rect, margin = 0) {
  const x1 = rect.x - margin, x2 = rect.x + rect.w + margin;
  const y1 = rect.y - margin, y2 = rect.y + rect.h + margin;
  if (Math.abs(a.y - b.y) < 0.5) {
    // ьИШэПЙ
    const sx = Math.min(a.x, b.x), ex = Math.max(a.x, b.x);
    return a.y > y1 && a.y < y2 && ex > x1 && sx < x2;
  }
  // ьИШьзБ
  const sy = Math.min(a.y, b.y), ey = Math.max(a.y, b.y);
  return a.x > x1 && a.x < x2 && ey > y1 && sy < y2;
}

/* points ъ▓╜ыбЬ ьдС obstaclesьЩА ь╢йыПМэХШыКФ segmentъ░А эХШыВШыЭ╝ыПД ьЮИыКФьзА.
 * obstaclesьЭШ ownEndpoint=trueыКФ segment эХЬ ыБЭьЭ┤ ыЭ╝ьЭ╕ьЭШ from/to pointьЩА ьаХэЩХэЮИ ьЭ╝ь╣ШэХШыКФ
 * ъ▓╜ьЪ░(=stub segment)ьЧРызМ ь╢йыПМ ым┤ьЛЬ. ы│╕ь▓┤ ъ░АыбЬьзАые┤ыКФ segmentыКФ эХньГБ ъ▓АьВм. */
function pathHitsObstacles(points, obstacles, margin = 8) {
  const fromP = points[0];
  const toP = points[points.length - 1];
  const eq = (a, b) => Math.abs(a.x - b.x) < 0.5 && Math.abs(a.y - b.y) < 0.5;
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const isFromStub = eq(a, fromP) || eq(b, fromP);
    const isToStub   = eq(a, toP)   || eq(b, toP);
    for (const r of obstacles) {
      // ownEndpoint stub segmentыКФ ым┤ьЛЬ
      if (r.ownEndpoint && (isFromStub || isToStub)) continue;
      // ownEndpoint ы╕ФыбЭ ьЮРь▓┤ыКФ margin=0 (ъ░АьЮеьЮРыжмьЧРьДЬ ы╣аьа╕ыВШъ░АыКФ ъ▓Г эЧИьЪй)
      const m = r.ownEndpoint ? 0 : margin;
      if (segmentHitsRect(a, b, r, m)) return true;
    }
  }
  return false;
}

/* ыСР ьКмыбп ьВмьЭ┤ ьзБъ░Б elbow ъ▓╜ыбЬ corner ьаРыУд. */
function buildElbowPoints(fromPos, fromSide, toPos, toSide, stub) {
  const fs = stubEnd(fromPos, fromSide, stub);
  const ts = stubEnd(toPos, toSide, stub);
  const fromH = fromSide === 'left' || fromSide === 'right';
  const toH   = toSide === 'left' || toSide === 'right';
  const points = [fromPos];

  // ый┤ьЭ┤ ъ░ЩьЭА ы░йэЦе(ыСШ ыЛд horizontal or ыСШ ыЛд vertical) тАФ same-axis case
  if (fromH && toH) {
    // horizontal ый┤ ыСР ъ░Ь. yыКФ ыЛдые╝ ьИШ ьЮИьЭМ. ый┤ ы░ШыМА ы░йэЦеьЭ┤ый┤ уД╣ьЮР, ъ░ЩьЭА ы░йэЦеьЭ┤ый┤ уД╖ьЮР.
    const opposing = (fromSide === 'right' && toSide === 'left') || (fromSide === 'left' && toSide === 'right');
    const sameSide = fromSide === toSide;
    if (sameSide) {
      // уД╖ьЮР: stub ый┤ ы░Фъ╣еьЬ╝ыбЬ ыСР stub end ыкиыСРые╝ ыДШьЦ┤ъ░АыКФ outX
      // fromSide==='right'ый┤ outXыКФ max(fs.x, ts.x). ыЛи ыСШ ьдС ыНФ ьХИьк╜ьЭ╕ ъ▓ГьЭ┤ stubызМэБ╝ ыНФ ъ░Аъ╣МьЪ╕ ьИШ ьЮИьЦ┤
      // ьХИьаДэХШъ▓М stub ь╢Фъ░А.
      const outDir = fromSide === 'right' ? 1 : -1;
      const outX = outDir > 0
        ? Math.max(fs.x, ts.x)
        : Math.min(fs.x, ts.x);
      // ьХИьк╜ stub end тЖТ outX ъ░АыКФ segmentъ░А ьЮРъ╕░ ый┤ ьХИьк╜ьЬ╝ыбЬ эЫДьзДэХШьзА ьХКыПДыбЭ ъ▓АьВм:
      // fs, ts ыСШ ыЛд outXьЩА ъ░ЩьЭА ы░йэЦе (outDir>0ьЭ┤ый┤ outX >= fs.x && outX >= ts.x). OK.
      points.push(fs, { x: outX, y: fs.y }, { x: outX, y: ts.y }, ts);
    } else if (opposing) {
      // ызИьг╝ы│┤ъ╕░: ыСР stub ыБЭ ьВмьЭ┤ъ░А ьЦСьИШый┤ уД╣ьЮР, ьЭМьИШ(ьДЬыбЬ ь╣иы▓Ф)ый┤ ьЪ░эЪМ
      const fromOut = fromSide === 'right' ? 1 : -1;
      const gap = (ts.x - fs.x) * fromOut;
      if (gap >= 0) {
        // ьаХьГБ уД╣ьЮР тАФ ьдСъ░Д midX
        const midX = (fs.x + ts.x) / 2;
        points.push(fs, { x: midX, y: fs.y }, { x: midX, y: ts.y }, ts);
      } else {
        // stubьЭ┤ ьДЬыбЬ ь╣иы▓Ф тЖТ ьЬД/ьХДыЮШыбЬ ьЪ░эЪМ (уД╖ьЮР эЪМэФ╝)
        const detourY = fs.y < ts.y
          ? Math.min(fs.y, ts.y) - stub
          : Math.max(fs.y, ts.y) + stub;
        points.push(fs, { x: fs.x, y: detourY }, { x: ts.x, y: detourY }, ts);
      }
    } else {
      // ьЮШык╗ыРЬ ьб░эХй (ьЛдьаЬ ы░ЬьГЭ X)
      points.push(fs, ts);
    }
  } else if (!fromH && !toH) {
    // vertical ый┤ ыСР ъ░Ь
    const opposing = (fromSide === 'bottom' && toSide === 'top') || (fromSide === 'top' && toSide === 'bottom');
    const sameSide = fromSide === toSide;
    if (sameSide) {
      const outDir = fromSide === 'bottom' ? 1 : -1;
      const outY = outDir > 0
        ? Math.max(fs.y, ts.y)
        : Math.min(fs.y, ts.y);
      points.push(fs, { x: fs.x, y: outY }, { x: ts.x, y: outY }, ts);
    } else if (opposing) {
      const fromOut = fromSide === 'bottom' ? 1 : -1;
      const gap = (ts.y - fs.y) * fromOut;
      if (gap >= 0) {
        // ьаХьГБ уД╣ьЮР
        const midY = (fs.y + ts.y) / 2;
        points.push(fs, { x: fs.x, y: midY }, { x: ts.x, y: midY }, ts);
      } else {
        // ьЪ░эЪМ (ьвМ/ьЪ░)
        const detourX = fs.x < ts.x
          ? Math.min(fs.x, ts.x) - stub
          : Math.max(fs.x, ts.x) + stub;
        points.push(fs, { x: detourX, y: fs.y }, { x: detourX, y: ts.y }, ts);
      }
    } else {
      points.push(fs, ts);
    }
  } else if (fromH && !toH) {
    // horizontal тЖТ vertical: corner эЫДы│┤ 4ъ░АьзА ьдС эЫДьзД ьЧЖыКФ best
    const fromOut = fromSide === 'right' ? 1 : -1;
    const toOut = toSide === 'bottom' ? 1 : -1;
    // ыСР stub endыКФ ъ░БьЮР ый┤ ы░Фъ╣еьЬ╝ыбЬ ыВШъ░Р. corner эЫДы│┤:
    //  C1: {ts.x, fs.y}  тАФ to-stub ыЭ╝ьЭ╕ ыФ░ыЭ╝ fs.yьЧРьДЬ ызМыВи (1-corner)
    //  C2: {fs.x, ts.y}  тАФ from-stub ыЭ╝ьЭ╕ ыФ░ыЭ╝ ts.yьЧРьДЬ ызМыВи (1-corner)
    // ьЦ┤ыКР ьк╜ьЭ┤ ыСР stub ыкиыСРые╝ эЫДьзДьЛЬэВдьзА ьХКыКФъ░А?
    //   C1 OK: corner.xые╝ ts.xьЧРьДЬ fs.xыбЬ ъ░АыКФ segment(fsтЖТC1)ъ░А fromOut ы░йэЦеьЭ┤ый┤ OK,
    //          C1тЖТts segmentъ░А toOut ы░йэЦеьЭ┤ый┤ OK
    //   C2 ызИь░мъ░АьзА
    const c1Ok = (ts.x - fs.x) * fromOut >= 0 && (fs.y - ts.y) * toOut >= 0;
    const c2Ok = (fs.x - ts.x) * fromOut * -1 >= 0 && (ts.y - fs.y) * toOut * -1 >= 0;
    if (c1Ok) {
      points.push(fs, { x: ts.x, y: fs.y }, ts);
    } else if (c2Ok) {
      points.push(fs, { x: fs.x, y: ts.y }, ts);
    } else {
      // ыСШ ыЛд stub эЫДьзД тАФ 2-corner уД╣ьЮР: from-stub ыБЭ ыДИыи╕ыбЬ ы╣аьзД эЫД ts.xыбЬ
      const extX = fs.x + fromOut * stub;
      const extY = ts.y + toOut * stub;
      points.push(fs, { x: extX, y: fs.y }, { x: extX, y: extY }, { x: ts.x, y: extY }, ts);
    }
  } else {
    // vertical тЖТ horizontal
    const fromOut = fromSide === 'bottom' ? 1 : -1;
    const toOut = toSide === 'right' ? 1 : -1;
    const c1Ok = (ts.y - fs.y) * fromOut >= 0 && (fs.x - ts.x) * toOut >= 0;
    const c2Ok = (fs.y - ts.y) * fromOut * -1 >= 0 && (ts.x - fs.x) * toOut * -1 >= 0;
    if (c1Ok) {
      points.push(fs, { x: fs.x, y: ts.y }, ts);
    } else if (c2Ok) {
      points.push(fs, { x: ts.x, y: fs.y }, ts);
    } else {
      const extY = fs.y + fromOut * stub;
      const extX = ts.x + toOut * stub;
      points.push(fs, { x: fs.x, y: extY }, { x: extX, y: extY }, { x: extX, y: ts.y }, ts);
    }
  }
  points.push(toPos);
  return points;
}

/* obstacles эЪМэФ╝ ыЭ╝ьЪ░эМЕ. ъ╕░ы│╕ elbowъ░А ь╢йыПМэХШый┤ ьЬД/ьХДыЮШ/ьвМ/ьЪ░ 4ъ░АьзА ьЪ░эЪМые╝ ьЛЬыПДэХ┤ ъ░АьЮе ьззьЭА ъ▓Г ы░ШэЩШ. */
function buildAvoidingRoute(fromPos, fromSide, toPos, toSide, stub, obstacles) {
  const base = buildElbowPoints(fromPos, fromSide, toPos, toSide, stub);
  if (!obstacles || obstacles.length === 0) return base;
  const hit = obstacles.filter(r => pathHitsObstacles(base, [r], 8));
  if (hit.length === 0) return base;

  // ь╢йыПМ ьЮеьХаым╝ эЖ╡эХй bbox + padding (own blockьЭА ьаЬьЩ╕ тАФ ыДИым┤ эБ░ ьЪ░эЪМ ы░йьзА)
  const PAD = 16;
  let xmin = Infinity, ymin = Infinity, xmax = -Infinity, ymax = -Infinity;
  for (const r of hit) {
    if (r.x < xmin) xmin = r.x;
    if (r.y < ymin) ymin = r.y;
    if (r.x + r.w > xmax) xmax = r.x + r.w;
    if (r.y + r.h > ymax) ymax = r.y + r.h;
  }
  const aboveY = ymin - PAD;
  const belowY = ymax + PAD;
  const leftX  = xmin - PAD;
  const rightX = xmax + PAD;

  const fs = stubEnd(fromPos, fromSide, stub);
  const ts = stubEnd(toPos, toSide, stub);

  const candidates = [
    [fromPos, fs, { x: fs.x, y: aboveY }, { x: ts.x, y: aboveY }, ts, toPos],
    [fromPos, fs, { x: fs.x, y: belowY }, { x: ts.x, y: belowY }, ts, toPos],
    [fromPos, fs, { x: leftX,  y: fs.y }, { x: leftX,  y: ts.y }, ts, toPos],
    [fromPos, fs, { x: rightX, y: fs.y }, { x: rightX, y: ts.y }, ts, toPos],
  ];

  let best = null;
  let bestLen = Infinity;
  for (const cand of candidates) {
    if (pathHitsObstacles(cand, obstacles)) continue;
    let L = 0;
    for (let k = 0; k < cand.length - 1; k++) {
      L += Math.abs(cand[k].x - cand[k + 1].x) + Math.abs(cand[k].y - cand[k + 1].y);
    }
    if (L < bestLen) { bestLen = L; best = cand; }
  }
  return best || base;
}

/* points ы░░ьЧ┤ьЭД SVG pathыбЬ тАФ corner radius r ьаБьЪй (ъ░Б ъ║╛ьЮДьЧР quadratic bezier). r=0ьЭ┤ый┤ ьзБъ░Б. */
function smoothPath(points, r) {
  if (points.length < 2) return '';
  if (!r || r <= 0 || points.length < 3) {
    return 'M ' + points.map(p => `${p.x} ${p.y}`).join(' L ');
  }
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const next = points[i + 1];
    const dPrev = Math.hypot(curr.x - prev.x, curr.y - prev.y);
    const dNext = Math.hypot(next.x - curr.x, next.y - curr.y);
    if (dPrev < 0.5 || dNext < 0.5) {
      // skip degenerate
      d += ` L ${curr.x} ${curr.y}`;
      continue;
    }
    const radius = Math.min(r, dPrev / 2, dNext / 2);
    const upx = (curr.x - prev.x) / dPrev;
    const upy = (curr.y - prev.y) / dPrev;
    const unx = (next.x - curr.x) / dNext;
    const uny = (next.y - curr.y) / dNext;
    const beforeX = curr.x - upx * radius;
    const beforeY = curr.y - upy * radius;
    const afterX  = curr.x + unx * radius;
    const afterY  = curr.y + uny * radius;
    d += ` L ${beforeX} ${beforeY} Q ${curr.x} ${curr.y} ${afterX} ${afterY}`;
  }
  const last = points[points.length - 1];
  d += ` L ${last.x} ${last.y}`;
  return d;
}
/* ParamInput тАФ ьВмьЪйьЮРъ░А ьЮЕыае ьдСьЭ╝ ыХМ raw string ы│┤ьб┤, blur/Enter ьЛЬ commit.
   "ь╣╕ьЭД ыЛд ьзАьЫМыПД 0ьЭ┤ ьХИ ыВиъ▓М" + "ьЖМьИШьаР ьЮРьЬа ьЮЕыае" ь▓Шыжм. */
function ParamInput({ value, onChange, isNumber }) {
  const [editing, setEditing] = React.useState(null);
  React.useEffect(() => { setEditing(null); }, [value]);
  const display = editing !== null
    ? editing
    : (value === null || value === undefined ? '' : String(value));
  const commit = () => {
    if (editing === null) return;
    const t = editing.trim();
    if (t === '' || t === '-' || t === '.') { setEditing(null); return; }
    if (isNumber) {
      const parsed = parseFloat(t);
      if (isNaN(parsed)) { setEditing(null); return; }
      onChange(parsed);
    } else {
      onChange(t);
    }
  };
  return (
    <input type="text" inputMode={isNumber ? 'decimal' : 'text'}
      value={display}
      onChange={(e) => setEditing(e.target.value)}
      onFocus={(e) => {
        setEditing(value === null || value === undefined ? '' : String(value));
        e.target.select();
      }}
      onBlur={commit}
      onKeyDown={(e) => {
        if (e.key === 'Enter') { e.target.blur(); }
        if (e.key === 'Escape') { setEditing(null); e.target.blur(); }
      }}
      className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500" />
  );
}

  const [libraryOrder, setLibraryOrder] = useState(() => {

      const raw = localStorage.getItem('hpwd_library_order');
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  });
  const saveLibraryOrder = (newOrder) => {
    setLibraryOrder(newOrder);
    try { localStorage.setItem('hpwd_library_order', JSON.stringify(newOrder)); } catch (e) {}
  };
  // ьВмьЭ┤ыУЬы░Ф reorder drag ьГБэГЬ: { fromCategory, fromKey }
  const [libDragOver, setLibDragOver] = useState(null);  // { cat, key } тАФ ыУЬыбн ьЭ╕ыФФь╝АьЭ┤эД░ьЪй

  const handleLibraryDragStart = (e, typeKey, cat) => {
    e.dataTransfer.setData('typeKey', typeKey);
    e.dataTransfer.setData('libCategory', cat || '');
    e.dataTransfer.effectAllowed = 'copyMove';
  };
  // ьВмьЭ┤ыУЬы░Ф ыВ┤ drop ьЛЬ reorder
  const handleLibraryReorderDrop = (e, targetKey, cat) => {
    e.preventDefault();
    e.stopPropagation();
    const sourceKey = e.dataTransfer.getData('typeKey');
    const sourceCat = e.dataTransfer.getData('libCategory');
    setLibDragOver(null);
    if (!sourceKey || sourceKey === targetKey || sourceCat !== cat) return;
    // эШДьЮм ь╣┤эЕМъ│аыжм ыВ┤ ьИЬьДЬ ъ░Аьа╕ьШдъ╕░
    const allInCat = Object.entries(TYPES)
      .filter(([k, v]) => v.category === cat && !v.isHiddenFromLibrary)
      .map(([k]) => k);
    const currentOrder = libraryOrder[cat] && libraryOrder[cat].length > 0
      ? libraryOrder[cat].filter(k => allInCat.includes(k))
        .concat(allInCat.filter(k => !libraryOrder[cat].includes(k)))
      : allInCat;
    // sourceые╝ ы╣╝ъ│а target ьХЮьЧР ьВ╜ьЮЕ
    const filtered = currentOrder.filter(k => k !== sourceKey);
    const targetIdx = filtered.indexOf(targetKey);
    if (targetIdx < 0) return;
    filtered.splice(targetIdx, 0, sourceKey);
    saveLibraryOrder({ ...libraryOrder, [cat]: filtered });
  };
  const handleCanvasDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  const handleCanvasDrop = (e) => {
    e.preventDefault();
    let typeKey = e.dataTransfer.getData('typeKey');
    if (!typeKey || !TYPES[typeKey]) return;
    // тФАтФАтФА ыйФэГА ь╗┤эПмыДМэК╕ тЖТ defaultFidelityьЭШ ьЛдьаЬ typeKeyыбЬ ы│АэЩШ тФАтФАтФА
    // ьзДьШБыЛШ эЖ╡эХй ь╗┤эПмыДМэК╕: __meta_compressor ыУ▒ьЭД ыУЬыбнэХШый┤ default fidelityыбЬ ь╢Фъ░А
    const def = TYPES[typeKey];
    if (def.isMeta && def.fidelityKeys && def.defaultFidelity) {
      const realKey = def.fidelityKeys[def.defaultFidelity];
      if (realKey && TYPES[realKey]) {
        typeKey = realKey;
      }
    }
    const rect = canvasRef.current.getBoundingClientRect();
    addBlock(
      typeKey,
      (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom,
      (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom
    );
  };

  const addBlock = (typeKey, x, y) => {
    const def = TYPES[typeKey];
    const id = `b${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    let params = Object.fromEntries(def.parameters.map(p => [p.key, p.value]));
    
    // тФАтФАтФА On-Design Studio pending design ьЮРыПЩ ьаБьЪй тФАтФАтФА
    // localStorageьЧР hpwd_pending_designьЭ┤ ьЮИъ│а typeNoъ░А ьЭ╝ь╣ШэХШый┤ params ыНоьЦ┤ьФА.
    // ьзДьШБыЛШ эФМыбЬьЪ░: On-Design StudioьЧРьДЬ Apply тЖТ ьЧмъ╕░ьДЬ ьЮРыПЩ sync тЖТ consumed.
    try {
      const pendingRaw = localStorage.getItem('hpwd_pending_design');
      if (pendingRaw) {
        const pending = JSON.parse(pendingRaw);
        if (pending && pending.typeNo === def.typeNo && pending.params) {
          // typeNo ьЭ╝ь╣Ш тАФ params ыНоьЦ┤ьУ░ъ╕░
          params = { ...params, ...pending.params };
          localStorage.removeItem('hpwd_pending_design');  // эХЬы▓И ьВмьЪйэХШый┤ ьВньаЬ
          // ьВмьЪйьЮРьЧРъ▓М ьХМыж╝
          setTimeout(() => {
            const src = pending._source || 'On-Design Studio';
            console.log(`[HPWD Studio] ${src}ьЧРьДЬ ьаБьЪйыРЬ designьЭД ь╗┤эПмыДМэК╕ ${typeKey} (typeNo ${def.typeNo})ьЧР ьЮРыПЩ ьаБьЪйэХи`);
          }, 100);
        }
      }
    } catch (e) {
      console.warn('hpwd_pending_design ьЭ╜ъ╕░ ьЛдэМи:', e);
    }
    
    // тФАтФАтФА ыЕ╕ыУЬ ьЭ┤ыжД: ыйФэГА ь╗┤эПмыДМэК╕ьЭШ ъ╣ФыБФэХЬ ьЭ┤ыжД ьВмьЪй, ьЮРыПЩ ы▓ИэШ╕ ьЧЖьЭМ тФАтФАтФА
    // ьзДьШБыЛШ ъ▓░ьаХ: 'Compressor (Off)_1' ъ░ЩьЭА ъ▒░ ызРъ│а ъ╖╕ыГе 'Compressor'ыбЬ
    // ызМьХ╜ fidelity ыЕ╕ыУЬ(ьШИ: compressor_ahri)ый┤ ыйФэГА (__meta_compressor)ьЭШ name ьВмьЪй
    let blockName = def.name;
    const metaEntry = Object.entries(TYPES).find(([k, v]) =>
      v.isMeta && v.fidelityKeys && Object.values(v.fidelityKeys).includes(typeKey)
    );
    if (metaEntry) {
      blockName = metaEntry[1].name;  // ьШИ: 'Compressor' (ыМАьЛа 'Compressor (Off)')
    }

    pushHistory(blocks, connections);
    setBlocks(bs => [...bs, {
      id, type: typeKey, x: snap(x - 90), y: snap(y - 40),
      name: blockName,
      params, outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    }]);
    setSelected(id);
  };

  /* тХРтХРтХРтХРтХРтХРтХРтХР Preset: эЮИэК╕эОМэФД ьД╕эГБъ▒┤ьб░ъ╕░ ьВмьЭ┤эБ┤ ьЭ╝ъ┤Д ьГЭьД▒ тХРтХРтХРтХРтХРтХРтХРтХР
   * 6ъ░Ь ь╗┤эПмыДМэК╕ + 5ъ░Ь ыЭ╝ьЭ╕ьЭД эХЬ ы▓ИьЧР ь║Фы▓ДьКдьЧР ы░░ь╣Ш.
   * AI ChatьЧРьДЬ эШ╕ь╢ЬыРШъ▒░ыВШ ьВмьЪйьЮРъ░А ьзБьаС эК╕ыжмъ▒░ ъ░АыКе.
   * ьВмьЪйьЮРъ░А exportэХЬ JSON layoutьЭД ъ╖╕ыМАыбЬ baked-inьЬ╝ыбЬ ьВмьЪй. */
  const loadPreset = (presetName) => {
    const PRESETS = {
      'dryer-cycle': {
        blocks: [
          { type: 'compressor', x: 520, y: 80,  name: 'Compressor_1', imageSize: 80,
            params: { V_disp: 10, RPM: 3000, eta_v: 0.85, eta_is: 0.7, PR: 3.5 } },
          { type: 'condenser',  x: 560, y: 180, name: 'Condenser_1',  imageSize: 80,
            params: { UA: 150, dP_ref: 20 } },
          { type: 'exv',        x: 340, y: 60,  name: 'EEV_1',         imageSize: 80,
            params: { A_orifice: 0.5, opening: 100, Cd: 0.65 } },
          { type: 'evaporator', x: 380, y: 180, name: 'Evaporator_1', imageSize: 80,
            params: { UA: 120, dP_ref: 15, SH: 5 } },
          { type: 'fan',        x: 180, y: 180, name: 'Fan_1',         imageSize: 80,
            params: { RPM: 2500, V_max: 0.15, eta: 0.55, dP_max: 300 } },
          { type: 'drum',       x: 340, y: 280, name: 'Drum_1',
            params: { m_fabric: 5, MC_init: 0.8, hA: 50, dP_drum: 100 } },
        ],
        // 'C', 'CD', 'EEV', 'EV', 'F', 'D' ьХ╜ьЦ┤ыбЬ connection ьаХьЭШ (ы╕ФыбЭ array ьЭ╕ыН▒ьКд)
        connections: [
          // ыГЙызд ьВмьЭ┤эБ┤
          { from: ['EV', 'top', 3],    to: ['C', 'left', 3],     kind: 'refrigerant',
            signals: [['T_out','T_suc'],['P_out','P_suc']] },
          { from: ['C', 'right', 0],   to: ['CD', 'right', 0],   kind: 'refrigerant',
            signals: [['m_dot','m_dot'],['T_dis','T_in'],['P_dis','P_in']] },
          { from: ['CD', 'left', 0],   to: ['EEV', 'right', 2],  kind: 'refrigerant',
            signals: [['T_out','T_in'],['P_out','P_in']] },
          { from: ['EEV', 'left', 2],  to: ['EV', 'left', 0],    kind: 'refrigerant',
            signals: [['m_dot','m_dot'],['T_out','T_in'],['P_out','P_in']] },
          // ъ│╡ъ╕░ ыЭ╝ьЭ╕
          { from: ['D', 'left', 2],    to: ['F', 'left', 2],     kind: 'air',
            signals: [['T_air_out','T_in'],['dP','dP_sys']] },
          { from: ['F', 'right', 2],   to: ['EV', 'left', 2],    kind: 'air',
            signals: [['m_air','m_air'],['T_out','T_in']] },
          { from: ['EV', 'right', 2],  to: ['CD', 'left', 2],    kind: 'air',
            signals: [['T_out','T_in'],['P_out','P_in'],['T_air_out','T_air']] },
          { from: ['CD', 'right', 2],  to: ['D', 'right', 2],    kind: 'air',
            signals: [['T_out','T_air_in']] },
        ],
      },
    };

    // alias ь▓Шыжм тАФ ыЛдьЦСэХЬ preset ьЭ┤ыжД ыздэХС
    const aliasMap = {
      'dryer-cycle': 'dryer-cycle',
      'heat-pump-cycle': 'dryer-cycle',
      'hpwd': 'dryer-cycle',
      'heat-pump-washer-dryer': 'dryer-cycle',
    };
    const resolved = aliasMap[presetName];
    const preset = resolved && PRESETS[resolved];
    if (!preset) {
      return { ok: false, error: `Unknown preset: ${presetName}` };
    }
    pushHistory(blocks, connections);
    const ts = Date.now();
    // ьХ╜ьЦ┤ ыздэХС: blocks ьЭ╕ыН▒ьКд ьИЬьДЬыМАыбЬ ьХ╜ьЦ┤ ы╢АьЧм
    const codes = ['C', 'CD', 'EEV', 'EV', 'F', 'D'];
    const newBlocks = preset.blocks.map((b, i) => {
      const def = TYPES[b.type];
      // ъ╕░ы│╕ эММыЭ╝ып╕эД░ьЧР presetьЭШ params ыНоьЦ┤ьУ░ъ╕░
      const params = { ...Object.fromEntries(def.parameters.map(p => [p.key, p.value])), ...(b.params || {}) };
      return {
        id: `b${ts}_${i}_${Math.random().toString(36).slice(2, 5)}`,
        type: b.type,
        x: b.x, y: b.y,
        name: b.name,
        params,
        outputs: {},
        state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
        ...(b.imageSize ? { imageSize: b.imageSize } : {}),
      };
    });
    const idMap = Object.fromEntries(codes.map((c, i) => [c, newBlocks[i]?.id]));

    const newConnections = preset.connections.map(c => {
      const [fromCode, fromSide, fromSlot] = c.from;
      const [toCode,   toSide,   toSlot]   = c.to;
      return {
        from: { blockId: idMap[fromCode], side: fromSide, slot: fromSlot },
        to:   { blockId: idMap[toCode],   side: toSide,   slot: toSlot },
        kind: c.kind,
        signals: c.signals.map(([fp, tp]) => ({ fromPort: fp, toPort: tp })),
        lineParams: defaultLineParams(c.kind),
        cornerRadius: 8,
        routeMode: 'auto',
      };
    });

    setBlocks(newBlocks);
    setConnections(newConnections);
    setSelectedIds([]);
    setSelectedConnIds([]);
    return { ok: true, summary: `${newBlocks.length} blocks, ${newConnections.length} connections` };
  };

  /* тХРтХРтХРтХРтХРтХРтХРтХР Mock AI: ьВмьЪйьЮР ыйФьЛЬьзАые╝ эВдьЫМыУЬыбЬ ы╢ДьДЭэХ┤ьДЬ ыПДъ╡м эШ╕ь╢Ь ьЛЬыомыаИьЭ┤ьЕШ тХРтХРтХРтХРтХРтХРтХРтХР
   * ьЛдьаЬ LLM ы░▒ьЧФыУЬ ьЧЖьЭ┤ыПД ыН░ыки ъ░АыКе. эЦеэЫД ы░▒ьЧФыУЬ ь╢Фъ░А ьЛЬ ъ░ЩьЭА ьЭ╕эД░эОШьЭ┤ьКд ьЬаьзА. */
  const chatExecuteMock = (userText) => {
    const text = userText.toLowerCase();
    // эВдьЫМыУЬ ыздь╣н тАФ ьЪ░ьДаьИЬьЬД ьИЬ
    if (/ъ▒┤ьб░ъ╕░\s*ьВмьЭ┤эБ┤|dryer\s*cycle|эЮИэК╕\s*эОМэФД|hpwd|heat\s*pump|ызМыУдьЦ┤|ьГЭьД▒|preset/.test(text)) {
      const result = loadPreset('dryer-cycle');
      if (result.ok) {
        return {
          tool: 'load_preset',
          args: { name: 'dryer-cycle' },
          result,
          reply: `ъ▒┤ьб░ъ╕░ ьВмьЭ┤эБ┤ ызМыУдьЧИьЭМ. ${result.summary}.\n\nъ╡мьД▒: ьХХь╢Хъ╕░ тЖТ ьЭСь╢Хъ╕░ тЖТ EEV тЖТ ьжЭы░Ьъ╕░ тЖТ ьХХь╢Хъ╕░ (ыГЙызд ьВмьЭ┤эБ┤) + эМм тЖТ ьжЭы░Ьъ╕░ тЖТ ьЭСь╢Хъ╕░ тЖТ ыУЬыЯ╝ тЖТ эМм (ъ│╡ъ╕░ ьИЬэЩШ). ъ░Б ь╗┤эПмыДМэК╕ ыНФы╕ФэБ┤ыжньЬ╝ыбЬ ьЭ┤ыжД ьИШьаХ, ь║Фы▓ДьКдьЧРьДЬ ьЮРьЬаыбнъ▓М ьЮмы░░ь╣Ш ъ░АыКе.`,
        };
      }
      return { reply: `Preset ыбЬыУЬ ьЛдэМи: ${result.error}` };
    }
    if (/clear|ь┤Иъ╕░эЩФ|ьзАьЫМ|delete\s*all|ыкиыСР\s*ьВньаЬ/.test(text)) {
      pushHistory(blocks, connections);
      setBlocks([]);
      setConnections([]);
      setSelectedIds([]);
      setSelectedConnIds([]);
      return {
        tool: 'clear_canvas',
        args: {},
        reply: 'ь║Фы▓ДьКд ь┤Иъ╕░эЩФ ьЩДыгМ. ыкиыУа ы╕ФыбЭъ│╝ ьЧ░ъ▓░ьЭД ьзАьЫА.',
      };
    }
    if (/run|ьЛдэЦЙ|ьЛЬыом|ьЛЬьЮС/.test(text) && !simState.running && blocks.length > 0) {
      runSimulation();
      return {
        tool: 'run',
        args: {},
        reply: `ьЛЬыомыаИьЭ┤ьЕШ ьЛЬьЮС. dt=${simState.dt}s, t_final=${simState.tFinal}s.`,
      };
    }
    if (/stop|ьаХьзА|ыйИь╢░/.test(text) && simState.running) {
      stopSimulation();
      return { tool: 'stop', args: {}, reply: `ьЛЬыомыаИьЭ┤ьЕШ ьаХьзА. t = ${simState.t.toFixed(1)}s.` };
    }
    if (/reset|ыжмьЕЛ/.test(text)) {
      resetSimulation();
      return { tool: 'reset', args: {}, reply: 'ьЛЬыомыаИьЭ┤ьЕШ ыжмьЕЛ тАФ t=0ьЬ╝ыбЬ ы│╡ъ╖А.' };
    }
    // fallback
    return {
      reply: `(Mock) ьХДьзБ ь▓Шыжм ык╗эХШыКФ ыкЕыа╣. ьзАьЫРэХШыКФ эВдьЫМыУЬ:\n┬╖ "ъ▒┤ьб░ъ╕░ ьВмьЭ┤эБ┤ ызМыУдьЦ┤ьдШ" тАФ ьВмьЭ┤эБ┤ ьЭ╝ъ┤Д ьГЭьД▒\n┬╖ "ь┤Иъ╕░эЩФ" тАФ ь║Фы▓ДьКд ы╣ДьЪ░ъ╕░\n┬╖ "ьЛдэЦЙ" / "ьаХьзА" / "ыжмьЕЛ" тАФ ьЛЬыом ьаЬьЦ┤`,
    };
  };

  const handleBlockMouseDown = (e, blockId) => {
    // Port эБ┤ыжн ьЛЬьЧРыПД ьЭ┤ы▓дэК╕ ьаДэММыКФ ызЙьХДьХ╝ эХи (ьХИ ъ╖╕ыЯмый┤ ь║Фы▓ДьКд ы░ХьКд ыУЬыЮШъ╖╕ ьЛЬьЮСыРи)
    e.stopPropagation();
    if (e.target.closest('[data-port]')) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const block = blocks.find(b => b.id === blockId);

    // Shift/Ctrl: ыЛдьдС ьДаэГЭ эЖаъ╕А
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      setSelectedIds(prev => prev.includes(blockId)
        ? prev.filter(id => id !== blockId)
        : [...prev, blockId]);
      setSelectedConnIds([]);
      return; // shift-select ыкиыУЬьЧРьДЬыКФ ыУЬыЮШъ╖╕ ьЛЬьЮС ьХИ эХи
    }

    // эШДьЮм ы╕ФыбЭьЭ┤ ьЭ┤ып╕ ьДаэГЭыРЬ ыЛдьдС ьДаэГЭьЭШ ьЭ╝ы╢Аый┤ ьДаэГЭ ьЬаьзА
    // ьХДыЛИый┤ ьЭ┤ ы╕ФыбЭызМ ыЛиыПЕ ьДаэГЭ
    let dragIds;
    if (selectedIds.includes(blockId)) {
      dragIds = selectedIds;
    } else {
      setSelectedIds([blockId]);
      dragIds = [blockId];
    }
    setSelectedConnIds([]);

    // ыУЬыЮШъ╖╕эХа ыкиыУа ы╕ФыбЭьЭШ ьЛЬьЮС ьЬДь╣Ш ьаАьЮе
    const startPositions = {};
    dragIds.forEach(id => {
      const b = blocks.find(bb => bb.id === id);
      if (b) startPositions[id] = { x: b.x, y: b.y };
    });
    draggingRef.current = {
      blockIds: dragIds,
      primaryId: blockId,
      startPositions,
      offsetX: (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom - block.x,
      offsetY: (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom - block.y,
    };
  };

  const handleCanvasMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
    const my = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
    mousePosRef.current = { x: mx, y: my };

    // ы╕ФыбЭ ыУЬыЮШъ╖╕: DOM ьзБьаС ьб░ьЮС, ыЛдьдС ы╕ФыбЭ ыПЩьЛЬ ьЭ┤ыПЩ ьзАьЫР
    if (draggingRef.current) {
      const { blockIds, primaryId, offsetX, offsetY, startPositions } = draggingRef.current;
      // primary ы╕ФыбЭ ъ╕░ьдАьЬ╝ыбЬ delta ъ│ДьВ░, ыВШыи╕ьзАыКФ ъ░ЩьЭА delta ьаБьЪй
      const primaryStart = startPositions[primaryId];
      const snappedX = snap(mx - offsetX);
      const snappedY = snap(my - offsetY);
      const dx = snappedX - primaryStart.x;
      const dy = snappedY - primaryStart.y;
      // ыкиыУа ьДаэГЭыРЬ ы╕ФыбЭьЭД transformьЬ╝ыбЬ ьЭ┤ыПЩ
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = `translate(${dx}px, ${dy}px)`;
      });
      draggingRef.current.dx = dx;
      draggingRef.current.dy = dy;
      return;
    }

    // ы░ХьКд ьДаэГЭ ыУЬыЮШъ╖╕ ьдС
    if (selectionBox) {
      setSelectionBox(sb => sb ? { ...sb, curX: mx, curY: my } : sb);
      return;
    }

    // ьЧ░ъ▓░ьДа ьД╕ъ╖╕ыи╝эК╕ ыУЬыЮШъ╖╕
    if (draggingConn) {
      const { idx, segment, startMouseX, startMouseY, startOffset } = draggingConn;
      const axis = segment.endsWith('Y') ? 'y' : 'x';
      const delta = axis === 'y' ? (my - startMouseY) : (mx - startMouseX);
      const offsetKey = SEGMENT_OFFSET_KEYS[segment];
      setConnections(cs => cs.map((c, i) =>
        i === idx ? { ...c, [offsetKey]: startOffset + delta } : c
      ));
    }

    if (connecting || endpointDrag) {
      setMousePos({ x: mx, y: my });
    }
  };

  const handleCanvasMouseUp = () => {
    if (draggingRef.current) {
      const { blockIds, startPositions, dx, dy } = draggingRef.current;
      // transform ь┤Иъ╕░эЩФ
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = '';
      });
      if (dx !== undefined && (dx !== 0 || dy !== 0)) {
        pushHistory(blocks, connections);
        setBlocks(bs => bs.map(b => {
          if (!blockIds.includes(b.id)) return b;
          const start = startPositions[b.id];
          return { ...b, x: start.x + dx, y: start.y + dy };
        }));
      }
      draggingRef.current = null;
    }

    // ы░ХьКд ьДаэГЭ ьвЕыгМ тЖТ ьВмъ░БэШХ ьШБьЧн ыВ┤ ы╕ФыбЭ + ьЧ░ъ▓░ьДа ьДаэГЭ
    if (selectionBox) {
      const box = selectionBox;
      const x1 = Math.min(box.startX, box.curX);
      const y1 = Math.min(box.startY, box.curY);
      const x2 = Math.max(box.startX, box.curX);
      const y2 = Math.max(box.startY, box.curY);

      // ы░ХьКдъ░А ыДИым┤ ьЮСьЬ╝ый┤ (ъ▒░ьЭШ эБ┤ыжн) ым┤ьЛЬ
      if (x2 - x1 > 4 || y2 - y1 > 4) {
        // ы╕ФыбЭ: bboxъ░А ьЩДьаДэЮИ эПмэХиыРШый┤ ьДаэГЭ
        const pickedBlocks = blocks.filter(b => {
          const h = getBlockHeight(b);
          const w = getBlockWidth(b);
          return b.x >= x1 && b.y >= y1 && (b.x + w) <= x2 && (b.y + h) <= y2;
        }).map(b => b.id);

        // ьЧ░ъ▓░ьДа: sourceьЩА target ыСШ ыЛд ы░ХьКд ьХИ ы╕ФыбЭьЭ╝ ыХМызМ ьДаэГЭ
        const pickedConns = connections
          .map((c, i) => ({ c, i }))
          .filter(({ c }) => pickedBlocks.includes(c.from.blockId) && pickedBlocks.includes(c.to.blockId))
          .map(({ i }) => i);

        setSelectedIds(pickedBlocks);
        setSelectedConnIds(pickedConns);
      }
      setSelectionBox(null);
    }

    if (draggingConn) {
      setDraggingConn(null);
    }
  };

  /* 4ый┤ ьКмыбп эБ┤ыжн. side: 'top'|'bottom'|'left'|'right'.
   * ьКмыбпьЧР in/out ьЭШып╕ ьЧЖьЭМ тАФ ь▓л эБ┤ыжньЭ┤ from, ыСР ы▓Иьз╕ъ░А toъ░А ыРи.
   * эЭРыжД ы░йэЦеьЭА PropertiesьЧРьДЬ ы░ШьаД ъ░АыКе. */
  const handleBlockConnectorClick = (e, blockId, side, slot) => {
    e.stopPropagation();
    // endpoint/waypoint ыУЬыЮШъ╖╕ ьзБэЫДьЧФ slot clickьЭД ым┤ьЛЬ (ыУЬыбн ьЬДь╣ШьЧРьДЬ ы░ЬьГЭэХШыКФ click ьаЬъ▒░)
    if (endpointDrag || waypointDrag || suppressSlotClickRef.current) return;
    if (!connecting) {
      const useSlot = slot !== undefined ? slot : findFreeSlot(connections, blockId, side);
      setConnecting({ blockId, side, slot: useSlot });
      return;
    }
    if (connecting.blockId === blockId) {
      // ъ░ЩьЭА ы╕ФыбЭ cancel
      setConnecting(null);
      return;
    }
    const fromId = connecting.blockId;
    const toId = blockId;
    const fromBlock = blocks.find(b => b.id === fromId);
    const toBlock   = blocks.find(b => b.id === toId);
    const kind = detectLineKind(fromBlock, toBlock);
    const signals = autoMapSignals(fromBlock, toBlock);
    const useSlot = slot !== undefined ? slot : findFreeSlot(connections, toId, side);
    pushHistory(blocks, connections);
    setConnections(cs => [...cs, {
      from: { blockId: fromId, side: connecting.side, slot: connecting.slot },
      to:   { blockId: toId,   side: side,             slot: useSlot },
      kind,
      signals,
      lineParams: defaultLineParams(kind),
      cornerRadius: 8,
      routeMode: 'auto',
    }]);
    setConnecting(null);
  };

  const deleteBlock = (id) => {
    pushHistory(blocks, connections);
    setBlocks(bs => bs.filter(b => b.id !== id));
    setConnections(cs => cs.filter(c => c.from.blockId !== id && c.to.blockId !== id));
    if (selected === id) setSelected(null);
  };

  const updateParam = (blockId, paramKey, value) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, params: { ...b.params, [paramKey]: value } } : b));

    // output_selectъ░А ы│Аъ▓╜ыРЬ ъ▓╜ьЪ░ тАФ ы╣ДэЩЬьД▒ыРЬ ь╢ЬыаеьЧР ъ▒╕ыж░ signal ьЮРыПЩ ьаХыжм
    // (ьЧ░ъ▓░ьДа ьЮРь▓┤ыКФ signalьЭ┤ ы╣Дый┤ ьВньаЬ. ыЛдые╕ signalьЭ┤ ьВ┤ьХДьЮИьЬ╝ый┤ connection ьЬаьзА.)
    if (paramKey === 'output_select' && Array.isArray(value)) {
      const activeSet = new Set(value);
      setConnections(prev => {
        const next = [];
        let removedCount = 0;
        for (const c of prev) {
          if (c.from?.blockId !== blockId) {
            next.push(c);
            continue;
          }
          // ьЭ┤ ы╕ФыбЭьЧРьДЬ ыВШъ░АыКФ connection тАФ signals ьдС ы╣ДэЩЬьД▒ ь╢ЬыаеьЧР ъ▒╕ыж░ ъ▓Г ьаЬъ▒░
          const keptSignals = (c.signals || []).filter(s => activeSet.has(s.fromPort));
          const dropped = (c.signals || []).length - keptSignals.length;
          if (dropped > 0) removedCount += dropped;
          if (keptSignals.length > 0) {
            next.push({ ...c, signals: keptSignals });
          }
          // ыкиыУа signalьЭ┤ ы╣ДьЧИьЬ╝ый┤ connection ьЮРь▓┤ drop
        }
        if (removedCount > 0) {
          console.log(`[output_select] ${removedCount}ъ░Ь signal ьЮРыПЩ ьаХыжмыРи (ы╣ДэЩЬьД▒ ь╢Ьыае)`);
        }
        return next;
      });
    }
  };

  const updateBlockName = (blockId, name) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, name } : b));
  };

  // ып╕ьЧ░ъ▓░ ьЮЕыае эПмэК╕ьЧР ьзБьаС ьЮЕыаеэХШыКФ ъ░Т тАФ ьЧ░ъ▓░ьДаьЭ┤ ьЧЖьЭД ыХМ ьЭ┤ ъ░ТьЭД ьЮЕыаеьЬ╝ыбЬ ьВмьЪй
  const updateInputValue = (blockId, inputKey, value) => {
    setBlocks(bs => bs.map(b => b.id === blockId
      ? { ...b, inputValues: { ...(b.inputValues || {}), [inputKey]: value } }
      : b));
  };

  /* Properties эМиыДРьЭШ ыЛиьЭ╝ parameter ыаМыНФ эЧмэН╝.
     multiSelectыКФ checkbox ъ╖╕ыжмыУЬ, optionsыКФ dropdown, ъ╖╕ ьЩ╕ыКФ input.
     unitьЭ┤ '@otherKey' эШХьЛЭьЭ┤ый┤ ыЛдые╕ param ъ░ТьЬ╝ыбЬ ыПЩьаБ ыЛиьЬД ъ▓░ьаХ. */
  const renderParameter = (p, block, updateFn) => {
    let unitDisplay = p.unit;
    if (typeof p.unit === 'string' && p.unit.startsWith('@')) {
      const refKey = p.unit.slice(1);
      const kindVal = block.params[refKey];
      unitDisplay = resolveDynamicUnit(block.type, kindVal);
    }

    // Multi-select (output_select ъ░ЩьЭА ъ▓Г)
    if (p.multiSelect) {
      const current = block.params[p.key] || [];
      const toggleOpt = (opt) => {
        const set = new Set(current);
        if (set.has(opt)) set.delete(opt); else set.add(opt);
        updateFn(block.id, p.key, Array.from(set));
      };
      return (
        <div key={p.key} className="flex flex-col gap-1">
          <div className="flex items-center justify-between">
            <label className="text-[11px] text-slate-700 font-semibold">{p.label}</label>
            <div className="flex gap-1 text-[9px]">
              <button onClick={() => updateFn(block.id, p.key, [...p.multiSelect])}
                className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono">ALL</button>
              <button onClick={() => updateFn(block.id, p.key, [])}
                className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono">NONE</button>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-x-2 gap-y-0.5">
            {p.multiSelect.map(opt => {
              const checked = current.includes(opt);
              return (
                <label key={opt}
                  className={`flex items-center gap-1 px-1 py-0.5 rounded cursor-pointer text-[10px] font-mono ${
                    checked ? 'bg-cyan-50 text-cyan-900' : 'text-slate-600 hover:bg-slate-50'
                  }`}>
                  <input type="checkbox" checked={checked} onChange={() => toggleOpt(opt)}
                    className="w-2.5 h-2.5 accent-cyan-600" />
                  <span className="truncate">{opt}</span>
                </label>
              );
            })}
          </div>
        </div>
      );
    }

    // ьЭ╝ы░Ш parameter тАФ ParamInputьЭА module top-levelьЧР ьаХьЭШ (focus ьХИьаХьД▒)
    return (
      <div key={p.key} className="flex items-center gap-2">
        <label className="flex-1 text-[11px] text-slate-700">{p.label}</label>
        {p.options ? (
          <select
            value={block.params[p.key]}
            onChange={(e) => updateFn(block.id, p.key, e.target.value)}
            className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500"
          >
            {p.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
          </select>
        ) : (
          <ParamInput
            value={block.params[p.key]}
            isNumber={typeof p.value === 'number'}
            onChange={(v) => updateFn(block.id, p.key, v)}
          />
        )}
        <span className="text-[10px] text-slate-400 w-10 font-mono">{unitDisplay}</span>
      </div>
    );
  };

  // ыЛиьЭ╝ ьЛЬъ░Д ьКдэЕЭ эПЙъ░А: blocksьЩА tъ░А ьг╝ьЦ┤ьзАый┤ outputs ъ│ДьВ░эХ┤ьДЬ ы░ШэЩШ
  // (initSimъ│╝ stepSimulationьЭ┤ ъ│╡ьЬаэХШыКФ ьИЬьИШ эПЙъ░А эХиьИШ)
  // -------- Undo / Redo --------
  // эШДьЮм ьГБэГЬые╝ undo ьКдэГЭьЧР push, redo ьКдэГЭ ы╣ДьЫА (ьГИ ьХбьЕШ ьЛЬьЮС ьЛЬ)
  const pushHistory = (prevBlocks, prevConns) => {
    setUndoStack(s => {
      const next = [...s, {
        blocks: JSON.parse(JSON.stringify(prevBlocks)),
        connections: JSON.parse(JSON.stringify(prevConns)),
      }];
      if (next.length > MAX_HISTORY) next.shift();
      return next;
    });
    setRedoStack([]);
  };

  const doUndo = () => {
    const stack = undoStackRef.current;
    if (stack.length === 0) return;
    const prev = stack[stack.length - 1];
    // эШДьЮм ьГБэГЬые╝ redoыбЬ ьаАьЮе
    setRedoStack(r => [...r, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setUndoStack(s => s.slice(0, -1));
    setBlocks(prev.blocks);
    setConnections(prev.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  const doRedo = () => {
    const stack = redoStackRef.current;
    if (stack.length === 0) return;
    const next = stack[stack.length - 1];
    // эШДьЮм ьГБэГЬые╝ undoыбЬ ыЛдьЛЬ ьаАьЮе
    setUndoStack(s => [...s, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setRedoStack(r => r.slice(0, -1));
    setBlocks(next.blocks);
    setConnections(next.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  // -------- Clipboard --------
  // ьДаэГЭыРЬ ы╕ФыбЭыУдьЭД эБ┤ыж╜ы│┤ыУЬьЧР ы│╡ьВм.
  // ьЦС ыБЭьЭ┤ ыкиыСР ьДаэГЭыРЬ ы╕ФыбЭьЭ╕ ьЧ░ъ▓░ьДаыПД ъ░ЩьЭ┤ ы│╡ьВм (ыВ┤ы╢А ьЧ░ъ▓░ ы│┤ьб┤)
  const doCopy = () => {
    if (selectedIds.length === 0) return;
    const cloneBlocks = selectedIds
      .map(id => blocks.find(b => b.id === id))
      .filter(Boolean)
      .map(b => ({
        ...JSON.parse(JSON.stringify(b)),
        outputs: {},
        state: TYPES[b.type].stateInit ? JSON.parse(JSON.stringify(TYPES[b.type].stateInit)) : {},
      }));
    const idSet = new Set(selectedIds);
    const innerConns = connections
      .filter(c => idSet.has(c.from.blockId) && idSet.has(c.to.blockId))
      .map(c => JSON.parse(JSON.stringify(c)));
    clipboardRef.current = {
      blocks: cloneBlocks,
      connections: innerConns,
    };
  };

  // Cut = Copy + ьДаэГЭыРЬ ы╕ФыбЭъ│╝ ьЧ░ъ▓░ьДа ьВньаЬ
  const doCut = () => {
    if (selectedIds.length === 0 && selectedConnIds.length === 0) return;
    doCopy();
    pushHistory(blocks, connections);
    const idSet = new Set(selectedIds);
    setBlocks(bs => bs.filter(b => !idSet.has(b.id)));
    setConnections(cs => cs.filter((c, i) => {
      // ьДаэГЭыРЬ ьЧ░ъ▓░ьДаьЭ┤ъ▒░ыВШ, ьЦС ыБЭ ьдС эХШыВШыЭ╝ыПД ьДаэГЭыРЬ ы╕ФыбЭьЭ┤ый┤ ьаЬъ▒░
      if (selectedConnIds.includes(i)) return false;
      return !idSet.has(c.from.blockId) && !idSet.has(c.to.blockId);
    }));
    setSelectedIds([]);
    setSelectedConnIds([]);
  };

  // ы╢ЩьЧмыДгъ╕░: ьГИ id ы░Ьъ╕Й, +40px ьШдэФДьЕЛ, ыВ┤ы╢А ьЧ░ъ▓░ыПД ьЮмыздэХС
  const doPaste = () => {
    const clip = clipboardRef.current;
    if (!clip || clip.blocks.length === 0) return;
    pushHistory(blocks, connections);
    const idMap = {};
    // ъ░ЩьЭА type ы│ДыбЬ ьЭ┤ыжД suffix ь╣┤ьЪ┤эК╕ ыИДьаБ
    const typeCounts = {};
    blocksRef.current.forEach(b => {
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
    });
    const newBlocks = clip.blocks.map((b, i) => {
      const newId = `b${Date.now()}_${i}_${Math.random().toString(36).slice(2, 6)}`;
      idMap[b.id] = newId;
      const def = TYPES[b.type];
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
      return {
        ...b,
        id: newId,
        name: `${def.name}_${typeCounts[b.type]}`,
        x: snap(b.x + GRID_SIZE * 2),
        y: snap(b.y + GRID_SIZE * 2),
      };
    });
    const newConns = clip.connections.map(c => ({
      ...JSON.parse(JSON.stringify(c)),
      from: { ...c.from, blockId: idMap[c.from.blockId] },
      to: { ...c.to, blockId: idMap[c.to.blockId] },
    }));
    setBlocks(bs => [...bs, ...newBlocks]);
    setConnections(cs => [...cs, ...newConns]);
    // ы╢ЩьЧмыДгьЭА ы╕ФыбЭыУдьЭД ьДаэГЭ ьГБэГЬыбЬ
    setSelectedIds(newBlocks.map(b => b.id));
    setSelectedConnIds([]);
  };

  const evaluateBlocks = (prevBlocks, conns, t, dt, useBackend = true) => {
    return prevBlocks.map(b => {
      const def = TYPES[b.type];
      const inputs = {};
      def.inputs.forEach(inp => {
        // bьЭШ input portьЧР ыздэХСыРЬ signal pairые╝ ъ░ЦыКФ connection ь░╛ъ╕░
        let connected = false;
        for (const c of conns) {
          if (c.to.blockId !== b.id) continue;
          const sig = (c.signals || []).find(s => s.toPort === inp.key);
          if (!sig) continue;
          connected = true;
          const src = prevBlocks.find(bb => bb.id === c.from.blockId);
          if (src?.outputs?.[sig.fromPort] !== undefined) {
            inputs[inp.key] = src.outputs[sig.fromPort];
          }
          break;
        }
        // ьЧ░ъ▓░ьЭ┤ ьЧЖьЬ╝ый┤ ы╕ФыбЭьЧР ьзБьаС ьЮЕыаеэХЬ ъ░Т(inputValues) ыШРыКФ эПмэК╕ ъ╕░ы│╕ъ░Т(inp.value)ьЭД ьВмьЪй
        if (!connected) {
          const manual = b.inputValues?.[inp.key] ?? inp.value;
          if (manual !== undefined && manual !== '' && manual !== null) {
            const num = Number(manual);
            inputs[inp.key] = Number.isNaN(num) ? manual : num;
          }
        }
      });
      const newState = b.state ? { ...b.state } : {};
      // тФАтФАтФА Python ы░▒ьЧФыУЬ ы╢Дъ╕░ тФАтФАтФА
      // def.backend === 'python' && def.pythonComponent тЖТ callBackendSync()
      // ы░▒ьЧФыУЬ ьЛдэМи ьЛЬ JS compute()ыбЬ fallback (ьЛЬыомьЭА ыБКъ╕░ьзА ьХКьЭМ)
      let outputs;
      if (useBackend && def.backend === 'python' && def.pythonComponent) {
        try {
          const result = callBackendSync(def.pythonComponent, inputs, b.params, newState, dt);
          outputs = result.outputs;
          // newStateыПД ы░▒ьЧФыУЬъ░А ъ░▒ьЛаэЦИьЬ╝ый┤ ы░ШьШБ
          if (result.newState) {
            Object.keys(result.newState).forEach(k => { newState[k] = result.newState[k]; });
          }
        } catch (e) {
          // fallback to JS
          console.warn(`[Backend] ${def.pythonComponent} эШ╕ь╢Ь ьЛдэМи, JS computeыбЬ fallback:`, e.message);
          outputs = def.compute(inputs, b.params, t, newState, dt);
        }
      } else {
        outputs = def.compute(inputs, b.params, t, newState, dt);
      }
      return { ...b, outputs, state: newState, lastInputs: inputs };
    });
  };

  // ьКдыГЕьГ╖ ьГЭьД▒: эШДьЮм ыкиыУа ы╕ФыбЭ outputsьЭД {t, Block.key: value} ыФХьЕФыДИыжмыбЬ
  const makeSnapshot = (blocksList, t) => {
    const snapshot = { t };
    blocksList.forEach(b => {
      Object.entries(b.outputs || {}).forEach(([k, v]) => {
        snapshot[`${b.name}.${k}`] = typeof v === 'number' ? Number(v.toFixed(4)) : v;
      });
    });
    return snapshot;
  };

  // t=0 ь┤Иъ╕░ъ░Т эПЙъ░А: 2эЪМ ы░Шы│╡ (ьЧ░ъ▓░ыРЬ ьЛаэШ╕ъ░А ь▓л passьЧРьДЬыКФ undefined тЖТ default fallback,
  // 2эЪМьз╕ьЧР ьаДэММыРЬ ъ░Т ьВмьЪй). ъ╖╕ ъ▓░ъ│╝ые╝ history[0]ьЧР ъ╕░ыбЭ.
  const initSim = () => {
    const conns = connectionsRef.current;
    const b0 = blocks;
    // pass 1: ь┤Иъ╕░ evaluation
    let evaluated = evaluateBlocks(b0, conns, 0, simState.dt);
    // pass 2: ьаДэММ (source тЖТ math тЖТ display ьИЬьЬ╝ыбЬ ъ░ТьЭ┤ ьаДыЛмыРШыПДыбЭ)
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: [...s.log, `тЧж Initialized @ t=0.0s`],
    }));
  };

  const stepSimulation = useCallback(() => {
    // t_final ыПДыЛм эЫД step эШ╕ь╢ЬьЭА no-op + running ьаХьзА
    // (runSimьЭШ guardъ░А 1ь░и ы░йьЦ┤, ьЭ┤ъ▒┤ race condition ьХИьаДызЭ)
    if (simRef.current.t >= simRef.current.t_final) {
      if (simRef.current.running) {
        setSimState(s => ({ ...s, running: false }));
      }
      return;
    }
    setBlocks(prevBlocks => {
      const conns = connectionsRef.current;
      return evaluateBlocks(prevBlocks, conns, simRef.current.t, simRef.current.dt);
    });

    setSimState(s => {
      const t_new = Math.min(s.t + s.dt, s.t_final);  // t_final ь┤Иъ│╝ ы░йьзА
      const snapshot = makeSnapshot(blocksRef.current, t_new);
      return { ...s, t: t_new, history: [...s.history, snapshot], running: t_new < s.t_final && s.running };
    });
  }, []);

  const connectionsRef = useRef(connections);
  connectionsRef.current = connections;
  const blocksRef = useRef(blocks);
  blocksRef.current = blocks;

  /* ь║Фы▓ДьКд ьвМэСЬ (cx, cy)ьЧРьДЬ ъ░АьЮе ъ░Аъ╣МьЪ┤ ьКмыбп (ыкиыУа ы╕ФыбЭ ├Ч 4ый┤ ├Ч NьКмыбп).
   * threshold ьЭ┤ыВ┤ый┤ ы░ШэЩШ, ьХДыЛИый┤ null. */
  const findNearestSlot = (cx, cy, threshold = 28) => {
    let best = null;
    let bestDist = threshold;
    for (const b of blocks) {
      for (const side of ['top', 'bottom', 'left', 'right']) {
        for (let slot = 0; slot < SLOTS_PER_SIDE; slot++) {
          const pos = getBlockSlotPos(b, side, slot);
          if (!pos) continue;
          const d = Math.hypot(pos.x - cx, pos.y - cy);
          if (d < bestDist) {
            best = { blockId: b.id, side, slot };
            bestDist = d;
          }
        }
      }
    }
    return best;
  };

  /* ыБЭьаР ыУЬыЮШъ╖╕ ьвЕыгМ тАФ ъ░АьЮе ъ░Аъ╣МьЪ┤ ьКмыбпьЧР snap. */
  useEffect(() => {
    if (!endpointDrag) return;
    const onUp = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) { setEndpointDrag(null); return; }
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      const target = findNearestSlot(cx, cy, 28);
      if (target) {
        const conn = connections[endpointDrag.connIdx];
        const otherEnd = endpointDrag.end === 'from' ? conn.to : conn.from;
        // ъ░ЩьЭА ы╕ФыбЭыБ╝ыжм ьЮРъ╕░ыгиэФД ы░йьзА
        if (target.blockId !== otherEnd.blockId) {
          pushHistory(blocks, connections);
          setConnections(cs => cs.map((c, i) => {
            if (i !== endpointDrag.connIdx) return c;
            const newEnd = { blockId: target.blockId, side: target.side, slot: target.slot };
            // ы╕ФыбЭьЭ┤ ы░ФыАМьЧИьЬ╝ый┤ ьЛЬъ╖╕ыДР ьЮмыздэХС + kind ьЮмъ░РьзА
            const oldOther = endpointDrag.end === 'from' ? c.to : c.from;
            if (newEnd.blockId !== (endpointDrag.end === 'from' ? c.from.blockId : c.to.blockId)) {
              const fromBlk = blocks.find(b => b.id === (endpointDrag.end === 'from' ? newEnd.blockId : c.from.blockId));
              const toBlk   = blocks.find(b => b.id === (endpointDrag.end === 'to'   ? newEnd.blockId : c.to.blockId));
              const newKind = detectLineKind(fromBlk, toBlk);
              const newSignals = autoMapSignals(fromBlk, toBlk);
              return {
                ...c,
                [endpointDrag.end]: newEnd,
                kind: newKind,
                signals: newSignals,
                lineParams: defaultLineParams(newKind),
              };
            }
            // ъ░ЩьЭА ы╕ФыбЭ ьХИьЧРьДЬ ьКмыбп/ый┤ызМ ы│Аъ▓╜
            return { ...c, [endpointDrag.end]: newEnd };
          }));
        }
      }
      setEndpointDrag(null);
      // mouseup ьзБэЫД ы░ЬэЩФыРа ьКмыбп/ь║Фы▓ДьКд clickьЭД эХЬ tickызМ ь░иыЛи
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mouseup', onUp);
    return () => window.removeEventListener('mouseup', onUp);
  }, [endpointDrag, connections, blocks]);

  /* Waypoint ыУЬыЮШъ╖╕ тАФ ыЭ╝ьЭ┤ы╕М ьЬДь╣Ш ьЧЕыН░ьЭ┤эК╕, grid snap. */
  useEffect(() => {
    if (!waypointDrag) return;
    const onMove = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) return;
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      // grid snap ьЬаьзА (ьВмьЪйьЮРъ░А ьЭ╝ы╢АыЯм ьзБъ░Б ьаХыам ьЫРэХа ъ░АыКеьД▒ ыЖТьЭМ)
      const sx = Math.round(cx / GRID_SIZE) * GRID_SIZE;
      const sy = Math.round(cy / GRID_SIZE) * GRID_SIZE;
      setConnections(cs => cs.map((c, i) => {
        if (i !== waypointDrag.connIdx) return c;
        const wps = (c.waypoints || []).slice();
        wps[waypointDrag.wpIdx] = { x: sx, y: sy };
        // ыУЬыЮШъ╖╕эХШый┤ ьЮРыПЩьЬ╝ыбЬ manual ыкиыУЬ (ы╕ФыбЭ ьЭ┤ыПЩьЧР ьШБэЦе ьХИ ы░ЫьЭМ)
        return { ...c, waypoints: wps, routeMode: 'manual' };
      }));
    };
    const onUp = () => {
      setWaypointDrag(null);
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [waypointDrag, zoom]);

  /* Segment ыУЬыЮШъ╖╕ тАФ ыЭ╝ьЭ╕ьЭШ эХЬ ьзБъ░Б segmentые╝ эПЙэЦЙ ьЭ┤ыПЩ.
   * ьЮРыПЩ ыкиыУЬый┤ ьЪ░ьДа cornerыУдьЭД manual waypointsыбЬ commitэХЬ ыЛдьЭМ ыСР cornerые╝ ъ░ЩьЭ┤ ьЭ┤ыПЩ.
   * ьИШьзБ segment(axis='x')ыКФ x ы░йэЦеьЬ╝ыбЬ ьЭ┤ыПЩ, ьИШэПЙ segment(axis='y')ыКФ y ы░йэЦе. */
  useEffect(() => {
    if (!segmentDrag) return;
    const onMove = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) return;
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      const sx = Math.round(cx / GRID_SIZE) * GRID_SIZE;
      const sy = Math.round(cy / GRID_SIZE) * GRID_SIZE;
      setConnections(cs => cs.map((c, i) => {
        if (i !== segmentDrag.connIdx) return c;
        // segmentDrag.startWaypointsьЧРьДЬ segIdxьЧР эХ┤ыЛ╣эХШыКФ ыСР corner ьЭ┤ыПЩ
        // pts = [from, ...waypoints, to] ьЭ┤ыпАыбЬ segment kыКФ pts[k]~pts[k+1]
        // ьИШьзБ segment: pts[k].x === pts[k+1].x тЖТ ыСШ ыЛд xые╝ sxыбЬ
        // ьИШэПЙ segment: pts[k].y === pts[k+1].y тЖТ ыСШ ыЛд yые╝ syыбЬ
        const baseWps = segmentDrag.startWaypoints.slice();
        // pts ьЭ╕ыН▒ьКд тЖТ waypoints ьЭ╕ыН▒ьКд: pts[k]ыКФ k=0ьЭ┤ый┤ from, k=len-1ьЭ┤ый┤ to, ъ╖╕ ьЩ╕ waypoints[k-1]
        const aPtsIdx = segmentDrag.segIdx;
        const bPtsIdx = segmentDrag.segIdx + 1;
        const updateWp = (ptsIdx) => {
          if (ptsIdx === 0 || ptsIdx === baseWps.length + 1) return; // endpointыКФ ык╗ ьШоъ╣А
          const wpIdx = ptsIdx - 1;
          if (segmentDrag.axis === 'x') {
            baseWps[wpIdx] = { x: sx, y: baseWps[wpIdx].y };
          } else {
            baseWps[wpIdx] = { x: baseWps[wpIdx].x, y: sy };
          }
        };
        updateWp(aPtsIdx);
        updateWp(bPtsIdx);
        return { ...c, waypoints: baseWps, routeMode: 'manual' };
      }));
    };
    const onUp = () => {
      setSegmentDrag(null);
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [segmentDrag, zoom]);

  /* ьЭ┤ып╕ьзА ы╕ФыбЭ ыжмьВмьЭ┤ьжИ тАФ ьЪ░эХШыЛи эХ╕ыУд ыУЬыЮШъ╖╕ ьЛЬ imageSize ьЧЕыН░ьЭ┤эК╕. */
  useEffect(() => {
    if (!resizing) return;
    const onMove = (e) => {
      const dx = e.clientX - resizing.startX;
      const dy = e.clientY - resizing.startY;
      const delta = Math.abs(dx) > Math.abs(dy) ? dx : dy;
      const newSize = Math.max(80, Math.min(400, resizing.startSize + delta));
      setBlocks(bs => bs.map(b => b.id === resizing.blockId ? { ...b, imageSize: newSize } : b));
    };
    const onUp = () => setResizing(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [resizing]);

  useEffect(() => {
    if (!simState.running) return;
    const id = setInterval(stepSimulation, 50);
    return () => clearInterval(id);
  }, [simState.running, stepSimulation]);

  // эВды│┤ыУЬ ыЛиь╢ХэВд: Delete/Backspace ьВньаЬ, Esc ьДаэГЭ эХ┤ьаЬ, Ctrl+C/X/V эБ┤ыж╜ы│┤ыУЬ, Ctrl+Z/Y undo/redo, Ctrl+A ьаДь▓┤ ьДаэГЭ
  useEffect(() => {
    const onKey = (e) => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      const ctrlOrCmd = e.ctrlKey || e.metaKey;
      const hasBlockSel = selectedIds.length > 0;
      const hasConnSel = selectedConnIds.length > 0;
      const hasAnySel = hasBlockSel || hasConnSel;

      if (ctrlOrCmd) {
        const key = e.key.toLowerCase();
        if (key === 'a') {
          // ьаДь▓┤ ьДаэГЭ
          setSelectedIds(blocks.map(b => b.id));
          setSelectedConnIds(connections.map((_, i) => i));
          e.preventDefault();
        } else if (key === 'c') {
          if (hasBlockSel) { doCopy(); e.preventDefault(); }
        } else if (key === 'x') {
          if (hasAnySel) { doCut(); e.preventDefault(); }
        } else if (key === 'v') {
          doPaste(); e.preventDefault();
        } else if (key === 'z') {
          if (e.shiftKey) { doRedo(); } else { doUndo(); }
          e.preventDefault();
        } else if (key === 'y') {
          doRedo(); e.preventDefault();
        }
        return;
      }

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (hasAnySel) {
          pushHistory(blocks, connections);
          const blockIdSet = new Set(selectedIds);
          const connIdxSet = new Set(selectedConnIds);
          setBlocks(bs => bs.filter(b => !blockIdSet.has(b.id)));
          setConnections(cs => cs.filter((c, i) => {
            if (connIdxSet.has(i)) return false;
            // ьЦС ыБЭ ьдС эХШыВШыЭ╝ыПД ьВньаЬыРЬ ы╕ФыбЭьЭ┤ый┤ ъ░ЩьЭ┤ ьаЬъ▒░
            return !blockIdSet.has(c.from.blockId) && !blockIdSet.has(c.to.blockId);
          }));
          setSelectedIds([]);
          setSelectedConnIds([]);
          e.preventDefault();
        }
      } else if (e.key === 'Escape') {
        setSelectedIds([]);
        setSelectedConnIds([]);
        setConnecting(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedIds, selectedConnIds, blocks, connections]);

  // ы╕ФыбЭ эММыЭ╝ып╕эД░ыВШ ьЧ░ъ▓░ьЭ┤ ы░ФыАМый┤ t=0 ъ░Т ьЮРыПЩ ъ░▒ьЛа (ьЛЬыомыаИьЭ┤ьЕШ ьдСьЭ┤ ьХДыЛР ыХМызМ, ыФФы░ФьЪ┤ьКд)
  // ьЭ┤ъ▒╕ыбЬ Display ы╕ФыбЭьЭ┤ ьЛдьЛЬъ░ДьЬ╝ыбЬ эШДьЮм эММыЭ╝ып╕эД░ ъ╕░ы░Ш ь┤Иъ╕░ъ░ТьЭД ы│┤ьЧмьдМ
  useEffect(() => {
    if (simState.running) return;
    if (blocks.length === 0) return;
    const timer = setTimeout(() => {
      const conns = connectionsRef.current;
      // 2-pass эПЙъ░АыбЬ ьЛаэШ╕ ьаДэММ тАФ эО╕ьзС ьдС ып╕ыжмы│┤ъ╕░ыКФ JS computeызМ ьВмьЪй(ыПЩъ╕░ HTTP ы╕ФыбЬэВ╣ ьаЬъ▒░).
      // ы░▒ьЧФыУЬ ьаХэЩХъ░ТьЭА ьЛдьаЬ Run/Reset ьЛЬьЧРызМ эШ╕ь╢Ь.
      let evaluated = evaluateBlocks(blocks, conns, 0, simState.dt, false);
      evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt, false);
      // outputs/lastInputsызМ ьЧЕыН░ьЭ┤эК╕ (x,y ьЬДь╣Ш ы│Аъ▓╜ ы░йьзА)
      setBlocks(bs => bs.map(b => {
        const ev = evaluated.find(e => e.id === b.id);
        return ev ? { ...b, outputs: ev.outputs, lastInputs: ev.lastInputs } : b;
      }));
    }, 100);
    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [
    // ы╕ФыбЭ эММыЭ╝ып╕эД░ ы│АэЩФ ъ░РьзА (outputs/x/y ьаЬьЩ╕)
    JSON.stringify(blocks.map(b => ({ id: b.id, type: b.type, name: b.name, params: b.params, inputValues: b.inputValues }))),
    connections,
    simState.running,
  ]);

  const runSim = () => {
    // ьЭ┤ып╕ t_final ыПДыЛм ьГБэГЬый┤ Run ъ▒░ы╢А тАФ Reset эЫД ыЛдьЛЬ ьЛЬыПД ьХИыВ┤
    // (ьЭ┤ьаД ыПЩьЮС: t_new = t + dt эХЬ эЫДьЧРьХ╝ running:false ь▓ШыжмыРШыпАыбЬ
    //  Run ыИДые╝ ыХМызИыЛд tъ░А dtьФй t_finalьЭД ыДШьЦ┤ ьжЭъ░АэХШыКФ ы▓Дъ╖╕ ьЮИьЧИьЭМ)
    if (simState.t >= simState.t_final) {
      setSimState(s => ({
        ...s,
        log: [...s.log, `тЪа t = ${s.t.toFixed(1)}s ьЭ┤ып╕ t_final = ${s.t_final}s ыПДыЛм. Reset эЫД Run ъ░АыКе.`],
      }));
      return;
    }
    // historyъ░А ы╣ДьЦ┤ьЮИьЬ╝ый┤(ь┤Иъ╕░ ыбЬыУЬ ьзБэЫД) t=0 ьКдыГЕьГ╖ ыи╝ьаА ъ╕░ыбЭ
    if (simState.history.length === 0) {
      initSim();
    }
    setSimState(s => ({ ...s, running: true, log: [...s.log, `тЦ╢ Run @ t=${s.t.toFixed(1)}s`] }));
  };
  const stopSim = () => setSimState(s => ({ ...s, running: false, log: [...s.log, `тЦа Stop @ t=${s.t.toFixed(1)}s`] }));
  const resetSim = () => {
    // ы╕ФыбЭ stateыКФ ь┤Иъ╕░эЩФ, dt/t_finalьЭА ьЬаьзА
    const resetBlocks = blocks.map(b => {
      const def = TYPES[b.type];
      return { ...b, outputs: {}, state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {} };
    });
    // t=0ьЧРьДЬ 2-pass эПЙъ░А (source тЖТ math тЖТ display ьаДэММ)
    const conns = connectionsRef.current;
    let evaluated = evaluateBlocks(resetBlocks, conns, 0, simState.dt);
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      running: false,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: ['тЖ║ Reset @ t=0.0s'],
    }));
  };

  // -------- Slot Save/Load (localStorage) --------
  const SLOT_INDEX_KEY = 'hpwd-studio-slots';
  const SLOT_PREFIX = 'hpwd-studio-slot-';

  const loadSlotIndex = () => {
    try {
      const raw = localStorage.getItem(SLOT_INDEX_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  };

  const saveSlotIndex = (slots) => {
    try { localStorage.setItem(SLOT_INDEX_KEY, JSON.stringify(slots)); } catch (err) {
      alert('ьКмыбп ьЭ╕ыН▒ьКд ьаАьЮе ьЛдэМи: ' + err.message);
    }
  };

  // эШДьЮм эФДыбЬьаЭэК╕ые╝ ьКмыбпьЬ╝ыбЬ ьаАьЮе (ьГИ ьКмыбп ыШРыКФ ыНоьЦ┤ьУ░ъ╕░)
  const saveSlot = (name, existingId = null) => {
    const slots = loadSlotIndex();
    const now = Date.now();
    const id = existingId || `slot_${now}_${Math.random().toString(36).slice(2, 6)}`;
    const data = {
      id, name, savedAt: now,
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
      simState: { dt: simState.dt, t_final: simState.t_final },
    };
    try {
      localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
    } catch (err) {
      alert('ьКмыбп ьаАьЮе ьЛдэМи (ьЪйыЯЙ ь┤Иъ│╝ ъ░АыКеьД▒): ' + err.message);
      return false;
    }
    // ьЭ╕ыН▒ьКд ьЧЕыН░ьЭ┤эК╕ (ыНоьЦ┤ьУ░ъ╕░ый┤ ъ╡Рь▓┤, ьЛаъ╖Ьый┤ ь╢Фъ░А)
    const meta = {
      id, name, savedAt: now,
      blockCount: blocks.length,
      connectionCount: connections.length,
    };
    const updated = existingId
      ? slots.map(s => s.id === existingId ? meta : s)
      : [...slots, meta];
    saveSlotIndex(updated);
    return true;
  };

  const loadSlot = (id) => {
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (!raw) { alert('ьКмыбп ыН░ьЭ┤эД░ые╝ ь░╛ьЭД ьИШ ьЧЖьК╡ыЛИыЛд'); return false; }
      const data = JSON.parse(raw);
      setBlocks(data.blocks || []);
      setConnections(data.connections || []);
      if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      setSelectedIds([]);
      setSelectedConnIds([]);
      return true;
    } catch (err) {
      alert('ьКмыбп ыбЬыУЬ ьЛдэМи: ' + err.message);
      return false;
    }
  };

  const deleteSlot = (id) => {
    localStorage.removeItem(SLOT_PREFIX + id);
    saveSlotIndex(loadSlotIndex().filter(s => s.id !== id));
  };

  const renameSlot = (id, newName) => {
    const slots = loadSlotIndex();
    const slot = slots.find(s => s.id === id);
    if (!slot) return;
    slot.name = newName;
    saveSlotIndex(slots);
    // ьКмыбп ыН░ьЭ┤эД░ ьЮРь▓┤ьЧРыПД ьЭ┤ыжД ы░ШьШБ
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (raw) {
        const data = JSON.parse(raw);
        data.name = newName;
        localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
      }
    } catch { /* ignore */ }
  };

  // ыкиыЛм ьЧ┤ ыХМ ьКмыбп ыкйыбЭ ъ░▒ьЛа
  const openSlotModal = (mode) => {
    setSlotList(loadSlotIndex());
    setSlotModal(mode);
  };

  const refreshSlotList = () => setSlotList(loadSlotIndex());

  // -------- JSON File Export/Import (ъ╕░ьб┤ ъ╕░ыКе, ы░▒ьЧЕ ьЪйыПД) --------
  const exportProjectFile = () => {
    const data = { blocks, connections, simState: { dt: simState.dt, t_final: simState.t_final } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hpwd_project_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importProjectFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        setBlocks(data.blocks || []);
        setConnections(data.connections || []);
        if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      } catch (err) { alert('Failed to load: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = ''; // ъ░ЩьЭА эММьЭ╝ ьЮмьДаэГЭ ъ░АыКеэХШъ▓М
  };

  // -------- CSV Export --------
  // CSV эХДыУЬ ьЭ┤ьКдь╝АьЭ┤эФД: ьЙ╝эСЬ/ыФ░ьШ┤эСЬ/ъ░ЬэЦЙ эПмэХи ьЛЬ ыФ░ьШ┤эСЬыбЬ ъ░РьЛ╕ъ│а ыВ┤ы╢А ыФ░ьШ┤эСЬыКФ ьдСы│╡
  const csvEscape = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };

  // ъ│╡эЖ╡ ыЛдьЪ┤ыбЬыУЬ эХиьИШ (UTF-8 BOM ь╢Фъ░А тЖТ ExcelьЧРьДЬ эХЬъ╕А/ьИльЮР ьаХьГБ ьЭ╕ьЛЭ)
  const downloadCsv = (filename, rows) => {
    if (!rows || rows.length === 0) {
      alert('ыВ┤ы│┤ыВ╝ ыН░ьЭ┤эД░ъ░А ьЧЖьК╡ыЛИыЛд. ыи╝ьаА ьЛЬыомыаИьЭ┤ьЕШьЭД ьЛдэЦЙэХШьД╕ьЪФ.');
      return;
    }
    const csv = '\ufeff' + rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ьаДьЧн CSV: ыкиыУа ы╕ФыбЭ ь╢Ьыае ьЛЬъ│ДьЧ┤
  const exportAllCsv = () => {
    if (simState.history.length === 0) {
      alert('ыВ┤ы│┤ыВ╝ ыН░ьЭ┤эД░ъ░А ьЧЖьК╡ыЛИыЛд. ыи╝ьаА ьЛЬыомыаИьЭ┤ьЕШьЭД ьЛдэЦЙэХШьД╕ьЪФ.');
      return;
    }
    // ыкиыУа эВд ьИШьзС (tыКФ ьаЬьЭ╝ ьХЮ)
    const keySet = new Set();
    simState.history.forEach(row => Object.keys(row).forEach(k => keySet.add(k)));
    keySet.delete('t');
    const keys = ['t', ...Array.from(keySet).sort()];
    const rows = [keys];
    simState.history.forEach(row => {
      rows.push(keys.map(k => row[k] ?? ''));
    });
    downloadCsv(`hpwd_all_${Date.now()}.csv`, rows);
  };

  // ъ░Ьы│Д Plotter CSV: эХ┤ыЛ╣ эФМыбЬэД░ьЧР ьЧ░ъ▓░ыРЬ ьЛаэШ╕ызМ
  const exportPlotterCsv = (plotterBlock) => {
    if (simState.history.length === 0) {
      alert('ыВ┤ы│┤ыВ╝ ыН░ьЭ┤эД░ъ░А ьЧЖьК╡ыЛИыЛд. ыи╝ьаА ьЛЬыомыаИьЭ┤ьЕШьЭД ьЛдэЦЙэХШьД╕ьЪФ.');
      return;
    }
    const conns = connections.filter(c => c.to.blockId === plotterBlock.id);
    const signals = conns.flatMap(c => {
      const src = blocks.find(b => b.id === c.from.blockId);
      if (!src) return [];
      return (c.signals || []).map(sig => ({
        key: `${src.name}.${sig.fromPort}`,
        port: sig.toPort,
      }));
    });

    if (signals.length === 0) {
      alert(`${plotterBlock.name}ьЧР ьЧ░ъ▓░ыРЬ ьЛаэШ╕ъ░А ьЧЖьК╡ыЛИыЛд.`);
      return;
    }

    // эЧдыНФ: t, y1(SrcName.out), y2(...), ...
    const headers = ['t', ...signals.map(s => `${s.port}(${s.key})`)];
    const rows = [headers];
    simState.history.forEach(row => {
      rows.push([row.t, ...signals.map(s => row[s.key] ?? '')]);
    });
    downloadCsv(`${plotterBlock.name}_${Date.now()}.csv`, rows);
  };

  /* ы╕ФыбЭьЭШ connector(ьвМь╕б in / ьЪ░ь╕б out) ьЬДь╣Ш тАФ ы╕ФыбЭ ъ░АьЪ┤ыН░ ыЖТьЭ┤.
   * ыЭ╝ьЭ╕ьЭА ыкиыУИ ыЛиьЬДыбЬ ьЮЗыКФыЛд. */
  const getBlockHeight = (block) => {
    const def = TYPES[block.type];
    const numIO = Math.max(def.inputs.length, def.outputs.length);
    if (block.type === 'display') return Math.max(70, 45 + numIO * 20 + 10);
    if (def.image) return block.imageSize || 160; // ьВмьЪйьЮР ьб░ьаИ ъ░АыКе, default 160
    return Math.max(80, 45 + numIO * 20 + 10);
  };
  /* ы╕ФыбЭ ъ░АыбЬ эПн тАФ ы╣ДьЭ┤ып╕ьзА ы╕ФыбЭьЭА эХньГБ 180, ьЭ┤ып╕ьзА ы╕ФыбЭьЭА ьаХьВмъ░Б (imageSize) */
  const getBlockWidth = (block) => {
    const def = TYPES[block.type];
    if (def.image) return block.imageSize || 160;
    return 180;
  };
  /* ьКмыбп ьЬДь╣Ш (ьаИыМА ьвМэСЬ). side: 'top'|'bottom'|'left'|'right'.
   * ъ░АыбЬ ый┤(top/bottom)ьЭА slotьЭ┤ x ы╢ДэПм, ьД╕ыбЬ ый┤(left/right)ьЭА y ы╢ДэПм.

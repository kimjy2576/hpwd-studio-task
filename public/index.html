                </button>
              )}

              {selectedDef.parameters.length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Settings size={10} /> Parameters
                  </div>
                  <div className="space-y-1">
                    {selectedDef.parameters.map(p => {
                      // unitьЭ┤ '@otherKey' эШХьЛЭьЭ┤ый┤ ыПЩьаБ тАФ ыЛдые╕ paramьЭШ эШДьЮм ъ░ТьЬ╝ыбЬ ыЛиьЬД ъ▓░ьаХ
                      // ьШИ: { key:'input1_value', unit:'@input1_kind' }
                      //     тЖТ эШДьЮм input1_kind ъ░Т('T','P','Q' ыУ▒)ьЧР ыФ░ыЭ╝ ┬░C/bar/-/...
                      let unitDisplay = p.unit;
                      if (typeof p.unit === 'string' && p.unit.startsWith('@')) {
                        const refKey = p.unit.slice(1);
                        const kindVal = selectedBlock.params[refKey];
                        unitDisplay = resolveDynamicUnit(selectedBlock.type, kindVal);
                      }

                      // === Multi-select (output_select ъ░ЩьЭА ъ▓Г) ===
                      if (p.multiSelect) {
                        const current = selectedBlock.params[p.key] || [];
                        const toggleOpt = (opt) => {
                          const set = new Set(current);
                          if (set.has(opt)) set.delete(opt); else set.add(opt);
                          updateParam(selectedBlock.id, p.key, Array.from(set));
                        };
                        return (
                          <div key={p.key} className="flex flex-col gap-1 py-1 border-t border-slate-100 mt-1 pt-2">
                            <div className="flex items-center justify-between">
                              <label className="text-[11px] text-slate-700 font-semibold">{p.label}</label>
                              <div className="flex gap-1 text-[9px]">
                                <button
                                  onClick={() => updateParam(selectedBlock.id, p.key, [...p.multiSelect])}
                                  className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono"
                                >ALL</button>
                                <button
                                  onClick={() => updateParam(selectedBlock.id, p.key, [])}
                                  className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono"
                                >NONE</button>
                              </div>
                            </div>
                            <div className="grid grid-cols-3 gap-x-2 gap-y-0.5">
                              {p.multiSelect.map(opt => {
                                const checked = current.includes(opt);
                                return (
                                  <label key={opt}
                                    className={`flex items-center gap-1 px-1 py-0.5 rounded cursor-pointer text-[10px] font-mono ${
                                      checked ? 'bg-cyan-50 text-cyan-900' : 'text-slate-600 hover:bg-slate-50'
                                    }`}
                                  >
                                    <input
                                      type="checkbox"
                                      checked={checked}
                                      onChange={() => toggleOpt(opt)}
                                      className="w-2.5 h-2.5 accent-cyan-600"
                                    />
                                    <span className="truncate">{opt}</span>
                                  </label>
                                );
                              })}
                            </div>
                          </div>
                        );
                      }

                      // === ьЭ╝ы░Ш parameter (single value) ===
                      return (
                        <div key={p.key} className="flex items-center gap-2">
                          <label className="flex-1 text-[11px] text-slate-700">{p.label}</label>
                          {p.options ? (
                            <select
                              value={selectedBlock.params[p.key]}
                              onChange={(e) => updateParam(selectedBlock.id, p.key, e.target.value)}
                              className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500"
                            >
                              {p.options.map(opt => (
                                <option key={opt} value={opt}>{opt}</option>
                              ))}
                            </select>
                          ) : (
                            <input
                              type={typeof p.value === 'number' ? 'number' : 'text'}
                              value={selectedBlock.params[p.key]}
                              step={typeof p.value === 'number' ? (p.value < 1 ? 0.01 : p.value < 10 ? 0.1 : 1) : undefined}
                              onChange={(e) => updateParam(selectedBlock.id, p.key,
                                typeof p.value === 'number' ? (parseFloat(e.target.value) || 0) : e.target.value)}
                              className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500"
                            />
                          )}
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{unitDisplay}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {selectedDef.inputs.length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Activity size={10} /> Inputs
                  </div>
                  <div className="space-y-1">
                    {selectedDef.inputs.map(p => {
                      const val = selectedBlock.lastInputs?.[p.key];
                      return (
                        <div key={p.key} className="flex items-center gap-2 text-[11px]">
                          <span className="flex-1 text-slate-700">{p.label}</span>
                          <span className="text-cyan-700 font-semibold font-mono w-16 text-right">
                            {val !== undefined ? (typeof val === 'number' ? val.toFixed(2) : val) : 'тАФ'}
                          </span>
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                    {selectedDef.inputs.some(p =>
                      !connections.find(c => c.to.blockId === selectedBlock.id && (c.signals || []).some(s => s.toPort === p.key))
                    ) && (
                      <div className="text-[9px] text-amber-600 mt-1 flex items-center gap-1">
                        <span>тЪа</span> ьЭ╝ы╢А ьЮЕыаеьЭ┤ ьЧ░ъ▓░ыРШьзА ьХКьЭМ
                      </div>
                    )}
                  </div>
                </div>
              )}

              {selectedDef.outputs.length > 0 && (() => {
                const activeOuts = getActiveOutputs(selectedBlock);
                if (activeOuts.length === 0) return null;
                return (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Zap size={10} /> Outputs
                  </div>
                  <div className="space-y-1">
                    {activeOuts.map(p => {
                      const val = selectedBlock.outputs?.[p.key];
                      return (
                        <div key={p.key} className="flex items-center gap-2 text-[11px]">
                          <span className="flex-1 text-slate-700">{p.label}</span>
                          <span className="text-amber-700 font-semibold font-mono w-16 text-right">
                            {val !== undefined ? (typeof val === 'number' ? val.toFixed(2) : val) : 'тАФ'}
                          </span>
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                );
              })()}

              {selectedBlock.state && Object.keys(selectedBlock.state).length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 font-semibold">State</div>
                  <div className="space-y-1">
                    {Object.entries(selectedBlock.state).map(([k, v]) => (
                      <div key={k} className="flex items-center gap-2 text-[11px]">
                        <span className="flex-1 text-slate-600">{k}</span>
                        <span className="text-slate-800 font-mono w-16 text-right">
                          {typeof v === 'number' ? v.toFixed(3) : JSON.stringify(v)}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Statusbar */}
      <div className="h-6 bg-slate-50 border-t border-slate-200 flex items-center px-3 text-[10px] text-slate-500 gap-4 shrink-0 font-mono">
        <span>
          <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1"></span>
          Connecting: {connecting ? `${blocks.find(b => b.id === connecting.blockId)?.name} (${connecting.direction})` : 'none'}
        </span>
        <span>({mousePos.x.toFixed(0)}, {mousePos.y.toFixed(0)})</span>
        {(selectedIds.length > 0 || selectedConnIds.length > 0) && (
          <span className="text-sky-600">
            ьДаэГЭыРи: ы╕ФыбЭ {selectedIds.length} ┬╖ ьЧ░ъ▓░ьДа {selectedConnIds.length} ┬╖ Delete эВдыбЬ ьВньаЬ
          </span>
        )}
        <div className="flex-1" />
        <span>HPWD Simulation Studio ┬╖ quasi-steady seq. subst.</span>
      </div>

      {/* Slot Save/Load Modal */}
      {slotModal && (
        <SlotModal
          mode={slotModal}
          slots={slotList}
          onClose={() => setSlotModal(null)}
          onSave={(name, existingId) => {
            if (saveSlot(name, existingId)) {
              refreshSlotList();
            }
          }}
          onLoad={(id) => {
            if (loadSlot(id)) setSlotModal(null);
          }}
          onDelete={(id) => {
            deleteSlot(id);
            refreshSlotList();
          }}
          onRename={(id, newName) => {
            renameSlot(id, newName);
            refreshSlotList();
          }}
          onExportFile={exportProjectFile}
          onImportFile={importProjectFile}
          currentBlockCount={blocks.length}
          currentConnectionCount={connections.length}
        />
      )}
      <ChatFAB onSend={chatExecuteMock} />
    </div>
  );
}

/* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР AI Chat Floating Button + Popup тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
function ChatFAB({ onSend }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    {
      role: 'assistant',
      text: 'HPWD Studio AI ьЦ┤ьЛЬьКдэД┤эК╕ (Mock ыкиыУЬ).\nьЮРьЧ░ьЦ┤ ыкЕыа╣ьЬ╝ыбЬ ь║Фы▓ДьКд ьб░ьЮС ъ░АыКе. эВдьЫМыУЬ ыздь╣ньЬ╝ыбЬ ыПЩьЮС.',
    },
    {
      role: 'assistant',
      text: 'эШДьЮм ьзАьЫРэХШыКФ ыкЕыа╣:',
      tools: [
        '"ъ▒┤ьб░ъ╕░ ьВмьЭ┤эБ┤ ызМыУдьЦ┤ьдШ" тАФ ьВмьЭ┤эБ┤ ьЭ╝ъ┤Д ьГЭьД▒ (load_preset)',
        '"ь┤Иъ╕░эЩФ" тАФ ь║Фы▓ДьКд ы╣ДьЪ░ъ╕░ (clear_canvas)',
        '"ьЛдэЦЙ" / "ьаХьзА" / "ыжмьЕЛ" тАФ ьЛЬыомыаИьЭ┤ьЕШ ьаЬьЦ┤',
      ],
    },
  ]);
  const [input, setInput] = useState('');
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, open]);

  const send = () => {
    const t = input.trim();
    if (!t) return;
    // user ыйФьЛЬьзА ыи╝ьаА ь╢Фъ░А
    setMessages(m => [...m, { role: 'user', text: t }]);
    setInput('');
    // mock ь▓Шыжм тАФ ьЛдьаЬ LLMьЭ┤ый┤ ьЧмъ╕░ьДЬ API call. ьХ╜ъ░ДьЭШ ьзАьЧ░ьЬ╝ыбЬ thinking ыКРыВМ
    setTimeout(() => {
      const result = onSend ? onSend(t) : { reply: 'No handler.' };
      const msg = { role: 'assistant', text: result.reply };
      if (result.tool) {
        msg.toolCall = { name: result.tool, args: result.args || {}, ok: result.result?.ok !== false };
      }
      setMessages(m => [...m, msg]);
    }, 200);
  };

  const examples = [
    'ъ▒┤ьб░ъ╕░ ьВмьЭ┤эБ┤ ызМыУдьЦ┤ьдШ',
    'ь┤Иъ╕░эЩФ',
    'ьЛдэЦЙ',
    'ьаХьзА',
  ];

  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-cyan-600 hover:bg-cyan-700 text-white flex items-center justify-center shadow-lg hover:shadow-xl transition-all hover:scale-105"
        style={{ zIndex: 50 }}
        title="AI ьЦ┤ьЛЬьКдэД┤эК╕ ьЧ┤ъ╕░"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-amber-400 border-2 border-white animate-pulse"></span>
      </button>
    );
  }

  return (
    <div
      className="fixed bottom-6 right-6 w-[400px] h-[560px] bg-white rounded-lg shadow-2xl border border-slate-200 flex flex-col"
      style={{ zIndex: 50 }}
    >
      {/* Header */}
      <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between bg-gradient-to-r from-cyan-600 to-cyan-700 text-white rounded-t-lg shrink-0">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-white"></div>
          <span className="font-semibold text-[13px]">AI ьЦ┤ьЛЬьКдэД┤эК╕</span>
          <span className="text-[9px] px-1.5 py-0.5 bg-white/20 rounded font-mono tracking-wider">UI ONLY</span>
        </div>
        <button
          onClick={() => setOpen(false)}
          className="text-white/80 hover:text-white text-2xl leading-none w-6 h-6 flex items-center justify-center"
          title="ыЛлъ╕░"
        >├Ч</button>
      </div>

      {/* Messages */}
      <div ref={bodyRef} className="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50">
        {messages.map((m, i) => (
          <div key={i} className="text-[12px] leading-relaxed">
            <div className={`text-[9px] font-mono uppercase tracking-widest font-semibold mb-1 flex items-center gap-1.5 ${m.role === 'user' ? 'text-cyan-700 justify-end' : 'text-amber-700'}`}>
              {m.role !== 'user' && <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>}
              {m.role === 'user' ? 'YOU' : 'ASSISTANT'}
              {m.role === 'user' && <span className="w-1.5 h-1.5 rounded-full bg-cyan-600"></span>}
            </div>
            <div className={m.role === 'user' ? 'bg-cyan-50 border border-cyan-200 rounded-lg rounded-tr-sm px-3 py-2 ml-8 text-slate-800 whitespace-pre-wrap' : 'text-slate-700 mr-4 whitespace-pre-wrap'}>
              {m.text}
            </div>
            {m.toolCall && (
              <div className="mr-4 mt-1.5 flex items-center gap-1.5">
                <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded font-semibold tracking-wider ${
                  m.toolCall.ok
                    ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
                    : 'bg-red-50 text-red-700 border border-red-200'
                }`}>
                  {m.toolCall.ok ? 'тЬУ' : 'тЬЧ'} {m.toolCall.name}
                </span>
                {Object.keys(m.toolCall.args).length > 0 && (
                  <span className="text-[9px] font-mono text-slate-500 truncate">
                    {Object.entries(m.toolCall.args).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ')}
                  </span>
                )}
              </div>
            )}
            {m.tools && (
              <div className="bg-white border border-amber-200 border-l-2 border-l-amber-500 rounded-r px-3 py-2 mt-1.5 font-mono text-[10px] text-slate-600 leading-relaxed mr-4">
                {m.tools.map((tt, j) => (
                  <div key={j}>┬╖ {tt}</div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Quick examples */}
      <div className="px-3 py-2 border-t border-slate-100 flex flex-wrap gap-1.5 bg-white shrink-0">
        {examples.map((s, i) => (
          <span
            key={i}
            onClick={() => setInput(s)}
            className="text-[10px] px-2 py-0.5 bg-slate-100 hover:bg-cyan-50 hover:text-cyan-700 hover:border-cyan-300 rounded-full cursor-pointer text-slate-600 border border-slate-200 transition-colors"
          >
            {s}
          </span>
        ))}
      </div>

      {/* Input */}
      <div className="border-t border-slate-200 p-2 flex gap-1.5 bg-white rounded-b-lg shrink-0">
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          className="flex-1 resize-none px-2 py-1.5 text-[12px] border border-slate-300 rounded bg-slate-50 text-slate-700 h-12 outline-none focus:border-cyan-500 focus:bg-white"
          placeholder="ьШИ: эЮИэК╕эОМэФД ьВмьЭ┤эБ┤ ызМыУдьЦ┤ьдШ (Enter)"
        />
        <button
          onClick={send}
          disabled={!input.trim()}
          className="px-3 text-[10px] font-mono font-semibold bg-cyan-600 text-white rounded hover:bg-cyan-700 self-stretch tracking-wider disabled:opacity-50 disabled:cursor-not-allowed"
        >SEND</button>
      </div>
    </div>
  );
}

/* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР App Switcher (HPWD Studio тЖФ Component Studio) тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const apps = [
    { id: 'studio',           label: 'HPWD Studio',      desc: 'ьЛЬыом ь║Фы▓ДьКд',   href: '/' },
    { id: 'component-studio', label: 'Component Studio', desc: 'ь╗┤эПмыДМэК╕ ьЮСьД▒', href: '/component-studio/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors"
      >
        <div className="w-2 h-2 rounded-sm bg-cyan-600 shrink-0"/>
        <span className="font-bold text-slate-900 tracking-wide text-[11px]">{active.label}</span>
        <span className="text-slate-400 text-[9px]">тЦ╛</span>
      </button>

      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-56 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button
                key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-cyan-50 cursor-default' : 'hover:bg-slate-50'
                }`}
              >
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-cyan-700' : 'text-slate-300'}`}>
                  {isActive ? 'тЧП' : 'тЧЛ'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-cyan-900' : 'text-slate-800'}`}>
                    {a.label}
                  </div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР Backend Status Indicator + Switcher тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
function BackendStatus() {
  const [tick, setTick] = useState(0);
  const [open, setOpen] = useState(false);
  const [customUrl, setCustomUrl] = useState('');
  const dropdownRef = useRef(null);

  useEffect(() => {
    const handler = () => setTick(t => t + 1);
    window.addEventListener('hpwd-backend-status', handler);
    return () => window.removeEventListener('hpwd-backend-status', handler);
  }, []);

  // dropdown ьЩ╕ы╢А эБ┤ыжн ьЛЬ ыЛлъ╕░
  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const status = window.HPWD_BACKEND || { connected: false, components: [], lastError: null, url: '', presets: {} };
  const presets = status.presets || { cloud: '', local: 'http://localhost:8000' };
  const isLocal = status.url === presets.local;
  const isCloud = status.url === presets.cloud;
  const isCustom = !isLocal && !isCloud;

  const tooltip = status.connected
    ? `Backend OK ┬╖ ${status.url}\nыУ▒ыбЭыРЬ ь╗┤эПмыДМэК╕: ${status.components.join(', ')}`
    : `Backend ьЧ░ъ▓░ ьХИ ыРи ┬╖ ${status.url}\n${status.lastError || 'ьДЬы▓Д ып╕ьЛдэЦЙ'}`;

  const switchTo = (url) => {
    if (typeof window.HPWD_setBackend === 'function') {
      window.HPWD_setBackend(url);
    }
    setOpen(false);
  };
  const applyCustom = () => {
    if (customUrl.trim()) {
      switchTo(customUrl.trim());
      setCustomUrl('');
    }
  };

  return (
    <div className="relative" ref={dropdownRef}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 text-[11px] font-mono px-2 py-1 rounded border transition-colors hover:bg-opacity-80"
        style={{
          background: status.connected ? '#ecfdf5' : '#fef2f2',
          borderColor: status.connected ? '#a7f3d0' : '#fecaca',
          color: status.connected ? '#065f46' : '#991b1b',
        }}
        title={tooltip}
      >
        <span
          className="w-2 h-2 rounded-full"
          style={{
            background: status.connected ? '#10b981' : '#ef4444',
            boxShadow: status.connected ? '0 0 4px #10b981' : 'none',
          }}
        />
        <span>Backend</span>
        <span className="opacity-70">{status.connected ? `(${status.components.length})` : 'OFF'}</span>
        <span className="text-[8px] opacity-50">тЦ╛</span>
      </button>

      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-72 p-2 text-[11px] font-mono">
          <div className="px-2 py-1 text-slate-500 text-[10px] uppercase tracking-wider">Backend URL</div>

          {/* Cloud */}
          <button
            onClick={() => switchTo(presets.cloud)}
            disabled={!presets.cloud}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isCloud ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            } disabled:opacity-40 disabled:cursor-not-allowed`}
          >
            <span className="w-3 text-center">{isCloud ? 'тЧП' : 'тЧЛ'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Cloud (Railway)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.cloud || '(not configured)'}</div>
            </div>
          </button>

          {/* Local */}
          <button
            onClick={() => switchTo(presets.local)}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isLocal ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            }`}
          >
            <span className="w-3 text-center">{isLocal ? 'тЧП' : 'тЧЛ'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Local (ыВ┤ PC)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.local}</div>
            </div>
          </button>

          {/* Custom */}
          <div className={`mt-1 px-2 py-1.5 rounded ${isCustom ? 'bg-cyan-50' : ''}`}>
            <div className="flex items-center gap-2 mb-1">
              <span className="w-3 text-center">{isCustom ? 'тЧП' : 'тЧЛ'}</span>
              <span className={`font-semibold ${isCustom ? 'text-cyan-900' : 'text-slate-700'}`}>Custom URL</span>
            </div>
            <div className="flex gap-1">
              <input
                type="text"
                value={customUrl}
                onChange={e => setCustomUrl(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') applyCustom(); }}
                placeholder={isCustom ? status.url : 'http://192.168.10.5:8000'}
                className="flex-1 px-2 py-0.5 text-[10px] border border-slate-300 rounded bg-white text-slate-700 outline-none focus:border-cyan-500"
              />
              <button
                onClick={applyCustom}
                disabled={!customUrl.trim()}
                className="px-2 text-[9px] font-bold bg-cyan-600 text-white rounded hover:bg-cyan-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >SET</button>
            </div>
          </div>

          {/* ьГБэГЬ ьаХы│┤ */}
          <div className="mt-2 px-2 py-1.5 bg-slate-50 rounded text-[10px]">
            <div className="flex justify-between">
              <span className="text-slate-500">Status</span>
              <span className={status.connected ? 'text-emerald-700 font-semibold' : 'text-red-700 font-semibold'}>
                {status.connected ? 'тЧП Connected' : 'тЧЛ Disconnected'}
              </span>
            </div>
            {status.connected && (
              <div className="flex justify-between mt-0.5">
                <span className="text-slate-500">Components</span>
                <span className="text-slate-700">{status.components.length}</span>
              </div>
            )}
            {!status.connected && status.lastError && (
              <div className="mt-1 text-red-700 break-words">{status.lastError}</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function ToolBtn({ icon: Icon, label, onClick, disabled, color = 'text-slate-700 hover:bg-slate-100', as, title }) {
  const Comp = as || 'button';
  return (
    <Comp
      onClick={disabled ? undefined : onClick}
      title={title}
      className={`px-2 py-1 rounded flex items-center gap-1 text-[11px] transition-colors ${color} ${disabled ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'}`}
    >
      <Icon size={13} />
      <span>{label}</span>
    </Comp>
  );
}

// =============================================================
// SlotModal тАФ ьД╕ьЭ┤ы╕М ьКмыбп ъ┤Аыжм UI
// =============================================================
function SlotModal({ mode, slots, onClose, onSave, onLoad, onDelete, onRename, onExportFile, onImportFile, currentBlockCount, currentConnectionCount }) {
  const [newName, setNewName] = useState('');
  const [renamingId, setRenamingId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const fileInputRef = useRef(null);

  const sortedSlots = [...slots].sort((a, b) => b.savedAt - a.savedAt);

  const fmtDate = (ts) => {
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  const handleNewSave = () => {
    const name = newName.trim() || `Untitled ${fmtDate(Date.now())}`;
    onSave(name, null);
    setNewName('');
  };

  const handleOverwrite = (slot) => {
    if (confirm(`"${slot.name}" ьКмыбпьЭД эШДьЮм ьГБэГЬыбЬ ыНоьЦ┤ьУ╕ъ╣МьЪФ?`)) {
      onSave(slot.name, slot.id);
    }
  };

  const handleRenameStart = (slot) => {
    setRenamingId(slot.id);
    setRenameValue(slot.name);
  };

  const handleRenameCommit = (id) => {
    const v = renameValue.trim();
    if (v) onRename(id, v);
    setRenamingId(null);
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
      onClick={onClose}
    >
      <div
        className="bg-white rounded-lg shadow-2xl border border-slate-200 w-[560px] max-h-[80vh] flex flex-col"
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div className="text-sm font-semibold text-slate-900">
              {mode === 'save' ? 'эФДыбЬьаЭэК╕ ьаАьЮе' : 'эФДыбЬьаЭэК╕ ы╢ИыЯмьШдъ╕░'}
            </div>
            <div className="text-[11px] text-slate-500 font-mono">
              {mode === 'save'
                ? `эШДьЮм: ы╕ФыбЭ ${currentBlockCount} ┬╖ ьЧ░ъ▓░ьДа ${currentConnectionCount}`
                : `ьаАьЮеыРЬ ьКмыбп ${slots.length}ъ░Ь ┬╖ ы╕МыЭ╝ьЪ░ьаАьЧР ыбЬь╗м ьаАьЮеыРи`}
            </div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none px-2">
            ├Ч
          </button>
        </div>

        {/* Save mode: ьГИ ьКмыбп ьЮЕыае */}
        {mode === 'save' && (
          <div className="px-5 py-3 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
            <input
              type="text"
              placeholder="ьГИ ьКмыбп ьЭ┤ыжД (ы╣ДьЫМыСРый┤ ьЛЬъ░Д ъ╕░ы░Ш ьЮРыПЩ ыкЕыкЕ)"
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') handleNewSave(); }}
              className="flex-1 px-2.5 py-1.5 text-[12px] bg-white border border-slate-300 rounded focus:outline-none focus:border-cyan-500"
              autoFocus
            />
            <button
              onClick={handleNewSave}
              className="px-3 py-1.5 text-[12px] bg-cyan-600 text-white rounded hover:bg-cyan-700 transition-colors font-medium"
            >
              ьГИ ьКмыбпьЬ╝ыбЬ ьаАьЮе
            </button>
          </div>
        )}

        {/* Slot list */}
        <div className="flex-1 overflow-y-auto">
          {sortedSlots.length === 0 ? (
            <div className="p-10 text-center text-slate-400 text-[12px]">
              ьаАьЮеыРЬ ьКмыбпьЭ┤ ьЧЖьК╡ыЛИыЛд
              {mode === 'load' && <div className="mt-2 text-[11px]">ыи╝ьаА SaveьЧРьДЬ ьКмыбпьЭД ызМыУдьЦ┤ы│┤ьД╕ьЪФ</div>}
            </div>
          ) : (
            <div className="divide-y divide-slate-100">
              {sortedSlots.map((slot) => (
                <div key={slot.id} className="px-5 py-3 hover:bg-slate-50 group flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    {renamingId === slot.id ? (
                      <input
                        type="text"
                        value={renameValue}
                        onChange={(e) => setRenameValue(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') handleRenameCommit(slot.id);
                          else if (e.key === 'Escape') setRenamingId(null);
                        }}
                        onBlur={() => handleRenameCommit(slot.id)}
                        autoFocus
                        className="w-full px-1.5 py-0.5 text-[12px] bg-white border border-cyan-500 rounded focus:outline-none"
                      />
                    ) : (
                      <div className="text-[13px] font-medium text-slate-900 truncate">{slot.name}</div>
                    )}
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">
                      {fmtDate(slot.savedAt)} ┬╖ ы╕ФыбЭ {slot.blockCount} ┬╖ ьЧ░ъ▓░ьДа {slot.connectionCount}
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="flex items-center gap-1">
                    {mode === 'load' ? (
                      <button
                        onClick={() => onLoad(slot.id)}
                        className="px-2.5 py-1 text-[11px] bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 rounded transition-colors"
                      >
                        ы╢ИыЯмьШдъ╕░
                      </button>
                    ) : (
                      <button
                        onClick={() => handleOverwrite(slot)}
                        className="px-2.5 py-1 text-[11px] bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded transition-colors"
                      >
                        ыНоьЦ┤ьУ░ъ╕░
                      </button>
                    )}
                    <button
                      onClick={() => handleRenameStart(slot)}
                      className="px-2 py-1 text-[11px] text-slate-600 hover:bg-slate-100 rounded transition-colors"
                      title="ьЭ┤ыжД ы│Аъ▓╜"
                    >
                      тЬО
                    </button>
                    {confirmDeleteId === slot.id ? (
                      <>
                        <button
                          onClick={() => { onDelete(slot.id); setConfirmDeleteId(null); }}
                          className="px-2 py-1 text-[11px] bg-red-600 text-white rounded hover:bg-red-700"
                        >
                          эЩХьЭ╕
                        </button>
                        <button
                          onClick={() => setConfirmDeleteId(null)}
                          className="px-2 py-1 text-[11px] text-slate-500 hover:bg-slate-100 rounded"
                        >
                          ь╖иьЖМ
                        </button>
                      </>
                    ) : (
                      <button
                        onClick={() => setConfirmDeleteId(slot.id)}
                        className="px-2 py-1 text-[11px] text-red-500 hover:bg-red-50 rounded transition-colors"
                        title="ьВньаЬ"
                      >
                        ЁЯЧС
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Footer: JSON эММьЭ╝ Export/Import */}
        <div className="px-5 py-3 bg-slate-50 border-t border-slate-200 flex items-center justify-between text-[11px]">
          <span className="text-slate-500">
            ы░▒ьЧЕ/ъ│╡ьЬаьЪй:
          </span>
          <div className="flex items-center gap-2">
            <button
              onClick={onExportFile}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON эММьЭ╝ыбЬ ыВ┤ы│┤ыВ┤ъ╕░
            </button>
            <button
              onClick={() => fileInputRef.current?.click()}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON эММьЭ╝ ъ░Аьа╕ьШдъ╕░
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json"
              className="hidden"
              onChange={onImportFile}
            />
          </div>
        </div>
      </div>
    </div>
  );
}


    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('Render error:', error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{ padding: 24, fontFamily: 'monospace', color: '#dc2626', whiteSpace: 'pre-wrap' }}>
              <h2 style={{ marginBottom: 12 }}>тЪа Render Error</h2>
              <div style={{ marginBottom: 16, fontSize: 14 }}>{String(this.state.error?.message || this.state.error)}</div>
              <pre style={{ fontSize: 11, color: '#475569', background: '#f8fafc', padding: 12, borderRadius: 4, overflow: 'auto' }}>
                {this.state.error?.stack}
              </pre>
              <button
                onClick={() => location.reload()}
                style={{ marginTop: 16, padding: '6px 16px', background: '#06b6d4', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer' }}
              >Reload</button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><HPWDStudio /></ErrorBoundary>);
  </script>
</body>
</html>

    const FolderOpen = _mkIcon(<path d="M6 14l1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2" />);
    const Settings   = _mkIcon(<g><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></g>);
    const Activity   = _mkIcon(<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />);
    const Zap        = _mkIcon(<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />);

    const Thermometer= _mkIcon(<path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0z" />);
    const Gauge      = _mkIcon(<g><path d="m12 14 4-4" /><path d="M3.34 19a10 10 0 1 1 17.32 0" /></g>);
    const CircleDot  = _mkIcon(<g><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="1" /></g>);
    const BoxIcon    = _mkIcon(<g><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></g>);
    const Box        = BoxIcon;
    const BarChart3  = _mkIcon(<g><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></g>);
    const ChevronRight = _mkIcon(<polyline points="9 18 15 12 9 6" />);
    const ChevronDown  = _mkIcon(<polyline points="6 9 12 15 18 9" />);
    const Hash       = _mkIcon(<g><line x1="4" y1="9" x2="20" y2="9" /><line x1="4" y1="15" x2="20" y2="15" /><line x1="10" y1="3" x2="8" y2="21" /><line x1="16" y1="3" x2="14" y2="21" /></g>);
    const TrendingUp = _mkIcon(<g><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></g>);

    const Plus       = _mkIcon(<g><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></g>);
    const Minus      = _mkIcon(<line x1="5" y1="12" x2="19" y2="12" />);
    const X          = _mkIcon(<g><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></g>);
    const Divide     = _mkIcon(<g><circle cx="12" cy="6" r="1.5" fill="currentColor" /><line x1="5" y1="12" x2="19" y2="12" /><circle cx="12" cy="18" r="1.5" fill="currentColor" /></g>);
    const Eye        = _mkIcon(<g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></g>);
    const Download   = _mkIcon(<g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></g>);
    const Undo       = _mkIcon(<g><path d="M3 7v6h6" /><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.7 3L3 13" /></g>);
    const Redo       = _mkIcon(<g><path d="M21 7v6h-6" /><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.7 3L21 13" /></g>);


const TYPES = {
  ambient: {
    typeNo: 1, name: 'Ambient', category: 'source', color: '#475569', icon: Thermometer,
    desc: '대기 조건 (온도/습도)',
    parameters: [
      { key: 'T_amb', label: 'T_ambient', value: 25, unit: '°C' },
      { key: 'RH_amb', label: 'RH_ambient', value: 50, unit: '%' },
      { key: 'P_atm', label: 'P_atm', value: 101.325, unit: 'kPa' },
    ],
    inputs: [],
    outputs: [
      { key: 'T_out', label: 'T', unit: '°C' },
      { key: 'RH_out', label: 'RH', unit: '%' },
      { key: 'P_out', label: 'P', unit: 'kPa' },
    ],
    compute: (inp, par) => ({ T_out: par.T_amb, RH_out: par.RH_amb, P_out: par.P_atm }),
  },
  compressor: {
    typeNo: 100, name: 'Compressor', category: 'refrigerant', color: '#dc2626', icon: CircleDot, image: './images/compressor.png',
    desc: '로터리/리시프로 압축기',
    parameters: [
      { key: 'V_disp', label: 'Displacement', value: 10.0, unit: 'cc' },
      { key: 'RPM', label: 'Speed', value: 3000, unit: 'rpm' },
      { key: 'eta_v', label: 'η_vol', value: 0.85, unit: '-' },
      { key: 'eta_is', label: 'η_is', value: 0.70, unit: '-' },
      { key: 'PR', label: 'Press. Ratio', value: 3.5, unit: '-' },
    ],
    inputs: [
      { key: 'P_suc', label: 'P_suc', unit: 'kPa' },
      { key: 'T_suc', label: 'T_suc', unit: '°C' },
    ],
    outputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_dis', label: 'T_dis', unit: '°C' },
      { key: 'P_dis', label: 'P_dis', unit: 'kPa' },
      { key: 'W_comp', label: 'W_comp', unit: 'W' },
    ],
    compute: (inp, par) => {
      const P_suc = inp.P_suc ?? 500;
      const T_suc = inp.T_suc ?? 10;
      const T_suc_K = T_suc + 273.15;
      const rho = (P_suc * 1000) / (120 * T_suc_K);
      const m_dot = par.eta_v * rho * par.V_disp * 1e-6 * par.RPM / 60 * 1000;
      const P_dis = P_suc * par.PR;
      const T_dis_is = T_suc_K * Math.pow(par.PR, 0.28);
      const T_dis = T_suc_K + (T_dis_is - T_suc_K) / par.eta_is;
      const W_comp = (m_dot / 1000) * 1.0 * (T_dis - T_suc_K) * 1000;
      return { m_dot, T_dis: T_dis - 273.15, P_dis, W_comp };
    },
  },
  condenser: {
    typeNo: 101, name: 'Condenser', category: 'refrigerant', color: '#ea580c', icon: Box, image: './images/condenser.png',
    desc: '응축기 (고온측 열교환기)',
    parameters: [
      { key: 'UA', label: 'UA', value: 150, unit: 'W/K' },
      { key: 'dP_ref', label: 'ΔP_ref', value: 20, unit: 'kPa' },
    ],
    inputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_in', label: 'T_ref_in', unit: '°C' },
      { key: 'P_in', label: 'P_ref_in', unit: 'kPa' },
      { key: 'T_air', label: 'T_air', unit: '°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_out', label: 'T_ref_out', unit: '°C' },
      { key: 'P_out', label: 'P_ref_out', unit: 'kPa' },
      { key: 'Q', label: 'Q_cond', unit: 'W' },
      { key: 'T_air_out', label: 'T_air_out', unit: '°C' },
    ],
    compute: (inp, par) => {
      const m = (inp.m_dot ?? 1) / 1000;
      const T_in = inp.T_in ?? 80;
      const T_air = inp.T_air ?? 25;
      const m_air = inp.m_air ?? 0.05;
      const C_min = Math.min(m * 1200, m_air * 1005);
      const NTU = par.UA / Math.max(C_min, 1e-6);
      const eps = 1 - Math.exp(-NTU);
      const Q = eps * C_min * (T_in - T_air);
      const T_out = T_in - Q / (m * 1200 + 1e-6);
      const T_air_out = T_air + Q / (m_air * 1005 + 1e-6);
      return { T_out, P_out: (inp.P_in ?? 1800) - par.dP_ref, Q, T_air_out };
    },
  },
  exv: {
    typeNo: 102, name: 'Expansion Valve', category: 'refrigerant', color: '#d97706', icon: Zap, image: './images/eev.png',
    desc: '전자팽창밸브 (EEV)',
    parameters: [
      { key: 'A_orifice', label: 'A_orifice', value: 0.5, unit: 'mm²' },
      { key: 'opening', label: 'Opening', value: 100, unit: '%' },
      { key: 'Cd', label: 'Cd', value: 0.65, unit: '-' },
    ],
    inputs: [
      { key: 'P_in', label: 'P_in', unit: 'kPa' },
      { key: 'T_in', label: 'T_in', unit: '°C' },
      { key: 'P_out_target', label: 'P_out', unit: 'kPa' },
    ],
    outputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_out', label: 'T_out', unit: '°C' },
      { key: 'P_out', label: 'P_out', unit: 'kPa' },
    ],
    compute: (inp, par) => {
      const P_in = inp.P_in ?? 1800;
      const P_out = inp.P_out_target ?? 500;
      const T_in = inp.T_in ?? 35;
      const A_eff = par.A_orifice * (par.opening / 100) * 1e-6;
      const rho = (P_in * 1000) / (120 * (T_in + 273.15));
      const dP = Math.max((P_in - P_out) * 1000, 0);
      const m_dot = par.Cd * A_eff * Math.sqrt(2 * rho * dP) * 1000;
      return { m_dot, T_out: 0.03 * P_out - 20, P_out };
    },
  },
  evaporator: {
    typeNo: 103, name: 'Evaporator', category: 'refrigerant', color: '#2563eb', icon: Droplet, image: './images/evaporator.png',
    desc: '증발기 (저온측 열교환기)',
    parameters: [
      { key: 'UA', label: 'UA', value: 120, unit: 'W/K' },
      { key: 'dP_ref', label: 'ΔP_ref', value: 15, unit: 'kPa' },
      { key: 'SH', label: 'Superheat', value: 5, unit: 'K' },
    ],
    inputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_in', label: 'T_ref_in', unit: '°C' },
      { key: 'P_in', label: 'P_ref_in', unit: 'kPa' },
      { key: 'T_air', label: 'T_air', unit: '°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_out', label: 'T_ref_out', unit: '°C' },
      { key: 'P_out', label: 'P_ref_out', unit: 'kPa' },
      { key: 'Q', label: 'Q_evap', unit: 'W' },
      { key: 'T_air_out', label: 'T_air_out', unit: '°C' },
    ],
    compute: (inp, par) => {
      const m = (inp.m_dot ?? 1) / 1000;
      const T_in = inp.T_in ?? -10;
      const T_air = inp.T_air ?? 40;
      const m_air = inp.m_air ?? 0.05;
      const C_min = Math.min(m * 1500, m_air * 1005);
      const NTU = par.UA / Math.max(C_min, 1e-6);
      const eps = 1 - Math.exp(-NTU);
      const Q = eps * C_min * (T_air - T_in);
      const T_air_out = T_air - Q / (m_air * 1005 + 1e-6);
      return { T_out: T_in + par.SH, P_out: (inp.P_in ?? 500) - par.dP_ref, Q, T_air_out };
    },
  },
  fan: {
    typeNo: 200, name: 'Fan', category: 'air', color: '#0891b2', icon: Wind, image: './images/fan.png',
    desc: '송풍기 (시로코/축류)',
    parameters: [
      { key: 'RPM', label: 'Speed', value: 2500, unit: 'rpm' },
      { key: 'V_max', label: 'V_max', value: 0.15, unit: 'm³/s' },
      { key: 'eta', label: 'η_fan', value: 0.55, unit: '-' },
      { key: 'dP_max', label: 'ΔP_max', value: 300, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_in', label: 'T_air_in', unit: '°C' },
      { key: 'dP_sys', label: 'ΔP_system', unit: 'Pa' },
    ],
    outputs: [
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
      { key: 'T_out', label: 'T_air_out', unit: '°C' },
      { key: 'W_fan', label: 'W_fan', unit: 'W' },
    ],
    compute: (inp, par) => {
      const T_in = inp.T_in ?? 25;
      const dP_sys = inp.dP_sys ?? 150;
      const speed_frac = par.RPM / 2500;
      const V = par.V_max * speed_frac * Math.sqrt(Math.max(1 - dP_sys / (par.dP_max * speed_frac ** 2), 0.1));
      const rho_air = 1.2 * (293.15 / (T_in + 273.15));
      const m_air = rho_air * V;
      const W_fan = (V * dP_sys) / par.eta;
      return { m_air, T_out: T_in + W_fan / (m_air * 1005 + 1e-6), W_fan };
    },
  },
  drum: {
    typeNo: 201, name: 'Drum', category: 'air', color: '#0e7490', icon: Gauge, image: './images/drum.png',
    desc: '세탁건조기 드럼 (직물-공기 열/물질전달)',
    parameters: [
      { key: 'm_fabric', label: 'Fabric Mass', value: 5.0, unit: 'kg' },
      { key: 'MC_init', label: 'MC_init', value: 0.8, unit: '-' },
      { key: 'hA', label: 'hA', value: 50, unit: 'W/K' },
      { key: 'dP_drum', label: 'ΔP_drum', value: 100, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_air_in', label: 'T_air_in', unit: '°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_air_out', label: 'T_air_out', unit: '°C' },
      { key: 'MC', label: 'MC', unit: '-' },
      { key: 'm_evap', label: 'm_evap', unit: 'g/s' },
      { key: 'dP', label: 'ΔP', unit: 'Pa' },
    ],
    stateInit: { MC: null, T_fab: 25 },
    compute: (inp, par, t, state, dt) => {
      const T_air_in = inp.T_air_in ?? 50;
      const m_air = inp.m_air ?? 0.05;
      if (state.MC === null) state.MC = par.MC_init;
      const dT = T_air_in - state.T_fab;
      const Q = par.hA * dT;
      const h_fg = 2400e3;
      const m_evap = state.MC > 0.05 ? Q / h_fg : 0;
      state.T_fab = state.T_fab + (Q - m_evap * h_fg) / (par.m_fabric * 1500) * dt;
      state.MC = Math.max(state.MC - (m_evap * dt) / par.m_fabric, 0);
      return {
        T_air_out: T_air_in - Q / (m_air * 1005 + 1e-6),
        MC: state.MC,
        m_evap: m_evap * 1000,
        dP: par.dP_drum,
      };
    },
  },
  // ================ 테스트용 신호 생성 ================
  constant: {
    typeNo: 10, name: 'Constant', category: 'source', color: '#6366f1', icon: Hash,
    desc: '상수 값 생성',
    parameters: [
      { key: 'value', label: 'Value', value: 1.0, unit: '' },
    ],
    inputs: [],
    outputs: [{ key: 'y', label: 'y', unit: '' }],
    compute: (inp, par) => ({ y: par.value }),
  },
  ramp: {
    typeNo: 11, name: 'Ramp', category: 'source', color: '#6366f1', icon: TrendingUp,
    desc: '선형 시간 함수: y = slope·t + offset',
    parameters: [
      { key: 'slope', label: 'Slope', value: 1.0, unit: '/s' },
      { key: 'offset', label: 'Offset', value: 0.0, unit: '' },
    ],
    inputs: [],
    outputs: [{ key: 'y', label: 'y', unit: '' }],
    compute: (inp, par, t) => ({ y: par.slope * t + par.offset }),
  },
  sine: {
    typeNo: 12, name: 'Sine', category: 'source', color: '#6366f1', icon: Waves,
    desc: '사인파: y = A·sin(2πft) + offset',
    parameters: [
      { key: 'A', label: 'Amplitude', value: 1.0, unit: '' },
      { key: 'freq', label: 'Frequency', value: 0.1, unit: 'Hz' },
      { key: 'offset', label: 'Offset', value: 0.0, unit: '' },
    ],
    inputs: [],
    outputs: [{ key: 'y', label: 'y', unit: '' }],
    compute: (inp, par, t) => ({
      y: par.A * Math.sin(2 * Math.PI * par.freq * t) + par.offset,
    }),
  },

  // ================ 사칙연산 ================
  add: {
    typeNo: 20, name: 'Add', category: 'math', color: '#10b981', icon: Plus,
    desc: '덧셈: y = a + b',
    parameters: [],
    inputs: [
      { key: 'a', label: 'a', unit: '' },
      { key: 'b', label: 'b', unit: '' },
    ],
    outputs: [{ key: 'y', label: 'a+b', unit: '' }],
    compute: (inp) => ({ y: (inp.a ?? 0) + (inp.b ?? 0) }),
  },
  subtract: {
    typeNo: 21, name: 'Subtract', category: 'math', color: '#10b981', icon: Minus,
    desc: '뺄셈: y = a − b',
    parameters: [],
    inputs: [
      { key: 'a', label: 'a', unit: '' },
      { key: 'b', label: 'b', unit: '' },
    ],
    outputs: [{ key: 'y', label: 'a−b', unit: '' }],

/* 두 블록 카테고리로부터 default 라인 종류 결정 */
function detectLineKind(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return 'refrigerant';
  const fromCat = TYPES[fromBlock.type]?.category;
  const toCat = TYPES[toBlock.type]?.category;
  if (fromCat === 'refrigerant' && toCat === 'refrigerant') return 'refrigerant';
  if (fromCat === 'air' && toCat === 'air') return 'air';
  if (fromCat === 'refrigerant' || toCat === 'refrigerant') return 'refrigerant';
  if (fromCat === 'air' || toCat === 'air') return 'air';
  return 'refrigerant';
}

/* 라인 종류의 default lineParams 생성 */
function defaultLineParams(kind) {
  const out = {};
  (LINE_KINDS[kind]?.fields || []).forEach(f => { out[f.key] = f.value; });
  return out;
}

/* 두 블록 사이에 자동으로 호환 시그널 페어를 매핑.
 * pass 1: 키 완전일치  ·  pass 2: 키 prefix + 단위 일치  ·  pass 3: 단위만 일치 */
function autoMapSignals(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return [];
  const fromOuts = TYPES[fromBlock.type]?.outputs || [];
  const toIns = TYPES[toBlock.type]?.inputs || [];
  const usedTo = new Set();
  const mapped = [];
  // pass 1: exact key match
  fromOuts.forEach(out => {
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.key === out.key);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 2: prefix + unit match (T_dis ↔ T_in)
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    const prefix = out.key.split('_')[0];
    const m = toIns.find(inp =>
      !usedTo.has(inp.key) &&
      inp.key.split('_')[0] === prefix &&
      (inp.unit || '') === (out.unit || '')
    );
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 3: unit-only fallback
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    if (!out.unit) return;
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.unit === out.unit);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  return mapped;
}

// 그리드 크기 (px). 캔버스 배경 dot pattern과 동일.
const GRID_SIZE = 20;
const snap = (v) => Math.round(v / GRID_SIZE) * GRID_SIZE;

// 선분이 사각형과 겹치는지 판정 (선분은 수평 또는 수직만 가정)
function segmentIntersectsRect(x1, y1, x2, y2, rect) {
  const PAD = 4; // 블록 테두리에 너무 붙지 않도록 여유
  const rx1 = rect.x - PAD, ry1 = rect.y - PAD;
  const rx2 = rect.x + rect.w + PAD, ry2 = rect.y + rect.h + PAD;
  // 수평 선분
  if (y1 === y2) {
    if (y1 < ry1 || y1 > ry2) return false;
    const sx1 = Math.min(x1, x2), sx2 = Math.max(x1, x2);
    return !(sx2 < rx1 || sx1 > rx2);
  }
  // 수직 선분
  if (x1 === x2) {
    if (x1 < rx1 || x1 > rx2) return false;
    const sy1 = Math.min(y1, y2), sy2 = Math.max(y1, y2);
    return !(sy2 < ry1 || sy1 > ry2);
  }
  return false;
}

// 경로(세그먼트들의 꼭짓점 배열)가 어떤 장애물과라도 충돌하는지
function pathHitsObstacles(points, obstacles) {
  for (let i = 0; i < points.length - 1; i++) {
    const [x1, y1] = points[i], [x2, y2] = points[i + 1];
    for (const rect of obstacles) {
      if (segmentIntersectsRect(x1, y1, x2, y2, rect)) return true;
    }
  }
  return false;
}

// 직교(90도) 경로 계산. offsets로 각 세그먼트 위치 조정.
// obstacles: [{x, y, w, h}] 블록 목록 → 이들을 피해가도록 midX/midY를 자동 조정.
// returns { d, handles: [{segment, x, y, axis, segMin, segMax}] }
function getOrthogonalPath(from, to, offsets = {}, obstacles = []) {
  const MARGIN = 20;
  const STUB = 12;
  const {
    midOffsetX = 0,
    midOffsetY = 0,
    outOffsetX = 0,
    inOffsetX = 0,
  } = offsets;

  if (to.x >= from.x + MARGIN * 2) {
    // 일반 L→R: 3-세그먼트 (수평→수직→수평)
    const autoMid = (from.x + to.x) / 2;
    let midX = Math.max(from.x + STUB, Math.min(to.x - STUB, autoMid + midOffsetX));

    // 장애물 회피: 사용자가 수동 오프셋을 주지 않았을 때만 자동 조정
    if (midOffsetX === 0 && obstacles.length > 0) {
      const testPath = () => [[from.x, from.y], [midX, from.y], [midX, to.y], [to.x, to.y]];
      if (pathHitsObstacles(testPath(), obstacles)) {
        // 후보 midX들을 훑으면서 첫 번째로 충돌 없는 위치 선택
        // from.x+STUB부터 to.x-STUB까지 GRID 간격으로 탐색
        const candidates = [];
        const minX = from.x + STUB;
        const maxX = to.x - STUB;
        // 자동 중심에서 바깥으로 번갈아 탐색 (시각적으로 중앙 우선)
        for (let d = 0; d <= maxX - minX; d += GRID_SIZE) {
          const left = autoMid - d;
          const right = autoMid + d;
          if (left >= minX && left <= maxX) candidates.push(left);
          if (d > 0 && right >= minX && right <= maxX) candidates.push(right);
        }
        for (const cand of candidates) {
          midX = cand;
          if (!pathHitsObstacles(testPath(), obstacles)) break;
        }
      }
    }

    const segMin = Math.min(from.y, to.y);
    const segMax = Math.max(from.y, to.y);
    return {
      d: `M ${from.x} ${from.y} L ${midX} ${from.y} L ${midX} ${to.y} L ${to.x} ${to.y}`,
      isNormal: true,
      handles: [
        { segment: 'midX', x: midX, y: (from.y + to.y) / 2, axis: 'x', segMin, segMax },
      ],
    };
  }

  // 역참조(루프): 5-세그먼트 — 수평→수직→수평→수직→수평
  const autoOutX = from.x + MARGIN;
  const autoInX = to.x - MARGIN;
  const autoMidY = Math.abs(from.y - to.y) < 20
    ? from.y + 50
    : (from.y + to.y) / 2;
  const outX = autoOutX + outOffsetX;
  const inX = autoInX + inOffsetX;
  let midY = autoMidY + midOffsetY;

  // 루프 라우팅 장애물 회피: midY를 블록 위/아래로 밀어냄
  if (midOffsetY === 0 && obstacles.length > 0) {
    const testPath = () => [[from.x, from.y], [outX, from.y], [outX, midY], [inX, midY], [inX, to.y], [to.x, to.y]];
    if (pathHitsObstacles(testPath(), obstacles)) {
      // 위/아래로 번갈아가며 스캔
      for (let d = GRID_SIZE; d <= 400; d += GRID_SIZE) {
        // 아래로
        midY = autoMidY + d;
        if (!pathHitsObstacles(testPath(), obstacles)) break;
        // 위로
        midY = autoMidY - d;
        if (!pathHitsObstacles(testPath(), obstacles)) break;
      }
    }
  }

  return {
    d: `M ${from.x} ${from.y} L ${outX} ${from.y} L ${outX} ${midY} L ${inX} ${midY} L ${inX} ${to.y} L ${to.x} ${to.y}`,
    isNormal: false,
    handles: [
      { segment: 'outX', x: outX, y: (from.y + midY) / 2, axis: 'x',
        segMin: Math.min(from.y, midY), segMax: Math.max(from.y, midY) },
      { segment: 'midY', x: (outX + inX) / 2, y: midY, axis: 'y',
        segMin: Math.min(outX, inX), segMax: Math.max(outX, inX) },
      { segment: 'inX', x: inX, y: (midY + to.y) / 2, axis: 'x',
        segMin: Math.min(midY, to.y), segMax: Math.max(midY, to.y) },
    ],
  };
}

function HPWDStudio() {
  const [blocks, setBlocks] = useState([]);

  const [draggingConn, setDraggingConn] = useState(null);

  // 박스 드래그 선택 상태: {startX, startY, curX, curY}

  // Save/Load 슬롯 모달: 'save' | 'load' | null

  const [slotList, setSlotList] = useState([]);  // 슬롯 메타데이터 목록

  // 편의를 위해 단일 선택 API를 다중으로 어댑트
  const selected = selectedIds.length > 0 ? selectedIds[selectedIds.length - 1] : null;
  const selectedConn = selectedConnIds.length > 0 ? selectedConnIds[selectedConnIds.length - 1] : null;
  const setSelected = (id) => setSelectedIds(id === null ? [] : [id]);
  const setSelectedConn = (i) => setSelectedConnIds(i === null ? [] : [i]);

  // 클립보드 (Ctrl+C/X/V용) — { blocks: [], connections: [] }
  const clipboardRef = useRef(null);

  // Undo/Redo 스택 — 각 엔트리는 { blocks, connections }
  const [undoStack, setUndoStack] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  const undoStackRef = useRef([]);
  const redoStackRef = useRef([]);
  undoStackRef.current = undoStack;
  redoStackRef.current = redoStack;
  const MAX_HISTORY = 50;

  const [simState, setSimState] = useState({
    running: false, t: 0, dt: 1.0, t_final: 600, history: [], log: [],
  });
  const simRef = useRef(simState);
  simRef.current = simState;

  const canvasRef = useRef(null);
  const blockRefsMap = useRef({});  // blockId → DOM element ref
  const draggingRef = useRef(null); // 드래그 상태를 ref로 (state 대신)
  const draggingConnRef = useRef(null);
  const mousePosRef = useRef({ x: 0, y: 0 });
  const rafRef = useRef(null);      // requestAnimationFrame id
  const [expandedCats, setExpandedCats] = useState({ source: true, math: true, refrigerant: true, air: true, output: true });

  const handleLibraryDragStart = (e, typeKey) => {
    e.dataTransfer.setData('typeKey', typeKey);
    e.dataTransfer.effectAllowed = 'copy';
  };
  const handleCanvasDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  const handleCanvasDrop = (e) => {
    e.preventDefault();
    const typeKey = e.dataTransfer.getData('typeKey');
    if (!typeKey || !TYPES[typeKey]) return;
    const rect = canvasRef.current.getBoundingClientRect();
    addBlock(typeKey, e.clientX - rect.left, e.clientY - rect.top);
  };

  const addBlock = (typeKey, x, y) => {
    const def = TYPES[typeKey];
    const id = `b${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    const params = Object.fromEntries(def.parameters.map(p => [p.key, p.value]));
    pushHistory(blocks, connections);
    setBlocks(bs => [...bs, {
      id, type: typeKey, x: snap(x - 90), y: snap(y - 40),
      name: `${def.name}_${bs.filter(b => b.type === typeKey).length + 1}`,
      params, outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    }]);
    setSelected(id);
  };

  const handleBlockMouseDown = (e, blockId) => {
    // Port 클릭 시에도 이벤트 전파는 막아야 함 (안 그러면 캔버스 박스 드래그 시작됨)
    e.stopPropagation();
    if (e.target.closest('[data-port]')) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const block = blocks.find(b => b.id === blockId);

    // Shift/Ctrl: 다중 선택 토글
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      setSelectedIds(prev => prev.includes(blockId)
        ? prev.filter(id => id !== blockId)
        : [...prev, blockId]);
      setSelectedConnIds([]);
      return; // shift-select 모드에서는 드래그 시작 안 함
    }

    // 현재 블록이 이미 선택된 다중 선택의 일부면 선택 유지
    // 아니면 이 블록만 단독 선택
    let dragIds;
    if (selectedIds.includes(blockId)) {
      dragIds = selectedIds;
    } else {
      setSelectedIds([blockId]);
      dragIds = [blockId];
    }
    setSelectedConnIds([]);

    // 드래그할 모든 블록의 시작 위치 저장
    const startPositions = {};
    dragIds.forEach(id => {
      const b = blocks.find(bb => bb.id === id);
      if (b) startPositions[id] = { x: b.x, y: b.y };
    });
    draggingRef.current = {
      blockIds: dragIds,
      primaryId: blockId,
      startPositions,
      offsetX: e.clientX - rect.left - block.x,
      offsetY: e.clientY - rect.top - block.y,
    };
  };

  const handleCanvasMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    mousePosRef.current = { x: mx, y: my };

    // 블록 드래그: DOM 직접 조작, 다중 블록 동시 이동 지원
    if (draggingRef.current) {
      const { blockIds, primaryId, offsetX, offsetY, startPositions } = draggingRef.current;
      // primary 블록 기준으로 delta 계산, 나머지는 같은 delta 적용
      const primaryStart = startPositions[primaryId];
      const snappedX = snap(mx - offsetX);
      const snappedY = snap(my - offsetY);
      const dx = snappedX - primaryStart.x;
      const dy = snappedY - primaryStart.y;
      // 모든 선택된 블록을 transform으로 이동
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = `translate(${dx}px, ${dy}px)`;
      });
      draggingRef.current.dx = dx;
      draggingRef.current.dy = dy;
      return;
    }

    // 박스 선택 드래그 중
    if (selectionBox) {
      setSelectionBox(sb => sb ? { ...sb, curX: mx, curY: my } : sb);
      return;
    }

    // 연결선 세그먼트 드래그
    if (draggingConn) {
      const { idx, segment, startMouseX, startMouseY, startOffset } = draggingConn;
      const axis = segment.endsWith('Y') ? 'y' : 'x';
      const delta = axis === 'y' ? (my - startMouseY) : (mx - startMouseX);
      const offsetKey = SEGMENT_OFFSET_KEYS[segment];
      setConnections(cs => cs.map((c, i) =>
        i === idx ? { ...c, [offsetKey]: startOffset + delta } : c
      ));
    }

    if (connecting) {
      setMousePos({ x: mx, y: my });
    }
  };

  const handleCanvasMouseUp = () => {
    if (draggingRef.current) {
      const { blockIds, startPositions, dx, dy } = draggingRef.current;
      // transform 초기화
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = '';
      });
      if (dx !== undefined && (dx !== 0 || dy !== 0)) {
        pushHistory(blocks, connections);
        setBlocks(bs => bs.map(b => {
          if (!blockIds.includes(b.id)) return b;
          const start = startPositions[b.id];
          return { ...b, x: start.x + dx, y: start.y + dy };
        }));
      }
      draggingRef.current = null;
    }

    // 박스 선택 종료 → 사각형 영역 내 블록 + 연결선 선택
    if (selectionBox) {
      const box = selectionBox;
      const x1 = Math.min(box.startX, box.curX);
      const y1 = Math.min(box.startY, box.curY);
      const x2 = Math.max(box.startX, box.curX);
      const y2 = Math.max(box.startY, box.curY);

      // 박스가 너무 작으면 (거의 클릭) 무시
      if (x2 - x1 > 4 || y2 - y1 > 4) {
        // 블록: bbox가 완전히 포함되면 선택
        const pickedBlocks = blocks.filter(b => {
          const def = TYPES[b.type];
          const maxPorts = Math.max(def.inputs.length, def.outputs.length);
          const baseMin = b.type === 'display' ? 70 : 80;
          const h = Math.max(baseMin, 45 + maxPorts * 20 + 10);
          return b.x >= x1 && b.y >= y1 && (b.x + 180) <= x2 && (b.y + h) <= y2;
        }).map(b => b.id);

        // 연결선: source와 target 둘 다 박스 안 블록일 때만 선택
        const pickedConns = connections
          .map((c, i) => ({ c, i }))
          .filter(({ c }) => pickedBlocks.includes(c.from.blockId) && pickedBlocks.includes(c.to.blockId))
          .map(({ i }) => i);

        setSelectedIds(pickedBlocks);
        setSelectedConnIds(pickedConns);
      }
      setSelectionBox(null);
    }

    if (draggingConn) {
      setDraggingConn(null);
    }
  };

  /* 블록 단위 connector(좌측 in / 우측 out) 클릭 핸들러.
   * 두 블록을 잇는 한 라인 생성. 호환 시그널은 자동 매핑.
   * 같은 두 블록 사이에 이미 라인이 있으면 무시(중복 방지). */
  const handleBlockConnectorClick = (e, blockId, direction) => {
    e.stopPropagation();
    if (!connecting) {
      setConnecting({ blockId, direction });
      return;
    }
    if (connecting.blockId === blockId || connecting.direction === direction) {
      setConnecting(null);
      return;
    }
    const fromId = connecting.direction === 'out' ? connecting.blockId : blockId;
    const toId   = connecting.direction === 'out' ? blockId : connecting.blockId;
    const fromBlock = blocks.find(b => b.id === fromId);
    const toBlock   = blocks.find(b => b.id === toId);
    const kind = detectLineKind(fromBlock, toBlock);
    const signals = autoMapSignals(fromBlock, toBlock);
    pushHistory(blocks, connections);
    setConnections(cs => {
      // 동일 from→to 라인 중복 방지
      if (cs.some(c => c.from.blockId === fromId && c.to.blockId === toId)) return cs;
      return [...cs, {
        from: { blockId: fromId },
        to:   { blockId: toId },
        kind,
        signals,
        lineParams: defaultLineParams(kind),
        midOffsetX: 0,
      }];
    });
    setConnecting(null);
  };

  const deleteBlock = (id) => {
    pushHistory(blocks, connections);
    setBlocks(bs => bs.filter(b => b.id !== id));
    setConnections(cs => cs.filter(c => c.from.blockId !== id && c.to.blockId !== id));
    if (selected === id) setSelected(null);
  };

  const updateParam = (blockId, paramKey, value) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, params: { ...b.params, [paramKey]: value } } : b));
  };

  const updateBlockName = (blockId, name) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, name } : b));
  };

  // 단일 시간 스텝 평가: blocks와 t가 주어지면 outputs 계산해서 반환
  // (initSim과 stepSimulation이 공유하는 순수 평가 함수)
  // -------- Undo / Redo --------
  // 현재 상태를 undo 스택에 push, redo 스택 비움 (새 액션 시작 시)
  const pushHistory = (prevBlocks, prevConns) => {
    setUndoStack(s => {
      const next = [...s, {
        blocks: JSON.parse(JSON.stringify(prevBlocks)),
        connections: JSON.parse(JSON.stringify(prevConns)),
      }];
      if (next.length > MAX_HISTORY) next.shift();
      return next;
    });
    setRedoStack([]);
  };

  const doUndo = () => {
    const stack = undoStackRef.current;
    if (stack.length === 0) return;
    const prev = stack[stack.length - 1];
    // 현재 상태를 redo로 저장
    setRedoStack(r => [...r, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setUndoStack(s => s.slice(0, -1));
    setBlocks(prev.blocks);
    setConnections(prev.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  const doRedo = () => {
    const stack = redoStackRef.current;
    if (stack.length === 0) return;
    const next = stack[stack.length - 1];
    // 현재 상태를 undo로 다시 저장
    setUndoStack(s => [...s, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setRedoStack(r => r.slice(0, -1));
    setBlocks(next.blocks);
    setConnections(next.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  // -------- Clipboard --------
  // 선택된 블록들을 클립보드에 복사.
  // 양 끝이 모두 선택된 블록인 연결선도 같이 복사 (내부 연결 보존)
  const doCopy = () => {
    if (selectedIds.length === 0) return;
    const cloneBlocks = selectedIds
      .map(id => blocks.find(b => b.id === id))
      .filter(Boolean)
      .map(b => ({
        ...JSON.parse(JSON.stringify(b)),
        outputs: {},
        state: TYPES[b.type].stateInit ? JSON.parse(JSON.stringify(TYPES[b.type].stateInit)) : {},
      }));
    const idSet = new Set(selectedIds);
    const innerConns = connections
      .filter(c => idSet.has(c.from.blockId) && idSet.has(c.to.blockId))
      .map(c => JSON.parse(JSON.stringify(c)));
    clipboardRef.current = {
      blocks: cloneBlocks,
      connections: innerConns,
    };
  };

  // Cut = Copy + 선택된 블록과 연결선 삭제
  const doCut = () => {
    if (selectedIds.length === 0 && selectedConnIds.length === 0) return;
    doCopy();
    pushHistory(blocks, connections);
    const idSet = new Set(selectedIds);
    setBlocks(bs => bs.filter(b => !idSet.has(b.id)));
    setConnections(cs => cs.filter((c, i) => {
      // 선택된 연결선이거나, 양 끝 중 하나라도 선택된 블록이면 제거
      if (selectedConnIds.includes(i)) return false;
      return !idSet.has(c.from.blockId) && !idSet.has(c.to.blockId);
    }));
    setSelectedIds([]);
    setSelectedConnIds([]);
  };

  // 붙여넣기: 새 id 발급, +40px 오프셋, 내부 연결도 재매핑
  const doPaste = () => {
    const clip = clipboardRef.current;
    if (!clip || clip.blocks.length === 0) return;
    pushHistory(blocks, connections);
    const idMap = {};
    // 같은 type 별로 이름 suffix 카운트 누적
    const typeCounts = {};
    blocksRef.current.forEach(b => {
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
    });
    const newBlocks = clip.blocks.map((b, i) => {
      const newId = `b${Date.now()}_${i}_${Math.random().toString(36).slice(2, 6)}`;
      idMap[b.id] = newId;
      const def = TYPES[b.type];
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
      return {
        ...b,
        id: newId,
        name: `${def.name}_${typeCounts[b.type]}`,
        x: snap(b.x + GRID_SIZE * 2),
        y: snap(b.y + GRID_SIZE * 2),
      };
    });
    const newConns = clip.connections.map(c => ({
      ...JSON.parse(JSON.stringify(c)),
      from: { ...c.from, blockId: idMap[c.from.blockId] },
      to: { ...c.to, blockId: idMap[c.to.blockId] },
    }));
    setBlocks(bs => [...bs, ...newBlocks]);
    setConnections(cs => [...cs, ...newConns]);
    // 붙여넣은 블록들을 선택 상태로
    setSelectedIds(newBlocks.map(b => b.id));
    setSelectedConnIds([]);
  };

  const evaluateBlocks = (prevBlocks, conns, t, dt) => {
    return prevBlocks.map(b => {
      const def = TYPES[b.type];
      const inputs = {};
      def.inputs.forEach(inp => {
        // b의 input port에 매핑된 signal pair를 갖는 connection 찾기
        for (const c of conns) {
          if (c.to.blockId !== b.id) continue;
          const sig = (c.signals || []).find(s => s.toPort === inp.key);
          if (!sig) continue;
          const src = prevBlocks.find(bb => bb.id === c.from.blockId);
          if (src?.outputs?.[sig.fromPort] !== undefined) {
            inputs[inp.key] = src.outputs[sig.fromPort];
          }
          break;
        }
      });
      const newState = b.state ? { ...b.state } : {};
      const outputs = def.compute(inputs, b.params, t, newState, dt);
      return { ...b, outputs, state: newState, lastInputs: inputs };
    });
  };

  // 스냅샷 생성: 현재 모든 블록 outputs을 {t, Block.key: value} 딕셔너리로
  const makeSnapshot = (blocksList, t) => {
    const snapshot = { t };
    blocksList.forEach(b => {
      Object.entries(b.outputs || {}).forEach(([k, v]) => {
        snapshot[`${b.name}.${k}`] = typeof v === 'number' ? Number(v.toFixed(4)) : v;
      });
    });
    return snapshot;
  };

  // t=0 초기값 평가: 2회 반복 (연결된 신호가 첫 pass에서는 undefined → default fallback,
  // 2회째에 전파된 값 사용). 그 결과를 history[0]에 기록.
  const initSim = () => {
    const conns = connectionsRef.current;
    const b0 = blocks;
    // pass 1: 초기 evaluation
    let evaluated = evaluateBlocks(b0, conns, 0, simState.dt);
    // pass 2: 전파 (source → math → display 순으로 값이 전달되도록)
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: [...s.log, `◦ Initialized @ t=0.0s`],
    }));
  };

  const stepSimulation = useCallback(() => {
    setBlocks(prevBlocks => {
      const conns = connectionsRef.current;
      return evaluateBlocks(prevBlocks, conns, simRef.current.t, simRef.current.dt);
    });

    setSimState(s => {
      const t_new = s.t + s.dt;
      const snapshot = makeSnapshot(blocksRef.current, t_new);
      return { ...s, t: t_new, history: [...s.history, snapshot], running: t_new < s.t_final && s.running };
    });
  }, []);

  const connectionsRef = useRef(connections);
  connectionsRef.current = connections;
  const blocksRef = useRef(blocks);
  blocksRef.current = blocks;

  useEffect(() => {
    if (!simState.running) return;
    const id = setInterval(stepSimulation, 50);
    return () => clearInterval(id);
  }, [simState.running, stepSimulation]);

  // 키보드 단축키: Delete/Backspace 삭제, Esc 선택 해제, Ctrl+C/X/V 클립보드, Ctrl+Z/Y undo/redo, Ctrl+A 전체 선택
  useEffect(() => {
    const onKey = (e) => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      const ctrlOrCmd = e.ctrlKey || e.metaKey;
      const hasBlockSel = selectedIds.length > 0;
      const hasConnSel = selectedConnIds.length > 0;
      const hasAnySel = hasBlockSel || hasConnSel;

      if (ctrlOrCmd) {
        const key = e.key.toLowerCase();
        if (key === 'a') {
          // 전체 선택
          setSelectedIds(blocks.map(b => b.id));
          setSelectedConnIds(connections.map((_, i) => i));
          e.preventDefault();
        } else if (key === 'c') {
          if (hasBlockSel) { doCopy(); e.preventDefault(); }
        } else if (key === 'x') {
          if (hasAnySel) { doCut(); e.preventDefault(); }
        } else if (key === 'v') {
          doPaste(); e.preventDefault();
        } else if (key === 'z') {
          if (e.shiftKey) { doRedo(); } else { doUndo(); }
          e.preventDefault();
        } else if (key === 'y') {
          doRedo(); e.preventDefault();
        }
        return;
      }

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (hasAnySel) {
          pushHistory(blocks, connections);
          const blockIdSet = new Set(selectedIds);
          const connIdxSet = new Set(selectedConnIds);
          setBlocks(bs => bs.filter(b => !blockIdSet.has(b.id)));
          setConnections(cs => cs.filter((c, i) => {
            if (connIdxSet.has(i)) return false;
            // 양 끝 중 하나라도 삭제된 블록이면 같이 제거
            return !blockIdSet.has(c.from.blockId) && !blockIdSet.has(c.to.blockId);
          }));
          setSelectedIds([]);
          setSelectedConnIds([]);
          e.preventDefault();
        }
      } else if (e.key === 'Escape') {
        setSelectedIds([]);
        setSelectedConnIds([]);
        setConnecting(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedIds, selectedConnIds, blocks, connections]);

  // 블록 파라미터나 연결이 바뀌면 t=0 값 자동 갱신 (시뮬레이션 중이 아닐 때만, 디바운스)
  // 이걸로 Display 블록이 실시간으로 현재 파라미터 기반 초기값을 보여줌
  useEffect(() => {
    if (simState.running) return;
    if (blocks.length === 0) return;
    const timer = setTimeout(() => {
      const conns = connectionsRef.current;
      // 2-pass 평가로 신호 전파
      let evaluated = evaluateBlocks(blocks, conns, 0, simState.dt);
      evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);
      // outputs/lastInputs만 업데이트 (x,y 위치 변경 방지)
      setBlocks(bs => bs.map(b => {
        const ev = evaluated.find(e => e.id === b.id);
        return ev ? { ...b, outputs: ev.outputs, lastInputs: ev.lastInputs } : b;
      }));
    }, 100);
    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [
    // 블록 파라미터 변화 감지 (outputs/x/y 제외)
    JSON.stringify(blocks.map(b => ({ id: b.id, type: b.type, name: b.name, params: b.params }))),
    connections,
    simState.running,
  ]);

  const runSim = () => {
    // history가 비어있으면(초기 로드 직후) t=0 스냅샷 먼저 기록
    if (simState.history.length === 0) {
      initSim();
    }
    setSimState(s => ({ ...s, running: true, log: [...s.log, `▶ Run @ t=${s.t.toFixed(1)}s`] }));
  };
  const stopSim = () => setSimState(s => ({ ...s, running: false, log: [...s.log, `■ Stop @ t=${s.t.toFixed(1)}s`] }));
  const resetSim = () => {
    // 블록 state는 초기화, dt/t_final은 유지
    const resetBlocks = blocks.map(b => {
      const def = TYPES[b.type];
      return { ...b, outputs: {}, state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {} };
    });
    // t=0에서 2-pass 평가 (source → math → display 전파)
    const conns = connectionsRef.current;
    let evaluated = evaluateBlocks(resetBlocks, conns, 0, simState.dt);
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      running: false,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: ['↺ Reset @ t=0.0s'],
    }));
  };

  // -------- Slot Save/Load (localStorage) --------
  const SLOT_INDEX_KEY = 'hpwd-studio-slots';
  const SLOT_PREFIX = 'hpwd-studio-slot-';

  const loadSlotIndex = () => {
    try {
      const raw = localStorage.getItem(SLOT_INDEX_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  };

  const saveSlotIndex = (slots) => {
    try { localStorage.setItem(SLOT_INDEX_KEY, JSON.stringify(slots)); } catch (err) {
      alert('슬롯 인덱스 저장 실패: ' + err.message);
    }
  };

  // 현재 프로젝트를 슬롯으로 저장 (새 슬롯 또는 덮어쓰기)
  const saveSlot = (name, existingId = null) => {
    const slots = loadSlotIndex();
    const now = Date.now();
    const id = existingId || `slot_${now}_${Math.random().toString(36).slice(2, 6)}`;
    const data = {
      id, name, savedAt: now,
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
      simState: { dt: simState.dt, t_final: simState.t_final },
    };
    try {
      localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
    } catch (err) {
      alert('슬롯 저장 실패 (용량 초과 가능성): ' + err.message);
      return false;
    }
    // 인덱스 업데이트 (덮어쓰기면 교체, 신규면 추가)
    const meta = {
      id, name, savedAt: now,
      blockCount: blocks.length,
      connectionCount: connections.length,
    };
    const updated = existingId
      ? slots.map(s => s.id === existingId ? meta : s)
      : [...slots, meta];
    saveSlotIndex(updated);
    return true;
  };

  const loadSlot = (id) => {
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (!raw) { alert('슬롯 데이터를 찾을 수 없습니다'); return false; }
      const data = JSON.parse(raw);
      setBlocks(data.blocks || []);
      setConnections(data.connections || []);
      if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      setSelectedIds([]);
      setSelectedConnIds([]);
      return true;
    } catch (err) {
      alert('슬롯 로드 실패: ' + err.message);
      return false;
    }
  };

  const deleteSlot = (id) => {
    localStorage.removeItem(SLOT_PREFIX + id);
    saveSlotIndex(loadSlotIndex().filter(s => s.id !== id));
  };

  const renameSlot = (id, newName) => {
    const slots = loadSlotIndex();
    const slot = slots.find(s => s.id === id);
    if (!slot) return;
    slot.name = newName;
    saveSlotIndex(slots);
    // 슬롯 데이터 자체에도 이름 반영
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (raw) {
        const data = JSON.parse(raw);
        data.name = newName;
        localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
      }
    } catch { /* ignore */ }
  };

  // 모달 열 때 슬롯 목록 갱신
  const openSlotModal = (mode) => {
    setSlotList(loadSlotIndex());
    setSlotModal(mode);
  };

  const refreshSlotList = () => setSlotList(loadSlotIndex());

  // -------- JSON File Export/Import (기존 기능, 백업 용도) --------
  const exportProjectFile = () => {
    const data = { blocks, connections, simState: { dt: simState.dt, t_final: simState.t_final } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hpwd_project_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importProjectFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        setBlocks(data.blocks || []);
        setConnections(data.connections || []);
        if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      } catch (err) { alert('Failed to load: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = ''; // 같은 파일 재선택 가능하게
  };

  // -------- CSV Export --------
  // CSV 필드 이스케이프: 쉼표/따옴표/개행 포함 시 따옴표로 감싸고 내부 따옴표는 중복
  const csvEscape = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };

  // 공통 다운로드 함수 (UTF-8 BOM 추가 → Excel에서 한글/숫자 정상 인식)
  const downloadCsv = (filename, rows) => {
    if (!rows || rows.length === 0) {
      alert('내보낼 데이터가 없습니다. 먼저 시뮬레이션을 실행하세요.');
      return;
    }
    const csv = '\ufeff' + rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // 전역 CSV: 모든 블록 출력 시계열
  const exportAllCsv = () => {
    if (simState.history.length === 0) {
      alert('내보낼 데이터가 없습니다. 먼저 시뮬레이션을 실행하세요.');
      return;
    }
    // 모든 키 수집 (t는 제일 앞)
    const keySet = new Set();
    simState.history.forEach(row => Object.keys(row).forEach(k => keySet.add(k)));
    keySet.delete('t');
    const keys = ['t', ...Array.from(keySet).sort()];
    const rows = [keys];
    simState.history.forEach(row => {
      rows.push(keys.map(k => row[k] ?? ''));
    });
    downloadCsv(`hpwd_all_${Date.now()}.csv`, rows);
  };

  // 개별 Plotter CSV: 해당 플로터에 연결된 신호만
  const exportPlotterCsv = (plotterBlock) => {
    if (simState.history.length === 0) {
      alert('내보낼 데이터가 없습니다. 먼저 시뮬레이션을 실행하세요.');
      return;
    }
    const conns = connections.filter(c => c.to.blockId === plotterBlock.id);
    const signals = conns.flatMap(c => {
      const src = blocks.find(b => b.id === c.from.blockId);
      if (!src) return [];
      return (c.signals || []).map(sig => ({
        key: `${src.name}.${sig.fromPort}`,
        port: sig.toPort,
      }));
    });

    if (signals.length === 0) {
      alert(`${plotterBlock.name}에 연결된 신호가 없습니다.`);
      return;
    }

    // 헤더: t, y1(SrcName.out), y2(...), ...
    const headers = ['t', ...signals.map(s => `${s.port}(${s.key})`)];
    const rows = [headers];
    simState.history.forEach(row => {
      rows.push([row.t, ...signals.map(s => row[s.key] ?? '')]);
    });
    downloadCsv(`${plotterBlock.name}_${Date.now()}.csv`, rows);
  };

  /* 블록의 connector(좌측 in / 우측 out) 위치 — 블록 가운데 높이.
   * 라인은 모듈 단위로 잇는다. */
  const getBlockHeight = (block) => {
    const def = TYPES[block.type];
    const numIO = Math.max(def.inputs.length, def.outputs.length);
    const baseMin = block.type === 'display' ? 70 : 80;
    return Math.max(baseMin, 45 + numIO * 20 + 10);
  };
  const getBlockConnectorPos = (block, direction) => {
    if (!block) return null;
    const h = getBlockHeight(block);
    // connector 원의 실제 절대 위치 = block.y + 24(header) + (h-24)/2 = block.y + h/2 + 12
    return {
      x: direction === 'in' ? block.x : block.x + 180,
      y: block.y + h / 2 + 12,
    };
  };

  const selectedBlock = blocks.find(b => b.id === selected);
  const selectedDef = selectedBlock ? TYPES[selectedBlock.type] : null;

  const plotterData = blocks.filter(b => b.type === 'plotter').map(pb => {
    const series = connections.filter(c => c.to.blockId === pb.id).flatMap(c => {
      const src = blocks.find(b => b.id === c.from.blockId);
      if (!src) return [];
      return (c.signals || []).map(sig => `${src.name}.${sig.fromPort}`);
    });
    return { id: pb.id, name: pb.name, series };
  });

  return (
    <div className="h-screen w-full flex flex-col bg-white text-slate-800 text-xs overflow-hidden"
         style={{ fontFamily: "'Inter', 'Pretendard', -apple-system, sans-serif" }}>

      {/* Menubar */}
      <div className="h-9 bg-white border-b border-slate-200 flex items-center px-4 gap-4 text-[11px] shrink-0">
        <div className="font-bold text-slate-900 tracking-wide flex items-center gap-1.5">
          <div className="w-2 h-2 rounded-sm bg-cyan-600"></div>
          HPWD Studio
        </div>
        <div className="text-slate-400 text-[10px]">v0.1.0 · prototype</div>
        <div className="flex-1"></div>
        <div className="text-slate-500 text-[11px] font-mono">
          t = <span className="text-slate-900 font-semibold">{simState.t.toFixed(1)}s</span>
          <span className="mx-1 text-slate-300">/</span>
          <span className="text-slate-400">{simState.t_final}s</span>
        </div>
        <div className={`px-2 py-0.5 rounded-full text-[10px] font-medium border ${
          simState.running ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-500 border-slate-200'
        }`}>
          {simState.running ? '● Running' : '○ Idle'}
        </div>
      </div>

      {/* Toolbar */}
      <div className="h-11 bg-slate-50 border-b border-slate-200 flex items-center px-3 gap-1 shrink-0">
        <ToolBtn onClick={() => openSlotModal('save')} icon={Save} label="Save" title="프로젝트를 슬롯에 저장" />
        <ToolBtn onClick={() => openSlotModal('load')} icon={FolderOpen} label="Load" title="슬롯에서 프로젝트 불러오기" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={doUndo} icon={Undo} label="Undo" disabled={undoStack.length === 0}
                 title="Ctrl+Z" />
        <ToolBtn onClick={doRedo} icon={Redo} label="Redo" disabled={redoStack.length === 0}
                 title="Ctrl+Y" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={runSim} icon={Play} label="Run" disabled={simState.running} color="text-emerald-600 hover:bg-emerald-50" />
        <ToolBtn onClick={stopSim} icon={Square} label="Stop" disabled={!simState.running} color="text-red-600 hover:bg-red-50" />
        <ToolBtn onClick={resetSim} icon={RotateCcw} label="Reset" color="text-amber-600 hover:bg-amber-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={exportAllCsv} icon={Download} label="Export CSV"
                 disabled={simState.history.length === 0}
                 color="text-sky-600 hover:bg-sky-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <div className="flex items-center gap-2 text-[11px] text-slate-600">
          <label className="text-slate-500">dt</label>
          <input type="number" value={simState.dt} step={0.1} min={0.1}
                 onChange={e => setSimState(s => ({ ...s, dt: parseFloat(e.target.value) || 1 }))}
                 className="w-14 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
          <label className="text-slate-500 ml-2">t_final</label>
          <input type="number" value={simState.t_final} step={10}
                 onChange={e => setSimState(s => ({ ...s, t_final: parseFloat(e.target.value) || 600 }))}
                 className="w-16 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
        </div>
        <div className="flex-1" />
        <div className="text-[11px] text-slate-500 font-mono">
          blocks <span className="text-slate-900 font-semibold">{blocks.length}</span>
          <span className="mx-1.5 text-slate-300">·</span>
          conns <span className="text-slate-900 font-semibold">{connections.length}</span>
        </div>
      </div>

      {/* Main 3-panel */}
      <div className="flex-1 flex overflow-hidden">

        {/* Left: Type Library */}
        <div className="w-56 bg-white border-r border-slate-200 overflow-y-auto shrink-0">
          <div className="px-3 py-2.5 text-[10px] font-semibold uppercase tracking-widest text-slate-500 border-b border-slate-100 bg-slate-50">
            Type Library
          </div>
          {Object.entries(
            Object.entries(TYPES).reduce((acc, [k, v]) => { (acc[v.category] ||= []).push([k, v]); return acc; }, {})
          ).map(([cat, items]) => {
            const catStyle = CATEGORY_STYLES[cat];
            return (
              <div key={cat}>
                <button
                  className="w-full flex items-center gap-1.5 px-2.5 py-1.5 text-[10px] uppercase tracking-wider text-slate-600 hover:bg-slate-50 transition-colors"
                  onClick={() => setExpandedCats(ec => ({ ...ec, [cat]: !ec[cat] }))}
                >
                  {expandedCats[cat] ? <ChevronDown size={10} /> : <ChevronRight size={10} />}
                  <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold ${catStyle.bg} ${catStyle.text} ${catStyle.border} border`}>
                    {catStyle.badge}
                  </span>
                  <span className="text-slate-700">{cat}</span>
                </button>
                {expandedCats[cat] && items.map(([key, def]) => {
                  const Icon = def.icon;
                  return (
                    <div
                      key={key}
                      draggable
                      onDragStart={(e) => handleLibraryDragStart(e, key)}
                      className="flex items-center gap-2 px-3 py-1.5 mx-1.5 my-0.5 rounded cursor-grab hover:bg-slate-50 border border-transparent hover:border-slate-200 active:cursor-grabbing transition-colors"
                      title={def.desc}
                    >
                      <div className="w-7 h-7 rounded flex items-center justify-center overflow-hidden shrink-0" style={{ background: def.image ? '#fff' : def.color + '15', border: def.image ? '1px solid #e2e8f0' : 'none' }}>
                        {def.image
                          ? <img src={def.image} alt={def.name} style={{ width: '100%', height: '100%', objectFit: 'contain' }} />
                          : <Icon size={12} style={{ color: def.color }} />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[11px] text-slate-800 truncate">{def.name}</div>
                        <div className="text-[9px] text-slate-400 font-mono">Type {def.typeNo}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
          <div className="px-3 py-4 text-[10px] text-slate-400 border-t border-slate-100 mt-2 leading-relaxed">
            드래그하여 캔버스에 배치하세요
          </div>

          {/* Line Types — 연결선 종류 시각 가이드 */}
          <div className="border-t border-slate-100 bg-slate-50/40">
            <div className="px-3 py-2 text-[10px] font-semibold uppercase tracking-widest text-slate-500">
              Line Types
            </div>
            <div className="px-2 pb-3 space-y-1">
              {Object.entries(LINE_KINDS).map(([k, def]) => (
                <div
                  key={k}
                  className="flex items-center gap-2 px-2 py-1.5 text-[10.5px] rounded border border-transparent hover:border-slate-200 hover:bg-white transition-colors"
                  title={def.desc}
                >
                  <span className="inline-block shrink-0" style={{
                    width: 22, height: 0,
                    borderTop: `${def.width}px ${def.dasharray ? 'dashed' : 'solid'} ${def.color}`,
                  }}></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-slate-700 truncate text-[10.5px]">{def.name}</div>
                    <div className="text-[9px] text-slate-400 font-mono">{def.short} · {def.fields.length} params</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="px-3 pb-3 text-[9.5px] text-slate-400 leading-relaxed">
              포트 연결 시 종류 자동 감지 ·<br/>연결선 클릭하여 변경
            </div>
          </div>
        </div>

        {/* Center: Canvas + Bottom plot */}
        <div className="flex-1 flex flex-col overflow-hidden">
          <div
            ref={canvasRef}
            className="flex-1 relative bg-slate-50 overflow-auto"
            style={{
              backgroundImage: 'radial-gradient(circle, #cbd5e1 1px, transparent 1px)',
              backgroundSize: '20px 20px',
            }}
            onDragOver={handleCanvasDragOver}
            onDrop={handleCanvasDrop}
            onMouseDown={(e) => {
              // 캔버스 div 또는 투명 SVG에서만 박스 드래그 시작 (블록/연결선 위는 제외)
              // 블록, 포트, 연결선 path/circle/rect 들은 각자 stopPropagation 처리됨
              // 여기 도달한다는 건 진짜 빈 공간이라는 뜻
              if (e.button !== 0) return; // 왼쪽 버튼만
              const rect = canvasRef.current.getBoundingClientRect();
              const x = e.clientX - rect.left;
              const y = e.clientY - rect.top;
              if (!(e.shiftKey || e.ctrlKey || e.metaKey)) {
                setSelectedIds([]);
                setSelectedConnIds([]);
              }
              setConnecting(null);
              setSelectionBox({ startX: x, startY: y, curX: x, curY: y });
            }}
            onMouseMove={handleCanvasMouseMove}
            onMouseUp={handleCanvasMouseUp}
          >
            <svg className="absolute inset-0 pointer-events-none" width="100%" height="100%">
              {/* 블록 높이를 미리 계산 (연결선 충돌 감지용 장애물 rect) */}
              {(() => { return null; })()}
              {connections.map((c, i) => {
                const fromBlock = blocks.find(b => b.id === c.from.blockId);
                const toBlock = blocks.find(b => b.id === c.to.blockId);
                if (!fromBlock || !toBlock) return null;
                const fromPos = getBlockConnectorPos(fromBlock, 'out');
                const toPos = getBlockConnectorPos(toBlock, 'in');
                if (!fromPos || !toPos) return null;

                // 장애물: 자기 자신의 source/target을 제외한 다른 블록들
                const obstacles = blocks
                  .filter(b => b.id !== fromBlock.id && b.id !== toBlock.id)
                  .map(b => {
                    const def = TYPES[b.type];
                    const maxPorts = Math.max(def.inputs.length, def.outputs.length);
                    const baseMin = b.type === 'display' ? 70 : 80;
                    const h = Math.max(baseMin, 45 + maxPorts * 20 + 10);
                    return { x: b.x, y: b.y, w: 180, h };
                  });

                const path = getOrthogonalPath(fromPos, toPos, {
                  midOffsetX: c.midOffsetX ?? 0,
                  midOffsetY: c.midOffsetY ?? 0,
                  outOffsetX: c.outOffsetX ?? 0,
                  inOffsetX: c.inOffsetX ?? 0,
                }, obstacles);
                const isHovered = hoveredConn === i;
                const isSelected = selectedConnIds.includes(i);
                const isDraggingThis = draggingConn?.idx === i;
                const highlight = isSelected || isHovered || isDraggingThis;

                const firstHandle = path.handles[0] || { x: 0, y: 0 };

                return (
                  <g
                    key={i}
                    className="pointer-events-auto"
                    onMouseEnter={() => setHoveredConn(i)}
                    onMouseLeave={() => setHoveredConn(h => h === i ? null : h)}
                  >
                    {/* 가시 라인 — kind에 따라 layered design */}
                    {(() => {
                      const lk = LINE_KINDS[c.kind || 'refrigerant'] || LINE_KINDS.refrigerant;
                      const overlay = isSelected ? '#0284c7' : (highlight ? '#0891b2' : null);

                      if ((c.kind || 'refrigerant') === 'refrigerant') {
                        // 구리 동관: 외곽 그림자 + 짙은 구리 + 메인 구리 + 광택 highlight
                        return (
                          <g>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={12} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                            )}
                            {/* 외곽 그림자 (어두운 갈색) */}
                            <path d={path.d} stroke="#3a1c0a" strokeWidth={8} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            {/* 짙은 구리 */}
                            <path d={path.d} stroke="#7c3a14" strokeWidth={6.4} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            {/* 메인 구리 */}
                            <path d={path.d} stroke="#b87333" strokeWidth={5} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                            {/* 밝은 구리 사이드 */}
                            <path d={path.d} stroke="#d49a5b" strokeWidth={2.6} fill="none" strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.6)"/>
                            {/* 광택 highlight */}
                            <path d={path.d} stroke="#fde68a" strokeWidth={1.1} fill="none" opacity={0.9} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-1.5)"/>
                          </g>
                        );
                      }
                      if (c.kind === 'air') {
                        // 덕트: 두꺼운 외곽 + 회색 body + 중심선 점선
                        return (
                          <g>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={15} fill="none" strokeLinejoin="round" strokeLinecap="butt" opacity={0.35}/>
                            )}
                            <path d={path.d} stroke="#1f2937" strokeWidth={11} fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                            <path d={path.d} stroke="#cbd5e1" strokeWidth={9} fill="none" strokeLinejoin="round" strokeLinecap="butt" className="transition-colors"/>
                            <path d={path.d} stroke="#475569" strokeWidth={1} strokeDasharray="5 4" fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                          </g>
                        );
                      }
                      // water (rubber hose)
                      return (
                        <g>
                          {overlay && (
                            <path d={path.d} stroke={overlay} strokeWidth={10} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                          )}
                          <path d={path.d} stroke="#1e3a8a" strokeWidth={6} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                          <path d={path.d} stroke="#3b82f6" strokeWidth={4} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                          <path d={path.d} stroke="#bfdbfe" strokeWidth={1} fill="none" opacity={0.7} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.8)"/>
                        </g>
                      );
                    })()}
                    {/* 전체 라인 히트 영역 (클릭 시 연결선 선택) */}
                    <path
                      d={path.d}
                      stroke="transparent"
                      strokeWidth="12"
                      fill="none"
                      className="cursor-pointer"
                      onClick={(e) => {
                        e.stopPropagation();
                        if (e.shiftKey || e.ctrlKey || e.metaKey) {
                          setSelectedConnIds(prev => prev.includes(i)
                            ? prev.filter(idx => idx !== i)
                            : [...prev, i]);
                        } else {
                          setSelectedConnIds([i]);
                          setSelectedIds([]);
                        }
                      }}
                    />

                    {/* 각 세그먼트 편집 핸들 */}
                    {path.handles.map(h => {
                      const isVerticalSeg = h.axis === 'x';
                      const segLength = h.segMax - h.segMin;
                      if (segLength < 4) return null;
                      const isBeingDragged = isDraggingThis && draggingConn?.segment === h.segment;
                      const showActive = isBeingDragged || highlight;
                      const cursor = isVerticalSeg ? 'cursor-ew-resize' : 'cursor-ns-resize';

                      const startDragSeg = (e) => {
                        e.stopPropagation();
                        const rect = canvasRef.current.getBoundingClientRect();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setSelectedConn(i);
                        setSelected(null);
                        setDraggingConn({
                          idx: i,
                          segment: h.segment,
                          startMouseX: e.clientX - rect.left,
                          startMouseY: e.clientY - rect.top,
                          startOffset: c[offsetKey] ?? 0,
                        });
                      };

                      const resetSeg = (e) => {
                        e.stopPropagation();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setConnections(cs => cs.map((cc, idx) => idx === i ? { ...cc, [offsetKey]: 0 } : cc));
                      };

                      return (
                        <g key={h.segment}>
                          {/* 세그먼트 히트 영역 (길쭉한 투명 rect) */}
                          <rect
                            x={isVerticalSeg ? h.x - 5 : h.segMin}
                            y={isVerticalSeg ? h.segMin : h.y - 5}
                            width={isVerticalSeg ? 10 : segLength}
                            height={isVerticalSeg ? segLength : 10}
                            fill="transparent"
                            className={cursor}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          />
                          {/* 시각 핸들 */}
                          <circle
                            cx={h.x}
                            cy={h.y}
                            r={showActive ? 5 : 3}
                            fill="white"
                            stroke={showActive ? '#0891b2' : '#94a3b8'}
                            strokeWidth={2}
                            className={`${cursor} transition-all`}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          >
                            <title>{`드래그: ${isVerticalSeg ? '좌우' : '상하'} 이동 · 더블클릭: 리셋`}</title>
                          </circle>
                        </g>
                      );
                    })}

                    {/* 삭제 버튼 (선택 시에만 persistent 표시) */}
                    {isSelected && (
                      <g
                        className="cursor-pointer"
                        onClick={(e) => {
                          e.stopPropagation();
                          setConnections(cs => cs.filter((_, idx) => idx !== i));
                          setSelectedConn(null);
                        }}
                      >
                        {/* 넓은 히트 영역 */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={12} fill="transparent" />
                        {/* 실제 버튼 */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={9} fill="#ef4444" stroke="white" strokeWidth={2} />
                        <text x={firstHandle.x + 18} y={firstHandle.y + 4} textAnchor="middle" fill="white" fontSize="13" fontWeight="bold" style={{ userSelect: 'none', pointerEvents: 'none' }}>×</text>
                      </g>
                    )}
                  </g>
                );
              })}
              {/* 연결 진행 중 점선 (마우스 따라다님) */}
              {connecting && (() => {
                const block = blocks.find(b => b.id === connecting.blockId);
                if (!block) return null;
                const pos = getBlockConnectorPos(block, connecting.direction);
                if (!pos) return null;
                const target = { x: mousePos.x, y: mousePos.y };
                const path = connecting.direction === 'out'
                  ? getOrthogonalPath(pos, target)
                  : getOrthogonalPath(target, pos);
                return (
                  <path d={path.d} stroke="#0891b2" strokeWidth="1.75" strokeDasharray="4 4" fill="none" />
                );
              })()}
              {/* 박스 선택 사각형 */}
              {selectionBox && (() => {
                const x = Math.min(selectionBox.startX, selectionBox.curX);
                const y = Math.min(selectionBox.startY, selectionBox.curY);
                const w = Math.abs(selectionBox.curX - selectionBox.startX);
                const h = Math.abs(selectionBox.curY - selectionBox.startY);
                return (
                  <rect
                    x={x} y={y} width={w} height={h}
                    fill="#0891b2" fillOpacity="0.08"
                    stroke="#0891b2" strokeWidth="1" strokeDasharray="4 2"
                  />
                );
              })()}
            </svg>

            {blocks.map(block => {
              const def = TYPES[block.type];
              const Icon = def.icon;
              const isSel = selectedIds.includes(block.id);
              const maxPorts = Math.max(def.inputs.length, def.outputs.length);
              const baseMin = block.type === 'display' ? 70 : 80;
              const height = Math.max(baseMin, 45 + maxPorts * 20 + 10);
              return (
                <div
                  key={block.id}
                  ref={(el) => { if (el) blockRefsMap.current[block.id] = el; }}
                  className={`absolute rounded-md bg-white shadow-sm ${isSel ? 'ring-2 ring-cyan-500 ring-offset-1 shadow-md' : 'hover:shadow-md'}`}
                  style={{
                    left: block.x, top: block.y, width: 180, height,
                    border: `1px solid ${isSel ? def.color : '#e2e8f0'}`,
                    willChange: 'transform',
                  }}
                  onMouseDown={(e) => handleBlockMouseDown(e, block.id)}
                >
                  <div className="h-6 px-2 flex items-center gap-1.5 border-b rounded-t-md"
                       style={{ borderColor: def.color + '30', background: def.color + '0d' }}>
                    <Icon size={11} style={{ color: def.color }} />
                    <span className="text-[10px] font-semibold text-slate-800 flex-1 truncate">{block.name}</span>
                    <span className="text-[9px] text-slate-400 font-mono">T{def.typeNo}</span>
                  </div>
                  <div className="relative" style={{ height: height - 24 }}>
                    {/* Display 블록: 현재 값을 크게 표시 */}
                    {block.type === 'display' && (() => {
                      const val = block.lastInputs?.x;
                      const digits = block.params.digits ?? 3;
                      const label = block.params.label;
                      const text = val === undefined
                        ? '—'
                        : (typeof val === 'number' ? val.toFixed(digits) : String(val));
                      return (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2">
                          {label && <div className="text-[9px] text-slate-500 mb-0.5 truncate w-full text-center">{label}</div>}
                          <div className="text-lg font-bold text-violet-700 font-mono tabular-nums">{text}</div>
                        </div>
                      );
                    })()}
                    {def.inputs.map((p, i) => null)}
                    {def.outputs.map((p, i) => null)}

                    {/* Block 내부: input/output 시그널 list (read-only). display는 위에서 큰 값 표시. */}
                    {block.type !== 'display' && (
                      <div className="absolute inset-0 px-2 pt-1.5 pb-1.5 flex flex-col pointer-events-none overflow-hidden">
                        {def.inputs.length > 0 && (
                          <div className="space-y-0.5">
                            {def.inputs.slice(0, 5).map(p => (
                              <div key={p.key} className="text-[9px] font-mono text-slate-500 truncate flex items-center gap-1" title={`${p.label} [${p.unit||''}]`}>
                                <span className="text-cyan-600">◀</span>
                                <span className="truncate">{p.label}</span>
                              </div>
                            ))}
                            {def.inputs.length > 5 && (
                              <div className="text-[8.5px] font-mono text-slate-400">+{def.inputs.length - 5}</div>
                            )}
                          </div>
                        )}
                        <div className="flex-1"/>
                        {def.outputs.length > 0 && (
                          <div className="space-y-0.5 text-right">
                            {def.outputs.slice(0, 5).map(p => (
                              <div key={p.key} className="text-[9px] font-mono truncate" title={`${p.label} [${p.unit||''}]`}>
                                <span className="text-slate-500 truncate">{p.label}</span>
                                <span className="text-amber-600 ml-1">▶</span>
                                {block.outputs[p.key] !== undefined && (
                                  <span className="ml-1 text-amber-700 font-semibold">
                                    {typeof block.outputs[p.key] === 'number' ? block.outputs[p.key].toFixed(1) : ''}
                                  </span>
                                )}
                              </div>
                            ))}
                            {def.outputs.length > 5 && (
                              <div className="text-[8.5px] font-mono text-slate-400">+{def.outputs.length - 5}</div>
                            )}
                          </div>
                        )}
                      </div>
                    )}

                    {/* 좌측 단일 input connector (블록 정중앙 높이) */}
                    {def.inputs.length > 0 && (() => {
                      const isActive = connecting && connecting.blockId === block.id && connecting.direction === 'in';
                      return (
                        <div
                          data-port="in"
                          onMouseDown={(e) => e.stopPropagation()}
                          onClick={(e) => handleBlockConnectorClick(e, block.id, 'in')}
                          className={`absolute flex items-center justify-center cursor-crosshair rounded-full transition-colors ${
                            isActive ? 'bg-cyan-100' : 'hover:bg-cyan-50'
                          }`}
                          style={{
                            left: -10,
                            top: (height - 24) / 2 - 10,
                            width: 20,
                            height: 20,
                          }}
                          title={`${block.name} ← in (${def.inputs.length} signals · auto-mapped)`}
                        >
                          <div
                            className={`w-3.5 h-3.5 rounded-full border-2 bg-white shrink-0 pointer-events-none transition-colors ${
                              isActive ? 'border-cyan-600' : 'border-slate-500'
                            }`}
                            style={isActive ? { backgroundColor: '#06b6d4' } : {}}
                          />
                        </div>
                      );
                    })()}

                    {/* 우측 단일 output connector */}
                    {def.outputs.length > 0 && (() => {
                      const isActive = connecting && connecting.blockId === block.id && connecting.direction === 'out';
                      return (
                        <div
                          data-port="out"
                          onMouseDown={(e) => e.stopPropagation()}
                          onClick={(e) => handleBlockConnectorClick(e, block.id, 'out')}
                          className={`absolute flex items-center justify-center cursor-crosshair rounded-full transition-colors ${
                            isActive ? 'bg-amber-100' : 'hover:bg-amber-50'
                          }`}
                          style={{
                            right: -10,
                            top: (height - 24) / 2 - 10,
                            width: 20,
                            height: 20,
                          }}
                          title={`${block.name} → out (${def.outputs.length} signals · auto-mapped)`}
                        >
                          <div
                            className={`w-3.5 h-3.5 rounded-full border-2 bg-white shrink-0 pointer-events-none transition-colors ${
                              isActive ? 'border-amber-600' : 'border-slate-500'
                            }`}
                            style={isActive ? { backgroundColor: '#f59e0b' } : {}}
                          />
                        </div>
                      );
                    })()}
                  </div>
                </div>
              );
            })}

            {blocks.length === 0 && (
              <div className="absolute inset-0 flex items-center justify-center text-slate-400 pointer-events-none">
                <div className="text-center">
                  <div className="text-3xl mb-3 text-slate-300">◇</div>
                  <div className="text-sm text-slate-500">좌측 Type Library에서 컴포넌트를 드래그하세요</div>
                  <div className="text-[11px] mt-1 text-slate-400">Ambient → Fan → Drum → Plotter 순으로 연결해보세요</div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom: Plot + Log */}
          <div className="h-52 bg-white border-t border-slate-200 flex shrink-0">
            <div className="flex-1 p-3 overflow-hidden">
              <div className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Output Plot</div>
              {plotterData.length === 0 ? (
                <div className="h-full flex items-center justify-center text-slate-400 text-[11px]">
                  Plotter 블록을 추가하고 신호를 연결하세요
                </div>
              ) : (
                <ResponsiveContainer width="100%" height="88%">
                  <LineChart data={simState.history}>
                    <CartesianGrid strokeDasharray="2 2" stroke="#e2e8f0" />
                    <XAxis dataKey="t" stroke="#94a3b8" tick={{ fontSize: 10 }} label={{ value: 'time [s]', position: 'insideBottomRight', offset: -5, style: { fill: '#94a3b8', fontSize: 10 } }} />
                    <YAxis stroke="#94a3b8" tick={{ fontSize: 10 }} />
                    <Tooltip contentStyle={{ background: 'white', border: '1px solid #e2e8f0', fontSize: 11, borderRadius: 4 }} />
                    <Legend wrapperStyle={{ fontSize: 10 }} />

                        <div className="flex border border-slate-300 rounded overflow-hidden">
                          <button
                            onClick={() => updateConn({ routeMode: 'auto', waypoints: [] })}
                            className={`text-[10px] font-mono px-2 py-0.5 transition-colors ${
                              (conn.routeMode || 'auto') === 'auto'
                                ? 'bg-cyan-600 text-white'
                                : 'bg-white text-slate-600 hover:bg-slate-50'
                            }`}
                            title="블록 따라 자동 라우팅 (블록 이동 시 같이 따라옴)"
                          >AUTO</button>
                          <button
                            onClick={() => {
                              // 현재 자동 elbow 모양을 그대로 manual로 commit
                              const fromBlk = blocks.find(b => b.id === conn.from.blockId);
                              const toBlk = blocks.find(b => b.id === conn.to.blockId);
                              if (!fromBlk || !toBlk) return;
                              const fp = getBlockSlotPos(fromBlk, conn.from.side || 'right', conn.from.slot);
                              const tp = getBlockSlotPos(toBlk, conn.to.side || 'left', conn.to.slot);
                              const obs = blocks.map(b => ({
                                x: b.x, y: b.y, w: getBlockWidth(b), h: getBlockHeight(b),
                                ownEndpoint: b.id === conn.from.blockId || b.id === conn.to.blockId,
                              }));
                              const pts = buildAvoidingRoute(fp, conn.from.side || 'right', tp, conn.to.side || 'left', 24, obs);
                              const wps = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                              updateConn({ routeMode: 'manual', waypoints: wps });
                            }}
                            className={`text-[10px] font-mono px-2 py-0.5 transition-colors ${
                              conn.routeMode === 'manual'
                                ? 'bg-cyan-600 text-white'
                                : 'bg-white text-slate-600 hover:bg-slate-50'
                            }`}
                            title="현재 모양을 고정 (블록 이동해도 corner 위치 유지)"
                          >MANUAL</button>
                        </div>
                      </div>
                      {(conn.routeMode || 'auto') === 'manual' && (conn.waypoints || []).length > 0 && (
                        <div className="text-[9px] text-slate-400 leading-snug">
                          🟡 {conn.waypoints.length} corner 고정 · AUTO 클릭하면 자동 라우팅으로 복귀
                        </div>
                      )}
                      {/* 곡률 */}
                      <div className="flex items-center gap-2">
                        <span className="text-[10.5px] text-slate-600 w-16 shrink-0">곡률 R</span>
                        <input
                          type="range"
                          min={0}
                          max={32}
                          step={1}
                          value={conn.cornerRadius ?? 8}
                          onChange={e => updateConn({ cornerRadius: parseInt(e.target.value, 10) })}
                          className="flex-1 accent-cyan-600"
                        />
                        <span className="text-[10px] font-mono text-slate-700 w-8 text-right">{conn.cornerRadius ?? 8}px</span>
                      </div>
                    </div>
                  </div>

                  {/* Line physical parameters */}
                  <div>
                    <div className="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5">
                      Line Parameters · 배관/덕트 사양
                    </div>
                    <div className="space-y-1.5">
                      {(lk.fields || []).map(f => {
                        const v = conn.lineParams?.[f.key] ?? f.value;
                        return (
                          <div key={f.key} className="grid grid-cols-[1fr_104px_30px] items-center gap-1.5">
                            <label className="text-[10.5px] text-slate-600">{f.label}</label>
                            {f.type === 'select' ? (
                              <select
                                value={v}
                                onChange={e => updateLineParam(f.key, e.target.value)}
                                className="text-[10.5px] font-mono bg-white border border-slate-300 rounded px-1.5 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500"
                              >
                                {f.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                              </select>
                            ) : (
                              <input
                                type="number"
                                step="any"
                                value={v}
                                onChange={e => updateLineParam(f.key, parseFloat(e.target.value))}
                                className="text-[10.5px] font-mono bg-white border border-slate-300 rounded px-1.5 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500"
                              />
                            )}
                            <span className="text-[9px] text-slate-400 font-mono text-right truncate">{f.unit || ''}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Delete */}
                  <div className="pt-2 border-t border-slate-100">
                    <button
                      onClick={() => {
                        setConnections(cs => cs.filter((_, i) => i !== idx));
                        setSelectedConnIds([]);
                      }}
                      className="w-full px-2 py-1.5 text-[10.5px] text-red-600 border border-red-200 rounded hover:bg-red-50 transition-colors"
                    >
                      🗑 라인 삭제
                    </button>
                  </div>
                </div>
              );
            })()
          ) : selectedIds.length > 1 || selectedConnIds.length > 0 ? (
            <div className="p-3 space-y-2">
              <div className="text-[11px] text-sky-700 font-semibold">
                다중 선택됨
              </div>
              {selectedIds.length > 0 && (
                <div className="text-[10px] text-slate-600">
                  블록 <span className="font-semibold text-slate-900">{selectedIds.length}</span>개
                </div>
              )}
              {selectedConnIds.length > 0 && (
                <div className="text-[10px] text-slate-600">
                  연결선 <span className="font-semibold text-slate-900">{selectedConnIds.length}</span>개
                </div>
              )}
              {/* Auto-Connect: 두 블록만 선택된 상태에서만 노출 */}
              {selectedIds.length === 2 && selectedConnIds.length === 0 && (() => {
                const a = blocks.find(b => b.id === selectedIds[0]);
                const b = blocks.find(b => b.id === selectedIds[1]);
                if (!a || !b) return null;
                // 우선순위: 첫 번째 선택 → 두 번째 선택
                const fromBlock = a;
                const toBlock = b;
                const signals = autoMapSignals(fromBlock, toBlock);
                const reverseSignals = autoMapSignals(toBlock, fromBlock);
                const useReverse = reverseSignals.length > signals.length;
                const finalFrom = useReverse ? toBlock : fromBlock;
                const finalTo   = useReverse ? fromBlock : toBlock;
                const finalSignals = useReverse ? reverseSignals : signals;
                return (
                  <div className="pt-2 border-t border-slate-200 space-y-1.5">
                    <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Auto-Connect</div>
                    {finalSignals.length === 0 ? (
                      <div className="text-[10px] text-slate-400 italic">매칭되는 변수 없음</div>
                    ) : (
                      <>
                        <div className="text-[10px] text-slate-600">
                          <span className="font-semibold">{finalFrom.name || TYPES[finalFrom.type]?.name}</span>
                          {' → '}
                          <span className="font-semibold">{finalTo.name || TYPES[finalTo.type]?.name}</span>
                        </div>
                        <div className="text-[10px] text-slate-500 space-y-0.5 max-h-32 overflow-y-auto bg-slate-50 rounded p-1.5 font-mono">
                          {finalSignals.map((s, i) => {
                            const fromOut = TYPES[finalFrom.type]?.outputs?.find(o => o.key === s.fromPort);
                            const toIn = TYPES[finalTo.type]?.inputs?.find(o => o.key === s.toPort);
                            return (
                              <div key={i} className="flex items-center gap-1">
                                <span className="text-slate-700">{fromOut?.label || s.fromPort}</span>
                                {fromOut?.unit && <span className="text-slate-400 text-[9px]">[{fromOut.unit}]</span>}
                                <span className="text-cyan-600">→</span>
                                <span className="text-slate-700">{toIn?.label || s.toPort}</span>
                                {toIn?.unit && <span className="text-slate-400 text-[9px]">[{toIn.unit}]</span>}
                              </div>
                            );
                          })}
                        </div>
                        <button
                          onClick={() => {
                            // 가장 가까운 두 면을 자동 결정 — fromBlock 우측, toBlock 좌측 default
                            const fromSide = 'right';
                            const toSide = 'left';
                            const fromSlot = findFreeSlot(connections, finalFrom.id, fromSide);
                            const toSlot   = findFreeSlot(connections, finalTo.id, toSide);
                            const kind = detectLineKind(finalFrom, finalTo);
                            pushHistory(blocks, connections);
                            setConnections(cs => [...cs, {
                              from: { blockId: finalFrom.id, side: fromSide, slot: fromSlot },
                              to:   { blockId: finalTo.id,   side: toSide,   slot: toSlot },
                              kind,
                              signals: finalSignals,
                              lineParams: defaultLineParams(kind),
                              cornerRadius: 8,
                              routeMode: 'auto',
                            }]);
                          }}
                          className="w-full px-2 py-1 bg-cyan-600 hover:bg-cyan-700 text-white rounded text-[11px] font-semibold transition-colors"
                        >
                          연결 ({finalSignals.length}개 변수)
                        </button>
                      </>
                    )}
                  </div>
                );
              })()}
              <div className="text-[10px] text-slate-400 italic pt-2 leading-relaxed">
                단축키:<br/>
                · Delete — 선택 항목 삭제<br/>
                · Ctrl+C / X — 복사 / 잘라내기<br/>
                · 드래그 — 선택된 블록 전체 이동<br/>
                · Esc — 선택 해제
              </div>
            </div>
          ) : !selectedBlock ? (
            <div className="p-4 text-slate-400 text-[11px] text-center leading-relaxed">
              블록을 선택하거나<br/>빈 캔버스에서 드래그해<br/>여러 항목 선택
            </div>
          ) : (
            <div className="p-3 space-y-4">
              <div>
                <div className="text-[10px] text-slate-500 mb-1 font-medium">Name</div>
                <input
                  value={selectedBlock.name}
                  onChange={(e) => updateBlockName(selectedBlock.id, e.target.value)}
                  className="w-full bg-white border border-slate-300 px-2 py-1 rounded text-[11px] text-slate-900 focus:outline-none focus:border-cyan-500"
                />
              </div>
              <div className="flex items-center gap-2">
                <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold ${CATEGORY_STYLES[selectedDef.category].bg} ${CATEGORY_STYLES[selectedDef.category].text} ${CATEGORY_STYLES[selectedDef.category].border} border`}>
                  {CATEGORY_STYLES[selectedDef.category].badge}
                </span>
                <span className="text-[10px] text-slate-500 font-mono">Type {selectedDef.typeNo}</span>
                <span className="text-[10px] text-slate-500">· {selectedDef.name}</span>
              </div>
              <div className="text-[10px] text-slate-500 italic leading-relaxed">{selectedDef.desc}</div>

              {/* ─── Fidelity Selector (통합 컴포넌트의 fidelity 변경) ─── */}
              {(() => {
                // 현재 노드가 어떤 메타 컴포넌트의 fidelity 변종인지 찾기
                const metaEntry = Object.entries(TYPES).find(([k, v]) =>
                  v.isMeta && v.fidelityKeys && Object.values(v.fidelityKeys).includes(selectedBlock.type)
                );
                if (!metaEntry) return null;
                const [metaKey, metaDef] = metaEntry;
                // 현재 fidelity (Off/Semi/On) 찾기
                const currentFidelity = Object.entries(metaDef.fidelityKeys)
                  .find(([f, k]) => k === selectedBlock.type)?.[0];
                const changeFidelity = (newFidelity) => {
                  if (newFidelity === currentFidelity) return;
                  const newTypeKey = metaDef.fidelityKeys[newFidelity];
                  if (!newTypeKey || !TYPES[newTypeKey]) return;
                  const newDef = TYPES[newTypeKey];
                  // 공통 param 유지, 신규 fidelity의 모든 param은 default
                  const commonKeys = metaDef.commonParamKeys || [];
                  const oldParams = selectedBlock.params || {};
                  const newParams = Object.fromEntries(newDef.parameters.map(p => [p.key, p.value]));
                  // 공통 키 덮어쓰기 (oldParams 값 우선)
                  commonKeys.forEach(k => {
                    if (k in oldParams && k in newParams) newParams[k] = oldParams[k];
                  });
                  pushHistory(blocks, connections);
                  setBlocks(bs => bs.map(b => b.id === selectedBlock.id
                    ? { ...b, type: newTypeKey, params: newParams }
                    : b));
                };
                return (
                  <div className="bg-cyan-50 border border-cyan-200 rounded p-2 space-y-1.5">
                    <div className="text-[10px] text-cyan-700 font-semibold uppercase tracking-wider">Fidelity</div>
                    <div className="flex gap-1">
                      {Object.keys(metaDef.fidelityKeys).map(fid => (
                        <button
                          key={fid}
                          onClick={() => changeFidelity(fid)}
                          className={`flex-1 px-2 py-1 rounded text-[11px] font-medium transition-colors ${
                            currentFidelity === fid
                              ? 'bg-cyan-600 text-white'
                              : 'bg-white text-cyan-700 border border-cyan-300 hover:bg-cyan-100'
                          }`}
                        >
                          {fid}
                        </button>
                      ))}
                    </div>
                    <div className="text-[9px] text-cyan-700 leading-tight">
                      변경 시 fluid 등 공통값은 유지, 나머지 params는 default로 리셋
                    </div>
                  </div>
                );
              })()}

              {/* Plotter 전용: 이 플로터의 신호만 CSV 내보내기 */}
              {selectedBlock.type === 'plotter' && (
                <button
                  onClick={() => exportPlotterCsv(selectedBlock)}
                  disabled={simState.history.length === 0}
                  className="w-full flex items-center justify-center gap-1.5 px-2 py-1.5 bg-sky-50 hover:bg-sky-100 border border-sky-200 rounded text-[11px] text-sky-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                >
                  <Download size={11} />
                  <span>이 Plotter 신호만 CSV로 내보내기</span>
                </button>
              )}

              {selectedDef.parameters.length > 0 && (() => {
                // 파라미터를 group별로 묶음. group 없으면 'Other' 또는 multiSelect는 'Outputs'로.
                const GROUP_ORDER = ['Material', 'Operating', 'Geometry', 'Fitting', 'Outputs', 'Other'];
                const GROUP_ICONS = {
                  Material:  '🧪',
                  Operating: '🌡️',
                  Geometry:  '📐',
                  Fitting:   '🎯',
                  Outputs:   '🎚️',
                  Other:     '⚙️',
                };
                const GROUP_DESC = {
                  Material:  '냉매·매질 선택',
                  Operating: '운영 환경',
                  Geometry:  '물리 치수 (변하지 않음)',
                  Fitting:   '실험 데이터 fitting params',
                  Outputs:   '출력 변수 선택',
                  Other:     '',
                };
                // 기본 펼침: Geometry만 펼침 (사용자 첫 보기에 적당). 나머진 접힘.
                const DEFAULT_OPEN = { Geometry: true };

                // group 분류 (hidden parameter 제외 — On-Design Studio 등에서 결정)
                const groups = {};
                selectedDef.parameters.forEach(p => {
                  if (p.hidden) return;  // hidden 파라미터는 sidebar에 표시 안 함 (값은 backend로 그대로 전달)
                  let g = p.group || 'Other';
                  if (p.multiSelect) g = 'Outputs';
                  if (!groups[g]) groups[g] = [];
                  groups[g].push(p);
                });

                return (
                  <div className="space-y-1.5">
                    {GROUP_ORDER.filter(g => groups[g]).map(g => {
                      const isOpen = openGroups[`${selectedBlock.id}:${g}`] ?? DEFAULT_OPEN[g] ?? false;
                      const toggleGroup = () => {
                        setOpenGroups(prev => ({ ...prev, [`${selectedBlock.id}:${g}`]: !isOpen }));
                      };
                      return (
                        <div key={g} className="border border-slate-200 rounded">
                          <button
                            onClick={toggleGroup}
                            className="w-full flex items-center justify-between px-2 py-1 bg-slate-50 hover:bg-slate-100 rounded-t text-left transition-colors"
                          >
                            <div className="flex items-center gap-1.5">
                              <span className="text-[11px]">{GROUP_ICONS[g]}</span>
                              <span className="text-[11px] font-semibold text-slate-700">{g}</span>
                              <span className="text-[9px] text-slate-400">({groups[g].length})</span>
                            </div>
                            <span className="text-[10px] text-slate-400">{isOpen ? '▾' : '▸'}</span>
                          </button>
                          {isOpen && (
                            <div className="p-2 space-y-1">
                              {GROUP_DESC[g] && (
                                <div className="text-[9px] text-slate-400 italic mb-1">{GROUP_DESC[g]}</div>
                              )}
                              {groups[g].map(p => renderParameter(p, selectedBlock, updateParam))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              {selectedDef.inputs.length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Activity size={10} /> Inputs
                  </div>
                  <div className="space-y-1">
                    {selectedDef.inputs.map(p => {
                      const connected = !!connections.find(c => c.to.blockId === selectedBlock.id && (c.signals || []).some(s => s.toPort === p.key));
                      const val = selectedBlock.lastInputs?.[p.key];
                      return (
                        <div key={p.key} className="flex items-center gap-2 text-[11px]">
                          <span className="flex-1 text-slate-700">{p.label}</span>
                          {connected ? (
                            <span className="text-cyan-700 font-semibold font-mono w-20 text-right" title="연결됨 (signal로 입력받음)">
                              🔗 {val !== undefined ? fmtVal(val) : '—'}
                            </span>
                          ) : (
                            <ParamInput
                              value={selectedBlock.inputValues?.[p.key] ?? p.value ?? ''}
                              isNumber={true}
                              onChange={(v) => updateInputValue(selectedBlock.id, p.key, v)}
                            />
                          )}
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                    {selectedDef.inputs.some(p => {
                      const connected = connections.find(c => c.to.blockId === selectedBlock.id && (c.signals || []).some(s => s.toPort === p.key));
                      const manual = selectedBlock.inputValues?.[p.key] ?? p.value;
                      return !connected && (manual === undefined || manual === '' || manual === null);
                    }) && (
                      <div className="text-[9px] text-amber-600 mt-1 flex items-center gap-1">
                        <span>⚠</span> 미연결·미입력 포트 있음 — 값을 입력하거나 연결하세요
                      </div>
                    )}
                    <div className="text-[9px] text-slate-400 mt-1">🔗 = 연결됨 · 입력칸 = 직접 값 (미연결 시 사용)</div>
                  </div>
                </div>
              )}

              {selectedDef.outputs.length > 0 && (() => {
                const activeOuts = getActiveOutputs(selectedBlock);
                if (activeOuts.length === 0) return null;
                return (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Zap size={10} /> Outputs
                  </div>
                  <div className="space-y-1">
                    {activeOuts.map(p => {
                      const val = selectedBlock.outputs?.[p.key];
                      return (
                        <div key={p.key} className="flex items-center gap-2 text-[11px]">
                          <span className="flex-1 text-slate-700">{p.label}</span>
                          <span className="text-amber-700 font-semibold font-mono w-16 text-right">
                            {val !== undefined ? fmtVal(val) : '—'}
                          </span>
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                );
              })()}

              {selectedBlock.state && Object.keys(selectedBlock.state).length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 font-semibold">State</div>
                  <div className="space-y-1">
                    {Object.entries(selectedBlock.state).map(([k, v]) => (
                      <div key={k} className="flex items-center gap-2 text-[11px]">
                        <span className="flex-1 text-slate-600">{k}</span>
                        <span className="text-slate-800 font-mono w-16 text-right">
                          {typeof v === 'number' ? fmtVal(v) : JSON.stringify(v)}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Statusbar */}
      <div className="h-6 bg-slate-50 border-t border-slate-200 flex items-center px-3 text-[10px] text-slate-500 gap-4 shrink-0 font-mono">
        <span>
          <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1"></span>
          Connecting: {connecting ? `${blocks.find(b => b.id === connecting.blockId)?.name} (${connecting.direction})` : 'none'}
        </span>
        <span>({mousePos.x.toFixed(0)}, {mousePos.y.toFixed(0)})</span>
        {(selectedIds.length > 0 || selectedConnIds.length > 0) && (
          <span className="text-sky-600">
            선택됨: 블록 {selectedIds.length} · 연결선 {selectedConnIds.length} · Delete 키로 삭제
          </span>
        )}
        <div className="flex-1" />
        <span>HPWD Simulation Studio · quasi-steady seq. subst.</span>
      </div>

      {/* Slot Save/Load Modal */}
      {slotModal && (
        <SlotModal
          mode={slotModal}
          slots={slotList}
          onClose={() => setSlotModal(null)}
          onSave={(name, existingId) => {
            if (saveSlot(name, existingId)) {
              refreshSlotList();
            }
          }}
          onLoad={(id) => {
            if (loadSlot(id)) setSlotModal(null);
          }}
          onDelete={(id) => {
            deleteSlot(id);
            refreshSlotList();
          }}
          onRename={(id, newName) => {
            renameSlot(id, newName);
            refreshSlotList();
          }}
          onExportFile={exportProjectFile}
          onImportFile={importProjectFile}
          currentBlockCount={blocks.length}
          currentConnectionCount={connections.length}
        />
      )}
      <ChatFAB onSend={chatExecuteMock} />
    </div>
  );
}

/* ═══════════ AI Chat Floating Button + Popup ═══════════ */
function ChatFAB({ onSend }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    {
      role: 'assistant',
      text: 'HPWD Studio AI 어시스턴트 (Mock 모드).\n자연어 명령으로 캔버스 조작 가능. 키워드 매칭으로 동작.',
    },
    {
      role: 'assistant',
      text: '현재 지원하는 명령:',
      tools: [
        '"건조기 사이클 만들어줘" — 사이클 일괄 생성 (load_preset)',
        '"초기화" — 캔버스 비우기 (clear_canvas)',
        '"실행" / "정지" / "리셋" — 시뮬레이션 제어',
      ],
    },
  ]);
  const [input, setInput] = useState('');
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, open]);

  const send = () => {
    const t = input.trim();
    if (!t) return;
    // user 메시지 먼저 추가
    setMessages(m => [...m, { role: 'user', text: t }]);
    setInput('');
    // mock 처리 — 실제 LLM이면 여기서 API call. 약간의 지연으로 thinking 느낌
    setTimeout(() => {
      const result = onSend ? onSend(t) : { reply: 'No handler.' };
      const msg = { role: 'assistant', text: result.reply };
      if (result.tool) {
        msg.toolCall = { name: result.tool, args: result.args || {}, ok: result.result?.ok !== false };
      }
      setMessages(m => [...m, msg]);
    }, 200);
  };

  const examples = [
    '건조기 사이클 만들어줘',
    '초기화',
    '실행',
    '정지',
  ];

  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-cyan-600 hover:bg-cyan-700 text-white flex items-center justify-center shadow-lg hover:shadow-xl transition-all hover:scale-105"
        style={{ zIndex: 50 }}
        title="AI 어시스턴트 열기"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-amber-400 border-2 border-white animate-pulse"></span>
      </button>
    );
  }

  return (
    <div
      className="fixed bottom-6 right-6 w-[400px] h-[560px] bg-white rounded-lg shadow-2xl border border-slate-200 flex flex-col"
      style={{ zIndex: 50 }}
    >
      {/* Header */}
      <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between bg-gradient-to-r from-cyan-600 to-cyan-700 text-white rounded-t-lg shrink-0">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-white"></div>
          <span className="font-semibold text-[13px]">AI 어시스턴트</span>
          <span className="text-[9px] px-1.5 py-0.5 bg-white/20 rounded font-mono tracking-wider">UI ONLY</span>
        </div>
        <button
          onClick={() => setOpen(false)}
          className="text-white/80 hover:text-white text-2xl leading-none w-6 h-6 flex items-center justify-center"
          title="닫기"
        >×</button>
      </div>

      {/* Messages */}
      <div ref={bodyRef} className="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50">
        {messages.map((m, i) => (
          <div key={i} className="text-[12px] leading-relaxed">
            <div className={`text-[9px] font-mono uppercase tracking-widest font-semibold mb-1 flex items-center gap-1.5 ${m.role === 'user' ? 'text-cyan-700 justify-end' : 'text-amber-700'}`}>
              {m.role !== 'user' && <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>}
              {m.role === 'user' ? 'YOU' : 'ASSISTANT'}
              {m.role === 'user' && <span className="w-1.5 h-1.5 rounded-full bg-cyan-600"></span>}
            </div>
            <div className={m.role === 'user' ? 'bg-cyan-50 border border-cyan-200 rounded-lg rounded-tr-sm px-3 py-2 ml-8 text-slate-800 whitespace-pre-wrap' : 'text-slate-700 mr-4 whitespace-pre-wrap'}>
              {m.text}
            </div>
            {m.toolCall && (
              <div className="mr-4 mt-1.5 flex items-center gap-1.5">
                <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded font-semibold tracking-wider ${
                  m.toolCall.ok

                  <span className="text-[9px] font-mono text-slate-500 truncate">
                    {Object.entries(m.toolCall.args).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ')}

                )}

            )}
            {m.tools && (
              <div className="bg-white border border-amber-200 border-l-2 border-l-amber-500 rounded-r px-3 py-2 mt-1.5 font-mono text-[10px] text-slate-600 leading-relaxed mr-4">

                  <div key={j}>· {tt}</div>

      <div className="px-3 py-2 border-t border-slate-100 flex flex-wrap gap-1.5 bg-white shrink-0">
        {examples.map((s, i) => (
          <span

        ))}
      </div>

      {/* Input */}
      <div className="border-t border-slate-200 p-2 flex gap-1.5 bg-white rounded-b-lg shrink-0">
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          className="flex-1 resize-none px-2 py-1.5 text-[12px] border border-slate-300 rounded bg-slate-50 text-slate-700 h-12 outline-none focus:border-cyan-500 focus:bg-white"
          placeholder="예: 히트펌프 사이클 만들어줘 (Enter)"
        />
        <button
          onClick={send}
          disabled={!input.trim()}
          className="px-3 text-[10px] font-mono font-semibold bg-cyan-600 text-white rounded hover:bg-cyan-700 self-stretch tracking-wider disabled:opacity-50 disabled:cursor-not-allowed"
        >SEND</button>
      </div>
    </div>
  );
}

/* ═══════════ App Switcher (HPWD Studio ↔ Component Studio) ═══════════ */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const apps = [
    { id: 'studio',           label: 'HPWD Studio',      desc: '시뮬 캔버스',   href: '/' },
    { id: 'component-studio', label: 'Component Studio', desc: '컴포넌트 작성', href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio', desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',   desc: 'On-design 모델 설계',    href: '/on-design-studio/' },
    { id: 'model-docs',          label: 'Model Docs',          desc: '수학적 모델링 문서',     href: '/model-docs/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors"
      >
        <div className="w-2 h-2 rounded-sm bg-cyan-600 shrink-0"/>
        <span className="font-bold text-slate-900 tracking-wide text-[11px]">{active.label}</span>
        <span className="text-slate-400 text-[9px]">▾</span>
      </button>

      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-56 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button
                key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-cyan-50 cursor-default' : 'hover:bg-slate-50'
                }`}
              >
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-cyan-700' : 'text-slate-300'}`}>
                  {isActive ? '●' : '○'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-cyan-900' : 'text-slate-800'}`}>
                    {a.label}
                  </div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════ Backend Status Indicator + Switcher ═══════════ */
function BackendStatus() {
  const [tick, setTick] = useState(0);
  const [open, setOpen] = useState(false);
  const [customUrl, setCustomUrl] = useState('');
  const dropdownRef = useRef(null);

  useEffect(() => {
    const handler = () => setTick(t => t + 1);
    window.addEventListener('hpwd-backend-status', handler);
    return () => window.removeEventListener('hpwd-backend-status', handler);
  }, []);

  // dropdown 외부 클릭 시 닫기
  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const status = window.HPWD_BACKEND || { connected: false, components: [], lastError: null, url: '', presets: {} };
  const presets = status.presets || { cloud: '', local: 'http://localhost:8000' };
  const isLocal = status.url === presets.local;
  const isCloud = status.url === presets.cloud;
  const isCustom = !isLocal && !isCloud;

  const engine = status.engine || 'python';
  const modelica = status.modelica || { available: false, components: [], reason: null };
  const switchEngine = (eng) => {
    if (typeof window.HPWD_setEngine === 'function') window.HPWD_setEngine(eng);
  };

  const tooltip = status.connected
    ? `Backend OK · ${status.url}\n등록된 컴포넌트: ${status.components.join(', ')}`
    : `Backend 연결 안 됨 · ${status.url}\n${status.lastError || '서버 미실행'}`;

  const switchTo = (url) => {
    if (typeof window.HPWD_setBackend === 'function') {
      window.HPWD_setBackend(url);
    }
    setOpen(false);
  };
  const applyCustom = () => {
    if (customUrl.trim()) {
      switchTo(customUrl.trim());
      setCustomUrl('');
    }
  };

  return (
    <div className="relative" ref={dropdownRef}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 text-[11px] font-mono px-2 py-1 rounded border transition-colors hover:bg-opacity-80"
        style={{
          background: status.connected ? '#ecfdf5' : '#fef2f2',
          borderColor: status.connected ? '#a7f3d0' : '#fecaca',
          color: status.connected ? '#065f46' : '#991b1b',
        }}
        title={tooltip}
      >
        <span
          className="w-2 h-2 rounded-full"
          style={{
            background: status.connected ? '#10b981' : '#ef4444',
            boxShadow: status.connected ? '0 0 4px #10b981' : 'none',
          }}
        />
        <span>Backend</span>
        <span className="opacity-70">{status.connected ? `(${status.components.length})` : 'OFF'}</span>
        <span className="text-[8px] opacity-50">▾</span>
      </button>

      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-72 p-2 text-[11px] font-mono">
          <div className="px-2 py-1 text-slate-500 text-[10px] uppercase tracking-wider">Backend URL</div>

          {/* Cloud */}
          <button
            onClick={() => switchTo(presets.cloud)}
            disabled={!presets.cloud}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isCloud ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            } disabled:opacity-40 disabled:cursor-not-allowed`}
          >
            <span className="w-3 text-center">{isCloud ? '●' : '○'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Cloud (Railway)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.cloud || '(not configured)'}</div>
            </div>
          </button>

          {/* Local */}
          <button
            onClick={() => switchTo(presets.local)}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isLocal ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            }`}
          >
            <span className="w-3 text-center">{isLocal ? '●' : '○'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Local (내 PC)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.local}</div>
            </div>
          </button>

          {/* Custom */}
          <div className={`mt-1 px-2 py-1.5 rounded ${isCustom ? 'bg-cyan-50' : ''}`}>
            <div className="flex items-center gap-2 mb-1">
              <span className="w-3 text-center">{isCustom ? '●' : '○'}</span>
              <span className={`font-semibold ${isCustom ? 'text-cyan-900' : 'text-slate-700'}`}>Custom URL</span>
            </div>
            <div className="flex gap-1">
              <input
                type="text"
                value={customUrl}
                onChange={e => setCustomUrl(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') applyCustom(); }}
                placeholder={isCustom ? status.url : 'http://192.168.10.5:8000'}
                className="flex-1 px-2 py-0.5 text-[10px] border border-slate-300 rounded bg-white text-slate-700 outline-none focus:border-cyan-500"
              />
              <button
                onClick={applyCustom}
                disabled={!customUrl.trim()}
                className="px-2 text-[9px] font-bold bg-cyan-600 text-white rounded hover:bg-cyan-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >SET</button>
            </div>
          </div>

          {/* 계산 엔진 토글 (Python ↔ Modelica) */}
          <div className="mt-2 pt-2 border-t border-slate-100">
            <div className="px-2 py-1 text-slate-500 text-[10px] uppercase tracking-wider flex items-center justify-between">
              <span>Compute Engine</span>
              {!modelica.available && (
                <span className="text-[8px] text-slate-400 normal-case tracking-normal">Modelica: omc 없음</span>
              )}
            </div>
            <div className="flex gap-1 px-2 pb-1">
              <button
                onClick={() => switchEngine('python')}
                className={`flex-1 px-2 py-1 rounded border text-[10px] font-semibold transition-colors ${
                  engine === 'python'
                    ? 'bg-cyan-600 text-white border-cyan-600'
                    : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                }`}
              >Python</button>
              <button
                onClick={() => switchEngine('modelica')}
                disabled={!modelica.available}
                title={modelica.available
                  ? `Modelica 엔진 (omc) · ${modelica.components.join(', ')}`
                  : `사용 불가: ${modelica.reason || 'omc 미설치'}`}
                className={`flex-1 px-2 py-1 rounded border text-[10px] font-semibold transition-colors ${
                  engine === 'modelica'
                    ? 'bg-violet-600 text-white border-violet-600'
                    : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                } disabled:opacity-40 disabled:cursor-not-allowed`}
              >Modelica</button>
            </div>
            {engine === 'modelica' && (
              <div className="px-2 pb-1 text-[9px] text-violet-700">
                ● 첫 호출만 omc 빌드(~수십초), 이후 캐시로 즉시 (지원: {modelica.components.join(', ') || '없음'})
              </div>
            )}
          </div>

          {/* 상태 정보 */}
          <div className="mt-2 px-2 py-1.5 bg-slate-50 rounded text-[10px]">
            <div className="flex justify-between">
              <span className="text-slate-500">Status</span>
              <span className={status.connected ? 'text-emerald-700 font-semibold' : 'text-red-700 font-semibold'}>
                {status.connected ? '● Connected' : '○ Disconnected'}
              </span>
            </div>
            {status.connected && (
              <div className="flex justify-between mt-0.5">
                <span className="text-slate-500">Components</span>
                <span className="text-slate-700">{status.components.length}</span>
              </div>
            )}
            {!status.connected && status.lastError && (
              <div className="mt-1 text-red-700 break-words">{status.lastError}</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function ToolBtn({ icon: Icon, label, onClick, disabled, color = 'text-slate-700 hover:bg-slate-100', as, title }) {
  const Comp = as || 'button';
  return (
    <Comp
      onClick={disabled ? undefined : onClick}
      title={title}
      className={`px-2 py-1 rounded flex items-center gap-1 text-[11px] transition-colors ${color} ${disabled ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'}`}
    >
      <Icon size={13} />
      <span>{label}</span>
    </Comp>
  );
}

// =============================================================
// SlotModal — 세이브 슬롯 관리 UI
// =============================================================
function SlotModal({ mode, slots, onClose, onSave, onLoad, onDelete, onRename, onExportFile, onImportFile, currentBlockCount, currentConnectionCount }) {
  const [newName, setNewName] = useState('');
  const [renamingId, setRenamingId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const fileInputRef = useRef(null);

  const sortedSlots = [...slots].sort((a, b) => b.savedAt - a.savedAt);

  const fmtDate = (ts) => {
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  const handleNewSave = () => {
    const name = newName.trim() || `Untitled ${fmtDate(Date.now())}`;
    onSave(name, null);
    setNewName('');
  };

  const handleOverwrite = (slot) => {
    if (confirm(`"${slot.name}" 슬롯을 현재 상태로 덮어쓸까요?`)) {
      onSave(slot.name, slot.id);
    }
  };

  const handleRenameStart = (slot) => {
    setRenamingId(slot.id);
    setRenameValue(slot.name);
  };

  const handleRenameCommit = (id) => {
    const v = renameValue.trim();
    if (v) onRename(id, v);
    setRenamingId(null);
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
      onClick={onClose}
    >
      <div
        className="bg-white rounded-lg shadow-2xl border border-slate-200 w-[560px] max-h-[80vh] flex flex-col"
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div className="text-sm font-semibold text-slate-900">
              {mode === 'save' ? '프로젝트 저장' : '프로젝트 불러오기'}
            </div>
            <div className="text-[11px] text-slate-500 font-mono">
              {mode === 'save'
                ? `현재: 블록 ${currentBlockCount} · 연결선 ${currentConnectionCount}`
                : `저장된 슬롯 ${slots.length}개 · 브라우저에 로컬 저장됨`}
            </div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none px-2">
            ×
          </button>
        </div>

        {/* Save mode: 새 슬롯 입력 */}
        {mode === 'save' && (
          <div className="px-5 py-3 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
            <input
              type="text"
              placeholder="새 슬롯 이름 (비워두면 시간 기반 자동 명명)"
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') handleNewSave(); }}
              className="flex-1 px-2.5 py-1.5 text-[12px] bg-white border border-slate-300 rounded focus:outline-none focus:border-cyan-500"
              autoFocus
            />
            <button
              onClick={handleNewSave}
              className="px-3 py-1.5 text-[12px] bg-cyan-600 text-white rounded hover:bg-cyan-700 transition-colors font-medium"
            >
              새 슬롯으로 저장
            </button>
          </div>
        )}

        {/* Slot list */}
        <div className="flex-1 overflow-y-auto">
          {sortedSlots.length === 0 ? (
            <div className="p-10 text-center text-slate-400 text-[12px]">
              저장된 슬롯이 없습니다
              {mode === 'load' && <div className="mt-2 text-[11px]">먼저 Save에서 슬롯을 만들어보세요</div>}
            </div>
          ) : (
            <div className="divide-y divide-slate-100">
              {sortedSlots.map((slot) => (
                <div key={slot.id} className="px-5 py-3 hover:bg-slate-50 group flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    {renamingId === slot.id ? (
                      <input
                        type="text"
                        value={renameValue}
                        onChange={(e) => setRenameValue(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') handleRenameCommit(slot.id);
                          else if (e.key === 'Escape') setRenamingId(null);
                        }}
                        onBlur={() => handleRenameCommit(slot.id)}
                        autoFocus
                        className="w-full px-1.5 py-0.5 text-[12px] bg-white border border-cyan-500 rounded focus:outline-none"
                      />
                    ) : (
                      <div className="text-[13px] font-medium text-slate-900 truncate">{slot.name}</div>
                    )}
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">
                      {fmtDate(slot.savedAt)} · 블록 {slot.blockCount} · 연결선 {slot.connectionCount}
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="flex items-center gap-1">
                    {mode === 'load' ? (
                      <button
                        onClick={() => onLoad(slot.id)}
                        className="px-2.5 py-1 text-[11px] bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 rounded transition-colors"
                      >
                        불러오기
                      </button>
                    ) : (
                      <button
                        onClick={() => handleOverwrite(slot)}
                        className="px-2.5 py-1 text-[11px] bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded transition-colors"
                      >
                        덮어쓰기
                      </button>
                    )}
                    <button
                      onClick={() => handleRenameStart(slot)}
                      className="px-2 py-1 text-[11px] text-slate-600 hover:bg-slate-100 rounded transition-colors"
                      title="이름 변경"
                    >
                      ✎
                    </button>
                    {confirmDeleteId === slot.id ? (
                      <>
                        <button
                          onClick={() => { onDelete(slot.id); setConfirmDeleteId(null); }}
                          className="px-2 py-1 text-[11px] bg-red-600 text-white rounded hover:bg-red-700"
                        >
                          확인
                        </button>
                        <button
                          onClick={() => setConfirmDeleteId(null)}
                          className="px-2 py-1 text-[11px] text-slate-500 hover:bg-slate-100 rounded"
                        >
                          취소
                        </button>
                      </>
                    ) : (
                      <button
                        onClick={() => setConfirmDeleteId(slot.id)}
                        className="px-2 py-1 text-[11px] text-red-500 hover:bg-red-50 rounded transition-colors"
                        title="삭제"
                      >
                        🗑
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Footer: JSON 파일 Export/Import */}
        <div className="px-5 py-3 bg-slate-50 border-t border-slate-200 flex items-center justify-between text-[11px]">
          <span className="text-slate-500">
            백업/공유용:
          </span>
          <div className="flex items-center gap-2">
            <button
              onClick={onExportFile}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON 파일로 내보내기
            </button>
            <button
              onClick={() => fileInputRef.current?.click()}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON 파일 가져오기
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json"
              className="hidden"
              onChange={onImportFile}
            />
          </div>
        </div>
      </div>
    </div>
  );
}


    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('Render error:', error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{ padding: 24, fontFamily: 'monospace', color: '#dc2626', whiteSpace: 'pre-wrap' }}>
              <h2 style={{ marginBottom: 12 }}>⚠ Render Error</h2>
              <div style={{ marginBottom: 16, fontSize: 14 }}>{String(this.state.error?.message || this.state.error)}</div>
              <pre style={{ fontSize: 11, color: '#475569', background: '#f8fafc', padding: 12, borderRadius: 4, overflow: 'auto' }}>
                {this.state.error?.stack}
              </pre>
              <button
                onClick={() => location.reload()}
                style={{ marginTop: 16, padding: '6px 16px', background: '#06b6d4', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer' }}
              >Reload</button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><HPWDStudio /></ErrorBoundary>);
  </script>
</body>
</html>

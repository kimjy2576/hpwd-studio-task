    </div>
  );
}

/* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР App Switcher (HPWD Studio тЖФ Component Studio) тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const apps = [
    { id: 'studio',           label: 'HPWD Studio',      desc: 'ьЛЬыом ь║Фы▓ДьКд',   href: '/' },
    { id: 'component-studio', label: 'Component Studio', desc: 'ь╗┤эПмыДМэК╕ ьЮСьД▒', href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio', desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',   desc: 'On-design ыкиыН╕ ьДдъ│Д',    href: '/on-design-studio/' },
    { id: 'model-docs',          label: 'Model Docs',          desc: 'ьИШэХЩьаБ ыкиыН╕ызБ ым╕ьДЬ',     href: '/model-docs/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors"
      >
        <div className="w-2 h-2 rounded-sm bg-cyan-600 shrink-0"/>
        <span className="font-bold text-slate-900 tracking-wide text-[11px]">{active.label}</span>
        <span className="text-slate-400 text-[9px]">тЦ╛</span>
      </button>

      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-56 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button
                key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-cyan-50 cursor-default' : 'hover:bg-slate-50'
                }`}
              >
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-cyan-700' : 'text-slate-300'}`}>
                  {isActive ? 'тЧП' : 'тЧЛ'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-cyan-900' : 'text-slate-800'}`}>
                    {a.label}
                  </div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР Backend Status Indicator + Switcher тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР */
function BackendStatus() {
  const [tick, setTick] = useState(0);
  const [open, setOpen] = useState(false);
  const [customUrl, setCustomUrl] = useState('');
  const dropdownRef = useRef(null);

  useEffect(() => {
    const handler = () => setTick(t => t + 1);
    window.addEventListener('hpwd-backend-status', handler);
    return () => window.removeEventListener('hpwd-backend-status', handler);
  }, []);

  // dropdown ьЩ╕ы╢А эБ┤ыжн ьЛЬ ыЛлъ╕░
  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const status = window.HPWD_BACKEND || { connected: false, components: [], lastError: null, url: '', presets: {} };
  const presets = status.presets || { cloud: '', local: 'http://localhost:8010' };
  const isLocal = status.url === presets.local;
  const isCloud = status.url === presets.cloud;
  const isCustom = !isLocal && !isCloud;

  const engine = status.engine || 'python';
  const modelica = status.modelica || { available: false, components: [], reason: null };
  const switchEngine = (eng) => {
    if (typeof window.HPWD_setEngine === 'function') window.HPWD_setEngine(eng);
  };

  const tooltip = status.connected
    ? `Backend OK ┬╖ ${status.url}\nыУ▒ыбЭыРЬ ь╗┤эПмыДМэК╕: ${status.components.join(', ')}`
    : `Backend ьЧ░ъ▓░ ьХИ ыРи ┬╖ ${status.url}\n${status.lastError || 'ьДЬы▓Д ып╕ьЛдэЦЙ'}`;

  const switchTo = (url) => {
    if (typeof window.HPWD_setBackend === 'function') {
      window.HPWD_setBackend(url);
    }
    setOpen(false);
  };
  const applyCustom = () => {
    if (customUrl.trim()) {
      switchTo(customUrl.trim());
      setCustomUrl('');
    }
  };

  return (
    <div className="relative" ref={dropdownRef}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1.5 text-[11px] font-mono px-2 py-1 rounded border transition-colors hover:bg-opacity-80"
        style={{

// =============================================================
// CyclePlot тАФ ьВмьЭ┤эБ┤ ъ╕░ыПЩ ъ│╝ыПД ъ╢дьаБ (Pc/Pe[bar ьвМь╢Х] + SH[K ьЪ░ь╢Х] vs time)
// =============================================================
// =============================================================
// extractCycleTopology тАФ ь║Фы▓ДьКд ы╕ФыбЭ+ьЧ░ъ▓░ тЖТ ьВмьЭ┤эБ┤ ызБ эЖаэП┤ыбЬьзА
//   ыГЙызд ь╗┤эПмыДМэК╕ 4ьвЕьЭД ь░╛ьХД, kind:'refrigerant' ьЧ░ъ▓░ьЭШ fromтЖТtoые╝ ыФ░ыЭ╝
//   ыЛлэЮМ ызБ(compтЖТcondтЖТeevтЖТevapтЖТcomp)ьЭД ьЮмъ╡мьД▒. raw эММыЭ╝ып╕эД░ ьИШьзС.
// =============================================================
function cycleKindOf(type) {
  if (!type) return null;
  if (type.startsWith('compressor')) return 'compressor';
  if (type.startsWith('condenser')) return 'condenser';
  if (type.startsWith('eev')) return 'eev';
  if (type.startsWith('evaporator')) return 'evaporator';
  return null;
}

function extractCycleTopology(blocks, connections) {
  const refBlocks = (blocks || []).filter(b => cycleKindOf(b.type));
  const byId = Object.fromEntries(refBlocks.map(b => [b.id, b]));
  const NEED = ['compressor', 'condenser', 'eev', 'evaporator'];
  const present = new Set(refBlocks.map(b => cycleKindOf(b.type)));
  const missing = NEED.filter(k => !present.has(k));
  const labelOf = { compressor: 'Compressor', condenser: 'Condenser', eev: 'EEV', evaporator: 'Evaporator' };
  if (missing.length) {
    return { error: `ь║Фы▓ДьКдьЧР ${missing.map(k => labelOf[k]).join(', ')} ъ░А ьЧЖьЭМ. Comp┬╖Cond┬╖EEV┬╖Evap 4ъ░Ьъ░А ыГЙызд ьЧ░ъ▓░ыбЬ ыЛлэЮМ ызБьЭД ьЭ┤ыдДьХ╝ эХи.` };
  }

  // ыГЙызд ьЧ░ъ▓░ьЭШ directed adjacency (ь╗┤эПмыДМэК╕ ъ░Д, ь▓л ьЧ░ъ▓░ызМ)
  const adj = {};
  (connections || []).forEach(c => {
    if (c.kind !== 'refrigerant') return;
    const f = c.from?.blockId, t = c.to?.blockId;
    if (byId[f] && byId[t] && f !== t && !(f in adj)) adj[f] = t;
  });

  // ьХХь╢Хъ╕░ьЧРьДЬ fromтЖТto ыФ░ыЭ╝ ьЫМэБм
  const comp = refBlocks.find(b => cycleKindOf(b.type) === 'compressor');
  const ring = [];
  const seen = new Set();
  let cur = comp.id;
  while (cur && byId[cur] && !seen.has(cur)) {
    seen.add(cur); ring.push(cur);
    cur = adj[cur];
  }
  // ыЛлэЮШ: ызИьзАызЙ ыЕ╕ыУЬъ░А ьХХь╢Хъ╕░ыбЬ ыПМьХДьШдъ│а, 4ьвЕьЭ┤ ьаХэЩХэЮИ эХЬ ы▓ИьФй
  const closes = cur === comp.id;
  const ringKinds = ring.map(id => cycleKindOf(byId[id].type));
  if (ring.length !== 4 || !closes || new Set(ringKinds).size !== 4) {
    return {
      error: `ыЛлэЮМ ыГЙызд ызБьЭ┤ ьХДыЛШ (ъ░РьзА ъ▓╜ыбЬ: ${ring.map(id => labelOf[cycleKindOf(byId[id].type)]).join('тЖТ') || 'ьЧЖьЭМ'}). `
        + `CompтЖТCondтЖТEEVтЖТEvapтЖТComp ьИЬьДЬыбЬ ыГЙызд ьЧ░ъ▓░ьЭД ыЛльХДьдШ (ьЧ░ъ▓░ ы░йэЦе=ыГЙызд эЭРыжД).`,
    };
  }

  // raw эММыЭ╝ып╕эД░ ьИШьзС: b.params + inputValues(ьЧЖьЬ╝ый┤ эПмэК╕ ъ╕░ы│╕ъ░Т)
  const components = ring.map(id => {
    const b = byId[id];
    const def = TYPES[b.type] || {};
    const raw = { ...(b.params || {}) };
    (def.inputs || []).forEach(inp => {
      raw[inp.key] = b.inputValues?.[inp.key] ?? inp.value;
    });
    return { id: b.id, kind: cycleKindOf(b.type), params: raw };
  });
  const volumes = ring.map(() => 5e-4);   // ьЧ░ъ▓░ызИыЛд 0.5L (L1 lumped Volume)
  return { components, ring, volumes, ringLabels: ringKinds.map(k => labelOf[k]) };
}

// =============================================================
// makeL1TestRing тАФ ъ▓АьжЭыРЬ ыаИэН╝ыЯ░ьКд ьВмьЭ┤эБ┤(Pc 16.59)ьЭД ь║Фы▓ДьКд ы╕ФыбЭ+ьЧ░ъ▓░ыбЬ ьГЭьД▒
//   ьЫРэБ┤ыжн эЕМьКдэК╕ьЪй. params/inputValuesые╝ ыаИэН╝ыЯ░ьКд ъ░ТьЬ╝ыбЬ ы░ХьХД ызды▓И ыПЩьЭ╝ ьЮмэШД.
// =============================================================
function makeL1TestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `tst${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},
      outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  const comp = mk(0, 'compressor_theoretical', 180, 120,  'Comp ┬╖ test',
    { V_disp: 10, eta_vol: 0.85, eta_isen: 0.65 }, { N: 3000 });
  const cond = mk(1, 'condenser_off_design', 700, 120, 'Cond ┬╖ test',
    { UA_deSH: 8, UA_2ph: 50, UA_SC: 5, dP_ref: 0.03 },
    { T_air_in: 35, RH_air_in: 50, V_air_CMM: 25.42, P_cond: 19.07, m_dot_ref: 0.00458 });
  const eev = mk(2, 'eev_off_design', 700, 480, 'EEV ┬╖ test',
    { A_orifice: 0.55, Cv_rated: 0.7, c0: 0, c1: 0.5, c2: 0.3, c3: 0.2 }, { opening: 50 });
  const evap = mk(3, 'evaporator_off_design', 180, 480, 'Evap ┬╖ test',
    { UA_2ph: 25, UA_SH: 4, dP_ref: 0.02 },
    { T_air_in: 50, RH_air_in: 90, V_air_CMM: 2.54, P_evap: 5.51, m_dot_ref: 0.00458 });
  const blocks = [comp, cond, eev, evap];
  const edge = (from, to, fside, tside) => ({
    from: { blockId: from.id, side: fside, slot: 0 },
    to: { blockId: to.id, side: tside, slot: 0 },
    kind: 'refrigerant',
    signals: autoMapSignals(from, to),
    lineParams: defaultLineParams('refrigerant'),
    cornerRadius: 8, routeMode: 'auto',
  });
  // ыГЙызд эЭРыжД ызБ: CompтЖТCondтЖТEEVтЖТEvapтЖТComp
  const connections = [
    edge(comp, cond, 'right', 'left'),
    edge(cond, eev, 'bottom', 'top'),
    edge(eev, evap, 'left', 'right'),
    edge(evap, comp, 'top', 'bottom'),
  ];
  return { blocks, connections };
}

function CyclePlot({ traj }) {
  if (!traj || !Array.isArray(traj.Pc_bar) || !traj.Pc_bar.length
      || !Array.isArray(traj.Pe_bar) || !Array.isArray(traj.SH_evap) || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">ъ╢дьаБ ыН░ьЭ┤эД░ ьЧЖьЭМ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT, tmax = 120;
  const pAll = [...traj.Pc_bar, ...traj.Pe_bar];
  const pMax = Math.max(5, Math.ceil(Math.max(...pAll) / 5) * 5);
  const shMax = Math.max(10, Math.ceil(Math.max(...traj.SH_evap) / 10) * 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syP = v => y0 - (v / pMax) * (y0 - y1);
  const syS = v => y0 - (v / shMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const pTicks = [], shTicks = [], xTicks = [];
  for (let p = 0; p <= pMax; p += 5) pTicks.push(p);
  for (let k = 0; k <= shMax; k += 10) shTicks.push(k);
  for (let s = 0; s <= 120; s += 20) xTicks.push(s);
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {pTicks.map(p => (
        <g key={'p' + p}>
          <line x1={x0} y1={syP(p)} x2={x1} y2={syP(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syP(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {shTicks.map(k => (<text key={'s' + k} x={x1 + 6} y={syS(k) + 3} textAnchor="start" {...TK}>{k}</text>))}
      {xTicks.map(s => (<text key={'x' + s} x={sx(s)} y={y0 + 14} textAnchor="middle" {...TK}>{s}</text>))}
      <line x1={sx(20)} y1={y1} x2={sx(20)} y2={y0} stroke="#94A3B8" strokeWidth="1" strokeDasharray="3 3" />
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>bar</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0D9488', fontFamily: 'JetBrains Mono, monospace' }}>K (SH)</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      <path d={mkPath(traj.Pc_bar, syP)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.Pe_bar, syP)} fill="none" stroke="#2563EB" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.SH_evap, syS)} fill="none" stroke="#0D9488" strokeWidth="2.2" strokeLinejoin="round" />
    </svg>
  );
}

// =============================================================
// ъ│╡ъ╕░ ьВмьЭ┤эБ┤ Run Cycle тАФ ыГЙызд Run CycleьЭШ ыМАь╣нэМР
//   ь║Фы▓ДьКд ъ│╡ъ╕░ ьЧ░ъ▓░(kind:'air')ьЧРьДЬ ызБ(DrumтЖТFanтЖТEvapтЖТCond)ьЭД ь╢Фь╢Ь,
//   /run_air_cycle ыбЬ .mo ьЮРыПЩьГЭьД▒┬╖ьЛдэЦЙ. ь╜ФьЭ╝ьШиыПД(T_evap/T_cond)ыКФ ъ│аьаХ ъ▓╜ъ│Д.
// =============================================================
function airCycleKindOf(type) {
  if (!type) return null;
  if (type.startsWith('drum')) return 'drum';
  if (type.startsWith('filter')) return 'filter';
  if (type.startsWith('fan')) return 'fan';
  if (type.startsWith('condenser')) return 'condenser';
  if (type.startsWith('evaporator')) return 'evaporator';
  return null;
}

function extractAirTopology(blocks, connections) {
  const airBlocks = (blocks || []).filter(b => airCycleKindOf(b.type));
  const byId = Object.fromEntries(airBlocks.map(b => [b.id, b]));
  const NEED = ['drum', 'fan', 'evaporator', 'condenser'];
  const present = new Set(airBlocks.map(b => airCycleKindOf(b.type)));
  const missing = NEED.filter(k => !present.has(k));
  const labelOf = { drum: 'Drum', fan: 'Fan', evaporator: 'Evap', condenser: 'Cond', filter: 'Filter' };
  if (missing.length) {
    return { error: `ь║Фы▓ДьКдьЧР ${missing.map(k => labelOf[k]).join(', ')} ъ░А ьЧЖьЭМ. Drum┬╖Fan┬╖Evap┬╖Cond 4ъ░Ьъ░А ъ│╡ъ╕░ ьЧ░ъ▓░ыбЬ ыЛлэЮМ ызБьЭД ьЭ┤ыдДьХ╝ эХи (FilterыКФ ьДаэГЭ).` };
  }
  // ъ│╡ъ╕░ ьЧ░ъ▓░ьЭШ directed adjacency (ь╗┤эПмыДМэК╕ ъ░Д, ь▓л ьЧ░ъ▓░ызМ)
  const adj = {};
  (connections || []).forEach(c => {
    if (c.kind !== 'air') return;
    const f = c.from?.blockId, t = c.to?.blockId;
    if (byId[f] && byId[t] && f !== t && !(f in adj)) adj[f] = t;
  });
  // ыУЬыЯ╝ьЧРьДЬ fromтЖТto ыФ░ыЭ╝ ьЫМэБм (ъ│╡ъ╕░ эЭРыжД: drumтЖТfanтЖТevapтЖТcondтЖТdrum)
  const drum = airBlocks.find(b => airCycleKindOf(b.type) === 'drum');
  const ring = [];
  const seen = new Set();
  let cur = drum.id;
  while (cur && byId[cur] && !seen.has(cur)) {
    seen.add(cur); ring.push(cur);
    cur = adj[cur];
  }
  const closes = cur === drum.id;
  const ringKinds = ring.map(id => airCycleKindOf(byId[id].type));
  const CORE = ['drum', 'fan', 'evaporator', 'condenser'];
  const coreOnce = CORE.every(k => ringKinds.filter(x => x === k).length === 1);
  const allAllowed = ringKinds.every(k => ['drum', 'fan', 'evaporator', 'condenser', 'filter'].includes(k));
  if (ring.length < 4 || !closes || !coreOnce || !allAllowed) {
    return {
      error: `ыЛлэЮМ ъ│╡ъ╕░ ызБьЭ┤ ьХДыЛШ (ъ░РьзА ъ▓╜ыбЬ: ${ring.map(id => labelOf[airCycleKindOf(byId[id].type)]).join('тЖТ') || 'ьЧЖьЭМ'}). `
        + `DrumтЖТ(Filter)тЖТFanтЖТEvapтЖТCondтЖТDrum ьИЬьДЬыбЬ ъ│╡ъ╕░ ьЧ░ъ▓░ьЭД ыЛльХДьдШ (ьЧ░ъ▓░ ы░йэЦе=ъ│╡ъ╕░ эЭРыжД, FilterыКФ ьДаэГЭ).`,
    };
  }
  // raw эММыЭ╝ып╕эД░ ьИШьзС: b.params + inputValues(ьЧЖьЬ╝ый┤ эПмэК╕ ъ╕░ы│╕ъ░Т)
  const components = ring.map(id => {
    const b = byId[id];
    const def = TYPES[b.type] || {};
    const raw = { ...(b.params || {}) };
    (def.inputs || []).forEach(inp => {
      raw[inp.key] = b.inputValues?.[inp.key] ?? inp.value;
    });
    return { id: b.id, kind: airCycleKindOf(b.type), params: raw };
  });
  const volumes = ring.map(() => 0.05);   // ьЧ░ъ▓░ызИыЛд 0.05m┬│ (L1 lumped AirVolume)
  return { components, ring, volumes, ringLabels: ringKinds.map(k => labelOf[k]) };
}

// makeAirTestRing тАФ ъ▓АьжЭыРЬ ыаИэН╝ыЯ░ьКд ъ│╡ъ╕░ ызБ(TestAirRingL1)ьЭД ь║Фы▓ДьКдыбЬ ьГЭьД▒.
//   drum/fanьЭА native Fan_L1/Drum_L1 эММыЭ╝ып╕эД░, evap/condыКФ ь╜ФьЭ╝ьШиыПД(┬░C)ые╝ ы░ХьХД
//   ы░▒ьЧФыУЬъ░А TestAirRingL1ьЭД ъ╖╕ыМАыбЬ ьЮмэШД (X 0.6тЖТ0.47, с╣Б_da 0.156, ьЧ┤эТН 51┬░C).
function makeAirTestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `air${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},

      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  const drum = mk(0, 'drum', 720, 500, 'Drum ┬╖ air-test',
    { m_cl_dry: 3.0, c_p_cl: 1500, A_eff: 10, h_a: 50, A_drum: 0.15, K_drum: 30, X0: 0.6, Tcl0: 298.15 });
  const fan = mk(2, 'fan', 120, 100, 'Fan ┬╖ air-test',
    { D2: 0.15, b2: 0.04, Z: 40, beta2: 150, eta_h: 0.78, eta_mech: 0.95, N: 3000 });
  const filt = mk(1, 'filter', 340, 500, 'Filter ┬╖ air-test',
    { A_face: 0.05, r_pleat: 1.0, theta_face: 0, K: 20 });
  const evap = mk(3, 'evaporator_off_design', 500, 100, 'Evap ┬╖ air-test',
    { T_evap_C: 10, BF: 0.2, A_face: 0.05, K_air: 50 });
  const cond = mk(4, 'condenser_off_design', 880, 100, 'Cond ┬╖ air-test',
    { T_cond_C: 60, BF: 0.2, A_face: 0.05, K_air: 50 });
  const blocks = [drum, filt, fan, evap, cond];
  const edge = (from, to, fside, tside) => ({
    from: { blockId: from.id, side: fside, slot: 2 },
    to: { blockId: to.id, side: tside, slot: 2 },
    kind: 'air',
    signals: autoMapSignals(from, to),
    lineParams: defaultLineParams('air'),
    cornerRadius: 8, routeMode: 'auto',
  });
  // ъ│╡ъ╕░ эЭРыжД ызБ: DrumтЖТFilterтЖТFanтЖТEvapтЖТCondтЖТDrum (эХДэД░=ыж░эК╕ эХДэД░, ыУЬыЯ╝ ьзБэЫД)
  const connections = [
    edge(drum, filt, 'left', 'right'),
    edge(filt, fan, 'left', 'left'),
    edge(fan, evap, 'right', 'left'),
    edge(evap, cond, 'right', 'left'),
    edge(cond, drum, 'right', 'right'),
  ];
  return { blocks, connections };
}

// makeCoupledTestRing тАФ ыГЙызд closed + ъ│╡ъ╕░ closed ъ▓░эХй эЕМьКдэК╕ ызБ (эШДьЛд ы░░ь╣Ш).
//   ыГЙызд ызБ: CompтЖТCondтЖТEEVтЖТEvapтЖТComp (slot 0).  ъ│╡ъ╕░ ызБ: DrumтЖТFilterтЖТEvapтЖТCondтЖТFanтЖТDrum (slot 2).
//   Evap┬╖Cond = ъ│╡ьЬа merged HX (ыГЙызд=ьГБ/эХШ эПмэК╕, ъ│╡ъ╕░=ьвМ/ьЪ░ эПмэК╕). drum ъ▓АьжЭъ░Т тЖТ SMER ~2.435.
function makeCoupledTestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `cpl${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},
      outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  // ыГЙызд ьаДьЪй (EEV ьЬД ьдСьХЩ, Compressor ьХДыЮШ ьдСьХЩ)
  const eev = mk(0, 'eev_off_design', 580, 120, 'EEV',
    { A_orifice: 0.55, Cv_rated: 0.7, c0: 0, c1: 0.5, c2: 0.3, c3: 0.2 }, { opening: 50 });
  const comp = mk(1, 'compressor_theoretical', 580, 600, 'Compressor',
    { V_disp: 10, eta_vol: 0.85, eta_isen: 0.65 }, { N: 3000 });
  // ъ│╡ьЬа merged HX (ыГЙызд+ъ│╡ъ╕░ эММыЭ╝ып╕эД░ ыСШ ыЛд тАФ ь╗дэФМыУЬ ьГЭьД▒ъ╕░ыКФ K_air=300 ъ│аьаХ ьВмьЪй)
  const evap = mk(2, 'evaporator_off_design', 400, 360, 'Evaporator',
    { UA_2ph: 25, UA_SH: 4, dP_ref: 0.02, BF: 0.2, A_face: 0.05, K_air: 50, T_evap_C: 10 },
    { T_air_in: 50, RH_air_in: 90, V_air_CMM: 2.54, P_evap: 5.51, m_dot_ref: 0.00458 });
  const cond = mk(3, 'condenser_off_design', 760, 360, 'Condenser',
    { UA_deSH: 8, UA_2ph: 50, UA_SC: 5, dP_ref: 0.03, BF: 0.2, A_face: 0.05, K_air: 50, T_cond_C: 60 },
    { T_air_in: 35, RH_air_in: 50, V_air_CMM: 25.42, P_cond: 19.07, m_dot_ref: 0.00458 });
  // ъ│╡ъ╕░ ьаДьЪй (Filter ьвМыЛи, Fan ьЪ░ыЛи, Drum эХШыЛи ьдСьХЩ)
  const filt = mk(4, 'filter', 100, 360, 'Filter', { A_face: 0.05, r_pleat: 1.0, theta_face: 0, K: 20 });
  const fan = mk(5, 'fan', 1060, 360, 'Fan',
    { D2: 0.15, b2: 0.04, Z: 40, beta2: 150, eta_h: 0.78, eta_mech: 0.95, N: 3000 });
  const drum = mk(6, 'drum', 580, 820, 'Drum',
    { m_cl_dry: 3.0, c_p_cl: 1500, A_eff: 10, h_a: 50, A_drum: 0.15, K_drum: 30, X0: 0.6, Tcl0: 305.0 });
  const blocks = [eev, comp, evap, cond, filt, fan, drum];
  const redge = (from, to, fs, ts2) => ({
    from: { blockId: from.id, side: fs, slot: 0 }, to: { blockId: to.id, side: ts2, slot: 0 },
    kind: 'refrigerant', signals: autoMapSignals(from, to), lineParams: defaultLineParams('refrigerant'),
    cornerRadius: 8, routeMode: 'auto',
  });
  const aedge = (from, to, fs, ts2) => ({
    from: { blockId: from.id, side: fs, slot: 2 }, to: { blockId: to.id, side: ts2, slot: 2 },
    kind: 'air', signals: autoMapSignals(from, to), lineParams: defaultLineParams('air'),
    cornerRadius: 8, routeMode: 'auto',
  });
  const connections = [
    // ыГЙызд ызБ: CompтЖТCondтЖТEEVтЖТEvapтЖТComp (HXыКФ ьГБ/эХШ эПмэК╕)
    redge(comp, cond, 'right', 'bottom'),
    redge(cond, eev, 'top', 'right'),
    redge(eev, evap, 'left', 'top'),
    redge(evap, comp, 'bottom', 'left'),
    // ъ│╡ъ╕░ ызБ: DrumтЖТFilterтЖТEvapтЖТCondтЖТFanтЖТDrum (HXыКФ ьвМ/ьЪ░ эПмэК╕, Evap┬╖Cond ъ│╡ьЬа)
    aedge(drum, filt, 'left', 'bottom'),
    aedge(filt, evap, 'right', 'left'),
    aedge(evap, cond, 'right', 'left'),
    aedge(cond, fan, 'right', 'left'),
    aedge(fan, drum, 'bottom', 'right'),
  ];
  return { blocks, connections };
}
function AirCyclePlot({ traj }) {
  if (!traj || !Array.isArray(traj.time) || !traj.time.length
      || !Array.isArray(traj.T_cond_out_C) || !Array.isArray(traj.X)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">ъ╢дьаБ ыН░ьЭ┤эД░ ьЧЖьЭМ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const temps = [...traj.T_cond_out_C, ...(traj.T_drum_out_C || []), ...(traj.T_evap_out_C || [])];
  const tMax = Math.max(20, Math.ceil(Math.max(...temps) / 10) * 10);
  const xMax = Math.max(0.1, Math.ceil(Math.max(...traj.X) * 10) / 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syT = v => y0 - (v / tMax) * (y0 - y1);
  const syX = v => y0 - (v / xMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const tTicks = [], xTicks = [], xtTicks = [];
  const tStep = Math.max(10, Math.round(tMax / 6 / 10) * 10);
  for (let p = 0; p <= tMax + 1e-9; p += tStep) tTicks.push(p);
  for (let k = 0; k <= 5; k++) xTicks.push((xMax / 5) * k);
  for (let k = 0; k <= 6; k++) xtTicks.push((tmax / 6) * k);
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {tTicks.map(p => (
        <g key={'t' + p}>
          <line x1={x0} y1={syT(p)} x2={x1} y2={syT(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syT(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {xTicks.map((k, i) => (<text key={'x' + i} x={x1 + 6} y={syX(k) + 3} textAnchor="start" {...TK}>{k.toFixed(2)}</text>))}
      {xtTicks.map((sv, i) => (<text key={'xt' + i} x={sx(sv)} y={y0 + 14} textAnchor="middle" {...TK}>{sv.toFixed(0)}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>┬░C</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0891B2', fontFamily: 'JetBrains Mono, monospace' }}>X</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      {Array.isArray(traj.T_drum_out_C) && <path d={mkPath(traj.T_drum_out_C, syT)} fill="none" stroke="#64748B" strokeWidth="2" strokeLinejoin="round" />}
      {Array.isArray(traj.T_evap_out_C) && <path d={mkPath(traj.T_evap_out_C, syT)} fill="none" stroke="#2563EB" strokeWidth="2" strokeLinejoin="round" />}
      <path d={mkPath(traj.T_cond_out_C, syT)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.X, syX)} fill="none" stroke="#0891B2" strokeWidth="2.2" strokeDasharray="5 3" strokeLinejoin="round" />
    </svg>
  );
}

// AirCycleRunnerBody тАФ ъ│╡ъ╕░ ызБ ь╢Фь╢Ь┬╖ьЛдэЦЙ┬╖ъ▓░ъ│╝ (CycleRunnerModal ьХИьЧРьДЬ domain='air'ьЭ╝ ыХМ)
function AirCycleRunnerBody({ blocks, connections, url, modelica, onLoadAirTestRing }) {
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [detected, setDetected] = useState(null);
  const [stopTime, setStopTime] = useState('300');

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `ыбЬь╗м ьДЬы▓ДьЧР ${path} ъ░А ьЧЖьЭМ (${detail}). git pull эЫД python server.py ьЮмьЛЬьЮС эХДьЪФ.`
      : `ьДЬы▓Д ьЭСыЛ╡ ьШдыеШ: ${detail}`;
  };

  const runAir = async (blk, conn) => {
    const useBlocks = blk || blocks;
    const useConns = conn || connections;
    setRunning(true); setError(null); setResult(null); setDetected(null);
    const topo = extractAirTopology(useBlocks, useConns);
    if (topo.error) { setError(topo.error); setRunning(false); return; }
    setDetected(topo.ringLabels);
    try {
      const r = await fetch(`${url}/run_air_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topology: topo, settings: { stop_time: parseFloat(stopTime) || 300, tolerance: 1e-6, intervals: 300 } }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_air_cycle')); setRunning(false); return; }
      const data = await r.json();
      if (data.error) { setError(data.error); setRunning(false); return; }
      if (!data.trajectory || !Array.isArray(data.trajectory.X) || !data.trajectory.X.length) {
        setError('ъ▓░ъ│╝ьЧР ъ╢дьаБьЭ┤ ьЧЖьЭМ тАФ ьДЬы▓Д ы▓ДьаД эЩХьЭ╕ (git pull эЫД python server.py ьЮмьЛЬьЮС).'); setRunning(false); return;
      }
      setResult({ settled: data.settled || {}, trajectory: data.trajectory });
    } catch (e) { setError(`ьЪФь▓н ьЛдэМи: ${e.message}`); }
    setRunning(false);
  };

  const AIR_CARDS = [
    { k: 'X', n: 'эХиьИШьЬи X', u: 'kg/kg', d: 3, c: 'text-cyan-700' },
    { k: 'm_evap', n: 'с╣Б ьжЭы░Ь(ыУЬыЯ╝)', u: 'g/s', d: 2, c: 'text-blue-600', scale: 1000 },
    { k: 'm_cond', n: 'с╣Б ьаЬьК╡(ьжЭы░Ьъ╕░)', u: 'g/s', d: 2, c: 'text-teal-600', scale: 1000 },
    { k: 'mdot_da', n: 'ъ▒┤ьб░ъ│╡ъ╕░ эТНыЯЙ', u: 'kg/s', d: 3, c: 'text-violet-600' },
    { k: 'T_cond_out_C', n: 'ьЧ┤эТН(ыУЬыЯ╝ьЮЕъ╡м)', u: '┬░C', d: 1, c: 'text-red-600' },
    { k: 'T_evap_out_C', n: 'ьжЭы░Ьъ╕░ь╢Ьъ╡м', u: '┬░C', d: 1, c: 'text-sky-600' },
    { k: 'fan_dp', n: 'эМм ьаХьХХьГБьК╣', u: 'Pa', d: 0, c: 'text-amber-600' },
    { k: 'Q_latent', n: 'ьаЬьК╡ ьЮаьЧ┤', u: 'W', d: 0, c: 'text-teal-600' },
  ];
  const s = result?.settled || {};
  const valOf = {
    Drum: ('X' in s) ? `X ${s.X.toFixed(3)}` : 'эХиьИШьЬи',
    Filter: ('filter_dp' in s) ? `${s.filter_dp.toFixed(0)} Pa` : 'ьЧмъ│╝',
    Fan: ('fan_dp' in s) ? `${s.fan_dp.toFixed(0)} Pa` : '╬Фp',
    Evap: ('T_evap_out_C' in s) ? `${s.T_evap_out_C.toFixed(1)}┬░C` : 'ьаЬьК╡',
    Cond: ('T_cond_out_C' in s) ? `${s.T_cond_out_C.toFixed(1)}┬░C` : 'ьЧ┤эТН',
  };
  const iconOf = { Drum: 'ЁЯз║', Filter: 'ЁЯз╜', Fan: 'ЁЯМм', Evap: 'тЭД', Cond: 'тЩи' };
  const gradOf = {
    Drum: 'from-cyan-700 to-cyan-500', Filter: 'from-slate-500 to-slate-400',
    Fan: 'from-sky-600 to-sky-400', Evap: 'from-blue-600 to-blue-400', Cond: 'from-amber-600 to-amber-400',
  };
  const ringLabels = (detected && detected.length) ? detected : ['Drum', 'Filter', 'Fan', 'Evap', 'Cond'];
  const NODES = ringLabels.map(lbl => [iconOf[lbl] || 'тЦк', lbl, valOf[lbl] || '', gradOf[lbl] || 'from-slate-500 to-slate-400']);

  if (!modelica.available) {
    return (
      <div className="p-6 text-center text-slate-500 text-sm">
        <div className="text-2xl mb-2">тЪая╕П</div>
        <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local ы░▒ьЧФыУЬ(omc) ьЧ░ъ▓░ эХДьЪФ'}</div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      {/* controls */}
      <div className="flex items-end gap-4 flex-wrap">
        <div className="flex flex-col gap-1.5">
          <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">ьЛЬыом ьДдьаХ</label>
          <div className="flex gap-2 items-end">
            <label className="flex flex-col gap-1">

// CoupledCycleRunnerBody тАФ ыГЙызд-ъ│╡ъ╕░ ь╗дэФМыУЬ ьВмьЭ┤эБ┤
//   [ъ│аьаХ] HPWDcpl.Cycle_coupled_* ьЛдэЦЙ  |  [ь║Фы▓ДьКд] ъ╖╕ыж░ ыГЙыздызБ+ъ│╡ъ╕░ызБ ь╢Фь╢Ь тЖТ ь╗дэФМыУЬ .mo ьГЭьД▒┬╖ьЛдэЦЙ
//   evap/cond merged HXыбЬ ыСР ызБ ыПЩьЛЬ ъ▓░эХй. ыГЙызд+ъ│╡ъ╕░ KPI+SMER, CyclePlot(ыГЙызд) ьЮмьВмьЪй.
function CoupledCycleRunnerBody({ url, modelica, blocks, connections, onLoadCoupledTestRing }) {
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('canvas');        // 'fixed' | 'canvas'
  const [model, setModel] = useState('Cycle_coupled_closed');
  const [stopTime, setStopTime] = useState('180');
  const [genMo, setGenMo] = useState(null);
  const [showMo, setShowMo] = useState(false);

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `ыбЬь╗м ьДЬы▓ДьЧР ${path} ъ░А ьЧЖьЭМ (${detail}). git pull эЫД python server.py ьЮмьЛЬьЮС эХДьЪФ.`
      : `ьДЬы▓Д ьЭСыЛ╡ ьШдыеШ: ${detail}`;
  };

  const _consume = async (r, path) => {
    if (!r.ok) { setError(await _fetchErr(r, path)); return false; }
    const data = await r.json();
    if (data.error) { setError(data.error); return false; }
    if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
      setError('ъ▓░ъ│╝ьЧР ъ╢дьаБьЭ┤ ьЧЖьЭМ тАФ ьДЬы▓Д ы▓ДьаД эЩХьЭ╕ (git pull эЫД python server.py ьЮмьЛЬьЮС).'); return false;
    }
    setResult({ settled: data.settled || {}, trajectory: data.trajectory, meta: data.meta || {} });
    if (data.generated_mo) setGenMo(data.generated_mo);
    return true;
  };

  // [ъ│аьаХ] ъ▓АьжЭыРЬ named ыкиыН╕ ьЛдэЦЙ
  const runFixed = async () => {
    setRunning(true); setError(null); setResult(null); setGenMo(null);
    try {
      const r = await fetch(`${url}/run_coupled_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, stop_time: parseFloat(stopTime) || 180, tolerance: 1e-6, intervals: 300 }),
      });
      await _consume(r, '/run_coupled_cycle');
    } catch (e) { setError(`ьЪФь▓н ьЛдэМи: ${e.message}`); }
    setRunning(false);
  };

  // [ь║Фы▓ДьКд] ыГЙызд ызБ + ъ│╡ъ╕░ ызБ ь╢Фь╢Ь тЖТ ъ│╡ьЬаHX ъ▓АьжЭ тЖТ ь╗дэФМыУЬ .mo ьГЭьД▒┬╖ьЛдэЦЙ
  const runCanvas = async (blk, conn) => {
    const useB = Array.isArray(blk) ? blk : blocks;
    const useC = Array.isArray(conn) ? conn : connections;

    const refTopo = extractCycleTopology(useB, useC);
    if (refTopo.error) { setError('ыГЙызд ызБ тАФ ' + refTopo.error); return; }
    const airTopo = extractAirTopology(useB, useC);
    if (airTopo.error) { setError('ъ│╡ъ╕░ ызБ тАФ ' + airTopo.error); return; }
    const rK = new Set(refTopo.components.map(c => c.kind));
    const aK = new Set(airTopo.components.map(c => c.kind));
    if (!rK.has('evaporator') || !aK.has('evaporator') || !rK.has('condenser') || !aK.has('condenser')) {
      setError('Evap┬╖Condъ░А ыГЙызд ызБъ│╝ ъ│╡ъ╕░ ызБ ьЦСьк╜ьЧР ьЧ░ъ▓░ыП╝ьХ╝ эХи тАФ ыСР ызБьЭ┤ ъ│╡ьЬаэХШыКФ merged HXьЮД. (ьжЭы░Ь/ьЭСь╢Хъ╕░ьЧР ыГЙызд ьЧ░ъ▓░ + ъ│╡ъ╕░ ьЧ░ъ▓░ьЭД ыкиыСР ъ╖╕ыадьХ╝ эХи)');
      return;
    }
    setRunning(true);
    try {
      const r = await fetch(`${url}/run_canvas_coupled_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ref_topology: refTopo, air_topology: airTopo,
          settings: { stop_time: parseFloat(stopTime) || 180, tolerance: 1e-6, intervals: 300 },
        }),
      });
      await _consume(r, '/run_canvas_coupled_cycle');
    } catch (e) { setError(`ьЪФь▓н ьЛдэМи: ${e.message}`); }
    setRunning(false);
  };

  const s = result?.settled || {};
  const fmt = (k, d, scale = 1) => (k in s && s[k] != null) ? (s[k] * scale).toFixed(d) : 'тАФ';
  const CARDS = [
    { k: 'Pc_bar', n: 'Pc ьЭСь╢Х', u: 'bar', d: 2, c: 'text-red-600', grp: 'ыГЙызд' },
    { k: 'Pe_bar', n: 'Pe ьжЭы░Ь', u: 'bar', d: 2, c: 'text-blue-600', grp: 'ыГЙызд' },
    { k: 'W', n: 'W ьХХь╢ХыПЩыае', u: 'W', d: 0, c: 'text-amber-600', grp: 'ыГЙызд' },
    { k: 'SH_evap', n: 'SH ъ│╝ьЧ┤ыПД', u: 'K', d: 2, c: 'text-teal-600', grp: 'ыГЙызд' },
    { k: 'X', n: 'эХиьИШьЬи X', u: 'kg/kg', d: 3, c: 'text-cyan-700', grp: 'ъ│╡ъ╕░' },
    { k: 'm_evap', n: 'с╣Б ьаЬьК╡', u: 'g/s', d: 2, c: 'text-blue-600', scale: 1000, grp: 'ъ│╡ъ╕░' },
    { k: 'T_cond_air_C', n: 'ьЧ┤эТН(ыУЬыЯ╝ьЮЕъ╡м)', u: '┬░C', d: 1, c: 'text-red-600', grp: 'ъ│╡ъ╕░' },
    { k: 'mdot_da', n: 'эТНыЯЙ', u: 'kg/s', d: 3, c: 'text-violet-600', grp: 'ъ│╡ъ╕░' },
  ];

  const Loop = ({ label, color, nodes }) => (

        <React.Fragment key={n}>
          <span className={`px-2 py-1 rounded font-bold ${(n === 'Cond' || n === 'Evap')
            ? 'bg-cyan-100 text-cyan-800 ring-1 ring-cyan-300' : 'bg-white text-slate-600 border border-slate-200'}`}>{n}</span>
          {i < nodes.length - 1 && <span className="text-slate-300">тЖТ</span>}
        </React.Fragment>
      ))}
      <span className="text-slate-400 font-bold">тЖ╗</span>
    </div>
  );

  if (!modelica.available) {
    return (
      <div className="p-6 text-center text-slate-500 text-sm">
        <div className="text-2xl mb-2">тЪая╕П</div>
        <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local ы░▒ьЧФыУЬ(omc) ьЧ░ъ▓░ эХДьЪФ'}</div>
      </div>
    );
  }

  const detectedRef = result?.meta?.ref_ring, detectedAir = result?.meta?.air_ring;

  return (
    <div className="space-y-4">
      {/* mode toggle */}
      <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
        {[['canvas', 'ь║Фы▓ДьКдьЧРьДЬ ь╢Фь╢Ь', 'ъ╖╕ыж░ ыСР ызБ тЖТ .mo ьГЭьД▒'], ['fixed', 'ъ│аьаХ ыкиыН╕', 'ъ▓АьжЭыРЬ named ыкиыН╕']].map(([m, lbl, sub]) => (
          <button key={m} onClick={() => { setMode(m); setError(null); }} disabled={running}
            className={`px-4 py-2 text-sm font-semibold transition text-left ${mode === m ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
            {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
          </button>
        ))}
      </div>

      {/* controls */}
      <div className="flex items-end gap-4 flex-wrap">
        {mode === 'fixed' && (
          <div className="flex flex-col gap-1.5">
            <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">ь╗дэФМыУЬ ыкиыН╕</label>
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
              {[['Cycle_coupled_closed', 'эПРыгиэФД', 'drum ъ▒┤ьб░ + fan ьИЬэЩШ'], ['Cycle_coupled_open', 'open', 'ъ│╡ъ╕░ьЬаыЯЙ prescribed']].map(([m, lbl, sub]) => (
                <button key={m} onClick={() => setModel(m)} disabled={running}
                  className={`px-3.5 py-2 text-sm font-semibold transition text-left ${model === m ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
                  {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        <div className="flex flex-col gap-1.5">
          <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">ьЛЬыом ьДдьаХ</label>
          <div className="flex gap-2 items-end">
            <label className="flex flex-col gap-1">
              <span className="font-mono text-[10px] text-slate-400">stop [s]</span>
              <input type="number" value={stopTime} disabled={running} onChange={(e) => setStopTime(e.target.value)}
                className="w-24 bg-white border border-slate-200 rounded px-2 py-1.5 text-sm font-mono text-slate-700 focus:border-cyan-400 outline-none" />
            </label>
            <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2 text-xs font-mono text-slate-600">dassl ┬╖ tol 1e-6</span>
          </div>
        </div>
        <div className="ml-auto flex items-center gap-2">
          {mode === 'canvas' && onLoadCoupledTestRing && (

              className="inline-flex items-center gap-2 bg-white border border-cyan-300 text-cyan-700 hover:bg-cyan-50 disabled:opacity-60 rounded-xl px-4 py-2.5 font-bold text-sm transition">
              ЁЯзк эЕМьКдэК╕ ызБ ъ╡мь╢Х & ьЛдэЦЙ
            </button>

          <button onClick={() => (mode === 'canvas' ? runCanvas() : runFixed())} disabled={running}

              : (mode === 'canvas' ? 'тЦ╢ ь║Фы▓ДьКд ь╢Фь╢Ь + Run' : 'тЦ╢ Run ь╗дэФМыУЬ ьВмьЭ┤эБ┤')}

        <div className="text-[10px] font-mono text-cyan-600 text-center pt-0.5">тЖХ Evap ┬╖ Cond = merged HX (ыГЙызд┬╖ъ│╡ъ╕░ ъ▓░эХйьаР, ь╜ФьЭ╝ьШиыПД ьГБэШ╕ъ▓░ьаХ){detectedRef ? ' ┬╖ ь║Фы▓ДьКдьЧРьДЬ ь╢Фь╢ЬыРи' : ''}</div>
      </div>

function CycleRunnerModal({ onClose, blocks, connections, onLoadTestRing, onLoadAirTestRing, onLoadCoupledTestRing }) {
  const [domain, setDomain] = useState('refrigerant'); // 'refrigerant' | 'air'
  const [mode, setMode] = useState('fixed');          // 'fixed' | 'canvas'
  const [model, setModel] = useState('Cycle_L1_ramp');
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);   // {settled, trajectory}
  const [error, setError] = useState(null);
  const [detected, setDetected] = useState(null);     // ъ░РьзАыРЬ ызБ ыЭ╝ы▓и
  // ъ╕░ыПЩ┬╖ь┤Иъ╕░эЩФ ьДдьаХ (ь║Фы▓ДьКд ыкиыУЬ)
  const [chargeG, setChargeG] = useState('89');
  const [pRest, setPRest] = useState('9');
  const [tRamp, setTRamp] = useState('20');

  const status = window.HPWD_BACKEND || {};
  const modelica = status.modelica || { available: false, reason: null, cycles: [] };
  const url = status.url || '';

  const _applyResult = (data) => {
    if (data.error) { setError(data.error); return; }
    if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
      setError('ъ▓░ъ│╝ьЧР ъ╢дьаБьЭ┤ ьЧЖьЭМ тАФ ьДЬы▓Д ы▓ДьаД эЩХьЭ╕ (git pull эЫД python server.py ьЮмьЛЬьЮС).'); return;
    }
    setResult({ settled: data.settled || {}, trajectory: data.trajectory });
  };

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `ыбЬь╗м ьДЬы▓ДьЧР ${path} ъ░А ьЧЖьЭМ (${detail}). git pull эЫД python server.py ьЮмьЛЬьЮС эХДьЪФ.`
      : `ьДЬы▓Д ьЭСыЛ╡ ьШдыеШ: ${detail}`;
  };

  const runCycle = async () => {
    setRunning(true); setError(null); setResult(null); setDetected(null);
    try {
      const r = await fetch(`${url}/run_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, stop_time: 120, tolerance: 1e-6, intervals: 240 }),

    setDetected(topo.ringLabels);

        method: 'POST', headers: { 'Content-Type': 'application/json' },

      if (!r.ok) { setError(await _fetchErr(r, '/run_canvas_cycle')); setRunning(false); return; }

          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none px-2">├Ч</button>
        </div>

        {!modelica.available ? (
          <div className="p-10 text-center text-slate-500 text-sm">
            <div className="text-3xl mb-3">тЪая╕П</div>
            <div className="font-semibold text-slate-700 mb-1.5">Modelica ьЧФьзДьЭ┤ эХДьЪФэХйыЛИыЛд</div>
            <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local ы░▒ьЧФыУЬ(omc) ьЧ░ъ▓░ эХДьЪФ'}</div>
          </div>
        ) : (
          <div className="p-5 space-y-4">
            {/* ьВмьЭ┤эБ┤ ыПДыйФьЭ╕ эЖаъ╕А: ыГЙызд / ъ│╡ъ╕░ */}

                      <div key={c.k} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                        <div className="text-[11px] font-medium text-slate-400 mb-1">{c.n}</div>
                        <div className={`font-mono text-xl font-bold leading-none ${c.c}`}>
                          {(s[c.k] * (c.scale || 1)).toFixed(c.d)}
                          <span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{c.u}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">ъ╕░ыПЩ ъ│╝ыПД тЖТ ьаХь░й ъ╢дьаБ</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
                    <span className="inline-flex items-center gap-1.5 text-slate-400"><i className="w-3 h-0.5 rounded bg-slate-400 inline-block" />ramp ыБЭ 20s</span>
                  </div>
                  <CyclePlot traj={result.trajectory} />
                </div>
              </>
            )}
            </>)}
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================================
// CyclePlotL2 тАФ L2 ъ╢дьаБ ь░иэК╕ (Pc/Pe[bar] + SH[K]); tmaxыКФ ыН░ьЭ┤эД░ьДЬ ыПДь╢Ь
//   L1 CyclePlotьЭА tmax=120 + rampьДа эХШыУЬь╜ФыФй тЖТ L2 ь╗дэФМыУЬ(300s)ьЪйьЬ╝ыбЬ ы╢Дыжм.
// =============================================================
function CyclePlotL2({ traj }) {
  if (!traj || !Array.isArray(traj.Pc_bar) || !traj.Pc_bar.length
      || !Array.isArray(traj.Pe_bar) || !Array.isArray(traj.SH_evap) || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">ъ╢дьаБ ыН░ьЭ┤эД░ ьЧЖьЭМ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const pAll = [...traj.Pc_bar, ...traj.Pe_bar];
  const pMax = Math.max(5, Math.ceil(Math.max(...pAll) / 5) * 5);
  const shMax = Math.max(10, Math.ceil(Math.max(...traj.SH_evap) / 10) * 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syP = v => y0 - (v / pMax) * (y0 - y1);
  const syS = v => y0 - (v / shMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const pTicks = [], shTicks = [], xTicks = [];
  for (let p = 0; p <= pMax; p += 5) pTicks.push(p);
  for (let k = 0; k <= shMax; k += 10) shTicks.push(k);
  const xstep = tmax <= 130 ? 20 : (tmax <= 400 ? 60 : 120);
  for (let sct = 0; sct <= tmax + 0.5; sct += xstep) xTicks.push(Math.round(sct));
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {pTicks.map(p => (
        <g key={'p' + p}>
          <line x1={x0} y1={syP(p)} x2={x1} y2={syP(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syP(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {shTicks.map(k => (<text key={'s' + k} x={x1 + 6} y={syS(k) + 3} textAnchor="start" {...TK}>{k}</text>))}
      {xTicks.map(sct => (<text key={'x' + sct} x={sx(sct)} y={y0 + 14} textAnchor="middle" {...TK}>{sct}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>bar</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0D9488', fontFamily: 'JetBrains Mono, monospace' }}>K (SH)</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      <path d={mkPath(traj.Pc_bar, syP)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.Pe_bar, syP)} fill="none" stroke="#2563EB" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.SH_evap, syS)} fill="none" stroke="#0D9488" strokeWidth="2.2" strokeLinejoin="round" />
    </svg>
  );
}

// =============================================================
// CycleRunnerModalL2 тАФ ьаДь▓┤ L2(SEMI) эПРыгиэФД ьЛдэЦЙ (/run_cycle_l2)

  ],
  coupled: [
    { m: 'Cycle_SEMI_full', lbl: 'эТА SEMI', stop: 300,
      desc: 'ыГЙызд┬╖ъ│╡ъ╕░ ьаД SEMI. ь╜ФьЭ╝ьШиыПД ьГБэШ╕ъ▓░ьаХ + Drum_L2 ьаЬьК╡ тЖТ SMER. (CondenserSS_cpl + EvaporatorMBdyn_cpl + Fan_L2 + Drum_L2 эПРъ│╡ъ╕░ыгиэФД)' },
    { m: 'Cycle_coupled_closed_L2air', lbl: 'L1ыГЙызд + L2ъ│╡ъ╕░', stop: 180,
      desc: 'L1 ыГЙыздь╗дэФМ HX (Cond/Evap_coupled) + L2 ъ│╡ъ╕░ыгиэФД (Fan_L2 ьЖРьЛды╢ДэХ┤ + Drum_L2 ъ░Рыеа┬╖эЭбь░й) + PI SHьаЬьЦ┤.' },
  ],
};

function CycleRunnerModalL2({ onClose }) {
  const [domain, setDomain] = useState('refrigerant'); // 'refrigerant' | 'coupled'

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `ыбЬь╗м ьДЬы▓ДьЧР ${path} ъ░А ьЧЖьЭМ (${detail}). git pull эЫД python server.py ьЮмьЛЬьЮС эХДьЪФ.`
      : `ьДЬы▓Д ьЭСыЛ╡ ьШдыеШ: ${detail}`;
  };

  const runCycle = async () => {
    setRunning(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${url}/run_cycle_l2`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: cur.m, stop_time: cur.stop, tolerance: 1e-6, intervals: null }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_cycle_l2')); setRunning(false); return; }
      const data = await r.json();
      if (data.error) { setError(data.error); setRunning(false); return; }
      if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
        setError('ъ▓░ъ│╝ьЧР ъ╢дьаБьЭ┤ ьЧЖьЭМ тАФ ьДЬы▓Д ы▓ДьаД эЩХьЭ╕ (git pull эЫД python server.py ьЮмьЛЬьЮС).'); setRunning(false); return;
      }
      setResult({ settled: data.settled || {}, trajectory: data.trajectory, model: data.model, stop_time: data.stop_time });

    { k: 'mdot', n: 'с╣Б ьХХь╢Хъ╕░', u: 'g/s', d: 2, c: 'text-violet-600', scale: 1000 },
    { k: 'SH_evap', n: 'SH ъ│╝ьЧ┤ыПД', u: 'K', d: 2, c: 'text-teal-600' },
    { k: 'W', n: 'W ьЖМьЪФыПЩыае', u: 'W', d: 1, c: 'text-amber-600' },
    { k: 'SMER', n: 'SMER', u: 'kg/kWh', d: 2, c: 'text-emerald-600' },
    { k: 'condensate', n: 'ьЭСь╢ХьИШьЬи', u: 'g/s', d: 2, c: 'text-cyan-600', scale: 1000 },
    { k: 'X', n: 'ьЭШыеШ эХиьИШьЬи', u: '', d: 3, c: 'text-sky-600' },
    { k: 'Q_cond', n: 'Q ьЭСь╢Х', u: 'W', d: 0, c: 'text-orange-600' },
    { k: 'Q_evap', n: 'Q ьжЭы░Ь', u: 'W', d: 0, c: 'text-indigo-600' },
    { k: 'T_cond_air_C', n: 'ьЧ┤эТН(ьЭСь╢ХэЫД)', u: '┬░C', d: 1, c: 'text-rose-600' },
    { k: 'opening', n: 'EEV ъ░ЬыПД', u: '%', d: 0, c: 'text-slate-600' },
  ];
  const s = result?.settled || {};
  const isCoupled = domain === 'coupled';
  const NODES = [
    ['ЁЯМА', 'Compressor', running ? 'тАж' : 'Winandy', 'from-blue-600 to-blue-400'],
    ['тЩи', 'Condenser', ('Pc_bar' in s) ? `${s.Pc_bar.toFixed(2)} bar` : 'тАФ bar', 'from-amber-600 to-amber-400'],
    ['ЁЯФ╗', 'EEV', ('opening' in s) ? `${s.opening.toFixed(0)}% ъ░ЬыПД` : 'ъ░ЬыПД', 'from-red-600 to-red-400'],
    ['тЭД', 'Evaporator', ('Pe_bar' in s) ? `${s.Pe_bar.toFixed(2)} bar` : 'тАФ bar', 'from-teal-600 to-teal-400'],
  ];

  return (

          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none px-2">├Ч</button>
        </div>

        {!modelica.available ? (
          <div className="p-10 text-center text-slate-500 text-sm">

            <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local ы░▒ьЧФыУЬ(omc) ьЧ░ъ▓░ эХДьЪФ'}</div>

        ) : (
          <div className="p-5 space-y-4">
            {/* ыПДыйФьЭ╕ эЖаъ╕А: ыГЙызд / ь╗дэФМыУЬ */}
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
              {[['refrigerant', 'ыГЙызд ьВмьЭ┤эБ┤', 'Comp┬╖Cond┬╖EEV┬╖Evap'], ['coupled', 'ь╗дэФМыУЬ', 'ыГЙызд тЯ╖ ъ│╡ъ╕░ + SMER']].map(([d, lbl, sub]) => (
                <button key={d} onClick={() => { setDomain(d); setModel(L2_CYCLE_MODELS[d][0].m); setResult(null); setError(null); }} disabled={running}
                  className={`px-4 py-2 text-sm font-bold transition text-left ${domain === d ? 'bg-white text-indigo-700 shadow-[inset_0_-2px_0_0_#4F46E5]' : 'text-slate-500 hover:text-slate-700'}`}>

                    </button>

              </div>
              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">ьЛЬыом ьДдьаХ</label>
                <div className="flex gap-2 text-xs font-mono text-slate-600">
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">stop <b className="text-slate-800">{cur.stop}</b>s</span>
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">dassl</span>
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">1s ьКдэЕЭ</span>

                {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> ьЛдэЦЙ ьдСтАж</>) : 'тЦ╢ Run Cycle'}

                        <div className={`font-mono text-xl font-bold leading-none ${c.c}`}>
                          {(s[c.k] * (c.scale || 1)).toFixed(c.d)}
                          <span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{c.u}</span>

                    ))}
                  </div>

                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">ъ╕░ыПЩ ъ│╝ыПД тЖТ ьаХь░й ъ╢дьаБ</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">

        )}
      </div>
    </div>
  );
}

// =============================================================
// AirPlotFlex тАФ ъ│╡ъ╕░ ьВмьЭ┤эБ┤ ъ╢дьаБ (X[эХиьИШьЬи] ьвМь╢Х + ъ│╡ъ╕░ьШиыПД ьЪ░ь╢Х); tmax ыН░ьЭ┤эД░ьЬаыПД,
//   эВд ьЬаьЧ░(L1: T_*_out_C / L2: T_*_air_C ыкиыСР ьИШьЪй)
// =============================================================
function AirPlotFlex({ traj }) {
  if (!traj || !Array.isArray(traj.X) || !traj.X.length || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">ъ╢дьаБ ыН░ьЭ┤эД░ ьЧЖьЭМ</div>;
  }
  const pick = (cands) => { for (const c of cands) if (Array.isArray(traj[c]) && traj[c].length) return traj[c]; return null; };
  const tC = pick(['T_cond_air_C', 'T_cond_out_C']);
  const tE = pick(['T_evap_air_C', 'T_evap_out_C']);
  const tD = pick(['T_drum_out_C']);
  const W = 920, H = 280, mL = 44, mR = 46, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const temps = [tC, tE, tD].filter(Boolean).reduce((a, b) => a.concat(b), []);
  const tMax = temps.length ? Math.max(60, Math.ceil(Math.max(...temps) / 10) * 10) : 60;
  const xMax = Math.max(0.6, Math.ceil(Math.max(...traj.X) * 10) / 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syX = v => y0 - (v / xMax) * (y0 - y1);
  const syT = v => y0 - (v / tMax) * (y0 - y1);
  const mk = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  const xstep = tmax <= 130 ? 20 : (tmax <= 400 ? 60 : 120);
  const xticks = []; for (let sct = 0; sct <= tmax + 0.5; sct += xstep) xticks.push(Math.round(sct));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {xticks.map(sct => (<text key={'x' + sct} x={sx(sct)} y={y0 + 14} textAnchor="middle" {...TK}>{sct}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0891B2', fontFamily: 'JetBrains Mono, monospace' }}>X</text>
      <text x={x1 + 26} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 26} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#DC2626', fontFamily: 'JetBrains Mono, monospace' }}>┬░C</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      {tC && <path d={mk(tC, syT)} fill="none" stroke="#DC2626" strokeWidth="2" strokeLinejoin="round" />}
      {tD && <path d={mk(tD, syT)} fill="none" stroke="#64748B" strokeWidth="2" strokeLinejoin="round" />}
      {tE && <path d={mk(tE, syT)} fill="none" stroke="#2563EB" strokeWidth="2" strokeLinejoin="round" />}
      <path d={mk(traj.X, syX)} fill="none" stroke="#0891B2" strokeWidth="2.6" strokeLinejoin="round" />
    </svg>
  );
}

      : `ьДЬы▓Д ьЭСыЛ╡ ьШдыеШ: ${detail}`;
  };
  const _post = async (path, body, trajKey) => {
    const r = await fetch(`${url}${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

    return data;
  };

  const runCell = async () => {
    setRunning(true); setError(null); setResult(null); setDetected(null);

        const airTopo = extractAirTopology(r.blocks, r.connections);

      air: 'L1 ъ│╡ъ╕░ ызБ (DrumтЖТFanтЖТEvapтЖТCond). ь╜ФьЭ╝ьШиыПД ъ│аьаХ ъ▓╜ъ│Д. эЕМьКдэК╕ ызБ ъ╡мь╢Х эЫД ь╢Фь╢Ь┬╖ьЛдэЦЙ (/run_air_cycle).',
      coupled: 'L1 ь╗дэФМыУЬ (ыГЙызд ызБ + ъ│╡ъ╕░ ызБ, Evap┬╖Cond ъ│╡ьЬа merged HX). эЕМьКдэК╕ ызБ ъ╡мь╢Х эЫД ь╢Фь╢Ь┬╖ьЛдэЦЙ (/run_canvas_coupled_cycle).',
    },
    L2: {

      air: 'L2 ъ│╡ъ╕░ (AirRingL2 тАФ Drum_L2 ъ░Рыеа┬╖эЭбь░й + Fan_L2 ьЖРьЛды╢ДэХ┤, ь╜ФьЭ╝ ъ│аьаХьШиыПД). ь║Фы▓ДьКдьЧР ъ│╡ъ╕░ ызБ ъ╡мь╢Х эЫД ыаИэН╝ыЯ░ьКд ыкиыН╕ ьЛдэЦЙ (/run_cycle_l2).',

              </button>
            </div>

            {/* ьКдэВдыздэЛ▒ */}
            <div className="flex items-center gap-1 flex-wrap bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
              {nodes.map(([ic, nm, vv], i) => (
                <React.Fragment key={nm + i}>
                  <div className="flex flex-col items-center gap-1 min-w-[76px]">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg text-white bg-gradient-to-br ${grads[i]} shadow`}>{ic}</div>
                    <div className="text-xs font-bold text-slate-700">{nm}</div>
                    <div className="font-mono text-[10px] text-slate-400">{vv}</div>
                  </div>
                  {i < nodes.length - 1 && (<div className="flex-1 min-w-[20px] text-center text-slate-300 self-start mt-2.5"><div className="text-base leading-none">тЖТ</div></div>)}
                </React.Fragment>
              ))}
              <div className={`w-full text-center text-[10px] font-mono ${accentText} font-bold mt-1.5 opacity-80`}>
                {isAir ? 'ъ│╡ъ╕░ эПРыгиэФД (volRef = ьХХыаеьХ╡ь╗д)' : (domain === 'coupled' ? 'ыГЙызд + ъ│╡ъ╕░ эПРыгиэФД ыПЩьЛЬъ▓░эХй (Evap┬╖Cond ъ│╡ьЬа HX)' : 'ыГЙызд эПРыгиэФД (vol4 тЖТ Comp)')}
              </div>
            </div>

            {running && (<div className="text-center text-xs font-mono text-slate-400 py-1">omc ь╗┤эММьЭ╝ + ьаБы╢Д ьдСтАж {isAir ? '(ъ│╡ъ╕░ь╕б ы╣аыжД)' : (isL2 && domain === 'coupled' ? '(ь╗дэФМыУЬ stiff, ьИШьЛнь┤И~)' : '')}</div>)}
            {error && (<div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>)}

            {/* ъ▓░ъ│╝ */}
            {result && result.trajectory && (
              <>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2.5">
                    ьаХь░йъ░Т <span className={`font-mono ${accentText} normal-case`}>{result.model || `${fidelity} ┬╖ ${domain}`}</span>
                    {(result.trajectory.time && result.trajectory.time.length) ? ` ┬╖ t=${result.trajectory.time[result.trajectory.time.length - 1].toFixed(0)}s` : ''}
                  </div>
                  <div className="grid grid-cols-4 gap-2.5">
                    {visCards.map(({ def, v }) => (
                      <div key={def.n} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                        <div className="text-[11px] font-medium text-slate-400 mb-1">{def.n}</div>
                        <div className={`font-mono text-xl font-bold leading-none ${def.c}`}>
                          {v.toFixed(def.d)}<span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{def.u}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">{isAir ? 'эХиьИШьЬи + ъ│╡ъ╕░ьШиыПД ъ╢дьаБ' : 'ъ╕░ыПЩ ъ│╝ыПД тЖТ ьаХь░й ъ╢дьаБ'}</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
                    {isAir ? (<>
                      <span className="inline-flex items-center gap-1.5 text-cyan-600"><i className="w-3 h-0.5 rounded bg-cyan-600 inline-block" />эХиьИШьЬи X</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />ьЧ┤эТН</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />ьжЭы░Ьъ╕░эЫД</span>
                    </>) : (<>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
                    </>)}
                  </div>
                  {isAir ? <AirPlotFlex traj={result.trajectory} /> : <CyclePlotL2 traj={result.trajectory} />}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================================
// SlotModal тАФ ьД╕ьЭ┤ы╕М ьКмыбп ъ┤Аыжм UI
// =============================================================
function SlotModal({ mode, slots, onClose, onSave, onLoad, onDelete, onRename, onExportFile, onImportFile, currentBlockCount, currentConnectionCount }) {
  const [newName, setNewName] = useState('');
  const [renamingId, setRenamingId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const fileInputRef = useRef(null);

  const sortedSlots = [...slots].sort((a, b) => b.savedAt - a.savedAt);

  const fmtDate = (ts) => {
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  const handleNewSave = () => {
    const name = newName.trim() || `Untitled ${fmtDate(Date.now())}`;
    onSave(name, null);
    setNewName('');
  };

  const handleOverwrite = (slot) => {
    if (confirm(`"${slot.name}" ьКмыбпьЭД эШДьЮм ьГБэГЬыбЬ ыНоьЦ┤ьУ╕ъ╣МьЪФ?`)) {
      onSave(slot.name, slot.id);
    }
  };

  const handleRenameStart = (slot) => {
    setRenamingId(slot.id);
    setRenameValue(slot.name);
  };

  const handleRenameCommit = (id) => {
    const v = renameValue.trim();
    if (v) onRename(id, v);
    setRenamingId(null);
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
      onClick={onClose}
    >
      <div
        className="bg-white rounded-lg shadow-2xl border border-slate-200 w-[560px] max-h-[80vh] flex flex-col"
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div className="text-sm font-semibold text-slate-900">
              {mode === 'save' ? 'эФДыбЬьаЭэК╕ ьаАьЮе' : 'эФДыбЬьаЭэК╕ ы╢ИыЯмьШдъ╕░'}
            </div>
            <div className="text-[11px] text-slate-500 font-mono">
              {mode === 'save'
                ? `эШДьЮм: ы╕ФыбЭ ${currentBlockCount} ┬╖ ьЧ░ъ▓░ьДа ${currentConnectionCount}`
                : `ьаАьЮеыРЬ ьКмыбп ${slots.length}ъ░Ь ┬╖ ы╕МыЭ╝ьЪ░ьаАьЧР ыбЬь╗м ьаАьЮеыРи`}
            </div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none px-2">
            ├Ч
          </button>
        </div>

        {/* Save mode: ьГИ ьКмыбп ьЮЕыае */}
        {mode === 'save' && (
          <div className="px-5 py-3 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
            <input
              type="text"
              placeholder="ьГИ ьКмыбп ьЭ┤ыжД (ы╣ДьЫМыСРый┤ ьЛЬъ░Д ъ╕░ы░Ш ьЮРыПЩ ыкЕыкЕ)"
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') handleNewSave(); }}
              className="flex-1 px-2.5 py-1.5 text-[12px] bg-white border border-slate-300 rounded focus:outline-none focus:border-cyan-500"
              autoFocus
            />
            <button
              onClick={handleNewSave}
              className="px-3 py-1.5 text-[12px] bg-cyan-600 text-white rounded hover:bg-cyan-700 transition-colors font-medium"
            >
              ьГИ ьКмыбпьЬ╝ыбЬ ьаАьЮе
            </button>
          </div>
        )}

        {/* Slot list */}
        <div className="flex-1 overflow-y-auto">
          {sortedSlots.length === 0 ? (
            <div className="p-10 text-center text-slate-400 text-[12px]">
              ьаАьЮеыРЬ ьКмыбпьЭ┤ ьЧЖьК╡ыЛИыЛд
              {mode === 'load' && <div className="mt-2 text-[11px]">ыи╝ьаА SaveьЧРьДЬ ьКмыбпьЭД ызМыУдьЦ┤ы│┤ьД╕ьЪФ</div>}
            </div>
          ) : (
            <div className="divide-y divide-slate-100">
              {sortedSlots.map((slot) => (
                <div key={slot.id} className="px-5 py-3 hover:bg-slate-50 group flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    {renamingId === slot.id ? (
                      <input
                        type="text"
                        value={renameValue}
                        onChange={(e) => setRenameValue(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') handleRenameCommit(slot.id);
                          else if (e.key === 'Escape') setRenamingId(null);
                        }}
                        onBlur={() => handleRenameCommit(slot.id)}
                        autoFocus
                        className="w-full px-1.5 py-0.5 text-[12px] bg-white border border-cyan-500 rounded focus:outline-none"
                      />
                    ) : (
                      <div className="text-[13px] font-medium text-slate-900 truncate">{slot.name}</div>
                    )}
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">
                      {fmtDate(slot.savedAt)} ┬╖ ы╕ФыбЭ {slot.blockCount} ┬╖ ьЧ░ъ▓░ьДа {slot.connectionCount}
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="flex items-center gap-1">
                    {mode === 'load' ? (
                      <button
                        onClick={() => onLoad(slot.id)}
                        className="px-2.5 py-1 text-[11px] bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 rounded transition-colors"
                      >
                        ы╢ИыЯмьШдъ╕░
                      </button>
                    ) : (
                      <button
                        onClick={() => handleOverwrite(slot)}
                        className="px-2.5 py-1 text-[11px] bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded transition-colors"
                      >
                        ыНоьЦ┤ьУ░ъ╕░
                      </button>
                    )}
                    <button
                      onClick={() => handleRenameStart(slot)}
                      className="px-2 py-1 text-[11px] text-slate-600 hover:bg-slate-100 rounded transition-colors"
                      title="ьЭ┤ыжД ы│Аъ▓╜"
                    >
                      тЬО
                    </button>
                    {confirmDeleteId === slot.id ? (
                      <>
                        <button
                          onClick={() => { onDelete(slot.id); setConfirmDeleteId(null); }}
                          className="px-2 py-1 text-[11px] bg-red-600 text-white rounded hover:bg-red-700"
                        >
                          эЩХьЭ╕
                        </button>
                        <button
                          onClick={() => setConfirmDeleteId(null)}
                          className="px-2 py-1 text-[11px] text-slate-500 hover:bg-slate-100 rounded"
                        >
                          ь╖иьЖМ
                        </button>
                      </>
                    ) : (
                      <button
                        onClick={() => setConfirmDeleteId(slot.id)}
                        className="px-2 py-1 text-[11px] text-red-500 hover:bg-red-50 rounded transition-colors"
                        title="ьВньаЬ"
                      >
                        ЁЯЧС
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Footer: JSON эММьЭ╝ Export/Import */}
        <div className="px-5 py-3 bg-slate-50 border-t border-slate-200 flex items-center justify-between text-[11px]">
          <span className="text-slate-500">
            ы░▒ьЧЕ/ъ│╡ьЬаьЪй:
          </span>
          <div className="flex items-center gap-2">
            <button
              onClick={onExportFile}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON эММьЭ╝ыбЬ ыВ┤ы│┤ыВ┤ъ╕░
            </button>
            <button
              onClick={() => fileInputRef.current?.click()}
              className="px-2.5 py-1 text-[11px] text-slate-700 border border-slate-300 rounded hover:bg-white transition-colors"
            >
              JSON эММьЭ╝ ъ░Аьа╕ьШдъ╕░
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json"
              className="hidden"
              onChange={onImportFile}
            />
          </div>
        </div>
      </div>
    </div>
  );
}


    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('Render error:', error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{ padding: 24, fontFamily: 'monospace', color: '#dc2626', whiteSpace: 'pre-wrap' }}>
              <h2 style={{ marginBottom: 12 }}>тЪа Render Error</h2>
              <div style={{ marginBottom: 16, fontSize: 14 }}>{String(this.state.error?.message || this.state.error)}</div>
              <pre style={{ fontSize: 11, color: '#475569', background: '#f8fafc', padding: 12, borderRadius: 4, overflow: 'auto' }}>
                {this.state.error?.stack}
              </pre>
              <button
                onClick={() => location.reload()}
                style={{ marginTop: 16, padding: '6px 16px', background: '#06b6d4', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer' }}
              >Reload</button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><HPWDStudio /></ErrorBoundary>);
  </script>
</body>

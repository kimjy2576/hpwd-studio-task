        <AppSwitcher current="studio" />
        <div className="text-slate-400 text-[10px]">м„ёнғҒкё°м°Ём„ёлҢҖн”Ңлһ«нҸјTask В· к№Җм§„мҳҒ м„ мһ„</div>
        <div className="flex-1"></div>
        <div className="text-slate-500 text-[11px] font-mono">
          t = <span className="text-slate-900 font-semibold">{simState.t.toFixed(1)}s</span>
          <span className="mx-1 text-slate-300">/</span>
          <span className="text-slate-400">{simState.t_final}s</span>
        </div>
        <div className={`px-2 py-0.5 rounded-full text-[10px] font-medium border ${
          simState.running ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-500 border-slate-200'
        }`}>
          {simState.running ? 'в—Ҹ Running' : 'в—Ӣ Idle'}
        </div>
        <BackendStatus />
      </div>

      {/* Toolbar */}
      <div className="h-11 bg-slate-50 border-b border-slate-200 flex items-center px-3 gap-1 shrink-0">
        <ToolBtn onClick={() => openSlotModal('save')} icon={Save} label="Save" title="н”„лЎңм қнҠёлҘј мҠ¬лЎҜм—җ м ҖмһҘ" />
        <ToolBtn onClick={() => openSlotModal('load')} icon={FolderOpen} label="Load" title="мҠ¬лЎҜм—җм„ң н”„лЎңм қнҠё л¶Ҳлҹ¬мҳӨкё°" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={doUndo} icon={Undo} label="Undo" disabled={undoStack.length === 0}
                 title="Ctrl+Z" />
        <ToolBtn onClick={doRedo} icon={Redo} label="Redo" disabled={redoStack.length === 0}
                 title="Ctrl+Y" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={runSim} icon={Play} label="Run" disabled={simState.running} color="text-emerald-600 hover:bg-emerald-50" />
        <ToolBtn onClick={stopSim} icon={Square} label="Stop" disabled={!simState.running} color="text-red-600 hover:bg-red-50" />
        <ToolBtn onClick={resetSim} icon={RotateCcw} label="Reset" color="text-amber-600 hover:bg-amber-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={() => setCycleOpen(true)} icon={Activity} label="Run Cycle"
                 color="text-violet-600 hover:bg-violet-50" title="L1/L2 нҶөн•© мӮ¬мқҙнҒҙ лҹ¬л„Ҳ вҖ” лғүл§ӨВ·кіөкё°В·м»Өн”Ңл“ң н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={exportAllCsv} icon={Download} label="Export CSV"
                 disabled={simState.history.length === 0}
                 color="text-sky-600 hover:bg-sky-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <div className="flex items-center gap-2 text-[11px] text-slate-600">
          <label className="text-slate-500">dt</label>
          <input type="number" value={simState.dt} step={0.1} min={0.1}
                 onChange={e => setSimState(s => ({ ...s, dt: parseFloat(e.target.value) || 1 }))}
                 className="w-14 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
          <label className="text-slate-500 ml-2">t_final</label>
          <input type="number" value={simState.t_final} step={10}
                 onChange={e => setSimState(s => ({ ...s, t_final: parseFloat(e.target.value) || 600 }))}
                 className="w-16 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
        </div>
        <div className="flex-1" />
        <BackendStatus />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <div className="text-[11px] text-slate-500 font-mono">
          blocks <span className="text-slate-900 font-semibold">{blocks.length}</span>
          <span className="mx-1.5 text-slate-300">В·</span>
          conns <span className="text-slate-900 font-semibold">{connections.length}</span>
        </div>
      </div>

      {/* Main 3-panel */}
      <div className="flex-1 flex overflow-hidden">

        {/* Left: Type Library */}
        <div className="w-56 bg-white border-r border-slate-200 overflow-y-auto shrink-0">
          <div className="px-3 py-2.5 text-[10px] font-semibold uppercase tracking-widest text-slate-500 border-b border-slate-100 bg-slate-50">
            Type Library
          </div>
          {Object.entries(
            Object.entries(TYPES)
              .filter(([k, v]) => !v.isHiddenFromLibrary)  // fidelity л…ёл“ңлҠ” мҲЁк№Җ (нҶөн•© л©”нғҖлЎң лҢҖмІҙ)
              .reduce((acc, [k, v]) => { (acc[v.category] ||= []).push([k, v]); return acc; }, {})
          ).map(([cat, items]) => {
            const catStyle = CATEGORY_STYLES[cat];
            return (
              <div key={cat}>
                <button
                  className="w-full flex items-center gap-1.5 px-2.5 py-1.5 text-[10px] uppercase tracking-wider text-slate-600 hover:bg-slate-50 transition-colors"
                  onClick={() => setExpandedCats(ec => ({ ...ec, [cat]: !ec[cat] }))}
                >
                  {expandedCats[cat] ? <ChevronDown size={10} /> : <ChevronRight size={10} />}
                  <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold ${catStyle.bg} ${catStyle.text} ${catStyle.border} border`}>
                    {catStyle.badge}
                  </span>
                  <span className="text-slate-700">{cat}</span>
                </button>
                {expandedCats[cat] && (() => {
                  // мӮ¬мҡ©мһҗ м •мқҳ мҲңм„ң м Ғмҡ© (libraryOrder[cat]м—җ мһҲмңјл©ҙ мҡ°м„ )
                  const userOrder = libraryOrder[cat] || [];
                  const keysInItems = items.map(([k]) => k);
                  const orderedKeys = userOrder.filter(k => keysInItems.includes(k))
                    .concat(keysInItems.filter(k => !userOrder.includes(k)));
                  return orderedKeys.map(key => {
                    const def = TYPES[key];
                    if (!def) return null;
                    const Icon = def.icon;
                    const isDragOver = libDragOver && libDragOver.cat === cat && libDragOver.key === key;
                    return (
                      <div
                        key={key}
                        draggable
                        onDragStart={(e) => handleLibraryDragStart(e, key, cat)}
                        onDragOver={(e) => {
                          // к°ҷмқҖ м№ҙн…Ңкі лҰ¬ лӮҙ м№ҙл“ң мң„м—җ hover мӢң reorder мқёл””мјҖмқҙн„°
                          e.preventDefault();
                          e.dataTransfer.dropEffect = 'move';
                          setLibDragOver({ cat, key });
                        }}
                        onDragLeave={() => setLibDragOver(null)}
                        onDrop={(e) => handleLibraryReorderDrop(e, key, cat)}
                        className={`flex items-center gap-2 px-3 py-1.5 mx-1.5 my-0.5 rounded cursor-grab hover:bg-slate-50 border ${
                          isDragOver ? 'border-cyan-500 border-2 bg-cyan-50' : 'border-transparent hover:border-slate-200'
                        } active:cursor-grabbing transition-colors`}
                        title={def.desc}
                      >
                        <div className="w-7 h-7 rounded flex items-center justify-center overflow-hidden shrink-0" style={{ background: def.image ? '#fff' : def.color + '15', border: def.image ? '1px solid #e2e8f0' : 'none' }}>
                          {def.image
                            ? <img src={def.image} alt={def.name} style={{ width: '100%', height: '100%', objectFit: 'contain' }} />
                            : <Icon size={12} style={{ color: def.color }} />}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-[11px] text-slate-800 truncate">{def.name}</div>
                          <div className="text-[9px] text-slate-400 font-mono">Type {def.typeNo}</div>
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            );
          })}
          <div className="px-3 py-4 text-[10px] text-slate-400 border-t border-slate-100 mt-2 leading-relaxed">
            л“ңлһҳк·ён•ҳм—¬ мә”лІ„мҠӨм—җ л°°м№ҳн•ҳм„ёмҡ”
          </div>

          {/* Line Types вҖ” м—°кІ°м„  мў…лҘҳ мӢңк°Ғ к°Җмқҙл“ң */}
          <div className="border-t border-slate-100 bg-slate-50/40">
            <div className="px-3 py-2 text-[10px] font-semibold uppercase tracking-widest text-slate-500">
              Line Types
            </div>
            <div className="px-2 pb-3 space-y-1">
              {Object.entries(LINE_KINDS).map(([k, def]) => (
                <div
                  key={k}
                  className="flex items-center gap-2 px-2 py-1.5 text-[10.5px] rounded border border-transparent hover:border-slate-200 hover:bg-white transition-colors"
                  title={def.desc}
                >
                  <span className="inline-block shrink-0" style={{
                    width: 22, height: 0,
                    borderTop: `${def.width}px ${def.dasharray ? 'dashed' : 'solid'} ${def.color}`,
                  }}></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-slate-700 truncate text-[10.5px]">{def.name}</div>
                    <div className="text-[9px] text-slate-400 font-mono">{def.short} В· {def.fields.length} params</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="px-3 pb-3 text-[9.5px] text-slate-400 leading-relaxed">
              нҸ¬нҠё м—°кІ° мӢң мў…лҘҳ мһҗлҸҷ к°җм§Җ В·<br/>м—°кІ°м„  нҒҙлҰӯн•ҳм—¬ ліҖкІҪ
            </div>
          </div>
        </div>

        {/* Center: Canvas + Bottom plot */}
        <div className="flex-1 flex flex-col overflow-hidden">
          <div
            ref={canvasRef}
            className="flex-1 relative bg-slate-50 overflow-auto"
            style={{
              backgroundImage: 'radial-gradient(circle, #cbd5e1 1px, transparent 1px)',
              backgroundSize: '20px 20px',
            }}
            onDragOver={handleCanvasDragOver}
            onDrop={handleCanvasDrop}
            onMouseDown={(e) => {
              // мә”лІ„мҠӨ div лҳҗлҠ” нҲ¬лӘ… SVGм—җм„ңл§Ң л°•мҠӨ л“ңлһҳк·ё мӢңмһ‘ (лё”лЎқ/м—°кІ°м„  мң„лҠ” м ңмҷё)
              // лё”лЎқ, нҸ¬нҠё, м—°кІ°м„  path/circle/rect л“ӨмқҖ к°Ғмһҗ stopPropagation мІҳлҰ¬лҗЁ
              // м—¬кё° лҸ„лӢ¬н•ңлӢӨлҠ” кұҙ м§„м§ң л№Ҳ кіөк°„мқҙлқјлҠ” лң»
              if (e.button !== 0) return; // мҷјмӘҪ лІ„нҠјл§Ң
              const rect = canvasRef.current.getBoundingClientRect();
              const x = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
              const y = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
              if (!(e.shiftKey || e.ctrlKey || e.metaKey)) {
                setSelectedIds([]);
                setSelectedConnIds([]);
              }
              setConnecting(null);
              setSelectionBox({ startX: x, startY: y, curX: x, curY: y });
            }}
            onMouseMove={handleCanvasMouseMove}
            onMouseUp={handleCanvasMouseUp}
            onWheel={(e) => {
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                setZoom(z => Math.max(0.25, Math.min(3, +(z + delta).toFixed(2))));
              }
            }}
          >
            <div
              className="absolute top-0 left-0"
              style={{
                width: 5000,
                height: 5000,
                transform: `scale(${zoom})`,
                transformOrigin: '0 0',
              }}
            >
            <svg className="absolute inset-0 pointer-events-none" width="100%" height="100%" style={{ zIndex: 30 }}>
              {/* лё”лЎқ лҶ’мқҙлҘј лҜёлҰ¬ кі„мӮ° (м—°кІ°м„  м¶©лҸҢ к°җм§Җмҡ© мһҘм• л¬ј rect) */}
              {(() => { return null; })()}
              {connections.map((c, i) => {
                const fromBlock = blocks.find(b => b.id === c.from.blockId);
                const toBlock = blocks.find(b => b.id === c.to.blockId);
                if (!fromBlock || !toBlock) return null;
                // нҳёнҷҳ: кё°мЎҙ лҚ°мқҙн„°м—җ side м—Ҷмңјл©ҙ default
                const fromSide = c.from.side || 'right';
                const toSide   = c.to.side   || 'left';
                let fromPos = getBlockSlotPos(fromBlock, fromSide, c.from?.slot);
                let toPos   = getBlockSlotPos(toBlock,   toSide,   c.to?.slot);
                if (!fromPos || !toPos) return null;

                // endpoint drag мӨ‘мқҙл©ҙ н•ҙлӢ№ лҒқм җмқҖ л§Ҳмҡ°мҠӨ(лҳҗлҠ” nearest slot)лЎң лҜёлҰ¬ліҙкё°
                const isDraggingFrom = endpointDrag?.connIdx === i && endpointDrag.end === 'from';
                const isDraggingTo   = endpointDrag?.connIdx === i && endpointDrag.end === 'to';
                let drawFromSide = fromSide, drawToSide = toSide;
                let drawFromPos = fromPos, drawToPos = toPos;
                if (isDraggingFrom || isDraggingTo) {
                  const snap = findNearestSlot(mousePos.x, mousePos.y, 28);
                  if (isDraggingFrom) {
                    if (snap) {
                      const sb = blocks.find(b => b.id === snap.blockId);
                      drawFromPos = getBlockSlotPos(sb, snap.side, snap.slot);
                      drawFromSide = snap.side;
                    } else {
                      drawFromPos = mousePos;
                      drawFromSide = null;
                    }
                  }
                  if (isDraggingTo) {
                    if (snap) {
                      const sb = blocks.find(b => b.id === snap.blockId);
                      drawToPos = getBlockSlotPos(sb, snap.side, snap.slot);
                      drawToSide = snap.side;
                    } else {
                      drawToPos = mousePos;
                      drawToSide = null;
                    }
                  }
                }

                const isDraggingThis = isDraggingFrom || isDraggingTo;

                let pathD;
                let elbowPoints;
                const waypoints = c.waypoints || [];
                const routeMode = c.routeMode || (waypoints.length > 0 ? 'manual' : 'auto');
                if (drawFromSide && drawToSide) {
                  if (routeMode === 'manual' && waypoints.length > 0 && !isDraggingThis) {
                    // мҲҳлҸҷ лӘЁл“ң: мӮ¬мҡ©мһҗ м§Җм • waypoints мӮ¬мҡ©
                    elbowPoints = [drawFromPos, ...waypoints, drawToPos];
                  } else {
                    // мһҗлҸҷ лӘЁл“ң: лё”лЎқ нҡҢн”ј лқјмҡ°нҢ…
                    const obstacles = blocks.map(b => ({
                      x: b.x, y: b.y, w: getBlockWidth(b), h: getBlockHeight(b),
                      ownEndpoint: b.id === c.from.blockId || b.id === c.to.blockId,
                    }));
                    elbowPoints = buildAvoidingRoute(drawFromPos, drawFromSide, drawToPos, drawToSide, 24, obstacles);
                  }
                  pathD = smoothPath(elbowPoints, c.cornerRadius ?? 8);
                } else {
                  pathD = `M ${drawFromPos.x} ${drawFromPos.y} L ${drawToPos.x} ${drawToPos.y}`;
                  elbowPoints = [drawFromPos, drawToPos];
                }
                const path = { d: pathD, handles: [], points: elbowPoints };
                const firstHandle = drawFromPos;
                const isHovered = hoveredConn === i;
                const isSelected = selectedConnIds.includes(i);
                const highlight = isSelected || isHovered;

                return (
                  <g
                    key={i}
                    className="pointer-events-auto"
                    onMouseEnter={() => setHoveredConn(i)}
                    onMouseLeave={() => setHoveredConn(h => h === i ? null : h)}
                  >
                    {/* к°ҖмӢң лқјмқё вҖ” kindм—җ л”°лқј layered design (pointer-events м°ЁлӢЁ вҶ’ hit areaлЎңл§Ң нҒҙлҰӯ) */}
                    {(() => {
                      const lk = LINE_KINDS[c.kind || 'refrigerant'] || LINE_KINDS.refrigerant;
                      const overlay = isSelected ? '#0284c7' : (highlight ? '#0891b2' : null);

                      if ((c.kind || 'refrigerant') === 'refrigerant') {
                        return (
                          <g style={{ pointerEvents: 'none' }}>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={12} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                            )}
                            <path d={path.d} stroke="#3a1c0a" strokeWidth={8} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            <path d={path.d} stroke="#7c3a14" strokeWidth={6.4} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            <path d={path.d} stroke="#b87333" strokeWidth={5} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                            <path d={path.d} stroke="#d49a5b" strokeWidth={2.6} fill="none" strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.6)"/>
                            <path d={path.d} stroke="#fde68a" strokeWidth={1.1} fill="none" opacity={0.9} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-1.5)"/>
                          </g>
                        );
                      }
                      if (c.kind === 'air') {
                        return (
                          <g style={{ pointerEvents: 'none' }}>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={15} fill="none" strokeLinejoin="round" strokeLinecap="butt" opacity={0.35}/>
                            )}
                            <path d={path.d} stroke="#1f2937" strokeWidth={11} fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                            <path d={path.d} stroke="#cbd5e1" strokeWidth={9} fill="none" strokeLinejoin="round" strokeLinecap="butt" className="transition-colors"/>
                            <path d={path.d} stroke="#475569" strokeWidth={1} strokeDasharray="5 4" fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                          </g>
                        );
                      }
                      return (
                        <g style={{ pointerEvents: 'none' }}>
                          {overlay && (
                            <path d={path.d} stroke={overlay} strokeWidth={10} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                          )}
                          <path d={path.d} stroke="#1e3a8a" strokeWidth={6} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                          <path d={path.d} stroke="#3b82f6" strokeWidth={4} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                          <path d={path.d} stroke="#bfdbfe" strokeWidth={1} fill="none" opacity={0.7} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.8)"/>
                        </g>
                      );
                    })()}
                    {/* м „мІҙ лқјмқё нһҲнҠё мҳҒм—ӯ (нҒҙлҰӯ мӢң м—°кІ°м„  м„ нғқ) */}
                    <path
                      d={path.d}
                      stroke="transparent"
                      strokeWidth="18"
                      fill="none"
                      className="cursor-pointer"
                      style={{ pointerEvents: 'stroke' }}
                      onClick={(e) => {
                        e.stopPropagation();
                        if (e.shiftKey || e.ctrlKey || e.metaKey) {
                          setSelectedConnIds(prev => prev.includes(i)
                            ? prev.filter(idx => idx !== i)
                            : [...prev, i]);
                        } else {
                          setSelectedConnIds([i]);
                          setSelectedIds([]);
                        }
                      }}
                    />

                    {/* к°Ғ м„ёк·ёлЁјнҠё нҺём§‘ н•ёл“Ө */}
                    {path.handles.map(h => {
                      const isVerticalSeg = h.axis === 'x';
                      const segLength = h.segMax - h.segMin;
                      if (segLength < 4) return null;
                      const isBeingDragged = isDraggingThis && draggingConn?.segment === h.segment;
                      const showActive = isBeingDragged || highlight;
                      const cursor = isVerticalSeg ? 'cursor-ew-resize' : 'cursor-ns-resize';

                      const startDragSeg = (e) => {
                        e.stopPropagation();
                        const rect = canvasRef.current.getBoundingClientRect();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setSelectedConn(i);
                        setSelected(null);
                        setDraggingConn({
                          idx: i,
                          segment: h.segment,
                          startMouseX: e.clientX - rect.left,
                          startMouseY: e.clientY - rect.top,
                          startOffset: c[offsetKey] ?? 0,
                        });
                      };

                      const resetSeg = (e) => {
                        e.stopPropagation();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setConnections(cs => cs.map((cc, idx) => idx === i ? { ...cc, [offsetKey]: 0 } : cc));
                      };

                      return (
                        <g key={h.segment}>
                          {/* м„ёк·ёлЁјнҠё нһҲнҠё мҳҒм—ӯ (кёёмӯүн•ң нҲ¬лӘ… rect) */}
                          <rect
                            x={isVerticalSeg ? h.x - 5 : h.segMin}
                            y={isVerticalSeg ? h.segMin : h.y - 5}
                            width={isVerticalSeg ? 10 : segLength}
                            height={isVerticalSeg ? segLength : 10}
                            fill="transparent"
                            className={cursor}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          />
                          {/* мӢңк°Ғ н•ёл“Ө */}
                          <circle
                            cx={h.x}
                            cy={h.y}
                            r={showActive ? 5 : 3}
                            fill="white"
                            stroke={showActive ? '#0891b2' : '#94a3b8'}
                            strokeWidth={2}
                            className={`${cursor} transition-all`}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          >
                            <title>{`л“ңлһҳк·ё: ${isVerticalSeg ? 'мўҢмҡ°' : 'мғҒн•ҳ'} мқҙлҸҷ В· лҚ”лё”нҒҙлҰӯ: лҰ¬м…Ӣ`}</title>
                          </circle>
                        </g>
                      );
                    })}

                    {/* мӮӯм ң лІ„нҠј (м„ нғқ мӢңм—җл§Ң persistent н‘ңмӢң) */}
                    {isSelected && (
                      <g
                        className="cursor-pointer"
                        style={{ pointerEvents: 'auto' }}
                        onClick={(e) => {
                          e.stopPropagation();
                          setConnections(cs => cs.filter((_, idx) => idx !== i));
                          setSelectedConn(null);
                        }}
                      >
                        {/* л„“мқҖ нһҲнҠё мҳҒм—ӯ */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={12} fill="transparent" />
                        {/* мӢӨм ң лІ„нҠј */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={9} fill="#ef4444" stroke="white" strokeWidth={2} />
                        <text x={firstHandle.x + 18} y={firstHandle.y + 4} textAnchor="middle" fill="white" fontSize="13" fontWeight="bold" style={{ userSelect: 'none', pointerEvents: 'none' }}>Г—</text>
                      </g>
                    )}

                    {/* Endpoint drag handles вҖ” selected мӢң м–‘ лҒқм җм—җ мһЎкі  лҒҢм–ҙм„ң лӢӨлҘё мҠ¬лЎҜмңјлЎң мҳ®кё°кё° */}
                    {isSelected && (
                      <>
                        {/* From лҒқм җ */}
                        <g
                          className="cursor-grab"
                          style={{ pointerEvents: 'auto' }}
                          onMouseDown={(e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            setEndpointDrag({ connIdx: i, end: 'from' });
                          }}
                          onClick={(e) => e.stopPropagation()}
                        >
                          <circle cx={drawFromPos.x} cy={drawFromPos.y} r={14} fill="transparent"/>
                          <circle cx={drawFromPos.x} cy={drawFromPos.y} r={7}
                                  fill={isDraggingFrom ? '#06b6d4' : 'white'}
                                  stroke="#0284c7" strokeWidth={2.5}/>
                        </g>
                        {/* To лҒқм җ */}
                        <g
                          className="cursor-grab"
                          style={{ pointerEvents: 'auto' }}
                          onMouseDown={(e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            setEndpointDrag({ connIdx: i, end: 'to' });
                          }}
                          onClick={(e) => e.stopPropagation()}
                        >
                          <circle cx={drawToPos.x} cy={drawToPos.y} r={14} fill="transparent"/>
                          <circle cx={drawToPos.x} cy={drawToPos.y} r={7}
                                  fill={isDraggingTo ? '#06b6d4' : 'white'}
                                  stroke="#0284c7" strokeWidth={2.5}/>
                        </g>

                        {/* Waypoint н•ёл“Ө вҖ” мӮ¬мҡ©мһҗ м •мқҳ cornerл“Ө. л“ңлһҳк·ё=мқҙлҸҷ, alt+нҒҙлҰӯ=м ңкұ° */}
                        {(c.waypoints || []).map((wp, wpIdx) => {
                          const isWpDragging = waypointDrag?.connIdx === i && waypointDrag.wpIdx === wpIdx;
                          return (
                            <g
                              key={`wp-${wpIdx}`}
                              className="cursor-move"
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => {
                                e.stopPropagation();
                                e.preventDefault();
                                if (e.altKey) {
                                  // alt+click вҶ’ м ңкұ°
                                  pushHistory(blocks, connections);
                                  setConnections(cs => cs.map((cc, ci) => ci === i
                                    ? { ...cc, waypoints: (cc.waypoints || []).filter((_, wi) => wi !== wpIdx) }
                                    : cc
                                  ));
                                } else {
                                  setWaypointDrag({ connIdx: i, wpIdx });
                                }
                              }}
                              onContextMenu={(e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                pushHistory(blocks, connections);
                                setConnections(cs => cs.map((cc, ci) => ci === i
                                  ? { ...cc, waypoints: (cc.waypoints || []).filter((_, wi) => wi !== wpIdx) }
                                  : cc
                                ));
                              }}
                            >
                              <circle cx={wp.x} cy={wp.y} r={13} fill="transparent"/>
                              <rect
                                x={wp.x - 5} y={wp.y - 5} width={10} height={10}
                                fill={isWpDragging ? '#06b6d4' : '#fef3c7'}
                                stroke="#d97706" strokeWidth={1.5}
                              />
                            </g>
                          );
                        })}

                        {/* Segment нҸүн–үмқҙлҸҷ н•ёл“Ө вҖ” м§Ғк°Ғ segment к°ҖмҡҙлҚ° мһЎкі  лҒҢм–ҙм„ң кёёмқҙ мЎ°м Ҳ */}
                        {(() => {
                          const pts = path.points || [];
                          if (pts.length < 2) return null;
                          const handles = [];
                          for (let k = 0; k < pts.length - 1; k++) {
                            const a = pts[k];
                            const b = pts[k + 1];
                            const dx = Math.abs(a.x - b.x);
                            const dy = Math.abs(a.y - b.y);
                            const segLen = Math.hypot(b.x - a.x, b.y - a.y);
                            if (segLen < 28) continue; // л„Ҳл¬ҙ м§§мқҖ segment skip
                            // м§Ғк°Ғ segment нҢҗм •: мҲҳм§Ғ(dx<0.5) лҳҗлҠ” мҲҳнҸү(dy<0.5)
                            const axis = dx < 0.5 ? 'x' : (dy < 0.5 ? 'y' : null);
                            if (!axis) continue; // мӮ¬м„ мқҖ skip
                            handles.push({
                              cx: (a.x + b.x) / 2,
                              cy: (a.y + b.y) / 2,
                              segIdx: k,
                              axis, // 'x' = мҲҳм§Ғ segment (xк°’ к°ҷмқҢ, xл°©н–ҘмңјлЎң нҸүн–үмқҙлҸҷ)
                            });
                          }
                          return handles.map((h, hIdx) => (
                            <g
                              key={`seg-${hIdx}`}
                              className={h.axis === 'x' ? 'cursor-ew-resize' : 'cursor-ns-resize'}
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => {
                                e.stopPropagation();
                                e.preventDefault();
                                pushHistory(blocks, connections);
                                // мһҗлҸҷ лӘЁл“ңл©ҙ мҡ°м„  cornerл“Өмқ„ manualлЎң commit
                                let startWaypoints;
                                if ((c.routeMode || 'auto') === 'auto' || (c.waypoints || []).length === 0) {
                                  startWaypoints = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                                  // мҰүмӢң manualлЎң м „нҷҳ
                                  setConnections(cs => cs.map((cc, ci) =>
                                    ci === i ? { ...cc, waypoints: startWaypoints, routeMode: 'manual' } : cc
                                  ));
                                } else {
                                  startWaypoints = (c.waypoints || []).slice();
                                }
                                setSegmentDrag({
                                  connIdx: i,
                                  segIdx: h.segIdx,
                                  axis: h.axis,
                                  startWaypoints,
                                });
                              }}
                              onClick={(e) => e.stopPropagation()}
                            >
                              {/* нҒҙлҰӯ мҳҒм—ӯ */}
                              <rect
                                x={h.cx - 14} y={h.cy - 14}
                                width={28} height={28}
                                fill="transparent"
                              />
                              {/* мӢңк°Ғ н•ёл“Ө */}
                              <rect
                                x={h.axis === 'x' ? h.cx - 4 : h.cx - 8}
                                y={h.axis === 'x' ? h.cy - 8 : h.cy - 4}
                                width={h.axis === 'x' ? 8 : 16}
                                height={h.axis === 'x' ? 16 : 8}
                                fill="white"
                                stroke="#0284c7"
                                strokeWidth={1.5}
                                rx={2}
                              />
                            </g>
                          ));
                        })()}

                        {/* Segment midpoint "+" лІ„нҠј вҖ” нҒҙлҰӯмңјлЎң мғҲ waypoint м¶”к°Җ.
                         * мһҗлҸҷ лӘЁл“ң(waypoints=[])м—җм„ңлҠ” кё°мЎҙ elbowмқҳ лӘЁл“  мӨ‘к°„ cornerлҘј waypointsлЎң
                         * commitн•ң л’Ө нҒҙлҰӯн•ң segmentм—җ мғҲ м җ мӮҪмһ… вҶ’ лӘЁм–‘ мң м§Җ. мўҢн‘ңлҠ” м§Ғк°Ғ м •л ¬ ліҙмЎҙ. */}
                        {(() => {
                          const pts = path.points || [];
                          if (pts.length < 2) return null;
                          // к°Ғ segment мӨ‘к°„м җ кі„мӮ°. round corner л•Ңл¬ём—җ л„Ҳл¬ҙ м§§мқҖ кұҙ skip.
                          const midpoints = [];
                          for (let k = 0; k < pts.length - 1; k++) {
                            const a = pts[k];
                            const b = pts[k + 1];
                            if (Math.hypot(b.x - a.x, b.y - a.y) < 12) continue;
                            // м§Ғк°Ғ segmentл©ҙ м •нҷ•нһҲ мӨ‘м җ, мӮ¬м„ мқҙл©ҙ к·ёлһҳлҸ„ мӨ‘м җ (м§Ғк°Ғмқҙ м •мғҒ мјҖмқҙмҠӨ)
                            midpoints.push({
                              x: (a.x + b.x) / 2,
                              y: (a.y + b.y) / 2,
                              segIdx: k, // pts л°°м—ҙ кё°мӨҖ segment мқёлҚұмҠӨ
                            });
                          }
                          return midpoints.map((mp, mIdx) => (
                            <g
                              key={`mid-${mIdx}`}
                              className="cursor-pointer"
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => e.stopPropagation()}
                              onClick={(e) => {
                                e.stopPropagation();
                                pushHistory(blocks, connections);
                                setConnections(cs => cs.map((cc, ci) => {
                                  if (ci !== i) return cc;
                                  const existing = cc.waypoints || [];
                                  if ((cc.routeMode || 'auto') === 'auto' || existing.length === 0) {
                                    // мһҗлҸҷ лӘЁл“ң вҶ’ мһҗлҸҷ elbowмқҳ мӨ‘к°„ cornerл“Өмқ„ лӘЁл‘җ waypointsлЎң commit.
                                    // grid snap м•Ҳ н•Ё (stub end мўҢн‘ң к·ёлҢҖлЎң ліҙмЎҙн•ҙм•ј м§Ғк°Ғ м •л ¬ мң м§Җ)
                                    const autoCorners = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                                    const insertAt = mp.segIdx;
                                    autoCorners.splice(insertAt, 0, { x: mp.x, y: mp.y });
                                    return { ...cc, waypoints: autoCorners, routeMode: 'manual' };
                                  }
                                  // мқҙлҜё мҲҳлҸҷ лӘЁл“ң вҖ” segment мқёлҚұмҠӨлЎң мӮҪмһ…
                                  const wps = existing.slice();
                                  wps.splice(mp.segIdx, 0, { x: mp.x, y: mp.y });
                                  return { ...cc, waypoints: wps, routeMode: 'manual' };
                                }));
                              }}
                              opacity={0.7}
                            >
                              <circle cx={mp.x} cy={mp.y} r={9} fill="white" stroke="#06b6d4" strokeWidth={1.2} strokeDasharray="2 2"/>
                              <text x={mp.x} y={mp.y + 3.5} textAnchor="middle" fill="#06b6d4" fontSize="13" fontWeight="bold" style={{ userSelect: 'none', pointerEvents: 'none' }}>+</text>
                            </g>
                          ));
                        })()}
                      </>
                    )}

                    {/* Snap target highlight вҖ” drag мӨ‘ к°Җк№Ңмҡҙ мҠ¬лЎҜмқҙ мһҲмңјл©ҙ к·ё мң„м—җ ring н‘ңмӢң */}
                    {isDraggingThis && (() => {
                      const snap = findNearestSlot(mousePos.x, mousePos.y, 28);
                      if (!snap) return null;
                      const sb = blocks.find(b => b.id === snap.blockId);
                      const sp = getBlockSlotPos(sb, snap.side, snap.slot);
                      if (!sp) return null;
                      return (
                        <circle cx={sp.x} cy={sp.y} r={12} fill="none" stroke="#06b6d4" strokeWidth={2} strokeDasharray="3 3"/>
                      );
                    })()}
                  </g>
                );
              })}
              {/* м—°кІ° м§„н–ү мӨ‘ м җм„  (л§Ҳмҡ°мҠӨ л”°лқјлӢӨлӢҳ) */}
              {connecting && (() => {
                const block = blocks.find(b => b.id === connecting.blockId);
                if (!block) return null;
                const pos = getBlockSlotPos(block, connecting.side, connecting.slot);
                if (!pos) return null;
                const target = { x: mousePos.x, y: mousePos.y };
                // мӢңмһ‘ мҠ¬лЎҜ stubл§Ң л№јкі  л§Ҳмҡ°мҠӨлЎң м§Ғм„ 
                const fs = stubEnd(pos, connecting.side, 24);
                const d = `M ${pos.x} ${pos.y} L ${fs.x} ${fs.y} L ${target.x} ${target.y}`;
                return (
                  <path d={d} stroke="#0891b2" strokeWidth="1.75" strokeDasharray="4 4" fill="none" />
                );
              })()}
              {/* л°•мҠӨ м„ нғқ мӮ¬к°Ғнҳ• */}
              {selectionBox && (() => {
                const x = Math.min(selectionBox.startX, selectionBox.curX);
                const y = Math.min(selectionBox.startY, selectionBox.curY);
                const w = Math.abs(selectionBox.curX - selectionBox.startX);
                const h = Math.abs(selectionBox.curY - selectionBox.startY);
                return (
                  <rect
                    x={x} y={y} width={w} height={h}
                    fill="#0891b2" fillOpacity="0.08"
                    stroke="#0891b2" strokeWidth="1" strokeDasharray="4 2"
                  />
                );
              })()}
            </svg>

            {blocks.map(block => {
              const def = TYPES[block.type];
              const Icon = def.icon;
              const isSel = selectedIds.includes(block.id);
              const height = getBlockHeight(block);
              const width = getBlockWidth(block);
              // лҸҷм Ғ м¶ңл Ҙ вҖ” output_select param м Ғмҡ©. м—Ҷмңјл©ҙ def.outputs к·ёлҢҖлЎң.
              const activeOutputs = getActiveOutputs(block);
              return (
                <div
                  key={block.id}
                  ref={(el) => { if (el) blockRefsMap.current[block.id] = el; }}
                  className={`absolute ${def.image
                    ? '' /* мқҙлҜём§Җ лё”лЎқ: л°•мҠӨ м—ҶмқҢ (мқҙлҜём§Җл§Ң) */
                    : `rounded-md bg-white shadow-sm ${isSel ? 'ring-2 ring-cyan-500 ring-offset-1 shadow-md' : 'hover:shadow-md'}`
                  }`}
                  style={{
                    left: block.x, top: block.y, width, height,
                    border: def.image ? 'none' : `1px solid ${isSel ? def.color : '#e2e8f0'}`,
                    willChange: 'transform',
                  }}
                  onMouseDown={(e) => handleBlockMouseDown(e, block.id)}
                  onMouseEnter={() => setHoveredBlockId(block.id)}
                  onMouseLeave={() => setHoveredBlockId(prev => prev === block.id ? null : prev)}
                >
                  {/* н—ӨлҚ” вҖ” мқҙлҜём§Җ м—ҶлҠ” лё”лЎқл§Ң */}
                  {!def.image && (
                    <div className="h-6 px-2 flex items-center gap-1.5 border-b rounded-t-md"
                         style={{ borderColor: def.color + '30', background: def.color + '0d' }}>
                      <Icon size={11} style={{ color: def.color }} />
                      {editingNameId === block.id ? (
                        <input
                          autoFocus
                          value={editingName}
                          onChange={(e) => setEditingName(e.target.value)}
                          onBlur={() => {
                            if (editingName.trim()) {
                              setBlocks(bs => bs.map(b => b.id === block.id ? { ...b, name: editingName.trim() } : b));
                            }
                            setEditingNameId(null);
                          }}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') e.target.blur();
                            if (e.key === 'Escape') { setEditingNameId(null); }
                          }}
                          onMouseDown={(e) => e.stopPropagation()}
                          className="flex-1 text-[10px] font-semibold text-slate-800 bg-white border border-cyan-400 rounded px-1 outline-none min-w-0"
                        />
                      ) : (
                        <span
                          className="text-[10px] font-semibold text-slate-800 flex-1 truncate cursor-text"
                          onDoubleClick={(e) => {
                            e.stopPropagation();
                            setEditingNameId(block.id);
                            setEditingName(block.name);
                          }}
                          title="лҚ”лё”нҒҙлҰӯн•ҳм—¬ мқҙлҰ„ мҲҳм •"
                        >{block.name}</span>
                      )}
                      <span className="text-[9px] text-slate-400 font-mono">T{def.typeNo}</span>
                    </div>
                  )}
                  <div className="relative" style={{ height: def.image ? height : height - 24 }}>
                    {/* Display лё”лЎқ: нҳ„мһ¬ к°’мқ„ нҒ¬кІҢ н‘ңмӢң */}
                    {block.type === 'display' && (() => {
                      const val = block.lastInputs?.x;
                      const digits = block.params.digits ?? 3;
                      const userLabel = block.params.label;

                      // мһҗлҸҷ лқјлІЁ/лӢЁмң„ вҖ” м—°кІ°лҗң sourceмқҳ м¶ңл Ҙ л©”нғҖм—җм„ң к°Җм ёмҳӨкё°
                      let autoLabel = '';
                      let autoUnit = '';
                      const incoming = connections.find(c =>
                        c.to?.blockId === block.id && c.to?.portKey === 'x'
                      );
                      if (incoming) {
                        const fromBlock = blocks.find(b => b.id === incoming.from?.blockId);
                        if (fromBlock) {
                          const fromDef = TYPES[fromBlock.type];
                          const outDef = fromDef?.outputs?.find(o => o.key === incoming.from.portKey);
                          if (outDef) {
                            autoLabel = `${fromBlock.name || fromDef.name}.${outDef.label || outDef.key}`;
                            autoUnit = outDef.unit || '';
                          }
                        }
                      }
                      // мӮ¬мҡ©мһҗ лқјлІЁмқҙ мһҲмңјл©ҙ мҡ°м„ , м—Ҷмңјл©ҙ мһҗлҸҷ лқјлІЁ
                      const headLabel = userLabel || autoLabel;

                      const text = val === undefined
                        ? 'вҖ”'
                        : (typeof val === 'number' ? val.toFixed(digits) : String(val));
                      return (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2">
                          {headLabel && (
                            <div className="text-[9px] text-slate-500 mb-0.5 truncate w-full text-center" title={headLabel}>
                              {headLabel}
                            </div>
                          )}
                          <div className="flex items-baseline gap-1 justify-center">
                            <div className="text-lg font-bold text-violet-700 font-mono tabular-nums">{text}</div>
                            {autoUnit && (
                              <div className="text-[10px] text-slate-500 font-mono">{autoUnit}</div>
                            )}
                          </div>
                        </div>
                      );
                    })()}
                    {def.inputs.map((p, i) => null)}
                    {def.outputs.map((p, i) => null)}

                    {/* Block лӮҙл¶Җ: imageк°Җ мһҲмңјл©ҙ мқҙлҜём§Җл§Ң (к°’ н‘ңмӢң м—ҶмқҢ вҖ” Properties/Plotter/DisplayлЎң нҷ•мқё). displayлҠ” нҒ° к°’. */}
                    {block.type !== 'display' && def.image && (
                      <img
                        src={def.image}
                        alt={def.name}
                        className="absolute inset-0 w-full h-full object-contain pointer-events-none select-none"
                        draggable={false}
                        style={{
                          filter: isSel
                            ? 'drop-shadow(0 0 6px #06b6d4) drop-shadow(0 2px 4px rgba(0,0,0,0.2))'
                            : 'drop-shadow(0 2px 4px rgba(0,0,0,0.18))',
                        }}
                      />
                    )}

                    {block.type !== 'display' && !def.image && (
                      <div className="absolute inset-0 px-2 pt-1.5 pb-1.5 flex flex-col pointer-events-none overflow-hidden">
                        <div className="flex-1"/>
                        {def.outputs.length > 0 && (
                          <div className="space-y-0.5 text-right">
                            {activeOutputs.slice(0, 5).map(p => (
                              <div key={p.key} className="text-[9px] font-mono truncate" title={`${p.label} [${p.unit||''}]`}>
                                <span className="text-slate-500 truncate">{p.label}</span>
                                <span className="text-amber-600 ml-1">в–¶</span>
                              </div>
                            ))}
                            {activeOutputs.length > 5 && (
                              <div className="text-[8.5px] font-mono text-slate-400">+{activeOutputs.length - 5}</div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                    {/* в”Җв”Җв”Җ 4-side multi-slot connectors в”Җв”Җв”Җ
                     * 4л©ҙ(top/bottom/left/right) Г— 4 мҠ¬лЎҜ = 16к°ң. in/out л¬ҙкҙҖ вҖ” м–‘л°©н–Ҙ м—°кІ° к°ҖлҠҘ.
                     * нқҗлҰ„ л°©н–ҘмқҖ Propertiesм—җм„ң лі„лҸ„ м§Җм •.
                     * мӮ¬мҡ© мӨ‘ slot: м§„н•ң dot. л№Ҳ slot: hover/connecting мӢң ghost. */}
                    {(() => {
                      const isHovered = hoveredBlockId === block.id;
                      const isConnectingFromThis = connecting && connecting.blockId === block.id;
                      const headerH = def.image ? 0 : 24;
                      const innerH = height - headerH;
                      const renderSide = (side) => {
                        const usedSlots = new Set();
                        connections.forEach(c => {
                          if (c.from?.blockId === block.id && (c.from.side || 'right') === side && c.from.slot !== undefined) usedSlots.add(c.from.slot);
                          if (c.to?.blockId   === block.id && (c.to.side   || 'left')  === side && c.to.slot   !== undefined) usedSlots.add(c.to.slot);
                        });
                        const showAll = isHovered || (connecting && !isConnectingFromThis);

                        return Array.from({ length: SLOTS_PER_SIDE }, (_, slotIdx) => {
                          const used = usedSlots.has(slotIdx);
                          const isActive = isConnectingFromThis && connecting.side === side && connecting.slot === slotIdx;
                          const visible = used || isActive || showAll;
                          if (!visible) return null;

                          // мҠ¬лЎҜ мң„м№ҳ (мҷёкіҪ div кё°мӨҖ absolute)
                          let cx, cy;
                          if (side === 'top') {
                            cx = width * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);
                            cy = 0;
                          } else if (side === 'bottom') {
                            cx = width * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);
                            cy = height;
                          } else if (side === 'left') {
                            cx = 0;
                            cy = headerH + innerH * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);
                          } else {
                            cx = width;
                            cy = headerH + innerH * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);
                          }

                          const dotClass = used || isActive
                            ? `w-3.5 h-3.5 rounded-full border-2 bg-white shrink-0 pointer-events-none transition-all`
                            : `w-2.5 h-2.5 rounded-full border bg-white shrink-0 pointer-events-none opacity-50 transition-all`;
                          const dotStyle = isActive
                            ? { backgroundColor: '#06b6d4', borderColor: '#0891b2' }
                            : (used
                                ? { borderColor: '#475569', borderWidth: 2 }
                                : { borderColor: '#94a3b8' });

                          return (
                            <div
                              key={`${side}-${slotIdx}`}
                              data-side={side}
                              data-slot={slotIdx}
                              onMouseDown={(e) => e.stopPropagation()}
                              onClick={(e) => handleBlockConnectorClick(e, block.id, side, slotIdx)}
                              className={`absolute flex items-center justify-center cursor-crosshair rounded-full transition-colors ${
                                isActive ? 'bg-cyan-100' : 'hover:bg-cyan-50'
                              }`}
                              style={{
                                left: cx - 14,
                                top: cy - 14,
                                width: 28,
                                height: 28,
                                zIndex: 20,
                              }}
                              title={`${block.name} В· ${side} slot ${slotIdx}${used ? ' (used)' : ''}`}
                            >
                              <div className={dotClass} style={dotStyle}/>
                            </div>
                          );
                        });
                      };
                      return (
                        <>
                          {renderSide('top')}
                          {renderSide('bottom')}
                          {renderSide('left')}
                          {renderSide('right')}
                        </>
                      );
                    })()}
                  {/* мқҙлҜём§Җ лё”лЎқ мқҙлҰ„ лқјлІЁ (мқҙлҜём§Җ м•„лһҳ floating, лҚ”лё”нҒҙлҰӯмңјлЎң мҲҳм •) */}
                  {def.image && (
                    editingNameId === block.id ? (
                      <input
                        autoFocus
                        value={editingName}
                        onChange={(e) => setEditingName(e.target.value)}
                        onBlur={() => {
                          if (editingName.trim()) {
                            setBlocks(bs => bs.map(b => b.id === block.id ? { ...b, name: editingName.trim() } : b));
                          }
                          setEditingNameId(null);
                        }}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') e.target.blur();
                          if (e.key === 'Escape') { setEditingNameId(null); }
                        }}
                        onMouseDown={(e) => e.stopPropagation()}
                        className="absolute left-0 right-0 -bottom-5 mx-auto text-center text-[10px] font-mono font-semibold bg-white border border-cyan-400 rounded px-1 outline-none"
                        style={{ maxWidth: width }}
                      />
                    ) : (
                      <div
                        onDoubleClick={(e) => {
                          e.stopPropagation();
                          setEditingNameId(block.id);
                          setEditingName(block.name);
                        }}
                        className="absolute left-0 right-0 -bottom-5 text-center text-[10px] font-mono font-semibold truncate select-none cursor-text"
                        style={{
                          color: isSel ? '#0891b2' : '#334155',
                          textShadow: '0 1px 2px white, 0 -1px 2px white, 1px 0 2px white, -1px 0 2px white, 0 0 4px white',
                        }}
                        title="лҚ”лё”нҒҙлҰӯн•ҳм—¬ мқҙлҰ„ мҲҳм •"
                      >
                        {block.name}
                        <span className="ml-1.5 text-[8.5px] text-slate-400 font-normal">T{def.typeNo}</span>
                      </div>
                    )
                  )}

                  {/* мқҙлҜём§Җ лё”лЎқ resize н•ёл“Ө вҖ” мҡ°н•ҳлӢЁ, hover лҳҗлҠ” selected мӢң ліҙмһ„ */}
                  {def.image && (hoveredBlockId === block.id || isSel || resizing?.blockId === block.id) && (
                    <div
                      onMouseDown={(e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        setResizing({
                          blockId: block.id,
                          startSize: block.imageSize || 160,
                          startX: e.clientX,
                          startY: e.clientY,
                        });
                      }}
                      className="absolute bottom-0 right-0 cursor-nwse-resize"
                      style={{
                        width: 16, height: 16,
                        borderRight: '3px solid #06b6d4',
                        borderBottom: '3px solid #06b6d4',
                        borderBottomRightRadius: 3,
                      }}
                      title="л“ңлһҳк·ён•ҳм—¬ нҒ¬кё° мЎ°м Ҳ (1:1 л№„мңЁ)"
                    />
                  )}
                </div>
              );
            })}
            </div>
            {/* Zoom м»ЁнҠёлЎӨ (мҷјмӘҪ н•ҳлӢЁ, wrap л°–) */}
            <div className="absolute bottom-3 left-3 flex items-center gap-1 bg-white/95 backdrop-blur border border-slate-200 rounded-md shadow-sm px-1 py-0.5 z-10 pointer-events-auto">
              <button
                onClick={() => setZoom(z => Math.max(0.25, +(z - 0.1).toFixed(2)))}
                className="w-6 h-6 flex items-center justify-center text-slate-600 hover:bg-slate-100 rounded text-[14px] font-bold"
                title="м¶•мҶҢ (Ctrl + -)"
              >вҲ’</button>
              <button
                onClick={() => setZoom(1)}
                className="px-2 h-6 text-[10px] font-mono text-slate-700 hover:bg-slate-100 rounded min-w-[44px]"
                title="100% ліөк·Җ"
              >{(zoom * 100).toFixed(0)}%</button>
              <button
                onClick={() => setZoom(z => Math.min(3, +(z + 0.1).toFixed(2)))}
                className="w-6 h-6 flex items-center justify-center text-slate-600 hover:bg-slate-100 rounded text-[14px] font-bold"
                title="нҷ•лҢҖ (Ctrl + +)"
              >+</button>
              <div className="w-px h-4 bg-slate-200 mx-1"/>
              <button
                onClick={() => setZoom(z => Math.max(0.25, +(z - 0.1).toFixed(2)))}
                className="w-6 h-6 hidden"
              ></button>
              <span className="text-[9px] text-slate-400 font-mono pr-1">вҢғ scroll</span>
            </div>

            {blocks.length === 0 && (
              <div className="absolute inset-0 flex items-center justify-center text-slate-400 pointer-events-none">
                <div className="text-center">
                  <div className="text-3xl mb-3 text-slate-300">в—Ү</div>
                  <div className="text-sm text-slate-500">мўҢмёЎ Type Libraryм—җм„ң м»ҙнҸ¬л„ҢнҠёлҘј л“ңлһҳк·ён•ҳм„ёмҡ”</div>
                  <div className="text-[11px] mt-1 text-slate-400">Ambient вҶ’ Fan вҶ’ Drum вҶ’ Plotter мҲңмңјлЎң м—°кІ°н•ҙліҙм„ёмҡ”</div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom: Plot + Log (нҸҙл”© к°ҖлҠҘ) */}
          <div className={`bg-white border-t border-slate-200 shrink-0 transition-all ${bottomPanelOpen ? 'h-52' : 'h-7'}`}>
            <div className="h-7 px-3 flex items-center gap-3 border-b border-slate-100 bg-slate-50/60 select-none">
              <button
                onClick={() => setBottomPanelOpen(o => !o)}
                className="text-slate-500 hover:text-slate-800 transition-colors flex items-center gap-1.5"
                title={bottomPanelOpen ? 'н•ҳлӢЁ нҢЁл„җ м ‘кё°' : 'н•ҳлӢЁ нҢЁл„җ нҺјм№ҳкё°'}
              >
                <span className="text-[10px] font-mono">{bottomPanelOpen ? 'в–ҫ' : 'в–ё'}</span>
                <span className="text-[10px] font-semibold uppercase tracking-widest">Output</span>
              </button>
              <span className="text-[10px] text-slate-400">В·</span>
              <span className="text-[10px] text-slate-500 font-mono">{plotterData.flatMap(pd => pd.series).length} signals В· {simState.log.length} events</span>
            </div>
            {bottomPanelOpen && (
            <div className="flex" style={{ height: 'calc(100% - 28px)' }}>
            <div className="flex-1 p-3 overflow-hidden">
              <div className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Output Plot</div>
              {plotterData.length === 0 ? (
                <div className="h-full flex items-center justify-center text-slate-400 text-[11px]">
                  Plotter лё”лЎқмқ„ м¶”к°Җн•ҳкі  мӢ нҳёлҘј м—°кІ°н•ҳм„ёмҡ”
                </div>
              ) : (
                <ResponsiveContainer width="100%" height="88%">
                  <LineChart data={simState.history}>
                    <CartesianGrid strokeDasharray="2 2" stroke="#e2e8f0" />
                    <XAxis dataKey="t" stroke="#94a3b8" tick={{ fontSize: 10 }} label={{ value: 'time [s]', position: 'insideBottomRight', offset: -5, style: { fill: '#94a3b8', fontSize: 10 } }} />
                    <YAxis stroke="#94a3b8" tick={{ fontSize: 10 }} />
                    <Tooltip contentStyle={{ background: 'white', border: '1px solid #e2e8f0', fontSize: 11, borderRadius: 4 }} />
                    <Legend wrapperStyle={{ fontSize: 10 }} />
                    {plotterData.flatMap(pd => pd.series).map((s, i) => (
                      <Line key={s} type="monotone" dataKey={s}
                            stroke={['#0891b2', '#d97706', '#7c3aed', '#db2777', '#059669'][i % 5]}
                            dot={false} strokeWidth={1.75} isAnimationActive={false} />
                    ))}
                  </LineChart>
                </ResponsiveContainer>
              )}
            </div>
            <div className="w-64 border-l border-slate-200 p-3 overflow-y-auto bg-slate-50">
              <div className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest mb-2">Sim Log</div>
              {simState.log.slice(-20).map((l, i) => (
                <div key={i} className="text-[10px] text-slate-600 font-mono leading-tight">{l}</div>
              ))}
              {simState.log.length === 0 && <div className="text-[10px] text-slate-400">No events yet</div>}
            </div>
            </div>
            )}
          </div>
        </div>

        {/* Right: Properties */}
        <div className="w-72 bg-white border-l border-slate-200 overflow-y-auto shrink-0 pb-24">
          <div className="px-3 py-2.5 text-[10px] font-semibold uppercase tracking-widest text-slate-500 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
            <span>Properties</span>
            {selectedBlock && (
              <button onClick={() => deleteBlock(selectedBlock.id)} className="text-red-500 hover:text-red-600">
                <Trash2 size={12} />
              </button>
            )}
          </div>

          {/* лӢЁмқј м—°кІ°м„  м„ нғқ мӢң вҖ” лқјмқё нҺём§‘ UI */}
          {selectedConnIds.length === 1 && selectedIds.length === 0 ? (
            (() => {
              const idx = selectedConnIds[0];
              const conn = connections[idx];
              if (!conn) return null;
              const fromBlock = blocks.find(b => b.id === conn.from.blockId);
              const toBlock = blocks.find(b => b.id === conn.to.blockId);
              const fromDef = fromBlock ? TYPES[fromBlock.type] : null;
              const toDef = toBlock ? TYPES[toBlock.type] : null;
              const kind = conn.kind || 'refrigerant';
              const lk = LINE_KINDS[kind];
              const sigs = conn.signals || [];

              const updateConn = (updates) => {
                setConnections(cs => cs.map((cc, i) => i === idx ? { ...cc, ...updates } : cc));
              };
              const changeKind = (newKind) => {
                updateConn({ kind: newKind, lineParams: defaultLineParams(newKind) });
              };
              const updateLineParam = (key, val) => {
                updateConn({ lineParams: { ...(conn.lineParams || {}), [key]: val } });
              };
              const updateSignal = (sigIdx, side, val) => {
                const next = sigs.map((s, i) => i === sigIdx
                  ? (side === 'from' ? { ...s, fromPort: val } : { ...s, toPort: val })
                  : s);
                updateConn({ signals: next });
              };
              const removeSignal = (sigIdx) => {
                updateConn({ signals: sigs.filter((_, i) => i !== sigIdx) });
              };
              const addSignal = () => {
                const firstFrom = (fromDef?.outputs || [])[0];
                const firstTo   = (toDef?.inputs || [])[0];
                if (!firstFrom || !firstTo) return;
                updateConn({ signals: [...sigs, { fromPort: firstFrom.key, toPort: firstTo.key }] });
              };
              const remap = () => {
                updateConn({ signals: autoMapSignals(fromBlock, toBlock) });
              };

              return (
                <div className="p-3 space-y-3">
                  {/* Header */}
                  <div className="flex items-center gap-2 pb-2 border-b border-slate-100">
                    <span className="inline-block w-3 h-3 rounded-sm" style={{ background: lk.color, border: lk.dasharray ? `1px dashed ${lk.color}` : 'none' }}></span>
                    <div className="text-[12px] font-semibold text-slate-900">{lk.name}</div>
                    <span className="ml-auto text-[9px] font-mono px-1.5 py-0.5 bg-slate-100 rounded text-slate-500">#{idx}</span>
                  </div>

                  {/* From вҶ’ To header */}
                  <div className="flex items-center gap-2 text-[11px]">
                    <span className="font-mono text-slate-700 truncate">{fromBlock?.name || '?'}</span>
                    <span className="text-slate-400">вҶ’</span>
                    <span className="font-mono text-slate-700 truncate">{toBlock?.name || '?'}</span>
                  </div>

                  {/* Line kind selector */}
                  <div>
                    <div className="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5">Line Type</div>
                    <div className="grid grid-cols-3 gap-1">
                      {Object.entries(LINE_KINDS).map(([k, def]) => (
                        <button
                          key={k}
                          onClick={() => changeKind(k)}
                          className={`px-2 py-1.5 text-[10px] rounded border transition-colors ${kind === k
                            ? 'bg-cyan-50 border-cyan-400 text-cyan-700'
                            : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                          title={def.desc}
                        >
                          <div className="flex items-center justify-center gap-1.5">
                            <span className="inline-block" style={{
                              width: 18, height: 0,
                              borderTop: `${def.width}px ${def.dasharray ? 'dashed' : 'solid'} ${def.color}`,
                            }}></span>
                          </div>
                          <div className="font-mono text-[9px] mt-0.5 tracking-wider">{def.short}</div>
                        </button>
                      ))}
                    </div>
                    <div className="text-[9.5px] text-slate-400 mt-1.5 leading-snug">{lk.desc}</div>
                  </div>

                  {/* Multi-signal mapping */}
                  <div>
                    <div className="flex items-center justify-between mb-1.5">
                      <div className="text-[10px] font-semibold uppercase tracking-widest text-slate-500">
                        Signals В· мҡҙл°ҳ л¬јлҰ¬лҹү ({sigs.length})
                      </div>
                      <button
                        onClick={remap}
                        className="text-[9px] font-mono px-1.5 py-0.5 text-cyan-700 border border-cyan-200 rounded hover:bg-cyan-50"
                        title="нҳёнҷҳ мӢңк·ёл„җ мһҗлҸҷ л§Өн•‘"
                      >вҶ» AUTO</button>
                    </div>
                    <div className="bg-slate-50 rounded border border-slate-200 divide-y divide-slate-200">
                      {sigs.length === 0 ? (
                        <div className="p-3 text-[10.5px] text-slate-400 italic text-center">л§Өн•‘лҗң мӢңк·ёл„җмқҙ м—ҶмҠөлӢҲлӢӨ</div>
                      ) : sigs.map((sig, sigIdx) => (
                        <div key={sigIdx} className="grid grid-cols-[1fr_12px_1fr_22px] items-center gap-1.5 p-1.5">
                          <select
                            value={sig.fromPort}
                            onChange={e => updateSignal(sigIdx, 'from', e.target.value)}
                            className="text-[10px] font-mono bg-white border border-slate-300 rounded px-1 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500 min-w-0"
                          >
                            {(fromDef?.outputs || []).map(p => (
                              <option key={p.key} value={p.key}>{p.label}{p.unit ? ` [${p.unit}]` : ''}</option>
                            ))}
                          </select>
                          <span className="text-slate-400 text-[10px] text-center">вҶ’</span>
                          <select
                            value={sig.toPort}
                            onChange={e => updateSignal(sigIdx, 'to', e.target.value)}
                            className="text-[10px] font-mono bg-white border border-slate-300 rounded px-1 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500 min-w-0"
                          >
                            {(toDef?.inputs || []).map(p => (
                              <option key={p.key} value={p.key}>{p.label}{p.unit ? ` [${p.unit}]` : ''}</option>
                            ))}
                          </select>

                              onChange={(v) => updateInputValue(selectedBlock.id, p.key, v)}
                            />
                          )}
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                    {selectedDef.inputs.some(p => {
                      const connected = connections.find(c => c.to.blockId === selectedBlock.id && (c.signals || []).some(s => s.toPort === p.key));
                      const manual = selectedBlock.inputValues?.[p.key] ?? p.value;
                      return !connected && (manual === undefined || manual === '' || manual === null);
                    }) && (
                      <div className="text-[9px] text-amber-600 mt-1 flex items-center gap-1">
                        <span>вҡ </span> лҜём—°кІ°В·лҜёмһ…л Ҙ нҸ¬нҠё мһҲмқҢ вҖ” к°’мқ„ мһ…л Ҙн•ҳкұ°лӮҳ м—°кІ°н•ҳм„ёмҡ”
                      </div>
                    )}
                    <div className="text-[9px] text-slate-400 mt-1">рҹ”— = м—°кІ°лҗЁ В· мһ…л Ҙм№ё = м§Ғм ‘ к°’ (лҜём—°кІ° мӢң мӮ¬мҡ©)</div>
                  </div>
                </div>
              )}

              {selectedDef.outputs.length > 0 && (() => {
                const activeOuts = getActiveOutputs(selectedBlock);
                if (activeOuts.length === 0) return null;
                return (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1 font-semibold">
                    <Zap size={10} /> Outputs
                  </div>
                  <div className="space-y-1">
                    {activeOuts.map(p => {
                      const val = selectedBlock.outputs?.[p.key];
                      return (
                        <div key={p.key} className="flex items-center gap-2 text-[11px]">
                          <span className="flex-1 text-slate-700">{p.label}</span>
                          <span className="text-amber-700 font-semibold font-mono w-16 text-right">
                            {val !== undefined ? fmtVal(val) : 'вҖ”'}
                          </span>
                          <span className="text-[10px] text-slate-400 w-10 font-mono">{p.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                );
              })()}

              {selectedBlock.state && Object.keys(selectedBlock.state).length > 0 && (
                <div>
                  <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-1.5 font-semibold">State</div>
                  <div className="space-y-1">
                    {Object.entries(selectedBlock.state).map(([k, v]) => (
                      <div key={k} className="flex items-center gap-2 text-[11px]">
                        <span className="flex-1 text-slate-600">{k}</span>
                        <span className="text-slate-800 font-mono w-16 text-right">
                          {typeof v === 'number' ? fmtVal(v) : JSON.stringify(v)}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Statusbar */}
      <div className="h-6 bg-slate-50 border-t border-slate-200 flex items-center px-3 text-[10px] text-slate-500 gap-4 shrink-0 font-mono">
        <span>
          <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1"></span>
          Connecting: {connecting ? `${blocks.find(b => b.id === connecting.blockId)?.name} (${connecting.direction})` : 'none'}
        </span>
        <span>({mousePos.x.toFixed(0)}, {mousePos.y.toFixed(0)})</span>
        {(selectedIds.length > 0 || selectedConnIds.length > 0) && (
          <span className="text-sky-600">
            м„ нғқлҗЁ: лё”лЎқ {selectedIds.length} В· м—°кІ°м„  {selectedConnIds.length} В· Delete нӮӨлЎң мӮӯм ң
          </span>
        )}
        <div className="flex-1" />
        <span>HPWD Simulation Studio В· quasi-steady seq. subst.</span>
      </div>

      {/* Slot Save/Load Modal */}
      {slotModal && (
        <SlotModal
          mode={slotModal}
          slots={slotList}
          onClose={() => setSlotModal(null)}
          onSave={(name, existingId) => {
            if (saveSlot(name, existingId)) {
              refreshSlotList();
            }
          }}
          onLoad={(id) => {
            if (loadSlot(id)) setSlotModal(null);
          }}
          onDelete={(id) => {
            deleteSlot(id);
            refreshSlotList();
          }}
          onRename={(id, newName) => {
            renameSlot(id, newName);
            refreshSlotList();
          }}
          onExportFile={exportProjectFile}
          onImportFile={importProjectFile}
          currentBlockCount={blocks.length}
          currentConnectionCount={connections.length}
        />
      )}
      {cycleOpen && <UnifiedCycleRunnerModal onClose={() => setCycleOpen(false)} blocks={blocks} connections={connections}
        onLoadTestRing={() => { const r = makeL1TestRing(); pushHistory(blocks, connections); setBlocks(r.blocks); setConnections(r.connections); setZoom(0.5); return r; }}
        onLoadL2TestRing={() => { const r = makeL2TestRing(); pushHistory(blocks, connections); setBlocks(r.blocks); setConnections(r.connections); setZoom(0.5); return r; }}
        onLoadAirTestRing={() => { const r = makeAirTestRing(); pushHistory(blocks, connections); setBlocks(r.blocks); setConnections(r.connections); setZoom(0.5); return r; }}
        onLoadCoupledTestRing={() => { const r = makeCoupledTestRing(); pushHistory(blocks, connections); setBlocks(r.blocks); setConnections(r.connections); setZoom(0.5); return r; }} />}
      <ChatFAB onSend={chatExecuteMock} />
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ AI Chat Floating Button + Popup в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    {
      role: 'assistant',

    },
    {
      role: 'assistant',
      text: 'нҳ„мһ¬ м§Җмӣҗн•ҳлҠ” лӘ…л №:',
      tools: [
        '"кұҙмЎ°кё° мӮ¬мқҙнҒҙ л§Ңл“Өм–ҙмӨҳ" вҖ” мӮ¬мқҙнҒҙ мқјкҙ„ мғқм„ұ (load_preset)',
        '"мҙҲкё°нҷ”" вҖ” мә”лІ„мҠӨ л№„мҡ°кё° (clear_canvas)',

      ],
    },
  ]);
  const [input, setInput] = useState('');
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, open]);

  const send = () => {
    const t = input.trim();
    if (!t) return;
    // user л©”мӢңм§Җ лЁјм Җ м¶”к°Җ
    setMessages(m => [...m, { role: 'user', text: t }]);
    setInput('');
    // mock мІҳлҰ¬ вҖ” мӢӨм ң LLMмқҙл©ҙ м—¬кё°м„ң API call. м•Ҫк°„мқҳ м§Җм—°мңјлЎң thinking лҠҗлӮҢ
    setTimeout(() => {
      const result = onSend ? onSend(t) : { reply: 'No handler.' };
      const msg = { role: 'assistant', text: result.reply };
      if (result.tool) {
        msg.toolCall = { name: result.tool, args: result.args || {}, ok: result.result?.ok !== false };
      }
      setMessages(m => [...m, msg]);
    }, 200);
  };

  const examples = [
    'кұҙмЎ°кё° мӮ¬мқҙнҒҙ л§Ңл“Өм–ҙмӨҳ',
    'мҙҲкё°нҷ”',
    'мӢӨн–ү',
    'м •м§Җ',
  ];

  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-cyan-600 hover:bg-cyan-700 text-white flex items-center justify-center shadow-lg hover:shadow-xl transition-all hover:scale-105"
        style={{ zIndex: 50 }}
        title="AI м–ҙмӢңмҠӨн„ҙнҠё м—ҙкё°"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-amber-400 border-2 border-white animate-pulse"></span>
      </button>
    );
  }

  return (
    <div
      className="fixed bottom-6 right-6 w-[400px] h-[560px] bg-white rounded-lg shadow-2xl border border-slate-200 flex flex-col"
      style={{ zIndex: 50 }}
    >
      {/* Header */}
      <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between bg-gradient-to-r from-cyan-600 to-cyan-700 text-white rounded-t-lg shrink-0">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-white"></div>
          <span className="font-semibold text-[13px]">AI м–ҙмӢңмҠӨн„ҙнҠё</span>
          <span className="text-[9px] px-1.5 py-0.5 bg-white/20 rounded font-mono tracking-wider">UI ONLY</span>
        </div>
        <button
          onClick={() => setOpen(false)}
          className="text-white/80 hover:text-white text-2xl leading-none w-6 h-6 flex items-center justify-center"
          title="лӢ«кё°"
        >Г—</button>
      </div>

      {/* Messages */}
      <div ref={bodyRef} className="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50">
        {messages.map((m, i) => (
          <div key={i} className="text-[12px] leading-relaxed">
            <div className={`text-[9px] font-mono uppercase tracking-widest font-semibold mb-1 flex items-center gap-1.5 ${m.role === 'user' ? 'text-cyan-700 justify-end' : 'text-amber-700'}`}>
              {m.role !== 'user' && <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>}
              {m.role === 'user' ? 'YOU' : 'ASSISTANT'}

              {m.text}

            {m.toolCall && (
              <div className="mr-4 mt-1.5 flex items-center gap-1.5">
                <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded font-semibold tracking-wider ${

                {Object.keys(m.toolCall.args).length > 0 && (
                  <span className="text-[9px] font-mono text-slate-500 truncate">
                    {Object.entries(m.toolCall.args).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ')}

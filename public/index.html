      {/* Input */}
      <div className="border-t border-slate-200 p-2 flex gap-1.5 bg-white rounded-b-lg shrink-0">
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          className="flex-1 resize-none px-2 py-1.5 text-[12px] border border-slate-300 rounded bg-slate-50 text-slate-700 h-12 outline-none focus:border-cyan-500 focus:bg-white"
          placeholder="мҳҲ: нһҲнҠёнҺҢн”„ мӮ¬мқҙнҒҙ л§Ңл“Өм–ҙмӨҳ (Enter)"
        />
        <button
          onClick={send}
          disabled={!input.trim()}
          className="px-3 text-[10px] font-mono font-semibold bg-cyan-600 text-white rounded hover:bg-cyan-700 self-stretch tracking-wider disabled:opacity-50 disabled:cursor-not-allowed"
        >SEND</button>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ App Switcher (HPWD Studio вҶ” Component Studio) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const apps = [
    { id: 'studio',           label: 'HPWD Studio',      desc: 'мӢңл®¬ мә”лІ„мҠӨ',   href: '/' },
    { id: 'component-studio', label: 'Component Studio', desc: 'м»ҙнҸ¬л„ҢнҠё мһ‘м„ұ', href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio', desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',   desc: 'On-design лӘЁлҚё м„Өкі„',    href: '/on-design-studio/' },
    { id: 'model-docs',          label: 'Model Docs',          desc: 'мҲҳн•ҷм Ғ лӘЁлҚёл§Ғ л¬ём„ң',     href: '/model-docs/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors"
      >
        <div className="w-2 h-2 rounded-sm bg-cyan-600 shrink-0"/>
        <span className="font-bold text-slate-900 tracking-wide text-[11px]">{active.label}</span>
        <span className="text-slate-400 text-[9px]">в–ҫ</span>
      </button>

      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-56 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button
                key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-cyan-50 cursor-default' : 'hover:bg-slate-50'
                }`}
              >
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-cyan-700' : 'text-slate-300'}`}>
                  {isActive ? 'в—Ҹ' : 'в—Ӣ'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-cyan-900' : 'text-slate-800'}`}>
                    {a.label}
                  </div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ Backend Status Indicator + Switcher в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function BackendStatus() {
  const [tick, setTick] = useState(0);
  const [open, setOpen] = useState(false);
  const [customUrl, setCustomUrl] = useState('');
  const dropdownRef = useRef(null);

  useEffect(() => {
    const handler = () => setTick(t => t + 1);
    window.addEventListener('hpwd-backend-status', handler);
    return () => window.removeEventListener('hpwd-backend-status', handler);
  }, []);

  // dropdown мҷёл¶Җ нҒҙлҰӯ мӢң лӢ«кё°
  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const status = window.HPWD_BACKEND || { connected: false, components: [], lastError: null, url: '', presets: {} };
  const presets = status.presets || { cloud: '', local: 'http://localhost:8010' };
  const isLocal = status.url === presets.local;
  const isCloud = status.url === presets.cloud;
  const isCustom = !isLocal && !isCloud;

  const engine = status.engine || 'python';
  const modelica = status.modelica || { available: false, components: [], reason: null };
  const switchEngine = (eng) => {
    if (typeof window.HPWD_setEngine === 'function') window.HPWD_setEngine(eng);
  };

  const tooltip = status.connected
    ? `Backend OK В· ${status.url}\nл“ұлЎқлҗң м»ҙнҸ¬л„ҢнҠё: ${status.components.join(', ')}`
    : `Backend м—°кІ° м•Ҳ лҗЁ В· ${status.url}\n${status.lastError || 'м„ңлІ„ лҜёмӢӨн–ү'}`;

  const switchTo = (url) => {
    if (typeof window.HPWD_setBackend === 'function') {
      window.HPWD_setBackend(url);
    }
    setOpen(false);
  };
  const applyCustom = () => {
    if (customUrl.trim()) {
      switchTo(customUrl.trim());
      setCustomUrl('');

  return (
    <div className="relative" ref={dropdownRef}>

        onClick={() => setOpen(o => !o)}

        style={{
          background: status.connected ? '#ecfdf5' : '#fef2f2',
          borderColor: status.connected ? '#a7f3d0' : '#fecaca',
          color: status.connected ? '#065f46' : '#991b1b',
        }}
        title={tooltip}
      >
        <span
          className="w-2 h-2 rounded-full"
          style={{
            background: status.connected ? '#10b981' : '#ef4444',
            boxShadow: status.connected ? '0 0 4px #10b981' : 'none',
          }}
        />
        <span>Backend</span>
        <span className="opacity-70">{status.connected ? `(${status.components.length})` : 'OFF'}</span>
        <span className="text-[8px] opacity-50">в–ҫ</span>
      </button>

      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-72 p-2 text-[11px] font-mono">
          <div className="px-2 py-1 text-slate-500 text-[10px] uppercase tracking-wider">Backend URL</div>

          {/* Cloud */}
          <button
            onClick={() => switchTo(presets.cloud)}
            disabled={!presets.cloud}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isCloud ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            } disabled:opacity-40 disabled:cursor-not-allowed`}
          >
            <span className="w-3 text-center">{isCloud ? 'в—Ҹ' : 'в—Ӣ'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Cloud (Railway)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.cloud || '(not configured)'}</div>
            </div>
          </button>

          {/* Local */}
          <button
            onClick={() => switchTo(presets.local)}
            className={`w-full text-left px-2 py-1.5 rounded flex items-center gap-2 transition-colors ${
              isLocal ? 'bg-cyan-50 text-cyan-900' : 'hover:bg-slate-50 text-slate-700'
            }`}
          >
            <span className="w-3 text-center">{isLocal ? 'в—Ҹ' : 'в—Ӣ'}</span>
            <div className="flex-1 min-w-0">
              <div className="font-semibold">Local (лӮҙ PC)</div>
              <div className="text-[9px] text-slate-500 truncate">{presets.local}</div>
            </div>
          </button>

          {/* Custom */}
          <div className={`mt-1 px-2 py-1.5 rounded ${isCustom ? 'bg-cyan-50' : ''}`}>
            <div className="flex items-center gap-2 mb-1">
              <span className="w-3 text-center">{isCustom ? 'в—Ҹ' : 'в—Ӣ'}</span>
              <span className={`font-semibold ${isCustom ? 'text-cyan-900' : 'text-slate-700'}`}>Custom URL</span>

            <div className="flex gap-1">

                placeholder={isCustom ? status.url : 'http://192.168.10.5:8000'}
                className="flex-1 px-2 py-0.5 text-[10px] border border-slate-300 rounded bg-white text-slate-700 outline-none focus:border-cyan-500"
              />
              <button
                onClick={applyCustom}

// =============================================================
// CyclePlot вҖ” мӮ¬мқҙнҒҙ кё°лҸҷ кіјлҸ„ к¶Өм Ғ (Pc/Pe[bar мўҢм¶•] + SH[K мҡ°м¶•] vs time)
// =============================================================
// =============================================================
// extractCycleTopology вҖ” мә”лІ„мҠӨ лё”лЎқ+м—°кІ° вҶ’ мӮ¬мқҙнҒҙ л§Ғ нҶ нҸҙлЎңм§Җ
//   лғүл§Ө м»ҙнҸ¬л„ҢнҠё 4мў…мқ„ м°ҫм•„, kind:'refrigerant' м—°кІ°мқҳ fromвҶ’toлҘј л”°лқј
//   лӢ«нһҢ л§Ғ(compвҶ’condвҶ’eevвҶ’evapвҶ’comp)мқ„ мһ¬кө¬м„ұ. raw нҢҢлқјлҜён„° мҲҳм§‘.
// =============================================================
function cycleKindOf(type) {
  if (!type) return null;
  if (type.startsWith('compressor')) return 'compressor';
  if (type.startsWith('condenser')) return 'condenser';
  if (type.startsWith('eev')) return 'eev';
  if (type.startsWith('evaporator')) return 'evaporator';
  return null;
}

function extractCycleTopology(blocks, connections) {
  const refBlocks = (blocks || []).filter(b => cycleKindOf(b.type));
  const byId = Object.fromEntries(refBlocks.map(b => [b.id, b]));
  const NEED = ['compressor', 'condenser', 'eev', 'evaporator'];
  const present = new Set(refBlocks.map(b => cycleKindOf(b.type)));
  const missing = NEED.filter(k => !present.has(k));
  const labelOf = { compressor: 'Compressor', condenser: 'Condenser', eev: 'EEV', evaporator: 'Evaporator' };
  if (missing.length) {
    return { error: `мә”лІ„мҠӨм—җ ${missing.map(k => labelOf[k]).join(', ')} к°Җ м—ҶмқҢ. CompВ·CondВ·EEVВ·Evap 4к°ңк°Җ лғүл§Ө м—°кІ°лЎң лӢ«нһҢ л§Ғмқ„ мқҙлӨ„м•ј н•Ё.` };
  }

  // лғүл§Ө м—°кІ°мқҳ directed adjacency (м»ҙнҸ¬л„ҢнҠё к°„, мІ« м—°кІ°л§Ң)
  const adj = {};
  (connections || []).forEach(c => {
    if (c.kind !== 'refrigerant') return;
    const f = c.from?.blockId, t = c.to?.blockId;
    if (byId[f] && byId[t] && f !== t && !(f in adj)) adj[f] = t;
  });

  // м••м¶•кё°м—җм„ң fromвҶ’to л”°лқј мӣҢнҒ¬
  const comp = refBlocks.find(b => cycleKindOf(b.type) === 'compressor');
  const ring = [];
  const seen = new Set();
  let cur = comp.id;
  while (cur && byId[cur] && !seen.has(cur)) {
    seen.add(cur); ring.push(cur);
    cur = adj[cur];
  }
  // лӢ«нһҳ: л§Ҳм§Җл§ү л…ёл“ңк°Җ м••м¶•кё°лЎң лҸҢм•„мҳӨкі , 4мў…мқҙ м •нҷ•нһҲ н•ң лІҲм”©
  const closes = cur === comp.id;
  const ringKinds = ring.map(id => cycleKindOf(byId[id].type));
  if (ring.length !== 4 || !closes || new Set(ringKinds).size !== 4) {
    return {
      error: `лӢ«нһҢ лғүл§Ө л§Ғмқҙ м•„лӢҳ (к°җм§Җ кІҪлЎң: ${ring.map(id => labelOf[cycleKindOf(byId[id].type)]).join('вҶ’') || 'м—ҶмқҢ'}). `
        + `CompвҶ’CondвҶ’EEVвҶ’EvapвҶ’Comp мҲңм„ңлЎң лғүл§Ө м—°кІ°мқ„ лӢ«м•„мӨҳ (м—°кІ° л°©н–Ҙ=лғүл§Ө нқҗлҰ„).`,
    };
  }

  // raw нҢҢлқјлҜён„° мҲҳм§‘: b.params + inputValues(м—Ҷмңјл©ҙ нҸ¬нҠё кё°ліёк°’)
  const components = ring.map(id => {
    const b = byId[id];
    const def = TYPES[b.type] || {};
    const raw = { ...(b.params || {}) };
    (def.inputs || []).forEach(inp => {
      raw[inp.key] = b.inputValues?.[inp.key] ?? inp.value;
    });
    return { id: b.id, kind: cycleKindOf(b.type), params: raw };
  });
  const volumes = ring.map(() => 5e-4);   // м—°кІ°л§ҲлӢӨ 0.5L (L1 lumped Volume)
  return { components, ring, volumes, ringLabels: ringKinds.map(k => labelOf[k]) };
}

// =============================================================
// makeL1TestRing вҖ” кІҖмҰқлҗң л ҲнҚјлҹ°мҠӨ мӮ¬мқҙнҒҙ(Pc 16.59)мқ„ мә”лІ„мҠӨ лё”лЎқ+м—°кІ°лЎң мғқм„ұ
//   мӣҗнҒҙлҰӯ н…ҢмҠӨнҠёмҡ©. params/inputValuesлҘј л ҲнҚјлҹ°мҠӨ к°’мңјлЎң л°•м•„ л§ӨлІҲ лҸҷмқј мһ¬нҳ„.
// =============================================================
function makeL1TestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `tst${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},
      outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  const comp = mk(0, 'compressor_theoretical', 180, 120,  'Comp В· test',
    { V_disp: 10, eta_vol: 0.85, eta_isen: 0.65 }, { N: 3000 });
  const cond = mk(1, 'condenser_off_design', 700, 120, 'Cond В· test',
    { UA_deSH: 8, UA_2ph: 50, UA_SC: 5, dP_ref: 0.03 },
    { T_air_in: 35, RH_air_in: 50, V_air_CMM: 25.42, P_cond: 19.07, m_dot_ref: 0.00458 });
  const eev = mk(2, 'eev_off_design', 700, 480, 'EEV В· test',
    { A_orifice: 0.55, Cv_rated: 0.7, c0: 0, c1: 0.5, c2: 0.3, c3: 0.2 }, { opening: 50 });
  const evap = mk(3, 'evaporator_off_design', 180, 480, 'Evap В· test',
    { UA_2ph: 25, UA_SH: 4, dP_ref: 0.02 },
    { T_air_in: 50, RH_air_in: 90, V_air_CMM: 2.54, P_evap: 5.51, m_dot_ref: 0.00458 });
  const blocks = [comp, cond, eev, evap];
  const edge = (from, to, fside, tside) => ({
    from: { blockId: from.id, side: fside, slot: 0 },
    to: { blockId: to.id, side: tside, slot: 0 },
    kind: 'refrigerant',
    signals: autoMapSignals(from, to),
    lineParams: defaultLineParams('refrigerant'),
    cornerRadius: 8, routeMode: 'auto',
  });
  // лғүл§Ө нқҗлҰ„ л§Ғ: CompвҶ’CondвҶ’EEVвҶ’EvapвҶ’Comp
  const connections = [
    edge(comp, cond, 'right', 'left'),
    edge(cond, eev, 'bottom', 'top'),
    edge(eev, evap, 'left', 'right'),
    edge(evap, comp, 'top', 'bottom'),
  ];
  return { blocks, connections };
}

function CyclePlot({ traj }) {
  if (!traj || !Array.isArray(traj.Pc_bar) || !traj.Pc_bar.length
      || !Array.isArray(traj.Pe_bar) || !Array.isArray(traj.SH_evap) || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">к¶Өм Ғ лҚ°мқҙн„° м—ҶмқҢ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT, tmax = 120;
  const pAll = [...traj.Pc_bar, ...traj.Pe_bar];
  const pMax = Math.max(5, Math.ceil(Math.max(...pAll) / 5) * 5);
  const shMax = Math.max(10, Math.ceil(Math.max(...traj.SH_evap) / 10) * 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syP = v => y0 - (v / pMax) * (y0 - y1);
  const syS = v => y0 - (v / shMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const pTicks = [], shTicks = [], xTicks = [];
  for (let p = 0; p <= pMax; p += 5) pTicks.push(p);
  for (let k = 0; k <= shMax; k += 10) shTicks.push(k);
  for (let s = 0; s <= 120; s += 20) xTicks.push(s);
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {pTicks.map(p => (
        <g key={'p' + p}>
          <line x1={x0} y1={syP(p)} x2={x1} y2={syP(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syP(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {shTicks.map(k => (<text key={'s' + k} x={x1 + 6} y={syS(k) + 3} textAnchor="start" {...TK}>{k}</text>))}
      {xTicks.map(s => (<text key={'x' + s} x={sx(s)} y={y0 + 14} textAnchor="middle" {...TK}>{s}</text>))}
      <line x1={sx(20)} y1={y1} x2={sx(20)} y2={y0} stroke="#94A3B8" strokeWidth="1" strokeDasharray="3 3" />
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>bar</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0D9488', fontFamily: 'JetBrains Mono, monospace' }}>K (SH)</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      <path d={mkPath(traj.Pc_bar, syP)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.Pe_bar, syP)} fill="none" stroke="#2563EB" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.SH_evap, syS)} fill="none" stroke="#0D9488" strokeWidth="2.2" strokeLinejoin="round" />
    </svg>
  );
}

// =============================================================
// кіөкё° мӮ¬мқҙнҒҙ Run Cycle вҖ” лғүл§Ө Run Cycleмқҳ лҢҖм№ӯнҢҗ
//   мә”лІ„мҠӨ кіөкё° м—°кІ°(kind:'air')м—җм„ң л§Ғ(DrumвҶ’FanвҶ’EvapвҶ’Cond)мқ„ м¶”м¶ң,
//   /run_air_cycle лЎң .mo мһҗлҸҷмғқм„ұВ·мӢӨн–ү. мҪ”мқјмҳЁлҸ„(T_evap/T_cond)лҠ” кі м • кІҪкі„.
// =============================================================
function airCycleKindOf(type) {
  if (!type) return null;
  if (type.startsWith('drum')) return 'drum';
  if (type.startsWith('filter')) return 'filter';
  if (type.startsWith('fan')) return 'fan';
  if (type.startsWith('condenser')) return 'condenser';
  if (type.startsWith('evaporator')) return 'evaporator';
  return null;
}

function extractAirTopology(blocks, connections) {
  const airBlocks = (blocks || []).filter(b => airCycleKindOf(b.type));
  const byId = Object.fromEntries(airBlocks.map(b => [b.id, b]));
  const NEED = ['drum', 'fan', 'evaporator', 'condenser'];
  const present = new Set(airBlocks.map(b => airCycleKindOf(b.type)));
  const missing = NEED.filter(k => !present.has(k));
  const labelOf = { drum: 'Drum', fan: 'Fan', evaporator: 'Evap', condenser: 'Cond', filter: 'Filter' };
  if (missing.length) {
    return { error: `мә”лІ„мҠӨм—җ ${missing.map(k => labelOf[k]).join(', ')} к°Җ м—ҶмқҢ. DrumВ·FanВ·EvapВ·Cond 4к°ңк°Җ кіөкё° м—°кІ°лЎң лӢ«нһҢ л§Ғмқ„ мқҙлӨ„м•ј н•Ё (FilterлҠ” м„ нғқ).` };
  }
  // кіөкё° м—°кІ°мқҳ directed adjacency (м»ҙнҸ¬л„ҢнҠё к°„, мІ« м—°кІ°л§Ң)
  const adj = {};
  (connections || []).forEach(c => {
    if (c.kind !== 'air') return;
    const f = c.from?.blockId, t = c.to?.blockId;
    if (byId[f] && byId[t] && f !== t && !(f in adj)) adj[f] = t;
  });
  // л“ңлҹјм—җм„ң fromвҶ’to л”°лқј мӣҢнҒ¬ (кіөкё° нқҗлҰ„: drumвҶ’fanвҶ’evapвҶ’condвҶ’drum)
  const drum = airBlocks.find(b => airCycleKindOf(b.type) === 'drum');
  const ring = [];
  const seen = new Set();
  let cur = drum.id;
  while (cur && byId[cur] && !seen.has(cur)) {
    seen.add(cur); ring.push(cur);
    cur = adj[cur];
  }
  const closes = cur === drum.id;
  const ringKinds = ring.map(id => airCycleKindOf(byId[id].type));
  const CORE = ['drum', 'fan', 'evaporator', 'condenser'];
  const coreOnce = CORE.every(k => ringKinds.filter(x => x === k).length === 1);
  const allAllowed = ringKinds.every(k => ['drum', 'fan', 'evaporator', 'condenser', 'filter'].includes(k));
  if (ring.length < 4 || !closes || !coreOnce || !allAllowed) {
    return {
      error: `лӢ«нһҢ кіөкё° л§Ғмқҙ м•„лӢҳ (к°җм§Җ кІҪлЎң: ${ring.map(id => labelOf[airCycleKindOf(byId[id].type)]).join('вҶ’') || 'м—ҶмқҢ'}). `
        + `DrumвҶ’(Filter)вҶ’FanвҶ’EvapвҶ’CondвҶ’Drum мҲңм„ңлЎң кіөкё° м—°кІ°мқ„ лӢ«м•„мӨҳ (м—°кІ° л°©н–Ҙ=кіөкё° нқҗлҰ„, FilterлҠ” м„ нғқ).`,
    };
  }
  // raw нҢҢлқјлҜён„° мҲҳм§‘: b.params + inputValues(м—Ҷмңјл©ҙ нҸ¬нҠё кё°ліёк°’)
  const components = ring.map(id => {
    const b = byId[id];
    const def = TYPES[b.type] || {};
    const raw = { ...(b.params || {}) };
    (def.inputs || []).forEach(inp => {
      raw[inp.key] = b.inputValues?.[inp.key] ?? inp.value;
    });
    return { id: b.id, kind: airCycleKindOf(b.type), params: raw };
  });
  const volumes = ring.map(() => 0.05);   // м—°кІ°л§ҲлӢӨ 0.05mВі (L1 lumped AirVolume)
  return { components, ring, volumes, ringLabels: ringKinds.map(k => labelOf[k]) };
}

// makeAirTestRing вҖ” кІҖмҰқлҗң л ҲнҚјлҹ°мҠӨ кіөкё° л§Ғ(TestAirRingL1)мқ„ мә”лІ„мҠӨлЎң мғқм„ұ.
//   drum/fanмқҖ native Fan_L1/Drum_L1 нҢҢлқјлҜён„°, evap/condлҠ” мҪ”мқјмҳЁлҸ„(В°C)лҘј л°•м•„
//   л°ұм—”л“ңк°Җ TestAirRingL1мқ„ к·ёлҢҖлЎң мһ¬нҳ„ (X 0.6вҶ’0.47, б№Ғ_da 0.156, м—ҙн’Қ 51В°C).
function makeAirTestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `air${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},
      outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  const drum = mk(0, 'drum', 720, 500, 'Drum В· air-test',
    { m_cl_dry: 3.0, c_p_cl: 1500, A_eff: 10, h_a: 50, A_drum: 0.15, K_drum: 30, X0: 0.6, Tcl0: 298.15 });
  const fan = mk(2, 'fan', 120, 100, 'Fan В· air-test',
    { D2: 0.15, b2: 0.04, Z: 40, beta2: 150, eta_h: 0.78, eta_mech: 0.95, N: 3000 });
  const filt = mk(1, 'filter', 340, 500, 'Filter В· air-test',
    { A_face: 0.05, r_pleat: 1.0, theta_face: 0, K: 20 });
  const evap = mk(3, 'evaporator_off_design', 500, 100, 'Evap В· air-test',
    { T_evap_C: 10, BF: 0.2, A_face: 0.05, K_air: 50 });
  const cond = mk(4, 'condenser_off_design', 880, 100, 'Cond В· air-test',
    { T_cond_C: 60, BF: 0.2, A_face: 0.05, K_air: 50 });
  const blocks = [drum, filt, fan, evap, cond];
  const edge = (from, to, fside, tside) => ({
    from: { blockId: from.id, side: fside, slot: 2 },
    to: { blockId: to.id, side: tside, slot: 2 },
    kind: 'air',
    signals: autoMapSignals(from, to),
    lineParams: defaultLineParams('air'),
    cornerRadius: 8, routeMode: 'auto',
  });
  // кіөкё° нқҗлҰ„ л§Ғ: DrumвҶ’FilterвҶ’FanвҶ’EvapвҶ’CondвҶ’Drum (н•„н„°=лҰ°нҠё н•„н„°, л“ңлҹј м§Ғнӣ„)
  const connections = [
    edge(drum, filt, 'left', 'right'),
    edge(filt, fan, 'left', 'left'),
    edge(fan, evap, 'right', 'left'),
    edge(evap, cond, 'right', 'left'),
    edge(cond, drum, 'right', 'right'),
  ];
  return { blocks, connections };
}

// makeCoupledTestRing вҖ” лғүл§Ө closed + кіөкё° closed кІ°н•© н…ҢмҠӨнҠё л§Ғ (нҳ„мӢӨ л°°м№ҳ).
//   лғүл§Ө л§Ғ: CompвҶ’CondвҶ’EEVвҶ’EvapвҶ’Comp (slot 0).  кіөкё° л§Ғ: DrumвҶ’FilterвҶ’EvapвҶ’CondвҶ’FanвҶ’Drum (slot 2).
//   EvapВ·Cond = кіөмң  merged HX (лғүл§Ө=мғҒ/н•ҳ нҸ¬нҠё, кіөкё°=мўҢ/мҡ° нҸ¬нҠё). drum кІҖмҰқк°’ вҶ’ SMER ~2.435.
function makeCoupledTestRing() {
  const ts = Date.now();
  const mk = (i, type, x, y, name, params, inputValues) => {
    const def = TYPES[type] || {};
    return {
      id: `cpl${ts}_${i}`, type, x, y, name,
      params: { ...Object.fromEntries((def.parameters || []).map(p => [p.key, p.value])), ...params },
      inputValues: inputValues || {},
      outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    };
  };
  // лғүл§Ө м „мҡ© (EEV мң„ мӨ‘м•ҷ, Compressor м•„лһҳ мӨ‘м•ҷ)
  const eev = mk(0, 'eev_off_design', 580, 120, 'EEV',
    { A_orifice: 0.55, Cv_rated: 0.7, c0: 0, c1: 0.5, c2: 0.3, c3: 0.2 }, { opening: 50 });
  const comp = mk(1, 'compressor_theoretical', 580, 600, 'Compressor',
    { V_disp: 10, eta_vol: 0.85, eta_isen: 0.65 }, { N: 3000 });
  // кіөмң  merged HX (лғүл§Ө+кіөкё° нҢҢлқјлҜён„° л‘ҳ лӢӨ вҖ” м»Өн”Ңл“ң мғқм„ұкё°лҠ” K_air=300 кі м • мӮ¬мҡ©)
  const evap = mk(2, 'evaporator_off_design', 400, 360, 'Evaporator',
    { UA_2ph: 25, UA_SH: 4, dP_ref: 0.02, BF: 0.2, A_face: 0.05, K_air: 50, T_evap_C: 10 },
    { T_air_in: 50, RH_air_in: 90, V_air_CMM: 2.54, P_evap: 5.51, m_dot_ref: 0.00458 });
  const cond = mk(3, 'condenser_off_design', 760, 360, 'Condenser',
    { UA_deSH: 8, UA_2ph: 50, UA_SC: 5, dP_ref: 0.03, BF: 0.2, A_face: 0.05, K_air: 50, T_cond_C: 60 },
    { T_air_in: 35, RH_air_in: 50, V_air_CMM: 25.42, P_cond: 19.07, m_dot_ref: 0.00458 });
  // кіөкё° м „мҡ© (Filter мўҢлӢЁ, Fan мҡ°лӢЁ, Drum н•ҳлӢЁ мӨ‘м•ҷ)
  const filt = mk(4, 'filter', 100, 360, 'Filter', { A_face: 0.05, r_pleat: 1.0, theta_face: 0, K: 20 });
  const fan = mk(5, 'fan', 1060, 360, 'Fan',
    { D2: 0.15, b2: 0.04, Z: 40, beta2: 150, eta_h: 0.78, eta_mech: 0.95, N: 3000 });
  const drum = mk(6, 'drum', 580, 820, 'Drum',
    { m_cl_dry: 3.0, c_p_cl: 1500, A_eff: 10, h_a: 50, A_drum: 0.15, K_drum: 30, X0: 0.6, Tcl0: 305.0 });
  const blocks = [eev, comp, evap, cond, filt, fan, drum];
  const redge = (from, to, fs, ts2) => ({
    from: { blockId: from.id, side: fs, slot: 0 }, to: { blockId: to.id, side: ts2, slot: 0 },
    kind: 'refrigerant', signals: autoMapSignals(from, to), lineParams: defaultLineParams('refrigerant'),
    cornerRadius: 8, routeMode: 'auto',
  });
  const aedge = (from, to, fs, ts2) => ({
    from: { blockId: from.id, side: fs, slot: 2 }, to: { blockId: to.id, side: ts2, slot: 2 },
    kind: 'air', signals: autoMapSignals(from, to), lineParams: defaultLineParams('air'),
    cornerRadius: 8, routeMode: 'auto',
  });
  const connections = [
    // лғүл§Ө л§Ғ: CompвҶ’CondвҶ’EEVвҶ’EvapвҶ’Comp (HXлҠ” мғҒ/н•ҳ нҸ¬нҠё)
    redge(comp, cond, 'right', 'bottom'),
    redge(cond, eev, 'top', 'right'),
    redge(eev, evap, 'left', 'top'),
    redge(evap, comp, 'bottom', 'left'),
    // кіөкё° л§Ғ: DrumвҶ’FilterвҶ’EvapвҶ’CondвҶ’FanвҶ’Drum (HXлҠ” мўҢ/мҡ° нҸ¬нҠё, EvapВ·Cond кіөмң )
    aedge(drum, filt, 'left', 'bottom'),
    aedge(filt, evap, 'right', 'left'),
    aedge(evap, cond, 'right', 'left'),
    aedge(cond, fan, 'right', 'left'),
    aedge(fan, drum, 'bottom', 'right'),
  ];
  return { blocks, connections };
}
function AirCyclePlot({ traj }) {
  if (!traj || !Array.isArray(traj.time) || !traj.time.length
      || !Array.isArray(traj.T_cond_out_C) || !Array.isArray(traj.X)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">к¶Өм Ғ лҚ°мқҙн„° м—ҶмқҢ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const temps = [...traj.T_cond_out_C, ...(traj.T_drum_out_C || []), ...(traj.T_evap_out_C || [])];
  const tMax = Math.max(20, Math.ceil(Math.max(...temps) / 10) * 10);
  const xMax = Math.max(0.1, Math.ceil(Math.max(...traj.X) * 10) / 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syT = v => y0 - (v / tMax) * (y0 - y1);
  const syX = v => y0 - (v / xMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const tTicks = [], xTicks = [], xtTicks = [];
  const tStep = Math.max(10, Math.round(tMax / 6 / 10) * 10);
  for (let p = 0; p <= tMax + 1e-9; p += tStep) tTicks.push(p);
  for (let k = 0; k <= 5; k++) xTicks.push((xMax / 5) * k);
  for (let k = 0; k <= 6; k++) xtTicks.push((tmax / 6) * k);
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {tTicks.map(p => (
        <g key={'t' + p}>
          <line x1={x0} y1={syT(p)} x2={x1} y2={syT(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syT(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {xTicks.map((k, i) => (<text key={'x' + i} x={x1 + 6} y={syX(k) + 3} textAnchor="start" {...TK}>{k.toFixed(2)}</text>))}
      {xtTicks.map((sv, i) => (<text key={'xt' + i} x={sx(sv)} y={y0 + 14} textAnchor="middle" {...TK}>{sv.toFixed(0)}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>В°C</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0891B2', fontFamily: 'JetBrains Mono, monospace' }}>X</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      {Array.isArray(traj.T_drum_out_C) && <path d={mkPath(traj.T_drum_out_C, syT)} fill="none" stroke="#64748B" strokeWidth="2" strokeLinejoin="round" />}
      {Array.isArray(traj.T_evap_out_C) && <path d={mkPath(traj.T_evap_out_C, syT)} fill="none" stroke="#2563EB" strokeWidth="2" strokeLinejoin="round" />}
      <path d={mkPath(traj.T_cond_out_C, syT)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.X, syX)} fill="none" stroke="#0891B2" strokeWidth="2.2" strokeDasharray="5 3" strokeLinejoin="round" />
    </svg>
  );
}

// AirCycleRunnerBody вҖ” кіөкё° л§Ғ м¶”м¶ңВ·мӢӨн–үВ·кІ°кіј (CycleRunnerModal м•Ҳм—җм„ң domain='air'мқј л•Ң)
function AirCycleRunnerBody({ blocks, connections, url, modelica, onLoadAirTestRing }) {
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [detected, setDetected] = useState(null);
  const [stopTime, setStopTime] = useState('300');

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `лЎңм»¬ м„ңлІ„м—җ ${path} к°Җ м—ҶмқҢ (${detail}). git pull нӣ„ python server.py мһ¬мӢңмһ‘ н•„мҡ”.`
      : `м„ңлІ„ мқ‘лӢө мҳӨлҘҳ: ${detail}`;
  };

  const runAir = async (blk, conn) => {
    const useBlocks = blk || blocks;
    const useConns = conn || connections;
    setRunning(true); setError(null); setResult(null); setDetected(null);
    const topo = extractAirTopology(useBlocks, useConns);
    if (topo.error) { setError(topo.error); setRunning(false); return; }
    setDetected(topo.ringLabels);
    try {
      const r = await fetch(`${url}/run_air_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topology: topo, settings: { stop_time: parseFloat(stopTime) || 300, tolerance: 1e-6, intervals: 300 } }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_air_cycle')); setRunning(false); return; }
      const data = await r.json();
      if (data.error) { setError(data.error); setRunning(false); return; }
      if (!data.trajectory || !Array.isArray(data.trajectory.X) || !data.trajectory.X.length) {
        setError('кІ°кіјм—җ к¶Өм Ғмқҙ м—ҶмқҢ вҖ” м„ңлІ„ лІ„м „ нҷ•мқё (git pull нӣ„ python server.py мһ¬мӢңмһ‘).'); setRunning(false); return;
      }
      setResult({ settled: data.settled || {}, trajectory: data.trajectory });
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const AIR_CARDS = [
    { k: 'X', n: 'н•ЁмҲҳмңЁ X', u: 'kg/kg', d: 3, c: 'text-cyan-700' },
    { k: 'm_evap', n: 'б№Ғ мҰқл°ң(л“ңлҹј)', u: 'g/s', d: 2, c: 'text-blue-600', scale: 1000 },
    { k: 'm_cond', n: 'б№Ғ м ңмҠө(мҰқл°ңкё°)', u: 'g/s', d: 2, c: 'text-teal-600', scale: 1000 },
    { k: 'mdot_da', n: 'кұҙмЎ°кіөкё° н’Қлҹү', u: 'kg/s', d: 3, c: 'text-violet-600' },
    { k: 'T_cond_out_C', n: 'м—ҙн’Қ(л“ңлҹјмһ…кө¬)', u: 'В°C', d: 1, c: 'text-red-600' },
    { k: 'T_evap_out_C', n: 'мҰқл°ңкё°м¶ңкө¬', u: 'В°C', d: 1, c: 'text-sky-600' },
    { k: 'fan_dp', n: 'нҢ¬ м •м••мғҒмҠ№', u: 'Pa', d: 0, c: 'text-amber-600' },
    { k: 'Q_latent', n: 'м ңмҠө мһ м—ҙ', u: 'W', d: 0, c: 'text-teal-600' },
  ];
  const s = result?.settled || {};
  const valOf = {
    Drum: ('X' in s) ? `X ${s.X.toFixed(3)}` : 'н•ЁмҲҳмңЁ',
    Filter: ('filter_dp' in s) ? `${s.filter_dp.toFixed(0)} Pa` : 'м—¬кіј',
    Fan: ('fan_dp' in s) ? `${s.fan_dp.toFixed(0)} Pa` : 'О”p',
    Evap: ('T_evap_out_C' in s) ? `${s.T_evap_out_C.toFixed(1)}В°C` : 'м ңмҠө',
    Cond: ('T_cond_out_C' in s) ? `${s.T_cond_out_C.toFixed(1)}В°C` : 'м—ҙн’Қ',
  };
  const iconOf = { Drum: 'рҹ§ә', Filter: 'рҹ§Ҫ', Fan: 'рҹҢ¬', Evap: 'вқ„', Cond: 'вҷЁ' };
  const gradOf = {
    Drum: 'from-cyan-700 to-cyan-500', Filter: 'from-slate-500 to-slate-400',
    Fan: 'from-sky-600 to-sky-400', Evap: 'from-blue-600 to-blue-400', Cond: 'from-amber-600 to-amber-400',
  };
  const ringLabels = (detected && detected.length) ? detected : ['Drum', 'Filter', 'Fan', 'Evap', 'Cond'];
  const NODES = ringLabels.map(lbl => [iconOf[lbl] || 'в–Ә', lbl, valOf[lbl] || '', gradOf[lbl] || 'from-slate-500 to-slate-400']);

  if (!modelica.available) {
    return (
      <div className="p-6 text-center text-slate-500 text-sm">
        <div className="text-2xl mb-2">вҡ пёҸ</div>
        <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local л°ұм—”л“ң(omc) м—°кІ° н•„мҡ”'}</div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      {/* controls */}
      <div className="flex items-end gap-4 flex-wrap">
        <div className="flex flex-col gap-1.5">
          <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӢңл®¬ м„Өм •</label>
          <div className="flex gap-2 items-end">
            <label className="flex flex-col gap-1">
              <span className="font-mono text-[10px] text-slate-400">stop [s]</span>
              <input type="number" value={stopTime} disabled={running} onChange={(e) => setStopTime(e.target.value)}
                className="w-24 bg-white border border-slate-200 rounded px-2 py-1.5 text-sm font-mono text-slate-700 focus:border-cyan-400 outline-none" />
            </label>
            <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2 text-xs font-mono text-slate-600">dassl В· tol 1e-6</span>
          </div>
        </div>
        <div className="ml-auto flex items-center gap-2">
          {onLoadAirTestRing && (
            <button
              onClick={() => { const r = onLoadAirTestRing(); runAir(r.blocks, r.connections); }}
              disabled={running} title="кІҖмҰқлҗң кіөкё° л§Ғ(TestAirRingL1)мқ„ мә”лІ„мҠӨм—җ мһҗлҸҷ кө¬м„ұн•ҳкі  л°”лЎң мӢӨн–ү"
              className="inline-flex items-center gap-2 bg-white border border-cyan-300 text-cyan-700 hover:bg-cyan-50 disabled:opacity-60 rounded-xl px-4 py-2.5 font-bold text-sm transition">
              рҹ§Ә н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү
            </button>
          )}
          <button onClick={() => runAir()} disabled={running}
            className="inline-flex items-center gap-2 bg-cyan-600 hover:bg-cyan-700 disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm shadow-lg shadow-cyan-500/25 transition">
            {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>) : 'в–¶ мә”лІ„мҠӨм—җм„ң м¶”м¶ң & мӢӨн–ү'}
          </button>

      <div className="text-xs text-slate-500 leading-relaxed">

        лғүл§Ө Run Cycleмқҙ <i>кіөкё°мһ…кө¬ кі м •</i>мқё кІғкіј лҢҖм№ӯмңјлЎң, кіөкё°мёЎмқҖ <b className="text-slate-700">мҪ”мқјмҳЁлҸ„(T_evap/T_cond) кі м •</b> вҖ” мҰқл°ң/мқ‘м¶•кё° лё”лЎқмқҳ P_evap/P_condм—җм„ң R290 нҸ¬нҷ”мҳЁлҸ„лЎң м—ӯмӮ°.
        {detected && (<span className="block mt-0.5 font-mono text-cyan-600">к°җм§Җ: {detected.join(' вҶ’ ')} вҶ’ {detected[0]}</span>)}
      </div>

      {/* loop schematic */}

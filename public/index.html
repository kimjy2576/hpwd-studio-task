/* в•җв•җв•җв•җв•җв•җв•җв•җ Python Backend нҶөн•© в•җв•җв•җв•җв•җв•җв•җв•җ
 * м»ҙнҸ¬л„ҢнҠёмқҳ modelDescriptionм—җ backend: 'python'мқҙ мһҲмңјл©ҙ мӢңл®¬ м—”м§„мқҙ
 * мқҙ н—¬нҚјлҘј нҶөн•ҙ л°ұм—”л“ң(FastAPI)м—җ лҸҷкё° нҳём¶ң.
 * л°ұм—”л“ң лӢӨмҡҙ мӢң м»ҙнҸ¬л„ҢнҠёмқҳ JS compute()лЎң fallback.
 *
 * URL мһҗлҸҷ кІ°м • (мҡ°м„ мҲңмң„):
 *   1. URL нҢҢлқјлҜён„° ?backend=...      вҖ” мқјнҡҢм„ұ override
 *   2. localStorage 'hpwd_backend_url' вҖ” мӮ¬мҡ©мһҗк°Җ нҶ кёҖ UIлЎң м§Җм •
 *   3. мһҗлҸҷ вҖ” localhost м ‘мҶҚ мӢң localhost, Railway м ‘мҶҚ мӢң л°°нҸ¬ URL
 */
const DEFAULT_BACKENDS = {
  cloud: 'https://hpwd-studio-task-production.up.railway.app',  // Railway л°°нҸ¬ URL
  local: 'http://localhost:8000',
};

function resolveBackendUrl() {
  // 1. URL нҢҢлқјлҜён„°
  try {
    const param = new URLSearchParams(window.location.search).get('backend');
    if (param) return param;
  } catch (e) { /* ignore */ }
  // 2. localStorage
  try {
    const stored = localStorage.getItem('hpwd_backend_url');
    if (stored) return stored;
  } catch (e) { /* ignore */ }
  // 3. мһҗлҸҷ вҖ” hostname кё°л°ҳ
  const host = window.location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || host === '' || host === 'file') {
    return DEFAULT_BACKENDS.local;
  }
  return DEFAULT_BACKENDS.cloud;
}

// л°ұм—”л“ң health мғҒнғң вҖ” UI status indicatorк°Җ м°ёмЎ°
// urlмқ„ к°ҖліҖмңјлЎң л‘җкі , мӮ¬мҡ©мһҗк°Җ нҶ кёҖн•ҳл©ҙ к°ұмӢ 
window.HPWD_BACKEND = {
  url: resolveBackendUrl(),
  connected: false,
  components: [],
  lastError: null,
  presets: DEFAULT_BACKENDS,
};

// мӮ¬мҡ©мһҗк°Җ backend URL ліҖкІҪ мӢң нҳём¶ңлҗҳлҠ” setter
window.HPWD_setBackend = function(newUrl) {
  newUrl = (newUrl || '').trim();
  if (!newUrl) {
    // л№„мҡ°л©ҙ мһҗлҸҷ лӘЁл“ңлЎң ліөк·Җ
    try { localStorage.removeItem('hpwd_backend_url'); } catch (e) {}
    window.HPWD_BACKEND.url = resolveBackendUrl();
  } else {
    // лҒқмқҳ / м ңкұ°
    newUrl = newUrl.replace(/\/+$/, '');
    try { localStorage.setItem('hpwd_backend_url', newUrl); } catch (e) {}
    window.HPWD_BACKEND.url = newUrl;
  }
  window.HPWD_BACKEND.connected = false;
  window.HPWD_BACKEND.lastError = null;
  window.dispatchEvent(new Event('hpwd-backend-status'));
  checkBackendHealth();  // мҰүмӢң лӢӨмӢң мІҙнҒ¬
};

// л№„лҸҷкё° health check вҖ” 5мҙҲл§ҲлӢӨ нҸҙл§Ғ
async function checkBackendHealth() {
  const url = window.HPWD_BACKEND.url;
  try {
    const r = await fetch(`${url}/health`, { method: 'GET' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    window.HPWD_BACKEND.connected = true;
    window.HPWD_BACKEND.components = data.components || [];
    window.HPWD_BACKEND.lastError = null;
  } catch (e) {
    window.HPWD_BACKEND.connected = false;
    window.HPWD_BACKEND.lastError = e.message;
  }
  // ліҖкІҪ м•ҢлҰј (status indicatorк°Җ re-render нҠёлҰ¬кұ°)
  window.dispatchEvent(new Event('hpwd-backend-status'));
}
checkBackendHealth();
setInterval(checkBackendHealth, 5000);

/* лҸҷкё° нҳём¶ң вҖ” XMLHttpRequestлЎң л§Ө stepл§ҲлӢӨ нҳём¶ң.
 * н–Ҙнӣ„ async + мәҗмӢңлЎң м§„нҷ” к°ҖлҠҘн•ҳм§Җл§Ң кІҖмҰқ лӢЁкі„лҠ” лӢЁмҲңн•Ёмқҙ мҡ°м„ .
 * URLмқҖ л§Ө нҳём¶ңл§ҲлӢӨ window.HPWD_BACKEND.urlм—җм„ң к°Җм ёмҳҙ (мӮ¬мҡ©мһҗ нҶ кёҖ мҰүмӢң л°ҳмҳҒ). */
function callBackendSync(componentName, input, params, state, dt) {
  const xhr = new XMLHttpRequest();
  const url = window.HPWD_BACKEND.url;
  xhr.open('POST', `${url}/compute`, false); // лҸҷкё° нҳём¶ң
  xhr.setRequestHeader('Content-Type', 'application/json');
  try {
    xhr.send(JSON.stringify({ component: componentName, input, params, state, dt }));
    if (xhr.status !== 200) {
      throw new Error(`Backend returned ${xhr.status}: ${xhr.responseText}`);
    }
    const data = JSON.parse(xhr.responseText);
    if (data.error) throw new Error(data.error);
    return { outputs: data.outputs || {}, newState: data.newState || state };
  } catch (e) {
    window.HPWD_BACKEND.connected = false;
    window.HPWD_BACKEND.lastError = e.message;
    window.dispatchEvent(new Event('hpwd-backend-status'));
    throw e;
  }
}

    desc: 'лҢҖкё° мЎ°кұҙ (мҳЁлҸ„/мҠөлҸ„)',
    parameters: [
      { key: 'T_amb', label: 'T_ambient', value: 25, unit: 'В°C' },
      { key: 'RH_amb', label: 'RH_ambient', value: 50, unit: '%' },
      { key: 'P_atm', label: 'P_atm', value: 101.325, unit: 'kPa' },
    ],
    inputs: [],
    outputs: [
      { key: 'T_out', label: 'T', unit: 'В°C' },
      { key: 'RH_out', label: 'RH', unit: '%' },
      { key: 'P_out', label: 'P', unit: 'kPa' },
    ],
    compute: (inp, par) => ({ T_out: par.T_amb, RH_out: par.RH_amb, P_out: par.P_atm }),
  },
  compressor: {
    typeNo: 100, name: 'Compressor', category: 'refrigerant', color: '#dc2626', icon: CircleDot, image: './images/compressor.png',
    desc: 'лЎңн„°лҰ¬/лҰ¬мӢңн”„лЎң м••м¶•кё°',
    parameters: [
      { key: 'V_disp', label: 'Displacement', value: 10.0, unit: 'cc' },
      { key: 'RPM', label: 'Speed', value: 3000, unit: 'rpm' },
      { key: 'eta_v', label: 'О·_vol', value: 0.85, unit: '-' },
      { key: 'eta_is', label: 'О·_is', value: 0.70, unit: '-' },
      { key: 'PR', label: 'Press. Ratio', value: 3.5, unit: '-' },
    ],
    inputs: [
      { key: 'P_suc', label: 'P_suc', unit: 'kPa' },
      { key: 'T_suc', label: 'T_suc', unit: 'В°C' },
    ],
    outputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_dis', label: 'T_dis', unit: 'В°C' },
      { key: 'P_dis', label: 'P_dis', unit: 'kPa' },
      { key: 'W_comp', label: 'W_comp', unit: 'W' },
    ],
    compute: (inp, par) => {
      const P_suc = inp.P_suc ?? 500;
      const T_suc = inp.T_suc ?? 10;
      const T_suc_K = T_suc + 273.15;
      const rho = (P_suc * 1000) / (120 * T_suc_K);
      const m_dot = par.eta_v * rho * par.V_disp * 1e-6 * par.RPM / 60 * 1000;
      const P_dis = P_suc * par.PR;
      const T_dis_is = T_suc_K * Math.pow(par.PR, 0.28);
      const T_dis = T_suc_K + (T_dis_is - T_suc_K) / par.eta_is;
      const W_comp = (m_dot / 1000) * 1.0 * (T_dis - T_suc_K) * 1000;
      return { m_dot, T_dis: T_dis - 273.15, P_dis, W_comp };
    },
  },
  condenser: {
    typeNo: 101, name: 'Condenser', category: 'refrigerant', color: '#ea580c', icon: Box, image: './images/condenser.png',
    desc: 'мқ‘м¶•кё° (кі мҳЁмёЎ м—ҙкөҗнҷҳкё°)',
    parameters: [
      { key: 'UA', label: 'UA', value: 150, unit: 'W/K' },
      { key: 'dP_ref', label: 'О”P_ref', value: 20, unit: 'kPa' },
    ],
    inputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_in', label: 'T_ref_in', unit: 'В°C' },
      { key: 'P_in', label: 'P_ref_in', unit: 'kPa' },
      { key: 'T_air', label: 'T_air', unit: 'В°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_out', label: 'T_ref_out', unit: 'В°C' },
      { key: 'P_out', label: 'P_ref_out', unit: 'kPa' },
      { key: 'Q', label: 'Q_cond', unit: 'W' },
      { key: 'T_air_out', label: 'T_air_out', unit: 'В°C' },
    ],
    compute: (inp, par) => {
      const m = (inp.m_dot ?? 1) / 1000;
      const T_in = inp.T_in ?? 80;
      const T_air = inp.T_air ?? 25;
      const m_air = inp.m_air ?? 0.05;
      const C_min = Math.min(m * 1200, m_air * 1005);
      const NTU = par.UA / Math.max(C_min, 1e-6);
      const eps = 1 - Math.exp(-NTU);
      const Q = eps * C_min * (T_in - T_air);
      const T_out = T_in - Q / (m * 1200 + 1e-6);
      const T_air_out = T_air + Q / (m_air * 1005 + 1e-6);
      return { T_out, P_out: (inp.P_in ?? 1800) - par.dP_ref, Q, T_air_out };
    },
  },
  exv: {
    typeNo: 102, name: 'EEV', category: 'refrigerant', color: '#d97706', icon: Zap, image: './images/eev.png',
    desc: 'м „мһҗнҢҪм°Ҫл°ёлёҢ (Electronic EEV)',
    parameters: [
      { key: 'A_orifice', label: 'A_orifice', value: 0.5, unit: 'mmВІ' },
      { key: 'opening', label: 'Opening', value: 100, unit: '%' },

    inputs: [

      { key: 'T_in', label: 'T_in', unit: 'В°C' },
      { key: 'P_out_target', label: 'P_out', unit: 'kPa' },
    ],
    outputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_out', label: 'T_out', unit: 'В°C' },

      const P_in = inp.P_in ?? 1800;
      const P_out = inp.P_out_target ?? 500;
      const T_in = inp.T_in ?? 35;
      const A_eff = par.A_orifice * (par.opening / 100) * 1e-6;
      const rho = (P_in * 1000) / (120 * (T_in + 273.15));
      const dP = Math.max((P_in - P_out) * 1000, 0);
      const m_dot = par.Cd * A_eff * Math.sqrt(2 * rho * dP) * 1000;
      return { m_dot, T_out: 0.03 * P_out - 20, P_out };
    },
  },
  txv: {
    typeNo: 104, name: 'TXV', category: 'refrigerant', color: '#b45309', icon: Zap, image: './images/txv.png',
    desc: 'мҳЁлҸ„мӢқ нҢҪм°Ҫл°ёлёҢ (TXV) вҖ” superheat мһҗкё°мЎ°м Ҳ',

      { key: 'A_max', label: 'A_max', value: 0.6, unit: 'mmВІ' },

      { key: 'T_in', label: 'T_in', unit: 'В°C' },
      { key: 'P_out_target', label: 'P_out', unit: 'kPa' },
      { key: 'SH_meas', label: 'SH_meas', unit: 'K' },
    ],
    outputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_out', label: 'T_out', unit: 'В°C' },
      { key: 'P_out', label: 'P_out', unit: 'kPa' },
      { key: 'opening', label: 'opening', unit: '%' },

      const P_in = inp.P_in ?? 1800;
      const P_out = inp.P_out_target ?? 500;
      const T_in = inp.T_in ?? 35;
      const SH_meas = inp.SH_meas ?? par.SH_target;
      // SHк°Җ targetліҙлӢӨ лҶ’мңјл©ҙ лҚ” м—ҙкі , лӮ®мңјл©ҙ лҚ” лӢ«мқҢ (мӢңл®¬ м•Ҳм •м„ұмқ„ мң„н•ҙ 0~100% clamp)
      const opening = Math.max(0, Math.min(100, 70 + par.gain * (SH_meas - par.SH_target) * 100));
      const A_eff = par.A_max * (opening / 100) * 1e-6;
      const rho = (P_in * 1000) / (120 * (T_in + 273.15));
      const dP = Math.max((P_in - P_out) * 1000, 0);
      const m_dot = par.Cd * A_eff * Math.sqrt(2 * rho * dP) * 1000;
      return { m_dot, T_out: 0.03 * P_out - 20, P_out, opening };
    },
  },
  evaporator: {
    typeNo: 103, name: 'Evaporator', category: 'refrigerant', color: '#2563eb', icon: Droplet, image: './images/evaporator.png',
    desc: 'мҰқл°ңкё° (м ҖмҳЁмёЎ м—ҙкөҗнҷҳкё°)',
    parameters: [
      { key: 'UA', label: 'UA', value: 120, unit: 'W/K' },
      { key: 'dP_ref', label: 'О”P_ref', value: 15, unit: 'kPa' },
      { key: 'SH', label: 'Superheat', value: 5, unit: 'K' },
    ],
    inputs: [
      { key: 'm_dot', label: 'm_dot', unit: 'g/s' },
      { key: 'T_in', label: 'T_ref_in', unit: 'В°C' },
      { key: 'P_in', label: 'P_ref_in', unit: 'kPa' },
      { key: 'T_air', label: 'T_air', unit: 'В°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_out', label: 'T_ref_out', unit: 'В°C' },
      { key: 'P_out', label: 'P_ref_out', unit: 'kPa' },
      { key: 'Q', label: 'Q_evap', unit: 'W' },
      { key: 'T_air_out', label: 'T_air_out', unit: 'В°C' },
    ],
    compute: (inp, par) => {
      const m = (inp.m_dot ?? 1) / 1000;
      const T_in = inp.T_in ?? -10;
      const T_air = inp.T_air ?? 40;
      const m_air = inp.m_air ?? 0.05;
      const C_min = Math.min(m * 1500, m_air * 1005);
      const NTU = par.UA / Math.max(C_min, 1e-6);
      const eps = 1 - Math.exp(-NTU);
      const Q = eps * C_min * (T_air - T_in);
      const T_air_out = T_air - Q / (m_air * 1005 + 1e-6);
      return { T_out: T_in + par.SH, P_out: (inp.P_in ?? 500) - par.dP_ref, Q, T_air_out };
    },
  },
  fan: {
    typeNo: 200, name: 'Fan', category: 'air', color: '#0891b2', icon: Wind, image: './images/fan.png',
    desc: 'мҶЎн’Қкё° (мӢңлЎңмҪ”/м¶•лҘҳ)',
    parameters: [
      { key: 'RPM', label: 'Speed', value: 2500, unit: 'rpm' },
      { key: 'V_max', label: 'V_max', value: 0.15, unit: 'mВі/s' },
      { key: 'eta', label: 'О·_fan', value: 0.55, unit: '-' },
      { key: 'dP_max', label: 'О”P_max', value: 300, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_in', label: 'T_air_in', unit: 'В°C' },
      { key: 'dP_sys', label: 'О”P_system', unit: 'Pa' },
    ],
    outputs: [
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
      { key: 'T_out', label: 'T_air_out', unit: 'В°C' },
      { key: 'W_fan', label: 'W_fan', unit: 'W' },
    ],
    compute: (inp, par) => {
      const T_in = inp.T_in ?? 25;
      const dP_sys = inp.dP_sys ?? 150;
      const speed_frac = par.RPM / 2500;
      const V = par.V_max * speed_frac * Math.sqrt(Math.max(1 - dP_sys / (par.dP_max * speed_frac ** 2), 0.1));
      const rho_air = 1.2 * (293.15 / (T_in + 273.15));
      const m_air = rho_air * V;
      const W_fan = (V * dP_sys) / par.eta;
      return { m_air, T_out: T_in + W_fan / (m_air * 1005 + 1e-6), W_fan };
    },
  },
  drum: {
    typeNo: 201, name: 'Drum', category: 'air', color: '#0e7490', icon: Gauge, image: './images/drum.png',
    desc: 'м„ёнғҒкұҙмЎ°кё° л“ңлҹј (м§Ғл¬ј-кіөкё° м—ҙ/л¬јм§Ҳм „лӢ¬)',
    parameters: [
      { key: 'm_fabric', label: 'Fabric Mass', value: 5.0, unit: 'kg' },
      { key: 'MC_init', label: 'MC_init', value: 0.8, unit: '-' },
      { key: 'hA', label: 'hA', value: 50, unit: 'W/K' },
      { key: 'dP_drum', label: 'О”P_drum', value: 100, unit: 'Pa' },
    ],
    inputs: [
      { key: 'T_air_in', label: 'T_air_in', unit: 'В°C' },
      { key: 'm_air', label: 'm_air', unit: 'kg/s' },
    ],
    outputs: [
      { key: 'T_air_out', label: 'T_air_out', unit: 'В°C' },
      { key: 'MC', label: 'MC', unit: '-' },
      { key: 'm_evap', label: 'm_evap', unit: 'g/s' },
      { key: 'dP', label: 'О”P', unit: 'Pa' },
    ],
    stateInit: { MC: null, T_fab: 25 },
    compute: (inp, par, t, state, dt) => {
      const T_air_in = inp.T_air_in ?? 50;
      const m_air = inp.m_air ?? 0.05;
      if (state.MC === null) state.MC = par.MC_init;
      const dT = T_air_in - state.T_fab;
      const Q = par.hA * dT;
      const h_fg = 2400e3;
      const m_evap = state.MC > 0.05 ? Q / h_fg : 0;
      state.T_fab = state.T_fab + (Q - m_evap * h_fg) / (par.m_fabric * 1500) * dt;
      state.MC = Math.max(state.MC - (m_evap * dt) / par.m_fabric, 0);
      return {
        T_air_out: T_air_in - Q / (m_air * 1005 + 1e-6),
        MC: state.MC,
        m_evap: m_evap * 1000,
        dP: par.dP_drum,
      };
    },
  },

/* лҸҷм Ғ лӢЁмң„ л§Өн•‘ (Properties нҢЁл„җмқҳ unit:'@otherKey' н•ҙм„қмҡ©)
 * м»ҙнҸ¬л„ҢнҠёлі„ kindвҶ’unit мӮ¬м „. refrigerant_props/air_propsм—җм„ң мӮ¬мҡ©. */
const DYNAMIC_UNIT_MAP = {
  refrigerant_props: {
    T: 'В°C', P: 'bar', Q: '-', H: 'kJ/kg', S: 'kJ/kgВ·K', D: 'kg/mВі', U: 'kJ/kg',
  },
  air_props: {
    T: 'В°C', P: 'bar', R: '%', W: 'kg/kg', B: 'В°C', D: 'В°C', H: 'kJ/kg',
  },
};
function resolveDynamicUnit(typeKey, kindValue) {
  const m = DYNAMIC_UNIT_MAP[typeKey];
  if (!m) return '';
  return m[kindValue] || '';
}

/* лё”лЎқмқҳ outputs мӨ‘ нҳ„мһ¬ нҷңм„ұлҗң кІғл§Ң л°ҳнҷҳ.
 * params.output_select л°°м—ҙмқҙ мһҲмңјл©ҙ к·ё н•ӯлӘ©л§Ң, м—Ҷмңјл©ҙ м „л¶Җ.
 * Refrigerant Props / Air Propsк°Җ мӮ¬мҡ©. */
function getActiveOutputs(block) {
  const def = TYPES[block.type];
  if (!def || !def.outputs) return [];
  const sel = block.params && block.params.output_select;
  if (!Array.isArray(sel)) return def.outputs;
  return def.outputs.filter(o => sel.includes(o.key));
}

/* л‘җ лё”лЎқ м№ҙн…Ңкі лҰ¬лЎңл¶Җн„° default лқјмқё мў…лҘҳ кІ°м •.
 * л¬јлҰ¬ л°°кҙҖ м№ҙн…Ңкі лҰ¬(refrigerant/air/water)лҒјлҰ¬лҠ” к·ё мў…лҘҳлЎң,
 * м¶”мғҒ м№ҙн…Ңкі лҰ¬(math/control/source/output)к°Җ лҒјл©ҙ signalлЎң default. */
function detectLineKind(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return 'signal';
  const fromCat = TYPES[fromBlock.type]?.category;
  const toCat = TYPES[toBlock.type]?.category;
  const PHYSICAL = new Set(['refrigerant', 'air', 'water']);
  // м–‘мӘҪ лӘЁл‘җ к°ҷмқҖ л¬јлҰ¬ л°°кҙҖ вҶ’ к·ё мў…лҘҳ
  if (fromCat === toCat && PHYSICAL.has(fromCat)) return fromCat;
  // н•ңмӘҪл§Ң л¬јлҰ¬ л°°кҙҖ, лӢӨлҘёмӘҪмқҙ source/output к°ҷмқҖ мӨ‘лҰҪ вҶ’ л¬јлҰ¬ л°°кҙҖ мў…лҘҳ
  // (лӢЁ, лӢӨлҘё м¶”мғҒ м№ҙн…Ңкі лҰ¬(math/control)мҷҖ м„һмқҙл©ҙ signal мҡ°м„ )
  const ABSTRACT = new Set(['math', 'control']);
  const fromAbs = ABSTRACT.has(fromCat);
  const toAbs = ABSTRACT.has(toCat);
  if (fromAbs || toAbs) return 'signal';
  if (PHYSICAL.has(fromCat)) return fromCat;
  if (PHYSICAL.has(toCat)) return toCat;
  return 'signal';
}

/* лқјмқё мў…лҘҳмқҳ default lineParams мғқм„ұ */
function defaultLineParams(kind) {
  const out = {};
  (LINE_KINDS[kind]?.fields || []).forEach(f => { out[f.key] = f.value; });
  return out;
}

/* л‘җ лё”лЎқ мӮ¬мқҙм—җ мһҗлҸҷмңјлЎң нҳёнҷҳ мӢңк·ёл„җ нҺҳм–ҙлҘј л§Өн•‘.
 * pass 1: нӮӨ мҷ„м „мқјм№ҳ  В·  pass 2: нӮӨ prefix + лӢЁмң„ мқјм№ҳ  В·  pass 3: лӢЁмң„л§Ң мқјм№ҳ */
function autoMapSignals(fromBlock, toBlock) {
  if (!fromBlock || !toBlock) return [];
  const fromOuts = TYPES[fromBlock.type]?.outputs || [];
  const toIns = TYPES[toBlock.type]?.inputs || [];
  const usedTo = new Set();
  const mapped = [];
  // pass 1: exact key match
  fromOuts.forEach(out => {
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.key === out.key);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 2: prefix + unit match (T_dis вҶ” T_in)
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    const prefix = out.key.split('_')[0];
    const m = toIns.find(inp =>
      !usedTo.has(inp.key) &&
      inp.key.split('_')[0] === prefix &&
      (inp.unit || '') === (out.unit || '')
    );
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  // pass 3: unit-only fallback
  fromOuts.forEach(out => {
    if (mapped.some(s => s.fromPort === out.key)) return;
    if (!out.unit) return;
    const m = toIns.find(inp => !usedTo.has(inp.key) && inp.unit === out.unit);
    if (m) { mapped.push({ fromPort: out.key, toPort: m.key }); usedTo.add(m.key); }
  });
  return mapped;
}

// к·ёлҰ¬л“ң нҒ¬кё° (px). мә”лІ„мҠӨ л°°кІҪ dot patternкіј лҸҷмқј.
const GRID_SIZE = 20;

/* в•җв•җв•җв•җв•җв•җв•җв•җ лё”лЎқ connector slot мӢңмҠӨн…ң в•җв•җв•җв•җв•җв•җв•җв•җ
 * н•ң лё”лЎқм—җ мўҢмёЎ Nк°ң input slot, мҡ°мёЎ Nк°ң output slot.
 * мӮ¬мҡ© мӨ‘мқё slotл§Ң visible, л№Ҳ slotмқҖ hover лҳҗлҠ” м—°кІ° лӘЁл“ңмқј л•Ң ghostлЎң н‘ңмӢң.
 * н•ң лё”лЎқмқҙ м—¬лҹ¬ source / sink лӘЁл“Ҳкіј м—°кІ°лҗ  мҲҳ мһҲлӢӨ. */
const SLOTS_PER_SIDE = 4;

/* connections мӨ‘ н•ҙлӢ№ (block, side)м—җм„ң к°ҖмһҘ л№ лҘё л№Ҳ slot index. лӢӨ м°Ёл©ҙ л§Ҳм§Җл§ү. */
function findFreeSlot(cs, blockId, side) {
  const used = new Set();
  cs.forEach(c => {
    if (c.from?.blockId === blockId && c.from.side === side && c.from.slot !== undefined) used.add(c.from.slot);
    if (c.to?.blockId === blockId && c.to.side === side && c.to.slot !== undefined) used.add(c.to.slot);
  });
  for (let i = 0; i < SLOTS_PER_SIDE; i++) {
    if (!used.has(i)) return i;
  }
  return SLOTS_PER_SIDE - 1;
}

/* мҠ¬лЎҜ stub лҒқ мўҢн‘ң (slotм—җм„ң STUBл§ҢнҒј л©ҙ л°”к№Ҙ л°©н–Ҙ) */
function stubEnd(point, side, stub) {
  switch (side) {
    case 'right':  return { x: point.x + stub, y: point.y };
    case 'left':   return { x: point.x - stub, y: point.y };
    case 'top':    return { x: point.x, y: point.y - stub };
    case 'bottom': return { x: point.x, y: point.y + stub };
    default:       return { x: point.x + stub, y: point.y };
  }
}

/* м§Ғк°Ғ segment (мҲҳнҸү лҳҗлҠ” мҲҳм§Ғ)мҷҖ axis-aligned rect көҗм°Ё м—¬л¶Җ. margin: rect мЈјліҖ padding. */
function segmentHitsRect(a, b, rect, margin = 0) {
  const x1 = rect.x - margin, x2 = rect.x + rect.w + margin;
  const y1 = rect.y - margin, y2 = rect.y + rect.h + margin;
  if (Math.abs(a.y - b.y) < 0.5) {
    // мҲҳнҸү
    const sx = Math.min(a.x, b.x), ex = Math.max(a.x, b.x);
    return a.y > y1 && a.y < y2 && ex > x1 && sx < x2;
  }
  // мҲҳм§Ғ
  const sy = Math.min(a.y, b.y), ey = Math.max(a.y, b.y);
  return a.x > x1 && a.x < x2 && ey > y1 && sy < y2;
}

/* points кІҪлЎң мӨ‘ obstaclesмҷҖ м¶©лҸҢн•ҳлҠ” segmentк°Җ н•ҳлӮҳлқјлҸ„ мһҲлҠ”м§Җ.
 * obstaclesмқҳ ownEndpoint=trueлҠ” segment н•ң лҒқмқҙ лқјмқёмқҳ from/to pointмҷҖ м •нҷ•нһҲ мқјм№ҳн•ҳлҠ”
 * кІҪмҡ°(=stub segment)м—җл§Ң м¶©лҸҢ л¬ҙмӢң. ліёмІҙ к°ҖлЎңм§ҖлҘҙлҠ” segmentлҠ” н•ӯмғҒ кІҖмӮ¬. */
function pathHitsObstacles(points, obstacles, margin = 8) {
  const fromP = points[0];
  const toP = points[points.length - 1];
  const eq = (a, b) => Math.abs(a.x - b.x) < 0.5 && Math.abs(a.y - b.y) < 0.5;
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const isFromStub = eq(a, fromP) || eq(b, fromP);
    const isToStub   = eq(a, toP)   || eq(b, toP);
    for (const r of obstacles) {
      // ownEndpoint stub segmentлҠ” л¬ҙмӢң
      if (r.ownEndpoint && (isFromStub || isToStub)) continue;
      // ownEndpoint лё”лЎқ мһҗмІҙлҠ” margin=0 (к°ҖмһҘмһҗлҰ¬м—җм„ң л№ м ёлӮҳк°ҖлҠ” кІғ н—Ҳмҡ©)
      const m = r.ownEndpoint ? 0 : margin;
      if (segmentHitsRect(a, b, r, m)) return true;
    }
  }
  return false;
}

/* л‘җ мҠ¬лЎҜ мӮ¬мқҙ м§Ғк°Ғ elbow кІҪлЎң corner м җл“Ө. */
function buildElbowPoints(fromPos, fromSide, toPos, toSide, stub) {
  const fs = stubEnd(fromPos, fromSide, stub);
  const ts = stubEnd(toPos, toSide, stub);
  const fromH = fromSide === 'left' || fromSide === 'right';
  const toH   = toSide === 'left' || toSide === 'right';
  const points = [fromPos];

  // л©ҙмқҙ к°ҷмқҖ л°©н–Ҙ(л‘ҳ лӢӨ horizontal or л‘ҳ лӢӨ vertical) вҖ” same-axis case
  if (fromH && toH) {
    // horizontal л©ҙ л‘җ к°ң. yлҠ” лӢӨлҘј мҲҳ мһҲмқҢ. л©ҙ л°ҳлҢҖ л°©н–Ҙмқҙл©ҙ г„№мһҗ, к°ҷмқҖ л°©н–Ҙмқҙл©ҙ г„·мһҗ.
    const opposing = (fromSide === 'right' && toSide === 'left') || (fromSide === 'left' && toSide === 'right');
    const sameSide = fromSide === toSide;
    if (sameSide) {
      // г„·мһҗ: stub л©ҙ л°”к№ҘмңјлЎң л‘җ stub end лӘЁл‘җлҘј л„ҳм–ҙк°ҖлҠ” outX
      // fromSide==='right'л©ҙ outXлҠ” max(fs.x, ts.x). лӢЁ л‘ҳ мӨ‘ лҚ” м•ҲмӘҪмқё кІғмқҙ stubл§ҢнҒј лҚ” к°Җк№Ңмҡё мҲҳ мһҲм–ҙ
      // м•Ҳм „н•ҳкІҢ stub м¶”к°Җ.
      const outDir = fromSide === 'right' ? 1 : -1;
      const outX = outDir > 0
        ? Math.max(fs.x, ts.x)
        : Math.min(fs.x, ts.x);
      // м•ҲмӘҪ stub end вҶ’ outX к°ҖлҠ” segmentк°Җ мһҗкё° л©ҙ м•ҲмӘҪмңјлЎң нӣ„м§„н•ҳм§Җ м•ҠлҸ„лЎқ кІҖмӮ¬:
      // fs, ts л‘ҳ лӢӨ outXмҷҖ к°ҷмқҖ л°©н–Ҙ (outDir>0мқҙл©ҙ outX >= fs.x && outX >= ts.x). OK.
      points.push(fs, { x: outX, y: fs.y }, { x: outX, y: ts.y }, ts);
    } else if (opposing) {
      // л§ҲмЈјліҙкё°: л‘җ stub лҒқ мӮ¬мқҙк°Җ м–‘мҲҳл©ҙ г„№мһҗ, мқҢмҲҳ(м„ңлЎң м№ЁлІ”)л©ҙ мҡ°нҡҢ
      const fromOut = fromSide === 'right' ? 1 : -1;
      const gap = (ts.x - fs.x) * fromOut;
      if (gap >= 0) {
        // м •мғҒ г„№мһҗ вҖ” мӨ‘к°„ midX
        const midX = (fs.x + ts.x) / 2;
        points.push(fs, { x: midX, y: fs.y }, { x: midX, y: ts.y }, ts);
      } else {
        // stubмқҙ м„ңлЎң м№ЁлІ” вҶ’ мң„/м•„лһҳлЎң мҡ°нҡҢ (г„·мһҗ нҡҢн”ј)
        const detourY = fs.y < ts.y
          ? Math.min(fs.y, ts.y) - stub
          : Math.max(fs.y, ts.y) + stub;
        points.push(fs, { x: fs.x, y: detourY }, { x: ts.x, y: detourY }, ts);
      }
    } else {
      // мһҳлӘ»лҗң мЎ°н•© (мӢӨм ң л°ңмғқ X)
      points.push(fs, ts);
    }
  } else if (!fromH && !toH) {
    // vertical л©ҙ л‘җ к°ң
    const opposing = (fromSide === 'bottom' && toSide === 'top') || (fromSide === 'top' && toSide === 'bottom');
    const sameSide = fromSide === toSide;
    if (sameSide) {
      const outDir = fromSide === 'bottom' ? 1 : -1;
      const outY = outDir > 0
        ? Math.max(fs.y, ts.y)
        : Math.min(fs.y, ts.y);
      points.push(fs, { x: fs.x, y: outY }, { x: ts.x, y: outY }, ts);
    } else if (opposing) {
      const fromOut = fromSide === 'bottom' ? 1 : -1;
      const gap = (ts.y - fs.y) * fromOut;
      if (gap >= 0) {
        // м •мғҒ г„№мһҗ
        const midY = (fs.y + ts.y) / 2;
        points.push(fs, { x: fs.x, y: midY }, { x: ts.x, y: midY }, ts);
      } else {
        // мҡ°нҡҢ (мўҢ/мҡ°)
        const detourX = fs.x < ts.x
          ? Math.min(fs.x, ts.x) - stub
          : Math.max(fs.x, ts.x) + stub;
        points.push(fs, { x: detourX, y: fs.y }, { x: detourX, y: ts.y }, ts);
      }
    } else {
      points.push(fs, ts);
    }
  } else if (fromH && !toH) {
    // horizontal вҶ’ vertical: corner нӣ„ліҙ 4к°Җм§Җ мӨ‘ нӣ„м§„ м—ҶлҠ” best
    const fromOut = fromSide === 'right' ? 1 : -1;
    const toOut = toSide === 'bottom' ? 1 : -1;
    // л‘җ stub endлҠ” к°Ғмһҗ л©ҙ л°”к№ҘмңјлЎң лӮҳк°җ. corner нӣ„ліҙ:
    //  C1: {ts.x, fs.y}  вҖ” to-stub лқјмқё л”°лқј fs.yм—җм„ң л§ҢлӮЁ (1-corner)
    //  C2: {fs.x, ts.y}  вҖ” from-stub лқјмқё л”°лқј ts.yм—җм„ң л§ҢлӮЁ (1-corner)
    // м–ҙлҠҗ мӘҪмқҙ л‘җ stub лӘЁл‘җлҘј нӣ„м§„мӢңнӮӨм§Җ м•ҠлҠ”к°Җ?
    //   C1 OK: corner.xлҘј ts.xм—җм„ң fs.xлЎң к°ҖлҠ” segment(fsвҶ’C1)к°Җ fromOut л°©н–Ҙмқҙл©ҙ OK,
    //          C1вҶ’ts segmentк°Җ toOut л°©н–Ҙмқҙл©ҙ OK
    //   C2 л§Ҳм°¬к°Җм§Җ
    const c1Ok = (ts.x - fs.x) * fromOut >= 0 && (fs.y - ts.y) * toOut >= 0;
    const c2Ok = (fs.x - ts.x) * fromOut * -1 >= 0 && (ts.y - fs.y) * toOut * -1 >= 0;
    if (c1Ok) {
      points.push(fs, { x: ts.x, y: fs.y }, ts);
    } else if (c2Ok) {
      points.push(fs, { x: fs.x, y: ts.y }, ts);
    } else {
      // л‘ҳ лӢӨ stub нӣ„м§„ вҖ” 2-corner г„№мһҗ: from-stub лҒқ л„ҲлЁёлЎң л№ м§„ нӣ„ ts.xлЎң
      const extX = fs.x + fromOut * stub;
      const extY = ts.y + toOut * stub;
      points.push(fs, { x: extX, y: fs.y }, { x: extX, y: extY }, { x: ts.x, y: extY }, ts);
    }
  } else {
    // vertical вҶ’ horizontal
    const fromOut = fromSide === 'bottom' ? 1 : -1;
    const toOut = toSide === 'right' ? 1 : -1;
    const c1Ok = (ts.y - fs.y) * fromOut >= 0 && (fs.x - ts.x) * toOut >= 0;
    const c2Ok = (fs.y - ts.y) * fromOut * -1 >= 0 && (ts.x - fs.x) * toOut * -1 >= 0;
    if (c1Ok) {
      points.push(fs, { x: fs.x, y: ts.y }, ts);
    } else if (c2Ok) {
      points.push(fs, { x: ts.x, y: fs.y }, ts);
    } else {
      const extY = fs.y + fromOut * stub;
      const extX = ts.x + toOut * stub;
      points.push(fs, { x: fs.x, y: extY }, { x: extX, y: extY }, { x: extX, y: ts.y }, ts);
    }
  }
  points.push(toPos);
  return points;
}

/* obstacles нҡҢн”ј лқјмҡ°нҢ…. кё°ліё elbowк°Җ м¶©лҸҢн•ҳл©ҙ мң„/м•„лһҳ/мўҢ/мҡ° 4к°Җм§Җ мҡ°нҡҢлҘј мӢңлҸ„н•ҙ к°ҖмһҘ м§§мқҖ кІғ л°ҳнҷҳ. */
function buildAvoidingRoute(fromPos, fromSide, toPos, toSide, stub, obstacles) {
  const base = buildElbowPoints(fromPos, fromSide, toPos, toSide, stub);
  if (!obstacles || obstacles.length === 0) return base;
  const hit = obstacles.filter(r => pathHitsObstacles(base, [r], 8));
  if (hit.length === 0) return base;

  // м¶©лҸҢ мһҘм• л¬ј нҶөн•© bbox + padding (own blockмқҖ м ңмҷё вҖ” л„Ҳл¬ҙ нҒ° мҡ°нҡҢ л°©м§Җ)
  const PAD = 16;
  let xmin = Infinity, ymin = Infinity, xmax = -Infinity, ymax = -Infinity;
  for (const r of hit) {
    if (r.x < xmin) xmin = r.x;
    if (r.y < ymin) ymin = r.y;
    if (r.x + r.w > xmax) xmax = r.x + r.w;
    if (r.y + r.h > ymax) ymax = r.y + r.h;
  }
  const aboveY = ymin - PAD;
  const belowY = ymax + PAD;
  const leftX  = xmin - PAD;
  const rightX = xmax + PAD;

  const fs = stubEnd(fromPos, fromSide, stub);
  const ts = stubEnd(toPos, toSide, stub);

  const candidates = [
    [fromPos, fs, { x: fs.x, y: aboveY }, { x: ts.x, y: aboveY }, ts, toPos],
    [fromPos, fs, { x: fs.x, y: belowY }, { x: ts.x, y: belowY }, ts, toPos],
    [fromPos, fs, { x: leftX,  y: fs.y }, { x: leftX,  y: ts.y }, ts, toPos],
    [fromPos, fs, { x: rightX, y: fs.y }, { x: rightX, y: ts.y }, ts, toPos],
  ];

  let best = null;
  let bestLen = Infinity;
  for (const cand of candidates) {
    if (pathHitsObstacles(cand, obstacles)) continue;
    let L = 0;
    for (let k = 0; k < cand.length - 1; k++) {
      L += Math.abs(cand[k].x - cand[k + 1].x) + Math.abs(cand[k].y - cand[k + 1].y);
    }
    if (L < bestLen) { bestLen = L; best = cand; }
  }
  return best || base;
}

/* points л°°м—ҙмқ„ SVG pathлЎң вҖ” corner radius r м Ғмҡ© (к°Ғ кәҫмһ„м—җ quadratic bezier). r=0мқҙл©ҙ м§Ғк°Ғ. */
function smoothPath(points, r) {
  if (points.length < 2) return '';
  if (!r || r <= 0 || points.length < 3) {
    return 'M ' + points.map(p => `${p.x} ${p.y}`).join(' L ');
  }
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const next = points[i + 1];
    const dPrev = Math.hypot(curr.x - prev.x, curr.y - prev.y);
    const dNext = Math.hypot(next.x - curr.x, next.y - curr.y);
    if (dPrev < 0.5 || dNext < 0.5) {
      // skip degenerate
      d += ` L ${curr.x} ${curr.y}`;
      continue;
    }
    const radius = Math.min(r, dPrev / 2, dNext / 2);
    const upx = (curr.x - prev.x) / dPrev;
    const upy = (curr.y - prev.y) / dPrev;
    const unx = (next.x - curr.x) / dNext;
    const uny = (next.y - curr.y) / dNext;
    const beforeX = curr.x - upx * radius;
    const beforeY = curr.y - upy * radius;
    const afterX  = curr.x + unx * radius;
    const afterY  = curr.y + uny * radius;
    d += ` L ${beforeX} ${beforeY} Q ${curr.x} ${curr.y} ${afterX} ${afterY}`;
  }
  const last = points[points.length - 1];
  d += ` L ${last.x} ${last.y}`;
  return d;
}
/* ParamInput вҖ” мӮ¬мҡ©мһҗк°Җ мһ…л Ҙ мӨ‘мқј л•Ң raw string ліҙмЎҙ, blur/Enter мӢң commit.
   "м№ёмқ„ лӢӨ м§ҖмӣҢлҸ„ 0мқҙ м•Ҳ лӮЁкІҢ" + "мҶҢмҲҳм җ мһҗмң  мһ…л Ҙ" мІҳлҰ¬. */
function ParamInput({ value, onChange, isNumber }) {
  const [editing, setEditing] = React.useState(null);
  React.useEffect(() => { setEditing(null); }, [value]);
  const display = editing !== null
    ? editing
    : (value === null || value === undefined ? '' : String(value));
  const commit = () => {
    if (editing === null) return;
    const t = editing.trim();
    if (t === '' || t === '-' || t === '.') { setEditing(null); return; }
    if (isNumber) {
      const parsed = parseFloat(t);
      if (isNaN(parsed)) { setEditing(null); return; }
      onChange(parsed);
    } else {
      onChange(t);
    }
  };
  return (
    <input type="text" inputMode={isNumber ? 'decimal' : 'text'}
      value={display}
      onChange={(e) => setEditing(e.target.value)}
      onFocus={(e) => {
        setEditing(value === null || value === undefined ? '' : String(value));
        e.target.select();
      }}
      onBlur={commit}
      onKeyDown={(e) => {
        if (e.key === 'Enter') { e.target.blur(); }
        if (e.key === 'Escape') { setEditing(null); e.target.blur(); }
      }}
      className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500" />
  );
}

const snap = (v) => Math.round(v / GRID_SIZE) * GRID_SIZE;


// м„ёк·ёлЁјнҠё мқҙлҰ„ вҶ’ мҳӨн”„м…Ӣ нӮӨ л§Өн•‘

  const [slotModal, setSlotModal] = useState(null);
  const [slotList, setSlotList] = useState([]);  // мҠ¬лЎҜ л©”нғҖлҚ°мқҙн„° лӘ©лЎқ

  // нҺёмқҳлҘј мң„н•ҙ лӢЁмқј м„ нғқ APIлҘј лӢӨмӨ‘мңјлЎң м–ҙлҢ‘нҠё
  const selected = selectedIds.length > 0 ? selectedIds[selectedIds.length - 1] : null;
  const selectedConn = selectedConnIds.length > 0 ? selectedConnIds[selectedConnIds.length - 1] : null;
  const setSelected = (id) => setSelectedIds(id === null ? [] : [id]);
  const setSelectedConn = (i) => setSelectedConnIds(i === null ? [] : [i]);

  // нҒҙлҰҪліҙл“ң (Ctrl+C/X/Vмҡ©) вҖ” { blocks: [], connections: [] }
  const clipboardRef = useRef(null);

  // Undo/Redo мҠӨнғқ вҖ” к°Ғ м—”нҠёлҰ¬лҠ” { blocks, connections }
  const [undoStack, setUndoStack] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  const undoStackRef = useRef([]);
  const redoStackRef = useRef([]);
  undoStackRef.current = undoStack;
  redoStackRef.current = redoStack;
  const MAX_HISTORY = 50;

  const [simState, setSimState] = useState({
    running: false, t: 0, dt: 1.0, t_final: 600, history: [], log: [],
  });
  const simRef = useRef(simState);
  simRef.current = simState;

  const canvasRef = useRef(null);
  const blockRefsMap = useRef({});  // blockId вҶ’ DOM element ref
  const draggingRef = useRef(null); // л“ңлһҳк·ё мғҒнғңлҘј refлЎң (state лҢҖмӢ )
  const draggingConnRef = useRef(null);
  const mousePosRef = useRef({ x: 0, y: 0 });
  const rafRef = useRef(null);      // requestAnimationFrame id
  const [expandedCats, setExpandedCats] = useState({ source: true, math: true, refrigerant: true, air: true, output: true });

  const handleLibraryDragStart = (e, typeKey) => {
    e.dataTransfer.setData('typeKey', typeKey);
    e.dataTransfer.effectAllowed = 'copy';
  };
  const handleCanvasDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  const handleCanvasDrop = (e) => {
    e.preventDefault();
    const typeKey = e.dataTransfer.getData('typeKey');
    if (!typeKey || !TYPES[typeKey]) return;
    const rect = canvasRef.current.getBoundingClientRect();
    addBlock(
      typeKey,
      (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom,
      (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom
    );
  };

  const addBlock = (typeKey, x, y) => {
    const def = TYPES[typeKey];
    const id = `b${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    let params = Object.fromEntries(def.parameters.map(p => [p.key, p.value]));
    
    // в”Җв”Җв”Җ On-Design Studio pending design мһҗлҸҷ м Ғмҡ© в”Җв”Җв”Җ
    // localStorageм—җ hpwd_pending_designмқҙ мһҲкі  typeNoк°Җ мқјм№ҳн•ҳл©ҙ params лҚ®м–ҙм”Җ.
    // м§„мҳҒлӢҳ н”ҢлЎңмҡ°: On-Design Studioм—җм„ң Apply вҶ’ м—¬кё°м„ң мһҗлҸҷ sync вҶ’ consumed.
    try {
      const pendingRaw = localStorage.getItem('hpwd_pending_design');
      if (pendingRaw) {
        const pending = JSON.parse(pendingRaw);
        if (pending && pending.typeNo === def.typeNo && pending.params) {
          // typeNo мқјм№ҳ вҖ” params лҚ®м–ҙм“°кё°
          params = { ...params, ...pending.params };
          localStorage.removeItem('hpwd_pending_design');  // н•ңлІҲ мӮ¬мҡ©н•ҳл©ҙ мӮӯм ң
          // мӮ¬мҡ©мһҗм—җкІҢ м•ҢлҰј
          setTimeout(() => {
            const src = pending._source || 'On-Design Studio';
            console.log(`[HPWD Studio] ${src}м—җм„ң м Ғмҡ©лҗң designмқ„ м»ҙнҸ¬л„ҢнҠё ${typeKey} (typeNo ${def.typeNo})м—җ мһҗлҸҷ м Ғмҡ©н•Ё`);
          }, 100);
        }
      }
    } catch (e) {
      console.warn('hpwd_pending_design мқҪкё° мӢӨнҢЁ:', e);
    }
    
    pushHistory(blocks, connections);
    setBlocks(bs => [...bs, {
      id, type: typeKey, x: snap(x - 90), y: snap(y - 40),
      name: `${def.name}_${bs.filter(b => b.type === typeKey).length + 1}`,
      params, outputs: {},
      state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
    }]);
    setSelected(id);
  };

  /* в•җв•җв•җв•җв•җв•җв•җв•җ Preset: нһҲнҠёнҺҢн”„ м„ёнғҒкұҙмЎ°кё° мӮ¬мқҙнҒҙ мқјкҙ„ мғқм„ұ в•җв•җв•җв•җв•җв•җв•җв•җ
   * 6к°ң м»ҙнҸ¬л„ҢнҠё + 5к°ң лқјмқёмқ„ н•ң лІҲм—җ мә”лІ„мҠӨм—җ л°°м№ҳ.
   * AI Chatм—җм„ң нҳём¶ңлҗҳкұ°лӮҳ мӮ¬мҡ©мһҗк°Җ м§Ғм ‘ нҠёлҰ¬кұ° к°ҖлҠҘ.
   * мӮ¬мҡ©мһҗк°Җ exportн•ң JSON layoutмқ„ к·ёлҢҖлЎң baked-inмңјлЎң мӮ¬мҡ©. */
  const loadPreset = (presetName) => {
    const PRESETS = {
      'dryer-cycle': {
        blocks: [
          { type: 'compressor', x: 520, y: 80,  name: 'Compressor_1', imageSize: 80,
            params: { V_disp: 10, RPM: 3000, eta_v: 0.85, eta_is: 0.7, PR: 3.5 } },
          { type: 'condenser',  x: 560, y: 180, name: 'Condenser_1',  imageSize: 80,
            params: { UA: 150, dP_ref: 20 } },
          { type: 'exv',        x: 340, y: 60,  name: 'EEV_1',         imageSize: 80,
            params: { A_orifice: 0.5, opening: 100, Cd: 0.65 } },
          { type: 'evaporator', x: 380, y: 180, name: 'Evaporator_1', imageSize: 80,
            params: { UA: 120, dP_ref: 15, SH: 5 } },
          { type: 'fan',        x: 180, y: 180, name: 'Fan_1',         imageSize: 80,
            params: { RPM: 2500, V_max: 0.15, eta: 0.55, dP_max: 300 } },
          { type: 'drum',       x: 340, y: 280, name: 'Drum_1',
            params: { m_fabric: 5, MC_init: 0.8, hA: 50, dP_drum: 100 } },
        ],
        // 'C', 'CD', 'EEV', 'EV', 'F', 'D' м•Ҫм–ҙлЎң connection м •мқҳ (лё”лЎқ array мқёлҚұмҠӨ)
        connections: [
          // лғүл§Ө мӮ¬мқҙнҒҙ
          { from: ['EV', 'top', 3],    to: ['C', 'left', 3],     kind: 'refrigerant',
            signals: [['T_out','T_suc'],['P_out','P_suc']] },
          { from: ['C', 'right', 0],   to: ['CD', 'right', 0],   kind: 'refrigerant',
            signals: [['m_dot','m_dot'],['T_dis','T_in'],['P_dis','P_in']] },
          { from: ['CD', 'left', 0],   to: ['EEV', 'right', 2],  kind: 'refrigerant',
            signals: [['T_out','T_in'],['P_out','P_in']] },
          { from: ['EEV', 'left', 2],  to: ['EV', 'left', 0],    kind: 'refrigerant',
            signals: [['m_dot','m_dot'],['T_out','T_in'],['P_out','P_in']] },
          // кіөкё° лқјмқё
          { from: ['D', 'left', 2],    to: ['F', 'left', 2],     kind: 'air',
            signals: [['T_air_out','T_in'],['dP','dP_sys']] },
          { from: ['F', 'right', 2],   to: ['EV', 'left', 2],    kind: 'air',
            signals: [['m_air','m_air'],['T_out','T_in']] },
          { from: ['EV', 'right', 2],  to: ['CD', 'left', 2],    kind: 'air',
            signals: [['T_out','T_in'],['P_out','P_in'],['T_air_out','T_air']] },
          { from: ['CD', 'right', 2],  to: ['D', 'right', 2],    kind: 'air',
            signals: [['T_out','T_air_in']] },
        ],
      },
    };

    // alias мІҳлҰ¬ вҖ” лӢӨм–‘н•ң preset мқҙлҰ„ л§Өн•‘
    const aliasMap = {
      'dryer-cycle': 'dryer-cycle',
      'heat-pump-cycle': 'dryer-cycle',
      'hpwd': 'dryer-cycle',
      'heat-pump-washer-dryer': 'dryer-cycle',
    };
    const resolved = aliasMap[presetName];
    const preset = resolved && PRESETS[resolved];
    if (!preset) {
      return { ok: false, error: `Unknown preset: ${presetName}` };
    }
    pushHistory(blocks, connections);
    const ts = Date.now();
    // м•Ҫм–ҙ л§Өн•‘: blocks мқёлҚұмҠӨ мҲңм„ңлҢҖлЎң м•Ҫм–ҙ л¶Җм—¬
    const codes = ['C', 'CD', 'EEV', 'EV', 'F', 'D'];
    const newBlocks = preset.blocks.map((b, i) => {
      const def = TYPES[b.type];
      // кё°ліё нҢҢлқјлҜён„°м—җ presetмқҳ params лҚ®м–ҙм“°кё°
      const params = { ...Object.fromEntries(def.parameters.map(p => [p.key, p.value])), ...(b.params || {}) };
      return {
        id: `b${ts}_${i}_${Math.random().toString(36).slice(2, 5)}`,
        type: b.type,
        x: b.x, y: b.y,
        name: b.name,
        params,
        outputs: {},
        state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {},
        ...(b.imageSize ? { imageSize: b.imageSize } : {}),
      };
    });
    const idMap = Object.fromEntries(codes.map((c, i) => [c, newBlocks[i]?.id]));

    const newConnections = preset.connections.map(c => {
      const [fromCode, fromSide, fromSlot] = c.from;
      const [toCode,   toSide,   toSlot]   = c.to;
      return {
        from: { blockId: idMap[fromCode], side: fromSide, slot: fromSlot },
        to:   { blockId: idMap[toCode],   side: toSide,   slot: toSlot },
        kind: c.kind,
        signals: c.signals.map(([fp, tp]) => ({ fromPort: fp, toPort: tp })),
        lineParams: defaultLineParams(c.kind),
        cornerRadius: 8,
        routeMode: 'auto',
      };
    });

    setBlocks(newBlocks);
    setConnections(newConnections);
    setSelectedIds([]);
    setSelectedConnIds([]);
    return { ok: true, summary: `${newBlocks.length} blocks, ${newConnections.length} connections` };
  };

  /* в•җв•җв•җв•җв•җв•җв•җв•җ Mock AI: мӮ¬мҡ©мһҗ л©”мӢңм§ҖлҘј нӮӨмӣҢл“ңлЎң л¶„м„қн•ҙм„ң лҸ„кө¬ нҳём¶ң мӢңл®¬л Ҳмқҙм…ҳ в•җв•җв•җв•җв•җв•җв•җв•җ
   * мӢӨм ң LLM л°ұм—”л“ң м—ҶмқҙлҸ„ лҚ°лӘЁ к°ҖлҠҘ. н–Ҙнӣ„ л°ұм—”л“ң м¶”к°Җ мӢң к°ҷмқҖ мқён„°нҺҳмқҙмҠӨ мң м§Җ. */
  const chatExecuteMock = (userText) => {
    const text = userText.toLowerCase();
    // нӮӨмӣҢл“ң л§Өм№ӯ вҖ” мҡ°м„ мҲңмң„ мҲң
    if (/кұҙмЎ°кё°\s*мӮ¬мқҙнҒҙ|dryer\s*cycle|нһҲнҠё\s*нҺҢн”„|hpwd|heat\s*pump|л§Ңл“Өм–ҙ|мғқм„ұ|preset/.test(text)) {
      const result = loadPreset('dryer-cycle');
      if (result.ok) {
        return {
          tool: 'load_preset',
          args: { name: 'dryer-cycle' },
          result,
          reply: `кұҙмЎ°кё° мӮ¬мқҙнҒҙ л§Ңл“Өм—ҲмқҢ. ${result.summary}.\n\nкө¬м„ұ: м••м¶•кё° вҶ’ мқ‘м¶•кё° вҶ’ EEV вҶ’ мҰқл°ңкё° вҶ’ м••м¶•кё° (лғүл§Ө мӮ¬мқҙнҒҙ) + нҢ¬ вҶ’ мҰқл°ңкё° вҶ’ мқ‘м¶•кё° вҶ’ л“ңлҹј вҶ’ нҢ¬ (кіөкё° мҲңнҷҳ). к°Ғ м»ҙнҸ¬л„ҢнҠё лҚ”лё”нҒҙлҰӯмңјлЎң мқҙлҰ„ мҲҳм •, мә”лІ„мҠӨм—җм„ң мһҗмң лЎӯкІҢ мһ¬л°°м№ҳ к°ҖлҠҘ.`,
        };
      }
      return { reply: `Preset лЎңл“ң мӢӨнҢЁ: ${result.error}` };
    }
    if (/clear|мҙҲкё°нҷ”|м§ҖмӣҢ|delete\s*all|лӘЁл‘җ\s*мӮӯм ң/.test(text)) {
      pushHistory(blocks, connections);
      setBlocks([]);
      setConnections([]);
      setSelectedIds([]);
      setSelectedConnIds([]);
      return {
        tool: 'clear_canvas',
        args: {},
        reply: 'мә”лІ„мҠӨ мҙҲкё°нҷ” мҷ„лЈҢ. лӘЁл“  лё”лЎқкіј м—°кІ°мқ„ м§ҖмӣҖ.',
      };
    }
    if (/run|мӢӨн–ү|мӢңл®¬|мӢңмһ‘/.test(text) && !simState.running && blocks.length > 0) {
      runSimulation();
      return {
        tool: 'run',
        args: {},
        reply: `мӢңл®¬л Ҳмқҙм…ҳ мӢңмһ‘. dt=${simState.dt}s, t_final=${simState.tFinal}s.`,
      };
    }
    if (/stop|м •м§Җ|л©Ҳм¶°/.test(text) && simState.running) {
      stopSimulation();
      return { tool: 'stop', args: {}, reply: `мӢңл®¬л Ҳмқҙм…ҳ м •м§Җ. t = ${simState.t.toFixed(1)}s.` };
    }
    if (/reset|лҰ¬м…Ӣ/.test(text)) {
      resetSimulation();
      return { tool: 'reset', args: {}, reply: 'мӢңл®¬л Ҳмқҙм…ҳ лҰ¬м…Ӣ вҖ” t=0мңјлЎң ліөк·Җ.' };
    }
    // fallback
    return {
      reply: `(Mock) м•„м§Ғ мІҳлҰ¬ лӘ»н•ҳлҠ” лӘ…л №. м§Җмӣҗн•ҳлҠ” нӮӨмӣҢл“ң:\nВ· "кұҙмЎ°кё° мӮ¬мқҙнҒҙ л§Ңл“Өм–ҙмӨҳ" вҖ” мӮ¬мқҙнҒҙ мқјкҙ„ мғқм„ұ\nВ· "мҙҲкё°нҷ”" вҖ” мә”лІ„мҠӨ л№„мҡ°кё°\nВ· "мӢӨн–ү" / "м •м§Җ" / "лҰ¬м…Ӣ" вҖ” мӢңл®¬ м ңм–ҙ`,
    };
  };

  const handleBlockMouseDown = (e, blockId) => {
    // Port нҒҙлҰӯ мӢңм—җлҸ„ мқҙлІӨнҠё м „нҢҢлҠ” л§үм•„м•ј н•Ё (м•Ҳ к·ёлҹ¬л©ҙ мә”лІ„мҠӨ л°•мҠӨ л“ңлһҳк·ё мӢңмһ‘лҗЁ)
    e.stopPropagation();
    if (e.target.closest('[data-port]')) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const block = blocks.find(b => b.id === blockId);

    // Shift/Ctrl: лӢӨмӨ‘ м„ нғқ нҶ кёҖ
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      setSelectedIds(prev => prev.includes(blockId)
        ? prev.filter(id => id !== blockId)
        : [...prev, blockId]);
      setSelectedConnIds([]);
      return; // shift-select лӘЁл“ңм—җм„ңлҠ” л“ңлһҳк·ё мӢңмһ‘ м•Ҳ н•Ё
    }

    // нҳ„мһ¬ лё”лЎқмқҙ мқҙлҜё м„ нғқлҗң лӢӨмӨ‘ м„ нғқмқҳ мқјл¶Җл©ҙ м„ нғқ мң м§Җ
    // м•„лӢҲл©ҙ мқҙ лё”лЎқл§Ң лӢЁлҸ… м„ нғқ
    let dragIds;
    if (selectedIds.includes(blockId)) {
      dragIds = selectedIds;
    } else {
      setSelectedIds([blockId]);
      dragIds = [blockId];
    }
    setSelectedConnIds([]);

    // л“ңлһҳк·ён•  лӘЁл“  лё”лЎқмқҳ мӢңмһ‘ мң„м№ҳ м ҖмһҘ
    const startPositions = {};
    dragIds.forEach(id => {
      const b = blocks.find(bb => bb.id === id);
      if (b) startPositions[id] = { x: b.x, y: b.y };
    });
    draggingRef.current = {
      blockIds: dragIds,
      primaryId: blockId,
      startPositions,
      offsetX: (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom - block.x,
      offsetY: (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom - block.y,
    };
  };

  const handleCanvasMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
    const my = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
    mousePosRef.current = { x: mx, y: my };

    // лё”лЎқ л“ңлһҳк·ё: DOM м§Ғм ‘ мЎ°мһ‘, лӢӨмӨ‘ лё”лЎқ лҸҷмӢң мқҙлҸҷ м§Җмӣҗ
    if (draggingRef.current) {
      const { blockIds, primaryId, offsetX, offsetY, startPositions } = draggingRef.current;
      // primary лё”лЎқ кё°мӨҖмңјлЎң delta кі„мӮ°, лӮҳлЁём§ҖлҠ” к°ҷмқҖ delta м Ғмҡ©
      const primaryStart = startPositions[primaryId];
      const snappedX = snap(mx - offsetX);
      const snappedY = snap(my - offsetY);
      const dx = snappedX - primaryStart.x;
      const dy = snappedY - primaryStart.y;
      // лӘЁл“  м„ нғқлҗң лё”лЎқмқ„ transformмңјлЎң мқҙлҸҷ
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = `translate(${dx}px, ${dy}px)`;
      });
      draggingRef.current.dx = dx;
      draggingRef.current.dy = dy;
      return;
    }

    // л°•мҠӨ м„ нғқ л“ңлһҳк·ё мӨ‘
    if (selectionBox) {
      setSelectionBox(sb => sb ? { ...sb, curX: mx, curY: my } : sb);
      return;
    }

    // м—°кІ°м„  м„ёк·ёлЁјнҠё л“ңлһҳк·ё
    if (draggingConn) {
      const { idx, segment, startMouseX, startMouseY, startOffset } = draggingConn;
      const axis = segment.endsWith('Y') ? 'y' : 'x';
      const delta = axis === 'y' ? (my - startMouseY) : (mx - startMouseX);
      const offsetKey = SEGMENT_OFFSET_KEYS[segment];
      setConnections(cs => cs.map((c, i) =>
        i === idx ? { ...c, [offsetKey]: startOffset + delta } : c
      ));
    }

    if (connecting || endpointDrag) {
      setMousePos({ x: mx, y: my });
    }
  };

  const handleCanvasMouseUp = () => {
    if (draggingRef.current) {
      const { blockIds, startPositions, dx, dy } = draggingRef.current;
      // transform мҙҲкё°нҷ”
      blockIds.forEach(id => {
        const el = blockRefsMap.current[id];
        if (el) el.style.transform = '';
      });
      if (dx !== undefined && (dx !== 0 || dy !== 0)) {
        pushHistory(blocks, connections);
        setBlocks(bs => bs.map(b => {
          if (!blockIds.includes(b.id)) return b;
          const start = startPositions[b.id];
          return { ...b, x: start.x + dx, y: start.y + dy };
        }));
      }
      draggingRef.current = null;
    }

    // л°•мҠӨ м„ нғқ мў…лЈҢ вҶ’ мӮ¬к°Ғнҳ• мҳҒм—ӯ лӮҙ лё”лЎқ + м—°кІ°м„  м„ нғқ
    if (selectionBox) {
      const box = selectionBox;
      const x1 = Math.min(box.startX, box.curX);
      const y1 = Math.min(box.startY, box.curY);
      const x2 = Math.max(box.startX, box.curX);
      const y2 = Math.max(box.startY, box.curY);

      // л°•мҠӨк°Җ л„Ҳл¬ҙ мһ‘мңјл©ҙ (кұ°мқҳ нҒҙлҰӯ) л¬ҙмӢң
      if (x2 - x1 > 4 || y2 - y1 > 4) {
        // лё”лЎқ: bboxк°Җ мҷ„м „нһҲ нҸ¬н•Ёлҗҳл©ҙ м„ нғқ
        const pickedBlocks = blocks.filter(b => {
          const h = getBlockHeight(b);
          const w = getBlockWidth(b);
          return b.x >= x1 && b.y >= y1 && (b.x + w) <= x2 && (b.y + h) <= y2;
        }).map(b => b.id);

        // м—°кІ°м„ : sourceмҷҖ target л‘ҳ лӢӨ л°•мҠӨ м•Ҳ лё”лЎқмқј л•Ңл§Ң м„ нғқ
        const pickedConns = connections
          .map((c, i) => ({ c, i }))
          .filter(({ c }) => pickedBlocks.includes(c.from.blockId) && pickedBlocks.includes(c.to.blockId))
          .map(({ i }) => i);

        setSelectedIds(pickedBlocks);
        setSelectedConnIds(pickedConns);
      }
      setSelectionBox(null);
    }

    if (draggingConn) {
      setDraggingConn(null);
    }
  };

  /* 4л©ҙ мҠ¬лЎҜ нҒҙлҰӯ. side: 'top'|'bottom'|'left'|'right'.
   * мҠ¬лЎҜм—җ in/out мқҳлҜё м—ҶмқҢ вҖ” мІ« нҒҙлҰӯмқҙ from, л‘җ лІҲм§ёк°Җ toк°Җ лҗЁ.
   * нқҗлҰ„ л°©н–ҘмқҖ Propertiesм—җм„ң л°ҳм „ к°ҖлҠҘ. */
  const handleBlockConnectorClick = (e, blockId, side, slot) => {
    e.stopPropagation();
    // endpoint/waypoint л“ңлһҳк·ё м§Ғнӣ„м—” slot clickмқ„ л¬ҙмӢң (л“ңлЎӯ мң„м№ҳм—җм„ң л°ңмғқн•ҳлҠ” click м ңкұ°)
    if (endpointDrag || waypointDrag || suppressSlotClickRef.current) return;
    if (!connecting) {
      const useSlot = slot !== undefined ? slot : findFreeSlot(connections, blockId, side);
      setConnecting({ blockId, side, slot: useSlot });
      return;
    }
    if (connecting.blockId === blockId) {
      // к°ҷмқҖ лё”лЎқ cancel
      setConnecting(null);
      return;
    }
    const fromId = connecting.blockId;
    const toId = blockId;
    const fromBlock = blocks.find(b => b.id === fromId);
    const toBlock   = blocks.find(b => b.id === toId);
    const kind = detectLineKind(fromBlock, toBlock);
    const signals = autoMapSignals(fromBlock, toBlock);
    const useSlot = slot !== undefined ? slot : findFreeSlot(connections, toId, side);
    pushHistory(blocks, connections);
    setConnections(cs => [...cs, {
      from: { blockId: fromId, side: connecting.side, slot: connecting.slot },
      to:   { blockId: toId,   side: side,             slot: useSlot },
      kind,
      signals,
      lineParams: defaultLineParams(kind),
      cornerRadius: 8,
      routeMode: 'auto',
    }]);
    setConnecting(null);
  };

  const deleteBlock = (id) => {
    pushHistory(blocks, connections);
    setBlocks(bs => bs.filter(b => b.id !== id));
    setConnections(cs => cs.filter(c => c.from.blockId !== id && c.to.blockId !== id));
    if (selected === id) setSelected(null);
  };

  const updateParam = (blockId, paramKey, value) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, params: { ...b.params, [paramKey]: value } } : b));

    // output_selectк°Җ ліҖкІҪлҗң кІҪмҡ° вҖ” л№„нҷңм„ұлҗң м¶ңл Ҙм—җ кұёлҰ° signal мһҗлҸҷ м •лҰ¬
    // (м—°кІ°м„  мһҗмІҙлҠ” signalмқҙ л№„л©ҙ мӮӯм ң. лӢӨлҘё signalмқҙ мӮҙм•„мһҲмңјл©ҙ connection мң м§Җ.)
    if (paramKey === 'output_select' && Array.isArray(value)) {
      const activeSet = new Set(value);
      setConnections(prev => {
        const next = [];
        let removedCount = 0;
        for (const c of prev) {
          if (c.from?.blockId !== blockId) {
            next.push(c);
            continue;
          }
          // мқҙ лё”лЎқм—җм„ң лӮҳк°ҖлҠ” connection вҖ” signals мӨ‘ л№„нҷңм„ұ м¶ңл Ҙм—җ кұёлҰ° кІғ м ңкұ°
          const keptSignals = (c.signals || []).filter(s => activeSet.has(s.fromPort));
          const dropped = (c.signals || []).length - keptSignals.length;
          if (dropped > 0) removedCount += dropped;
          if (keptSignals.length > 0) {
            next.push({ ...c, signals: keptSignals });
          }
          // лӘЁл“  signalмқҙ л№„м—Ҳмңјл©ҙ connection мһҗмІҙ drop
        }
        if (removedCount > 0) {
          console.log(`[output_select] ${removedCount}к°ң signal мһҗлҸҷ м •лҰ¬лҗЁ (л№„нҷңм„ұ м¶ңл Ҙ)`);
        }
        return next;
      });
    }
  };

  const updateBlockName = (blockId, name) => {
    setBlocks(bs => bs.map(b => b.id === blockId ? { ...b, name } : b));
  };

  /* Properties нҢЁл„җмқҳ лӢЁмқј parameter л ҢлҚ” н—¬нҚј.
     multiSelectлҠ” checkbox к·ёлҰ¬л“ң, optionsлҠ” dropdown, к·ё мҷёлҠ” input.
     unitмқҙ '@otherKey' нҳ•мӢқмқҙл©ҙ лӢӨлҘё param к°’мңјлЎң лҸҷм Ғ лӢЁмң„ кІ°м •. */
  const renderParameter = (p, block, updateFn) => {
    let unitDisplay = p.unit;
    if (typeof p.unit === 'string' && p.unit.startsWith('@')) {
      const refKey = p.unit.slice(1);
      const kindVal = block.params[refKey];
      unitDisplay = resolveDynamicUnit(block.type, kindVal);
    }

    // Multi-select (output_select к°ҷмқҖ кІғ)
    if (p.multiSelect) {
      const current = block.params[p.key] || [];
      const toggleOpt = (opt) => {
        const set = new Set(current);
        if (set.has(opt)) set.delete(opt); else set.add(opt);
        updateFn(block.id, p.key, Array.from(set));
      };
      return (
        <div key={p.key} className="flex flex-col gap-1">
          <div className="flex items-center justify-between">
            <label className="text-[11px] text-slate-700 font-semibold">{p.label}</label>
            <div className="flex gap-1 text-[9px]">
              <button onClick={() => updateFn(block.id, p.key, [...p.multiSelect])}
                className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono">ALL</button>
              <button onClick={() => updateFn(block.id, p.key, [])}
                className="px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 font-mono">NONE</button>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-x-2 gap-y-0.5">
            {p.multiSelect.map(opt => {
              const checked = current.includes(opt);
              return (
                <label key={opt}
                  className={`flex items-center gap-1 px-1 py-0.5 rounded cursor-pointer text-[10px] font-mono ${
                    checked ? 'bg-cyan-50 text-cyan-900' : 'text-slate-600 hover:bg-slate-50'
                  }`}>
                  <input type="checkbox" checked={checked} onChange={() => toggleOpt(opt)}
                    className="w-2.5 h-2.5 accent-cyan-600" />
                  <span className="truncate">{opt}</span>
                </label>
              );
            })}
          </div>
        </div>
      );
    }

    // мқјл°ҳ parameter вҖ” ParamInputмқҖ module top-levelм—җ м •мқҳ (focus м•Ҳм •м„ұ)
    return (
      <div key={p.key} className="flex items-center gap-2">
        <label className="flex-1 text-[11px] text-slate-700">{p.label}</label>
        {p.options ? (
          <select
            value={block.params[p.key]}
            onChange={(e) => updateFn(block.id, p.key, e.target.value)}
            className="w-20 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-[11px] text-slate-900 font-mono text-right focus:outline-none focus:border-cyan-500"
          >
            {p.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
          </select>
        ) : (
          <ParamInput
            value={block.params[p.key]}
            isNumber={typeof p.value === 'number'}
            onChange={(v) => updateFn(block.id, p.key, v)}
          />
        )}
        <span className="text-[10px] text-slate-400 w-10 font-mono">{unitDisplay}</span>
      </div>
    );
  };

  // лӢЁмқј мӢңк°„ мҠӨн…қ нҸүк°Җ: blocksмҷҖ tк°Җ мЈјм–ҙм§Җл©ҙ outputs кі„мӮ°н•ҙм„ң л°ҳнҷҳ
  // (initSimкіј stepSimulationмқҙ кіөмң н•ҳлҠ” мҲңмҲҳ нҸүк°Җ н•ЁмҲҳ)
  // -------- Undo / Redo --------
  // нҳ„мһ¬ мғҒнғңлҘј undo мҠӨнғқм—җ push, redo мҠӨнғқ л№„мӣҖ (мғҲ м•Ўм…ҳ мӢңмһ‘ мӢң)
  const pushHistory = (prevBlocks, prevConns) => {
    setUndoStack(s => {
      const next = [...s, {
        blocks: JSON.parse(JSON.stringify(prevBlocks)),
        connections: JSON.parse(JSON.stringify(prevConns)),
      }];
      if (next.length > MAX_HISTORY) next.shift();
      return next;
    });
    setRedoStack([]);
  };

  const doUndo = () => {
    const stack = undoStackRef.current;
    if (stack.length === 0) return;
    const prev = stack[stack.length - 1];
    // нҳ„мһ¬ мғҒнғңлҘј redoлЎң м ҖмһҘ
    setRedoStack(r => [...r, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setUndoStack(s => s.slice(0, -1));
    setBlocks(prev.blocks);
    setConnections(prev.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  const doRedo = () => {
    const stack = redoStackRef.current;
    if (stack.length === 0) return;
    const next = stack[stack.length - 1];
    // нҳ„мһ¬ мғҒнғңлҘј undoлЎң лӢӨмӢң м ҖмһҘ
    setUndoStack(s => [...s, {
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
    }]);
    setRedoStack(r => r.slice(0, -1));
    setBlocks(next.blocks);
    setConnections(next.connections);
    setSelected(null);
    setSelectedConn(null);
  };

  // -------- Clipboard --------
  // м„ нғқлҗң лё”лЎқл“Өмқ„ нҒҙлҰҪліҙл“ңм—җ ліөмӮ¬.
  // м–‘ лҒқмқҙ лӘЁл‘җ м„ нғқлҗң лё”лЎқмқё м—°кІ°м„ лҸ„ к°ҷмқҙ ліөмӮ¬ (лӮҙл¶Җ м—°кІ° ліҙмЎҙ)
  const doCopy = () => {
    if (selectedIds.length === 0) return;
    const cloneBlocks = selectedIds
      .map(id => blocks.find(b => b.id === id))
      .filter(Boolean)
      .map(b => ({
        ...JSON.parse(JSON.stringify(b)),
        outputs: {},
        state: TYPES[b.type].stateInit ? JSON.parse(JSON.stringify(TYPES[b.type].stateInit)) : {},
      }));
    const idSet = new Set(selectedIds);
    const innerConns = connections
      .filter(c => idSet.has(c.from.blockId) && idSet.has(c.to.blockId))
      .map(c => JSON.parse(JSON.stringify(c)));
    clipboardRef.current = {
      blocks: cloneBlocks,
      connections: innerConns,
    };
  };

  // Cut = Copy + м„ нғқлҗң лё”лЎқкіј м—°кІ°м„  мӮӯм ң
  const doCut = () => {
    if (selectedIds.length === 0 && selectedConnIds.length === 0) return;
    doCopy();
    pushHistory(blocks, connections);
    const idSet = new Set(selectedIds);
    setBlocks(bs => bs.filter(b => !idSet.has(b.id)));
    setConnections(cs => cs.filter((c, i) => {
      // м„ нғқлҗң м—°кІ°м„ мқҙкұ°лӮҳ, м–‘ лҒқ мӨ‘ н•ҳлӮҳлқјлҸ„ м„ нғқлҗң лё”лЎқмқҙл©ҙ м ңкұ°
      if (selectedConnIds.includes(i)) return false;
      return !idSet.has(c.from.blockId) && !idSet.has(c.to.blockId);
    }));
    setSelectedIds([]);
    setSelectedConnIds([]);
  };

  // л¶ҷм—¬л„Јкё°: мғҲ id л°ңкёү, +40px мҳӨн”„м…Ӣ, лӮҙл¶Җ м—°кІ°лҸ„ мһ¬л§Өн•‘
  const doPaste = () => {
    const clip = clipboardRef.current;
    if (!clip || clip.blocks.length === 0) return;
    pushHistory(blocks, connections);
    const idMap = {};
    // к°ҷмқҖ type лі„лЎң мқҙлҰ„ suffix м№ҙмҡҙнҠё лҲ„м Ғ
    const typeCounts = {};
    blocksRef.current.forEach(b => {
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
    });
    const newBlocks = clip.blocks.map((b, i) => {
      const newId = `b${Date.now()}_${i}_${Math.random().toString(36).slice(2, 6)}`;
      idMap[b.id] = newId;
      const def = TYPES[b.type];
      typeCounts[b.type] = (typeCounts[b.type] || 0) + 1;
      return {
        ...b,
        id: newId,
        name: `${def.name}_${typeCounts[b.type]}`,
        x: snap(b.x + GRID_SIZE * 2),
        y: snap(b.y + GRID_SIZE * 2),
      };
    });
    const newConns = clip.connections.map(c => ({
      ...JSON.parse(JSON.stringify(c)),
      from: { ...c.from, blockId: idMap[c.from.blockId] },
      to: { ...c.to, blockId: idMap[c.to.blockId] },
    }));
    setBlocks(bs => [...bs, ...newBlocks]);
    setConnections(cs => [...cs, ...newConns]);
    // л¶ҷм—¬л„ЈмқҖ лё”лЎқл“Өмқ„ м„ нғқ мғҒнғңлЎң
    setSelectedIds(newBlocks.map(b => b.id));
    setSelectedConnIds([]);
  };

  const evaluateBlocks = (prevBlocks, conns, t, dt) => {
    return prevBlocks.map(b => {
      const def = TYPES[b.type];
      const inputs = {};
      def.inputs.forEach(inp => {
        // bмқҳ input portм—җ л§Өн•‘лҗң signal pairлҘј к°–лҠ” connection м°ҫкё°
        for (const c of conns) {
          if (c.to.blockId !== b.id) continue;
          const sig = (c.signals || []).find(s => s.toPort === inp.key);
          if (!sig) continue;
          const src = prevBlocks.find(bb => bb.id === c.from.blockId);
          if (src?.outputs?.[sig.fromPort] !== undefined) {
            inputs[inp.key] = src.outputs[sig.fromPort];
          }
          break;
        }
      });
      const newState = b.state ? { ...b.state } : {};
      // в”Җв”Җв”Җ Python л°ұм—”л“ң л¶„кё° в”Җв”Җв”Җ
      // def.backend === 'python' && def.pythonComponent вҶ’ callBackendSync()
      // л°ұм—”л“ң мӢӨнҢЁ мӢң JS compute()лЎң fallback (мӢңл®¬мқҖ лҒҠкё°м§Җ м•ҠмқҢ)
      let outputs;
      if (def.backend === 'python' && def.pythonComponent) {
        try {
          const result = callBackendSync(def.pythonComponent, inputs, b.params, newState, dt);
          outputs = result.outputs;
          // newStateлҸ„ л°ұм—”л“ңк°Җ к°ұмӢ н–Ҳмңјл©ҙ л°ҳмҳҒ
          if (result.newState) {
            Object.keys(result.newState).forEach(k => { newState[k] = result.newState[k]; });
          }
        } catch (e) {
          // fallback to JS
          console.warn(`[Backend] ${def.pythonComponent} нҳём¶ң мӢӨнҢЁ, JS computeлЎң fallback:`, e.message);
          outputs = def.compute(inputs, b.params, t, newState, dt);
        }
      } else {
        outputs = def.compute(inputs, b.params, t, newState, dt);
      }
      return { ...b, outputs, state: newState, lastInputs: inputs };
    });
  };

  // мҠӨлғ…мғ· мғқм„ұ: нҳ„мһ¬ лӘЁл“  лё”лЎқ outputsмқ„ {t, Block.key: value} л”•м…”л„ҲлҰ¬лЎң
  const makeSnapshot = (blocksList, t) => {
    const snapshot = { t };
    blocksList.forEach(b => {
      Object.entries(b.outputs || {}).forEach(([k, v]) => {
        snapshot[`${b.name}.${k}`] = typeof v === 'number' ? Number(v.toFixed(4)) : v;
      });
    });
    return snapshot;
  };

  // t=0 мҙҲкё°к°’ нҸүк°Җ: 2нҡҢ л°ҳліө (м—°кІ°лҗң мӢ нҳёк°Җ мІ« passм—җм„ңлҠ” undefined вҶ’ default fallback,
  // 2нҡҢм§ём—җ м „нҢҢлҗң к°’ мӮ¬мҡ©). к·ё кІ°кіјлҘј history[0]м—җ кё°лЎқ.
  const initSim = () => {
    const conns = connectionsRef.current;
    const b0 = blocks;
    // pass 1: мҙҲкё° evaluation
    let evaluated = evaluateBlocks(b0, conns, 0, simState.dt);
    // pass 2: м „нҢҢ (source вҶ’ math вҶ’ display мҲңмңјлЎң к°’мқҙ м „лӢ¬лҗҳлҸ„лЎқ)
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: [...s.log, `в—Ұ Initialized @ t=0.0s`],
    }));
  };

  const stepSimulation = useCallback(() => {
    // t_final лҸ„лӢ¬ нӣ„ step нҳём¶ңмқҖ no-op + running м •м§Җ
    // (runSimмқҳ guardк°Җ 1м°Ё л°©м–ҙ, мқҙкұҙ race condition м•Ҳм „л§қ)
    if (simRef.current.t >= simRef.current.t_final) {
      if (simRef.current.running) {
        setSimState(s => ({ ...s, running: false }));
      }
      return;
    }
    setBlocks(prevBlocks => {
      const conns = connectionsRef.current;
      return evaluateBlocks(prevBlocks, conns, simRef.current.t, simRef.current.dt);
    });

    setSimState(s => {
      const t_new = Math.min(s.t + s.dt, s.t_final);  // t_final мҙҲкіј л°©м§Җ
      const snapshot = makeSnapshot(blocksRef.current, t_new);
      return { ...s, t: t_new, history: [...s.history, snapshot], running: t_new < s.t_final && s.running };
    });
  }, []);

  const connectionsRef = useRef(connections);
  connectionsRef.current = connections;
  const blocksRef = useRef(blocks);
  blocksRef.current = blocks;

  /* мә”лІ„мҠӨ мўҢн‘ң (cx, cy)м—җм„ң к°ҖмһҘ к°Җк№Ңмҡҙ мҠ¬лЎҜ (лӘЁл“  лё”лЎқ Г— 4л©ҙ Г— NмҠ¬лЎҜ).
   * threshold мқҙлӮҙл©ҙ л°ҳнҷҳ, м•„лӢҲл©ҙ null. */
  const findNearestSlot = (cx, cy, threshold = 28) => {
    let best = null;
    let bestDist = threshold;
    for (const b of blocks) {
      for (const side of ['top', 'bottom', 'left', 'right']) {
        for (let slot = 0; slot < SLOTS_PER_SIDE; slot++) {
          const pos = getBlockSlotPos(b, side, slot);
          if (!pos) continue;
          const d = Math.hypot(pos.x - cx, pos.y - cy);
          if (d < bestDist) {
            best = { blockId: b.id, side, slot };
            bestDist = d;
          }
        }
      }
    }
    return best;
  };

  /* лҒқм җ л“ңлһҳк·ё мў…лЈҢ вҖ” к°ҖмһҘ к°Җк№Ңмҡҙ мҠ¬лЎҜм—җ snap. */
  useEffect(() => {
    if (!endpointDrag) return;
    const onUp = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) { setEndpointDrag(null); return; }
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      const target = findNearestSlot(cx, cy, 28);
      if (target) {
        const conn = connections[endpointDrag.connIdx];
        const otherEnd = endpointDrag.end === 'from' ? conn.to : conn.from;
        // к°ҷмқҖ лё”лЎқлҒјлҰ¬ мһҗкё°лЈЁн”„ л°©м§Җ
        if (target.blockId !== otherEnd.blockId) {
          pushHistory(blocks, connections);
          setConnections(cs => cs.map((c, i) => {
            if (i !== endpointDrag.connIdx) return c;
            const newEnd = { blockId: target.blockId, side: target.side, slot: target.slot };
            // лё”лЎқмқҙ л°”лҖҢм—Ҳмңјл©ҙ мӢңк·ёл„җ мһ¬л§Өн•‘ + kind мһ¬к°җм§Җ
            const oldOther = endpointDrag.end === 'from' ? c.to : c.from;
            if (newEnd.blockId !== (endpointDrag.end === 'from' ? c.from.blockId : c.to.blockId)) {
              const fromBlk = blocks.find(b => b.id === (endpointDrag.end === 'from' ? newEnd.blockId : c.from.blockId));
              const toBlk   = blocks.find(b => b.id === (endpointDrag.end === 'to'   ? newEnd.blockId : c.to.blockId));
              const newKind = detectLineKind(fromBlk, toBlk);
              const newSignals = autoMapSignals(fromBlk, toBlk);
              return {
                ...c,
                [endpointDrag.end]: newEnd,
                kind: newKind,
                signals: newSignals,
                lineParams: defaultLineParams(newKind),
              };
            }
            // к°ҷмқҖ лё”лЎқ м•Ҳм—җм„ң мҠ¬лЎҜ/л©ҙл§Ң ліҖкІҪ
            return { ...c, [endpointDrag.end]: newEnd };
          }));
        }
      }
      setEndpointDrag(null);
      // mouseup м§Ғнӣ„ л°ңнҷ”лҗ  мҠ¬лЎҜ/мә”лІ„мҠӨ clickмқ„ н•ң tickл§Ң м°ЁлӢЁ
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mouseup', onUp);
    return () => window.removeEventListener('mouseup', onUp);
  }, [endpointDrag, connections, blocks]);

  /* Waypoint л“ңлһҳк·ё вҖ” лқјмқҙлёҢ мң„м№ҳ м—…лҚ°мқҙнҠё, grid snap. */
  useEffect(() => {
    if (!waypointDrag) return;
    const onMove = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) return;
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      // grid snap мң м§Җ (мӮ¬мҡ©мһҗк°Җ мқјл¶Җлҹ¬ м§Ғк°Ғ м •л ¬ мӣҗн•  к°ҖлҠҘм„ұ лҶ’мқҢ)
      const sx = Math.round(cx / GRID_SIZE) * GRID_SIZE;
      const sy = Math.round(cy / GRID_SIZE) * GRID_SIZE;
      setConnections(cs => cs.map((c, i) => {
        if (i !== waypointDrag.connIdx) return c;
        const wps = (c.waypoints || []).slice();
        wps[waypointDrag.wpIdx] = { x: sx, y: sy };
        // л“ңлһҳк·ён•ҳл©ҙ мһҗлҸҷмңјлЎң manual лӘЁл“ң (лё”лЎқ мқҙлҸҷм—җ мҳҒн–Ҙ м•Ҳ л°ӣмқҢ)
        return { ...c, waypoints: wps, routeMode: 'manual' };
      }));
    };
    const onUp = () => {
      setWaypointDrag(null);
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [waypointDrag, zoom]);

  /* Segment л“ңлһҳк·ё вҖ” лқјмқёмқҳ н•ң м§Ғк°Ғ segmentлҘј нҸүн–ү мқҙлҸҷ.
   * мһҗлҸҷ лӘЁл“ңл©ҙ мҡ°м„  cornerл“Өмқ„ manual waypointsлЎң commitн•ң лӢӨмқҢ л‘җ cornerлҘј к°ҷмқҙ мқҙлҸҷ.
   * мҲҳм§Ғ segment(axis='x')лҠ” x л°©н–ҘмңјлЎң мқҙлҸҷ, мҲҳнҸү segment(axis='y')лҠ” y л°©н–Ҙ. */
  useEffect(() => {
    if (!segmentDrag) return;
    const onMove = (e) => {
      const rect = canvasRef.current?.getBoundingClientRect();
      if (!rect) return;
      const cx = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
      const cy = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
      const sx = Math.round(cx / GRID_SIZE) * GRID_SIZE;
      const sy = Math.round(cy / GRID_SIZE) * GRID_SIZE;
      setConnections(cs => cs.map((c, i) => {
        if (i !== segmentDrag.connIdx) return c;
        // segmentDrag.startWaypointsм—җм„ң segIdxм—җ н•ҙлӢ№н•ҳлҠ” л‘җ corner мқҙлҸҷ
        // pts = [from, ...waypoints, to] мқҙлҜҖлЎң segment kлҠ” pts[k]~pts[k+1]
        // мҲҳм§Ғ segment: pts[k].x === pts[k+1].x вҶ’ л‘ҳ лӢӨ xлҘј sxлЎң
        // мҲҳнҸү segment: pts[k].y === pts[k+1].y вҶ’ л‘ҳ лӢӨ yлҘј syлЎң
        const baseWps = segmentDrag.startWaypoints.slice();
        // pts мқёлҚұмҠӨ вҶ’ waypoints мқёлҚұмҠӨ: pts[k]лҠ” k=0мқҙл©ҙ from, k=len-1мқҙл©ҙ to, к·ё мҷё waypoints[k-1]
        const aPtsIdx = segmentDrag.segIdx;
        const bPtsIdx = segmentDrag.segIdx + 1;
        const updateWp = (ptsIdx) => {
          if (ptsIdx === 0 || ptsIdx === baseWps.length + 1) return; // endpointлҠ” лӘ» мҳ®к№Җ
          const wpIdx = ptsIdx - 1;
          if (segmentDrag.axis === 'x') {
            baseWps[wpIdx] = { x: sx, y: baseWps[wpIdx].y };
          } else {
            baseWps[wpIdx] = { x: baseWps[wpIdx].x, y: sy };
          }
        };
        updateWp(aPtsIdx);
        updateWp(bPtsIdx);
        return { ...c, waypoints: baseWps, routeMode: 'manual' };
      }));
    };
    const onUp = () => {
      setSegmentDrag(null);
      suppressSlotClickRef.current = true;
      setTimeout(() => { suppressSlotClickRef.current = false; }, 50);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [segmentDrag, zoom]);

  /* мқҙлҜём§Җ лё”лЎқ лҰ¬мӮ¬мқҙмҰҲ вҖ” мҡ°н•ҳлӢЁ н•ёл“Ө л“ңлһҳк·ё мӢң imageSize м—…лҚ°мқҙнҠё. */
  useEffect(() => {
    if (!resizing) return;
    const onMove = (e) => {
      const dx = e.clientX - resizing.startX;
      const dy = e.clientY - resizing.startY;
      const delta = Math.abs(dx) > Math.abs(dy) ? dx : dy;
      const newSize = Math.max(80, Math.min(400, resizing.startSize + delta));
      setBlocks(bs => bs.map(b => b.id === resizing.blockId ? { ...b, imageSize: newSize } : b));
    };
    const onUp = () => setResizing(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [resizing]);

  useEffect(() => {
    if (!simState.running) return;
    const id = setInterval(stepSimulation, 50);
    return () => clearInterval(id);
  }, [simState.running, stepSimulation]);

  // нӮӨліҙл“ң лӢЁм¶•нӮӨ: Delete/Backspace мӮӯм ң, Esc м„ нғқ н•ҙм ң, Ctrl+C/X/V нҒҙлҰҪліҙл“ң, Ctrl+Z/Y undo/redo, Ctrl+A м „мІҙ м„ нғқ
  useEffect(() => {
    const onKey = (e) => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      const ctrlOrCmd = e.ctrlKey || e.metaKey;
      const hasBlockSel = selectedIds.length > 0;
      const hasConnSel = selectedConnIds.length > 0;
      const hasAnySel = hasBlockSel || hasConnSel;

      if (ctrlOrCmd) {
        const key = e.key.toLowerCase();
        if (key === 'a') {
          // м „мІҙ м„ нғқ
          setSelectedIds(blocks.map(b => b.id));
          setSelectedConnIds(connections.map((_, i) => i));
          e.preventDefault();
        } else if (key === 'c') {
          if (hasBlockSel) { doCopy(); e.preventDefault(); }
        } else if (key === 'x') {
          if (hasAnySel) { doCut(); e.preventDefault(); }
        } else if (key === 'v') {
          doPaste(); e.preventDefault();
        } else if (key === 'z') {
          if (e.shiftKey) { doRedo(); } else { doUndo(); }
          e.preventDefault();
        } else if (key === 'y') {
          doRedo(); e.preventDefault();
        }
        return;
      }

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (hasAnySel) {
          pushHistory(blocks, connections);
          const blockIdSet = new Set(selectedIds);
          const connIdxSet = new Set(selectedConnIds);
          setBlocks(bs => bs.filter(b => !blockIdSet.has(b.id)));
          setConnections(cs => cs.filter((c, i) => {
            if (connIdxSet.has(i)) return false;
            // м–‘ лҒқ мӨ‘ н•ҳлӮҳлқјлҸ„ мӮӯм ңлҗң лё”лЎқмқҙл©ҙ к°ҷмқҙ м ңкұ°
            return !blockIdSet.has(c.from.blockId) && !blockIdSet.has(c.to.blockId);
          }));
          setSelectedIds([]);
          setSelectedConnIds([]);
          e.preventDefault();
        }
      } else if (e.key === 'Escape') {
        setSelectedIds([]);
        setSelectedConnIds([]);
        setConnecting(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedIds, selectedConnIds, blocks, connections]);

  // лё”лЎқ нҢҢлқјлҜён„°лӮҳ м—°кІ°мқҙ л°”лҖҢл©ҙ t=0 к°’ мһҗлҸҷ к°ұмӢ  (мӢңл®¬л Ҳмқҙм…ҳ мӨ‘мқҙ м•„лӢҗ л•Ңл§Ң, л””л°”мҡҙмҠӨ)
  // мқҙкұёлЎң Display лё”лЎқмқҙ мӢӨмӢңк°„мңјлЎң нҳ„мһ¬ нҢҢлқјлҜён„° кё°л°ҳ мҙҲкё°к°’мқ„ ліҙм—¬мӨҢ
  useEffect(() => {
    if (simState.running) return;
    if (blocks.length === 0) return;
    const timer = setTimeout(() => {
      const conns = connectionsRef.current;
      // 2-pass нҸүк°ҖлЎң мӢ нҳё м „нҢҢ
      let evaluated = evaluateBlocks(blocks, conns, 0, simState.dt);
      evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);
      // outputs/lastInputsл§Ң м—…лҚ°мқҙнҠё (x,y мң„м№ҳ ліҖкІҪ л°©м§Җ)
      setBlocks(bs => bs.map(b => {
        const ev = evaluated.find(e => e.id === b.id);
        return ev ? { ...b, outputs: ev.outputs, lastInputs: ev.lastInputs } : b;
      }));
    }, 100);
    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [
    // лё”лЎқ нҢҢлқјлҜён„° ліҖнҷ” к°җм§Җ (outputs/x/y м ңмҷё)
    JSON.stringify(blocks.map(b => ({ id: b.id, type: b.type, name: b.name, params: b.params }))),
    connections,
    simState.running,
  ]);

  const runSim = () => {
    // мқҙлҜё t_final лҸ„лӢ¬ мғҒнғңл©ҙ Run кұ°л¶Җ вҖ” Reset нӣ„ лӢӨмӢң мӢңлҸ„ м•ҲлӮҙ
    // (мқҙм „ лҸҷмһ‘: t_new = t + dt н•ң нӣ„м—җм•ј running:false мІҳлҰ¬лҗҳлҜҖлЎң
    //  Run лҲ„лҘј л•Ңл§ҲлӢӨ tк°Җ dtм”© t_finalмқ„ л„ҳм–ҙ мҰқк°Җн•ҳлҠ” лІ„к·ё мһҲм—ҲмқҢ)
    if (simState.t >= simState.t_final) {
      setSimState(s => ({
        ...s,
        log: [...s.log, `вҡ  t = ${s.t.toFixed(1)}s мқҙлҜё t_final = ${s.t_final}s лҸ„лӢ¬. Reset нӣ„ Run к°ҖлҠҘ.`],
      }));
      return;
    }
    // historyк°Җ л№„м–ҙмһҲмңјл©ҙ(мҙҲкё° лЎңл“ң м§Ғнӣ„) t=0 мҠӨлғ…мғ· лЁјм Җ кё°лЎқ
    if (simState.history.length === 0) {
      initSim();
    }
    setSimState(s => ({ ...s, running: true, log: [...s.log, `в–¶ Run @ t=${s.t.toFixed(1)}s`] }));
  };
  const stopSim = () => setSimState(s => ({ ...s, running: false, log: [...s.log, `в–  Stop @ t=${s.t.toFixed(1)}s`] }));
  const resetSim = () => {
    // лё”лЎқ stateлҠ” мҙҲкё°нҷ”, dt/t_finalмқҖ мң м§Җ
    const resetBlocks = blocks.map(b => {
      const def = TYPES[b.type];
      return { ...b, outputs: {}, state: def.stateInit ? JSON.parse(JSON.stringify(def.stateInit)) : {} };
    });
    // t=0м—җм„ң 2-pass нҸүк°Җ (source вҶ’ math вҶ’ display м „нҢҢ)
    const conns = connectionsRef.current;
    let evaluated = evaluateBlocks(resetBlocks, conns, 0, simState.dt);
    evaluated = evaluateBlocks(evaluated, conns, 0, simState.dt);

    setBlocks(evaluated);
    setSimState(s => ({
      ...s,
      running: false,
      t: 0,
      history: [makeSnapshot(evaluated, 0)],
      log: ['вҶә Reset @ t=0.0s'],
    }));
  };

  // -------- Slot Save/Load (localStorage) --------
  const SLOT_INDEX_KEY = 'hpwd-studio-slots';
  const SLOT_PREFIX = 'hpwd-studio-slot-';

  const loadSlotIndex = () => {
    try {
      const raw = localStorage.getItem(SLOT_INDEX_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  };

  const saveSlotIndex = (slots) => {
    try { localStorage.setItem(SLOT_INDEX_KEY, JSON.stringify(slots)); } catch (err) {
      alert('мҠ¬лЎҜ мқёлҚұмҠӨ м ҖмһҘ мӢӨнҢЁ: ' + err.message);
    }
  };

  // нҳ„мһ¬ н”„лЎңм қнҠёлҘј мҠ¬лЎҜмңјлЎң м ҖмһҘ (мғҲ мҠ¬лЎҜ лҳҗлҠ” лҚ®м–ҙм“°кё°)
  const saveSlot = (name, existingId = null) => {
    const slots = loadSlotIndex();
    const now = Date.now();
    const id = existingId || `slot_${now}_${Math.random().toString(36).slice(2, 6)}`;
    const data = {
      id, name, savedAt: now,
      blocks: JSON.parse(JSON.stringify(blocks)),
      connections: JSON.parse(JSON.stringify(connections)),
      simState: { dt: simState.dt, t_final: simState.t_final },
    };
    try {
      localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
    } catch (err) {
      alert('мҠ¬лЎҜ м ҖмһҘ мӢӨнҢЁ (мҡ©лҹү мҙҲкіј к°ҖлҠҘм„ұ): ' + err.message);
      return false;
    }
    // мқёлҚұмҠӨ м—…лҚ°мқҙнҠё (лҚ®м–ҙм“°кё°л©ҙ көҗмІҙ, мӢ к·ңл©ҙ м¶”к°Җ)
    const meta = {
      id, name, savedAt: now,
      blockCount: blocks.length,
      connectionCount: connections.length,
    };
    const updated = existingId
      ? slots.map(s => s.id === existingId ? meta : s)
      : [...slots, meta];
    saveSlotIndex(updated);
    return true;
  };

  const loadSlot = (id) => {
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (!raw) { alert('мҠ¬лЎҜ лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ'); return false; }
      const data = JSON.parse(raw);
      setBlocks(data.blocks || []);
      setConnections(data.connections || []);
      if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      setSelectedIds([]);
      setSelectedConnIds([]);
      return true;
    } catch (err) {
      alert('мҠ¬лЎҜ лЎңл“ң мӢӨнҢЁ: ' + err.message);
      return false;
    }
  };

  const deleteSlot = (id) => {
    localStorage.removeItem(SLOT_PREFIX + id);
    saveSlotIndex(loadSlotIndex().filter(s => s.id !== id));
  };

  const renameSlot = (id, newName) => {
    const slots = loadSlotIndex();
    const slot = slots.find(s => s.id === id);
    if (!slot) return;
    slot.name = newName;
    saveSlotIndex(slots);
    // мҠ¬лЎҜ лҚ°мқҙн„° мһҗмІҙм—җлҸ„ мқҙлҰ„ л°ҳмҳҒ
    try {
      const raw = localStorage.getItem(SLOT_PREFIX + id);
      if (raw) {
        const data = JSON.parse(raw);
        data.name = newName;
        localStorage.setItem(SLOT_PREFIX + id, JSON.stringify(data));
      }
    } catch { /* ignore */ }
  };

  // лӘЁлӢ¬ м—ҙ л•Ң мҠ¬лЎҜ лӘ©лЎқ к°ұмӢ 
  const openSlotModal = (mode) => {
    setSlotList(loadSlotIndex());
    setSlotModal(mode);
  };

  const refreshSlotList = () => setSlotList(loadSlotIndex());

  // -------- JSON File Export/Import (кё°мЎҙ кё°лҠҘ, л°ұм—… мҡ©лҸ„) --------
  const exportProjectFile = () => {
    const data = { blocks, connections, simState: { dt: simState.dt, t_final: simState.t_final } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hpwd_project_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importProjectFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        setBlocks(data.blocks || []);
        setConnections(data.connections || []);
        if (data.simState) setSimState(s => ({ ...s, ...data.simState, running: false, t: 0, history: [] }));
      } catch (err) { alert('Failed to load: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = ''; // к°ҷмқҖ нҢҢмқј мһ¬м„ нғқ к°ҖлҠҘн•ҳкІҢ
  };

  // -------- CSV Export --------
  // CSV н•„л“ң мқҙмҠӨмјҖмқҙн”„: мүјн‘ң/л”°мҳҙн‘ң/к°ңн–ү нҸ¬н•Ё мӢң л”°мҳҙн‘ңлЎң к°җмӢёкі  лӮҙл¶Җ л”°мҳҙн‘ңлҠ” мӨ‘ліө
  const csvEscape = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };

  // кіөнҶө лӢӨмҡҙлЎңл“ң н•ЁмҲҳ (UTF-8 BOM м¶”к°Җ вҶ’ Excelм—җм„ң н•ңкёҖ/мҲ«мһҗ м •мғҒ мқёмӢқ)
  const downloadCsv = (filename, rows) => {
    if (!rows || rows.length === 0) {
      alert('лӮҙліҙлӮј лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ. лЁјм Җ мӢңл®¬л Ҳмқҙм…ҳмқ„ мӢӨн–үн•ҳм„ёмҡ”.');
      return;
    }
    const csv = '\ufeff' + rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // м „м—ӯ CSV: лӘЁл“  лё”лЎқ м¶ңл Ҙ мӢңкі„м—ҙ
  const exportAllCsv = () => {
    if (simState.history.length === 0) {

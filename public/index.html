              <div className="flex-1 min-w-[24px] text-center text-slate-300 self-start mt-2.5">
                <div className="text-base leading-none">вҶ’</div>
                <div className="text-[8px] font-mono text-slate-400">air{i + 1}</div>
              </div>
            )}
          </React.Fragment>
        ))}
        <div className="w-full text-center text-[10px] font-mono text-cyan-600 font-bold mt-1.5 opacity-80">вҶ‘ air{NODES.length} вҶ’ Drum (нҸҗлЈЁн”„) В· AirVolume {NODES.length}к°ң(мІ«м§ё=м••л Ҙм•өм»Ө)</div>
      </div>

      {running && (
        <div className="text-center text-xs font-mono text-slate-400 py-1">omc м»ҙнҢҢмқј + м Ғл¶„ мӨ‘вҖҰ (кіөкё°мёЎмқҖ HelmholtzMedia л¶Ҳн•„мҡ”лқј л№ лҰ„)</div>
      )}
      {error && (
        <div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>
      )}

      {/* results */}
      {result && result.trajectory && (
        <>
          <div>
            <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2.5">
              м •м°©к°’ <span className="font-mono text-cyan-600 normal-case">кіөкё° л§Ғ</span> В· t={(result.trajectory.time && result.trajectory.time.length) ? result.trajectory.time[result.trajectory.time.length - 1].toFixed(0) : ''}s
            </div>
            <div className="grid grid-cols-4 gap-2.5">
              {AIR_CARDS.filter(c => c.k in s).map(c => (
                <div key={c.k} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                  <div className="text-[11px] font-medium text-slate-400 mb-1">{c.n}</div>
                  <div className={`font-mono text-xl font-bold leading-none ${c.c}`}>
                    {(s[c.k] * (c.scale || 1)).toFixed(c.d)}
                    <span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{c.u}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">кіөкё° мҳЁлҸ„ н”„лЎңнҢҢмқј вҶ’ м •м°© В· н•ЁмҲҳмңЁ м¶”мқҙ</div>
            <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />м—ҙн’Қ(Cond out)</span>
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-slate-500 inline-block" />Drum out</span>
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Evap out</span>
              <span className="inline-flex items-center gap-1.5 text-cyan-600"><i className="w-3 h-0.5 rounded bg-cyan-600 inline-block" />н•ЁмҲҳмңЁ X</span>
            </div>
            <AirCyclePlot traj={result.trajectory} />
          </div>
        </>
      )}
    </div>
  );
}


// CoupledCycleRunnerBody вҖ” лғүл§Ө-кіөкё° м»Өн”Ңл“ң мӮ¬мқҙнҒҙ
//   [кі м •] HPWDcpl.Cycle_coupled_* мӢӨн–ү  |  [мә”лІ„мҠӨ] к·ёлҰ° лғүл§Өл§Ғ+кіөкё°л§Ғ м¶”м¶ң вҶ’ м»Өн”Ңл“ң .mo мғқм„ұВ·мӢӨн–ү
//   evap/cond merged HXлЎң л‘җ л§Ғ лҸҷмӢң кІ°н•©. лғүл§Ө+кіөкё° KPI+SMER, CyclePlot(лғүл§Ө) мһ¬мӮ¬мҡ©.
function CoupledCycleRunnerBody({ url, modelica, blocks, connections, onLoadCoupledTestRing }) {
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('canvas');        // 'fixed' | 'canvas'
  const [model, setModel] = useState('Cycle_coupled_closed');
  const [stopTime, setStopTime] = useState('180');
  const [genMo, setGenMo] = useState(null);
  const [showMo, setShowMo] = useState(false);

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `лЎңм»¬ м„ңлІ„м—җ ${path} к°Җ м—ҶмқҢ (${detail}). git pull нӣ„ python server.py мһ¬мӢңмһ‘ н•„мҡ”.`
      : `м„ңлІ„ мқ‘лӢө мҳӨлҘҳ: ${detail}`;
  };

  const _consume = async (r, path) => {
    if (!r.ok) { setError(await _fetchErr(r, path)); return false; }
    const data = await r.json();
    if (data.error) { setError(data.error); return false; }
    if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
      setError('кІ°кіјм—җ к¶Өм Ғмқҙ м—ҶмқҢ вҖ” м„ңлІ„ лІ„м „ нҷ•мқё (git pull нӣ„ python server.py мһ¬мӢңмһ‘).'); return false;
    }
    setResult({ settled: data.settled || {}, trajectory: data.trajectory, meta: data.meta || {} });
    if (data.generated_mo) setGenMo(data.generated_mo);
    return true;
  };

  // [кі м •] кІҖмҰқлҗң named лӘЁлҚё мӢӨн–ү
  const runFixed = async () => {
    setRunning(true); setError(null); setResult(null); setGenMo(null);
    try {
      const r = await fetch(`${url}/run_coupled_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, stop_time: parseFloat(stopTime) || 180, tolerance: 1e-6, intervals: 300 }),
      });
      await _consume(r, '/run_coupled_cycle');
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  // [мә”лІ„мҠӨ] лғүл§Ө л§Ғ + кіөкё° л§Ғ м¶”м¶ң вҶ’ кіөмң HX кІҖмҰқ вҶ’ м»Өн”Ңл“ң .mo мғқм„ұВ·мӢӨн–ү
  const runCanvas = async (blk, conn) => {
    const useB = Array.isArray(blk) ? blk : blocks;
    const useC = Array.isArray(conn) ? conn : connections;
    setError(null); setResult(null); setGenMo(null);
    const refTopo = extractCycleTopology(useB, useC);
    if (refTopo.error) { setError('лғүл§Ө л§Ғ вҖ” ' + refTopo.error); return; }
    const airTopo = extractAirTopology(useB, useC);
    if (airTopo.error) { setError('кіөкё° л§Ғ вҖ” ' + airTopo.error); return; }
    const rK = new Set(refTopo.components.map(c => c.kind));
    const aK = new Set(airTopo.components.map(c => c.kind));
    if (!rK.has('evaporator') || !aK.has('evaporator') || !rK.has('condenser') || !aK.has('condenser')) {
      setError('EvapВ·Condк°Җ лғүл§Ө л§Ғкіј кіөкё° л§Ғ м–‘мӘҪм—җ м—°кІ°лҸјм•ј н•Ё вҖ” л‘җ л§Ғмқҙ кіөмң н•ҳлҠ” merged HXмһ„. (мҰқл°ң/мқ‘м¶•кё°м—җ лғүл§Ө м—°кІ° + кіөкё° м—°кІ°мқ„ лӘЁл‘җ к·ёл Өм•ј н•Ё)');
      return;
    }
    setRunning(true);
    try {
      const r = await fetch(`${url}/run_canvas_coupled_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ref_topology: refTopo, air_topology: airTopo,
          settings: { stop_time: parseFloat(stopTime) || 180, tolerance: 1e-6, intervals: 300 },
        }),
      });
      await _consume(r, '/run_canvas_coupled_cycle');
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const s = result?.settled || {};
  const fmt = (k, d, scale = 1) => (k in s && s[k] != null) ? (s[k] * scale).toFixed(d) : 'вҖ”';
  const CARDS = [
    { k: 'Pc_bar', n: 'Pc мқ‘м¶•', u: 'bar', d: 2, c: 'text-red-600', grp: 'лғүл§Ө' },
    { k: 'Pe_bar', n: 'Pe мҰқл°ң', u: 'bar', d: 2, c: 'text-blue-600', grp: 'лғүл§Ө' },
    { k: 'W', n: 'W м••м¶•лҸҷл Ҙ', u: 'W', d: 0, c: 'text-amber-600', grp: 'лғүл§Ө' },
    { k: 'SH_evap', n: 'SH кіјм—ҙлҸ„', u: 'K', d: 2, c: 'text-teal-600', grp: 'лғүл§Ө' },
    { k: 'X', n: 'н•ЁмҲҳмңЁ X', u: 'kg/kg', d: 3, c: 'text-cyan-700', grp: 'кіөкё°' },
    { k: 'm_evap', n: 'б№Ғ м ңмҠө', u: 'g/s', d: 2, c: 'text-blue-600', scale: 1000, grp: 'кіөкё°' },
    { k: 'T_cond_air_C', n: 'м—ҙн’Қ(л“ңлҹјмһ…кө¬)', u: 'В°C', d: 1, c: 'text-red-600', grp: 'кіөкё°' },
    { k: 'mdot_da', n: 'н’Қлҹү', u: 'kg/s', d: 3, c: 'text-violet-600', grp: 'кіөкё°' },
  ];

  const Loop = ({ label, color, nodes }) => (
    <div className="flex items-center gap-1.5 flex-wrap text-xs">
      <span className={`font-mono text-[10px] font-bold w-9 ${color}`}>{label}</span>
      {nodes.map((n, i) => (
        <React.Fragment key={n}>
          <span className={`px-2 py-1 rounded font-bold ${(n === 'Cond' || n === 'Evap')
            ? 'bg-cyan-100 text-cyan-800 ring-1 ring-cyan-300' : 'bg-white text-slate-600 border border-slate-200'}`}>{n}</span>
          {i < nodes.length - 1 && <span className="text-slate-300">вҶ’</span>}
        </React.Fragment>
      ))}
      <span className="text-slate-400 font-bold">вҶ»</span>
    </div>
  );

  if (!modelica.available) {
    return (
      <div className="p-6 text-center text-slate-500 text-sm">
        <div className="text-2xl mb-2">вҡ пёҸ</div>
        <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local л°ұм—”л“ң(omc) м—°кІ° н•„мҡ”'}</div>
      </div>
    );
  }

  const detectedRef = result?.meta?.ref_ring, detectedAir = result?.meta?.air_ring;

  return (
    <div className="space-y-4">
      {/* mode toggle */}
      <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
        {[['canvas', 'мә”лІ„мҠӨм—җм„ң м¶”м¶ң', 'к·ёлҰ° л‘җ л§Ғ вҶ’ .mo мғқм„ұ'], ['fixed', 'кі м • лӘЁлҚё', 'кІҖмҰқлҗң named лӘЁлҚё']].map(([m, lbl, sub]) => (
          <button key={m} onClick={() => { setMode(m); setError(null); }} disabled={running}
            className={`px-4 py-2 text-sm font-semibold transition text-left ${mode === m ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
            {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
          </button>
        ))}
      </div>

      {/* controls */}
      <div className="flex items-end gap-4 flex-wrap">
        {mode === 'fixed' && (
          <div className="flex flex-col gap-1.5">
            <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">м»Өн”Ңл“ң лӘЁлҚё</label>
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
              {[['Cycle_coupled_closed', 'нҸҗлЈЁн”„', 'drum кұҙмЎ° + fan мҲңнҷҳ'], ['Cycle_coupled_open', 'open', 'кіөкё°мң лҹү prescribed']].map(([m, lbl, sub]) => (
                <button key={m} onClick={() => setModel(m)} disabled={running}
                  className={`px-3.5 py-2 text-sm font-semibold transition text-left ${model === m ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
                  {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        <div className="flex flex-col gap-1.5">
          <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӢңл®¬ м„Өм •</label>
          <div className="flex gap-2 items-end">
            <label className="flex flex-col gap-1">
              <span className="font-mono text-[10px] text-slate-400">stop [s]</span>
              <input type="number" value={stopTime} disabled={running} onChange={(e) => setStopTime(e.target.value)}
                className="w-24 bg-white border border-slate-200 rounded px-2 py-1.5 text-sm font-mono text-slate-700 focus:border-cyan-400 outline-none" />
            </label>
            <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2 text-xs font-mono text-slate-600">dassl В· tol 1e-6</span>
          </div>
        </div>
        <div className="ml-auto flex items-center gap-2">
          {mode === 'canvas' && onLoadCoupledTestRing && (
            <button
              onClick={() => { const r = onLoadCoupledTestRing(); runCanvas(r.blocks, r.connections); }}
              disabled={running} title="кІҖмҰқлҗң м»Өн”Ңл“ң л§Ғ(лғүл§Ө closed + кіөкё° closed, EvapВ·Cond кіөмң )мқ„ мә”лІ„мҠӨм—җ мһҗлҸҷ кө¬м„ұн•ҳкі  л°”лЎң мӢӨн–ү"
              className="inline-flex items-center gap-2 bg-white border border-cyan-300 text-cyan-700 hover:bg-cyan-50 disabled:opacity-60 rounded-xl px-4 py-2.5 font-bold text-sm transition">
              рҹ§Ә н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү
            </button>
          )}
          <button onClick={() => (mode === 'canvas' ? runCanvas() : runFixed())} disabled={running}
            className="inline-flex items-center gap-2 bg-cyan-600 hover:bg-cyan-700 disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm shadow-lg shadow-cyan-500/25 transition">
            {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>)
              : (mode === 'canvas' ? 'в–¶ мә”лІ„мҠӨ м¶”м¶ң + Run' : 'в–¶ Run м»Өн”Ңл“ң мӮ¬мқҙнҒҙ')}
          </button>
        </div>
      </div>

      {/* coupling map: л‘җ л§Ғмқҙ EvapВ·Cond кіөмң  */}
      <div className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 space-y-2">
        <Loop label="лғүл§Ө" color="text-blue-600" nodes={detectedRef ? detectedRef.map(k => ({ compressor: 'Comp', condenser: 'Cond', eev: 'EEV', evaporator: 'Evap' }[k] || k)) : ['Comp', 'Cond', 'EEV', 'Evap']} />
        <Loop label="кіөкё°" color="text-cyan-600" nodes={detectedAir ? detectedAir.map(k => ({ drum: 'Drum', fan: 'Fan', filter: 'Filter', evaporator: 'Evap', condenser: 'Cond' }[k] || k)) : ['Drum', 'Fan', 'Evap', 'Cond']} />
        <div className="text-[10px] font-mono text-cyan-600 text-center pt-0.5">вҶ• Evap В· Cond = merged HX (лғүл§ӨВ·кіөкё° кІ°н•©м җ, мҪ”мқјмҳЁлҸ„ мғҒнҳёкІ°м •){detectedRef ? ' В· мә”лІ„мҠӨм—җм„ң м¶”м¶ңлҗЁ' : ''}</div>
      </div>

      <div className="text-xs text-slate-500 leading-relaxed">
        {mode === 'canvas'
          ? <>мә”лІ„мҠӨмқҳ <b className="text-slate-700">лғүл§Ө л§Ғ(CompвҶ’CondвҶ’EEVвҶ’Evap)</b>кіј <b className="text-slate-700">кіөкё° л§Ғ(DrumвҶ’FanвҶ’EvapвҶ’Cond)</b>мқ„ м¶”м¶ңн•ҙ м»Өн”Ңл“ң .moлҘј мғқм„ұВ·мӢӨн–үн•Ё. <b className="text-cyan-700">EvapВ·CondлҠ” л‘җ л§Ғмқҙ кіөмң </b>н•ҳлҠ” merged HXмқҙлҜҖлЎң, мҰқл°ң/мқ‘м¶•кё°м—җ лғүл§Ө м—°кІ°кіј кіөкё° м—°кІ°мқ„ лӘЁл‘җ к·ёл Өм•ј н•Ё. (н‘ңмӨҖ нҶ нҸҙлЎңм§Җл©ҙ кі м • лӘЁлҚёкіј лҸҷмқј кІ°кіј)</>
          : <>кІҖмҰқлҗң кі м • лӘЁлҚё мӢӨн–ү. <b className="text-slate-700">нҸҗлЈЁн”„</b>лҠ” drum кұҙмЎ°+fan мҲңнҷҳк№Ңм§Җ нҸ¬н•Ён•ң мҷ„м „ кІ°н•©, <b className="text-slate-700">open</b>мқҖ кіөкё°мң лҹү prescribed кІҪлҹүнҢҗ.</>}
      </div>

      {running && (<div className="text-center text-xs font-mono text-slate-400 py-1">omc м»ҙнҢҢмқј + м»Өн”Ңл“ң м Ғл¶„ мӨ‘вҖҰ (stiff, мӢӨм ң ~55вҖ“75s)</div>)}
      {error && (<div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>)}

      {/* results */}
      {result && result.trajectory && (
        <>
          <div className="flex items-stretch gap-3 flex-wrap">
            <div className="flex flex-col justify-center px-5 py-3 rounded-xl bg-gradient-to-br from-cyan-600 to-teal-500 text-white shadow-lg shadow-cyan-500/20 min-w-[150px]">
              <div className="text-[11px] font-semibold opacity-80">SMER</div>
              <div className="font-mono text-3xl font-extrabold leading-none">{fmt('SMER', 2)}<span className="text-sm font-medium opacity-80 ml-1">kg/kWh</span></div>
              <div className="text-[10px] opacity-75 mt-1">лӢЁмң„ м ңмҠөлҹү / мҶҢл№„м „л Ҙ</div>
            </div>
            <div className="grid grid-cols-4 gap-2.5 flex-1 min-w-[300px]">
              {CARDS.filter(c => c.k in s).map(c => (
                <div key={c.k} className="border border-slate-100 rounded-xl px-3 py-2 bg-slate-50/60">
                  <div className="text-[10px] font-medium text-slate-400 mb-0.5">{c.n} <span className="text-[8px] text-slate-300">В·{c.grp}</span></div>
                  <div className={`font-mono text-lg font-bold leading-none ${c.c}`}>
                    {fmt(c.k, c.d, c.scale || 1)}<span className="text-[10px] text-slate-400 ml-0.5 font-medium">{c.u}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">лғүл§ӨмёЎ кё°лҸҷ кіјлҸ„ вҶ’ м •м°© к¶Өм Ғ</div>
              {genMo && (
                <button onClick={() => setShowMo(v => !v)} className="text-[10px] font-mono text-cyan-600 hover:text-cyan-700 font-bold">
                  {showMo ? 'мғқм„ұлҗң .mo мҲЁкё°кё° в–І' : 'мғқм„ұлҗң .mo ліҙкё° в–ј'}
                </button>
              )}
            </div>
            {showMo && genMo && (
              <pre className="bg-slate-900 text-slate-100 text-[10px] font-mono rounded-lg p-3 overflow-auto max-h-52 mb-2 leading-relaxed">{genMo}</pre>
            )}
            <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
              <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
            </div>
            <CyclePlot traj={result.trajectory} />
          </div>
        </>
      )}
    </div>
  );
}

// =============================================================
// CycleRunnerModal вҖ” м „мІҙ L1 нҸҗлЈЁн”„лҘј ModelicaлЎң мӢӨн–ү (/run_cycle)
// =============================================================
function CycleRunnerModal({ onClose, blocks, connections, onLoadTestRing, onLoadAirTestRing, onLoadCoupledTestRing }) {
  const [domain, setDomain] = useState('refrigerant'); // 'refrigerant' | 'air'
  const [mode, setMode] = useState('fixed');          // 'fixed' | 'canvas'
  const [model, setModel] = useState('Cycle_L1_ramp');
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);   // {settled, trajectory}
  const [error, setError] = useState(null);
  const [detected, setDetected] = useState(null);     // к°җм§Җлҗң л§Ғ лқјлІЁ
  // кё°лҸҷВ·мҙҲкё°нҷ” м„Өм • (мә”лІ„мҠӨ лӘЁл“ң)
  const [chargeG, setChargeG] = useState('89');
  const [pRest, setPRest] = useState('9');
  const [tRamp, setTRamp] = useState('20');

  const status = window.HPWD_BACKEND || {};
  const modelica = status.modelica || { available: false, reason: null, cycles: [] };
  const url = status.url || '';

  const _applyResult = (data) => {
    if (data.error) { setError(data.error); return; }
    if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
      setError('кІ°кіјм—җ к¶Өм Ғмқҙ м—ҶмқҢ вҖ” м„ңлІ„ лІ„м „ нҷ•мқё (git pull нӣ„ python server.py мһ¬мӢңмһ‘).'); return;
    }
    setResult({ settled: data.settled || {}, trajectory: data.trajectory });
  };

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `лЎңм»¬ м„ңлІ„м—җ ${path} к°Җ м—ҶмқҢ (${detail}). git pull нӣ„ python server.py мһ¬мӢңмһ‘ н•„мҡ”.`
      : `м„ңлІ„ мқ‘лӢө мҳӨлҘҳ: ${detail}`;
  };

  const runCycle = async () => {
    setRunning(true); setError(null); setResult(null); setDetected(null);
    try {
      const r = await fetch(`${url}/run_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, stop_time: 120, tolerance: 1e-6, intervals: 240 }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_cycle')); setRunning(false); return; }
      _applyResult(await r.json());
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const runCanvasCycle = async (blk, conn) => {
    const useBlocks = blk || blocks;
    const useConns = conn || connections;
    setRunning(true); setError(null); setResult(null); setDetected(null);
    const topo = extractCycleTopology(useBlocks, useConns);
    if (topo.error) { setError(topo.error); setRunning(false); return; }
    setDetected(topo.ringLabels);
    const settings = {
      charge_g: parseFloat(chargeG) || 89, p_rest_bar: parseFloat(pRest) || 9,
      t_ramp: parseFloat(tRamp) || 20, stop_time: 120, tolerance: 1e-6, intervals: 240,
    };
    try {
      const r = await fetch(`${url}/run_canvas_cycle`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topology: topo, settings }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_canvas_cycle')); setRunning(false); return; }
      _applyResult(await r.json());
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const CARDS = [
    { k: 'Pc_bar', n: 'Pc (мқ‘м¶•)', u: 'bar', d: 2, c: 'text-red-600' },
    { k: 'Pe_bar', n: 'Pe (мҰқл°ң)', u: 'bar', d: 2, c: 'text-blue-600' },
    { k: 'mdot_comp', n: 'б№Ғ м••м¶•кё°', u: 'kg/s', d: 4, c: 'text-violet-600' },
    { k: 'SH_evap', n: 'SH кіјм—ҙлҸ„', u: 'K', d: 2, c: 'text-teal-600' },
    { k: 'SC_cond', n: 'SC кіјлғүлҸ„', u: 'K', d: 2, c: 'text-amber-600' },
    { k: 'W', n: 'W мҶҢмҡ”лҸҷл Ҙ', u: 'W', d: 1, c: 'text-amber-600' },
    { k: 'charge', n: 'charge', u: 'g', d: 1, c: 'text-emerald-600', scale: 1000 },
    { k: 'opening', n: 'EEV к°ңлҸ„', u: '%', d: 1, c: 'text-teal-600' },
  ];
  const s = result?.settled || {};
  const NODES = [
    ['рҹҢҖ', 'Compressor', running ? 'вҖҰ' : 'мқҙлЎ  L1', 'from-blue-600 to-blue-400'],
    ['вҷЁ', 'Condenser', ('Pc_bar' in s) ? `${s.Pc_bar.toFixed(2)} bar` : 'вҖ” bar', 'from-amber-600 to-amber-400'],
    ['рҹ”»', 'EEV', ('opening' in s) ? `${s.opening.toFixed(0)}% к°ңлҸ„` : (('Pc_bar' in s) ? 'phi кі м •' : 'к°ңлҸ„'), 'from-red-600 to-red-400'],
    ['вқ„', 'Evaporator', ('Pe_bar' in s) ? `${s.Pe_bar.toFixed(2)} bar` : 'вҖ” bar', 'from-teal-600 to-teal-400'],
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4" onMouseDown={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[92vh] overflow-y-auto" onMouseDown={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3.5 border-b border-slate-200 sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2.5">
            <div className="w-2.5 h-2.5 rounded bg-violet-500" />
            <span className="font-bold text-slate-800">Cycle Runner <span className="text-slate-400 font-medium text-sm">В· м „мІҙ L1 нҸҗлЈЁн”„ (Modelica)</span></span>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none px-2">Г—</button>
        </div>

        {!modelica.available ? (
          <div className="p-10 text-center text-slate-500 text-sm">
            <div className="text-3xl mb-3">вҡ пёҸ</div>
            <div className="font-semibold text-slate-700 mb-1.5">Modelica м—”м§„мқҙ н•„мҡ”н•©лӢҲлӢӨ</div>
            <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local л°ұм—”л“ң(omc) м—°кІ° н•„мҡ”'}</div>
          </div>
        ) : (
          <div className="p-5 space-y-4">
            {/* мӮ¬мқҙнҒҙ лҸ„л©”мқё нҶ кёҖ: лғүл§Ө / кіөкё° */}
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
              {[['refrigerant', 'лғүл§Ө мӮ¬мқҙнҒҙ', 'CompВ·CondВ·EEVВ·Evap'], ['air', 'кіөкё° мӮ¬мқҙнҒҙ', 'DrumВ·FanВ·EvapВ·Cond'], ['coupled', 'м»Өн”Ңл“ң', 'лғүл§Ө вҹ· кіөкё° кІ°н•©']].map(([d, lbl, sub]) => (
                <button key={d} onClick={() => { setDomain(d); setError(null); }} disabled={running}
                  className={`px-4 py-2 text-sm font-bold transition text-left ${domain === d ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
                  {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                </button>
              ))}
            </div>
            {domain === 'air' ? (
              <AirCycleRunnerBody blocks={blocks} connections={connections} url={url}
                modelica={modelica} onLoadAirTestRing={onLoadAirTestRing} />
            ) : domain === 'coupled' ? (
              <CoupledCycleRunnerBody url={url} modelica={modelica} blocks={blocks} connections={connections} onLoadCoupledTestRing={onLoadCoupledTestRing} />
            ) : (<>
            {/* mode toggle */}
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
              {[['fixed', 'кі м • лӘЁлҚё', 'л ҲнҚјлҹ°мҠӨ .mo'], ['canvas', 'мә”лІ„мҠӨ нҶ нҸҙлЎңм§Җ', 'лӮҙк°Җ к·ёлҰ° л§Ғ']].map(([m, lbl, sub]) => (
                <button key={m} onClick={() => { setMode(m); setError(null); }} disabled={running}
                  className={`px-4 py-2 text-sm font-semibold transition text-left ${mode === m ? 'bg-white text-violet-700 shadow-[inset_0_-2px_0_0_#7C3AED]' : 'text-slate-500 hover:text-slate-700'}`}>
                  {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                </button>
              ))}
            </div>

            {/* controls вҖ” mode dependent */}
            {mode === 'fixed' ? (
              <div className="flex items-end gap-4 flex-wrap">
                <div className="flex flex-col gap-1.5">
                  <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӮ¬мқҙнҒҙ лӘЁлҚё</label>
                  <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
                    {[['Cycle_L1_ramp', 'кі м • EEV'], ['Cycle_L1_ramp_PI', 'PI м ңм–ҙ']].map(([m, lbl]) => (
                      <button key={m} onClick={() => setModel(m)} disabled={running}
                        className={`px-3.5 py-2 text-sm font-semibold transition ${model === m ? 'bg-white text-slate-800 shadow-[inset_0_-2px_0_0_#0D9488]' : 'text-slate-500 hover:text-slate-700'}`}>
                        {lbl}<span className="block font-mono text-[10px] text-slate-400">{m}</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӢңл®¬ м„Өм •</label>
                  <div className="flex gap-2 text-xs font-mono text-slate-600">
                    <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">stop <b className="text-slate-800">120</b>s</span>
                    <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">dassl</span>
                    <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">tol <b className="text-slate-800">1e-6</b></span>
                  </div>
                </div>
                <button onClick={runCycle} disabled={running}
                  className="ml-auto inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-700 disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm shadow-lg shadow-violet-500/25 transition">
                  {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>) : 'в–¶ Run Cycle'}
                </button>
              </div>
            ) : (
              <div className="space-y-3">
                <div className="flex items-end gap-4 flex-wrap">
                  <div className="flex flex-col gap-1.5">
                    <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">кё°лҸҷВ·мҙҲкё°нҷ”</label>
                    <div className="flex gap-2">
                      {[['charge', chargeG, setChargeG, 'g'], ['p_rest', pRest, setPRest, 'bar'], ['t_ramp', tRamp, setTRamp, 's']].map(([lbl, val, setter, u]) => (
                        <label key={lbl} className="flex flex-col gap-1">
                          <span className="font-mono text-[10px] text-slate-400">{lbl} [{u}]</span>
                          <input type="number" value={val} disabled={running}
                            onChange={(e) => setter(e.target.value)}
                            className="w-20 bg-white border border-slate-200 rounded px-2 py-1.5 text-sm font-mono text-slate-700 focus:border-violet-400 outline-none" />
                        </label>
                      ))}
                    </div>
                  </div>
                  <div className="ml-auto flex items-center gap-2">
                    {onLoadTestRing && (
                      <button
                        onClick={() => { const r = onLoadTestRing(); runCanvasCycle(r.blocks, r.connections); }}
                        disabled={running} title="л ҲнҚјлҹ°мҠӨ мӮ¬мқҙнҒҙмқ„ мә”лІ„мҠӨм—җ мһҗлҸҷ кө¬м„ұн•ҳкі  л°”лЎң мӢӨн–ү (PcвүҲ16.6)"
                        className="inline-flex items-center gap-2 bg-white border border-violet-300 text-violet-700 hover:bg-violet-50 disabled:opacity-60 rounded-xl px-4 py-2.5 font-bold text-sm transition">
                        рҹ§Ә н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү
                      </button>
                    )}
                    <button onClick={() => runCanvasCycle()} disabled={running}
                      className="inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-700 disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm shadow-lg shadow-violet-500/25 transition">
                      {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>) : 'в–¶ мә”лІ„мҠӨм—җм„ң м¶”м¶ң & мӢӨн–ү'}
                    </button>
                  </div>
                </div>
                <div className="text-xs text-slate-500 leading-relaxed">
                  мә”лІ„мҠӨмқҳ <b className="text-slate-700">лғүл§Ө м—°кІ°</b>м—җм„ң л§Ғ(CompвҶ’CondвҶ’EEVвҶ’Evap)мқ„ м¶”м¶ңн•ҙ .mo мһҗлҸҷмғқм„ұВ·мӢӨн–ү.
                  <span className="ml-1">мҶҗмңјлЎң к·ёл ёмңјл©ҙ <b className="text-slate-700">мә”лІ„мҠӨм—җм„ң м¶”м¶ң & мӢӨн–ү</b>, л№ лҘё кІҖмҰқмқҖ <b className="text-violet-700">н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү</b>.</span>
                  {detected && (<span className="block mt-0.5 font-mono text-violet-600">к°җм§Җ: {detected.join(' вҶ’ ')} вҶ’ {detected[0]}</span>)}
                </div>
              </div>
            )}

            {/* loop schematic */}
            <div className="flex items-center gap-1 flex-wrap bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
              {NODES.map(([ic, nm, vv, grad], i) => (
                <React.Fragment key={nm}>
                  <div className="flex flex-col items-center gap-1 min-w-[76px]">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg text-white bg-gradient-to-br ${grad} shadow`}>{ic}</div>
                    <div className="text-xs font-bold text-slate-700">{nm}</div>
                    <div className="font-mono text-[10px] text-slate-400">{vv}</div>
                  </div>
                  {i < 3 && (
                    <div className="flex-1 min-w-[24px] text-center text-slate-300 self-start mt-2.5">
                      <div className="text-base leading-none">вҶ’</div>
                      <div className="text-[8px] font-mono text-slate-400">vol{i + 1}</div>
                    </div>
                  )}
                </React.Fragment>
              ))}
              <div className="w-full text-center text-[10px] font-mono text-teal-600 font-bold mt-1.5 opacity-80">вҶ‘ vol4 вҶ’ Compressor (нҸҗлЈЁн”„) В· Volume 4к°ң = м••л Ҙ л…ёл“ң</div>
            </div>

            {running && (
              <div className="text-center text-xs font-mono text-slate-400 py-1">omc м»ҙнҢҢмқј + 120s м Ғл¶„ мӨ‘вҖҰ (мӢӨм ң ~46вҖ“49s мҶҢмҡ”)</div>
            )}
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>
            )}

            {/* results */}
            {result && result.trajectory && (
              <>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2.5">
                    м •м°©к°’ <span className="font-mono text-teal-600 normal-case">{model}</span> В· t=120s
                  </div>
                  <div className="grid grid-cols-4 gap-2.5">
                    {CARDS.filter(c => c.k in s).map(c => (
                      <div key={c.k} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                        <div className="text-[11px] font-medium text-slate-400 mb-1">{c.n}</div>
                        <div className={`font-mono text-xl font-bold leading-none ${c.c}`}>
                          {(s[c.k] * (c.scale || 1)).toFixed(c.d)}
                          <span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{c.u}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">кё°лҸҷ кіјлҸ„ вҶ’ м •м°© к¶Өм Ғ</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
                    <span className="inline-flex items-center gap-1.5 text-slate-400"><i className="w-3 h-0.5 rounded bg-slate-400 inline-block" />ramp лҒқ 20s</span>
                  </div>
                  <CyclePlot traj={result.trajectory} />
                </div>
              </>
            )}
            </>)}
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================================
// CyclePlotL2 вҖ” L2 к¶Өм Ғ м°ЁнҠё (Pc/Pe[bar] + SH[K]); tmaxлҠ” лҚ°мқҙн„°м„ң лҸ„м¶ң
//   L1 CyclePlotмқҖ tmax=120 + rampм„  н•ҳл“ңмҪ”л”© вҶ’ L2 м»Өн”Ңл“ң(300s)мҡ©мңјлЎң л¶„лҰ¬.
// =============================================================
function CyclePlotL2({ traj }) {
  if (!traj || !Array.isArray(traj.Pc_bar) || !traj.Pc_bar.length
      || !Array.isArray(traj.Pe_bar) || !Array.isArray(traj.SH_evap) || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">к¶Өм Ғ лҚ°мқҙн„° м—ҶмқҢ</div>;
  }
  const W = 920, H = 280, mL = 44, mR = 42, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const pAll = [...traj.Pc_bar, ...traj.Pe_bar];
  const pMax = Math.max(5, Math.ceil(Math.max(...pAll) / 5) * 5);
  const shMax = Math.max(10, Math.ceil(Math.max(...traj.SH_evap) / 10) * 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syP = v => y0 - (v / pMax) * (y0 - y1);
  const syS = v => y0 - (v / shMax) * (y0 - y1);
  const mkPath = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const pTicks = [], shTicks = [], xTicks = [];
  for (let p = 0; p <= pMax; p += 5) pTicks.push(p);
  for (let k = 0; k <= shMax; k += 10) shTicks.push(k);
  const xstep = tmax <= 130 ? 20 : (tmax <= 400 ? 60 : 120);
  for (let sct = 0; sct <= tmax + 0.5; sct += xstep) xTicks.push(Math.round(sct));
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {pTicks.map(p => (
        <g key={'p' + p}>
          <line x1={x0} y1={syP(p)} x2={x1} y2={syP(p)} stroke="#EEF2F6" strokeWidth="1" />
          <text x={x0 - 6} y={syP(p) + 3} textAnchor="end" {...TK}>{p}</text>
        </g>
      ))}
      {shTicks.map(k => (<text key={'s' + k} x={x1 + 6} y={syS(k) + 3} textAnchor="start" {...TK}>{k}</text>))}
      {xTicks.map(sct => (<text key={'x' + sct} x={sx(sct)} y={y0 + 14} textAnchor="middle" {...TK}>{sct}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#475569', fontFamily: 'JetBrains Mono, monospace' }}>bar</text>
      <text x={x1 + 24} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 24} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0D9488', fontFamily: 'JetBrains Mono, monospace' }}>K (SH)</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      <path d={mkPath(traj.Pc_bar, syP)} fill="none" stroke="#DC2626" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.Pe_bar, syP)} fill="none" stroke="#2563EB" strokeWidth="2.2" strokeLinejoin="round" />
      <path d={mkPath(traj.SH_evap, syS)} fill="none" stroke="#0D9488" strokeWidth="2.2" strokeLinejoin="round" />
    </svg>
  );
}

// =============================================================
// CycleRunnerModalL2 вҖ” м „мІҙ L2(SEMI) нҸҗлЈЁн”„ мӢӨн–ү (/run_cycle_l2)
//   L1 CycleRunnerModalмқҳ L2нҢҗ. лғүл§Ө(CycleDynL2)В·м»Өн”Ңл“ң(Cycle_SEMI_full /
//   Cycle_coupled_closed_L2air). м „ м»ҙнҸ¬л„ҢнҠё SEMI MB HX. кі м • л ҲнҚјлҹ°мҠӨ лӘЁлҚёл§Ң
//   (L2лҠ” мә”лІ„мҠӨ м¶”м¶ң/standalone кіөкё° м—ҶмқҢ вҖ” кіөкё°лЈЁн”„лҠ” м»Өн”Ңл“ңм—җ лӮҙмһҘ).
// =============================================================
const L2_CYCLE_MODELS = {
  refrigerant: [
    { m: 'CycleDynL2', lbl: 'мҲңмҲҳ лғүл§Ө SEMI', stop: 120,
      desc: 'м „ м»ҙнҸ¬л„ҢнҠё SEMI MB (Comp_Winandy + CondenserSS + EEV_MB + EvaporatorMBdyn). кіөкё° мһ…кө¬ кі м • кІҪкі„ вҶ’ мҲңмҲҳ лғүл§Ө лҸҷмһ‘м җ.' },
  ],
  coupled: [
    { m: 'Cycle_SEMI_full', lbl: 'н’Җ SEMI', stop: 300,
      desc: 'лғүл§ӨВ·кіөкё° м „ SEMI. мҪ”мқјмҳЁлҸ„ мғҒнҳёкІ°м • + Drum_L2 м ңмҠө вҶ’ SMER. (CondenserSS_cpl + EvaporatorMBdyn_cpl + Fan_L2 + Drum_L2 нҸҗкіөкё°лЈЁн”„)' },
    { m: 'Cycle_coupled_closed_L2air', lbl: 'L1лғүл§Ө + L2кіөкё°', stop: 180,
      desc: 'L1 лғүл§Өм»Өн”Ң HX (Cond/Evap_coupled) + L2 кіөкё°лЈЁн”„ (Fan_L2 мҶҗмӢӨл¶„н•ҙ + Drum_L2 к°җлҘ В·нқЎм°©) + PI SHм ңм–ҙ.' },
  ],
};

function CycleRunnerModalL2({ onClose }) {
  const [domain, setDomain] = useState('refrigerant'); // 'refrigerant' | 'coupled'
  const [model, setModel] = useState('CycleDynL2');
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);     // {settled, trajectory, model, stop_time}
  const [error, setError] = useState(null);

  const status = window.HPWD_BACKEND || {};
  const modelica = status.modelica || { available: false, reason: null };
  const url = status.url || '';

  const curList = L2_CYCLE_MODELS[domain];
  const cur = curList.find(x => x.m === model) || curList[0];

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `лЎңм»¬ м„ңлІ„м—җ ${path} к°Җ м—ҶмқҢ (${detail}). git pull нӣ„ python server.py мһ¬мӢңмһ‘ н•„мҡ”.`
      : `м„ңлІ„ мқ‘лӢө мҳӨлҘҳ: ${detail}`;
  };

  const runCycle = async () => {
    setRunning(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${url}/run_cycle_l2`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: cur.m, stop_time: cur.stop, tolerance: 1e-6, intervals: null }),
      });
      if (!r.ok) { setError(await _fetchErr(r, '/run_cycle_l2')); setRunning(false); return; }
      const data = await r.json();
      if (data.error) { setError(data.error); setRunning(false); return; }
      if (!data.trajectory || !Array.isArray(data.trajectory.Pc_bar) || !data.trajectory.Pc_bar.length) {
        setError('кІ°кіјм—җ к¶Өм Ғмқҙ м—ҶмқҢ вҖ” м„ңлІ„ лІ„м „ нҷ•мқё (git pull нӣ„ python server.py мһ¬мӢңмһ‘).'); setRunning(false); return;
      }
      setResult({ settled: data.settled || {}, trajectory: data.trajectory, model: data.model, stop_time: data.stop_time });
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const L2_CARDS = [
    { k: 'Pc_bar', n: 'Pc (мқ‘м¶•)', u: 'bar', d: 2, c: 'text-red-600' },
    { k: 'Pe_bar', n: 'Pe (мҰқл°ң)', u: 'bar', d: 2, c: 'text-blue-600' },
    { k: 'mdot', n: 'б№Ғ м••м¶•кё°', u: 'g/s', d: 2, c: 'text-violet-600', scale: 1000 },
    { k: 'SH_evap', n: 'SH кіјм—ҙлҸ„', u: 'K', d: 2, c: 'text-teal-600' },
    { k: 'W', n: 'W мҶҢмҡ”лҸҷл Ҙ', u: 'W', d: 1, c: 'text-amber-600' },
    { k: 'SMER', n: 'SMER', u: 'kg/kWh', d: 2, c: 'text-emerald-600' },
    { k: 'condensate', n: 'мқ‘м¶•мҲҳмңЁ', u: 'g/s', d: 2, c: 'text-cyan-600', scale: 1000 },
    { k: 'X', n: 'мқҳлҘҳ н•ЁмҲҳмңЁ', u: '', d: 3, c: 'text-sky-600' },
    { k: 'Q_cond', n: 'Q мқ‘м¶•', u: 'W', d: 0, c: 'text-orange-600' },
    { k: 'Q_evap', n: 'Q мҰқл°ң', u: 'W', d: 0, c: 'text-indigo-600' },
    { k: 'T_cond_air_C', n: 'м—ҙн’Қ(мқ‘м¶•нӣ„)', u: 'В°C', d: 1, c: 'text-rose-600' },
    { k: 'opening', n: 'EEV к°ңлҸ„', u: '%', d: 0, c: 'text-slate-600' },
  ];
  const s = result?.settled || {};
  const isCoupled = domain === 'coupled';
  const NODES = [
    ['рҹҢҖ', 'Compressor', running ? 'вҖҰ' : 'Winandy', 'from-blue-600 to-blue-400'],
    ['вҷЁ', 'Condenser', ('Pc_bar' in s) ? `${s.Pc_bar.toFixed(2)} bar` : 'вҖ” bar', 'from-amber-600 to-amber-400'],
    ['рҹ”»', 'EEV', ('opening' in s) ? `${s.opening.toFixed(0)}% к°ңлҸ„` : 'к°ңлҸ„', 'from-red-600 to-red-400'],
    ['вқ„', 'Evaporator', ('Pe_bar' in s) ? `${s.Pe_bar.toFixed(2)} bar` : 'вҖ” bar', 'from-teal-600 to-teal-400'],
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4" onMouseDown={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[92vh] overflow-y-auto" onMouseDown={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3.5 border-b border-slate-200 sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2.5">
            <div className="w-2.5 h-2.5 rounded bg-indigo-500" />
            <span className="font-bold text-slate-800">Cycle Runner <span className="text-slate-400 font-medium text-sm">В· м „мІҙ L2 нҸҗлЈЁн”„ В· SEMI (Modelica)</span></span>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none px-2">Г—</button>
        </div>

        {!modelica.available ? (
          <div className="p-10 text-center text-slate-500 text-sm">
            <div className="text-3xl mb-3">вҡ пёҸ</div>
            <div className="font-semibold text-slate-700 mb-1.5">Modelica м—”м§„мқҙ н•„мҡ”н•©лӢҲлӢӨ</div>
            <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local л°ұм—”л“ң(omc) м—°кІ° н•„мҡ”'}</div>
          </div>
        ) : (
          <div className="p-5 space-y-4">
            {/* лҸ„л©”мқё нҶ кёҖ: лғүл§Ө / м»Өн”Ңл“ң */}
            <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50 w-fit">
              {[['refrigerant', 'лғүл§Ө мӮ¬мқҙнҒҙ', 'CompВ·CondВ·EEVВ·Evap'], ['coupled', 'м»Өн”Ңл“ң', 'лғүл§Ө вҹ· кіөкё° + SMER']].map(([d, lbl, sub]) => (
                <button key={d} onClick={() => { setDomain(d); setModel(L2_CYCLE_MODELS[d][0].m); setResult(null); setError(null); }} disabled={running}
                  className={`px-4 py-2 text-sm font-bold transition text-left ${domain === d ? 'bg-white text-indigo-700 shadow-[inset_0_-2px_0_0_#4F46E5]' : 'text-slate-500 hover:text-slate-700'}`}>
                  {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                </button>
              ))}
            </div>

            {/* лӘЁлҚё м„ нғқ + мӢңл®¬ м„Өм • + Run */}
            <div className="flex items-end gap-4 flex-wrap">
              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӮ¬мқҙнҒҙ лӘЁлҚё</label>
                <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
                  {curList.map(({ m, lbl }) => (
                    <button key={m} onClick={() => { setModel(m); setResult(null); }} disabled={running}
                      className={`px-3.5 py-2 text-sm font-semibold transition text-left ${model === m ? 'bg-white text-slate-800 shadow-[inset_0_-2px_0_0_#4F46E5]' : 'text-slate-500 hover:text-slate-700'}`}>
                      {lbl}<span className="block font-mono text-[10px] text-slate-400">{m}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="flex flex-col gap-1.5">
                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">мӢңл®¬ м„Өм •</label>
                <div className="flex gap-2 text-xs font-mono text-slate-600">
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">stop <b className="text-slate-800">{cur.stop}</b>s</span>
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">dassl</span>
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">1s мҠӨн…қ</span>
                  <span className="bg-slate-100 border border-slate-200 rounded px-2.5 py-2">tol <b className="text-slate-800">1e-6</b></span>
                </div>
              </div>
              <button onClick={runCycle} disabled={running}
                className="ml-auto inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm shadow-lg shadow-indigo-500/25 transition">
                {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>) : 'в–¶ Run Cycle'}
              </button>
            </div>
            <div className="text-xs text-slate-500 leading-relaxed">{cur.desc}</div>

            {/* loop schematic */}
            <div className="flex items-center gap-1 flex-wrap bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
              {NODES.map(([ic, nm, vv, grad], i) => (
                <React.Fragment key={nm}>
                  <div className="flex flex-col items-center gap-1 min-w-[76px]">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg text-white bg-gradient-to-br ${grad} shadow`}>{ic}</div>
                    <div className="text-xs font-bold text-slate-700">{nm}</div>
                    <div className="font-mono text-[10px] text-slate-400">{vv}</div>
                  </div>
                  {i < 3 && (
                    <div className="flex-1 min-w-[24px] text-center text-slate-300 self-start mt-2.5">
                      <div className="text-base leading-none">вҶ’</div>
                    </div>
                  )}
                </React.Fragment>
              ))}
              <div className="w-full text-center text-[10px] font-mono text-indigo-600 font-bold mt-1.5 opacity-80">
                {isCoupled ? 'лғүл§Ө нҸҗлЈЁн”„ + кіөкё° нҸҗлЈЁн”„(DrumвҶ’FanвҶ’EvapвҶ’Cond) лҸҷмӢң кІ°н•© В· мҪ”мқјмҳЁлҸ„ мғҒнҳёкІ°м •' : 'лғүл§Ө нҸҗлЈЁн”„ В· кіөкё°мёЎ кі м • кІҪкі„ (м „ м»ҙнҸ¬л„ҢнҠё SEMI)'}
              </div>
            </div>

            {running && (
              <div className="text-center text-xs font-mono text-slate-400 py-1">omc м»ҙнҢҢмқј + {cur.stop}s м Ғл¶„ мӨ‘вҖҰ ({isCoupled ? 'м»Өн”Ңл“ң stiff, мҲҳмӢӯмҙҲ~' : '~10вҖ“15s'})</div>
            )}
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>
            )}

            {/* results */}
            {result && result.trajectory && (
              <>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2.5">
                    м •м°©к°’ <span className="font-mono text-indigo-600 normal-case">{result.model}</span> В· t={result.stop_time}s
                  </div>
                  <div className="grid grid-cols-4 gap-2.5">
                    {L2_CARDS.filter(c => c.k in s).map(c => (
                      <div key={c.k} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                        <div className="text-[11px] font-medium text-slate-400 mb-1">{c.n}</div>
                        <div className={`font-mono text-xl font-bold leading-none ${c.c}`}>
                          {(s[c.k] * (c.scale || 1)).toFixed(c.d)}
                          <span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{c.u}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">кё°лҸҷ кіјлҸ„ вҶ’ м •м°© к¶Өм Ғ</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
                    <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
                  </div>
                  <CyclePlotL2 traj={result.trajectory} />
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================================
// AirPlotFlex вҖ” кіөкё° мӮ¬мқҙнҒҙ к¶Өм Ғ (X[н•ЁмҲҳмңЁ] мўҢм¶• + кіөкё°мҳЁлҸ„ мҡ°м¶•); tmax лҚ°мқҙн„°мң лҸ„,
//   нӮӨ мң м—°(L1: T_*_out_C / L2: T_*_air_C лӘЁл‘җ мҲҳмҡ©)
// =============================================================
function AirPlotFlex({ traj }) {
  if (!traj || !Array.isArray(traj.X) || !traj.X.length || !Array.isArray(traj.time)) {
    return <div className="text-xs font-mono text-slate-400 py-4 text-center">к¶Өм Ғ лҚ°мқҙн„° м—ҶмқҢ</div>;
  }
  const pick = (cands) => { for (const c of cands) if (Array.isArray(traj[c]) && traj[c].length) return traj[c]; return null; };
  const tC = pick(['T_cond_air_C', 'T_cond_out_C']);
  const tE = pick(['T_evap_air_C', 'T_evap_out_C']);
  const tD = pick(['T_drum_out_C']);
  const W = 920, H = 280, mL = 44, mR = 46, mT = 12, mB = 28;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const tmax = Math.max(...traj.time) || 1;
  const temps = [tC, tE, tD].filter(Boolean).reduce((a, b) => a.concat(b), []);
  const tMax = temps.length ? Math.max(60, Math.ceil(Math.max(...temps) / 10) * 10) : 60;
  const xMax = Math.max(0.6, Math.ceil(Math.max(...traj.X) * 10) / 10);
  const sx = v => x0 + (v / tmax) * (x1 - x0);
  const syX = v => y0 - (v / xMax) * (y0 - y1);
  const syT = v => y0 - (v / tMax) * (y0 - y1);
  const mk = (arr, sy) => arr.map((v, i) => (i ? 'L' : 'M') + sx(traj.time[i]).toFixed(1) + ' ' + sy(v).toFixed(1)).join(' ');
  const TK = { fontSize: 9, fill: '#94A3B8', fontFamily: 'JetBrains Mono, monospace' };
  const xstep = tmax <= 130 ? 20 : (tmax <= 400 ? 60 : 120);
  const xticks = []; for (let sct = 0; sct <= tmax + 0.5; sct += xstep) xticks.push(Math.round(sct));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
      {xticks.map(sct => (<text key={'x' + sct} x={sx(sct)} y={y0 + 14} textAnchor="middle" {...TK}>{sct}</text>))}
      <line x1={x0} y1={y0} x2={x1} y2={y0} stroke="#E2E8F0" />
      <line x1={x0} y1={y1} x2={x0} y2={y0} stroke="#E2E8F0" />
      <line x1={x1} y1={y1} x2={x1} y2={y0} stroke="#E2E8F0" />
      <text x={x0 - 30} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(-90 ${x0 - 30} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#0891B2', fontFamily: 'JetBrains Mono, monospace' }}>X</text>
      <text x={x1 + 26} y={(y0 + y1) / 2} textAnchor="middle" transform={`rotate(90 ${x1 + 26} ${(y0 + y1) / 2})`} style={{ fontSize: 10, fontWeight: 600, fill: '#DC2626', fontFamily: 'JetBrains Mono, monospace' }}>В°C</text>
      <text x={(x0 + x1) / 2} y={H - 1} textAnchor="middle" {...TK}>time [s]</text>
      {tC && <path d={mk(tC, syT)} fill="none" stroke="#DC2626" strokeWidth="2" strokeLinejoin="round" />}
      {tD && <path d={mk(tD, syT)} fill="none" stroke="#64748B" strokeWidth="2" strokeLinejoin="round" />}
      {tE && <path d={mk(tE, syT)} fill="none" stroke="#2563EB" strokeWidth="2" strokeLinejoin="round" />}
      <path d={mk(traj.X, syX)} fill="none" stroke="#0891B2" strokeWidth="2.6" strokeLinejoin="round" />
    </svg>
  );
}

// =============================================================
// UnifiedCycleRunnerModal вҖ” L1/L2 нҶөн•© мӮ¬мқҙнҒҙ лҹ¬л„Ҳ (н•ҳлӮҳмқҳ лІ„нҠј)
//   н”јлҚёлҰ¬нӢ° нҶ кёҖ(L1/L2) Г— лҸ„л©”мқё нғӯ(лғүл§Ө/кіөкё°/м»Өн”Ңл“ң) = 6м…Җ.
//   лӘЁл“  м…Җ лӢЁмқј лІ„нҠј "рҹ§Ә н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү":
//     L1 вҶ’ кІҖмҰқлҗң н…ҢмҠӨнҠё л§Ғмқ„ мә”лІ„мҠӨм—җ кө¬м¶• нӣ„ м¶”м¶ңВ·мӢӨн–ү (canvas м—”л“ңнҸ¬мқёнҠё)
//     L2 вҶ’ кі м • л ҲнҚјлҹ°мҠӨ SEMI лӘЁлҚё мӢӨн–ү (/run_cycle_l2)
//   кІ°кіјлҠ” нӮӨ-мқёмӢқ м–ҙлҢ‘нӢ°лёҢ(нӣ„ліҙнӮӨ н•ҙм„қ вҶ’ 6м…Җ мқҙм§Ҳ нӮӨ нқЎмҲҳ) + kindлі„ н”ҢлЎҜ.
// =============================================================
const UNIFIED_CARD_DEFS = [
  { keys: ['Pc_bar'], n: 'Pc мқ‘м¶•', u: 'bar', d: 2, c: 'text-red-600' },
  { keys: ['Pe_bar'], n: 'Pe мҰқл°ң', u: 'bar', d: 2, c: 'text-blue-600' },
  { keys: ['mdot', 'mdot_comp'], n: 'б№Ғ м••м¶•кё°', u: 'g/s', d: 2, c: 'text-violet-600', scale: 1000 },
  { keys: ['SH_evap'], n: 'SH кіјм—ҙлҸ„', u: 'K', d: 2, c: 'text-teal-600' },
  { keys: ['SC_cond'], n: 'SC кіјлғүлҸ„', u: 'K', d: 2, c: 'text-amber-700' },
  { keys: ['W'], n: 'W мҶҢмҡ”лҸҷл Ҙ', u: 'W', d: 1, c: 'text-amber-600' },
  { keys: ['SMER'], n: 'SMER', u: 'kg/kWh', d: 2, c: 'text-emerald-600' },
  { keys: ['charge'], n: 'м¶©м „лҹү', u: 'g', d: 1, c: 'text-emerald-700', scale: 1000 },
  { keys: ['opening'], n: 'EEV к°ңлҸ„', u: '%', d: 0, c: 'text-slate-600' },
  { keys: ['X'], n: 'н•ЁмҲҳмңЁ X', u: '', d: 3, c: 'text-cyan-700' },
  { keys: ['condensate', 'm_cond', 'm_evap'], n: 'м ңмҠөмңЁ', u: 'g/s', d: 2, c: 'text-blue-600', scale: 1000 },
  { keys: ['mdot_da'], n: 'н’Қлҹү', u: 'kg/s', d: 3, c: 'text-violet-600' },
  { keys: ['T_cond_air_C', 'T_cond_out_C'], n: 'м—ҙн’Қ(мқ‘м¶•нӣ„)', u: 'В°C', d: 1, c: 'text-rose-600' },
  { keys: ['T_evap_air_C', 'T_evap_out_C'], n: 'мҰқл°ңкё°нӣ„', u: 'В°C', d: 1, c: 'text-sky-600' },
  { keys: ['T_drum_out_C'], n: 'л“ңлҹјм¶ңкө¬', u: 'В°C', d: 1, c: 'text-slate-500' },
  { keys: ['fan_dp'], n: 'нҢ¬ м •м••', u: 'Pa', d: 0, c: 'text-amber-600' },
  { keys: ['fan_W'], n: 'нҢ¬ лҸҷл Ҙ', u: 'W', d: 0, c: 'text-orange-600' },
  { keys: ['Q_cond'], n: 'Q мқ‘м¶•', u: 'W', d: 0, c: 'text-orange-700' },
  { keys: ['Q_evap', 'Q_latent'], n: 'Q мҰқл°ң', u: 'W', d: 0, c: 'text-indigo-600' },
];

function UnifiedCycleRunnerModal({ onClose, blocks, connections, onLoadTestRing, onLoadL2TestRing, onLoadAirTestRing, onLoadCoupledTestRing }) {
  const [fidelity, setFidelity] = useState('L1');       // 'L1' | 'L2'
  const [domain, setDomain] = useState('refrigerant');  // 'refrigerant' | 'air' | 'coupled'
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [detected, setDetected] = useState(null);

  const status = window.HPWD_BACKEND || {};
  const modelica = status.modelica || { available: false, reason: null };
  const url = status.url || '';
  const isAir = domain === 'air';
  const isL2 = fidelity === 'L2';

  // лҸҷм Ғ Tailwind нҒҙлһҳмҠӨ н•Ём • нҡҢн”ј вҖ” лҰ¬н„°лҹҙ мЎ°кұҙл¶Җ
  const btnCls = isL2
    ? 'bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-500/25'
    : 'bg-violet-600 hover:bg-violet-700 shadow-lg shadow-violet-500/25';
  const dotCls = isL2 ? 'bg-indigo-500' : 'bg-violet-500';
  const accentText = isL2 ? 'text-indigo-600' : 'text-violet-600';

  const _fetchErr = async (r, path) => {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || j.error || detail; } catch (e) {}
    return r.status === 404
      ? `лЎңм»¬ м„ңлІ„м—җ ${path} к°Җ м—ҶмқҢ (${detail}). git pull нӣ„ python server.py мһ¬мӢңмһ‘ н•„мҡ”.`
      : `м„ңлІ„ мқ‘лӢө мҳӨлҘҳ: ${detail}`;
  };
  const _post = async (path, body, trajKey) => {
    const r = await fetch(`${url}${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) { setError(await _fetchErr(r, path)); return null; }
    const data = await r.json();
    if (data.error) { setError(data.error); return null; }
    if (!data.trajectory || !Array.isArray(data.trajectory[trajKey]) || !data.trajectory[trajKey].length) {
      setError('кІ°кіјм—җ к¶Өм Ғмқҙ м—ҶмқҢ вҖ” м„ңлІ„ лІ„м „ нҷ•мқё (git pull нӣ„ python server.py мһ¬мӢңмһ‘).'); return null;
    }
    return data;
  };

  const runCell = async () => {
    setRunning(true); setError(null); setResult(null); setDetected(null);
    try {
      let data = null;
      if (isL2) {
        // L1кіј лҸҷмқјн•ҳкІҢ: лЁјм Җ мә”лІ„мҠӨм—җ L2 н…ҢмҠӨнҠё л§Ғмқ„ кө¬м¶•(мӢңк°Ғнҷ”) вҶ’ л ҲнҚјлҹ°мҠӨ SEMI лӘЁлҚё мӢӨн–ү
        const builder = { refrigerant: onLoadL2TestRing, air: onLoadAirTestRing, coupled: onLoadCoupledTestRing }[domain];
        if (builder) builder();
        const L2LBL = { refrigerant: ['Comp', 'Cond', 'EEV', 'Evap'], air: ['Drum', 'Filter', 'Fan', 'Evap', 'Cond'], coupled: ['Comp', 'Cond', 'EEV', 'Evap'] };
        setDetected(L2LBL[domain]);
        const M = { refrigerant: ['CycleDynL2', 120], air: ['AirRingL2', 300], coupled: ['Cycle_SEMI_full', 300] }[domain];
        data = await _post('/run_cycle_l2', { model: M[0], stop_time: M[1], tolerance: 1e-6, intervals: null }, isAir ? 'X' : 'Pc_bar');
      } else if (domain === 'refrigerant') {
        const r = onLoadTestRing();
        const topo = extractCycleTopology(r.blocks, r.connections);
        if (topo.error) { setError(topo.error); setRunning(false); return; }
        setDetected(topo.ringLabels);
        data = await _post('/run_canvas_cycle', { topology: topo, settings: { charge_g: 89, p_rest_bar: 9, t_ramp: 20, stop_time: 120, tolerance: 1e-6, intervals: 240 } }, 'Pc_bar');
      } else if (domain === 'air') {
        const r = onLoadAirTestRing();
        const topo = extractAirTopology(r.blocks, r.connections);
        if (topo.error) { setError(topo.error); setRunning(false); return; }
        setDetected(topo.ringLabels);
        data = await _post('/run_air_cycle', { topology: topo, settings: { stop_time: 300, tolerance: 1e-6, intervals: 300 } }, 'X');
      } else { // coupled
        const r = onLoadCoupledTestRing();
        const refTopo = extractCycleTopology(r.blocks, r.connections);
        const airTopo = extractAirTopology(r.blocks, r.connections);
        if (refTopo.error || airTopo.error) { setError('нҶ нҸҙлЎңм§Җ м¶”м¶ң мӢӨнҢЁ: ' + (refTopo.error || airTopo.error)); setRunning(false); return; }
        data = await _post('/run_canvas_coupled_cycle', { ref_topology: refTopo, air_topology: airTopo, settings: { stop_time: 180, tolerance: 1e-6, intervals: 300 } }, 'Pc_bar');
      }
      if (data) setResult({ settled: data.settled || {}, trajectory: data.trajectory, model: data.model, stop_time: data.stop_time });
    } catch (e) { setError(`мҡ”мІӯ мӢӨнҢЁ: ${e.message}`); }
    setRunning(false);
  };

  const s = result?.settled || {};
  const cardVal = (def) => { for (const k of def.keys) if (k in s && s[k] != null) return s[k] * (def.scale || 1); return null; };
  const visCards = UNIFIED_CARD_DEFS.map(def => ({ def, v: cardVal(def) })).filter(x => x.v != null);

  const refNodes = [
    ['рҹҢҖ', 'Comp', isL2 ? 'Winandy' : 'мқҙлЎ '],
    ['вҷЁ', 'Cond', ('Pc_bar' in s) ? `${s.Pc_bar.toFixed(1)}bar` : 'вҖ”'],
    ['рҹ”»', 'EEV', ('opening' in s) ? `${s.opening.toFixed(0)}%` : 'к°ңлҸ„'],
    ['вқ„', 'Evap', ('Pe_bar' in s) ? `${s.Pe_bar.toFixed(1)}bar` : 'вҖ”'],
  ];
  const airNodes = [
    ['рҹ§ә', 'Drum', ('X' in s) ? `X ${s.X.toFixed(3)}` : 'н•ЁмҲҳмңЁ'],
    ['рҹҢ¬', 'Fan', ('fan_dp' in s) ? `${s.fan_dp.toFixed(0)}Pa` : 'О”p'],
    ['вқ„', 'Evap', (('T_evap_air_C' in s) || ('T_evap_out_C' in s)) ? `${(s.T_evap_air_C ?? s.T_evap_out_C).toFixed(1)}В°C` : 'м ңмҠө'],
    ['вҷЁ', 'Cond', (('T_cond_air_C' in s) || ('T_cond_out_C' in s)) ? `${(s.T_cond_air_C ?? s.T_cond_out_C).toFixed(1)}В°C` : 'м—ҙн’Қ'],
  ];
  const refGrads = ['from-blue-600 to-blue-400', 'from-amber-600 to-amber-400', 'from-red-600 to-red-400', 'from-teal-600 to-teal-400'];
  const airGrads = ['from-cyan-700 to-cyan-500', 'from-sky-600 to-sky-400', 'from-blue-600 to-blue-400', 'from-amber-600 to-amber-400'];
  const nodes = isAir ? airNodes : refNodes;
  const grads = isAir ? airGrads : refGrads;

  const DESC = {
    L1: {
      refrigerant: 'L1 лғүл§Ө л§Ғ (CompвҶ’CondвҶ’EEVвҶ’Evap). кІҖмҰқлҗң н…ҢмҠӨнҠё л§Ғмқ„ мә”лІ„мҠӨм—җ кө¬м¶• нӣ„ м¶”м¶ңВ·мӢӨн–ү (/run_canvas_cycle). кіөкё°мһ…кө¬ кі м •.',
      air: 'L1 кіөкё° л§Ғ (DrumвҶ’FanвҶ’EvapвҶ’Cond). мҪ”мқјмҳЁлҸ„ кі м • кІҪкі„. н…ҢмҠӨнҠё л§Ғ кө¬м¶• нӣ„ м¶”м¶ңВ·мӢӨн–ү (/run_air_cycle).',
      coupled: 'L1 м»Өн”Ңл“ң (лғүл§Ө л§Ғ + кіөкё° л§Ғ, EvapВ·Cond кіөмң  merged HX). н…ҢмҠӨнҠё л§Ғ кө¬м¶• нӣ„ м¶”м¶ңВ·мӢӨн–ү (/run_canvas_coupled_cycle).',
    },
    L2: {
      refrigerant: 'L2 лғүл§Ө (CycleDynL2 вҖ” м „ м»ҙнҸ¬л„ҢнҠё SEMI MB). мә”лІ„мҠӨм—җ L2 н…ҢмҠӨнҠё л§Ғ(WinandyВ·MBВ·SEMI) кө¬м¶• нӣ„ л ҲнҚјлҹ°мҠӨ лӘЁлҚё мӢӨн–ү (/run_cycle_l2). кіөкё°кІҪкі„ кі м •.',
      air: 'L2 кіөкё° (AirRingL2 вҖ” Drum_L2 к°җлҘ В·нқЎм°© + Fan_L2 мҶҗмӢӨл¶„н•ҙ, мҪ”мқј кі м •мҳЁлҸ„). мә”лІ„мҠӨм—җ кіөкё° л§Ғ кө¬м¶• нӣ„ л ҲнҚјлҹ°мҠӨ лӘЁлҚё мӢӨн–ү (/run_cycle_l2).',
      coupled: 'L2 м»Өн”Ңл“ң (Cycle_SEMI_full вҖ” лғүл§ӨВ·кіөкё° м „ SEMI, мҪ”мқјмҳЁлҸ„ мғҒнҳёкІ°м • + SMER). мә”лІ„мҠӨм—җ м»Өн”Ңл“ң л§Ғ кө¬м¶• нӣ„ л ҲнҚјлҹ°мҠӨ лӘЁлҚё мӢӨн–ү (/run_cycle_l2).',
    },
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4" onMouseDown={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[92vh] overflow-y-auto" onMouseDown={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3.5 border-b border-slate-200 sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2.5">
            <div className={`w-2.5 h-2.5 rounded ${dotCls}`} />
            <span className="font-bold text-slate-800">Cycle Runner <span className="text-slate-400 font-medium text-sm">В· L1/L2 нҶөн•© нҸҗлЈЁн”„ (Modelica)</span></span>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none px-2">Г—</button>
        </div>

        {!modelica.available ? (
          <div className="p-10 text-center text-slate-500 text-sm">
            <div className="text-3xl mb-3">вҡ пёҸ</div>
            <div className="font-semibold text-slate-700 mb-1.5">Modelica м—”м§„мқҙ н•„мҡ”н•©лӢҲлӢӨ</div>
            <div className="font-mono text-xs text-slate-400">{modelica.reason || 'Local л°ұм—”л“ң(omc) м—°кІ° н•„мҡ”'}</div>
          </div>
        ) : (
          <div className="p-5 space-y-4">
            {/* н”јлҚёлҰ¬нӢ°(L1/L2) + лҸ„л©”мқё(лғүл§Ө/кіөкё°/м»Өн”Ңл“ң) нғӯ */}
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
                {[['L1', 'L1', 'UAВ·мқҙлЎ '], ['L2', 'L2', 'SEMI MB']].map(([f, lbl, sub]) => (
                  <button key={f} onClick={() => { setFidelity(f); setResult(null); setError(null); setDetected(null); }} disabled={running}
                    className={`px-5 py-2 text-sm font-bold transition text-left ${fidelity === f ? (f === 'L2' ? 'bg-white text-indigo-700 shadow-[inset_0_-2px_0_0_#4F46E5]' : 'bg-white text-violet-700 shadow-[inset_0_-2px_0_0_#7C3AED]') : 'text-slate-500 hover:text-slate-700'}`}>
                    {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                  </button>
                ))}
              </div>
              <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-slate-50">
                {[['refrigerant', 'лғүл§Ө', 'CompВ·CondВ·EEVВ·Evap'], ['air', 'кіөкё°', 'DrumВ·FanВ·EvapВ·Cond'], ['coupled', 'м»Өн”Ңл“ң', 'лғүл§Ө вҹ· кіөкё°']].map(([d, lbl, sub]) => (
                  <button key={d} onClick={() => { setDomain(d); setResult(null); setError(null); setDetected(null); }} disabled={running}
                    className={`px-4 py-2 text-sm font-bold transition text-left ${domain === d ? 'bg-white text-cyan-700 shadow-[inset_0_-2px_0_0_#0891B2]' : 'text-slate-500 hover:text-slate-700'}`}>
                    {lbl}<span className="block font-mono text-[10px] text-slate-400">{sub}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* м„ӨлӘ… + лӢЁмқј мӢӨн–ү лІ„нҠј */}
            <div className="flex items-start gap-4 flex-wrap">
              <div className="text-xs text-slate-500 leading-relaxed flex-1 min-w-[300px]">
                {DESC[fidelity][domain]}
                {detected && (<span className={`block mt-0.5 font-mono text-cyan-600`}>к°җм§Җ: {detected.join(' вҶ’ ')} вҶ’ {detected[0]}</span>)}
              </div>
              <button onClick={runCell} disabled={running}
                className={`inline-flex items-center gap-2 ${btnCls} disabled:opacity-60 text-white rounded-xl px-5 py-2.5 font-bold text-sm transition`}>
                {running ? (<><span className="w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin" /> мӢӨн–ү мӨ‘вҖҰ</>) : 'рҹ§Ә н…ҢмҠӨнҠё л§Ғ кө¬м¶• & мӢӨн–ү'}
              </button>
            </div>

            {/* мҠӨнӮӨл§ӨнӢұ */}
            <div className="flex items-center gap-1 flex-wrap bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
              {nodes.map(([ic, nm, vv], i) => (
                <React.Fragment key={nm + i}>
                  <div className="flex flex-col items-center gap-1 min-w-[76px]">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg text-white bg-gradient-to-br ${grads[i]} shadow`}>{ic}</div>
                    <div className="text-xs font-bold text-slate-700">{nm}</div>
                    <div className="font-mono text-[10px] text-slate-400">{vv}</div>
                  </div>
                  {i < nodes.length - 1 && (<div className="flex-1 min-w-[20px] text-center text-slate-300 self-start mt-2.5"><div className="text-base leading-none">вҶ’</div></div>)}
                </React.Fragment>
              ))}
              <div className={`w-full text-center text-[10px] font-mono ${accentText} font-bold mt-1.5 opacity-80`}>
                {isAir ? 'кіөкё° нҸҗлЈЁн”„ (volRef = м••л Ҙм•өм»Ө)' : (domain === 'coupled' ? 'лғүл§Ө + кіөкё° нҸҗлЈЁн”„ лҸҷмӢңкІ°н•© (EvapВ·Cond кіөмң  HX)' : 'лғүл§Ө нҸҗлЈЁн”„ (vol4 вҶ’ Comp)')}
              </div>
            </div>

            {running && (<div className="text-center text-xs font-mono text-slate-400 py-1">omc м»ҙнҢҢмқј + м Ғл¶„ мӨ‘вҖҰ {isAir ? '(кіөкё°мёЎ л№ лҰ„)' : (isL2 && domain === 'coupled' ? '(м»Өн”Ңл“ң stiff, мҲҳмӢӯмҙҲ~)' : '')}</div>)}
            {error && (<div className="bg-red-50 border border-red-200 text-red-700 text-xs font-mono rounded-lg px-3 py-2 whitespace-pre-wrap">{error}</div>)}

            {/* кІ°кіј */}
            {result && result.trajectory && (
              <>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2.5">
                    м •м°©к°’ <span className={`font-mono ${accentText} normal-case`}>{result.model || `${fidelity} В· ${domain}`}</span>
                    {(result.trajectory.time && result.trajectory.time.length) ? ` В· t=${result.trajectory.time[result.trajectory.time.length - 1].toFixed(0)}s` : ''}
                  </div>
                  <div className="grid grid-cols-4 gap-2.5">
                    {visCards.map(({ def, v }) => (
                      <div key={def.n} className="border border-slate-100 rounded-xl px-3 py-2.5 bg-slate-50/60">
                        <div className="text-[11px] font-medium text-slate-400 mb-1">{def.n}</div>
                        <div className={`font-mono text-xl font-bold leading-none ${def.c}`}>
                          {v.toFixed(def.d)}<span className="font-mono text-[11px] text-slate-400 ml-0.5 font-medium">{def.u}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider mb-2">{isAir ? 'н•ЁмҲҳмңЁ + кіөкё°мҳЁлҸ„ к¶Өм Ғ' : 'кё°лҸҷ кіјлҸ„ вҶ’ м •м°© к¶Өм Ғ'}</div>
                  <div className="flex gap-4 flex-wrap mb-1 text-xs font-semibold text-slate-600">
                    {isAir ? (<>
                      <span className="inline-flex items-center gap-1.5 text-cyan-600"><i className="w-3 h-0.5 rounded bg-cyan-600 inline-block" />н•ЁмҲҳмңЁ X</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />м—ҙн’Қ</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />мҰқл°ңкё°нӣ„</span>
                    </>) : (<>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-red-600 inline-block" />Pc (HP)</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-blue-600 inline-block" />Pe (LP)</span>
                      <span className="inline-flex items-center gap-1.5"><i className="w-3 h-0.5 rounded bg-teal-600 inline-block" />SH</span>
                    </>)}
                  </div>
                  {isAir ? <AirPlotFlex traj={result.trajectory} /> : <CyclePlotL2 traj={result.trajectory} />}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

    downloadCsv(`hpwd_all_${Date.now()}.csv`, rows);
  };

  // ъ░Ьы│Д Plotter CSV: эХ┤ыЛ╣ эФМыбЬэД░ьЧР ьЧ░ъ▓░ыРЬ ьЛаэШ╕ызМ
  const exportPlotterCsv = (plotterBlock) => {
    if (simState.history.length === 0) {
      alert('ыВ┤ы│┤ыВ╝ ыН░ьЭ┤эД░ъ░А ьЧЖьК╡ыЛИыЛд. ыи╝ьаА ьЛЬыомыаИьЭ┤ьЕШьЭД ьЛдэЦЙэХШьД╕ьЪФ.');
      return;
    }
    const conns = connections.filter(c => c.to.blockId === plotterBlock.id);
    const signals = conns.flatMap(c => {
      const src = blocks.find(b => b.id === c.from.blockId);
      if (!src) return [];
      return (c.signals || []).map(sig => ({
        key: `${src.name}.${sig.fromPort}`,
        port: sig.toPort,
      }));
    });

    if (signals.length === 0) {
      alert(`${plotterBlock.name}ьЧР ьЧ░ъ▓░ыРЬ ьЛаэШ╕ъ░А ьЧЖьК╡ыЛИыЛд.`);
      return;
    }

    // эЧдыНФ: t, y1(SrcName.out), y2(...), ...
    const headers = ['t', ...signals.map(s => `${s.port}(${s.key})`)];
    const rows = [headers];
    simState.history.forEach(row => {
      rows.push([row.t, ...signals.map(s => row[s.key] ?? '')]);
    });
    downloadCsv(`${plotterBlock.name}_${Date.now()}.csv`, rows);
  };

  /* ы╕ФыбЭьЭШ connector(ьвМь╕б in / ьЪ░ь╕б out) ьЬДь╣Ш тАФ ы╕ФыбЭ ъ░АьЪ┤ыН░ ыЖТьЭ┤.
   * ыЭ╝ьЭ╕ьЭА ыкиыУИ ыЛиьЬДыбЬ ьЮЗыКФыЛд. */
  const getBlockHeight = (block) => {
    const def = TYPES[block.type];
    const numIO = Math.max(def.inputs.length, def.outputs.length);
    if (block.type === 'display') return Math.max(70, 45 + numIO * 20 + 10);
    if (def.image) return block.imageSize || 160; // ьВмьЪйьЮР ьб░ьаИ ъ░АыКе, default 160
    return Math.max(80, 45 + numIO * 20 + 10);
  };
  /* ы╕ФыбЭ ъ░АыбЬ эПн тАФ ы╣ДьЭ┤ып╕ьзА ы╕ФыбЭьЭА эХньГБ 180, ьЭ┤ып╕ьзА ы╕ФыбЭьЭА ьаХьВмъ░Б (imageSize) */
  const getBlockWidth = (block) => {
    const def = TYPES[block.type];
    if (def.image) return block.imageSize || 160;
    return 180;
  };
  /* ьКмыбп ьЬДь╣Ш (ьаИыМА ьвМэСЬ). side: 'top'|'bottom'|'left'|'right'.
   * ъ░АыбЬ ый┤(top/bottom)ьЭА slotьЭ┤ x ы╢ДэПм, ьД╕ыбЬ ый┤(left/right)ьЭА y ы╢ДэПм.
   * ы╣ДьЭ┤ып╕ьзА ы╕ФыбЭьЭШ ьвМьЪ░ ьКмыбпьЭА эЧдыНФ(24px) ьХДыЮШ ьШБьЧн ыВ┤ьЧРьДЬызМ ы╢Ды░░. */
  const getBlockSlotPos = (block, side, slot = 0) => {
    if (!block) return null;
    const def = TYPES[block.type];
    const w = getBlockWidth(block);
    const h = getBlockHeight(block);
    const headerH = def.image ? 0 : 24;
    const N = SLOTS_PER_SIDE;
    const s = slot ?? 0;
    if (side === 'top') {
      return { x: block.x + w * (s + 1) / (N + 1), y: block.y };
    }
    if (side === 'bottom') {
      return { x: block.x + w * (s + 1) / (N + 1), y: block.y + h };
    }
    const slotY = headerH + (h - headerH) * (s + 1) / (N + 1);
    if (side === 'left') {
      return { x: block.x, y: block.y + slotY };
    }
    return { x: block.x + w, y: block.y + slotY };
  };

  const selectedBlock = blocks.find(b => b.id === selected);
  const selectedDef = selectedBlock ? TYPES[selectedBlock.type] : null;

  const plotterData = blocks.filter(b => b.type === 'plotter').map(pb => {
    const series = connections.filter(c => c.to.blockId === pb.id).flatMap(c => {
      const src = blocks.find(b => b.id === c.from.blockId);
      if (!src) return [];
      return (c.signals || []).map(sig => `${src.name}.${sig.fromPort}`);
    });
    return { id: pb.id, name: pb.name, series };
  });

  return (
    <div className="h-screen w-full flex flex-col bg-white text-slate-800 text-xs overflow-hidden"
         style={{ fontFamily: "'Inter', 'Pretendard', -apple-system, sans-serif" }}>

      {/* Menubar */}
      <div className="h-9 bg-white border-b border-slate-200 flex items-center px-4 gap-4 text-[11px] shrink-0">
        <AppSwitcher current="studio" />
        <div className="text-slate-400 text-[10px]">v0.1.0 ┬╖ prototype</div>
        <div className="flex-1"></div>
        <div className="text-slate-500 text-[11px] font-mono">
          t = <span className="text-slate-900 font-semibold">{simState.t.toFixed(1)}s</span>
          <span className="mx-1 text-slate-300">/</span>
          <span className="text-slate-400">{simState.t_final}s</span>
        </div>
        <div className={`px-2 py-0.5 rounded-full text-[10px] font-medium border ${
          simState.running ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-500 border-slate-200'
        }`}>
          {simState.running ? 'тЧП Running' : 'тЧЛ Idle'}
        </div>
        <BackendStatus />
      </div>

      {/* Toolbar */}
      <div className="h-11 bg-slate-50 border-b border-slate-200 flex items-center px-3 gap-1 shrink-0">
        <ToolBtn onClick={() => openSlotModal('save')} icon={Save} label="Save" title="эФДыбЬьаЭэК╕ые╝ ьКмыбпьЧР ьаАьЮе" />
        <ToolBtn onClick={() => openSlotModal('load')} icon={FolderOpen} label="Load" title="ьКмыбпьЧРьДЬ эФДыбЬьаЭэК╕ ы╢ИыЯмьШдъ╕░" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={doUndo} icon={Undo} label="Undo" disabled={undoStack.length === 0}
                 title="Ctrl+Z" />
        <ToolBtn onClick={doRedo} icon={Redo} label="Redo" disabled={redoStack.length === 0}
                 title="Ctrl+Y" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={runSim} icon={Play} label="Run" disabled={simState.running} color="text-emerald-600 hover:bg-emerald-50" />
        <ToolBtn onClick={stopSim} icon={Square} label="Stop" disabled={!simState.running} color="text-red-600 hover:bg-red-50" />
        <ToolBtn onClick={resetSim} icon={RotateCcw} label="Reset" color="text-amber-600 hover:bg-amber-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <ToolBtn onClick={exportAllCsv} icon={Download} label="Export CSV"
                 disabled={simState.history.length === 0}
                 color="text-sky-600 hover:bg-sky-50" />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <div className="flex items-center gap-2 text-[11px] text-slate-600">
          <label className="text-slate-500">dt</label>
          <input type="number" value={simState.dt} step={0.1} min={0.1}
                 onChange={e => setSimState(s => ({ ...s, dt: parseFloat(e.target.value) || 1 }))}
                 className="w-14 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
          <label className="text-slate-500 ml-2">t_final</label>
          <input type="number" value={simState.t_final} step={10}
                 onChange={e => setSimState(s => ({ ...s, t_final: parseFloat(e.target.value) || 600 }))}
                 className="w-16 bg-white border border-slate-300 px-1.5 py-0.5 rounded text-slate-900 font-mono focus:outline-none focus:border-cyan-500" />
        </div>
        <div className="flex-1" />
        <BackendStatus />
        <div className="w-px h-5 bg-slate-200 mx-1.5" />
        <div className="text-[11px] text-slate-500 font-mono">
          blocks <span className="text-slate-900 font-semibold">{blocks.length}</span>
          <span className="mx-1.5 text-slate-300">┬╖</span>
          conns <span className="text-slate-900 font-semibold">{connections.length}</span>
        </div>
      </div>

      {/* Main 3-panel */}
      <div className="flex-1 flex overflow-hidden">

        {/* Left: Type Library */}
        <div className="w-56 bg-white border-r border-slate-200 overflow-y-auto shrink-0">
          <div className="px-3 py-2.5 text-[10px] font-semibold uppercase tracking-widest text-slate-500 border-b border-slate-100 bg-slate-50">
            Type Library
          </div>
          {Object.entries(
            Object.entries(TYPES).reduce((acc, [k, v]) => { (acc[v.category] ||= []).push([k, v]); return acc; }, {})
          ).map(([cat, items]) => {
            const catStyle = CATEGORY_STYLES[cat];
            return (
              <div key={cat}>
                <button
                  className="w-full flex items-center gap-1.5 px-2.5 py-1.5 text-[10px] uppercase tracking-wider text-slate-600 hover:bg-slate-50 transition-colors"
                  onClick={() => setExpandedCats(ec => ({ ...ec, [cat]: !ec[cat] }))}
                >
                  {expandedCats[cat] ? <ChevronDown size={10} /> : <ChevronRight size={10} />}
                  <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold ${catStyle.bg} ${catStyle.text} ${catStyle.border} border`}>
                    {catStyle.badge}
                  </span>
                  <span className="text-slate-700">{cat}</span>
                </button>
                {expandedCats[cat] && items.map(([key, def]) => {
                  const Icon = def.icon;
                  return (
                    <div
                      key={key}
                      draggable
                      onDragStart={(e) => handleLibraryDragStart(e, key)}
                      className="flex items-center gap-2 px-3 py-1.5 mx-1.5 my-0.5 rounded cursor-grab hover:bg-slate-50 border border-transparent hover:border-slate-200 active:cursor-grabbing transition-colors"
                      title={def.desc}
                    >
                      <div className="w-7 h-7 rounded flex items-center justify-center overflow-hidden shrink-0" style={{ background: def.image ? '#fff' : def.color + '15', border: def.image ? '1px solid #e2e8f0' : 'none' }}>
                        {def.image
                          ? <img src={def.image} alt={def.name} style={{ width: '100%', height: '100%', objectFit: 'contain' }} />
                          : <Icon size={12} style={{ color: def.color }} />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[11px] text-slate-800 truncate">{def.name}</div>
                        <div className="text-[9px] text-slate-400 font-mono">Type {def.typeNo}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
          <div className="px-3 py-4 text-[10px] text-slate-400 border-t border-slate-100 mt-2 leading-relaxed">
            ыУЬыЮШъ╖╕эХШьЧм ь║Фы▓ДьКдьЧР ы░░ь╣ШэХШьД╕ьЪФ
          </div>

          {/* Line Types тАФ ьЧ░ъ▓░ьДа ьвЕыеШ ьЛЬъ░Б ъ░АьЭ┤ыУЬ */}
          <div className="border-t border-slate-100 bg-slate-50/40">
            <div className="px-3 py-2 text-[10px] font-semibold uppercase tracking-widest text-slate-500">
              Line Types
            </div>
            <div className="px-2 pb-3 space-y-1">
              {Object.entries(LINE_KINDS).map(([k, def]) => (
                <div
                  key={k}
                  className="flex items-center gap-2 px-2 py-1.5 text-[10.5px] rounded border border-transparent hover:border-slate-200 hover:bg-white transition-colors"
                  title={def.desc}
                >
                  <span className="inline-block shrink-0" style={{
                    width: 22, height: 0,
                    borderTop: `${def.width}px ${def.dasharray ? 'dashed' : 'solid'} ${def.color}`,
                  }}></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-slate-700 truncate text-[10.5px]">{def.name}</div>
                    <div className="text-[9px] text-slate-400 font-mono">{def.short} ┬╖ {def.fields.length} params</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="px-3 pb-3 text-[9.5px] text-slate-400 leading-relaxed">
              эПмэК╕ ьЧ░ъ▓░ ьЛЬ ьвЕыеШ ьЮРыПЩ ъ░РьзА ┬╖<br/>ьЧ░ъ▓░ьДа эБ┤ыжнэХШьЧм ы│Аъ▓╜
            </div>
          </div>
        </div>

        {/* Center: Canvas + Bottom plot */}
        <div className="flex-1 flex flex-col overflow-hidden">
          <div
            ref={canvasRef}
            className="flex-1 relative bg-slate-50 overflow-auto"
            style={{
              backgroundImage: 'radial-gradient(circle, #cbd5e1 1px, transparent 1px)',
              backgroundSize: '20px 20px',
            }}
            onDragOver={handleCanvasDragOver}
            onDrop={handleCanvasDrop}
            onMouseDown={(e) => {
              // ь║Фы▓ДьКд div ыШРыКФ эИмыкЕ SVGьЧРьДЬызМ ы░ХьКд ыУЬыЮШъ╖╕ ьЛЬьЮС (ы╕ФыбЭ/ьЧ░ъ▓░ьДа ьЬДыКФ ьаЬьЩ╕)
              // ы╕ФыбЭ, эПмэК╕, ьЧ░ъ▓░ьДа path/circle/rect ыУдьЭА ъ░БьЮР stopPropagation ь▓ШыжмыРи
              // ьЧмъ╕░ ыПДыЛмэХЬыЛдыКФ ъ▒┤ ьзДьзЬ ы╣И ъ│╡ъ░ДьЭ┤ыЭ╝ыКФ ыЬ╗
              if (e.button !== 0) return; // ьЩ╝ьк╜ ы▓ДэК╝ызМ
              const rect = canvasRef.current.getBoundingClientRect();
              const x = (e.clientX - rect.left + canvasRef.current.scrollLeft) / zoom;
              const y = (e.clientY - rect.top + canvasRef.current.scrollTop) / zoom;
              if (!(e.shiftKey || e.ctrlKey || e.metaKey)) {
                setSelectedIds([]);
                setSelectedConnIds([]);
              }
              setConnecting(null);
              setSelectionBox({ startX: x, startY: y, curX: x, curY: y });
            }}
            onMouseMove={handleCanvasMouseMove}
            onMouseUp={handleCanvasMouseUp}
            onWheel={(e) => {
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                setZoom(z => Math.max(0.25, Math.min(3, +(z + delta).toFixed(2))));
              }
            }}
          >
            <div
              className="absolute top-0 left-0"
              style={{
                width: 5000,
                height: 5000,
                transform: `scale(${zoom})`,
                transformOrigin: '0 0',
              }}
            >
            <svg className="absolute inset-0 pointer-events-none" width="100%" height="100%" style={{ zIndex: 30 }}>
              {/* ы╕ФыбЭ ыЖТьЭ┤ые╝ ып╕ыжм ъ│ДьВ░ (ьЧ░ъ▓░ьДа ь╢йыПМ ъ░РьзАьЪй ьЮеьХаым╝ rect) */}
              {(() => { return null; })()}
              {connections.map((c, i) => {
                const fromBlock = blocks.find(b => b.id === c.from.blockId);
                const toBlock = blocks.find(b => b.id === c.to.blockId);
                if (!fromBlock || !toBlock) return null;
                // эШ╕эЩШ: ъ╕░ьб┤ ыН░ьЭ┤эД░ьЧР side ьЧЖьЬ╝ый┤ default
                const fromSide = c.from.side || 'right';
                const toSide   = c.to.side   || 'left';
                let fromPos = getBlockSlotPos(fromBlock, fromSide, c.from?.slot);
                let toPos   = getBlockSlotPos(toBlock,   toSide,   c.to?.slot);
                if (!fromPos || !toPos) return null;

                // endpoint drag ьдСьЭ┤ый┤ эХ┤ыЛ╣ ыБЭьаРьЭА ызИьЪ░ьКд(ыШРыКФ nearest slot)ыбЬ ып╕ыжмы│┤ъ╕░
                const isDraggingFrom = endpointDrag?.connIdx === i && endpointDrag.end === 'from';
                const isDraggingTo   = endpointDrag?.connIdx === i && endpointDrag.end === 'to';
                let drawFromSide = fromSide, drawToSide = toSide;
                let drawFromPos = fromPos, drawToPos = toPos;
                if (isDraggingFrom || isDraggingTo) {
                  const snap = findNearestSlot(mousePos.x, mousePos.y, 28);
                  if (isDraggingFrom) {
                    if (snap) {
                      const sb = blocks.find(b => b.id === snap.blockId);
                      drawFromPos = getBlockSlotPos(sb, snap.side, snap.slot);
                      drawFromSide = snap.side;
                    } else {
                      drawFromPos = mousePos;
                      drawFromSide = null;
                    }
                  }
                  if (isDraggingTo) {
                    if (snap) {
                      const sb = blocks.find(b => b.id === snap.blockId);
                      drawToPos = getBlockSlotPos(sb, snap.side, snap.slot);
                      drawToSide = snap.side;
                    } else {
                      drawToPos = mousePos;
                      drawToSide = null;
                    }
                  }
                }

                const isDraggingThis = isDraggingFrom || isDraggingTo;

                let pathD;
                let elbowPoints;
                const waypoints = c.waypoints || [];
                const routeMode = c.routeMode || (waypoints.length > 0 ? 'manual' : 'auto');
                if (drawFromSide && drawToSide) {
                  if (routeMode === 'manual' && waypoints.length > 0 && !isDraggingThis) {
                    // ьИШыПЩ ыкиыУЬ: ьВмьЪйьЮР ьзАьаХ waypoints ьВмьЪй
                    elbowPoints = [drawFromPos, ...waypoints, drawToPos];
                  } else {
                    // ьЮРыПЩ ыкиыУЬ: ы╕ФыбЭ эЪМэФ╝ ыЭ╝ьЪ░эМЕ
                    const obstacles = blocks.map(b => ({
                      x: b.x, y: b.y, w: getBlockWidth(b), h: getBlockHeight(b),
                      ownEndpoint: b.id === c.from.blockId || b.id === c.to.blockId,
                    }));
                    elbowPoints = buildAvoidingRoute(drawFromPos, drawFromSide, drawToPos, drawToSide, 24, obstacles);
                  }
                  pathD = smoothPath(elbowPoints, c.cornerRadius ?? 8);
                } else {
                  pathD = `M ${drawFromPos.x} ${drawFromPos.y} L ${drawToPos.x} ${drawToPos.y}`;
                  elbowPoints = [drawFromPos, drawToPos];
                }
                const path = { d: pathD, handles: [], points: elbowPoints };
                const firstHandle = drawFromPos;
                const isHovered = hoveredConn === i;
                const isSelected = selectedConnIds.includes(i);
                const highlight = isSelected || isHovered;

                return (
                  <g
                    key={i}
                    className="pointer-events-auto"
                    onMouseEnter={() => setHoveredConn(i)}
                    onMouseLeave={() => setHoveredConn(h => h === i ? null : h)}
                  >
                    {/* ъ░АьЛЬ ыЭ╝ьЭ╕ тАФ kindьЧР ыФ░ыЭ╝ layered design (pointer-events ь░иыЛи тЖТ hit areaыбЬызМ эБ┤ыжн) */}
                    {(() => {
                      const lk = LINE_KINDS[c.kind || 'refrigerant'] || LINE_KINDS.refrigerant;
                      const overlay = isSelected ? '#0284c7' : (highlight ? '#0891b2' : null);

                      if ((c.kind || 'refrigerant') === 'refrigerant') {
                        return (
                          <g style={{ pointerEvents: 'none' }}>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={12} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                            )}
                            <path d={path.d} stroke="#3a1c0a" strokeWidth={8} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            <path d={path.d} stroke="#7c3a14" strokeWidth={6.4} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                            <path d={path.d} stroke="#b87333" strokeWidth={5} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                            <path d={path.d} stroke="#d49a5b" strokeWidth={2.6} fill="none" strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.6)"/>
                            <path d={path.d} stroke="#fde68a" strokeWidth={1.1} fill="none" opacity={0.9} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-1.5)"/>
                          </g>
                        );
                      }
                      if (c.kind === 'air') {
                        return (
                          <g style={{ pointerEvents: 'none' }}>
                            {overlay && (
                              <path d={path.d} stroke={overlay} strokeWidth={15} fill="none" strokeLinejoin="round" strokeLinecap="butt" opacity={0.35}/>
                            )}
                            <path d={path.d} stroke="#1f2937" strokeWidth={11} fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                            <path d={path.d} stroke="#cbd5e1" strokeWidth={9} fill="none" strokeLinejoin="round" strokeLinecap="butt" className="transition-colors"/>
                            <path d={path.d} stroke="#475569" strokeWidth={1} strokeDasharray="5 4" fill="none" strokeLinejoin="round" strokeLinecap="butt"/>
                          </g>
                        );
                      }
                      return (
                        <g style={{ pointerEvents: 'none' }}>
                          {overlay && (
                            <path d={path.d} stroke={overlay} strokeWidth={10} fill="none" strokeLinejoin="round" strokeLinecap="round" opacity={0.35}/>
                          )}
                          <path d={path.d} stroke="#1e3a8a" strokeWidth={6} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
                          <path d={path.d} stroke="#3b82f6" strokeWidth={4} fill="none" strokeLinejoin="round" strokeLinecap="round" className="transition-colors"/>
                          <path d={path.d} stroke="#bfdbfe" strokeWidth={1} fill="none" opacity={0.7} strokeLinejoin="round" strokeLinecap="round" transform="translate(0,-0.8)"/>
                        </g>
                      );
                    })()}
                    {/* ьаДь▓┤ ыЭ╝ьЭ╕ эЮИэК╕ ьШБьЧн (эБ┤ыжн ьЛЬ ьЧ░ъ▓░ьДа ьДаэГЭ) */}
                    <path
                      d={path.d}
                      stroke="transparent"
                      strokeWidth="18"
                      fill="none"
                      className="cursor-pointer"
                      style={{ pointerEvents: 'stroke' }}
                      onClick={(e) => {
                        e.stopPropagation();
                        if (e.shiftKey || e.ctrlKey || e.metaKey) {
                          setSelectedConnIds(prev => prev.includes(i)
                            ? prev.filter(idx => idx !== i)
                            : [...prev, i]);
                        } else {
                          setSelectedConnIds([i]);
                          setSelectedIds([]);
                        }
                      }}
                    />

                    {/* ъ░Б ьД╕ъ╖╕ыи╝эК╕ эО╕ьзС эХ╕ыУд */}
                    {path.handles.map(h => {
                      const isVerticalSeg = h.axis === 'x';
                      const segLength = h.segMax - h.segMin;
                      if (segLength < 4) return null;
                      const isBeingDragged = isDraggingThis && draggingConn?.segment === h.segment;
                      const showActive = isBeingDragged || highlight;
                      const cursor = isVerticalSeg ? 'cursor-ew-resize' : 'cursor-ns-resize';

                      const startDragSeg = (e) => {
                        e.stopPropagation();
                        const rect = canvasRef.current.getBoundingClientRect();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setSelectedConn(i);
                        setSelected(null);
                        setDraggingConn({
                          idx: i,
                          segment: h.segment,
                          startMouseX: e.clientX - rect.left,
                          startMouseY: e.clientY - rect.top,
                          startOffset: c[offsetKey] ?? 0,
                        });
                      };

                      const resetSeg = (e) => {
                        e.stopPropagation();
                        const offsetKey = SEGMENT_OFFSET_KEYS[h.segment];
                        setConnections(cs => cs.map((cc, idx) => idx === i ? { ...cc, [offsetKey]: 0 } : cc));
                      };

                      return (
                        <g key={h.segment}>
                          {/* ьД╕ъ╖╕ыи╝эК╕ эЮИэК╕ ьШБьЧн (ъ╕╕ьнЙэХЬ эИмыкЕ rect) */}
                          <rect
                            x={isVerticalSeg ? h.x - 5 : h.segMin}
                            y={isVerticalSeg ? h.segMin : h.y - 5}
                            width={isVerticalSeg ? 10 : segLength}
                            height={isVerticalSeg ? segLength : 10}
                            fill="transparent"
                            className={cursor}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          />
                          {/* ьЛЬъ░Б эХ╕ыУд */}
                          <circle
                            cx={h.x}
                            cy={h.y}
                            r={showActive ? 5 : 3}
                            fill="white"
                            stroke={showActive ? '#0891b2' : '#94a3b8'}
                            strokeWidth={2}
                            className={`${cursor} transition-all`}
                            onMouseDown={startDragSeg}
                            onDoubleClick={resetSeg}
                          >
                            <title>{`ыУЬыЮШъ╖╕: ${isVerticalSeg ? 'ьвМьЪ░' : 'ьГБэХШ'} ьЭ┤ыПЩ ┬╖ ыНФы╕ФэБ┤ыжн: ыжмьЕЛ`}</title>
                          </circle>
                        </g>
                      );
                    })}

                    {/* ьВньаЬ ы▓ДэК╝ (ьДаэГЭ ьЛЬьЧРызМ persistent эСЬьЛЬ) */}
                    {isSelected && (
                      <g
                        className="cursor-pointer"
                        style={{ pointerEvents: 'auto' }}
                        onClick={(e) => {
                          e.stopPropagation();
                          setConnections(cs => cs.filter((_, idx) => idx !== i));
                          setSelectedConn(null);
                        }}
                      >
                        {/* ыДУьЭА эЮИэК╕ ьШБьЧн */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={12} fill="transparent" />
                        {/* ьЛдьаЬ ы▓ДэК╝ */}
                        <circle cx={firstHandle.x + 18} cy={firstHandle.y} r={9} fill="#ef4444" stroke="white" strokeWidth={2} />
                        <text x={firstHandle.x + 18} y={firstHandle.y + 4} textAnchor="middle" fill="white" fontSize="13" fontWeight="bold" style={{ userSelect: 'none', pointerEvents: 'none' }}>├Ч</text>
                      </g>
                    )}

                    {/* Endpoint drag handles тАФ selected ьЛЬ ьЦС ыБЭьаРьЧР ьЮбъ│а ыБМьЦ┤ьДЬ ыЛдые╕ ьКмыбпьЬ╝ыбЬ ьШоъ╕░ъ╕░ */}
                    {isSelected && (
                      <>
                        {/* From ыБЭьаР */}
                        <g
                          className="cursor-grab"
                          style={{ pointerEvents: 'auto' }}
                          onMouseDown={(e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            setEndpointDrag({ connIdx: i, end: 'from' });
                          }}
                          onClick={(e) => e.stopPropagation()}
                        >
                          <circle cx={drawFromPos.x} cy={drawFromPos.y} r={14} fill="transparent"/>
                          <circle cx={drawFromPos.x} cy={drawFromPos.y} r={7}
                                  fill={isDraggingFrom ? '#06b6d4' : 'white'}
                                  stroke="#0284c7" strokeWidth={2.5}/>
                        </g>
                        {/* To ыБЭьаР */}
                        <g
                          className="cursor-grab"
                          style={{ pointerEvents: 'auto' }}
                          onMouseDown={(e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            setEndpointDrag({ connIdx: i, end: 'to' });
                          }}
                          onClick={(e) => e.stopPropagation()}
                        >
                          <circle cx={drawToPos.x} cy={drawToPos.y} r={14} fill="transparent"/>
                          <circle cx={drawToPos.x} cy={drawToPos.y} r={7}
                                  fill={isDraggingTo ? '#06b6d4' : 'white'}
                                  stroke="#0284c7" strokeWidth={2.5}/>
                        </g>

                        {/* Waypoint эХ╕ыУд тАФ ьВмьЪйьЮР ьаХьЭШ cornerыУд. ыУЬыЮШъ╖╕=ьЭ┤ыПЩ, alt+эБ┤ыжн=ьаЬъ▒░ */}
                        {(c.waypoints || []).map((wp, wpIdx) => {
                          const isWpDragging = waypointDrag?.connIdx === i && waypointDrag.wpIdx === wpIdx;
                          return (
                            <g
                              key={`wp-${wpIdx}`}
                              className="cursor-move"
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => {
                                e.stopPropagation();
                                e.preventDefault();
                                if (e.altKey) {
                                  // alt+click тЖТ ьаЬъ▒░
                                  pushHistory(blocks, connections);
                                  setConnections(cs => cs.map((cc, ci) => ci === i
                                    ? { ...cc, waypoints: (cc.waypoints || []).filter((_, wi) => wi !== wpIdx) }
                                    : cc
                                  ));
                                } else {
                                  setWaypointDrag({ connIdx: i, wpIdx });
                                }
                              }}
                              onContextMenu={(e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                pushHistory(blocks, connections);
                                setConnections(cs => cs.map((cc, ci) => ci === i
                                  ? { ...cc, waypoints: (cc.waypoints || []).filter((_, wi) => wi !== wpIdx) }
                                  : cc
                                ));
                              }}
                            >
                              <circle cx={wp.x} cy={wp.y} r={13} fill="transparent"/>
                              <rect
                                x={wp.x - 5} y={wp.y - 5} width={10} height={10}
                                fill={isWpDragging ? '#06b6d4' : '#fef3c7'}
                                stroke="#d97706" strokeWidth={1.5}
                              />
                            </g>
                          );
                        })}

                        {/* Segment эПЙэЦЙьЭ┤ыПЩ эХ╕ыУд тАФ ьзБъ░Б segment ъ░АьЪ┤ыН░ ьЮбъ│а ыБМьЦ┤ьДЬ ъ╕╕ьЭ┤ ьб░ьаИ */}
                        {(() => {
                          const pts = path.points || [];
                          if (pts.length < 2) return null;
                          const handles = [];
                          for (let k = 0; k < pts.length - 1; k++) {
                            const a = pts[k];
                            const b = pts[k + 1];
                            const dx = Math.abs(a.x - b.x);
                            const dy = Math.abs(a.y - b.y);
                            const segLen = Math.hypot(b.x - a.x, b.y - a.y);
                            if (segLen < 28) continue; // ыДИым┤ ьззьЭА segment skip
                            // ьзБъ░Б segment эМРьаХ: ьИШьзБ(dx<0.5) ыШРыКФ ьИШэПЙ(dy<0.5)
                            const axis = dx < 0.5 ? 'x' : (dy < 0.5 ? 'y' : null);
                            if (!axis) continue; // ьВмьДаьЭА skip
                            handles.push({
                              cx: (a.x + b.x) / 2,
                              cy: (a.y + b.y) / 2,
                              segIdx: k,
                              axis, // 'x' = ьИШьзБ segment (xъ░Т ъ░ЩьЭМ, xы░йэЦеьЬ╝ыбЬ эПЙэЦЙьЭ┤ыПЩ)
                            });
                          }
                          return handles.map((h, hIdx) => (
                            <g
                              key={`seg-${hIdx}`}
                              className={h.axis === 'x' ? 'cursor-ew-resize' : 'cursor-ns-resize'}
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => {
                                e.stopPropagation();
                                e.preventDefault();
                                pushHistory(blocks, connections);
                                // ьЮРыПЩ ыкиыУЬый┤ ьЪ░ьДа cornerыУдьЭД manualыбЬ commit
                                let startWaypoints;
                                if ((c.routeMode || 'auto') === 'auto' || (c.waypoints || []).length === 0) {
                                  startWaypoints = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                                  // ьжЙьЛЬ manualыбЬ ьаДэЩШ
                                  setConnections(cs => cs.map((cc, ci) =>
                                    ci === i ? { ...cc, waypoints: startWaypoints, routeMode: 'manual' } : cc
                                  ));
                                } else {
                                  startWaypoints = (c.waypoints || []).slice();
                                }
                                setSegmentDrag({
                                  connIdx: i,
                                  segIdx: h.segIdx,
                                  axis: h.axis,
                                  startWaypoints,
                                });
                              }}
                              onClick={(e) => e.stopPropagation()}
                            >
                              {/* эБ┤ыжн ьШБьЧн */}
                              <rect
                                x={h.cx - 14} y={h.cy - 14}
                                width={28} height={28}
                                fill="transparent"
                              />
                              {/* ьЛЬъ░Б эХ╕ыУд */}
                              <rect
                                x={h.axis === 'x' ? h.cx - 4 : h.cx - 8}
                                y={h.axis === 'x' ? h.cy - 8 : h.cy - 4}
                                width={h.axis === 'x' ? 8 : 16}
                                height={h.axis === 'x' ? 16 : 8}
                                fill="white"
                                stroke="#0284c7"
                                strokeWidth={1.5}
                                rx={2}
                              />
                            </g>
                          ));
                        })()}

                        {/* Segment midpoint "+" ы▓ДэК╝ тАФ эБ┤ыжньЬ╝ыбЬ ьГИ waypoint ь╢Фъ░А.
                         * ьЮРыПЩ ыкиыУЬ(waypoints=[])ьЧРьДЬыКФ ъ╕░ьб┤ elbowьЭШ ыкиыУа ьдСъ░Д cornerые╝ waypointsыбЬ
                         * commitэХЬ ыТд эБ┤ыжнэХЬ segmentьЧР ьГИ ьаР ьВ╜ьЮЕ тЖТ ыкиьЦС ьЬаьзА. ьвМэСЬыКФ ьзБъ░Б ьаХыам ы│┤ьб┤. */}
                        {(() => {
                          const pts = path.points || [];
                          if (pts.length < 2) return null;
                          // ъ░Б segment ьдСъ░ДьаР ъ│ДьВ░. round corner ыХМым╕ьЧР ыДИым┤ ьззьЭА ъ▒┤ skip.
                          const midpoints = [];
                          for (let k = 0; k < pts.length - 1; k++) {
                            const a = pts[k];
                            const b = pts[k + 1];
                            if (Math.hypot(b.x - a.x, b.y - a.y) < 12) continue;
                            // ьзБъ░Б segmentый┤ ьаХэЩХэЮИ ьдСьаР, ьВмьДаьЭ┤ый┤ ъ╖╕ыЮШыПД ьдСьаР (ьзБъ░БьЭ┤ ьаХьГБ ь╝АьЭ┤ьКд)
                            midpoints.push({
                              x: (a.x + b.x) / 2,
                              y: (a.y + b.y) / 2,
                              segIdx: k, // pts ы░░ьЧ┤ ъ╕░ьдА segment ьЭ╕ыН▒ьКд
                            });
                          }
                          return midpoints.map((mp, mIdx) => (
                            <g
                              key={`mid-${mIdx}`}
                              className="cursor-pointer"
                              style={{ pointerEvents: 'auto' }}
                              onMouseDown={(e) => e.stopPropagation()}
                              onClick={(e) => {
                                e.stopPropagation();
                                pushHistory(blocks, connections);
                                setConnections(cs => cs.map((cc, ci) => {
                                  if (ci !== i) return cc;
                                  const existing = cc.waypoints || [];
                                  if ((cc.routeMode || 'auto') === 'auto' || existing.length === 0) {
                                    // ьЮРыПЩ ыкиыУЬ тЖТ ьЮРыПЩ elbowьЭШ ьдСъ░Д cornerыУдьЭД ыкиыСР waypointsыбЬ commit.
                                    // grid snap ьХИ эХи (stub end ьвМэСЬ ъ╖╕ыМАыбЬ ы│┤ьб┤эХ┤ьХ╝ ьзБъ░Б ьаХыам ьЬаьзА)
                                    const autoCorners = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                                    const insertAt = mp.segIdx;
                                    autoCorners.splice(insertAt, 0, { x: mp.x, y: mp.y });
                                    return { ...cc, waypoints: autoCorners, routeMode: 'manual' };
                                  }
                                  // ьЭ┤ып╕ ьИШыПЩ ыкиыУЬ тАФ segment ьЭ╕ыН▒ьКдыбЬ ьВ╜ьЮЕ
                                  const wps = existing.slice();
                                  wps.splice(mp.segIdx, 0, { x: mp.x, y: mp.y });
                                  return { ...cc, waypoints: wps, routeMode: 'manual' };
                                }));
                              }}
                              opacity={0.7}
                            >
                              <circle cx={mp.x} cy={mp.y} r={9} fill="white" stroke="#06b6d4" strokeWidth={1.2} strokeDasharray="2 2"/>
                              <text x={mp.x} y={mp.y + 3.5} textAnchor="middle" fill="#06b6d4" fontSize="13" fontWeight="bold" style={{ userSelect: 'none', pointerEvents: 'none' }}>+</text>
                            </g>
                          ));
                        })()}
                      </>
                    )}

                    {/* Snap target highlight тАФ drag ьдС ъ░Аъ╣МьЪ┤ ьКмыбпьЭ┤ ьЮИьЬ╝ый┤ ъ╖╕ ьЬДьЧР ring эСЬьЛЬ */}
                    {isDraggingThis && (() => {
                      const snap = findNearestSlot(mousePos.x, mousePos.y, 28);
                      if (!snap) return null;
                      const sb = blocks.find(b => b.id === snap.blockId);
                      const sp = getBlockSlotPos(sb, snap.side, snap.slot);
                      if (!sp) return null;
                      return (
                        <circle cx={sp.x} cy={sp.y} r={12} fill="none" stroke="#06b6d4" strokeWidth={2} strokeDasharray="3 3"/>
                      );
                    })()}
                  </g>
                );
              })}
              {/* ьЧ░ъ▓░ ьзДэЦЙ ьдС ьаРьДа (ызИьЪ░ьКд ыФ░ыЭ╝ыЛдыЛШ) */}
              {connecting && (() => {
                const block = blocks.find(b => b.id === connecting.blockId);
                if (!block) return null;
                const pos = getBlockSlotPos(block, connecting.side, connecting.slot);
                if (!pos) return null;
                const target = { x: mousePos.x, y: mousePos.y };
                // ьЛЬьЮС ьКмыбп stubызМ ы╣╝ъ│а ызИьЪ░ьКдыбЬ ьзБьДа
                const fs = stubEnd(pos, connecting.side, 24);
                const d = `M ${pos.x} ${pos.y} L ${fs.x} ${fs.y} L ${target.x} ${target.y}`;
                return (
                  <path d={d} stroke="#0891b2" strokeWidth="1.75" strokeDasharray="4 4" fill="none" />
                );
              })()}
              {/* ы░ХьКд ьДаэГЭ ьВмъ░БэШХ */}
              {selectionBox && (() => {
                const x = Math.min(selectionBox.startX, selectionBox.curX);
                const y = Math.min(selectionBox.startY, selectionBox.curY);
                const w = Math.abs(selectionBox.curX - selectionBox.startX);
                const h = Math.abs(selectionBox.curY - selectionBox.startY);
                return (
                  <rect
                    x={x} y={y} width={w} height={h}
                    fill="#0891b2" fillOpacity="0.08"
                    stroke="#0891b2" strokeWidth="1" strokeDasharray="4 2"
                  />
                );
              })()}
            </svg>

            {blocks.map(block => {
              const def = TYPES[block.type];
              const Icon = def.icon;
              const isSel = selectedIds.includes(block.id);
              const height = getBlockHeight(block);
              const width = getBlockWidth(block);
              // ыПЩьаБ ь╢Ьыае тАФ output_select param ьаБьЪй. ьЧЖьЬ╝ый┤ def.outputs ъ╖╕ыМАыбЬ.
              const activeOutputs = getActiveOutputs(block);
              return (
                <div
                  key={block.id}
                  ref={(el) => { if (el) blockRefsMap.current[block.id] = el; }}
                  className={`absolute ${def.image
                    ? '' /* ьЭ┤ып╕ьзА ы╕ФыбЭ: ы░ХьКд ьЧЖьЭМ (ьЭ┤ып╕ьзАызМ) */
                    : `rounded-md bg-white shadow-sm ${isSel ? 'ring-2 ring-cyan-500 ring-offset-1 shadow-md' : 'hover:shadow-md'}`
                  }`}
                  style={{
                    left: block.x, top: block.y, width, height,
                    border: def.image ? 'none' : `1px solid ${isSel ? def.color : '#e2e8f0'}`,
                    willChange: 'transform',
                  }}
                  onMouseDown={(e) => handleBlockMouseDown(e, block.id)}
                  onMouseEnter={() => setHoveredBlockId(block.id)}
                  onMouseLeave={() => setHoveredBlockId(prev => prev === block.id ? null : prev)}
                >
                  {/* эЧдыНФ тАФ ьЭ┤ып╕ьзА ьЧЖыКФ ы╕ФыбЭызМ */}
                  {!def.image && (
                    <div className="h-6 px-2 flex items-center gap-1.5 border-b rounded-t-md"
                         style={{ borderColor: def.color + '30', background: def.color + '0d' }}>
                      <Icon size={11} style={{ color: def.color }} />
                      {editingNameId === block.id ? (
                        <input
                          autoFocus
                          value={editingName}
                          onChange={(e) => setEditingName(e.target.value)}
                          onBlur={() => {
                            if (editingName.trim()) {
                              setBlocks(bs => bs.map(b => b.id === block.id ? { ...b, name: editingName.trim() } : b));
                            }
                            setEditingNameId(null);
                          }}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') e.target.blur();
                            if (e.key === 'Escape') { setEditingNameId(null); }
                          }}
                          onMouseDown={(e) => e.stopPropagation()}
                          className="flex-1 text-[10px] font-semibold text-slate-800 bg-white border border-cyan-400 rounded px-1 outline-none min-w-0"
                        />
                      ) : (
                        <span
                          className="text-[10px] font-semibold text-slate-800 flex-1 truncate cursor-text"
                          onDoubleClick={(e) => {
                            e.stopPropagation();
                            setEditingNameId(block.id);
                            setEditingName(block.name);
                          }}
                          title="ыНФы╕ФэБ┤ыжнэХШьЧм ьЭ┤ыжД ьИШьаХ"
                        >{block.name}</span>
                      )}
                      <span className="text-[9px] text-slate-400 font-mono">T{def.typeNo}</span>
                    </div>
                  )}
                  <div className="relative" style={{ height: def.image ? height : height - 24 }}>
                    {/* Display ы╕ФыбЭ: эШДьЮм ъ░ТьЭД эБмъ▓М эСЬьЛЬ */}
                    {block.type === 'display' && (() => {
                      const val = block.lastInputs?.x;
                      const digits = block.params.digits ?? 3;
                      const label = block.params.label;
                      const text = val === undefined
                        ? 'тАФ'
                        : (typeof val === 'number' ? val.toFixed(digits) : String(val));
                      return (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2">
                          {label && <div className="text-[9px] text-slate-500 mb-0.5 truncate w-full text-center">{label}</div>}
                          <div className="text-lg font-bold text-violet-700 font-mono tabular-nums">{text}</div>
                        </div>
                      );
                    })()}
                    {def.inputs.map((p, i) => null)}
                    {def.outputs.map((p, i) => null)}

                    {/* Block ыВ┤ы╢А: imageъ░А ьЮИьЬ╝ый┤ ьЭ┤ып╕ьзАызМ (ъ░Т эСЬьЛЬ ьЧЖьЭМ тАФ Properties/Plotter/DisplayыбЬ эЩХьЭ╕). displayыКФ эБ░ ъ░Т. */}
                    {block.type !== 'display' && def.image && (
                      <img
                        src={def.image}
                        alt={def.name}
                        className="absolute inset-0 w-full h-full object-contain pointer-events-none select-none"
                        draggable={false}
                        style={{
                          filter: isSel
                            ? 'drop-shadow(0 0 6px #06b6d4) drop-shadow(0 2px 4px rgba(0,0,0,0.2))'
                            : 'drop-shadow(0 2px 4px rgba(0,0,0,0.18))',
                        }}
                      />
                    )}

                    {block.type !== 'display' && !def.image && (
                      <div className="absolute inset-0 px-2 pt-1.5 pb-1.5 flex flex-col pointer-events-none overflow-hidden">
                        <div className="flex-1"/>
                        {def.outputs.length > 0 && (
                          <div className="space-y-0.5 text-right">

                      const isConnectingFromThis = connecting && connecting.blockId === block.id;

                        return Array.from({ length: SLOTS_PER_SIDE }, (_, slotIdx) => {
                          const used = usedSlots.has(slotIdx);
                          const isActive = isConnectingFromThis && connecting.side === side && connecting.slot === slotIdx;

                            cy = height;

                            cy = headerH + innerH * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);

                            cy = headerH + innerH * (slotIdx + 1) / (SLOTS_PER_SIDE + 1);

                              data-slot={slotIdx}

                                height: 28,

                            >
                              <div className={dotClass} style={dotStyle}/>
                            </div>
                          );
                        });
                      };
                      return (
                        <>

                          {renderSide('bottom')}
                          {renderSide('left')}
                          {renderSide('right')}
                        </>
                      );

                              const fromBlk = blocks.find(b => b.id === conn.from.blockId);
                              const toBlk = blocks.find(b => b.id === conn.to.blockId);
                              if (!fromBlk || !toBlk) return;
                              const fp = getBlockSlotPos(fromBlk, conn.from.side || 'right', conn.from.slot);
                              const tp = getBlockSlotPos(toBlk, conn.to.side || 'left', conn.to.slot);
                              const obs = blocks.map(b => ({
                                x: b.x, y: b.y, w: getBlockWidth(b), h: getBlockHeight(b),
                                ownEndpoint: b.id === conn.from.blockId || b.id === conn.to.blockId,
                              }));
                              const pts = buildAvoidingRoute(fp, conn.from.side || 'right', tp, conn.to.side || 'left', 24, obs);
                              const wps = pts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
                              updateConn({ routeMode: 'manual', waypoints: wps });
                            }}

                              conn.routeMode === 'manual'
                                ? 'bg-cyan-600 text-white'

                      {(conn.routeMode || 'auto') === 'manual' && (conn.waypoints || []).length > 0 && (

                      {/* ъ│быеа */}
                      <div className="flex items-center gap-2">
                        <span className="text-[10.5px] text-slate-600 w-16 shrink-0">ъ│быеа R</span>
                        <input
                          type="range"
                          min={0}
                          max={32}
                          step={1}
                          value={conn.cornerRadius ?? 8}
                          onChange={e => updateConn({ cornerRadius: parseInt(e.target.value, 10) })}
                          className="flex-1 accent-cyan-600"
                        />
                        <span className="text-[10px] font-mono text-slate-700 w-8 text-right">{conn.cornerRadius ?? 8}px</span>
                      </div>
                    </div>
                  </div>

                  {/* Line physical parameters */}
                  <div>
                    <div className="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1.5">
                      Line Parameters ┬╖ ы░░ъ┤А/ыНХэК╕ ьВмьЦС
                    </div>
                    <div className="space-y-1.5">
                      {(lk.fields || []).map(f => {
                        const v = conn.lineParams?.[f.key] ?? f.value;
                        return (
                          <div key={f.key} className="grid grid-cols-[1fr_104px_30px] items-center gap-1.5">
                            <label className="text-[10.5px] text-slate-600">{f.label}</label>
                            {f.type === 'select' ? (
                              <select
                                value={v}
                                onChange={e => updateLineParam(f.key, e.target.value)}
                                className="text-[10.5px] font-mono bg-white border border-slate-300 rounded px-1.5 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500"
                              >
                                {f.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                              </select>
                            ) : (
                              <input
                                type="number"
                                step="any"
                                value={v}
                                onChange={e => updateLineParam(f.key, parseFloat(e.target.value))}
                                className="text-[10.5px] font-mono bg-white border border-slate-300 rounded px-1.5 py-0.5 text-slate-900 focus:outline-none focus:border-cyan-500"
                              />
                            )}
                            <span className="text-[9px] text-slate-400 font-mono text-right truncate">{f.unit || ''}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Delete */}
                  <div className="pt-2 border-t border-slate-100">
                    <button
                      onClick={() => {
                        setConnections(cs => cs.filter((_, i) => i !== idx));
                        setSelectedConnIds([]);
                      }}
                      className="w-full px-2 py-1.5 text-[10.5px] text-red-600 border border-red-200 rounded hover:bg-red-50 transition-colors"
                    >
                      ЁЯЧС ыЭ╝ьЭ╕ ьВньаЬ
                    </button>
                  </div>
                </div>
              );
            })()
          ) : selectedIds.length > 1 || selectedConnIds.length > 0 ? (
            <div className="p-3 space-y-2">
              <div className="text-[11px] text-sky-700 font-semibold">
                ыЛдьдС ьДаэГЭыРи
              </div>
              {selectedIds.length > 0 && (
                <div className="text-[10px] text-slate-600">
                  ы╕ФыбЭ <span className="font-semibold text-slate-900">{selectedIds.length}</span>ъ░Ь
                </div>
              )}
              {selectedConnIds.length > 0 && (
                <div className="text-[10px] text-slate-600">
                  ьЧ░ъ▓░ьДа <span className="font-semibold text-slate-900">{selectedConnIds.length}</span>ъ░Ь
                </div>
              )}
              <div className="text-[10px] text-slate-400 italic pt-2 leading-relaxed">
                ыЛиь╢ХэВд:<br/>
                ┬╖ Delete тАФ ьДаэГЭ эХныкй ьВньаЬ<br/>
                ┬╖ Ctrl+C / X тАФ ы│╡ьВм / ьЮШыЭ╝ыВ┤ъ╕░<br/>
                ┬╖ ыУЬыЮШъ╖╕ тАФ ьДаэГЭыРЬ ы╕ФыбЭ ьаДь▓┤ ьЭ┤ыПЩ<br/>
                ┬╖ Esc тАФ ьДаэГЭ эХ┤ьаЬ
              </div>
            </div>
          ) : !selectedBlock ? (
            <div className="p-4 text-slate-400 text-[11px] text-center leading-relaxed">
              ы╕ФыбЭьЭД ьДаэГЭэХШъ▒░ыВШ<br/>ы╣И ь║Фы▓ДьКдьЧРьДЬ ыУЬыЮШъ╖╕эХ┤<br/>ьЧмыЯм эХныкй ьДаэГЭ
            </div>
          ) : (
            <div className="p-3 space-y-4">
              <div>
                <div className="text-[10px] text-slate-500 mb-1 font-medium">Name</div>
                <input
                  value={selectedBlock.name}
                  onChange={(e) => updateBlockName(selectedBlock.id, e.target.value)}
                  className="w-full bg-white border border-slate-300 px-2 py-1 rounded text-[11px] text-slate-900 focus:outline-none focus:border-cyan-500"
                />
              </div>
              <div className="flex items-center gap-2">
                <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold ${CATEGORY_STYLES[selectedDef.category].bg} ${CATEGORY_STYLES[selectedDef.category].text} ${CATEGORY_STYLES[selectedDef.category].border} border`}>
                  {CATEGORY_STYLES[selectedDef.category].badge}
                </span>
                <span className="text-[10px] text-slate-500 font-mono">Type {selectedDef.typeNo}</span>
                <span className="text-[10px] text-slate-500">┬╖ {selectedDef.name}</span>
              </div>
              <div className="text-[10px] text-slate-500 italic leading-relaxed">{selectedDef.desc}</div>

              {/* Plotter ьаДьЪй: ьЭ┤ эФМыбЬэД░ьЭШ ьЛаэШ╕ызМ CSV ыВ┤ы│┤ыВ┤ъ╕░ */}

                <button
                  onClick={() => exportPlotterCsv(selectedBlock)}

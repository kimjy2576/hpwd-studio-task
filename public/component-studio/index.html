<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Component Studio · UI 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com" onload="setupTailwind()"></script>
<script>
  function setupTailwind() {
    if (typeof tailwind === 'undefined') return;
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  }
</script>
<style>
  body { font-family: 'Pretendard', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .step-pill { transition: all 0.25s ease; }
  .step-pill.active { background: #0891b2; color: white; }
  .step-pill.done { background: #d1fae5; color: #065f46; }
  .step-pill.todo { background: #f1f5f9; color: #94a3b8; }
  .code-bg { background: #0f172a; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.6; }
  .code-bg .kw { color: #c084fc; }
  .code-bg .str { color: #86efac; }
  .code-bg .num { color: #fbbf24; }
  .code-bg .com { color: #64748b; }
  .code-bg .fn { color: #60a5fa; }
  .code-bg .todo { background: #fef9c3; color: #713f12; padding: 0 4px; border-radius: 2px; font-weight: 600; }
  .table-row:hover { background: #f8fafc; }
  .slider-track { -webkit-appearance: none; appearance: none; height: 4px; background: #cbd5e1; border-radius: 2px; }
  .slider-track::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: #0891b2; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="app">
  <div style="padding:40px;font-family:Pretendard,system-ui,sans-serif">
    <div style="font-size:20px;font-weight:700;color:#0f172a">Component Studio loading...</div>
    <div id="load-status" style="margin-top:12px;color:#64748b;font-size:13px">스크립트 로드 중 (약 2~3초 소요)</div>
    <div id="load-error" style="margin-top:16px;padding:12px;border:1px solid #fca5a5;background:#fef2f2;color:#991b1b;border-radius:6px;display:none;font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre-wrap"></div>
  </div>
</div>

<!-- Global error catcher (흰화면 대신 메시지 표시) -->
<script>
  function showError(msg) {
    const el = document.getElementById('load-error');
    const status = document.getElementById('load-status');
    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
    }
    if (status) status.style.color = '#dc2626';
    console.error('[Studio]', msg);
  }
  window.addEventListener('error', e => {
    showError('JS Error: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Promise rejection: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

<!-- React development build로 변경 — production은 에러를 숨김 -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
  // 라이브러리 로드 + JSX 수동 처리
  // Babel auto-script 대신 직접 fetch → transform → execute
  // 자동 처리가 일부 환경/CSP에서 침묵 실패하는 문제 회피
  function setStatus(msg, isError) {
    const status = document.getElementById('load-status');
    if (status) {
      status.textContent = msg;
      if (isError) status.style.color = '#dc2626';
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    // Step 1: 라이브러리 확인
    setStatus('1/4 — 라이브러리 확인 중...');
    const checks = [];
    if (typeof React === 'undefined') checks.push('React');
    if (typeof ReactDOM === 'undefined') checks.push('ReactDOM');
    if (typeof Babel === 'undefined') checks.push('Babel');
    if (checks.length > 0) {
      showError('라이브러리 로드 실패: ' + checks.join(', ') + ' 미로드\n\nCDN 차단 가능성 — 네트워크/보안 정책 확인');
      return;
    }

    // Step 2: app.jsx fetch
    setStatus('2/4 — app.jsx 파일 로드 중...');
    let jsxText;
    try {
      const res = await fetch('app.jsx');
      if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
      jsxText = await res.text();
      console.log('[Studio] Fetched app.jsx:', jsxText.length, 'chars');
    } catch (e) {
      showError('app.jsx fetch 실패:\n' + e.message + '\n\n같은 폴더에 app.jsx 파일이 있는지 확인.');
      return;
    }

    // Step 3: Babel 컴파일
    setStatus('3/4 — Babel JSX 컴파일 중...');
    let compiled;
    try {
      const result = Babel.transform(jsxText, {
        presets: ['env', 'react'],
        filename: 'app.jsx',
      });
      compiled = result.code;
      console.log('[Studio] Babel compiled:', compiled.length, 'chars');
    } catch (e) {
      showError('Babel 컴파일 실패:\n' + e.message);
      return;
    }

    // Step 4: 실행
    setStatus('4/4 — React 마운트 중...');
    try {
      // Function constructor로 안전하게 실행
      // (eval 대신 — 글로벌 스코프에서 동작하면서도 strict-mode 격리)
      new Function(compiled)();
      console.log('[Studio] App mounted successfully');
    } catch (e) {
      showError('App 실행 실패:\n' + (e.stack || e.message));
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Component Studio · UI 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>
  function setupTailwind() {
    if (typeof tailwind === 'undefined') return;
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {

</script>
<style>
  body { font-family: 'Pretendard', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .step-pill { transition: all 0.25s ease; }
  .step-pill.active { background: #0891b2; color: white; }
  .step-pill.done { background: #d1fae5; color: #065f46; }
  .step-pill.todo { background: #f1f5f9; color: #94a3b8; }
  .code-bg { background: #0f172a; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.6; }
  .code-bg .kw { color: #c084fc; }
  .code-bg .str { color: #86efac; }
  .code-bg .num { color: #fbbf24; }
  .code-bg .com { color: #64748b; }
  .code-bg .fn { color: #60a5fa; }
  .code-bg .todo { background: #fef9c3; color: #713f12; padding: 0 4px; border-radius: 2px; font-weight: 600; }
  .table-row:hover { background: #f8fafc; }
  .slider-track { -webkit-appearance: none; appearance: none; height: 4px; background: #cbd5e1; border-radius: 2px; }
  .slider-track::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: #0891b2; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="app">
  <div style="padding:40px;font-family:Pretendard,system-ui,sans-serif">
    <div style="font-size:20px;font-weight:700;color:#0f172a">Component Studio loading...</div>
    <div id="load-status" style="margin-top:12px;color:#64748b;font-size:13px">스크립트 로드 중 (약 2~3초 소요)</div>
    <div id="load-error" style="margin-top:16px;padding:12px;border:1px solid #fca5a5;background:#fef2f2;color:#991b1b;border-radius:6px;display:none;font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre-wrap"></div>
  </div>
</div>

<!-- Global error catcher (흰화면 대신 메시지 표시) -->
<script>
  function showError(msg) {
    const el = document.getElementById('load-error');
    const status = document.getElementById('load-status');
    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
    }
    if (status) status.style.color = '#dc2626';
    console.error('[Studio]', msg);
  }
  window.addEventListener('error', e => {
    showError('JS Error: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Promise rejection: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

<!-- React development build (CDN) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- 인라인 JSX (단일 파일 — 로컬에서 file:// 로 열어도 동작) -->
<script id="app-jsx" type="text/plain">
const { useState, useMemo } = React;

/* ───────────── 카테고리 / 단위 사전 ───────────── */
const CATEGORIES = [
  { key: 'source',     label: 'Source',     range: '1~99',     color: 'bg-slate-100 text-slate-700' },
  { key: 'refrigerant', label: 'Refrigerant', range: '100~199', color: 'bg-orange-50 text-orange-700' },
  { key: 'air',        label: 'Air',        range: '200~299',  color: 'bg-sky-50 text-sky-700' },
  { key: 'water',      label: 'Water',      range: '300~399',  color: 'bg-blue-50 text-blue-700' },
  { key: 'control',    label: 'Control',    range: '400~499',  color: 'bg-purple-50 text-purple-700' },
  { key: 'math',       label: 'Math',       range: '500~599',  color: 'bg-emerald-50 text-emerald-700' },
  { key: 'output',     label: 'Output',     range: '900~999',  color: 'bg-pink-50 text-pink-700' },
];

const UNIT_GROUPS = {
  pressure:    ['kPa', 'Pa', 'bar', 'MPa'],
  temperature: ['°C', 'K', '°F'],
  massFlow:    ['g/s', 'kg/s', 'kg/h'],
  volumeFlow:  ['m³/s', 'L/min', 'CFM'],
  power:       ['W', 'kW'],
  energy:      ['J', 'kJ', 'Wh', 'kWh'],
  ratio:       ['-', '%'],
  length:      ['m', 'mm', 'cm'],
  area:        ['m²', 'mm²', 'cm²'],
  speed:       ['rpm', 'rad/s'],
  ua:          ['W/K'],
  cp:          ['J/kg·K', 'kJ/kg·K'],
  density:     ['kg/m³'],
  enthalpy:    ['J/kg', 'kJ/kg'],
  conc:        ['kg/kg', '%'],
};

/* 카테고리별 자주 쓰이는 변수 추천 (공통 변수명 사전) */
const COMMON_VARS = {
  refrigerant: {
    parameter: [
      { name: 'V_disp', unit: 'mL/rev', start: 10 },
      { name: 'eta_v',  unit: '-',      start: 0.85 },
      { name: 'eta_is', unit: '-',      start: 0.7 },
      { name: 'PR',     unit: '-',      start: 3.5 },
      { name: 'UA',     unit: 'W/K',    start: 150 },
      { name: 'dP_ref', unit: 'kPa',    start: 20 },
    ],
    input: [
      { name: 'P_suc', unit: 'kPa', min: 100, max: 3000 },
      { name: 'T_suc', unit: '°C',  min: -40, max: 80 },
      { name: 'P_in',  unit: 'kPa' },
      { name: 'T_in',  unit: '°C'  },
      { name: 'm_dot', unit: 'g/s' },
    ],
    output: [
      { name: 'm_dot', unit: 'g/s' },
      { name: 'T_dis', unit: '°C'  },
      { name: 'P_dis', unit: 'kPa' },
      { name: 'T_out', unit: '°C'  },
      { name: 'P_out', unit: 'kPa' },
      { name: 'Q',     unit: 'W'   },
      { name: 'W_comp', unit: 'W'  },
    ],
  },
  air: {
    parameter: [
      { name: 'RPM',   unit: 'rpm',  start: 2500 },
      { name: 'V_max', unit: 'm³/s', start: 0.15 },
      { name: 'eta',   unit: '-',    start: 0.55 },
    ],
    input: [
      { name: 'T_in',  unit: '°C' },
      { name: 'm_air', unit: 'kg/s' },
      { name: 'dP_sys', unit: 'Pa' },
    ],
    output: [
      { name: 'T_out',     unit: '°C' },
      { name: 'm_air',     unit: 'kg/s' },
      { name: 'T_air_out', unit: '°C' },
      { name: 'W_fan',     unit: 'W' },
    ],
  },
  source: { parameter: [], input: [], output: [{ name: 'value', unit: '-' }] },
  water: { parameter: [], input: [], output: [] },
  control: { parameter: [], input: [], output: [] },
  math: { parameter: [], input: [], output: [] },
  output: { parameter: [], input: [], output: [] },
};

/* 사용 중인 typeNo (Studio 현재 컴포넌트들) */
const USED_TYPE_NOS = {
  source: [1, 10, 11, 12],
  refrigerant: [100, 101, 102, 103, 104],
  air: [200, 201],
  output: [900, 901],
};

const suggestNextTypeNo = (category) => {
  const cat = CATEGORIES.find(c => c.key === category);
  if (!cat) return 100;
  const [lo, hi] = cat.range.split('~').map(Number);
  const used = USED_TYPE_NOS[category] || [];
  for (let n = lo; n <= hi; n++) {
    if (!used.includes(n)) return n;
  }
  return hi;
};

/* ───────────── 메인 앱 ───────────── */
function App() {
  const [step, setStep] = useState(1);
  const [identity, setIdentity] = useState({
    key: 'my_hx',
    name: 'My Heat Exchanger',
    category: 'refrigerant',
    typeNo: 105,
    modelType: 'on-design',
    description: 'NTU-effectiveness 기반 평행류 열교환기',
    isDynamic: false,
    color: '#475569',
  });
  const [variables, setVariables] = useState({
    parameter: [
      { name: 'UA',         unit: 'W/K',  start: 150,  min: 1,   max: 1000, description: '열전달계수×면적' },
      { name: 'dP_ref',     unit: 'kPa',  start: 20,   min: 0,   max: 100,  description: '설계점 압력강하' },
      { name: 'effect_max', unit: '-',    start: 0.95, min: 0.5, max: 1.0,  description: '최대 효율' },
    ],
    input: [
      { name: 'T_in',  unit: '°C',  min: -40, max: 200 },
      { name: 'm_dot', unit: 'g/s', min: 0,   max: 100 },
    ],
    output: [
      { name: 'Q',     unit: 'W'   },
      { name: 'T_out', unit: '°C'  },
      { name: 'P_out', unit: 'kPa' },
    ],
    state: [],
  });
  const [physics, setPhysics] = useState({
    body: '  // TODO: 물리 계산 작성\n  const NTU = UA / (m_dot * 1.005);\n  const eff = effect_max * (1 - Math.exp(-NTU));\n  const Q = eff * m_dot * 1.005 * (T_in - 20);\n  const T_out = T_in - Q / (m_dot * 1.005);\n  const P_out = 1700 - dP_ref;',
  });

  return (
    <div className="min-h-screen flex flex-col bg-slate-100">
      <Topbar identity={identity} />
      <Stepper step={step} setStep={setStep} />
      <div className="flex-1 flex overflow-hidden">
        <div className="flex-1 overflow-y-auto p-6">
          {step === 1 && <Step1Identity identity={identity} setIdentity={setIdentity} />}
          {step === 2 && <Step2Variables variables={variables} setVariables={setVariables} category={identity.category} isDynamic={identity.isDynamic} />}
          {step === 3 && <Step3Physics physics={physics} setPhysics={setPhysics} variables={variables} isDynamic={identity.isDynamic} />}
          {step === 4 && <Step4Test identity={identity} variables={variables} />}
        </div>
        <div className="w-[440px] border-l border-slate-200 bg-white overflow-y-auto">
          <Preview step={step} identity={identity} variables={variables} physics={physics} />
        </div>
      </div>
      <Bottombar step={step} setStep={setStep} />
    </div>
  );
}

/* ───────────── App Switcher (HPWD Studio ↔ Component Studio) ───────────── */
function AppSwitcher({ current }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const apps = [
    { id: 'studio',           label: 'HPWD Studio',      desc: '시뮬 캔버스',   href: '/' },
    { id: 'component-studio', label: 'Component Studio', desc: '컴포넌트 작성', href: '/component-studio/' },
    { id: 'calibration-studio', label: 'Calibration Studio', desc: 'Calibration & Validation', href: '/calibration-studio/' },
    { id: 'on-design-studio',   label: 'On-Design Studio',   desc: 'On-design 모델 설계',    href: '/on-design-studio/' },
    { id: 'model-docs',          label: 'Model Docs',          desc: '수학적 모델링 문서',     href: '/model-docs/' },
  ];
  const active = apps.find(a => a.id === current) || apps[0];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-100 transition-colors"
      >
        <div className="w-2 h-2 rounded-sm bg-cyan-600 shrink-0"></div>
        <span className="font-bold text-slate-900 tracking-wide text-sm">{active.label}</span>
        <span className="text-slate-400 text-[10px]">▾</span>
      </button>

      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-xl w-56 p-1">
          {apps.map(a => {
            const isActive = a.id === current;
            return (
              <button
                key={a.id}
                onClick={() => { if (!isActive) window.location.href = a.href; }}
                className={`w-full text-left px-2.5 py-1.5 rounded flex items-start gap-2 transition-colors ${
                  isActive ? 'bg-cyan-50 cursor-default' : 'hover:bg-slate-50'
                }`}
              >
                <span className={`mt-0.5 w-3 text-center text-[11px] ${isActive ? 'text-cyan-700' : 'text-slate-300'}`}>
                  {isActive ? '●' : '○'}
                </span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-[12px] ${isActive ? 'text-cyan-900' : 'text-slate-800'}`}>
                    {a.label}
                  </div>
                  <div className="text-[10px] text-slate-500">{a.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ───────────── Topbar ───────────── */
function Topbar({ identity }) {
  return (
    <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
      <div className="flex items-center gap-4">
        <AppSwitcher current="component-studio" />
        <div className="w-px h-5 bg-slate-200"></div>
        <div className="flex items-center gap-2">
          <span className="text-sm font-semibold text-slate-900">{identity.name}</span>
          <span className="mono text-[11px] text-slate-400">T{identity.typeNo}</span>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button className="text-xs px-3 py-1.5 text-slate-600 hover:bg-slate-100 rounded">👁 미리보기</button>
        <button className="text-xs px-3 py-1.5 bg-cyan-600 text-white rounded hover:bg-cyan-700">💾 저장</button>
      </div>
    </div>
  );
}

/* ───────────── Stepper ───────────── */
function Stepper({ step, setStep }) {
  const steps = [
    { n: 1, label: 'Identity',   sub: '이름·번호·카테고리' },
    { n: 2, label: 'Variables',  sub: 'parameter·input·output' },
    { n: 3, label: 'Physics',    sub: 'step 함수 작성' },
    { n: 4, label: 'Test',       sub: '슬라이더 검증' },
  ];
  return (
    <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-2 shrink-0">
      {steps.map((s, i) => (
        <React.Fragment key={s.n}>
          <button
            onClick={() => setStep(s.n)}
            className={`step-pill flex items-center gap-2 px-4 py-2 rounded-lg text-sm ${
              s.n === step ? 'active' : (s.n < step ? 'done' : 'todo')
            }`}
          >
            <span className="mono text-xs font-bold">{s.n}</span>
            <div className="text-left">
              <div className="font-semibold leading-tight">{s.label}</div>
              <div className="text-[10px] opacity-70 leading-tight">{s.sub}</div>
            </div>
          </button>
          {i < steps.length - 1 && (
            <div className="text-slate-300 mono">━━</div>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ───────────── Helpers ───────────── */
function Field({ label, hint, children }) {
  return (
    <div>
      <label className="block text-sm font-semibold text-slate-800 mb-1">{label}</label>
      {children}
      {hint && <div className="text-[11px] text-slate-500 mt-1.5">{hint}</div>}
    </div>
  );
}

/* ───────────── Step 1: Identity ───────────── */
function Step1Identity({ identity, setIdentity }) {
  const setField = (k, v) => setIdentity({ ...identity, [k]: v });
  const usedNos = USED_TYPE_NOS[identity.category] || [];

  React.useEffect(() => {
    // 카테고리 바뀌면 typeNo 자동 추천
    if (!usedNos.includes(identity.typeNo)) return;
    setIdentity(id => ({ ...id, typeNo: suggestNextTypeNo(id.category) }));
  }, [identity.category]);

  return (
    <div className="max-w-3xl mx-auto space-y-6">
      <div>
        <h2 className="text-xl font-bold text-slate-900 mb-1">Identity</h2>
        <p className="text-sm text-slate-500">컴포넌트 기본 정보를 입력하세요.</p>
      </div>

      <Field label="이름 (코드 키)" hint="영문 소문자·언더스코어. 예: compressor, my_hx">
        <input
          value={identity.key}
          onChange={e => setField('key', e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '_'))}
          className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </Field>

      <Field label="표시 이름" hint="Type Library에 표시될 이름">
        <input
          value={identity.name}
          onChange={e => setField('name', e.target.value)}
          className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </Field>

      <Field label="카테고리" hint="typeNo 대역이 자동으로 정해집니다">
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
          {CATEGORIES.map(c => (
            <button
              key={c.key}
              onClick={() => setField('category', c.key)}
              className={`px-3 py-2 rounded border text-sm text-left transition ${
                identity.category === c.key
                  ? 'border-cyan-500 bg-cyan-50 text-cyan-900'
                  : 'border-slate-200 hover:border-slate-300'
              }`}
            >
              <div className="font-semibold">{c.label}</div>
              <div className="mono text-[10px] text-slate-500">typeNo {c.range}</div>
            </button>
          ))}
        </div>
      </Field>

      <Field label="Type Number" hint={`자동 추천: ${suggestNextTypeNo(identity.category)} · 사용 중: ${usedNos.join(', ') || '없음'}`}>
        <input
          type="number"
          value={identity.typeNo}
          onChange={e => setField('typeNo', parseInt(e.target.value, 10) || 0)}
          className={`mono w-32 px-3 py-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 ${
            usedNos.includes(identity.typeNo) ? 'border-red-500 bg-red-50' : 'border-slate-300'
          }`}
        />
        {usedNos.includes(identity.typeNo) && (
          <span className="ml-2 text-xs text-red-600">⚠ 이미 사용 중</span>
        )}
      </Field>

      <Field label="Model Type" hint="모델 fidelity 종류 (Phase에 따라 다름)">
        <div className="space-y-2">
          {[
            { v: 'on-design',       l: 'On-design',       d: '단일 설계점에서 정해진 사양만 사용 (가장 단순)' },
            { v: 'semi-empirical',  l: 'Semi-empirical',  d: '일부 물리 + 측정 데이터 보정 (AHRI map 등)' },
            { v: 'off-design',      l: 'Off-design',      d: '완전한 1D 물리 (NTU, detailed cycle)' },
          ].map(o => (
            <label key={o.v} className={`flex items-start gap-3 p-3 border rounded cursor-pointer ${
              identity.modelType === o.v ? 'border-cyan-500 bg-cyan-50' : 'border-slate-200 hover:bg-slate-50'
            }`}>
              <input
                type="radio"
                checked={identity.modelType === o.v}
                onChange={() => setField('modelType', o.v)}
                className="mt-0.5 accent-cyan-600"
              />
              <div>
                <div className="font-semibold text-sm text-slate-900">{o.l}</div>
                <div className="text-xs text-slate-500 mt-0.5">{o.d}</div>
              </div>
            </label>
          ))}
        </div>
      </Field>

      <Field label="한 줄 설명" hint="AI/사용자가 처음 보는 설명">
        <input
          value={identity.description}
          onChange={e => setField('description', e.target.value)}
          className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </Field>

      <Field label="정적 / 동적" hint="state 변수 유무 결정">
        <div className="grid grid-cols-2 gap-2">
          {[
            { v: false, l: '정적 (Static)',  d: 'state 없음, 입력→즉시 출력' },
            { v: true,  l: '동적 (Dynamic)', d: 'state 있음, 시간 따라 변함' },
          ].map(o => (
            <button
              key={String(o.v)}
              onClick={() => setField('isDynamic', o.v)}
              className={`px-4 py-3 rounded border text-left ${
                identity.isDynamic === o.v ? 'border-cyan-500 bg-cyan-50' : 'border-slate-200 hover:bg-slate-50'
              }`}
            >
              <div className="font-semibold text-sm">{o.l}</div>
              <div className="text-xs text-slate-500 mt-0.5">{o.d}</div>
            </button>
          ))}
        </div>
        <div className="text-[11px] text-slate-500 mt-1.5">💡 잘 모르겠으면 정적부터 시작하세요. 나중에 변경 가능.</div>
      </Field>
    </div>
  );
}

/* ───────────── Step 2: Variables ───────────── */
function Step2Variables({ variables, setVariables, category, isDynamic }) {
  const [activeTab, setActiveTab] = useState('parameter');
  const [showAddModal, setShowAddModal] = useState(false);

  const tabs = [
    { key: 'parameter', label: 'Parameters', desc: '시간 무관 상수' },
    { key: 'input',     label: 'Inputs',     desc: '다른 컴포넌트에서 받음' },
    { key: 'output',    label: 'Outputs',    desc: '다른 컴포넌트로 전달' },
    ...(isDynamic ? [{ key: 'state', label: 'States', desc: '시간 따라 변하는 변수' }] : []),
  ];

  const addVar = (newVar) => {
    setVariables({ ...variables, [activeTab]: [...variables[activeTab], newVar] });

  const deleteVar = (idx) => {

  const recommendations = (COMMON_VARS[category] || {})[activeTab] || [];
  const usedNames = new Set(variables[activeTab].map(v => v.name));
  const newRecommendations = recommendations.filter(r => !usedNames.has(r.name));

  return (

      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
        <div className="flex border-b border-slate-200">
          {tabs.map(t => (
            <button
              key={t.key}
              onClick={() => setActiveTab(t.key)}
              className={`flex-1 px-4 py-3 text-sm border-r border-slate-200 last:border-r-0 ${

              }`}
            >
              <div className="font-semibold">{t.label} <span className="text-slate-400 mono text-xs">({variables[t.key].length})</span></div>

        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase tracking-widest">
              <tr>
                <th className="px-4 py-2 text-left">이름</th>
                <th className="px-4 py-2 text-left">단위</th>
                {(activeTab === 'parameter' || activeTab === 'state') && (
                  <th className="px-4 py-2 text-left">기본값</th>
                )}
                <th className="px-4 py-2 text-left">최소</th>
                <th className="px-4 py-2 text-left">최대</th>
                <th className="px-4 py-2 text-left">설명</th>
                <th className="px-4 py-2"></th>
              </tr>
            </thead>
            <tbody>
              {variables[activeTab].length === 0 && (
                <tr>
                  <td colSpan={7} className="px-4 py-8 text-center text-slate-400 text-xs">
                    변수가 없습니다. 아래 버튼으로 추가하세요.
                  </td>
                </tr>
              )}
              {variables[activeTab].map((v, idx) => (
                <tr key={idx} className="table-row border-t border-slate-100">
                  <td className="px-4 py-2 mono font-semibold text-slate-900">{v.name}</td>
                  <td className="px-4 py-2 mono text-xs text-slate-600">{v.unit}</td>
                  {(activeTab === 'parameter' || activeTab === 'state') && (
                    <td className="px-4 py-2 mono text-xs text-amber-700">{v.start ?? '-'}</td>
                  )}
                  <td className="px-4 py-2 mono text-xs text-slate-500">{v.min ?? '-'}</td>
                  <td className="px-4 py-2 mono text-xs text-slate-500">{v.max ?? '-'}</td>
                  <td className="px-4 py-2 text-xs text-slate-700">{v.description || '-'}</td>
                  <td className="px-4 py-2">
                    <button onClick={() => deleteVar(idx)} className="text-slate-400 hover:text-red-600 text-sm">✕</button>

        </div>

        <div className="border-t border-slate-200 bg-slate-50 px-4 py-3 flex items-center justify-between">
          <button
            onClick={() => setShowAddModal(true)}
            className="text-xs px-3 py-1.5 bg-cyan-600 text-white rounded hover:bg-cyan-700"
          >+ {tabs.find(t => t.key === activeTab).label.replace(/s$/, '')} 추가</button>
          <span className="text-[10px] text-slate-400 mono">drag to reorder · 추후 지원 예정</span>
        </div>
      </div>

      {newRecommendations.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
          <div className="text-xs font-semibold text-amber-900 mb-2">💡 이 카테고리에서 자주 쓰이는 변수 (클릭하면 자동 추가)</div>
          <div className="flex flex-wrap gap-2">
            {newRecommendations.map(r => (
              <button
                key={r.name}
                onClick={() => addVar({ ...r, description: '' })}
                className="mono text-xs bg-white px-2.5 py-1 rounded border border-amber-300 hover:bg-amber-100 text-amber-900"
              >
                + {r.name} <span className="text-amber-500">[{r.unit}]</span>
              </button>
            ))}

        </div>
      )}

      {showAddModal && (
        <AddVarModal
          tab={activeTab}
          category={category}
          existingNames={Array.from(usedNames)}
          onAdd={addVar}
          onClose={() => setShowAddModal(false)}
        />

function AddVarModal({ tab, onAdd, onClose, existingNames }) {
  const [v, setV] = useState({
    name: '', unit: '', start: '', min: '', max: '', description: '',
  });
  const set = (k, val) => setV({ ...v, [k]: val });
  const tabLabel = { parameter: 'Parameter', input: 'Input', output: 'Output', state: 'State' }[tab];
  const showStart = tab === 'parameter' || tab === 'state';

  const submit = () => {
    if (!v.name.trim()) return alert('이름은 필수입니다');
    if (existingNames.includes(v.name)) return alert('이미 존재하는 이름입니다');
    onAdd({
      name: v.name,
      unit: v.unit,
      ...(showStart && v.start !== '' ? { start: parseFloat(v.start) } : {}),
      ...(v.min !== '' ? { min: parseFloat(v.min) } : {}),
      ...(v.max !== '' ? { max: parseFloat(v.max) } : {}),
      description: v.description,
    });
  };

  return (
    <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-5 space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-bold text-slate-900">{tabLabel} 추가</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700">✕</button>
        </div>

        <div className="space-y-2">
          <label className="block text-xs font-semibold text-slate-700">이름</label>
          <input
            value={v.name}
            onChange={e => set('name', e.target.value)}
            placeholder="예: UA, T_in, m_dot"
            autoFocus
            className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs font-semibold text-slate-700 mb-1">단위</label>
            <select
              value={v.unit}
              onChange={e => set('unit', e.target.value)}
              className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm"
            >
              <option value="">선택...</option>
              {Object.entries(UNIT_GROUPS).map(([group, units]) => (
                <optgroup key={group} label={group}>
                  {units.map(u => <option key={u} value={u}>{u}</option>)}
                </optgroup>
              ))}
            </select>
          </div>
          {showStart && (
            <div>
              <label className="block text-xs font-semibold text-slate-700 mb-1">기본값</label>
              <input
                value={v.start}
                onChange={e => set('start', e.target.value)}
                className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm"
              />
            </div>
          )}
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs font-semibold text-slate-700 mb-1">최소</label>
            <input
              value={v.min}
              onChange={e => set('min', e.target.value)}
              className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm"
            />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-700 mb-1">최대</label>
            <input
              value={v.max}
              onChange={e => set('max', e.target.value)}
              className="mono w-full px-3 py-2 border border-slate-300 rounded text-sm"
            />
          </div>
        </div>

        <div>
          <label className="block text-xs font-semibold text-slate-700 mb-1">설명</label>
          <input
            value={v.description}
            onChange={e => set('description', e.target.value)}
            placeholder="의미 있는 한 줄"
            className="w-full px-3 py-2 border border-slate-300 rounded text-sm"
          />
        </div>

        <div className="flex justify-end gap-2 pt-2">
          <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded">취소</button>
          <button onClick={submit} className="px-4 py-2 text-sm bg-cyan-600 text-white rounded hover:bg-cyan-700">추가</button>
        </div>
      </div>
    </div>
  );
}

/* ───────────── Step 3: Physics ───────────── */
function Step3Physics({ physics, setPhysics, variables, isDynamic }) {
  const inputDestructure = variables.input.length
    ? `const { ${variables.input.map(v => v.name).join(', ')} } = input;`
    : '// (no inputs)';
  const paramDestructure = variables.parameter.length
    ? `const { ${variables.parameter.map(v => v.name).join(', ')} } = params;`
    : '// (no parameters)';
  const stateDestructure = isDynamic && variables.state.length
    ? `const { ${variables.state.map(v => v.name).join(', ')} } = state;`
    : null;
  const outputReturn = variables.output.length
    ? `outputs: { ${variables.output.map(v => v.name).join(', ')} }`
    : 'outputs: {}';

  const snippets = [
    {
      label: 'NTU-effectiveness',
      code: `const cp = 1.005;\nconst NTU = UA / (m_dot * cp);\nconst eff = 1 - Math.exp(-NTU);\nconst Q = eff * m_dot * cp * (T_in - T_air);`,
    },
    {
      label: 'Pressure ratio (compressor)',
      code: `const P_dis = P_suc * PR;\nconst T_dis = (T_suc + 273.15) * Math.pow(PR, 0.286 / eta_is) - 273.15;`,
    },
    {
      label: 'Mass flow (volumetric)',
      code: `const rho = 1.2;\nconst m_dot = (V_disp * 1e-6) * (RPM / 60) * eta_v * rho * 1000; // g/s`,
    },
    {
      label: 'Forward Euler (state update)',
      code: `const dT = (Q - m * cp * T) / (m * cp);\nconst newT = T + dt * dT;`,
    },
  ];

  return (
    <div className="max-w-5xl mx-auto space-y-4">
      <div>
        <h2 className="text-xl font-bold text-slate-900 mb-1">Physics</h2>
        <p className="text-sm text-slate-500">step 함수 안에 물리 계산을 작성하세요. 변수 분해와 return은 자동입니다.</p>
      </div>

      <div className="bg-slate-900 rounded-lg overflow-hidden">
        <div className="bg-slate-800 px-4 py-2 flex items-center justify-between">
          <span className="mono text-xs text-slate-400">step.js</span>
          <span className="text-[10px] text-slate-500">{isDynamic ? '동적' : '정적'} 컴포넌트</span>
        </div>
        <div className="p-4 mono text-xs leading-relaxed">
          <div className="text-purple-400">step:</div>
          <div className="ml-4 text-slate-400">(input, params, state, dt) <span className="text-slate-500">{`=>`}</span> {`{`}</div>
          <div className="ml-8 mt-2 text-slate-500">// ─ 자동 생성 (편집 불가) ─</div>
          <div className="ml-8 text-emerald-400">{inputDestructure}</div>
          <div className="ml-8 text-emerald-400">{paramDestructure}</div>
          {stateDestructure && <div className="ml-8 text-emerald-400">{stateDestructure}</div>}
          <div className="ml-8 mt-3 text-amber-200">// ─ TODO: 사용자 작성 ─</div>
          <textarea
            value={physics.body}
            onChange={e => setPhysics({ ...physics, body: e.target.value })}
            spellCheck={false}
            className="ml-8 mt-1 w-[calc(100%-2rem)] bg-slate-900 text-emerald-300 mono text-xs leading-relaxed border border-slate-700 rounded p-3 focus:outline-none focus:border-cyan-500"
            rows={isDynamic ? 14 : 10}
            style={{ resize: 'vertical' }}
          />
          {isDynamic && (
            <>
              <div className="ml-8 mt-3 text-slate-500">// ─ Forward Euler 자동 적분 ─</div>
              <div className="ml-8 text-emerald-400 opacity-60">{`const newState = { ${variables.state.map(s => `${s.name}: ${s.name} + dt * d_${s.name}`).join(', ')} };`}</div>
            </>
          )}
          <div className="ml-8 mt-3 text-slate-500">// ─ 자동 생성 ─</div>
          <div className="ml-8 text-emerald-400">return {`{`}</div>
          <div className="ml-12 text-emerald-400">{outputReturn},</div>
          <div className="ml-12 text-emerald-400">{isDynamic ? 'newState,' : 'newState: state,'}</div>
          <div className="ml-8 text-emerald-400">{`};`}</div>
          <div className="ml-4 text-slate-400">{`}`}</div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-4">
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs font-semibold text-slate-700 mb-2">💡 자주 쓰는 패턴 (클릭하면 삽입)</div>
          <div className="space-y-1.5">
            {snippets.map(s => (
              <button
                key={s.label}
                onClick={() => setPhysics({ ...physics, body: physics.body + '\n\n  // ' + s.label + '\n  ' + s.code.split('\n').join('\n  ') })}
                className="w-full text-left mono text-[11px] bg-slate-50 hover:bg-cyan-50 rounded px-2.5 py-1.5 border border-slate-200"
              >
                <span className="text-slate-700">{s.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs font-semibold text-slate-700 mb-2">📐 자주 쓰는 상수</div>
          <div className="mono text-[11px] space-y-1 text-slate-700">
            <div><span className="text-amber-600">cp_air</span> = 1005 J/kg·K</div>
            <div><span className="text-amber-600">cp_water</span> = 4180 J/kg·K</div>
            <div><span className="text-amber-600">h_evap</span> = 2.4e6 J/kg (water)</div>
            <div><span className="text-amber-600">k_air</span> = 1.4 (비열비)</div>
            <div><span className="text-amber-600">R_air</span> = 287 J/kg·K</div>
            <div><span className="text-amber-600">rho_air</span> = 1.2 kg/m³ @ 25°C</div>
          </div>
        </div>
      </div>

      <div className="bg-white border border-slate-200 rounded-lg p-4">
        <div className="text-xs font-semibold text-slate-700 mb-2">✓ Validation (자동 추천 — 필요 시 수정)</div>
        <div className="bg-slate-50 rounded p-3 mono text-[11px] text-slate-700 leading-relaxed">
          <div className="text-purple-600">validate:</div>
          <div className="ml-4">(params) <span className="text-slate-500">{'=>'}</span> {`{`}</div>
          <div className="ml-8 text-slate-500">// 자동 추천 (min/max 위반 자동 체크)</div>
          {variables.parameter.map((p, i) => (
            <div key={i} className="ml-8 text-emerald-700">
              if (params.{p.name} {p.min !== undefined ? `< ${p.min}` : '<= 0'}) errors.push({`{ key: '${p.name}', msg: '...' }`});
            </div>
          ))}
          <div className="ml-4">{`}`}</div>
        </div>
      </div>
    </div>
  );
}

/* ───────────── Step 4: Test ───────────── */
function Step4Test({ identity, variables }) {
  const [paramVals, setParamVals] = useState(
    Object.fromEntries(variables.parameter.map(p => [p.name, p.start ?? 0]))
  );
  const [inputVals, setInputVals] = useState(
    Object.fromEntries(variables.input.map(i => [i.name, ((i.min ?? 0) + (i.max ?? 100)) / 2]))
  );

  // Mock 출력 계산
  const outputs = useMemo(() => {
    const fakeOutputs = {};
    variables.output.forEach((o, i) => {
      // 그럴듯한 mock 값
      const base = Object.values(inputVals)[0] ?? 25;
      const mod = Object.values(paramVals)[0] ?? 1;
      fakeOutputs[o.name] = (base * 0.7 + mod * 0.1 + Math.sin(i) * 5).toFixed(2);
    });
    return fakeOutputs;
  }, [inputVals, paramVals, variables.output]);

  return (
    <div className="max-w-5xl mx-auto space-y-4">
      <div>
        <h2 className="text-xl font-bold text-slate-900 mb-1">Test</h2>
        <p className="text-sm text-slate-500">슬라이더로 입력 조정하고 출력 변화를 즉시 확인하세요.</p>
      </div>

      <div className="grid grid-cols-2 gap-4">
        <div className="bg-white border border-slate-200 rounded-lg p-4 space-y-3">
          <div className="text-xs font-semibold uppercase tracking-widest text-slate-500">Inputs</div>
          {variables.input.map(v => (
            <SliderRow
              key={v.name}
              variable={v}
              value={inputVals[v.name]}
              onChange={val => setInputVals({ ...inputVals, [v.name]: val })}
            />
          ))}
          <div className="border-t border-slate-100 pt-3">
            <div className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-3">Parameters</div>
            {variables.parameter.map(v => (
              <SliderRow
                key={v.name}
                variable={v}
                value={paramVals[v.name]}
                onChange={val => setParamVals({ ...paramVals, [v.name]: val })}
              />
            ))}
          </div>
        </div>

        <div className="space-y-3">
          <div className="bg-white border border-slate-200 rounded-lg p-4">
            <div className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-3">Outputs (live)</div>
            {variables.output.map(v => (
              <div key={v.name} className="flex justify-between items-baseline py-1.5 border-b border-slate-100 last:border-b-0">
                <span className="mono text-xs text-slate-700">{v.name}</span>
                <span>
                  <span className="mono text-base font-bold text-amber-700">{outputs[v.name]}</span>
                  <span className="mono text-[10px] text-slate-500 ml-1.5">{v.unit}</span>
                </span>
              </div>
            ))}
          </div>

          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
            <div className="text-xs font-semibold text-emerald-800">✓ Validate: 모든 체크 통과</div>
          </div>

          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
            <div className="text-xs font-semibold text-amber-800 mb-1">⚠ Sanity Warnings</div>
            <div className="text-[11px] text-amber-700">출력이 합리적인지 직접 확인하세요. 자동 sanity 체크는 추후 추가.</div>
          </div>

          <div className="bg-white border border-slate-200 rounded-lg p-3">
            <div className="text-xs font-semibold text-slate-700 mb-2">📋 Test Cases</div>
            <div className="space-y-1.5">
              {['Default', 'High flow', 'Cold inlet'].map(name => (
                <div key={name} className="flex items-center justify-between text-xs px-2 py-1 hover:bg-slate-50 rounded">
                  <span className="text-slate-700">{name}</span>
                  <button className="text-cyan-700 hover:underline text-[10px]">Load</button>

                + 현재 상태를 test case로 저장
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function SliderRow({ variable, value, onChange }) {
  const min = variable.min ?? 0;
  const max = variable.max ?? 100;
  return (
    <div className="space-y-1">
      <div className="flex justify-between items-baseline">
        <span className="mono text-xs text-slate-700">{variable.name}</span>
        <span>
          <span className="mono text-xs font-semibold text-cyan-700">{Number(value).toFixed(2)}</span>
          <span className="mono text-[10px] text-slate-500 ml-1">{variable.unit}</span>
        </span>
      </div>
      <input
        type="range"
        min={min}
        max={max}
        step={(max - min) / 100}
        value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        className="slider-track w-full"
      />
      <div className="flex justify-between mono text-[9px] text-slate-400">
        <span>{min}</span>
        <span>{max}</span>
      </div>
    </div>
  );
}

/* ───────────── Right Preview Panel ───────────── */
function Preview({ step, identity, variables, physics }) {

    <div className="p-4 sticky top-0">
      <div className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold mb-3">
        Live Preview · Generated Code
      </div>
      <div className="code-bg rounded-lg p-4 overflow-x-auto" style={{ maxHeight: 'calc(100vh - 200px)', overflowY: 'auto' }}>
        <div><span className="kw">const</span> <span className="fn">{toPascal(identity.key)}</span> = {`{`}</div>
        <div className="ml-3"><span className="com">// ── Identity ──</span></div>
        <div className="ml-3">typeNo: <span className="num">{identity.typeNo}</span>,</div>
        <div className="ml-3">name: <span className="str">'{identity.name}'</span>,</div>
        <div className="ml-3">category: <span className="str">'{identity.category}'</span>,</div>
        <div className="ml-3 mt-2"><span className="com">// ── Model Description ──</span></div>
        <div className="ml-3">modelDescription: {`{`}</div>
        <div className="ml-6">modelType: <span className="str">'{identity.modelType}'</span>,</div>
        <div className="ml-6">description: <span className="str">'{identity.description}'</span>,</div>

          <div key={'o'+i} className="ml-9">
            {`{ name: `}<span className="str">'{v.name}'</span>{`, causality: `}<span className="str">'output'</span>{`, unit: `}<span className="str">'{v.unit}'</span>{` },`}
          </div>
        ))}
        <div className="ml-6">],</div>
        <div className="ml-3">{`},`}</div>
        <div className="ml-3 mt-2"><span className="com">// ── Computation ──</span></div>
        <div className="ml-3">step: (input, params, state, dt) {`=>`} {`{`}</div>
        <div className="ml-6"><span className="com">// auto-generated destructure</span></div>
        <div className="ml-6"><span className="com">// (user-written body)</span></div>
        <div className="ml-6"><span className="todo">// ... user code ...</span></div>
        <div className="ml-6">return {`{ outputs, newState };`}</div>
        <div className="ml-3">{`},`}</div>
        <div>{`};`}</div>
      </div>

      <div className="mt-4 bg-slate-50 border border-slate-200 rounded-lg p-3">
        <div className="text-[10px] font-semibold text-slate-700 mb-2">📁 저장될 위치</div>
        <div className="mono text-[11px] text-slate-600">components/{identity.key}.js</div>
        <div className="text-[10px] text-slate-500 mt-1.5">저장 시 Type Library에 자동 등록됩니다.</div>
      </div>
    </div>
  );
}

/* ───────────── Bottom bar ───────────── */
function Bottombar({ step, setStep }) {
  return (
    <div className="bg-white border-t border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
      <button
        onClick={() => setStep(Math.max(1, step - 1))}
        disabled={step === 1}
        className="text-sm px-4 py-2 text-slate-600 hover:bg-slate-100 rounded disabled:opacity-30 disabled:cursor-not-allowed"
      >◀ 이전</button>
      <div className="flex items-center gap-3 text-xs">
        <span className="text-slate-500">⚠ Errors: <span className="text-emerald-600 font-semibold">0</span></span>
        <span className="text-slate-400">·</span>
        <span className="text-slate-500">Step {step} / 4</span>
      </div>
      <div className="flex gap-2">
        <button
          onClick={() => setStep(Math.min(4, step + 1))}
          disabled={step === 4}
          className="text-sm px-4 py-2 bg-cyan-600 text-white rounded hover:bg-cyan-700 disabled:opacity-30"
        >다음 ▶</button>
        <button className="text-sm px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700">
          저장 후 닫기
        </button>
      </div>
    </div>
  );
}

function toPascal(s) {
  return s.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
}

/* ───────────── Error Boundary ───────────── */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    console.error('[Studio ErrorBoundary]', error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 40, fontFamily: 'Pretendard, system-ui' }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: '#dc2626', marginBottom: 8 }}>
            ⚠ Component Studio 렌더 에러
          </div>
          <div style={{ marginBottom: 12, fontSize: 14, color: '#475569' }}>
            아래 메시지를 알려주세요:
          </div>
          <pre style={{
            background: '#0f172a', color: '#fca5a5', padding: 16, borderRadius: 8,
            fontSize: 12, fontFamily: 'JetBrains Mono, monospace',
            overflow: 'auto', whiteSpace: 'pre-wrap',
          }}>
            {String(this.state.error?.stack || this.state.error)}
          </pre>
          <button
            onClick={() => window.location.reload()}
            style={{
              marginTop: 16, padding: '8px 16px', background: '#0891b2',
              color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer',
            }}
          >새로고침</button>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ───────────── Mount ───────────── */
try {
  const container = document.getElementById('app');
  if (!container) throw new Error('#app 요소를 찾을 수 없음');
  // 로딩 placeholder 비우기
  container.innerHTML = '';
  ReactDOM.createRoot(container).render(
    <ErrorBoundary>
      <App />
    </ErrorBoundary>
  );
} catch (e) {
  // catastrophic failure — JSX 자체가 안 돌아감
  console.error('[Studio Mount]', e);
  document.body.innerHTML = `
    <div style="padding:40px;font-family:system-ui">
      <h1 style="color:#dc2626">⚠ React 마운트 실패</h1>
      <pre style="background:#0f172a;color:#fca5a5;padding:16px;border-radius:8px;font-size:12px;white-space:pre-wrap">${e.message}\n${e.stack || ''}</pre>
    </div>
  `;
}
</script>

<script>
  function setStatus(msg, isError) {
    const el = document.getElementById('load-status');
    if (el) {
      el.textContent = msg;
      if (isError) el.style.color = '#dc2626';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setStatus('1/3 — 라이브러리 확인 중...');
    const checks = [];
    if (typeof React === 'undefined') checks.push('React');
    if (typeof ReactDOM === 'undefined') checks.push('ReactDOM');
    if (typeof Babel === 'undefined') checks.push('Babel');
    if (checks.length > 0) {
      showError('CDN 로드 실패: ' + checks.join(', ') + '\n\n인터넷 연결 또는 회사 네트워크 확인 — CDN(unpkg.com) 차단 가능성');
      return;
    }

    setStatus('2/3 — Babel JSX 컴파일 중...');
    const jsxText = document.getElementById('app-jsx').textContent;
    let compiled;
    try {
      const result = Babel.transform(jsxText, {
        presets: ['env', 'react'],
        filename: 'app.jsx',
      });
      compiled = result.code;
      console.log('[Studio] Compiled', compiled.length, 'chars');
    } catch (e) {
      showError('Babel 컴파일 에러:\n' + e.message);
      return;
    }

    setStatus('3/3 — React 마운트 중...');
    try {
      new Function(compiled)();
      console.log('[Studio] Mounted');
    } catch (e) {
      showError('실행 에러:\n' + (e.stack || e.message));
    }
  });
</script>
<!-- ╔═ GUI 업데이트 버튼 (프레임워크 무관, /api/update 호출) ═╗ -->
<script>
(function () {
  if (window.__hpwdUpdateWidget) return; window.__hpwdUpdateWidget = true;
  var backend = function () {
    try { return localStorage.getItem('hpwd_backend_url') || 'http://localhost:8010'; }
    catch (e) { return 'http://localhost:8010'; }
  };
  // ── 버튼 ──
  var btn = document.createElement('button');
  btn.textContent = '↻ 업데이트';
  btn.title = '서버 레포를 git pull --ff-only 로 갱신';
  Object.assign(btn.style, {
    position: 'fixed', right: '16px', bottom: '16px', zIndex: 99999,
    padding: '9px 14px', borderRadius: '10px', border: '1px solid #cbd5e1',
    background: '#0f172a', color: '#fff', font: "600 12px 'JetBrains Mono',monospace",
    cursor: 'pointer', boxShadow: '0 4px 14px rgba(0,0,0,.18)', letterSpacing: '.3px'
  });
  btn.onmouseenter = function () { btn.style.background = '#1e293b'; };
  btn.onmouseleave = function () { btn.style.background = '#0f172a'; };
  // ── 토스트 ──
  var toast = document.createElement('div');
  Object.assign(toast.style, {
    position: 'fixed', right: '16px', bottom: '62px', zIndex: 99999,
    maxWidth: '360px', padding: '12px 14px', borderRadius: '10px',
    background: '#fff', color: '#1a1a2e', border: '1px solid #e2e8f0',
    font: "500 12px/1.5 'Pretendard',system-ui,sans-serif",
    boxShadow: '0 6px 20px rgba(0,0,0,.14)', display: 'none', whiteSpace: 'pre-wrap'
  });
  function show(html, color) {
    toast.style.display = 'block';
    toast.style.borderLeft = '4px solid ' + (color || '#2563EB');
    toast.innerHTML = html;
  }
  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  btn.onclick = async function () {
    btn.disabled = true; btn.style.opacity = .6;
    show('레포 업데이트 확인 중…', '#2563EB');
    try {
      var res = await fetch(backend().replace(/\/$/, '') + '/api/update', { method: 'POST' });
      var d = null; try { d = await res.json(); } catch (e2) {}
      if (!res.ok || !d || !d.status) {
        show(res.status === 404
          ? '이 서버엔 /api/update가 없음.<br>서버를 한 번 재시작(python server.py)하면 이후 동작.'
          : '예상치 못한 응답 (HTTP ' + res.status + ').', '#DC2626');
      } else if (d.status === 'up_to_date') {
        show('✓ 이미 최신입니다.', '#059669');
      } else if (d.status === 'updated') {
        var msg = '✓ ' + esc(d.message);
        if (d.backend_changed) msg += '<br><b style="color:#D97706">서버(.py) 변경 — python server.py 재시작 필요</b>';
        if (d.frontend_changed) msg += '<br><button id="__hpwdReload" style="margin-top:8px;padding:6px 12px;border:0;border-radius:8px;background:#2563EB;color:#fff;font:600 11px monospace;cursor:pointer">새로고침</button>';
        show(msg, '#059669');
        var rb = document.getElementById('__hpwdReload');
        if (rb) rb.onclick = function () { location.reload(true); };
      } else if (d.status === 'dirty') {
        show('⚠ 로컬에 커밋 안 된 변경이 있어 자동 업데이트 불가.<br>변경 commit/되돌린 뒤 재시도.<br><span style="font:400 10px monospace;color:#64748b">' + esc((d.changed_files||[]).slice(0,6).join(', ')) + '</span>', '#DC2626');
      } else if (d.status === 'no_git') {
        show('수동 설치본(git 아님) — 자동 업데이트 불가.', '#D97706');
      } else {
        show('업데이트 실패: ' + esc(d.message), '#DC2626');
      }
    } catch (e) {
      show('서버 연결 실패 — 백엔드 실행/주소 확인 (' + esc(backend()) + ').', '#DC2626');
    } finally {
      btn.disabled = false; btn.style.opacity = 1;
      clearTimeout(window.__hpwdToastT);
      window.__hpwdToastT = setTimeout(function () { toast.style.display = 'none'; }, 12000);
    }
  };
  function mount() { document.body.appendChild(toast); document.body.appendChild(btn); }
  if (document.body) mount(); else document.addEventListener('DOMContentLoaded', mount);
})();
</script>
